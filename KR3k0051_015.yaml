body:
  text: 駢志卷十五明陳禹謨撰辛部上人所以有姓人所以有氏白虎通人所以有姓者何所以崇恩愛厚親親逺禽獸所以别婚姻也故紀世别類使生相愛死相哀同姓不得相娶所以重人倫也姓者生也人稟天氣所以生者也詩曰天生蒸民尚書曰平章百姓姓所以有百者何以言古者聖人吹律定姓以紀其族人含五常而生正聲有五宫商角徵羽轉而相雜五五二十五轉生四時異氣殊音悉備故姓有百也又人所以有氏者何所以貴功德下伎力或氏其官或氏其事聞其氏即可知矣所以勉人為善也或氏王父字者何所以别諸矦之後為興滅國繼絶世也王者之子稱王子王者之孫稱王孫諸矦之子稱公子公子之子稱公孫公孫之子各以其王父字為氏刑德考曰堯之命表稷契賜姓于姬臯陶典刑不表姓言天任德遠刑禹姓姒祖昌意以薏苡生殷姓子氏祖以玄鳥子生也周姓姬氏祖以履大人迹生也案潛夫論昔堯賜契姓姬賜禹姓姒氏曰有夏伯夷為薑氏曰有吕下及三代官有世功則有官族邑亦如之後世微末因是以為姓則不能改也故或傳本姓或氏號邑諡或氏於爵或氏於志若夫五帝三王之世所謂號也文武昭景成宣戴桓所謂諡也齊魯吳楚秦晉燕趙所謂國也王氏矦氏王孫公孫所謂爵也司馬司徒中行下軍所謂官也伯有孟孫子服叔子所謂字也巫氏匠氏陶氏所謂事也東門西門南宫東郭西郭所謂居也三鳥五鹿青牛白馬所謂志也凡厥姓氏皆出是屬而不可勝紀也楚狂接輿姓陸東方曼倩姓金高士傳陸通字接輿楚人也好養性躬耕以為食楚昭王時通見楚政無常乃佯狂不仕故時人謂之楚狂論衡世或言東方朔亦道人也姓金氏字曼倩變姓易名遊宦漢朝外有仕宦之名內乃度世之人此又虛也束之先為踈棘之後為棗晉書束晳字廣微陽平元城人漢踈廣之後也王莽末廣曾孫孟達避難自東海徙居沙鹿山南因去疏之足改姓焉又棗據字道彥潁川長社人也本姓棘其先避仇改焉慕容因冠而氏秃髮因被而氏載記燕代多冠步搖冠莫護跋見而好之乃斂髮襲冠諸部因呼之為步搖其後音訛遂為慕容焉又初夀闐之在孕母胡掖氏因寢而産於被中鮮卑謂被為秃髮因而氏焉以鐵為氏以石為名載記赫連勃勃下書曰帝王者繫天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意永享無疆大慶係天之尊不可令支庶同之其非正統皆以鐵伐為氏庶朕宗族子孫剛鋭如鐵皆堪伐人晉書桓豁聞苻堅國中有謠云誰謂爾堅石打碎有子二十人皆以石為名以應之申繻命名對孫休命名詔左傳桓六年九月丁卯子同生以太子生之禮舉之接以大牢卜士負之士妻食之公與文薑宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖矦廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同吳録載孫休詔曰人之有名以相紀别長為作字憚其名耳禮名子欲令難犯易避五十稱伯仲古或一字今人競作好名好字又令相配所行不副此瞽字伯明者也孤嘗哂之或師友父兄所作或自己為師友尚可父兄猶非自為最不謙孤今為四男作名字太子名雨單雨單音如湖水灣澳之灣字酋酋音如迄今之迄次子名􅀢􅀢音如兕觥之觥字䙲䙲音如玄礥首之礥次子名相相音如草莽之莽字昷昷音如舉物之舉次子名􅨟􅨟音如褒衣下寬大之褒字㷏㷏音如有所擁持之擁此都不與世所用者同故鈔舊文會合作之夫書八體損益因事而生今造此名字既不相配又字但一庶易棄避其普告天下使咸聞知裴松之以為傳稱名以制義義以出禮禮以體政政以治民是以政成而民則易以生亂斯言之作豈虛也哉然欲令難犯何患無名而乃造無況之字制不典之音違明誥於前修垂嗤騃於後代不亦異乎是以墳土未乾而妻子絶滅師服之言於是乎徵矣孟子父名孟子母名孟氏譜曰孟子之父激公宜母仉氏或云李氏孟子娶田氏生子名仲子云漢高父名漢高母名符瑞志漢高帝父曰劉執嘉執嘉之母夢赤鳥若龍戲已而生執嘉是為太上皇帝母名含始是為昭靈后昭靈后遊於洛池有玉雞銜赤珠刻曰玉英吞此者王昭靈后取而吞之又寢於大澤夢與神遇唐顏師古曰史家不詳著高祖母之姓氏無得記之故取當時相呼稱號而言也其下王媪之屬意義皆同至如皇甫謐等妄引讖記好竒騁博強為高祖父母名字皆非正史所説蓋無取焉寧有劉媪本姓實存史遷肯不詳載即理而言斷可知也按洪容齋氏曰漢高祖父曰太公母曰媪見於史者如是而已皇甫謐王符始撰為竒語云太公名執嘉又名燸媪姓王氏唐洪文館學士司馬承禎史記索隱云母溫氏是時打得班固泗水亭長古石碑文其字分明作溫曰母溫氏與賈膺復徐彥伯魏奉古等執對反覆深嘆古人未聞聊記異見豫竊謂固果有此明證何不載之于漢紀疑亦後世好事者如皇甫之徒所增加耳又嘗遊嶺外見康州龍媪廟碑亦云姓溫氏皆指媪為溫者不一也唐小説纂異記載三史王生醉入高祖廟見高祖云朕之中外泗州亭長碑昭然具載外族溫氏蓋不根誕妄之説云顧元歎之名為蔡雍所與桓元子之名因溫嶠所稱江表傳顧雍從伯喈學專一清靜敏而易教伯喈貴異之謂曰卿必成致今以吾名與卿故雍與伯喈同名由此也吳録曰雍字元歎言為蔡雍之所歎因以為字焉晉書桓溫字元子宣城太守彞之子也生未期而太原溫嶠見之曰此兒有竒骨可試使啼及聞其聲曰真英物也彞以嶠所賞故遂名之曰溫賜改其名賜復其名舊唐書路嗣恭始名劎客厯仕郡縣有能名後援神烏令考績上上為天下最玄宗以其能嗣魯恭賜改其名唐書李正已反將斷江淮路德宗以張萬福為濠州刺史召見謂曰先帝改卿名正者所以褒卿也朕以為江淮草木亦知卿威名若從先帝所改恐賊不知是卿也賜復名萬福商臣巫賢齊臣巫賢尚書君奭篇云在祖乙時則有若巫賢巫咸子韓詩外傳齊景公出田十有七日而不反晏子乘而往比至衣冠不正景公見而怪之曰夫子何遽乎得無有急乎晏子對曰然有急國人皆以君為惡民好禽臣聞之魚鱉厭深淵而就乾淺故得於釣網禽獸厭深山而下於都澤故得於田獵今君出田十有七日而不反不亦過乎景公曰不然為賔客莫應待邪則行人子牛在為宗廟而不血食邪則祝人太宰在為獄不中邪則大理子幾在為國家有餘不足邪則巫賢在寡人有四子猶有四肢也而得代焉又何患乎晏于曰然人心有四肢而得代焉則善矣令四肢無心十有七日不死乎景公曰善哉言遂援晏子之手與驂乘而歸若晏子者可謂善諫者矣兩曾子兩子思秦策曾子處費費人有與曾子同名族者而殺人人告曾子母曰曾參殺人曾子之母曰吾子不殺人織自若有頃焉人又曰曾參殺人其母尚織自若也頃之一人又告之曰曾參殺人其母懼投杼踰墻而走夫以曾參之賢與母之信也而三人疑之則慈母不能信也史記曾參南武城人字子輿少孔子四十六歲孔子以為能通孝經故授之業按西京雜記昔魯有兩曽參南曾參殺人見捕人以告北曾參母然則子輿為北曽參矣闕里志孔伋字子思逮事孔子而受業於曾子蓋顏子蚤卒聖道傳於曾子曾子傳於子思子思傳於孟子其學獨得其宗子思嘗著書四十九篇左傳鄭駟泰而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之子思曰詩曰不解於位民之攸暨子思子産子國參也不守其位而能久者鮮矣商頌曰不僣不濫不敢怠皇命以多福齊王猛服東郭書謂如驂之靳秦王猛遇苻永固謂若文之尚左傳齊矦伐晉夷儀敝無存之父將室之辭以與其弟曰此役也不死反必娶於高國先登求自門出死於霤下東郭書讓登犂彌從之曰子讓而左我讓而右使登者絶而後下書左彌先下書與王猛息猛曰我先登書斂甲曰曩者之難今又難焉猛笑曰吾從之如驂之靳杜注靳車中馬也猛不敢與書爭言以從書如驂馬之隨靳也傳言齊師和所以能克載記苻堅字永固常從容謂王猛曰卿夙夜匪懈憂勤萬機若文王得太公吾將優遊以卒歲又南史王猛歸欵隨文帝大悅謂辛昉曰猛懷其舊主送故情深即是我之誠臣保守一方不勞兵甲又是我之功臣鄭行人子羽衛行人子羽左傳鄭行人公孫揮如晉聘揮子羽也程鄭問焉曰敢問降階何由子羽不能對歸以語然明然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉又吳徵會於衛初衛人殺吳行人且姚而懼謀於行人子羽子羽衛大夫子羽曰吳方無道無乃辱吾君不如止也子木曰吳方無道國無道必棄疾於人吳雖無道猶足以患衛往也長木之斃無不摽也國狗之瘈無不噬也而況大國乎蒍賈料子玉仲由見子玉左傳楚子將圍宋使子文治兵於暌終朝而畢不戮一人子玉復治兵於蒍子玉成得臣也為令尹故蒍楚邑終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三乘其不能以入矣茍入而賀何後之有又齊陳瓘如楚瓘陳恆之兄子玉也過衛仲由見之曰天或者以陳氏為斧斤既斫喪公室而他人有之不可知也其使終饗之亦不可知也若善魯以待時不亦可乎何必惡焉子玉曰然吾受命矣魏舒善謀魏舒徐籌左傳晉中行穆子敗無終及羣狄於大原崇卒也將戰魏舒曰彼徒我車所過又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之注傳言荀吳能用善謀晉書司徒魏舒每有大事徐為籌之多出衆議之表王良御簡子王良代宣秉左傳晉趙簡子與范氏中行氏將戰郵無恤御簡子衛太子為右郵無恤王良也登鐵上望見鄭師衆太子懼自投於車下子良授太子綏子良即王良而乘之曰婦人也簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下羣子免之死不在冦後漢書王良字仲子東海蘭陵人也少好學習小夏矦尚書建武三年徵拜諫議大夫數有忠言以禮進止朝廷敬之遷沛郡太守至蘄縣稱病不之府官屬皆隨就之良遂上疾篤乞骸骨徵拜大中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曳柴從田中歸恢告曰我司徒史也故來受書欲見夫人妻曰妾是也苦掾無書掾即謂鮑恢司徒之掾史也言勞苦相過更無書信恢乃下拜歎息而還聞者莫不嘉之秦昭王時公孫述漢哀帝時公孫述韓非子秦昭王有病百姓里買牛而家為主禱公孫述出見之入賀王曰百姓乃皆里買牛而主禱王使人問之果有之王曰訾之人二甲夫非令而擅禱是愛寡人也夫愛寡人寡人亦且改法而與之相循者是法不立法不立亂世之道也不如人罰二甲而復與為治後漢書公孫述字子陽哀帝時以父任為郎東觀記曰成帝末述父仁為侍御史任為太子舍人稍增秩為郎焉公孫𢎞西觀秦公孫𢎞西應命吕覽孟嘗君為從公孫𢎞請西觀秦王昭王聞之而欲醜之以辭𢎞言昭王不好士昭王笑而謝焉公孫𢎞可謂不侵矣史記公孫𢎞年六十徴以賢良為博士使胸奴還報不合上意上怒以為不能𢎞乃病免歸元光五年有詔徵文學災川國復推上公孫𢎞𢎞讓謝國人曰臣已嘗西應命以不能罷歸願更推選國人固推𢎞𢎞至太常太常令所徵儒士各對策百餘人𢎞居下策奏天子擢𢎞對為第一又後漢書虞延欲辟幽州從事公孫𢎞以𢎞交通楚王而止是有三公孫𢎞矣秦趙高為丞相漢趙高為太守史記秦二世三年冬趙高為丞相竟案李斯殺之高欲為亂恐羣臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤邪謂鹿為馬問左右左右或默或言馬以阿順趙高或言鹿者高因隂中諸言鹿者以法後羣臣皆畏高高前數言關東盜毋能為也水經注漢光武建武二年西河鮮于冀為清河太守作公廳未就而亡後守趙高計功用二百萬五官黃秉功曹劉適言四百萬錢於是冀乃鬼見白日道從入府與高及秉等對共計校定為秉適所割匿冀乃書表自理其略言高貴不尚節畝壟之夫而箕踞遺類研密失機婢妾其性媚世求顯偷竊銀艾鄙辱天官易譏負乘誠高之謂臣不勝鬼言謹因千里驛聞待高上之便西北去三十里車馬皆滅不復見秉等皆伏地物故高以狀聞詔下還冀西河田宅妻子焉兼為差代以旌幽中之訟漢高帝時貢禹漢元帝時貢禹漢書魏相述高帝時蕭何周昌等議春夏秋冬天子所服當法天地之數中得人和故自天子王矦有土之君下及兆民能法天地順四時以治國家身亡禍殃年夀永久是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬師古曰高帝時自有一貢禹也四人各職一時又貢禹以明經潔行著聞元帝徴為諌大夫數虛已問以政事田仁推任安秦宓薦任安史記武帝召見衛將軍舍人田仁任安二人前見詔問能略相推第也田仁對曰提桴鼓立軍門使士大夫樂死戰鬬仁不及任安任安對曰夫決嫌疑定是非辨治官使百姓無怨心安不及任也武帝大笑曰善使任安護北軍使田仁護邊田榖於河上此兩人立名天下其後用任安為益州刺史以田仁為丞相長史蜀志秦宓薦儒士任定祖曰處士任安仁義直道流名四逺如今見察則一州斯服昔湯舉伊尹不仁者逺何武貢二龔雙名竹帛故貪尋丈之高而忽萬仞之嵩樂面前之飾而忘天下之譽斯誠往古之所重慎也甫欲鑿石索玉剖蚌求珠今乃隨和炳然有如皎日復何疑哉誠知晝不操燭日有餘光但餘情區區貪陳所見按益部耆舊傳安廣漢人少事聘士楊厚究極圖籍遊覽京師還家講授與董扶俱以字行齊聲丞相諸葛亮問秦宓以安所長宓曰記人之善忘人之惡漢成美王商之固守秦宓美王商之厚黨漢書成帝建始三年京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子親御前殿召公卿議大將軍王鳳以為太后與上及後宫可御船令吏民上長安城以避水羣臣皆從鳳議左將軍王商獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳳大慙自恨失言明年商代匡衡為丞相蜀志劉璋時秦宓同郡王商為治中從事後商為嚴君平李𢎞立祠宓與書曰疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使揚子不歎固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣如揚子雲潛心著述有補於世泥蟠不滓行參聖師于今海內談詠厥辭邦有斯人以耀四逺怪子替兹不立祠堂蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地理志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不達封禪相如制其禮夫能制禮造樂移風易俗非禮所稱有益於世者乎雖有王孫之纍猶孔子大齊桓之霸公羊賢叔術之讓僕亦善長卿之化宜立祠堂速定其銘張良為成信矦張良為右僕射漢書張良間行歸漢王王以良為成信矦載記永和五年石季龍僣即帝位以尚書張良為右僕射孔安國承武帝詔作尚書傳孔安國承安帝詔領東海郡論語正義孔子十一世孫安國為漢武帝博士承詔作書傅又作古文孝經傳亦作論語訓解漢書孔氏有古文尚書孔安國以今文字讀之因以起其家逸書得十餘篇蓋尚書滋多於是矣遭巫蠱未立於學官安國為諫大夫授都尉朝而司馬遷亦從安國問故遷書載堯典禹貢洪範微子金縢諸篇多古文説晉書孔安國孔愈子也以儒業顯孝武時甚蒙禮遇安帝時厯尚書左右僕射張禹封安昌矦張禹封安鄉矦漢書張禹字子文宣帝甘露中諸儒薦禹詔蕭望之問禹對易及論語大義望之善焉後代王商為丞相封安昌矦後漢書張禹字伯達性篤厚節儉和帝時為太傅安帝時以定策功封安鄉矦西漢宋𢎞為中常侍東漢宋𢎞為大司空漢書長安孫寵遊説顯名與息夫躬謀曰時無鹽有大石自立聞邪臣託往事以為太山石立而先帝龍興東平王雲以故與其后日夜祠祭祝詛上欲求非望而后舅伍宏反因方術以醫技得幸出入禁門霍顯之謀將行於杼杓荆軻之變必起於帷幄事勢若此告之必成發國姦誅主讎取封矦之計也躬寵乃與中郎右師談共因中常侍宋𢎞上變事告焉後漢書宋𢎞少而溫順哀平間作侍中王莽時為共工赤眉入長安遣使徵𢎞逼迫不得已行至渭橋自投於水家人救得出因佯死獲免光武即位徵拜太中大夫建武二年代王梁為大司空封栒邑矦所得租奉分贍九族家無資産以清行致稱徙封宣平矦漢李廣為士夫所信齊李廣為士流所愛漢書贊李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中誠信於士大夫也北史李廣齊文宣時掌書記廣雅有鑒識度量𢎞逺坦率無私為士流所愛漢李陵遂降於虜唐李陵見殺於蠻漢書李陵軍既敗盡斬旌旗及珍寶埋地中陵嘆曰復得數十矢足以脫矣今無兵復戰天明坐受縛矣各鳥獸散猶有得脫歸報天子者令軍士持二升糒一半氷期至遮虜鄣者相持夜半時擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無面目報陛下遂降注如淳曰半讀曰片或曰五升曰半師古曰半讀曰判判大片也唐書張柬之論姚州戍云置姚州後録事參軍李陵為蠻所殺朱買臣密告張湯朱買臣密害豫章漢書朱買臣與嚴助俱侍中貴用事張湯為小吏趨走買臣等前後湯以廷尉治淮南獄排陷嚴助買臣怨湯及買臣為長史湯數行丞相事知買臣素貴故陵折之買臣見湯坐牀上弗為禮買臣深怨常欲死之後遂告湯隂事湯自殺上亦誅買臣梁書宣猛將軍朱買臣密告豫章嗣王棟及其二弟橋樛世祖志也兩子夏俱稱材能故謂欽為盲子夏兩夏矦俱為將軍故謂惇為盲夏矦漢書杜欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜鄴與欽同姓字俱以材能稱故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆乃為小冠高廣財二寸由是京師更為小冠杜子夏而鄴為大冠杜子夏魏略夏矦淵與夏矦惇俱為將軍軍中號惇為盲夏矦惇惡之每照鏡恚怒輒撲鏡於地魏志夏矦惇從征吕布為流矢所中傷左目右將軍王莽新都矦王莽漢書燕刺王旦賂遺蓋主上官桀及御史大夫桑𢎞羊等皆與交通謀為逆蓋主報言獨患大將軍霍光與右將軍王莽今右將軍物故丞相病幸事必成按張晏曰王莽天水人也字雅叔又王莽字巨君永始元年封為新都矦國南陽新野之都鄉千五百户遷騎都尉光祿大夫侍中宿衛謹敕爵位愈尊節操愈謙散輿馬衣裘振施賓客家無所餘收贍名士交結將相卿大夫甚衆故在位更推薦之遊者為之談説虛譽隆洽傾其諸父矣敢為激發之行處之不慙恧立盆子為帝推盆子為主後漢書赤眉欲求劉氏共尊立之遂立盆子為帝北史爾朱世隆至長子與度律等共推長廣王元曄為主曄小名盆子聞者皆以為事類赤眉張衡不自驕尚張衡頗自驕貴後漢書張衡少善屬文遊于三輔因入京師觀大學遂通五經貫六藝雖才高於世而無驕尚之情常從容淡靜不好交接俗人隋書張衡以藩邸之舊恩寵莫與為比頗自驕貴衡幼懷志尚有骨鯁之風年十五詣太學受業研精覃思為同輩所推漢李杜齊名唐李杜齊名後漢書先是李固見廢內外喪氣羣臣側足而立唯杜喬正色無所回撓由是海內歎息朝野瞻望焉在位數月以地震免宦者唐衡左悺等因共譛於帝曰陛下前當即位喬與李固抗議言上不堪奉漢宗祀帝亦怨之及清河王蒜事起梁冀遂諷有司劾喬及李固與劉鮪等交通請逮案罪而梁太后素知喬忠但策免而已冀愈怒使人脅喬曰早從宜妻子可得全喬不肯明日冀遣騎至其門不聞哭者遂白執繫之死獄中妻子歸故郡與李固俱暴尸於城北家屬故人莫敢視者喬故掾陳留楊匡聞之號泣星行到洛陽乃著故赤幘託為夏門亭吏守衛尸喪驅護蠅蟲積十二日都官從事執之以聞太后義而不罪匡於是帶鈇鑕詣闕上書并乞李杜二公骸骨太后許之成禮殯殮送喬喪還家葬送行服隱匿不仕又李雲素剛憂國將危心不能忍乃露布上書移副三府曰臣聞孔子曰帝者諦也今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都護劍戟送黃門北寺獄使中常侍管霸與御史廷尉雜考之時𢎞農五官掾杜衆傷雲以忠諌獲罪上書願與雲同日死帝愈怒遂并下廷尉時帝在濯龍池管霸奏雲等事霸詭言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黃門可其奏雲衆皆死獄中後冀州刺史賈琮使行部過祀雲墓刻石表之又李膺性簡亢無所交接唯以同郡荀淑陳實為師友是時朝廷日亂綱紀頽弛膺獨持風裁以聲名自高及遭黨事當考實膺等案經三府太尉陳蕃郤之曰今所考案皆海內人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署帝愈怒遂下膺等於黃門北寺獄杜密為人沈質少有厲俗志為司徒胡廣所辟後桓帝徵拜尚書令遷河南尹轉太僕黨事既起免歸本郡與李膺同坐而名行相次故時人亦稱李杜焉舊唐書天寶末詩人杜甫與李白齊名而白自負文格放達譏甫齷齪而有飯顆山之嘲誚元和中詞人元稹論李杜之優劣曰豫讀詩至杜子美而知小大之有所總萃焉始堯舜之時君臣以賡歌相和是後詩人繼作厯夏商周千餘年仲尼緝拾選揀取其干預教化之尤者三百餘無所聞騷人作而怨憤之態繁然猶去風雅日近尚相比擬秦漢已還採詩之官既廢天下妖淫民謳歌頌諷賦曲度嬉戲之辭亦隨時間作至漢武賦柏梁而七言之體興蘇子卿李少卿之徒尤工為五言雖句讀文律各異雅鄭之音亦雜而辭意簡逺指事言情自非有為而為則文不妄作建安之後天下之士遭罹兵戰曹氏父子鞍馬間為文往往橫槊賦詩故其狀抑揚寃哀悲離之作尤極於古晉世風槩稍存宋齊之間教失根本士以簡謾歙習舒徐相尚文章以風容色澤放曠精清為高蓋吟寫性靈留連光景之文也意義格力無取焉陵遲至於梁陳淫艷刻飾佻巧小碎之詞劇又宋齊之不取也唐興官學大振厯世能者之文互出而又沈宋之流研練精切穩然聲勢謂之為律詩由是之後文變之體極焉然而莫不好古者遺近務華者去實效齊梁則不怠於魏晉工樂府則力屈於五言律切則骨格不存間暇則纎濃莫備至於子美蓋所謂上薄風騷下流沈宋言奪蘇李氣吞曹劉掩顔謝之孤高雜徐庾之流麗盡得古今之體勢而兼人人之所獨專矣使尼考煆其旨要尚不知貴其多乎哉茍以為能所不能無可無不可則詩人以來未有如子美者是時山東人李白亦以文竒取稱時人謂之李杜豫觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠亦差肩於子美矣至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不能厯其藩翰況堂奧乎張玄清淨無欲張玄清介高行後漢書張玄字君夏河內河陽人也少習嚴氏春秋兼通數家法建武初舉明經補𢎞農文學遷陳倉縣丞清淨無欲專心經書方其講問乃不食終日及有難者輒為張數家之説令擇從所安諸儒皆伏其多通著録千餘人玄初為縣丞嘗以職事對府不知官曹從吏白門下責之時右扶風琅邪徐業亦大儒也聞玄諸生試引見之與語大驚曰今日相遭真解矇矣遂請上堂問難極日蜀志張紘子玄官至南郡太守尚書江表傳曰玄清介有高行而才不及紘按吳書曰紘見柟榴枕愛其文為作賦陳琳在北見之以示人曰此吾鄉張子綱子綱綋字所作也後紘見陳琳作武庫賦應機論與琳書深歎美之琳答曰自僕在河北與天下隔此間率少於文章易為雄霸故使僕受此過差之談非其實也今景興在此足下與子布在彼所謂小巫見大巫神氣盡矣紘既好文學又善楷篆書與孔融書自書融遺紘書曰前勞手筆多篆書每舉篇見字欣然獨笑如復覩其人也張溫以車騎將軍出討張溫以輔義中郎出使後漢書中平二年秋七月三輔螟左車騎將軍皇甫嵩免八月以司空張溫為車騎將軍討北宫伯玉十一月張溫破北宫伯玉于美陽吳志張溫以輔義中郎將使蜀孫權謂溫曰卿不宜逺出恐諸葛孔明不知吾所以與曹氏通意以故屈卿行若山越都除便欲大搆於蜀行人之義受命不受辭也溫對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子産陳事之效然諸葛亮逹見計數必知神慮屈伸之宜加受朝廷天覆之惠推亮之心必無疑二溫至蜀詣闕拜章曰昔高宗以諒暗昌殷祚於再興成王以幼沖隆周德於太平功冒溥天聲貫罔極今陛下聰明之姿等契往古總百揆於良佐參列精之炳耀遐邇望風莫不欣賴吳國勤任旅力清澄江滸願與有道平一宇內委心協規有如河水軍事興煩使役乏少是以忍鄙倍之羞使下臣溫通致情好陛下敦崇禮義未便耻忽臣自入逺境及即近郊頻蒙勞來恩詔輒加以榮自懼悚怛若驚謹奉所齎函書一封蜀甚貴其才張綱埋車輪張綱修攻具後漢書漢安元年選遣八使徇行風俗皆耆儒知名多厯顯位唯張綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當道安問狐狸按周舉傳曰詔遣八使巡行風俗同時俱拜天下號曰八俊刺史二千石有臧罪者驛馬上之墨綬已下便收其有清勤忠惠宜表異者狀聞八使名見順帝紀宋書武帝北討慕容超超尚書郎張綱乞師於姚興自長安反太山太山申宣執送之綱有巧思先是帝修攻具城上人曰汝不得張綱何能為也及至升諸樓以示之城內莫不失色按綱修攻具成設飛樓縣梯木幔板屋冠以牛皮弓矢無所用之吳嚴武以圍棋知名唐嚴武以門蔭策名吳録曰嚴武字子卿衛尉畯再從子也圍棋莫與為輩舊唐書嚴武中書侍郎挺之子也神氣雋爽敏於聞見幼有成人之風讀書不究精義涉獵而已弱冠以門蔭策名吳桓彞不肯署名晉桓彞不從偽降吳志孫綝使光祿勳孟宗告廟廢孫亮召羣司議曰少帝荒陋昏亂不可以處大位承宗廟以告先帝廢之諸君若有不同者下異議皆震怖曰唯將軍令綝遣中書郎李崇奪亮璽綬以亮罪狀班告逺近尚書桓彞不肯署名綝怒殺之漢晉春秋曰彞魏尚書令階之弟吳録曰晉武帝問薛瑩吳之名臣瑩對稱彝有忠貞之節晉書蘇峻之亂桓彝據廣德固守經年勢孤力屈賊曰桓彝若降者當待以優禮將士多勸彝偽降更思後舉彝不從辭氣壯烈志節不撓城陷為韓晃所害初彝與郭璞善嘗令璞筮卦成璞以手壞之彝問其故曰卦與吾同丈夫當此非命如何評曰二桓姓名既肖節義復埒異哉王沉文籍先生王沉東野丈人晉書王沉字處道時魏高貴鄉公好學有文才引沉及裴秀數于東堂講宴屬文號沉為文籍先生秀為儒林丈人又文苑傳王沉字彥伯作釋時論以東野丈人自寓載記劉聰朝復有一王沉太原王澄琅邪王澄晉書太原王濟弟澄字道深辨慧有才藻又琅邪王澄字平子生而警悟雖未能言見人舉動便識其意王衍妻郭性貪鄙欲令婢路上擔糞澄年十四諌郭以為不可郭大怒謂澄曰昔夫人臨終以小郎屬新婦不以新婦屬小郎因捉其衣裾將杖之澄爭得脫踰忩而走司空張華僕射張華晉書張華盡忠匡輔彌縫補闕雖當暗主虐后之朝而海內晏然華之功也華懼后族之盛作女史針以為諷賈后雖凶妬而知敬重華久之論前後功勳進封壯武郡公華十餘讓中詔敦譬乃受數年代下邳王晃為司空領著作載記姚興遣使聘於慕容超超遣其僕射張華給事中宗正元入長安送大樂伎一百二十人於姚興興大悅延華入宴酒酣樂作興黃門侍郎尹雅謂華曰昔殷之將亡樂師歸周今皇秦道盛燕樂來庭廢興之兆見於此矣華曰自古帝王為道不同權譎之理會於功成故老子曰將欲與之必先取之今總章西入必由余東歸禍福之驗此其兆乎興怒曰昔齊楚競辨二國連師卿小國之臣何敢抗衡朝士華遜辭曰奉使之始實願交歡上國上國既遺小國之臣辱及寡君社稷臣亦何心而不仰酬興善之中書郎成公綏太史令成公綏晉書成公綏幼而聰敏博涉經傳性寡欲不營資産家貧歲飢常晏如也少有雋才詞賦甚麗間默自守不求聞逹時有孝烏每集其廬舍綏謂有反哺之德以為祥禽乃作賦美之張華雅重綏每見其文歎伏以為絶倫薦之太常徵為博士厯祕書郎轉丞遷中書郎每與華受詔並為詩賦又與賈充等參定法律載記義熙三年慕容超祀南郊將登壇有獸大如馬狀類鼠而色赤集於圜丘之側俄而不知所在須臾大風暴起天地晝昏其行宫羽儀皆振裂超懼密問其太史令成公綏對曰陛下信用姦臣誅戮賢良賦斂繁多事役殷苦所致也超懼而大赦劉𢎞為荆州刺史劉𢎞為泉州刺史晉書太安中張昌作亂轉使持節南蠻校尉荆州刺史劉𢎞率前將軍趙讓等討昌自方城至宛新野所向皆平于時流人在荆州十餘萬户羇旅貧乏多為盜賊𢎞乃給其田種糧食擢其賢才隨資敘用時總章大樂伶人避亂多至荆州或勸可作樂者𢎞曰昔劉景升以禮壞樂崩令杜夔為天子合樂樂成欲庭作之夔曰為天子合樂而庭作之恐非將軍本意吾常為之歎息今主上蒙塵吾未能展效臣節雖有家伎猶不宜聽況御樂哉乃下郡縣使安慰之須朝廷旋返送署本署隋書劉𢎞拜泉州刺史會高智慧作亂以兵攻州𢎞城守百餘日救兵不至前後出戰死亡大半糧盡無所食與士卒數百人煮犀甲腰帶及剝樹皮而食之一無離叛賊知其飢餓欲降之𢎞抗節彌厲賊悉衆來攻城陷為賊所害上聞而嘉歎者久之後漢書董卓殺執金吾丁原司空劉𢎞免董卓自為司空秦將姚崇唐相姚崇載記鮮卑薛勃于二城為魏軍所伐遣使請救姚興興使姚崇赴救魏師既還薛勃復叛崇伐而執之大收其士馬而還舊唐書姚崇本名元崇字元之先天二年玄宗講武在新豐驛召元之代郭元振為兵部尚書同中書門下三品復遷紫微令避開元尊號又改名崇進封梁國公是時上初即位務修德政軍國庶務多訪於崇同時丞相盧懷慎源乾曜等但唯諾而已崇獨當重任明於吏道斷割不滯今仲舒何如昔仲舒今李膺何如昔李膺南史直閣將軍董蠻粗有氣力蕭子響要與同行蠻曰殿下癲如雷敢相隨邪子響笑曰君敢出此語亦復竒癲上聞而不悅曰人名蠻復何容得藴藉乃改名為仲舒謂曰今日仲舒何如昔日仲舒答曰昔日仲舒出自私庭今日仲舒降自天帝以此言之勝昔逺矣按漢書董仲舒廣川人少治春秋孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面舊師古注曰言新學者但就其弟子受業不必親見仲舒又李膺為新昌矦蕭藻主簿使至都武帝悅之謂曰今李膺何如昔李膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之按後漢書李膺字元禮以聲名自高士有被其容接者名為登龍門文章李益詩人韓翃孝子江泌舊唐書李益肅宗朝宰相揆之族子登進士第長為歌詩貞元末與宗人李賀齊名每作一篇為教坊樂人以賂求取唱為供奉歌詞其征人歌早行篇好事者畫為屏障迥回樂峯前沙似雪受降城外月如霜之句天下以為歌詞然少有癡病而多猜忌防間妻妾過為苛酷而有散灰扃户之談聞于時故時謂妬癡為李益疾新唐書時又有太子舍人李益同在朝故世言文章李益以辨云按因話録李尚書益有宗人庶子同名俱出于姑臧公時人謂尚書為文章李益庶子為門户李益而尚書亦兼門地焉嘗姻族間有禮會尚書歸笑謂家人曰大堪笑今日局席兩箇坐頭總是李益唐書韓翃字君平南陽人矦希逸表佐淄青幕府府罷十年不出李勉在宣武復辟之俄以駕部郎中知制誥時有兩韓翃其一為刺史宰相請孰與德宗曰與詩人韓翃按本事詩天寶末舉進士制誥闕人中書兩進名德宗批曰與韓翃時有與翃同姓名者為江淮刺史又具二人同進御筆復批曰春城無處不飛花寒食東風御栁斜日暮漢宫傳蠟燭輕煙散入五矦家又批曰與此韓翃時建中初也唐書江泌字士清母亡後以生闕供養遇鮭不忍食食菜不食心以其有生意也泌族人兖州治中泌黃門郎愈子與泌同名世謂泌為孝子江泌以别之太公號尚父子儀號尚父詩曰維師尚父時維鷹揚舊唐書德宗即位詔郭子儀還朝攝冢宰充山陵使賜號尚父進位太尉中書令增實封通計二千户給一千五百人糧二百匹馬草料所領諸使副元帥並罷諸子弟女壻拜官者十餘人商太宰吳太宰列子商太宰商宋國也宋都商丘故二名焉太宰官名見孔子曰丘聖者歟孔子曰聖則丘何敢然則丘博學多識者也商太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘不知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知商太宰大駭曰然則孰者為聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其為聖弗知真為聖歟真不聖歟左傳公會吳于槖臯吳子使太宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為茍有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟説苑子貢見太宰嚭嚭問曰孔子何如對曰臣不足以知之太宰曰子不知何以事之對曰唯不知故事之夫子其猶太山林也百姓各足其材焉太宰曰子增夫子乎對曰夫子不可增也夫賜其猶一纍壤也以一纍壤增太山不益其高且為不知太宰嚭曰然則子有所酌也對曰天下有大樽而子獨不酌焉不識誰之罪也越絶書越王殺太宰嚭戮其妻子以其不忠信斷絶吳之世趙平原君漢平原君史記平原趙君勝者趙之諸公子也諸子中勝最賢喜賔客賔客蓋至者數千人漢書朱建楚人也故嘗為淮南王黥布相有罪去後復事布布欲反時問建建諫止之布不聽聽梁父矦遂反漢既誅布聞建諌之高祖賜建號平原君家徙長安為人辨有口刻廉剛直行不茍合義不取容辟陽矦行不正得幸吕太后欲知建建不肯見及建母死貧未有以發喪方假貸服具陸賈素與建善乃見辟陽矦賀曰平原君母死何乃賀我陸生曰前日君矦欲知平原君平原君義不知君以其母故今其母死君誠厚送喪則彼為君死矣辟陽矦乃奉百金裞列矦貴人以辟陽矦故往賻凡五百金久之人或毁辟陽矦惠帝大怒下吏欲誅之太后慙不可言大臣多害辟陽矦行欲遂誅之辟陽矦困急使人欲見建建辭曰獄急不敢見君建乃求見孝惠幸臣閎籍孺説曰君所以得幸帝天下莫不聞今辟陽矦幸太后而下吏道路皆言君讒欲殺之今日辟陽矦誅旦日太后含怒亦誅君君何不肉袒為辟陽矦言帝帝聽君出辟陽矦太后大歡兩主俱幸君君富貴益倍矣于是閎籍孺大恐從其計言帝帝果出辟陽矦辟陽矦之囚欲見建建不見辟陽矦以為背之大怒及其成功出之大驚蕭何封鄼矦臧宫封鄼矦漢書蕭何傳漢五年高祖殺項羽即皇帝位論功行封羣臣爭功歲餘不決上以何功最盛先封為鄼矦鄼屬南陽食邑八千户後漢書臧宫與吳漢並滅公孫述光武以蜀新定拜宫為廣漢太守十三年增邑更封鄼矦路博德為伏波將軍馬文淵為伏波將軍漢書路博德以衛尉為伏波將軍伐破南越益封後漢書馬援字文淵時交趾女子徵側及女弟徵二反攻沒其郡九真日南合浦蠻夷皆應之冦略嶺外六十餘城側自立為王于是璽書拜援伏波將軍援平嶠南所過輒為郡縣治城郭穿渠灌溉以利其民條奏越律與漢律駁者十餘事與越人申明舊制以約束之自後駱越奏行馬將軍故事援軍還將至故人多迎勞之平陵人孟冀名有計謀于坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百户今我微勞猥嚮大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今胸奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹尸還葬耳何能卧牀上在兒女子手中邪冀曰諒為烈士當如此矣案東觀記援上書臣所假伏波將軍印書伏字犬外嚮城臯令印皋字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可大馮君小馮君大秦君小秦君漢書馮野王字君卿立字聖卿立居職公廉治行略與野王相似而多知有恩貸好為條教吏民嘉美野王立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智惠吏民政如魯衛德化鈞周公康叔猶二君舊唐書秦景通與弟暐尤精漢書當時習漢書者皆宗師之常云景通為大秦君暐為小秦君若不經其兄弟指授則謂之不經師匠無足稱也景通貞觀中為洗馬大南郡小南郡大鄭公小鄭公大鴻臚小鴻臚南史劉之遴字思貞除南郡太守武帝謂曰卿母年德並高故令卿衣錦還鄉盡榮養之禮弟之亨字嘉會代之遴為南郡太守上問朱異曰之亨代兄喜不兄弟因循豈直大馮小馮而已又謂尚書令何敬容曰荆州長史南郡太守皆是僕射出入今者之亨便是九轉在郡有異績吏人稱之卒荆土懷之不復稱名號為大南郡小南郡北史鄭述祖字恭文少聰敏有風檢為先逹所稱齊天保中為兖州刺史時穆子容為巡省使嘆曰古人有言聞伯夷之風貪夫廉懦夫有立志今之鄭兖州見之矣遷光州刺史初述祖父為兖州於鄭城南小山起齋亭刻石為記述祖時年九歲及為刺史往尋舊迹得一破石有銘云中嶽先生鄭道昭之白雲堂述祖對之嗚咽悲慟羣寮有人入市盜布其父怒曰何負吾君執之以歸首述祖特原之自是境內無盜百姓歌曰大鄭公小鄭公相去五十載風教猶尚同魏略始南陽韓暨以宿德在宣前為大鴻臚暨為人賢及宣在後亦稱職故鴻臚中為之語曰大鴻臚小鴻臚前後治行曷相如郭伯濟封汾陽子郭子儀封汾陽王魏志郭淮字伯濟咸熙中開建五等以淮著勳前朝改封汾陽子按淮初封陽曲矦詔曰昔漢川之役幾至傾覆淮臨危濟難功書王府在關右三十餘年外征冦虜內綏民夷比歲以來摧破廖化禽虜句安功績顯著朕甚嘉之舊唐中上元三年河中軍殺其帥李國貞時太原節度鄧景山亦為部下所殺恐其合從連賊朝廷憂之後輩帥臣未能彈壓勢不獲已遂用郭子儀為朔方河中北庭潞儀澤沁等州節度行營兼興平定國副元帥充本管觀察處置使進封汾陽郡王出鎮絳州據此是前後有兩郭汾陽矣又劉宋王華以誅徐羡之功追封新建縣矦其子定矦嗣爵本朝王伯安尊人亦諱華所封伯爵亦得新建可謂數之巧合李衛公藥師李衛公文饒舊唐書李靖字藥師裔孫芳任鳳翔府司𨽻參軍詣闕進高祖太宗所賜衛國公靖官告敕書手詔等十餘卷內四卷太宗文皇帝筆迹文宗寶惜不能釋手其佩筆尚堪書金裝木匣製作精巧帝並留禁中令書工模寫本還之賜芳絹二百匹衣服靴笏以酬之唐書李德裕字文饒既被放左拾遺丁柔立內愍傷之為上書直其寃坐阿附貶南陽尉懿宗時詔追復德裕太子少保衛國公賜尚書左僕射距其沒十年萬石君萬石嫗史記石奮長子建次子甲次子乙次子慶皆以馴行孝謹官皆至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃集其門號奮為萬石君又後漢書馮勤字伯偉魏郡繁陽人也曾祖父揚宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自耻短陋恐子孫之似也乃為子伉娶長妻伉生勤八尺三寸八歲善計銚期薦於光武在事精勤遂見親識每引進帝輒顧謂左右曰佳乎吏也後厯官司徒號稱任職勤母年八十每會見詔敇勿拜令御者扶上殿謂諸王曰使勤貴寵者此母也漢書嚴延年兄弟五人皆有吏材至大官東海號曰萬石嚴嫗韋氏父子入相李氏父子復相漢書韋賢代蔡義為丞相時賢年七十餘為相五歲少子玄成復以明經厯位至丞相舊唐書李德裕父吉甫年五十一出鎮淮南五十四自淮南復相今德裕鎮淮南復入相一如父之年亦為異事三日厯三臺十旬遷四職後漢董卓切敇州郡舉蔡雍詣府雍不得已到署祭酒甚見敬重舉高第補侍御史又轉侍書御史遷尚書三日之間周厯三臺北史唐瑾轉荆州總管府長史入為吏部中大夫厯御正納言內史中大夫曽未十旬遂遷四職又蘇亮自大統以來無歲不轉官一年或至三遷僉曰才至不怪其速也三世山隂三世觀察齊書山隂東土大縣難為長官傅僧佑在縣有稱子琰為武康令遷山隂令尤明察又著名二縣皆謂之傅聖父子並著竒績時云諸傅有治縣譜子孫相傳不以示人時劉玄明亦有吏能厯山隂令政常為天下第一琰子劌代玄明為山隂問玄明答曰我有竒術卿家譜所不載臨别當相示既曰作縣令唯日食一升飯而莫飲酒此第一策也舊唐書崔郾字廣略昭愍時為陜州觀察使舊弊有上供不足奪吏俸以益之歲八十萬郾以廉使常用之直代之居二年政績聞於朝遷鄂嶽浙西觀察使至用寬政安疲人及居鄂渚則峻法嚴刑未嘗貰一死罪江湖之間萑蒲是叢因造蒙衝小艦上下千里期月而盡獲羣盜凡三按廉車率由清簡少事財用有餘人遂寧泰子瑤厯浙西鄂嶽觀察使瑾為湖南觀察使祖父並經此職祖父皆為此職南史謝舉掌吏部尚書舉祖莊父草瀹兄覽並經此職前代少比又王承為國子祭酒承祖儉父暕皆為此職三世為國師前代未之有駢志卷十五
