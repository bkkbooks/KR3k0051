body:
  text: 駢志卷三明陳禹謨撰乙部上師經援琴撞魏文侯師曠援琴撞晉平公説苑師經鼓琴魏文侯起儛賦曰使我言而無見違師經援琴而撞文侯曰昔堯舜之為君也唯恐言而人不違桀紂之為君也唯恐言而人違之韓非子晉平公與羣臣飲飲酣乃喟然嘆曰莫樂為人君惟其言而莫之違師曠待坐于前援琴撞之公披祍而避琴壞於壁公曰太師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰啞是非君人者之言也左右請除之公曰釋之以為寡人戒鬻拳諌楚子臨之以兵葆申諌荆王加之以荆左傳初鬻拳強諌楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之太伯使其後掌之吕覽荆文王得茹黃之狗宛路之矰以畋於雲夢三月不反得丹之姬淫期年不聽朝葆申曰先王卜以臣為葆吉今王得茹黃之狗宛路之矰畋三月不反得丹之姬淫期年不聽朝王之罪當笞王曰不榖免衣襁褓而齒於諸侯願請變更而無笞葆申曰臣承先王之令不敢廢也王不受笞是廢先王之令也臣寧抵罪於王毋抵罪於先王王曰敬諾引席王伏葆申束細荆五十跪而加之於背如此者再謂王起矣王曰有笞之名一也遂致之申曰臣聞君子恥之小人痛之恥之不變痛之何益葆申趣出自流於淵請死罪文王曰此不榖之過也葆申何罪王乃變更召聽葆申殺茹黃之狗析宛路之矰放丹之姬後荆國兼國三十九令荆國廣大至於此者葆申之力也極言之功也應侯為民請苑蕭何為民請苑韓非子秦大飢應侯請曰五苑之草著蔬菜橡果棗栗足以活命請發之昭襄王曰吾秦法使民有功而受賞有罪而受誅今發五苑之蔬果者使民有功與無功俱賞也夫使民有功與無功俱賞者此亂之道也夫發五苑而亂不如棄棗蔬而治漢書蕭何為民請曰長安地狹上林中多空地棄願令民得入田母收藁為獸食上大怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫之數日王衛尉曰夫職事茍有便於民而請之真宰相事也陛下奈何乃疑相國受賈民財乎是日使使持節赦出何何年老素恭謹徒跣入謝上曰相國休矣相國為民請吾苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過又貢禹請自城西南至山西至鄠皆復其田以與貧民天子善其忠乃下詔省宜春下苑以與貧民賈捐之議棄珠崖牛僧孺議棄維州漢書元帝初元元年珠崖反發兵繫之諸縣更叛連年不定上與有司議大發軍賈捐之建議以為不當擊其略曰棄之不足惜不擊不損威臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠崖專用恤關東為憂對奏上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之連年護軍都尉校尉及丞九十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今關東困乏民難搖動捐之議是上乃從之舊唐書吐蕃遣使入朝修好俄而西川節度李德裕奏吐蕃維州守將悉怛謀以城降文宗下尚書省議衆狀請如德裕策牛僧孺奏曰此議非也吐蕃疆土四面萬里失一維州無損其勢况比來修好約罷戍兵中國禦戎守信為上應敵次之今一朝失信戎醜得以為詞雖得百維州亦何補也上曰然遂詔西川不內維州降將按貞元中韋臯鎮蜀經略西山八國萬計取之不獲至是悉怛謀遣人送欵德裕疑其詐遣人送錦袍金帶與之託云候取進止悉怛謀乃盡率郡人歸成都德裕乃發兵鎮守因陳出攻之利害時僧孺沮議乃詔德裕却送悉怛謀一部之人還維州贊普得之皆加虐刑會監軍王踐言入朝知樞密嘗于上前言悉怛謀縛送以快戎心絶歸降之義上頗尤僧孺魏相請棄車師仁傑請棄四鎮漢書元康中胸奴遣兵擊漢屯田車師者不能下上與後將軍趙充國等議欲因胸奴衰弱出兵擊其右地使不敢復擾西域魏相上書諌上從而止舊唐書狄仁傑以百姓西戍疏勒等四鎮極為凋弊乃上疏略曰國家頻歲出師所費滋廣西戍四鎮東戍安東調發日加百姓虛弊開守西域事等石田費用不支有損無益轉輸靡絶杼軸殆空越磧踰海分兵防守行役既久怨曠亦多昔漢元納賈捐之謀而罷珠崖之郡宣帝用魏相之策而棄車師之田豈不欲慕尚虛名蓋憚勞人力也奏罷織新錦奏罷進繚綾舊唐書蘇頲知益州大都督府長史事前司馬皇甫恂破庫物織新樣錦以進頲一切罷之或謂頲曰公今在逺豈得忤聖意頲曰明主不以私愛奪至公豈以逺近間易忠臣節也竟奏罷之又李德裕為浙西觀察使詔進可幅盤絛繚綾一千匹德裕進諌其略曰玄鵝天馬掬豹盤絛文彩珍竒只合聖躬自服今所織千匹費用至多在臣愚誠亦所未諭昔漢文帝衣弋綈之衣元帝罷輕纎之服仁德慈儉至今稱之伏乞陛下覽太宗玄宗之容納逺思漢文孝元之恭已優詔報之其繚綾罷進孔光所言輒削藁戴胄奏已則削藁漢書孔光時有所言輒削草藁以為章主之過以姦忠直人臣大罪也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事唐書戴胄所敷內緣政得失咸有可觀奏已即削藁袐外莫知帝嘗謂左右曰胄于我非肺腑親然事之機切無不聞惟其忠槩所激耳樊宏削草文若焚草羊祜焚草義真毁草陳羣削草漢樊宏所上便宜及陳得失輒手自書寫削本草後漢皇甫嵩字義真前後上表陳諌有損益者五百餘事皆手書毁草不宣于外也魏志荀彧字文若以書陳事臨薨焚其草故竒策密謀不得盡聞也魏書陳羣密陳得失每上封事輒削其草時人及子弟莫能知之晉書羊祜嘉謀論議皆焚其草故世莫能聞之陸元方密封以進陸象先密有申理舊唐書陸元方在官清謹再為宰相則天將有遷除每先以訪之必密封以進未嘗露其私恩臨終取前後草奏悉命焚之且曰吾隂德於人多矣其後庶幾福不衰矣又有書一匣常自緘封家人莫有見者及卒視之乃前後勑書又陸元方子象先清淨寡欲不以細務介意言論高逺雅為時賢所服時窮蕭至忠等枝黨連纍稍衆象先密有申理全濟甚多然未嘗言及當時無知之者崔琰請燔翳潘濬請撤翳魏志太祖征并州留崔琰傅文帝于鄴世子仍出田獵變易服乘志在驅逐琰書諌曰今邦國殄瘁惠康未洽士女企踵所思者德况公親御戎馬上下勞慘世子宜遵大路慎以行正思經國之高略內鑒近戒外揚逺節深惟儲副以身為寶而猥襲虞人之賤服忽馳騖而陵險志雉兔之小娛忘社稷之為重斯誠有識所以惻心也唯世子燔翳捐褶以塞衆望不令老臣獲罪于天世子報曰昨承嘉命惠示雅數欲使燔翳捐褶翳已壞矣褶亦去焉後有此此蒙復誨諸江表傳曰孫權數射雉潘濬諫權權曰相與别後時時暫出耳不復如往日之時也濬曰天下未定萬機務多射雉非急弦絶括破皆能為害乞特為臣故悉置之濬出見雉翳故在乃手自撤壞之權由是自絶不復射雉陳矯諌明帝案行尚書楊顒諌孔明自校簿書魏志明帝車駕嘗卒至尚書門陳矯跪問帝曰陛下欲何之帝曰欲案行尚書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退陛下宜還帝慙回車而反襄陽記楊顒入蜀為巴郡太守丞相諸葛亮主簿亮嘗自校簿書顒直入諌曰為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕稼婢典炊㸑雞主司晨犬主吠盜牛負重載馬涉逺路私業無曠所求皆足雍容高枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞犬哉失為家主之法也是故古人稱坐而論道謂之三公作而行之謂之士大夫故邴吉不問橫道死人而憂牛喘陳平不肯知錢榖之數云自有主者彼誠達于位分之體也今明公為治乃躬自校簿書流汗竟日不亦勞乎亮謝之徐生上書言霍氏梅福上書言王氏漢書初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏泰盛陛下且愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書上乃賜福帛十匹後乃為郎又成帝委任大將軍王鳳鳳專執擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見羣下莫敢正言梅福上書其略曰漢興以來社稷三危吕霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至于夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰母若火始庸庸勢陵于君權隆于主然後防之亦亡及已上不納此生一秦是生一隋漢書武臣至邯鄲自立為趙王陳餘為大將軍張耳召騷為左右丞相陳勝怒捕繫武臣等家室欲誅之柱國曰秦未亡而誅趙王將相家屬此生一秦不如因立之勝乃遣使者賀趙而徙繫武臣等家屬宫中而封張耳子敖為成都君趣趙兵亟入關唐書高祖起師太原李密自謂主盟遣將軍張仁則致書于帝呼為兄請以步騎會河內帝覽書笑曰密陸梁不可折柬致之吾方定京師未能東略若不與是生一隋密適為吾守東臯拒東都兵使不得西更遣票將莫如密吾寧推順使驕其志我得留撫關中大事濟矣令記書溫大雅作報書厚禮尊讓密大喜示其下曰唐公見推顧天下無可慮者票徑疾貌又漢票姚校尉孫破虜勸陳兵斬董卓張九齡勸因罪戮祿山後漢書張溫出屯美陽令董卓與邊章等戰無功溫召又不時應命既到而辭對不遜時孫堅為溫參軍勸溫陳兵斬之溫曰卓有威名方倚以西行堅曰明公親帥王師威振天下何恃于卓而賴之乎古之名將仗鉞臨衆未有不斷斬以示威武者也故穰苴斬莊賈魏絳戮楊干今若縱之自虧威重後悔何及又魏志何進遣騎都尉太山鮑信所在募兵適至信謂袁紹曰卓擁強兵有異志今不早圖將為所制及其初至疲勞襲之可禽也紹畏卓不敢發信遂還鄉里舊唐書范陽節度使張守圭以禆將安祿山討奚契丹敗衄執送京師請行朝典張九齡奏劾曰穰苴出軍必誅莊賈孫武教戰亦斬宫嬪守圭軍令必行祿山不宜免死上特捨之九齡奏曰祿山狼子野心面有逆相臣請因罪戮之冀絶後患上曰卿勿以王夷甫知石勒故事誤害忠良遂放歸藩相如奉璧入秦怒髮衝冠朱亥奉璧入秦瞋目裂血史記趙王遣藺相如奉璧西入秦秦王坐章臺見相如相如奉璧奏秦王秦王大喜傳以示美人及左右左右皆呼萬歲相如示秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髮上衝冠列士傳秦昭王會魏王魏王不行使朱亥奉璧一雙秦王大怒置朱亥虎圈中亥瞋目視虎眥裂血出濺虎虎不敢動滕嬰收載桓康擔負漢書項羽大破漢軍于彭城漢王馳去見孝惠魯元載之漢王馬罷虜在後常蹳兩兒棄之滕嬰常收載行面雍樹馳漢王怒欲斬嬰有十餘卒得脫而致孝惠魯元于豐師古注面偕也雍抱持之言取兩兒令面背已而抱持之以馳南史桓康勇果驍悍泰始初武帝起義為郡所縶衆皆散康裝擔一頭貯穆后一頭貯文惠太子及竟陵王子良自負置山中與門客蕭欣祖等四十餘人相結破郡獄出武帝日磾捽何羅許禇擊徐他漢書莽何羅與江充相善及充敗衛太子何羅弟通用誅太子時力戰得封後上知太子寃乃夷滅充宗族黨與何羅兄弟懼及遂謀為逆日磾視其志意有非常心疑之隂獨察其動靜與俱上下何羅亦覺日磾意以故久不得發是時上行幸林光宫日磾小疾臥廬何羅與通及小弟安成矯制夜出共殺使者發兵明旦上未起何羅亡何從外入日磾奏厠心動立入坐內户下須臾何羅褎白刃從東廂上見日磾色變走趨臥內欲入行觸寶瑟僵日磾得抱何羅反上驚起左右拔刃欲格之上恐并中日磾止勿格日磾捽胡投何羅殿下得禽縛之窮治皆伏辜晉灼曰胡頸也捽其頸而投殿下也魏志許禇從討袁紹于官渡時常從士徐他等謀為逆以禇常侍左右憚之不敢發伺禇休下日他等懷刀入禇至下舍心動即還侍他等不知入帳見禇大驚愕他色變禇覺之即擊殺他等太祖益親信之以馬授太祖以馬進太宗魏志太祖起義兵討董卓至滎陽為卓將徐榮所敗太祖失馬賊追甚急曹洪下以馬授太祖太祖辭讓洪曰天下可無洪不可無君舊唐書丘行恭從太宗討王世充會戰于邙山之上太宗欲知其虛實強弱乃與數十騎衝之直出其後衆皆披靡莫敢當其鋒所殺傷甚衆既而限以長堤與諸騎相失惟行恭獨從尋有徑騎數人追及太宗矢中御馬行恭乃回騎射之發無不中餘賊不敢復前然後下馬拔箭以其所乘馬進太宗行恭于御馬前步執長刀巨躍大呼斬數人突陳而出得入大軍貞觀中有詔刻石為人馬以象行恭拔箭之狀立于昭陵闕前谷利著鞭助馬勢谷利拔刀向舵工江表傳孫權乘駿馬上津橋橋南已見撤丈餘無版谷利在馬後使權持鞍緩控利于後著鞭以助馬勢遂得超渡權既得免即拜利都亭侯谷利者本左右給使也以謹慎為近監性忠果亮烈言不茍且權愛信之又孫權于武昌新裝大船名為長安試泛之釣臺泝時風大盛谷利令舵工取樊口權曰當張頭取羅州利拔刀向舵工曰不取樊口者斬工即轉舵入樊口風遂猛不可行乃還權曰阿利畏水何怯也利跪曰大王萬乘之主輕于不測之淵戲于猛浪之中船樓裝高邂逅顛危奈社稷何是以利輒敢以死爭權于是貴重之自此後不復名之常呼曰谷蘇武囓雪段熲食雪漢書蘇武持節使胸奴單于幽武置大窖中絶不與食天雨雪武臥囓雪與氊毛并咽之數日不死胸奴因以為神東觀漢記段熲破羌明年春羌復與燒河大豪冦張掖熲自下馬大戰刀折矢盡虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日蘇武杖漢節張騫持漢節漢書蘇武使胸奴杖漢節臥起操持節旄盡落後歸漢上問左右武在胸奴久豈有子乎武因平恩侯自白前發胸奴時胡婦適産一子通國有聲問來願因使者致金帛贖之上許焉後通國隨使者至上以為郎又胸奴留張騫十餘歲豫妻有子然騫持節不失後欲從羌中歸後為胸奴所得留歲餘單于死國內亂騫與胡妻及堂邑父俱亡歸漢拜騫大中大夫堂邑父為奉使君騫為人強力寬大蠻夷愛之堂邑父胡人善射窮急射禽獸給食初騫行時百餘人去十三歲唯二人得還按南史梁州有古墓名曰尖冢或曰張騫墳欲有發者輒聞鼓角與外相拒椎埋者懼而退蕭斆謂無此理求自監督及開唯有銀鏤銅鏡方尺頭可得城不可得頭可斷舌不可禁蜀志先主自葭萌關南還襲劉璋留霍峻守葭萌城張魯遣將楊帛誘峻求共守城峻曰小人頭可得城不可得帛乃退去唐書宰相張延賞怙權嫉柳渾守正遣親厚謂曰明公舊德第慎言于朝則位可久渾曰為吾謝張公渾頭可斷而舌不可禁卒為所擠臧洪殺愛妾以食將士張巡殺愛妾以食將士魏志袁紹興兵圍臧洪厯年不下初尚掘鼠煮筋角後無可復食者主簿啓內厨米三斗請中分稍以為糜粥洪嘆曰獨食此何為使作薄粥衆分啜之殺其愛妾以食將士將士咸流涕無能仰視者舊唐書尹子竒圍睢陽既久城中糧盡易子而食折骸而㸑人心危恐慮將有變巡乃出其妾對三軍殺之以饗軍士曰請公為國家戮力守城一心無二經年乏食忠義不衰巡不能自割肌膚以啖將士豈可惜此婦人坐視危迫將士皆泣下不忍食巡強令食之堯君素親射其妻屈突通命射其子隋書大業末堯君素拒義兵于河東大唐賜金劵待以不死君素卒無降心其妻至城下謂之曰隋室已亡天命有屬君何自苦身取禍敗君素曰天下事非婦人所知引弓射之應弦而倒舊唐書屈突通率兵東下唐副將竇琮等追之及于稠桑通結陳以自固竇琮縱通子夀令往諭之通大呼曰昔與汝為父子今與汝為仇讐命左右射之報使于肝還奏頭下吕覽衛懿公有臣𢎞演有所于使翟人攻衛殺懿公盡食其肉獨捨其肝𢎞演至報使于肝呼天而啼盡哀而止曰臣請為襮因自殺先出其腹實內懿公之肝齊桓公聞之復立衛于楚丘漢書欒布為梁大夫使于齊未反漢召彭越責以謀反夷三族梟首雒陽下詔有收視者輒捕之布還奏事彭越頭下祠而哭之吏捕以聞上召布罵曰若與彭越反邪吾禁人勿收若獨祠而哭之與反明矣趣亨之方提趨湯顧曰願一言而死上曰何言布曰方上之困彭城敗滎陽成臯間項王以不能遂西徒以彭王居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破與漢則楚破且垓下之會微彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今漢一徵兵于梁彭王病不行而疑以為反反形未見以苛細誅之臣恐功臣人人自危也今彭王已死臣生不如死請就亨上乃釋布拜為都尉五百人皆自殺數百人不肯降史記田橫既自剄高帝為之流涕而拜其二客為都尉發卒二千人以王者禮葬田橫既葬二客穿其冢旁孔皆自剄下從之高帝聞之乃大驚以田橫之客皆賢吾聞其餘尚五百人在海中使使召之至則聞田橫死亦皆自殺于是乃知田橫兄弟皆得士也按齊田橫墓在偃師西十五里崔豹古今注云薤露蒿里送哀歌也出自橫門人橫自殺門人傷之而作悲歌言人命如薤上露易晞滅至李延年乃分為二曲薤露送王公貴人蒿里送士大夫庶人使挽逝者歌之俗呼為挽歌魏志諸葛誕既死誕麾下數百人坐不降見斬皆曰為諸葛公死不恨其得人心如此干寶晉紀曰數百人拱手為列每斬一人輒降之竟不變至盡時人比之田橫如何一日殺二烈士奈何一日殺二義士魏志臧洪傳洪邑人陳容少為書生親慕洪隨洪為東郡丞城未敗洪遣出袁紹令在坐見洪當死起謂紹曰將軍舉大事欲為天下除暴而專先誅忠義豈合天意臧洪發舉為郡將奈何殺之紹慙左右使人牽出謂曰汝非臧洪儔空復爾為容顧曰夫仁義豈有常蹈之則君子背之則小人今日寧與臧洪同日而死不與將軍同日而生復見殺在紹坐者無不歎息竊相謂曰如何一日殺二烈士南史倉曹參軍金城邊榮為府録事所辱沈攸之為榮鞭殺録事攸之自江陵下以榮為留府司馬守城張敬兒將至人或説之使降榮曰受沈公厚恩一朝緩急便改易本心不能也城敗見敬兒敬兒問曰邊公何為同人作賊不早來榮曰沈荆州是宋世忠臣不可謂之賊身本不蘄生何須見問敬兒曰死何難命斬之榮歡笑而去容無異色太山程雍之者素依隨榮至是抱持榮謂敬兒曰君入人國不聞仁惠之聲而先戮義士三楚之人寧蹈江漢而死豈肯與將軍同日而生敬兒曰求死甚易何為不許先殺雍之然後及榮三軍莫不垂泣曰奈何一日殺二義士王叔治獨能冒難王僧達必來赴義魏志王修字叔治北海孔融曽召以為主簿守高密令高密孫氏素豪俠人客數犯法民有相劫者賊入孫氏吏不能執修將吏民圍之孫氏拒守吏民畏憚不敢近修令吏民敢有不攻者與同罪孫氏懼乃出賊由是豪強懾服舉孝亷修讓邴原融不聽時天下亂遂不行頃之郡中有反者修聞融有難夜往奔融賊初發融謂左右曰能冒難來唯王修耳南史元凶弒立孝武發尋陽沈慶之謂人曰王僧達必來赴義人問其所以慶之曰虜馬飲江王出赴難見其在先帝前議論開張執意明決以此言之其必至也僧達尋至孝武即以為長史事人當如此為臣當若此北史綦連猛為神武親信後都督爾朱文暢將為逆猛曰昔事其父兄寧今日受死不忍告而殺之神武聞之曰事人當如此舍其罪而益親之又周尅并州傅伏聞後主已被獲率衆入城于廳事前北面哭良久然後降周武見曰何不早降伏涕泣曰臣三世衣食齊家被任如此革命不能自死羞見天地周武親執手曰為臣當若此朕平齊唯見公一人孔車收葬主父云敞收葬吳章漢書主父偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞以車為長者又云敞師事吳章章為當世名儒教授尤盛弟子千餘人王莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師敞時為大司徒掾自劾吳章弟子收抱章尸歸棺斂葬之京師稱焉寧為袁粲死不作彥回生寧為王陵死不作賈充生南史宋禇彥回歸心齊高帝世頗以名節譏之于時百姓語曰可憐石頭城寧為袁粲死不作彥回生又齊高帝遣沈攸之子司徒左長史元琰齎廢帝刳斫之具以示攸之攸之曰寧為王陵死不作賈充生魏室忠臣晉家遺老晉書司馬孚性至慎廢立之際未嘗預謀及武帝受禪陳留王就金墉城孚拜辭執王手流涕􅒣欷曰臣死之日固大魏之純臣也南史梁王琳舉義為陳將吳明徹所殺傳首建康懸之于市琳故吏朱瑒致書陳僕射徐陵求琳首曰竊以典午將滅徐廣為晉家遺老當塗已謝馬孚稱魏室忠臣梁故建寧公琳輕躬殉主以身許國徒藴包胥之念終遘萇𢎞之眚至使身沒九泉頭行萬里身首異處封樹靡卜瑒早造末僚預參下席降薛君之吐握荷魏公之知遇是用霑巾雨袂痛可識之顔回腸疾首切猶生之面伏惟聖恩博厚明詔爰發赦王經之哭許田橫之葬瑒雖芻賤竊亦有心琳經蒞夀陽曽遊江右願歸彼境還修窀穸庶孤墳既築或飛銜土之燕豐碑式樹時留墮淚之人近故舊王綰等已有論牒仰蒙制議不遂所陳昔亷公告逝即肥川而建營域叔孫云亡仍芍陂而植楸檟由此言之抑有其例不使夀春城下唯傳報葛之人滄州島上獨有悲田之客昧死陳祈伏待刑憲陵嘉其志節又明徹亦數夢琳求首並為啓陳主而許之宋書徐廣傳桓玄篡位安帝出宫徐廣陪列悲慟哀動左右及武帝受禪恭帝遜位廣又哀感涕泣交流謝晦見之謂曰徐公將無小過廣收淚答曰身與君不同君為宋朝佐命吾乃晉室遺老悲喜之事固不同時乃更􅒣欷因表衰老乞歸桑梓性好讀書老猶不倦范孟博慨然有澄清天下之志房彥謙慨然有澄清天下之志後漢范滂字孟博少厲清節為州里所服時冀州飢荒盜賊羣起乃以滂為清詔使按察之滂登車攬轡慨然有澄清天下之志及至州境守令自知臧汙望風解印綬去其所舉奏莫不厭塞衆議北史時置司𨽻官以房彥謙公方宿著時望所歸徵授司𨽻刺史謙亦慨然有澄清天下之志凡所薦舉皆人倫表式其有彈射當之者曽無怨言介子棄觚仲升投筆西京雜記傅介子年十四好學書嘗棄觚而歎曰大丈夫當立功絶域何能坐事散儒後卒斬胸奴使者還拜中郎復斬樓蘭王首封義陽侯後漢班超字仲升家貧常為官傭書以供養久勞苦嘗輟業投筆歎曰大丈夫無它志略猶當效傅介子張騫立功異域以取封侯安能久事筆研間乎左右皆笑之超曰小子安知壯士志哉其後行詣相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相指曰生燕頷虎頸飛而食肉此萬里侯相也又南史蒯恩為縣差伐馬芻常負大束兼倍餘人每捨芻于地歎曰大丈夫彎弓三石奈何充馬士武帝聞之即給器仗後以軍功封都鄉侯不乘高車駟馬終不出關不乘赤車駟馬不過汝下水經注昔郭丹西入關感慨于其下曰不乘駟馬高車終不出關後漢書丹從師入長安買符函谷關乃慨然嘆曰丹不乘使者車終不出關既至京師常為都講諸儒咸敬重之大司馬嚴光請丹辭病不就王莽又徴之遂與諸生逃于北地更始二年三公舉丹賢能徴為諌議大夫持節使歸南陽丹自去家十有二年果乘高車出關如其志焉按注符即繻也前書音義曰舊出入關皆用符符煩因裂繻帛分持復出合之以為符信買符作真符也東觀記曰丹從宛人陳洮買入關符既入關封符乞人也華陽國志司馬相如初入長安題市門曰不乘赤車駟馬不過汝下也其郫西上有永平橋于是江衆多作橋故蜀立里多以橋為名起宅開門欲使容長戟立宅起門當使容馬車晉書王濬恢廓有大志嘗起宅開門前路廣數十步人或謂之何太過濬曰吾欲使容長戟幡旗衆咸笑之濬曰陳勝有言燕雀安知鴻鵠之志又陳頵父欣立宅起門頵曰當使容馬車欣笑而從之及州辟部從事乘馬車還家宗黨榮之王敦詠魏武帝樂府歌蕭察誦魏武帝樂府歌晉書王敦每酒後輒詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心不已以如意打唾壺為節壺邊盡缺周書蕭察疆土既狹居常怏怏每誦老馬伏櫪志在千里烈士暮年壯心不已未嘗不盱衡扼腕歎吒者久之願得美酒五百斛船願得酒滿數百斛船吳書鄭泉博學有竒志而性嗜酒其間居每曰願得美酒滿五百斛船以四時甘脆置兩頭反覆沒飲之憊即住而啖肴膳酒有斗升減隨即益之不亦快乎晉書畢卓嘗謂人曰得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣坐客常滿樽酒不空座無空席門不停賔張璠漢紀孔融以法免官歲餘拜大中大夫雖居家失勢而賔客日滿其門愛才樂酒常嘆曰坐上客常滿樽中酒不空吾無憂矣晉書王渾鎮夀陽不尚刑名處斷明允時吳人新附頗懷畏懼渾撫循羇旅虗懷綏納座無空席門不停賔于是江東之士莫不恱附便自有濠濮間想使人有伊洛間意世説簡文入華林園顧謂左右曰會心處不必在逺翳然林水便自有濠濮間想也覺鳥獸禽魚自來親人南史車騎將軍王彧嘗與謝孺子宴桐臺孺子吹笙或自起舞既而嘆曰今日真使人飄颻有伊洛間意羲之坦腹東牀延明奮衣坐席晉書太尉郗鑒使門生求女壻於王導導令就東廂遍觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東牀坦腹食獨若不聞鑒曰此正佳壻邪訪之乃羲之也遂以女妻之北史劉延明年十四就博士郭瑀瑀弟子五百餘人通經業者八十餘人瑀有女始笄妙選良偶有心于延明遂别設一席謂弟子曰吾有一女欲覔一快女壻誰坐此席者吾當婚焉延明遂奮衣坐神志湛然曰延明其人也瑀遂以女妻之開閣驅放即時遣出晉書王敦嘗荒恣于色體為之疲左右諌之敦曰此甚易耳乃開後閣驅諸婢妾數十人並放之南史宋武帝平關中得姚興從女有盛寵以之廢事謝晦諌即時遣出謝奕為方外司馬王昕為方外司馬世説謝奕字無奕桓溫辟為司馬奕既上猶推布衣交在溫坐岸幘笑詠無異常日宣武每曰我方外司馬遂因酒轉無朝夕禮桓舍入內奕輒復隨去後至奕醉溫往主許避之主曰君無狂司馬我何由得相見北史王昕性間淡寡欲雖王事鞅掌而雅操不移在并州雖戎馬填閭未嘗以世務為纍良辰美景嘯詠遨遊登臨山水以談宴為事人士謂之方外司馬許掾有濟勝之具劉歊有濟勝之具世説許掾好遊山水而體便登涉時人云許非徒有勝情實有濟勝之具南史劉歊性重典樂尤愛山水登危履險必盡幽遐人莫能及皆歎其有濟勝之具徑造竹下直造竹所世説王子猷嘗行過吳中見一士夫家極有好竹主已知子猷當往乃灑掃施設在聽事坐相待王肩輿徑造竹下諷嘯良久主已失望猶冀還當通遂直欲出門主人大不堪便令左右閉門不聽出乃留坐盡歡而去南史宋元粲為丹陽尹郡南一家頗有竹居粲率爾步往不通主人直造竹所嘯詠自得主人出語笑欣然俄而車騎羽儀併至門方知是袁尹韓昌黎登華山華隂令百計取之方下杜少陵遊嶽廟耒陽令棹舟迎之乃還國史補韓文公登華山之巔顧視其窮極幽險心悸目眩不能下發狂號哭投書于家人訣别華隂令百計取之方能下舊唐書嚴武鎮成都杜甫依之武卒甫無所倚及郭英乂代武鎮成都英乂武人粗暴無能刺謁乃遊東蜀依高適既至而適卒是歲崔寧殺英乂楊子琳攻西川蜀中大亂甫以其家避亂荆楚扁舟下峽未維舟而江陵亂乃泝沿湘流遊衡山寓居耒陽甫嘗遊嶽廟為暴水所阻旬日不得食耒陽聶令知之自棹舟迎甫而還師伯遽斂子韋睿遽反子南史宋孝武嘗與顔師伯樗蒲帝擲得雉大悅謂必勝師伯後得盧帝失色師伯遽斂子曰幾作盧爾日師伯一輸百萬又初邵陽之役昌義之甚德韋睿請曹景宗與睿會因設錢二十萬官賭之景宗擲得雉睿徐擲得盧遽取一子反之曰異事遂作塞賭八百里駁賭七百里馬晉書王愷以帝舅奢豪有牛名八百里駁常瑩其蹄角王濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須臾而至一割便去北史平秦王有七百里馬爾朱文略敵以好婢賭取之明日平秦王使人致請文略殺馬及婢以二銀器盛婢頭馬肉而遺之一擲十萬一擲百萬晉書袁耽字彥道少有才氣俶儻不羈桓溫少時遊於博徒資産俱盡欲求濟于耽而耽在艱試以告焉耽略無難色遂變服懷布帽隨溫與債主戲耽素有藝名債者聞之而不相識謂之曰卿當不辦作袁彥道也遂就局十萬一擲直上百萬耽投馬絶呌探布帽擲地曰竟識袁彥道不其通脫如此南史桓玄曰劉毅家無儋石之儲樗蒲一擲百萬鬬鴨鬬鵝江表傳魏文帝遣使求鬬鴨羣臣奏宜勿與權曰彼在諒隂中所求若此豈可與言理哉具以與之聞見録僖宗好鬬鵝數幸六王宅興慶池與諸王鬬鵝一鵝值五十萬錢賭墅賭郡晉書淮淝之役謝玄問計于謝安安夷然無懼色答曰已别有旨既而寂然玄不敢復言乃令張玄重請安遂命駕出山墅親朋畢集方與圍棊賭别墅南史羊玄保善奕棊品第三文帝亦好奕與賭郡玄保戲勝以補宣城太守羽檄交馳圍棋對戲外白急數圍棋長嘯蜀志魏軍次于興平假費禕節率衆往禦光祿大夫來敏至禕許别求圍棋于時羽檄交馳嚴駕已訖禕與敏留意對戲色無厭倦敏曰聊試觀君耳信可人必能辦賊者禕至賊遂退水經注陳留志阮簡字茂𢎞為開封令縣側有劫賊外白甚急數阮方圍棋長嘯吏云劫急阮曰局上有劫亦甚急其耽樂如是故語林曰王中郎以圍棋為坐隱或亦謂之為手談又謂之為棋聖魏軍次于興平費禕共客圍棋見上秦師次于淮淝謝安對客圍棋晉書苻堅率衆號百萬次于淮淝京師震恐加謝安征討大都督謝玄入問計安夷然無懼色答曰已别有旨既而寂然玄不敢復言乃令張玄重請安遂命駕出山墅親朋畢集方與玄圍棋賭别墅安常棋劣于玄是日玄懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝安遂遊涉至夜乃還指授將帥各當其任玄等既破堅有驛書至安方對客圍棋看書既竟便攝放牀上了無喜色棋如故客問之徐答曰小兒輩遂已破賊既罷還內過户限心喜甚不覺屐齒之折其矯情鎮物如此又南史謝草瀹拜吏部尚書明帝廢鬱林領兵入殿左右驚走報草瀹草瀹與客圍棊每下子輒云其當有意竟局乃還齊臥竟不問外事丙吉不罪吐茵吏安世不罪醉便郎漢書丙吉始于官屬掾史務掩過揚善吉馭吏耆酒數逋蕩嘗從吉出醉歐丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹苐忍之此不過汚丞相車茵耳此馭吏邊郡人習知邊塞發奔命警備事嘗出適見驛騎持赤白囊邊郡發奔命書馳來至馭吏因隨驛騎至公車刺取知虜入雲中代郡遽歸府見吉白狀因曰恐虜所入邊郡二千石長吏有老病不任兵馬者宜可豫視吉善其言召東曹案邊長吏瑣科條其人未已詔召丞相御史問以虜所入郡吏吉具對御史大夫卒遽不能詳知以得譴讓而吉見謂憂邊思職馭吏力也又張安世為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪如何以小過成罪郎淫官婢婢兄自言安世曰奴以恚怒誣汙衣冠告署適奴其隱人過失皆此類也羮汙神色不異羮翻顔色不異後漢書劉寬夫人欲試寬令恚伺當朝會裝嚴已訖使侍婢奉肉羮翻汙朝衣婢遽收之寬神色不異乃徐言曰羮爛汝手乎其性度如此海內稱為長者南史蕭勵為太子左衛率性率儉而器度寬裕左右嘗將羮至胸前翻之顔色不異徐呼更衣趙孝欲止郵亭徑不名而去劉寵欲息亭舍徑無言而去後漢書趙孝父普王莽時為田禾將軍任孝為郎每告歸常白衣步擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客掃灑待之孝既至不自名長不肯內因問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣華嶠書曰孝報云三日至矣于是遂去又劉寵嘗出京師欲息亭舍亭吏止之曰整頓灑掃以待劉公不可得也寵無言而去時人稱其長者顧元歎封鄉侯家人不知孫伏伽拜御史子弟不知吳志顧雍字元歎封陽遂鄉侯拜侯還寺而家人不知後聞乃驚唐書孫伏伽拜御史時先被內旨而制未出歸臥于家無喜色頃之御史造門子弟驚白伏伽徐起見之時人稱其有量以比顧雍云王子敬室火徐喚扶出禇彥回宅火徐索輿去晉書王獻之字子敬嘗與兄徽之共在一室忽然火發徽之遽走取履獻之神色怡然徐唤左右扶出南史禇淵字彥回性和雅有品度不妄舉動宅嘗失火煙爓甚逼左右驚擾彥回神色怡然索輿徐去夏侯玄倚柱作書雷破柱而神色不變諸葛誕陪列樹下雷震樹而顔色不改世説夏侯玄嘗倚柱作書時大雨霹靂破所倚柱衣服焦然神色無變書亦如故賔客左右皆跌蕩不得住臧榮緒晉書諸葛誕從魏帝拜陵陪列于松柏下時暴雨霹靂正中所立之樹冠冕焦壞左右覩之皆伏誕顔色不改又載記劉曜年八歲從元海獵于西山遇雨止樹下雷震旁人莫不顛仆曜神色自若元海異之直不疑償同舍郎金桑子深償同宿客脯漢書直不疑為郎事文帝其同舍有告歸誤持其同舍郎金去已而同舍郎覺亡意不疑不疑謝有之買金償後告歸者至而歸金亡金郎大慙以此稱為長者晉書桑虞字子深嘗行寄宿逆旅同宿客失脯疑虞為盜虞默然無言便解衣償之主人曰此舍數失魚肉雞鴨多是狐狸偷去君何以疑人乃將脯主至山冡間尋求果得之客求還衣虞投之不顧認茂馬認沖犢後漢書卓茂嘗行有人認茂馬茂心知其謬默解與之他日馬主别得亡者乃詣府送馬晉書朱沖傳鄰人失犢認沖犢以歸後得犢於林下大慙以犢還沖沖竟不受還屐笑受還履不取南史沈麟士居貧織簾誦書口手不息鄉里號為織簾先生嘗行路鄰人認其所著屐麟士曰是卿屐邪即跣而返鄰人得屐送前者還之麟士曰非卿屐邪笑而受之又劉凝之嘗出市易買周用之外輒以施人為村里所誣一年三輸公調求輒與之又嘗認其所著屐笑曰僕著已敗今家中覔新者備君此人後田中得所失屐送還不肯復取評曰凡事之不近人情者不可以為世儀認犢認屐二事正同君子謂其認也可與其還也可受認而與之還而受不受則是非灼然辨矣不受牛謝者孔子以為魯國不復贖人始信矯情者果不可為訓也溝上為橋伐木為橋南史郭原平宅上種竹有盜其筍者原平遇見之盜者奔走墮溝原平乃于所植竹處溝上立小橋令通又採筍置籬外鄰里慙愧無復盜者又范元琰家貧唯以園蔬為業嘗出行見人盜其菘元琰遽退走母問其故具以實答母問盜者為誰答曰向所以退畏其愧耻今啓其名願不泄也于是母子祕之或有涉溝盜其筍者元琰因伐木為橋以度之自是盜者大慙一鄉無復草竊又晉書桑虞有園在宅北數里瓜果初熟有人踰垣盜之虞以園援多荆棘恐偷見人驚走而致傷損乃使奴為之開道及偷負瓜將出見道通利知虞使除之乃送所盜瓜叩頭請罪承少子由是發名鍾離牧由此發名續漢書承宫字少子琅琊人嘗在蒙隂山中耕種禾黍臨熟人就認之宫便推與而去由是發名吳志鍾離牧居永興躬自墾田種稻二十餘畝臨熟縣民有識認之牧曰本以田荒故墾之耳遂以稻與縣人縣長聞之召民繫獄欲繩以法牧為之請長曰君慕承宫自行義事僕為民主當以法率下何得寢公憲而從君邪牧曰此是郡界緣君意顧故來暫住今以少稻而殺此民何心復留遂出裝還山隂長自往止之為釋繫民民慙懼率妻子舂所取稻得六十斛米送還牧牧閉門不受民輸置道傍莫有取者牧由此發名徐衆評曰問者曰如牧所行可不謂之仁讓乎哉答曰異乎吾所聞惡不仁者其為仁矣今小民不展四體而認人之稻不仁甚矣而牧推而與之又救其罪斯為讓非其義所救非人非所謂惡不仁者茍不惡不仁安得為仁哉蒼梧澆娶妻而美讓于其兄尾生篤信水至不去而死直躬好直證父攘羊申鳴奉法盡忠于君而執其父忠信直讓此四行者聖賢之所貴也然不貴蒼梧之讓非讓道也不取尾生之信非信所也不許直躬之直非直體也不嘉申鳴之忠非忠意也今牧犯而不校還而不取可以為難矣未得為仁讓也孫資不念舊惡張既不挾舊怨魏注孫資别傳曰初資在邦邑名出同類之右鄉人司空掾田豫梁相宗艷皆妬害之而楊豐黨附豫等專為資構造謗端怨隙甚重資既不以為言而終無恨意豫等慙服求釋宿憾結為婚姻資謂之曰吾無憾心不知所釋此為卿自薄之卿自厚之耳乃為長子宏取其女及當顯位而田豫老疾在家資遇之甚厚又致其子於本郡以為孝亷而楊豐子後為尚方吏帝以職事譴怒欲致之法資請活之其不念舊惡如此魏略曰初張既為郡小吏功曹徐英嘗自鞭既三十英字伯濟馮翊著姓建安初為蒲阪令英性剛爽自見族氏勝既于鄉里名行在前加以前辱既雖知既貴顯終不肯求于既既雖得志亦不顧計本原猶欲與英和嘗因醉欲親狎英英故抗意不納英由此遂不復進用故時人善既不挾舊怨而壯英之不撓張率笑鼠雀之耗公權哂銀杯之化南史張率為新安太守遣家僮載米三千石還宅及至遂耗大半率問其故答曰鼠雀耗率笑而言曰壯哉鼠雀竟不研問舊唐書柳公權志耽書學不能治生為勳戚家碑板問遺歲時巨萬多為主藏豎海鷗龍安所竊惟貯酒器杯盂一笥緘縢如故其器皆亡訊海鷗乃曰不測其亡公權哂曰銀杯羽化耳不復更言所寶唯筆硯圖畫自扄鐍之駢志卷三
