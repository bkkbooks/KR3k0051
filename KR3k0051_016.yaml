body:
  text: 駢志卷十六明陳禹謨撰辛部下梁武帝迎佛髮唐憲宗迎佛骨南史梁大同五年扶南國遣使送生犀又言其國有佛髮長一丈二尺詔遣沙門釋靈寶隨使往迎之先是三年八月武帝改造阿育王佛塔出舊塔下舍利及佛爪髮髮青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形按僧伽經云佛髮青而細猶如藕莖絲佛三昧經云我昔在官沐頭以尺量髮長一丈二尺放已右旋還成蠡文則與帝所得同也舊唐書鳯翔法門寺有護國真身塔塔內有釋迦文佛指骨一節其書本傳法三十年一開開則歲豐人泰元和十四年正月上令中使杜英竒押宫人三十人持香花赴臨臯驛迎佛骨自光順門入大內留禁中三日乃送諸寺王公士庶奔走捨施唯恐在後百姓有廢業破産燒頂灼骨而求供養者韓愈素不喜佛上疏諫以頭施人以眼施人水經注釋法顯所謂糾尸羅國漢言截頭也佛為菩薩時以頭施人故因名國國東有投身飼餓虎處皆起塔又陀衛國是阿育王子法益所治邑佛為菩薩時亦于此國以眼施人其處亦起大塔鉢容二斗少華投中便滿鉢受三斗終日香花不滿法顯傳陀衛國有佛鉢月氏王大興兵衆來伐此國欲持鉢去置鉢象上象不能進更作四輪車載然八象共牽復不進王知緣於是起塔留鉢供養鉢容二斗雜色而黑多四際分明厚可二分甚光澤貧人以少華投中便滿富人以多花供養正復百千萬斛終亦不滿佛圖曰佛鉢青玉也受三斗許彼國寶之供養時願終日香花不滿則如言願一把滿則亦便如言掘視惟有一石改葬惟有空皮晉書佛圖澄卒於鄴宫寺後有沙門從雍州來稱見澄西入關石季龍掘而視之惟有一石而無尸舊唐書道士劉道合為高宗合還丹丹成而上之咸亨中卒及帝營奉天宫遷道合之殯室弟子開棺將改葬其尸唯有空皮而背上開坼有似蟬蛻盡失其齒骨衆謂尸解高宗聞之不悅曰劉師為我合藥自服仙去伯陽乘青牛君逹騎青牛列異傳老子西遊關令尹喜望見其有紫氣浮關而老子果乘青牛而過神仙傳封君逹隴西人服鍊水銀年百歲視之如年三十許騎青牛故號青牛道人青鳥西方來赤龍東南上漢武故事七月七日上于承華齋忽有一青鳥從西方來集殿前上問東方朔朔曰此王母欲來也有頃王母至有二青鳥如烏侍王母傍列仙傳陶安公者六安鑄冶師也數行火火一旦散上行紫色衝天安公伏冶下求哀須臾朱雀止冶上曰安公安公冶與天通七月七日迎汝以赤龍至期赤龍到大雨安公騎之東南上一城邑數萬人衆共送視之皆與辭決去魚知名雞知名蜀普録東川降魔寺僧吉祥魁梧多力受飰五鉢日夜誦經九函池中魚知其數以名召之皆出水面使去即沒列仙傳祝雞翁居尸鄉北山下養雞百餘牢雞皆有名字千餘頭暮棲於樹晝日放散呼名即種别而至舉羅張之得一隻舄以石擲之得一隻履後漢王喬者河東人也顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南而來于是候鳬至舉羅張之但得一隻舄焉乃詔上方驗視則四年中所賜尚書官屬履也鄧德明南康記昔有盧耽仕州為治中少棲仙術善解雲飛每夕輒凌虛歸家曉則還州嘗於元會至朝不及朝列化為白鵠至閣前回翔欲下威儀以石擲之得一隻履耽驚還就列內外左右莫不駭異時步騭為廣州意甚惡之便以狀列聞遂至誅滅朽索懸石試長房白髮懸石試偉道後漢費長房從仙翁入深山踐荆棘於羣虎之中留使獨處長房不恐又卧於空室以朽索懸萬斤石於心上衆蛇競來齧索且斷長房亦不移翁還撫之曰子可教也復使食糞糞中有三蟲臭穢特甚長房意惡之翁曰子幾得道恨於此不成如何長房辭歸翁與一竹杖曰騎此任所之則自至矣既至可以杖投葛陂中也又為作一符曰以此主地上鬼神真誥昔中山劉偉道學仙在嶓冢上積十二年仙人試之以石重十萬斤一白髮懸之使偉道卧其下偉道顔無變色心安體悅卧在其下積十二年仙人數試之無所不至已皆語之遂賜其神丹而白日升天服三氣存三氣真誥沈幼仲恆服三氣三氣之法存青氣白氣赤氣各如綖從東方日下來直入口中挹之九十過自飽便止為之十年身中自有五色之氣遂得神仙此髙元君太素內景法又守玄白之道常旦旦坐卧任意存泥丸中有黑氣存心中有白氣臍中有黃氣三氣俱先如雲以覆身上因變成火火又繞身身通洞徹內外如此旦行之至日向中乃止於是服氣百二十過都畢道止如此使人長生不死辟却萬害所謂知白守黑求死不得知黑守白萬邪消却忌食六畜肉及五辛之菜當别寢靜思尤忌房室煮石為糧以石為藥神仙傳白石生者嘗煮白石為糧嘗就白石居後漢書火山山旁石皆焦鎔流數十里乃凝堅人取以為藥石腦石髓真誥薑伯真數在方山上取石腦石腦在方山北穴下繁陽子昔亦取此服北佇山中亦有此物石腦故如石但小斑色而軟耳所在有之服此時時使人發熱又使人不渴又周穆王北造崑崙之阿親飲綘山石髓食玉樹之實而方墓乎汲郡又晉書杜康遇王烈共入山烈嘗得石髓如飴即自服半餘半與康皆凝而為石飲霞服霧論衡河東蒲坂項曼都好道學仙去三年而返家人問其狀都曰欲飲食仙人輒飲我以流霞每飲一杯數日不飢真誥服霧法常以平旦於寢靜之中坐卧任己先閉目內視髣佛如見五臟畢因口呼出氣二十四過臨目為之使目見五色之氣相繞纒在面上鬱然因又口內此五色氣五十過畢咽唾六十過畢乃微咒曰太霞發暉靈霧四遷結氣宛屈五色洞天神煙合啓金石華真藹鬱紫空鍊形保全出景藏幽五靈化分合明扇虛時乘六雲和攝我身上升九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州玄都多有得此術者久行之常乘雲霧而遊上已取槐子上寅採甘菊梁書庾肩吾常服槐實年七十餘目看細字鬢皆黑太清草木方槐以十月上已取子服之好顔色長生通神玉函方王子喬變白增年方甘菊三月上寅日採名曰玉英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生長生者根莖是也五穀為養五果為助五畜為益五菜為充黃帝內經藏氣法時論肝色青宜食甘粳米牛肉棗葵皆甘肝性喜急故食甘物而取其寬緩也心色赤宜食酸小豆犬肉李韭皆酸心性喜緩故食酸物而取其收斂也肺色白宜食苦麥羊肉杏薤皆苦肺喜氣逆故食苦物而取其宣泄也脾色黃宜食鹹大豆豕肉栗藿皆鹹究斯宜食乃調利關機之義也腎為胃關脾與胃合故假鹹柔耎以利其關關利而胃氣乃行胃行而脾氣方化故應脾宜味與衆不同也腎色黑宜食辛黃黍雞肉桃蔥皆辛腎性喜燥故食辛物而取其津潤也辛散酸收甘緩苦堅鹹耎毒藥攻邪藥謂金玉土石草木菜食蟲魚鳥獸之類皆可以袪邪養正者也然辟邪安正惟毒乃能以其能然故通謂之毒藥也五穀為養謂粳米小豆麥大豆黃黍也五果為助謂桃李杏栗棗也五畜為益謂牛羊豕犬雞也五菜為充謂葵藿薤蔥韭也氣味合而服之以補精益氣此五者有辛酸甘苦鹹各有所利或散或收或緩或急或堅或耎四時五藏並隨五味所宜也五味所入五藏所惡五藏所藏五氣所病五味所禁五藏所化五藏所主五精所并黃帝內經宣明五氣篇五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入五味所禁辛走氣氣病無多食辛鹹走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食五藏所惡心惡熱熱則肺潰濁肺惡寒寒則氣留滯肝惡風風則筋燥急脾惡濕濕則肉痿腫腎惡燥燥則精竭涸是謂五惡五藏化液心為汗泄于皮腠也肺為涕潤于鼻竅也肝為淚注于眼目也脾為涎溢于唇口也腎為唾生于牙齒也是謂五液五藏所藏心藏神精氣之化成也靈樞經曰兩精相薄謂之神肺藏魄精氣之匡佐也靈樞經曰並精而出入者謂之魄肝藏魂神氣之輔弼也靈樞經曰隨神而往來者謂之魂脾藏意記而不忘者也靈樞經曰心有所憶謂之意腎藏志専意而不移者也靈樞經曰意之所存謂之志腎受五臟六腑之精元氣之本生成之根為胃之關是以智能則命通是謂五臟所藏五臟所主心主脈壅遏榮氣應息而動也肺主皮包裹筋肉間拒諸邪也肝主筋束絡機關隨神而過也脾主肉覆藏筋骨通行衛氣也腎主骨張筋化髓幹以立身也是謂五主五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒是謂五病五氣所并精氣并于心則喜并於肺則悲并於肝則憂并於脾則畏并於腎則恐是謂五并虛而相并者也十二官十二節黃帝內經靈蘭祕典論黃帝問曰願聞十二藏之相使貴賤何如岐伯對曰悉乎哉問也請遂言之心者君主之官也神明出焉肺者相傳之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安以此養生則壽沒世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之又寶命全形論岐伯曰夫人生於地懸命於天天地合氣命之曰人人能應四時者天地為之父母知萬物者謂之天子天有隂陽人有十二節節謂節氣外所以應十二月內所以主十二經脈也天有寒暑人有虛實能經天地隂陽之化者不失四時知十二節之理者聖智不能欺也風者百病之長風者百病之始黃帝內經風論篇以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊巳傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五藏六府之俞亦為藏府之風各入其門户所中則為偏風風氣循風府而上則為腦風風入係頭則為目風眼寒飲酒中寒則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飱泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也無常方然致有風氣也又骨空論黃帝問曰余聞風者百病之始也以針治之奈何岐伯對曰風從外入令人振寒汗出頭痛身重惡寒治在風府風府穴也在項上入髮際同身寸之一寸穴穴中督脈足太陽之會刺可入同身寸之四方若灸者可灸五壯調其隂陽不足則補有餘則㵼用針之道必法天常盛瀉虛補此其常也風雨傷人先客於皮膚邪客於形先舍於皮毛黃帝內經調經論岐伯曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪并客於分腠之間其脈堅大故曰實實者外堅充滿不可按之則痛又繆刺論岐伯曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五藏散於腸胃隂陽俱感五藏乃傷此邪之從皮毛而入極於五藏之次也如此則治其經焉令邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生竒病也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺因四氣而調神因五方而異治黃帝內經四時調神大論春三月此謂發陳天地俱生萬物以榮夜卧早起廣步於庭被髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少夏三月此謂蕃秀天地氣交萬物華實夜卧早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病秋三月此謂容平天氣以急地氣以明早卧早起與雞俱興使志安寧以緩秋形收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飱泄奉藏者少冬三月此謂閉藏水氷地坼無擾乎陽早卧晚起必待日光使志若伏若匿若有私意若己有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少又異法方宜論篇黃帝問曰醫之治病也一病而治各不同皆愈何也岐伯對曰地勢使然也故東方之域天地之所始生也魚鹽之地海濵傍水其民食魚而嗜鹹皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石故砭石者亦從東方來西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不衣而褐薦其民華食而脂肥故邪不能傷其形體其病生于內其治宜毒藥故毒藥者亦從西方來北方者天地所閉藏之域也其地髙陵居風寒氷冽其民樂野處而乳食藏寒生滿病其治宜灸焫故灸焫者亦從北方來南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆緻理而赤色其病攣痺其治宜微針故九針者亦從南方來中央者其地平以濕天地所以生萬物也衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹻故導引按蹻者亦從中央出也故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治之大體也商山四皓九巖四皓按四皓東園公姓唐名秉字宣明綺里先生字季夏黃公姓崔名廣字少通甪里先生姓周名術字元道前涼録張重華問索綏曰四皓既安太子住乎還山乎綏答未悉重華曰卿不知乎四皓死于長安有四皓冢為不還山也南史徐伯珍宅南九里有髙山班固謂之九巖山後漢龍丘萇隱處也山多龍鬚柳柏望之五采世呼為婦人巖伯珍移居之家甚貧窶弟兄四人皆白首相對時人呼為四皓焦先瓜牛廬楊沛瓜牛廬魏略隱者焦先自作一瓜牛廬淨掃其中營木為牀布草蓐其上至天寒時搆火以自炙呻吟獨語飢則出為人客作飽食而已不取其直又出于道中邂逅與人相遇輒下道藏匿或問其故常言草茅之人與狐兔同羣不肯妄語裴松之云按魏略焦先及楊沛並作瓜牛廬止其中以為瓜當作蝸蝸牛螺中之有角者也俗或呼為黃犢先等作圜舍形如蝸牛藪故謂之蝸牛廬孫登嘯蘇門山孫登嘯宜陽山晉書阮籍嘗于蘇門山遇孫登與商略終古及栖神導氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳯之音響乎巖谷乃登之嘯也臧榮緒晉書稱孫登嘗經宜陽山作炭人見之與語登不應作炭者覺其神非常咸共傳説太祖聞之使阮籍往觀與語亦不應籍因大嘯登笑籍求與俱出登不肯籍因别去登上峯行且嘯如簫韶笙簧之音聲振山谷籍怪而問作炭人作炭人曰故是向人聲籍更求之不知所止推問久之乃知姓名酈道元曰案孫綽敘高士傳言在蘇門山又别作登傳孫盛晉魏春秋亦言在蘇門山又不列姓名阮嗣宗感之著丈人先生論言吾不知其人即神遊自得不與物交阮氏尚不能動其英標復不識何人而能得其姓名真誥趙威伯善嘯嘯如百鳥雜鳴或如風激衆林或如伐鼓之音時在天市壇上奮然北向長嘯呼風須臾雲翔其上衡氣動林或冥霧飇合或露雨其濛矣評曰按晉書登嘗往宜陽山與榮緒所載略同而特不及其嘯余曽遊蘇門其上蓋有嘯臺云榮緒合二事而并載之豈别有據耶沈道虔凡十二命皆不就徐伯珍應十二召皆便退南史沈道虔居石山精廬與諸孤兄子共釡庾之資困不改節受琴于戴逵王敬𢎞深貴重之郡守府凡十二命皆不就又徐伯珍叔父璠之與顔延之友善還祛蒙山立精舍講授伯珍往從學積十年究尋經史遊學者多依之太守琅邪王曇生吳郡張淹並加禮辟伯珍應召便退如此者凡十二焉賜竹根如意賜竹節如意南史齊建元元年冬徵明僧紹為正員郎稱疾不就其後帝與崔思祖書令僧紹與慶符俱歸僧紹曰不食周粟而食周薇古猶發議在今寧得息談邪聊以為笑慶符罷任僧紹隨歸住江乘攝山僧紹聞沙門釋僧逺夙德往候定林寺髙帝欲出寺見之僧遠問僧紹曰天子若來居士若為相對僧紹曰山藪之人政當鑿壞以遁若辭不獲命便當依戴公故事既而遁還攝山建棲霞寺而居之髙帝甚以為恨昔戴顒髙卧牖下以山人之服加其身僧紹故云髙帝後謂慶符曰卿兄髙尚其事亦堯之外臣朕夢想幽人固已勤矣所謂徑路絶風雲通仍賜竹根如意筍籜冠隱者以為榮焉北堂書鈔劉義慶啓事云恩旨賜臣犀鏤竹節如意目所未睹五栁先生七松處士晉書陶潛少懷髙尚博學善屬文頴脫不羈任真自得為鄉鄰之所貴嘗著五栁先生傳以自况曰先生不知何許人不詳姓字宅邊有五栁樹因以為號焉南部新書鄭薰既老號所居為隱巖蒔小松七本于庭自號七松處士杜子美與野老相狎司空圖與野老同席舊唐書杜甫于成都浣花里種竹植樹結廬枕江縱酒嘯詠與田夫野老相狎蕩無拘檢嚴武過之有時不冠其傲誕如此又司空圖布衣鳩杖出則以女家人鸞臺自隨歲時村社雩祭祠禱鼓舞會集圖必造之與野老同席曾無傲色文取季隗衰取叔隗策納大橋瑜納小橋左傳晉公子重耳奔狄狄人伐牆咎如獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾吳志孫策欲取荆州以周瑜為中護軍領江夏太守從攻皖拔之時得橋公兩女皆國色也策自納大橋瑜納小橋江表傳䇿從容戲瑜曰橋公二女雖流離得吾二人作壻亦足為歡結裙持履拾遺記成帝常以三秋間日與飛燕戲于太液池以沙棠木為舟貴其不沉沒也每輕風時至飛燕殆欲隨風入水帝以翠纓結飛燕之裙常怨曰妾微賤何復得預纓裙之遊今太液池尚有避風臺即飛燕結裙之處趙飛燕外傳帝與后遊太液池中流歌酣風大起后順風揚音徐無方長吸細嫋與相屬帝曰無方為我持后無方捨吹持后履負羈妻識晉公子而饋飱亭長妻識漢武帝而獻餐左傳晉公子重耳及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志于諸侯而誅無禮曹其首也子盍蚤自二焉及饋盤飱置璧焉公子受飱反璧後晉侯入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也水經注漢武帝微行柏谷遇辱竇門亭長妻深識而饋之既返玉階厚賞賚焉賜以河津令其鬻渡今竇津者是也故潘嶽西征賦曰長徵容于柏谷妻覩貌而獻餐謂此亭也又云酬匹婦其已泰胡厥夫之謬官以勞訓子以謙訓子魯語公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其以歜為不能事主乎其母歎曰魯其亡乎使童子備官而未之聞邪居吾語汝昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也魏志注鍾會母傳曰夫人性矜嚴明於教訓會雖童稚勤見規誨年四歲授孝經七歲誦論語八歲誦詩十歲誦尚書十一誦易十二誦春秋左氏傳國語十三誦周禮禮記十四誦成侯易記十五使入太學問四方竒文異訓謂會曰學猥則倦倦則易怠吾懼汝之意怠故以漸訓汝今可以獨學矣雅好書籍涉厯衆書特好易老子每讀易孔子説鳴鶴在隂勞謙君子籍用白茅不出户庭之義每使會反覆讀之曰易三百餘爻仲尼特曰此者以謙恭慎密樞機之發行己至要榮身所由故也慎斯術以往足為君子矣正始八年會為尚書郎夫人執會手而誨之曰汝弱冠見敘人情不能自足自足則損在其中矣截髮供費截髮供饌列女傳樂羊學書其妻貞義截髮以供其費晉書陶侃早孤貧為縣吏鄱陽孝廉范逵嘗過侃時倉卒無以待賔其母乃截髮得雙髲以易酒肴樂飲極歡雖僕從亦過所望及逵去侃追送百餘里逵曰卿欲仕郡乎侃曰欲之困于無津耳逵過廬江太守張夔稱美之夔召為督郵又周顗母李氏字絡秀少時在室顗父浚為安東將軍時嘗出獵遇雨過至絡秀之家會其父兄不在絡秀聞浚至與一婢于內宰豬羊具數十人之饌甚精辦而不聞人聲浚怪使覘之獨見一女子甚美浚因求為妾其父兄不許絡秀曰門戶殄悴何惜一女若聯姻貴族將來有大益矣父兄許之遂生顗及嵩謨孟宗母還鮓陶侃母封鮓吳録孟宗初為鹽池司馬自能結網手以捕魚作鮓寄母母因以還之曰汝為魚官而以鮓寄我非避嫌也晉書陶侃初為尋陽縣吏嘗監魚梁以一坩鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非唯不能益我乃以增我憂矣王經母謂經當知止潘嶽母謂嶽當知足魏志清河王經稱冀州名士甘露中為尚書坐髙貴鄉公事誅始經為郡守經母謂經曰汝田家子今仕至三千石物太過不祥可以止矣經不能從厯二州刺史司𨽻校尉終以致敗晉書賈謐二十四友潘嶽為首謐晉書限斷亦嶽之辭也其母數誚之曰爾當知足而乾沒不已乎而嶽終不能改按漢書張湯傳注服虔曰乾沒射成敗也如淳曰得利為乾失利為沒三國志裴松之注曰虔説未暢淳説又不可了愚謂乾讀宜為乾燥之乾蓋謂有所徼射不計乾燥之與沉沒而為之誰評曰知足知止玄元訓也二子不知而二母知之謂笄禕之識不足參義方乎君子謂二母當與知廢知興者並傳劉氏集諸長幼喻以忠節孟氏激厲文武喻之逆順北史梓潼太守茍金龍妻劉氏宣武時金龍為郡帶關城戍主梁人攻圍會金龍疾病不堪部分劉遂厲城人修理戰具夜悉登城拒戰百有餘日并在外城尋為賊陷城中絶水渴死者多劉乃集諸長幼喻以忠節遂相率告訴于天俱時號呌俄而澍雨劉命出公私布絹及至衣服懸之城內絞而取水所有雜器悉儲之于是人心益固會益州刺史傅竪眼將至梁人乃退又任城國太妃孟氏者尚書任城王澄之母也澄為揚州日率衆出討於後賊帥薑慶真襲陷羅城長史韋纘倉卒孟乃勒兵登陴激厲文武喻之逆順於是咸有奮志賊不能克卒以全城曹娥號哭投江女絡哀哭自沉後漢書孝女曹娥者會稽上虞人也父旴能絃歌為巫祝漢安二年五月五日于縣江泝濤迎婆娑神溺死不得尸骸娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死至元嘉元年縣長度尚改葬娥于江南道傍為立碑焉按項原列女傳娥投衣于水祝曰父尸所在衣當沉衣隨流至一處而沉娥遂隨衣而沒華陽國志符縣長趙祉遣吏先尼和拜檄巴郡守過成瑞灘死子賢求喪不得女絡年二十五乃分金珠二錦囊繫兒頭下至二年二月十五日女絡乃乘小船至父沒所哀哭自沉見夢告賢曰至二十一日與父尸俱出至日父子浮出縣言郡太守蕭登髙上之尚書遣户曹掾為之立碑趙娥袖劍報父讐孫氏揮杖殺夫讐魏志龎淯外祖父趙安為同縣李壽所殺淯舅兄弟三人同時病死壽家喜淯母娥自傷父讐不報乃帷車袖劒白日刺壽于都亭前訖徐詣縣顔色不變曰父讐已報請受戮祿福長尹嘉解印綬縱娥娥不肯去遂強載還家會赦得免州郡歎賞刋石表閭北史鄃縣女子孫氏男玉者夫為零陵縣人所殺男玉追執讐人欲自殺之其弟止而不聽男玉曰女人出適以夫為天當親自復雪云何假人之手遂以杖毆殺之有司處死以聞獻文詔曰男玉重節輕身以義犯法緣情定罪理在可原其特恕之隨子作東征賦隨夫作南征賦文選曹大家子榖為陳留長大家隨至官作東征賦舊唐書宋庭瑜妻魏氏善屬文先天中庭瑜自司農少卿左遷涪州别駕魏氏隨夫之任中路作南征賦以敘志詞甚典美羊為汝徘徊何况於人我見汝亦憐何况老奴南史宋文帝乘羊車每至潘淑妃戶羊輒舐地不去帝曰羊乃為汝徘徊况於人乎世説桓溫平蜀以李勢妹為妾甚有寵常著齋後主始不知既聞與數十婢拔白刃襲之正值李梳頭髮委藉地膚色玉曜不為動容徐曰國破家亡無心至此今日若能見殺乃是本懷主於是擲刀前抱之曰阿子我見汝亦憐何况老奴遂善之髙辛女配犬阿史那交狼後漢書昔高辛氏有犬戎之冦帝患其侵暴而征伐不尅乃訪募天下有能得犬戎之將吳將軍頭者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂銜人頭造闕下郡臣怪而諗之乃吳將軍首也帝大喜而計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請行帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絶人迹不至于是女解去衣裳為僕監之結著獨力之衣帝悲思之遣使尋求輒遇風雨震晦使者不得進經三年生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其母後歸以狀白帝于是使迎致諸子衣裳斑蘭語言侏儷好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷又陷北記北狗國人身狗首長毛不衣手搏猛獸語為犬嘷其妻皆人能漢語生男為狗女為人自婚嫁穴居食生而妻女人食云嘗有中國人至其國其妻憐之使逃歸與其筯十餘隻數其走十餘里遺一筯狗夫追之見其筯家物必銜而歸則不能追矣北史突厥者其先居西海之右獨為部落蓋胸奴之别種也姓阿史那氏後為鄰國所破盡滅其族有一兒年且十歲兵人見其小不忍殺之乃刖足斷其臂棄草澤中有牝狼以肉餌之及長與狼交合遂有孕焉彼王聞此兒尚在重遣殺之使者見在狼側并欲殺狼于時若有神物投狼於西海之東落髙昌國西北山山有洞穴穴內有平壤茂草周回數百里四面俱山狼匿其中遂生十男十男長外託妻孕其後各為一姓阿史那即其一也最賢遂為君長故牙門建狼頭纛示不忘本也漢公主妻烏孫昆莫自治宫室唐公主妻吐蕃弄贊遂立宫室漢書元封中遣江都王建女細君為公主以妻烏孫昆莫賜乘輿服御物為備官屬宦官侍御數百人贈送甚盛昆莫以為右夫人胸奴亦遣女妻昆莫昆莫以為左夫人公主至其國自治宫室居歲時一再與昆莫會置酒飲食以幣帛賜王左右貴人昆莫年老語言不通公主悲愁自為作歌曰吾家嫁我兮天一方逺託異國兮烏孫王穹廬為室兮旃為牆以肉為食兮酪為漿居常思土兮心內傷願為黃鵠兮歸故鄉天子聞而憐之間歲遣使者持帷帳綿繡給遺焉新唐書貞觀十五年妻吐蕃弄贊宗女文成公主詔江夏王道宗持節護送築館河源王之國弄贊率兵次柏海親迎見道宗執壻禮恭甚見中國服飾之美縮縮醜沮歸國自以其先末有昏帝女者乃為公主築一城以夸後世遂立宫室以居公主惡國人赭面弄贊下令國中禁之自褫氊罽襲紈綃為華風遣諸豪子弟入國學習詩書又請儒者典書疏烏桓婦至嫁時方養髮鮮卑俗唯婚姻先髠頭後漢書烏桓以髠頭為輕便婦人至嫁時方養髮分為髻著句決飾以金碧猶中國有簂步搖注云簂音吉悔反字或為幗婦人首飾也又鮮卑言語習俗與烏桓同唯婚姻先髠頭以季春月大會于饒樂水上飲宴畢然後配合夜郎剖竹而生哀牢觸木而感後漢書夜郎者初有女子浣于遁水有三節大竹流入足間聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓武帝元鼎六年平南夷為牂牁郡夜郎侯迎降天子賜其王印綬後隨殺之夷獠咸以竹王非血氣所生甚重之求為立後牂牁太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也又哀牢夷者其先有婦人名沙一居于牢山嘗捕魚水中觸沈木若有感因懷妊十月産子男十人後沈木化為龍出水上沙一忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因舐之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所舐而黥遂共推以為王後牢山下一夫一婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣著尾辨辰國兒生以石厭頭康居國子生以蜜內口魏志辨辰國兒生以石厭其頭欲其褊今辰韓人皆褊頭舊唐書康居國生子以蜜內口中明膠置掌內欲其成長口常甘言掌持錢如膠之黏物巴師勇鋭歌舞賨民鋭氣喜舞華陽國志周武王伐紂實得巴蜀之師著乎尚書巴師勇鋭歌舞以凌殷人倒戈故世稱之曰武王伐紂前歌後舞也又䦘中有渝水賨民多居水左右天性徑勇初為漢前鋒陷陳鋭氣喜舞帝善之曰此武王伐紂之歌也乃令樂人習學之今所謂巴渝舞也周時肅慎貢楛矢魏時肅慎貢楛矢國語仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之來也逺矣此肅慎氏之矢也昔武王克商通道于九夷百蠻使各以其方賄來貢使無忘職業于是肅慎氏貢楛矢石弩其長尺有咫先王欲昭其令德之致逺也以示後人使永監焉故銘其栝曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以珍玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅慎氏之貢君若使有司求諸故府其可得也使求得之金櫝如之魏志景元三年夏四月遼東郡言肅慎國遣使重譯入貢獻其國弓三十張長三尺五寸楛矢長一尺八寸石弩三百枚皮骨鐵雜鎧二十領豹皮四百枚罽賔國獻褥特鼠波斯國獻活褥蛇舊唐書貞觀十六年罽賔國遣使獻褥特鼠喙尖而尾赤能食蛇有被蛇螫者鼠輒嗅而尿之其瘡立愈又波斯國伊嗣侯遣使獻一獸名活褥蛇形類鼠而色青身長八九寸入穴取鼠以十一月為正以十二月為首舊唐書東女國以十一月為正又康國即漢康居國以十二月為歲首十一月鼓舞乞寒盛暑節激氣成涼舊唐書康居國頗有佛法至十一月鼓舞乞寒以水相潑盛為戲樂又拂蒜國每至盛暑之節人厭囂熱乃厭水潛流上遍屋宇機制巧密人莫之知觀者惟聞屋上泉鳴俄見四簷飛溜懸波如瀑激氣成涼風其巧妙如此以駝候風以鳥卜歲舊唐書吐谷渾西北有流沙數百里夏有熱風傷弊行旅風之將至老駝便知之則引項而鳴以口鼻埋沙中人以為候即以氊擁蔽口鼻而避其患又東女國以十一月為正其俗每至十月令巫者齎楮詣山中散糟麥于空大呪呼鳥俄而有鳥如雞飛入巫者之懷因剖腹視之每有一殼來歲必登若有霜雪必多災異其俗信之名為鳥卜殼新唐書作穀灼骨以卜觀蹄以占後漢書倭國灼骨以卜用決吉凶魏志夫餘國殺牛觀蹄以占吉凶蹄解者凶合者吉以丹朱坌身以麝香塗身後漢書倭國男衣皆橫幅結束相連女人披髮屈紒衣如單被貫頭而著之並丹朱坌身如中國之用粉也説文曰坌塵也音蒲頓反舊唐書林邑國俗皆徒跣得麝香以塗身一日之中再塗再洗又後漢書夫餘國好養豕食其肉衣其皮冬以豕膏塗身厚數分以禦風寒夏則裸袒以尺布蔽其前後驃國不衣繒帛于闐初無桑蠶舊唐書驃國好生惡殺其理無刑名桎梏之具犯罪者皆以竹五十本束之復犯者撻其背數至五輕者止三殺人者戮之男女七歲則落髮止寺舍依桑門至二十不悟佛理乃復長髮為居人其衣服悉以白㲲為朝霞繞腰而已不衣繒帛云出於蠶為其傷生故也新唐書于闐初無桑蠶丏鄰國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶帽絮中關守不敢驗自是始有蠶女刻石約無殺蠶蛾飛盡乃治繭張革為屋釀麋為酒胡嶠陷北記東女真善射多牛鹿野狗其人無定居行以牛負物遇雨則張革為屋常作鹿鳴呼鹿而射之食其生肉又東女真能釀麋為酒醉則縛之而睡醒而後解不然則殺人髙昌有蒲萄酒龜兹饒蒲萄酒舊唐書髙昌厥士良沃榖麥歲再熟有蒲萄酒又龜兹國饒蒲萄酒富室至數百石又漢書大宛左右以蒲萄為酒富人藏酒至萬餘石久者至數十歲不敗林邑國以檳榔汁為酒訶陵國以椰樹花為酒舊唐書林邑國以檳榔汁為酒有結遼鳥能解人語又訶陵國俗以椰樹花為酒其樹生花長三尺餘大如人腦割之取汁以成酒味甘飲之亦醉夫餘國譯者詭手據地天竺國敬者舐足摩踵魏志夫餘譯人傳辭皆詭手據地竊語人倭人見大人所敬但搏手以當跪拜舊唐書天竺國人皆深目長鼻致敬極者舐足摩踵又吐蕃拜必兩手據地作狗吠之聲以身再揖而止又淮南子曰胡人彈骨越人齧臂中國歃血也所由各異其於信一也三苗髽首羌人活領中國冠笄越人劗髮其於服一也騾王雁臣漢書龜兹王乃騾王也洛陽伽藍記元魏時北夷酋長遣子入侍者常春秋去避中國之熱時人謂之雁臣象踐鱷食唐書南蠻環王衛兵五千戰乘象率象千馬四百分前後不設刑有罪者使象踐之又驃國有巨白象髙百尺訟者焚香跽象前自思是非而退有災疫王亦焚香對象跽自咎朝野僉載安南有象能知人曲直有鬭訟者行立而嗅之有理者即過負心者以鼻捲之擲空中數大以牙接之應時碎矣莫敢競者吳時外國傳鱷魚大者長二三丈有四足似守宫常吞食人扶南王范尋敕捕取置溝塹中尋有所忿者縛以食鱷若罪當死鱷不食便解放以為無罪又南史林邑國于城溝中養鱷魚門外圈虎有罪者輒以餧猛獸及鱷不食為無罪三日乃放之瀛涯勝覽占城國內鱷魚潭有爭訟官不能斷者則令二人騎水牛過此潭曲者鱷魚出而食之直者雖過數次鱷出而不食也胡蝗胡荒晉陽秋司冀青雍蝗食茅草皆盡石勒與蝗競取民禾百姓謂之胡蝗北史孝昌中山胡劉蠡升自稱天子年號神嘉居雲陽谷西土歲被其冦謂之胡荒駢志卷十六
