body:
  text: 駢志卷六明陳禹謨撰丙部下叔詹辭順晉文原其死蒯通言直漢祖赦其誅國語晉文公誅觀狀以伐鄭反其埤鄭人以名寶行成公弗許曰子我詹而師還詹請往鄭伯弗許詹固請曰一臣可以赦百姓而定社稷君何愛於臣也鄭人以詹予晉人晉人將亨之詹曰臣願獲盡辭而死固所願也公聽其辭詹曰天降鄭禍使淫觀狀棄禮違視臣曰不可夫晉公子賢明其左右皆卿才若復其國而得志于諸矦禍無赦矣今禍及矣尊明勝患知也殺身贖國忠也乃就亨據鼎耳而疾號曰自今以往知忠以事君者與詹同乃命弗殺厚為之禮而歸之鄭人以詹伯為將軍按詹鄭卿叔詹伯也漢書淮隂侯謀反被誅臨死嘆曰悔不用蒯通之言死於女子之手高帝曰是齊辯士蒯通乃詔齊召蒯通通至上欲亨之曰若教韓信反何也通曰狗吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿天下共逐之高材者先得天下匈匈爭欲為陛下所為顧力不能可殫誅邪上乃赦之漆城瓦衣史記秦二世欲漆其城優㫋曰善主上雖無言臣固將請之漆城雖於百姓愁費然佳哉漆城蕩蕩冦來不能上即欲就之易為漆耳顧難為䕃室於是二世笑之以其故止舊唐書太宗出獵在途遇雨因問油衣若為得不漏谷那律曰能以瓦為之必不漏矣意欲太宗不為畋獵太宗悅賜帛二百段中射奪食不死之藥東方竊飲不死之酒戰國策有獻不死之藥於荆王謁者操以入中射之士問曰可食乎曰可因奪而食之王怒使人殺中射之士中射之士使人説王曰臣問謁者謁者曰可食臣故食之是臣無罪罪在謁者且客獻不死之藥臣食之而王殺臣是死藥也王乃不殺湘川記岳陽酒香山上有美酒數斗飲者不死漢武帝遣欒巴求得之未進御東方朔竊飲焉帝怒欲誅之朔曰酒茍有驗殺臣臣亦不死臣死酒亦不驗遂得免孔融啁魏太祖酒禁簡雍啁蜀先主酒禁張璠漢紀太祖制酒禁而孔融書啁之太祖外雖寛容而内不能平御史大夫郗慮知㫖以法免融官按融集與操書曰酒之為徳久矣古先哲王類帝禋宗和神定人以濟萬國非酒莫以也故天垂酒星之燿地列酒泉之郡人著酒㫖之徳堯不千鍾無以建太平孔非百觚無以堪上聖樊噲解戹鴻門非豕肩鍾酒無以奮其怒趙之厮養東迎其王非因巵酒無以激其氣高祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪之力無以脱其命定國不酣飲一斛無以决其法故酈生以高陽酒徒著功於漢屈原不餔糟歠醨取困於楚由是觀之酒何負於政哉又書曰昨承訓答陳二代之旤及衆人之敗以酒亡者實如來誨雖然徐偃王行仁義而亡今令不絶仁義燕噲以讓失社稷今令不禁謙退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜榖耳非以亡王為戒也蜀志簡雍性簡傲跌宕在先主坐席猶箕踞傾倚威儀不肅自縱適諸葛亮以下則獨擅一榻項枕臥語無所為屈時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍與先主游觀見一男一女行道謂先主曰彼人欲行淫何以不縛先主曰卿何以知之雍對曰彼有其具與欲釀者同先主大笑而原欲釀者伊籍機捷秦宓文辯蜀志伊籍東使於呉孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君乎籍即對曰一拜一起未足為勞籍之機捷類皆如此又呉遣使張溫來聘百官皆往餞焉衆人皆集而秦宓未往諸葛亮累遣使促之溫曰彼何人也亮曰益州學士也及至溫問曰君學乎宓曰五尺童子皆學何必小人溫復問曰天有頭乎宓曰有之溫曰在何方也宓曰在西方詩云乃眷西顧以此推之頭在西方溫曰天有耳乎宓曰有天處高而聽卑詩云鶴鳴九臯聲聞於天若其無耳何以聽之溫曰天有足乎宓曰有詩云天歩艱難之子不猶若其無足何以歩之溫曰天有姓乎宓曰有姓劉溫曰何以知之荅曰天子姓劉故以知之温曰日生於東乎宓曰雖生於東而没於西荅問如響應聲而出於是温大敬服宓之才辯皆此類也昔與汝為隣今與汝為臣昔為汝作臣今與汝比肩世説晉武帝問孫皓聞南人好作爾汝歌頗能為不皓正欲飲酒因舉觴勸帝而言曰昔與汝為隣今與汝為臣上汝一桮酒令汝夀萬春帝悔之南史河東王歆之嘗為南康相素輕劉邕後歆之與邕俱豫元㑹並坐邕嗜酒謂歆之曰卿昔見臣今能見勸一杯酒否歆之因斆孫皓歌荅曰昔為汝作臣今與汝比肩既不勸汝酒亦不願汝年此豈可使卿有勲生男於羣官何事語林元帝皇子生普賜羣臣殷洪喬謝曰皇子誕育普天同慶臣無勳焉而猥蒙頒賚元帝笑曰此事豈可使卿有勳邪北史秦孝王妃生男文帝大加頒賜羣官各有差李文博家道屢空人謂其悅賞乃云賞罰之設功過所歸今王妃生男於羣官何事乃妄受賞也使卿智不使卿力謝王瞋不謝王理南史孫謙梁天監九年以老徵為光祿大夫及至帝嘉其清潔甚禮異焉每朝見猶請劇軄自効帝笑之曰朕當使卿智不使卿力北史宋遊道為尚書令臨淮王彧譴責遊道乃執版長揖曰下官謝王瞋不謝王理不患不還政恐還而復去不患不入正恐入而復出南史張融為封溪令從叔永出冶渚送之曰似聞朝㫖汝尋當還融曰不患不還政恐還而復去北史元順解領軍徵為給事黄門侍郎親友郊迎賀其得入順曰不患不入正恐入而復出耳何敢近舍明公逺希嵇阮何不近比老彭逺求温子世說周僕射顗雍容好儀形詣王公導初下車隱隱即䕃暎之謂也數人王公含笑看之既坐傲然嘯詠王公曰卿欲希嵇阮耶荅曰何敢近舍明公逺希嵇阮按鄧粲晉紀曰伯仁儀容𢎞偉善於俛仰應答精神足以䕃映數人北史李徳善屬文詞覈而理暢魏收嘗對高隆之謂其父曰賢子文筆終當繼温子昇隆之大笑曰魏常侍殊已嫉賢何不近比老彭乃逺求温子貂抄肉柈冠觸燭火南史齊武陵昭王曄於御坐曲宴醉伏地貂抄肉柈帝笑曰汙貂對曰陛下愛其羽毛而疎其骨肉又陸雲公善奕棊嘗夜侍坐武冠觸燭火帝笑謂曰燭燒卿貂帝將用為侍中故以此戲之潄石枕流枕石潄流晉書孫楚時欲隱居謂王濟曰當欲枕石潄流誤云潄石枕流濟曰流非可枕石非可潄楚曰所以枕流欲洗其耳潄石以礪其齒南史顧協㓜孤隨母養於外氏外從祖右光祿大夫張永嘗携内外孫姪游虎丘山協年數歲永撫之曰兒欲何戲協曰兒政欲枕石潄流永歎息曰顧氏興於此子獸微弩强是以發遲牛駿馭精所以疾耳晉書陸雲與荀隱素未相識嘗㑹張華坐華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野麋獸微弩强是以發遲南史劉瑀年位本在何偃前孝武初偃為吏部尚書瑀為侍中不得與偃同從郊祀時偃乘車在前瑀策駟居後相去數十歩瑀蹋馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君何遲曰騏驥羅於羈絆所以居後偃曰何不著鞭使致千里答曰一蹙自造青雲何至與駑馬爭路刁韓相嘲麥竇相嘲晉中興書刁彞於桓公坐嘲韓博曰是君韓盧後博誤應曰君是韓盧後桓公笑曰刁以君姓韓故相問耳他自姓刁那得是韓盧後博曰明公未之思耳短尾者則為刁也一坐歎以為佳北史麥鐵杖為汝南太守稍習法令羣盜屏迹後因朝㑹考功郎竇威嘲之曰麥是何姓鐵杖應聲曰麥豆不殊何忽相怪威赧然無以應時人以為敏捷未若諸庾翼翼可謂衆僧虔虔晉書孫盛子放字齊莊㓜稱令慧庾翼子爰客嘗候孫盛見放而問曰安國何在放荅曰庾稚恭家爰客大笑曰諸孫大盛有兒如此也放又曰未若諸庾翼翼既而語人曰我故得重呼奴父也南史王僧虔子慈少與從弟儉共書學謝鳳子超宗嘗候孫虔仍往東齋詣慈慈正學書未即放筆超宗曰卿書何如䖍公慈曰慈書比大人如鷄之比鳳超宗狼狽而退十歲時與蔡興宗子約入寺禮佛正遇沙門懴約戲慈曰衆僧今日可謂䖍䖍慈應聲曰卿如此何以興蔡氏之宗楊素以二柳戲二柳楊素以柳條戲柳調北史柳機在周與族人文成公昻初俱厯顯要及此昻機並為外軄楊素時為納言方用事因上賜宴素戲曰二柳俱摧孤楊獨聳坐者歡笑又左僕射楊素嘗於朝堂見柳調因獨言曰柳條通體弱獨揺不須風調歛版正色曰調信無取公不當以為侍御信有可取不應發此言公當具瞻之地樞機何可輕發素甚竒之外論不爾外言不爾晉書謝安問王獻之曰君書何如君家尊荅曰故當不同安曰外論不爾荅曰人那得知世說何參軍思澄與族弟水部遜散騎子朗俱擅文名時人為之語曰東海三何子朗最多參軍曰外言殊不爾故當推遜評曰甚矣哉人之好名也父子昆弟間猶不免操勝心况在敵而名位相軋者乎其猜忌又可勝道哉未能免俗聊復爾耳不能免俗為復爾耳晉書阮咸與籍居道南諸阮居道北北阮富而南阮貧七月七日北阮曬衣服皆錦綺粲目咸以竿挂大布犢鼻於庭人或怪之荅曰未能免俗聊復爾耳北史王思政入據潁州慕容紹宗出討房豹為紹宗開府主簿兼行臺郎中紹宗自云有水厄遂於戰艦中浴并自投於水冀以厭當之豹白紹宗曰夫命也在天豈人理所能延保公若實有水厄非禳為所能却若其實無何禳之有今三軍之事在於明公唯應達命任理以保元吉方乃乘船入水云以防災豈如岸上指麾以保萬全也紹宗笑曰不能免俗為復爾耳亦復可爾耳不能不爾耳晉書王敦時為鴻臚卿謂阮脩曰卿常無食鴻臚丞差有祿能作不脩曰亦復可爾耳遂為之又桓温入赴山陵上新亭大陳兵衛將移晉室呼謝安及王坦之欲於坐害之坦之甚懼問計於安安神色不變曰晉祚存亡在此一行既見温坦之流汗沾衣倒執手板安從容就席坐定謂温曰安聞諸侯有道守在四隣明公何須壁後置人邪温笑曰正自不能不爾耳遂笑語移日是送吏部郎自餉晉陵令南史何尚之字彥徳為吏部郎告休定省傾朝送别於冶渚及至郡父叔度謂曰聞汝來此傾朝相送可有幾客荅曰殆數百人叔度笑曰此是送吏部郎耳非闗何彥徳也世説高爽嘗經晉陵詣劉蒨了不相接高甚銜之俄爽代蒨為縣蒨迎贈甚厚爽受餉荅書曰高晉陵自荅人問其故爽曰劉蒨自餉晉陵令耳何闗爽事蜀志張裔北詣丞相亮諮事送者數百車乘盈路裔還書與所親曰近者渉道晝夜接賔不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死其談啁流速皆此類也灌夫罵臨汝與程不識耳語崔咸罰裴度與劉栖楚耳語漢書灌夫行酒至田蚡蚡膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也畢之時蚡不肯行酒次至臨汝侯灌賢賢方與程不識耳語又不避席夫無所發怒乃罵賢曰平生毁程不識不值一錢今日長者為夀乃效兒女曹呫囁耳語舊唐書京兆尹劉栖楚李逢吉黨也栖楚等十餘人駕肩排裴度而朝士持兩端者日擁度門一日度留客命酒栖楚矯求度之歡曲躬附裴耳而語崔咸嫉其矯舉爵罰度曰丞相不當許所由官囁耳語度笑而飲之栖楚不自安趨出坐客皆壯之羞與噲為伍嘆與滔比肩漢書韓信嘗過樊將軍噲噲趨拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍晉書袁宏與伏滔同在桓温府府中呼為袁伏宏心恥之每嘆曰公之厚恩未優國士而與滔比肩何辱之甚彭羕呼先主為老革謝奕呼桓温為老兵蜀志諸葛亮雖外接待彭羕而内不能善屢宻言先主羕心大志廣難可保安先主既敬信亮加察羕行事意以稍疎左遷羕為江陽太守羕聞當逺出私情不悅往詣馬超超問羕曰卿才具秀㧞主公相待至重謂卿當與孔明孝直諸人齊足並驅寧當外授小郡失人本望乎羕曰老革荒悖可復道邪晉書謝奕嘗逼桓温飲温走入南康主門避之主曰君若無狂司馬我何由得相見奕遂携酒就聽事引温一兵帥共飲曰失一老兵得一老兵亦何所在温不之責呼崔元欽為癩刺史叱楊再思為癡宰相魏書崔暹字元欽為瀛州刺史貪暴安忍民庻患之嘗出獵州北单騎至於民村井有汲水婦人暹令飲馬因問曰崔瀛州何如婦人不知其暹也荅曰百姓何罪得如此癩兒刺史暹默然而去唐書楊再思居宰相十餘年阿匼取容無所薦逹人主所不喜毁之所善譽之畏慎足恭未嘗忤物或曰公位尊何自屈折答曰世路孔艱直者先禍不爾豈全吾軀於時水沴閉坊門以禳再思入朝有車陷於濘叱牛不前恚曰癡宰相不能和隂陽而閉坊門遣我艱於行再思遣吏謂曰汝牛自弱不得獨責宰相落水三公墜車僕射黄㼐少師桃弓僕射南史司徒禇彥囘送湘州刺史王僧髪閣道壊墜水僕射王儉嘗驚跣下車謝超宗拊掌笑戲曰落水三公墜車僕射北史郭祚為僕射領太子少師祚曾從幸東宫明帝㓜弱祚持一黄㼐出奉之時應詔左右趙桃弓與御史中尉王顯迭相唇齒深為帝所信祚私事之時人謗祚者號為桃弓僕射黄㼐少師烏不烏鵲不鵲驢非驢馬非馬國策史疾謂楚王曰任官置吏必曰廉潔勝自今盜賊公行而弗能禁也此可謂烏不為烏鵲不為鵲也漢書龜兹王樂漢衣服制度歸其國治宫室作徼道周衛出入傳呼撞鍾鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜兹王所謂驘也憎聲憎眼世説支道林入東見王子猷兄弟還人問見諸王何如荅曰見一羣白頸烏但聞喚啞啞聲又蘇峻時孔羣在横塘為匡術所逼王丞相保存術因衆坐戲語令術勸羣酒以釋横塘之憾羣荅曰徳非孔子厄同匡人雖陽和布氣鷹化為鳩至於識者猶憎其眼劉祥比令僕卞彬比令僕南史劉祥與王奐子融同載行至中堂見路人驅驢祥曰驢汝好為之如汝人才皆已令僕矣又卞彬蝦蟇賦云紆青拖紫名為蛤魚世謂比令僕也宋東海王禕為驢王魏咸陽王坦為驢王南史廬陵王禕初封東海王明帝踐祚進封廬陵王初廢帝目禕似驢上以廢帝之言類改封焉北史咸陽王禧子坦傲狠凶麤從叔安豐王延明每切責之曰汝兇悖性與身而長昔宋有東海王禕志性凡劣時人號曰驢王我熟觀汝所作亦恐不免驢號當時聞者號為驢王閭里咸謂生犀時人號為秃犀南史陸驗本無藝業而容貎特醜先是外國獻生犀其形甚陋故閭里咸謂驗為生犀北夢𤨏言杜邠公悰尚憲宗岐陽公主累居大鎮復居廊廟無他才未嘗延接寒素甘食竊位而已時人號為秃角犀􅀈奴􅀈王南史前廢帝自以為昔在東宫不為孝武所愛常罵帝為􅀈奴又太后疾篤遣呼帝帝曰病人間多鬼可畏那可往太后怒語侍者曰將刀來破我腹那得生寧馨兒北史初崔浩弟恬聞慧龍王氏子以女妻之浩既婚姻及見慧龍曰信王家兒也王氏世􅀈鼻江東謂之􅀈王慧龍鼻漸大浩曰眞貴種矣竇喜鵲劉鵂鶹舊唐書竇申宰相參之族子參特愛申每議除授多詣於申或泄之以招權受賂每所至人謂之喜鵲異苑劉在朱方人不得共話若與之言人必遭旤難及身死疾惟一士謂無此理偶值人有屯塞耳劉聞之欣然而往自説被謗君能見明荅云世人雷同何足恤須臾火發資畜服翫蕩然於是舉世號為劉鵂鶹或遇諸途皆閉車走馬掩目奔避劉亦杜門自守歲時一出則人驚散甚於見鬼費旭不識其父殷澐颻颺其母陳思方父於蟲潘岳匹婦於考顔氏家訓梁世費旭詩云不知是邪非殷澐詩云颻颺雲母舟簡文曰旭既不識其父澐又颻颺其母此雖悉古事不可用也又陳思王武帝誄遂深永蟄之思潘岳悼亾賦乃愴手澤之遺是方父於蟲匹婦於考也按禮記仲秋之月蟄蟲坏户誄稱永蟄是方父於蟲矣又云父没而不能讀父之書手澤存焉耳悼婦稱手澤是匹婦於考矣范蠡吠於狗竇光逸窺於狗竇劉子范蠡吠於狗竇文種聞而拜之按文種過范蠡之門蠡於狗洞作狗吠文種曰狗當吠人蠡乃以我為人㢠廻車至其門入内而拜薦為越相晉書時賢胡母輔之軰閉門酣飲已累日光逸將排户入守者不聽逸便於户外脱衣露頭於狗竇中窺之而大呌輔之驚曰他人决不能爾必我孟祖也遽呼入與飲小遺殿上小遺閣省漢書東方朔嘗醉入殿中小遺殿上劾不敬有詔免為庻人待詔宦者署顔古師曰小遺者小便也南史謝幾卿嘗於閣省祼袒酣飲及醉小遺下霑令史為南司所彈幾卿亦不介意車轄投井車輪括頸漢書陳遵居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪傑至京師者莫不相因到遵門遵耆酒每大飲賔客滿堂輙闗門取客車轄投井中雖有急終不得去北齊書司馬消難左僕射子如之子又是高祖之壻勢盛當時因退食暇尋高季式與之酣飲留宿旦日重門並閉闗籥不通消難固請云我是黄門郎天子侍臣豈有不參朝之理且已一宿不歸家君必當大怪今若又留我狂飲我得罪無辭恐君亦不免譴責季式曰君自稱黄門郎又言畏家君怪欲以地勢脅我邪高季式死自有處初不畏此消難拜謝請出終不見許酒至不肯飲季式云我留君盡興君是何人不為我痛飲命左右索車輪括消難頸又索一輪自括頸仍命酒引滿相勸消難不得已欣笑而從之方乃俱脱車輪更留一宿是時失消難兩宿莫知所在内外驚異及消難出方具言之世宗在京輔政白魏帝賜消難美酒數石珍羞十輿并令朝士與季式親狎者就季式宅讌集兵帥共飲見前三騶對飲晉書謝幾卿㑹意便行不拘朝憲嘗與樂遊苑宴不得醉而還因詣道邊酒壚停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若畢吏部盜樽裴御史攜筯晉書畢卓為吏部郎嘗飲酒廢軄比舍郎釀熟卓因醉夜至其甕間盜飲之為掌酒者所縛明旦視之乃畢吏部也遽釋其縛卓遂引主人宴於甕側致醉而去史臣曰軍諮散髪吏部盜樽豈以世疾名流兹焉自垢臨鍜竈而不廻登廣武而長歎則嵇琴絶響阮氣徒存通其㫄徑必雕風俗召以效官居然尸素軌躅之外或有可觀者焉北史崔瞻在御史臺恒宅中送食備盡珍羞别室獨飡處之自若有一河東人士姓裴亦為御史伺瞻食便往造焉瞻不與交言又不命匕筯裴坐觀瞻食罷而退明日自攜匕筯恣情飲噉瞻謂曰我初不喚君食亦不共君語遂能不拘小節昔劉毅在京口冒請鵞炙豈亦異是君定名士於是每與之同食性方重好讀書酒後清言聞者莫不傾耳自言寧三日不食不能一日不獵嘗言寧三日不食不能一日不獵北史咸陽郡王坦性好畋漁無日不出秋冬獵雉兎春夏捕魚蟹鷹犬常數百頭自言寧三日不食不能一日不獵舊唐書巢王元吉好畋獵載網罟三十餘兩嘗言寜三日不食不能一日不獵齊桓好衣紫鄒君好長纓韓子齊桓公好服紫一國盡服紫當是時也五素不得一紫桓公患之謂管仲曰寡人好衣紫紫貴甚一國百姓好服紫不已寡人柰何管仲曰君何不試勿衣紫也謂左右曰吾甚惡紫之臭於是左右適有衣紫而進者公必曰少却吾惡紫臭公曰諾於是日郎中莫衣紫其明日國中莫衣紫三日境内莫衣紫也又鄒君好服長纓左右皆服長纓甚貴鄒君患之問左右左右曰君好服百姓亦多服是以貴君因先自斷其纓而出國中皆不服長纓君不能下令為百姓服度以禁之乃斷纓出以示民是先戮以莅民也王子陽好車服極為鮮明辛慶忌好輿馬號為鮮明漢書王吉字子陽好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不畜積餘財去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黄金又辛慶忌居處恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢好衣刺文袴好佩紫羅囊晉書謝尚好衣刺文袴諸父責之因而自改遂知名又謝𤣥少好佩紫羅香囊謝安患之而不欲傷其意因戲賭取即焚之於此遂止阮孚好屐靈運著屐晉書阮孚傳初祖約性好財孚好屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能平或有詣阮正見自蠟屐因自嘆曰未知一生當著幾量屐神色甚閒暢於是勝負始分南史謝靈運尋山陟嶺必造幽峻巖嶂數十重莫不備盡登躡常著木屐上山則去其前齒下山去其後齒嗜痂嗜爪南史劉邕性嗜瘡痂以味似鰒魚嘗詣孟靈休靈休先患炙瘡瘡痂落床上邕取食之靈休大驚邕荅曰性之所嗜靈休瘡痂未落者悉禠取以飴邕邕去靈休與何朂書劉邕向顧見噉遂舉體流血南康國吏二百許人不問有罪無罪逓與鞭瘡痂常以給膳唐權長孺有嗜人爪癖嘗因逺行狂士蔣傳聚得數兩削下爪以進曰無以餞送今有少佳味敢獻長孺涎流於吻連撮噉合坐驚異乾􅍧子屋下陳尸道上行殯晉書時張湛好為齋前種松栢人謂湛屋下陳尸又袁山松每出游好令左右作挽歌人謂道上行殯自為夀藏自為墓誌後漢趙岐自為夀藏圖季札子産晏嬰叔向四像居賔位又自畫其像居主位皆為讃頌舊唐書傅奕常醉臥蹶然起曰吾其死矣因自為墓誌曰傅奕青山白雲人也因酒醉死嗚呼哀哉王孫臝𦵏沐並即埳漢書楊王孫學黄老之術家業千金厚自奉養生亡所不致及病且終先令其子曰吾欲臝𦵏以反吾真必亡易吾意死則為布囊盛尸入地七尺既下從足引脱其囊以身親土魏志注沐並慮身無常豫作終制戒其子以儉𦵏又敇豫掘埳戒氣絶令二人舉屍即埳絶哭泣之聲止婦女之送禁弔祭之賔無設脯酒粟米之奠又戒後亡者不得入藏不得封樹妻子皆遵之按並之言曰夫道之為物惟恍惟惚夀為欺魄夭為鳬没身淪有無與神消息含悦隂陽甘夢太極奚以棺槨為牢衣裳為纆屍繫地下長幽桎梏豈不哀哉昔莊周闊達無所適莫又楊王孫祼體貴不久容耳至夫末世縁生怨死之徒乃有含珠鱗柙玉牀象袵殺人以徇壙穴之内錮以紵絮藉以蜃炭千載僵燥託類神仙於是大教陵遲競於厚𦵏謂莊子為放蕩以王孫為戮屍豈復識古有衣薪之鬼而野有狐貍之胔乎哉吾茍得獲没即以吾身襲於王孫矣漢高使鄭君名籍吕布使袁渙詈備漢書鄭當時字莊其先鄭君嘗事項籍籍死而屬漢高祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君魏志吕布初與劉備和親後離隙布欲使袁渙作書詈辱備渙不可再三彊之不許布大怒以兵脇渙曰為之則生不為則死渙顔色不變笑而應之曰渙聞唯徳可以辱人不聞以罵使彼固君子邪且不恥將軍之言彼誠小人邪將復將軍之意則辱在此不在於彼且渙他日之事劉將軍猶今日之事將軍也如一旦去此復罵將軍可乎布慙而止惡見水中蟹惡聞木邊姓晉書張華裴頠之被誅也趙王倫孫秀以宿憾收解系兄弟梁王彤救系等倫怒曰我於水中見蟹且惡之况此人兄弟輕我邪又右將軍桓伊嘗詣忠敬王遵遵曰門何為通桓氏左右曰伊與桓温疎宗相見無嫌遵曰我聞人姓木邊便欲殺之况諸桓乎評曰有餘愛者愛及屋上烏有餘惡者惡及水中蟹人情之偏一至於此傳曰好惡以其類者鮮矣良然為草人而射之為草人而訊之北史齊河間王孝琬怨執政為草人而射之和士開與祖珽譖之曰草人擬聖躬也又齊安徳王延宗為草人以像武成鞭而訊之曰何故殺我兄奴告之武成覆臥延宗於地馬鞭撾之二百芳蘭當門不得不除芳蘭生門不得不鋤典略曹操殺楊脩曰芳蘭當門不得不除蜀志先主殺張裕諸葛亮救之先主曰芳蘭生門不得不鋤南史袁淑詩云種蘭忌當門懐璧莫向楚楚少别玉人門非植蘭所灌夫罵坐曹眞罵坐漢書田蚡取燕王女為夫人太后詔召列侯宗室皆往賀竇嬰過灌夫欲與俱夫謝曰夫數以酒失過丞相丞相今者又與夫有隙嬰曰事已解彊與俱酒酣蚡起為夀坐皆避席伏已嬰為夀獨故人避席餘半膝席夫行酒至蚡蚡膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也畢之時蚡不肯行酒次至臨汝侯灌賢賢方與程不識耳語又不避席夫無所發怒乃罵賢曰平生毁程不識不直一錢今日長者為夀乃效兒女曹呫囁耳語呉質别傳時上將軍曹真性肥中領軍朱鑠性痩吳質召優使說肥痩眞負貴恥見戲怒謂質曰卿欲以部曲將遇我邪驃騎將軍曹洪輕車將軍王忠言將軍必欲使上將軍服肥即自冝為痩眞愈恚㧞刀瞋目言俳敢輕脱吾斬爾遂罵坐質按劔曰曹子丹汝非屠几上肉吳質吞爾不揺㗋咀爾不揺牙何敢恃勢驕邪鑠因起曰陛下使吾等來樂卿耳乃至此邪質顧叱之曰朱鑠敢壊坐諸將軍皆還坐鑠性急愈恚還㧞劒斬地遂便罷也㧞劍息風㧞劍斫水謝承後漢書陳茂嘗為交阯别駕舊刺史行部不渡漲海刺史周敞渉海遇風船欲覆没茂㧞劍訶罵水神風即止息又王閎渡錢塘江遭風船欲覆閎㧞劍斫水罵伍子胥風息得濟續漢書建初中張禹拜揚州刺史嘗過江行部中土民皆以江有子胥之神難於濟渉禹將度吏固請不聽禹厲言曰子胥如有靈知我志在理察枉訟豈危我哉遂鼓楫而過王述擲鷄子王思逐蝇子晉書王述性急為累嘗食鷄子以筯刺之不得復大怒擲地鷄子圓轉不止便下牀以屐齒踏之瞋甚掇内口中齧破而吐之苛吏傳王思正始中為司農性急嘗執筆作書蝇集筆端驅去復來如是再三思恚怒自起逐蝇不能得還取筆擲踏壊之温造與李中書相逢曵去引馬温造與崔知誥相逢捉其從人舊唐書温造性剛褊人或激觸不顧貴勢以氣凌藉嘗遇左補闕李虞於街怒其不避捕祗承人决脊十下左拾遺舒元褒等上疏論之曰國朝故事供奉官街中除宰相外無所廻避温造蔑朝廷典禮凌陛下侍臣恣行胷臆曽無畏忌前時中書舍人李虞仲與造相逢造乃曵去引馬知制誥崔咸與造相逢造又捉其從人當時縁不上聞所以㬥犯益甚臣聞元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道但以崇高自大不思僣擬之嫌若不糾䋲實虧彞典敇曰憲官之軄在指佞觸邪不在行李自大侍臣之軄在獻可替否不在道路相高並列通班令知名分如聞喧競亦以再三既招人言甚損朝體其臺官與供奉官同道聽先後而行道途即祗揖而過其參從人各隨本官之後少相僻避勿言衝突又聞近日已來應合導從官事力多者街衢之中行李太過自今後傳呼前後不得過三百歩指鹿為馬束蒲為脯以青為黒以黒為黄風俗通秦相趙高指鹿為馬束蒲為脯二世不覺故潘岳西征賦曰野蒲變而成脯苑鹿化以為馬張銑註曰趙高欲為亂恐羣臣不聽乃先設驗以蒲為脯以鹿為馬獻於二世羣臣言蒲言鹿者皆隂誅之禮器曰或素或青夏造殷因註曰變白黑言素青者秦二世時趙高欲作亂或以青為黒黒為黄民言從之故崔琦對梁冀曰將使𤣥黄改色馬鹿易形乎按此是趙高之詐又不苐指鹿一事矣書帛置魚腹書帛係鳥頸漢書陳勝丹書帛曰陳勝王置人所罾魚腹中卒買魚烹食得書已怪之矣又間令吳廣之次所㫄叢祠中夜篝火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中往往指目勝廣北史有道士桓法嗣者自言解圖䜟王世充眤之法嗣乃上孔子閉房記畫作大夫持一干以驅羊法嗣云楊隋姓也干一者王字也王居楊後明相國代隋為帝也又取莊子人間世徳充符二篇上之法嗣釋曰上篇言世下篇言充此則相國名矣當徳被人間而應符命為天子也世充大悦曰此天命也再拜受之即以法嗣為諌議大夫世充又羅取雜鳥書帛係其頸自言符命而散之於空或有彈射得鳥而來獻者亦拜官爵闕下有寶氣牛腹有竒書郊祀志新垣平使人持玉杯上書闕下獻之平言上曰闕下有寶玉氣來者已視之果有獻玉杯者刻曰人主延夀平又言臣候日再中居頃之日郤復中於是始更以十七年為元年令天下大酺又武帝拜少翁為文成將軍賞賜甚多以客禮禮之文成言上即欲與神通宫室被服非象神神物不至迺作畫雲氣車及各以勝日駕車辟惡鬼又作甘泉宫中為臺室畫天地泰一諸鬼神而置祭具以致天神居歲餘其方益衰神不至廼為帛書以飯牛陽不知言此牛腹中有竒書殺視得書書言甚怪天子識其手書問之果為書於是誅文成將軍隠之臣師非有求人人者求之仙者非有求主主者求之郊祀志天子既誅文成後悔其方不盡及見欒大大説大為人長美言多方略而敢為大言處之不疑大言曰臣常往來海中見安期羡門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣數以言康王康王又不用臣臣之師曰黄金可成而河決可塞不死之藥可得仙人可致也然臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能脩其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之勿卑使各佩其信印廼可使通言於神人神人尚肯邪不邪尊其使然後可致也於是上使驗小方鬬棊棊自相觸擊是時上方憂河決而黄金不就廼拜大為五利將軍居月餘得四印又上誅五利其冬公孫卿候神河南言見仙人迹緱氏城上有物如雉往來城上天子親幸緱氏視迹問卿得毋效文成五利乎卿曰仙者非有求人主人主者求之其道非少寛假神不來言神事如迂誕積以歲廼可致於是郡國各除道繕治宫館名山神祠所以望幸矣二桃殺三士盃酒殺三人晏子春秋公孫接田開疆古冶子事景公以勇力搏虎聞晏子欲去之曰此皆力攻勍敵之人也無長㓜之禮因請公使人少餽之二桃曰三子何不計功而食桃公孫接仰天而歎曰接一搏􅢢而再搏乳虎若接之功可以食桃而無與人同矣援桃而起田開疆曰吾伏兵而郤三軍者再若開疆之功亦可以食桃而無與人同矣援桃而起古冶子曰吾嘗從君濟於河黿御左驂以入砥柱之流當是時也冶少不能游潜行逆流百歩順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出若冶之功亦可以食桃而無與人同矣二子何不反桃抽劔而起公孫接田開疆皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁恥人以言而夸其聲不義恨乎所行不死無勇亦反其桃挈領而死南史初吳興呉規頗有才學邵陵王綸引為賔客深相禮遇及綸作牧郢藩規隨從江夏遇張纉出之湘鎮路經郢服綸餞之南浦纉見規在坐意不能平忽舉盃曰吳規此酒慶汝得陪今宴規尋起還其子翁孺見父不悦問而知之翁孺因氣結爾夜便卒規恨纉慟兒憤哭兼至信次之間乂致殞規妻深痛夫子翼日又亡時人謂張纉一盃酒殺吳氏三人子胥紿邊候張丑紿境吏韓非子子胥出走邊候得之子胥曰上素我者以我有美珠也今我已亡之矣我且曰子取吞之候因釋之國策張丑為質於燕燕王欲殺之走且出境境吏得丑丑曰燕王所為將殺我者人有言我有寳珠王欲得之今我已亡之矣而燕王不我信今子且致我我且言子之奪我珠而吞之燕王必當殺子刳子腹及子之膓矣夫欲得之君不可説以利吾要且死子膓亦且寸絶境吏恐而放之客為鷄鳴出闗丹為鷄鳴出闗史記孟嘗君夜半至函谷闗闗法鷄鳴而出客孟嘗君恐追至客之居下坐者有能為鷄鳴而鷄盡鳴遂發傳出博物志燕太子丹質於秦遁到闗闗門不開丹為鷄鳴於是衆鷄悉鳴遂歸睨其旁有馬暫騰上得脱睨其傍有馬因躍上得免史記李廣為胡騎所得廣時傷病置廣兩馬間絡而盛臥廣行十餘里廣佯死睨其旁有一胡兒騎善馬廣暫騰而上胡兒馬因推墮兒取其弓鞭馬南馳數十里復得其餘軍因引而入塞匈奴捕者騎數百追之廣行取胡兒弓射殺追騎以故得脱北史李弼從周文與齊神武戰河橋身被七創遂為所獲陽隕絶於地睨其傍有馬因躍上得免以寶鞭示追騎以金𢃄投追騎晉書明帝微行至湖隂王敦使五騎物色追帝帝亦馳去馬有遺糞輒以水灌之見逆旅賣食嫗以七寶鞭與之曰後有騎來可以此示也俄而追者至問嫗嫗曰去已逺矣因以鞭示之五騎傳翫稽留遂久又見馬糞冷以為信遠而止不追帝僅而獲免舊唐書王世充作難皇甫無逸棄老母妻子斬闗而走追騎且至無逸曰吾死而後已終不能同爾為逆因解所服金𢃄投之於地曰以此贈卿無為相迫追騎競下馬取𢃄自相爭奪由是得免呉公子光詳為足疾侯莫陳悦詐云腹痛史記吳世家公子光伏甲士於窟室而謁王僚飲王僚使兵陳於道自王宫至光之家門階户席皆王僚之親也人夾持鈹公子光詳為足疾入於窟室使專諸置匕首於炙魚之中以進食手匕首刺王僚鈹交於匈遂殺王僚索隱曰詳音陽北史侯莫陳悦説賀㧞岳入營共論兵事悦詐云腹痛起而徐行令其壻元洪景斬岳於幕中叔展呼山鞠窮欽明乞醬梁墨左傳楚師傅于蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾柰何曰目於眢井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之杜預註麥麴鞠窮所以禦濕欲使無社逃泥水中無社不解故曰無軍中不敢正言故謬語河魚腹疾言無禦濕藥將病無社意解欲入井故使叔展視虛廢井而求拯已出溺為拯叔展又教結茅以表井須哭乃應以為信舊唐書許欽明嘗出按部突厥默啜率衆數萬奄至城下欽明大呼曰賊中都無飲食城内有美醬乞二升梁米乞二斗墨乞一鋌是時賊營處四靣阻泥河惟有一路得入欽明乞此物以喻城中冀其簡兵陳將候夜掩襲城中無悟其㫖者多請田宅以自堅大受金賄以自穢史記王翦既至闗使使還請善田者五軰或曰將軍之乞貸亦已甚矣王翦曰不然夫秦王怚而不信人今空秦國甲士而專委於我我不多請田宅為子孫業以自堅顧令秦王坐而疑我矣怚音麄徐廣曰怚一作麄北史梁睿初平王謙自以威名太盛恐為時所忌遂大受金賄以自穢虜中吾指虜中吾足漢書高帝數項羽十罪羽大怒伏弩射中漢王傷胸乃捫足曰虜中吾指南史郢城平武帝命衆軍即日俱下楊公則受命先驅江州既定連旌東下直造建鄴公則號令嚴明秋毫不犯所在莫不頼焉大軍至新林公則自越城移屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遥見麾葢縱神鋒弩射之矢貫胡牀左右皆失色公則曰虜幾中吾足談笑如初東昏夜選勇士攻公則柵軍中驚擾公則堅臥不起徐命擊之東昬軍乃退量沙散米聚土覆米南史檀道濟軍至厯城以資運竭乃還時人降魏者具説糧食已罄於是士卒憂懼莫有固志道濟夜唱籌量沙以所餘少米散其上及旦魏軍謂資糧有餘故不復追又載記晉龍驤將軍胡彬為苻融所逼糧盡詐揚沙以示融軍北史賀若敦次湘州俄而秋水汎溢江路遂斷糧援既絶恐陳將侯瑱等知其糧少乃於營内多為聚土覆之以米召側近村人陽有所訪問隨即遣之瑱等聞之良以為實又晉書祖逖以囊盛土如米狀使千人運之詐服魏人衣若叛投闗西者偽為周文書若從外送來者北史韓雄為東徐州刺史東魏雍州刺史郭叔略接境頗為邊患雄宻圖之輕將十騎夜入其境伏於道側遣都督韓仕於略城服東魏人衣詐若自河陽叛投闗西者略出馳之雄自後射之再發咸中遂斬略首又楊檦至建州東魏衆漸盛檦以孤軍無援且腹背受敵謀欲㧞還復恐義徒背判遂偽為周文書遣人若從外送來者云已遣軍四道赴援因令人漏泄使所在知之又分土人義酋令各領所部四出抄掠擬供軍費檦分遣訖遂於夜中㧞還邵郡莊生請赦以除星變一行請赦以禳星變史記朱公居陶生少子少子及壯而朱公中男殺人囚於楚朱公曰殺人而死軄也然吾聞千金之子不死於市告其少子往視之乃装黄金千鎰置褐器中載以一牛車且遣其少子朱公長男固請欲行朱公不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖當自殺其母為言曰今遣少子未必能生中子也而先空亡長男柰何朱公不得已而遣長子為一封書遺故所善莊生曰至則進千金於莊生所聽其所為慎無與爭事長男既行亦自私齎數百金至楚莊生家負郭披藜藋到門居甚貧然長男發書進千金如其父言莊生曰可疾去矣慎毋留弟出勿問所以然長男既去不過莊生而私留以其私齎獻遺楚國貴人用事者莊生雖居窮閻然以廉直聞於國自楚王以下皆師尊之及朱公進金非有意受也欲以成事後復歸之以為信耳故金至謂其婦曰此朱公之金有如病不宿誡後復歸勿動而朱公長男不知其意以為殊無短長也莊生間時入見楚王言某星宿某此則害於楚楚王素信莊生曰今為柰何莊生曰獨以徳為可以除之楚王曰生休矣寡人將行之王乃使使者封三錢之府楚貴人驚告朱公長男曰王且赦曰何以也曰每王且赦常封三錢之府昨暮王使使封之注曰王且赦常封三錢之府者錢幣至重慮人或逆知有赦盜竊之所以封錢府備盜竊也漢靈帝時河内張成能侯風角知將有赦教子殺人捕得七日赦出此其類也朱公長男以為赦弟固當出也重千金虛棄莊生無所為也乃復見莊生莊生驚曰若不去邪長男曰固未也初為事弟弟今議自赦故辭生去莊生知其意欲復得其金曰若自入室取金長男即自入室取金持去獨自歡幸莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以脩徳報之今臣出道路皆言陶之富人朱公之子殺人囚楚其家多持金錢賂王左右故王非能恤楚國而赦乃以朱公子故也楚王大怒曰寡人雖不徳耳柰何以朱公之子故而施惠乎令論殺朱公子明日遂下赦令朱公長男竟持其弟䘮歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟顧有所不能忍者也酉陽雜爼僧一行博覽無不知尤善於數鈎深藏往當時學者莫能測㓜時家貧隣有王姥前後濟之數十萬及一行開元中承上敬遇言無不可常思報之㝷王姥兒犯殺人罪獄未具姥訪一行求救一行曰姥要金帛當十倍酬也明君執法難以請一曰情如何王姥㦸手大罵曰何用識此僧一行從而謝之終不顧一行心計渾天寺中工役數百乃命空其室内徙大瓮於中又宻選常住奴二人授以布囊謂曰某坊某角有廢園汝向中濳伺從午至昏當有物入來其數七可盡掩之失一則杖汝奴如言而往至酉後果有羣豕至奴悉獲而歸一行大喜令寘甕中覆以木葢封以六一泥朱題梵字數十其徒莫測詰朝中使叩門急召至便殿𤣥宗迎問曰太史奏昨夜北斗不見是何祥也師有以禳之乎一行曰後魏時失熒惑至今帝車不見古所無者天將大警於陛下也夫匹婦匹夫不得其所則隕霜赤旱盛徳所感乃能退舍感之切者其在𦵏枯出繫乎釋門以瞋心壊一切善慈心降一切魔如臣曲見莫若大赦天下𤣥宗從之又其夕太史奏北斗一星見凡七日而復公孫𢎞上前背約趙退翁上前背約漢書公孫𢎞嘗與公卿約議至上前皆背其約以順上指汲黯庭詰𢎞曰齊人多詐而無情始𢎞與臣等建此議今皆背之不忠上問𢎞𢎞謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然𢎞言舊唐書趙憬字退翁與陸贄同知政事時延齡姦詐恣睢滿朝側目憬初與贄約於上前論之及延英奏對贄極言延齡姦邪誑誕之狀不可任用徳宗不悅形於顔色憬黙然無言由是罷贄平章事而憬當國矣含辛為淚應聲便號載記慕容熈后苻氏死制百寮於宫内哭臨令沙門素服使有司按檢哭者有淚以為忠孝無則罪之於是羣臣震懼莫不含辛以為淚焉南史劉徳願為孝武狎侮上寵姬殷貴妃薨𦵏畢數與羣臣至殷墓謂徳願曰卿哭貴妃若悲當加厚賞徳願應聲便號慟撫膺擗踴涕泗交流上甚悅以為豫州刺史駢志卷六
