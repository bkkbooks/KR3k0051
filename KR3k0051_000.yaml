body:
  text: 駢志類書類提要臣等謹案駢志二十卷明陳禹謨撰禹謨有經言枝指别著録是書取古事之相類者比而録之對偶標題而各注其所出於條下不立門目但以自甲至癸十干為序而大較以類相從其中嗜博愛竒務盈卷帙如晏子宅晏子冡蘇秦宅蘇秦冡之類古來有宅有冡者豈能遍收秦趙高為丞相漢趙髙為太守之類古來同姓名者更難悉數又如平仲君遷乃吳都賦之本文橘不踰淮貉不踰汶乃考工記之成語因而採為駢句名為𨽻事實則鈔胥齊梁來儷偶之文亦恐罄竹難盡至于癸部所載及于經典一字之異同如浴乎沂沿乎沂詠而歸詠而饋則經典釋文且將全録矣然所採既繁所儲遂富或一言而出典各殊或兩事而行蹤相近多可以考證異同辨别疑似所謂披沙簡金往往見寶又如漢高母姓駁司馬貞依托班固碑之類亦頗精確大致簡核精要不及前人而博贍典雅則勝方中德之古事比雖體例時有踈舛其搜羅排比之勤要未可盡沒也乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀駢志原序不佞謨性庸塞特耽耆古籍自為諸生輒請之先莊靖府君出所藏書披涉之時蓋以什之七八理古以什之二三考今識迷於多旁宜莫能兩精已既屢試弗售府君患之謂謨曰兒之好古亦何異資章甫而適越失正鵠而修招乎於是始以強半考今僅幸一捷隨敝縰視公車義既謁選得獲庠三周星籥日督課諸生重以葺黌宇修獲乘諸務填委置古事未皇理也甲辰冬隨牒入南雍兩司成先生以一時名碩型范多士多士蒸蒸鄉風六館仰遵明教無復事事入擁臯比青襟環侍惟是整襟攤卷恣所畋漁而已同官或戲謂不佞曰此堂其卿之書堂乎不佞戲應之曰此書堂何假南面百城也比退食亦復爾爾兩祀間頗得諸未曾有苐苦善忘謀劄而志焉獨念往牒中事詞多肖不若臚列肖者足備遺忘亦便商訂嘗憶曩時閲史如山公嫗謂甚肖河伯婦蘇則膝不枕佞人甚肖羊侃床不坐閹人岸側人言顧吳郡甚肖塹中兒呼蕭丹陽凡若干則曾述向府君前府君喜而頷之顧未之志也兹益以近段所得彚為一編命曰駢志大都史家為多問出諸子稗官自隋唐而後則鮮及焉曰何不以類志也曰如以類業有類部諸帙涵茹千古比物連類者在兹編何以稱焉計卷率得二十為一集行之餘尚有待云萬厯丙午玄月榖旦海虞陳禹謨書于金閶舟中駢志原序
