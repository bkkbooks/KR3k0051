body:
  text: 駢志卷一明陳禹謨撰甲部上舜得玉厯于河際之巖禹發金簡于宛委之山搜神記舜耕厯山得玉厯于河際之巖舜知天命在己體道不倦吳越春秋禹登宛委山發金簡之書按金簡玉字得通水之理舜耕厯山鳥為之耘禹葬㑹稽鳥為之耘文粹陸龜蒙曰世謂舜之在下也田于厯山象為之耕鳥為之耘吾得于農家請試辨之吾觀耕者行端而徐起墢欲深獸之形魁者無出于象行必端履必深法其端深故曰象耕耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘試禹之績大成而後薦之于天其為端且深非得于象耕乎去四凶恐害于政其為疾且畏非得于鳥耘乎好事者張以就其怪非聖人之意也水經注㑹稽山下有禹廟廟有聖姑像禮樂緯云禹治水旱天賜神女聖姑即其像也山上有禹冢昔大禹即位十年東巡狩崩于㑹稽因而葬之有鳥來為之耘春拔草根秋啄其穢是以縣官禁民不得妄害此鳥犯則刑無赦按論衡云傳書言舜葬于蒼梧象為之耕禹葬㑹稽鳥為之田蓋以聖德所致天使鳥獸報祐之也世莫不然考實之殆虛言也黃龍負舟黑龍負舟淮南子禹南省方濟于江黃龍負舟舟中之人五色無主禹乃熙笑而稱曰我受命于天竭力而勞萬民生寄也死歸也何足以滑和視龍猶蝘蜓顔色不變龍乃弭耳掉尾而逃禹之視物亦細矣南史宋文帝入奉皇統行臺至江陵有黑龍躍負上所乘舟左右莫不失色上謂王曇首曰此乃夏禹所以受天命我何德以堪之殷湯以戊子戰于郕周武以甲子戰于牧吕覽殷湯良車七十乘必死六千人以戊子戰于郕遂禽移大犧登自鳴條乃入巢門遂有夏桀既奔走于是行大仁慈以恤黔首反桀之事遂其賢良順民所喜逺近歸之故王天下又武王虎賁三千人簡車三百乘以要甲子之事于牧野而紂為禽顯賢者之位進殷之遺老而問民之所欲行賞及禽獸行罰不辟天子視殷如周視人如已天下美其德萬民說其義故立為天子夜徑澤中斬蛇伐荻新洲斬蛇漢書高祖被酒夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還高祖醉曰壯士行何畏乃前拔劍斬蛇南史武帝伐荻新洲見大蛇長數丈射之傷明日復至洲裏聞有􅴘臼聲往覘之見童子數人皆青衣于榛中搗藥問其故答曰我王為劉寄奴所射合散傅之帝曰王神何不殺之答曰劉寄奴王者不死不可殺帝叱之皆散仍收藥而反沛公王漢中先主王漢中漢書高帝紀項羽立沛公為漢王王巴蜀漢中四十一縣都南鄭蜀志曹公自長安舉衆南征先主遙策之曰曹公雖來無能為也我必有漢川矣及曹公至先主斂衆拒險終不交鋒積月不拔亡者曰多夏曹公果引軍還先主遂有漢中羣下上先主為漢中王吳書傳國璽文漢宫傳國璽文吳書孫堅入洛掃除漢宗廟祠以太牢堅軍城南甄宫井上旦有五色氣舉軍驚怪莫有敢汲堅令人入井探得漢傳國璽文曰受命于天既夀永昌方圓四寸上紐交五龍上一角缺初黃門張讓等作亂劫天子出奔左右分散掌璽者以投井中應氏漢宫傳國璽文曰受命于天既夀且康獻帝得玉璽孫皓送金璽獻帝起居注得六玉璽于閣上江表傳太康之初孫皓送金璽六枚無有玉虞喜志林曰天子六璽者文曰皇帝之璽皇帝行璽皇帝信璽天子之璽天子行璽天子信璽此六璽所封事異故文字不同殷湯置網而祝唐宗中網而止吕覽湯見祝網者置四面其祝曰從天墜者從地出者從四方來者皆離吾網湯曰嘻盡之矣非桀其孰為此也湯收其三面置其一面更教祝曰昔蛛蝥作網罟今之人學紓欲左者左欲右者右欲高者高欲下者下吾取其犯命者漢南之國聞之曰湯之德及禽獸矣四十國歸之人置四面未必得鳥湯去其三面置其一面以網其四十國非徒網鳥也酉陽雜爼唐太宗觀魚于西宫見魚躍焉問其故漁者曰此當乳也于是中網而止周文襪繫解自結晉文履繫解自結韓非子文王伐崇至鳳黃虛襪繫解因自結太公望曰何為也王曰上君與處皆其師中皆其友下盡其使也今皆先君之臣故無可使也吕氏春秋武王至殷郊係墮五人御于前莫為之係曰吾所以事君者非係也武王左釋白羽右釋黃鉞勉而自為係韓非子晉文公與楚戰至黃鳯之陵履繫解因自結之左右曰不可以使人乎公曰吾聞上君所與居皆其所畏也中君之所與居皆其所愛也下君之所與居皆其所侮也寡人雖不肖先君之人皆在是以難之也秦孝公前席衛鞅漢文帝前席賈誼史記衛鞅復見孝公公與語不自知䣛之前于席也語數日不厭景監曰子何以中吾君吾君之歡甚也鞅曰吾說君以帝王之道比三代而君曰久逺吾不得待且賢君者各及其身顯名天下安能邑邑待數十百年以成帝王乎故吾以彊國之術說君君大說之耳然亦難以比德于殷周矣漢書文帝思賈誼徵之至入見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席既罷曰吾久不見賈生自以為過之今不及也魏書王肅字恭懿導之後也太和十七年奔魏高祖聞肅至虛襟待之引見問故肅韻音雅暢辨而有禮高祖嗟納之促席移景不覺坐之疲淹也後為豫州刺史尋徵入朝高祖手詔曰不見君子中心如醉一日三歲我勞如何飾館華林拂席相待卿欲以何日發汝墳也故復此敕不冠不見法服以見漢書大將軍衛青侍中上踞厠祝之丞相𢎞燕見上或時不冠至如見汲黯不冠不見也志林云漢武帝無道無足觀者惟踞厠見衛青不冠不見汲長孺為可嘉耳若青奴才雅宜䑛痔踞厠見之正其宜也魏志明帝著帽被縹綾半裒袖楊阜問帝曰此于禮何法服也帝默然不答自是不法服不以見阜漢哀帝識鄭尚書履聲宋武帝知鄭尚書自來漢書鄭崇每見曳革履上笑曰我識鄭尚書履聲南史鄭鮮之為武帝所狎上曾內殿宴飲朝貢畢至唯不召鮮之坐定謂羣臣曰鄭鮮之必當自來俄而外啓尚書鄭鮮之詣神獸門求啓事帝大笑引入桓榮東面几杖王祥南面几杖後漢書桓榮傳顯宗即位尊榮以師禮甚見親重帝乘輿常幸太常府命榮坐東面設几杖天子親自執業既罷悉以大官供具賜太常家其恩禮若此晉書王祥拜大常天子幸太學命為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖主君臣政化之要以訓之聞者莫不砥礪命胥臣以先茅賞士伯以瓜衍左傳初臼季使過冀見冀缺耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞出門如賓承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不恭不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫反自箕襄公以三命命先且居將中軍以再命命先茅之縣賞胥臣曰舉郤缺子之功也以一命命郤缺為卿復與之冀又晉侯賞桓子狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職說是賞也曰周書所謂庸庸祗祗者謂此物也夫士伯庸中行伯君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳錫哉周能施也率是道也其何不濟齊桓公賞鮑叔晉文公賞子虎吕覽管子束縛在魯桓公欲相鮑叔鮑叔曰吾君欲霸王則管夷吾在彼臣弗若也桓公曰夷吾寡人之賊也射我者也不可叔曰夷吾為其君射人者也君若得而臣之則彼亦將為君射人桓公不聽彊相鮑叔固辭讓而相桓公果聽之于是乎使人告魯曰管夷吾寡人之讐也願得之而親加手焉魯君許諾乃使吏鞹其拳膠其目盛之以鴟夷置之車中至齊境桓公使人以朝車迎之祓以爟火釁以犧猳焉生與之如國命有司除廟筵几而薦之曰自孤之聞夷吾之言也目益明耳益聰孤弗敢專敢以告于先君因顧而命管子曰夷吾佐豫管仲還走再拜稽首受令而出管子治齊國舉事有功桓公必先賞鮑叔曰使齊國得管子者鮑叔也桓公可謂知行賞矣又晉文公將伐鄴趙衰言所以勝鄴之術文公用之果勝還將行賞衰曰君將賞其本乎賞其末乎賞其末則騎乘者存賞其本則臣聞之郤子虎文公召郤子虎曰衰言所以勝鄴既勝將賞之曰蓋聞之于子虎請賞子虎子虎曰言之易行之難臣言之者也公曰子無辭郤子虎不敢固辭乃受矣凡行賞欲其博也博則多助今虎非親言者也而賞猶及之此踈逺者之所以盡能竭智者也晉文公亡久矣歸而因亂之餘猶能以霸其由此歟秦繆公禮由余漢武帝重日磾史記戎王使由余于秦由余其先晉人也亡入戎能晉言聞繆公賢故使由余觀秦秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣繆公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治不亦難乎由余笑曰此乃中國所以亂也夫戎夷不然上含淳德以遇其下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也于是繆公退而問內史廖曰孤聞鄰國有聖人敵國之憂也今由余賢寡人之害將奈之何內史廖曰戎土處辟匿未聞中國之聲君試遺其女樂以奪其志為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也且戎王好樂必怠于政繆公卒用內史廖計由余遂去降秦繆公以客禮禮之問伐戎之形後用其謀伐戎王益國十二開地千里遂霸西戎漢書金日磾字翁叔本胸奴休屠王太子也單于怨昆邪休屠居西方多為漢所破召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之并將其衆降漢封昆邪王為列侯日磾以父不降見殺與母閼氏弟倫俱沒入官輸黃門飬馬時年十四矣久之武帝游宴見馬後宫滿側日磾等數十人牽馬過殿下莫不竊視至日磾獨不敢日磾長八尺二寸容貌甚嚴馬又肥好上異而問之具以本狀對上竒焉即日賜湯沐衣冠拜為馬監遷侍中郎駙馬都尉光祿大夫日磾既親近未嘗有過失上甚信愛之賞賜纍千金出則驂乘入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉解裘覆柔以蓋覆基魏氏春秋高柔既處法平允又夙夜匪懈至擁膝抱文書而寢太祖常夜微行觀察諸吏見柔哀之徐解裘覆柔而去自是辟焉吳志孫權大暑時嘗于船中宴飲于船樓上值雷權以蓋自覆又命覆劉基餘人不可得也吳書曰基遭多難嬰丁困苦潛處味道不以為戚與弟祥居常夜臥早起妻妾希見其面諸弟敬憚事之猶父不妄交游門無雜賔又吳志吳軍振旅過武昌孫權令左右以御蓋覆陸遜出入殿門凡所賜遜皆御物上珍于是莫與為比齊高祖為崔暹授轡齊世宗為崔暹回馬北齊書高祖賜崔暹良馬使騎之以從且行且語暹下拜馬驚走高祖親為擁之而授轡又世宗欲假崔暹威勢諸公在坐令暹高視徐步兩人擎裾而入世宗分庭對揖暹下讓席而坐觴再行便辭退世宗曰下官薄有疏食願公少留暹曰適受敇在臺檢校遂不待食而去世宗降階送之旬日後世宗與諸公出之東山遇暹于道前驅為赤棒所擊世宗回馬避之每有好官缺未嘗不先憶羊𤣥保每有好官闕即望宰相論及蘇頲南史宋文帝嘗曰人仕宦非唯須才亦須運命每有好官缺我未嘗不先憶羊𤣥保舊唐書蘇頲為中書侍郎仍供政事食明日加知制誥有政事食自頲始也頲入謝𤣥宗曰常欲用卿每有好官缺即望宰相論及宰相皆卿之故人卒無言者朕為卿嘆息金錢愧心賜絹愧心漢書文帝贊張武等受賂金錢覺更加賞賜以愧其心舊唐書長孫順德監奴受人餽絹事發太宗惜其功不忍加罪遂于殿庭賜絹數十匹以愧其心大理少卿胡演進曰順德枉法受財罪不可恕奈何又賜之絹太宗曰人生性靈得絹甚于刑戮如不知愧一禽獸耳殺之何益邾文公不惜遺已以愛民宋景公不欲殺民以自活左傳邾文公卜遷于繹史曰利于民不利于君邾子曰茍利于民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命又吕覽周文王立國八年歲六月文王寢疾五日而地動東西南北不出國郊百吏皆請曰臣聞地之動為人主也今王寢五日而地動四面不出周郊羣臣皆恐曰請移之文王曰若何其移之也對曰興事動衆以增國城其可以移之乎文王曰不可夫天之見妖也以罰有罪也我必有罪故天以此罰我也今故興事動衆以增國城是重吾罪也不可昌也請改行重善以移之其可以免乎于是謹其禮秩皮革以交諸侯飭其辭令幣帛以禮豪士頒其爵列等級田疇以賞羣臣無幾何疾乃止文王即位八年而地動已動之後四十三年凡文王立國五十一年而終此文王之所以止殃剪妖也吕覽宋景公之時熒惑在心公懼召子韋而問焉曰熒惑在心何也子韋曰熒惑者天罰也心者宋之分野也禍當于君雖然可移于宰相公曰宰相所與治國家也而移死焉不祥子韋曰可移于民公曰民死寡人將誰為君乎寧獨死子韋曰可移于歲公曰歲害則民饑民饑必死為人君而殺其民以自活也其誰以我為君乎是寡人之命固盡已子無復言矣子韋還走北面載拜曰臣敢賀君天之處高而聽卑君有至德之言三天必三賞今夕熒惑其徙三舍君延年二十一歲公曰子何以知之對曰有三善言必有三賞熒惑有三徙舍舍行七星星一徙當一年三七二十一臣故曰君延年二十一歲矣臣請伏于陛下以伺侯之熒惑不徙臣請死之公曰可是夕熒惑果徙三舍光武不省曹公皆焚後漢帝紀光武誅王郎收文書得吏人與郎交關謗毁者數千章光武不省㑹諸將軍燒之曰令反側子自安魏志公收袁紹書中得許下及軍中人書皆焚之魏氏春秋曰公云當紹之彊孤猶不能自保而况衆人乎晉武帝焚雉頭裘隋文帝焚綾文布晉咸寧起居注大司馬程據上雉頭裘一領詔曰據此裘非常衣服消費功用宜於殿前燒之元經隋文帝開皇十五年夏六月焚綾文布湘州進詔焚之不許金塗釘命毁玉介導南史宋武帝紀宋臺建有司奏東西堂施局腳床金塗釘上不許使用直腳床釘用鐡帝素有熱病并患金創末年尤劇坐臥常須冷物後有人獻石牀寢之極以為佳乃歎曰木牀且費而况石邪即令毁之又齊高帝紀帝身不御精細之物主衣中有玉介導以長侈奢之源命打破之凡異物皆令隨例毁棄後宫器物欄檻以銅為飾者皆改用鐡內殿施黃紗帳宫人著紫皮履華蓋除金華瓜用鐡回釘每曰使我臨天下十年當使黃金與土同價投籖警枕陳書宣帝日昃劬勞每雞人伺漏傳更籖于殿中乃敇送者必投籖于階石之上令鎗然有聲云吾雖眠亦令驚覺也吳越備史武肅王錢鏐在軍中未嘗安寢復用圓木小枕睡熟則欹由是得寤名曰警枕不忌反支日不遷四廢日不避往亡日濳夫論云明帝問今旦何得無上書者左右對曰反支故帝曰民既廢農逺來詣闕而復避反支是則又奪其日而寃之也乃敕公車受章不避反支又宋武帝將拜南蠻校尉遇四廢日佐史鄭鮮之等白遷日不許宋武帝以往亡起兵軍吏以為不可帝曰我往彼亡果克之又舊唐書李訴初將攻吳房軍吏曰往亡日請避之訴曰賊以往亡謂我不來正可擊也及戰勝捷而歸太宗發哀不避辰日太宗餌藥不避臨喪舊唐書張公謹卒太宗聞而嗟悼出次發哀有司奏言凖隂陽書曰子在辰不可哭泣又為流俗所忌太宗曰君臣之義同于父子情發于𠂻安避辰日遂哭之又高士廉薨太宗命駕將臨之司空房𤣥齡以上餌藥石不宜臨喪抗表切諫上曰朕之此行豈獨為君臣之禮兼以故舊情深婭戚義重卿勿復言也太宗從數百騎出興安門至延喜門長孫無忌馳至馬前諫曰餌藥臨喪經方明忌其言甚切太宗猶不許無忌乃伏于馬前帝始還宫新羅獻女樂二人遣還之高麗獻美女二人並還之舊唐書貞觀五年新羅遣使獻女樂二人皆鬒髮美色太宗謂侍臣曰朕聞聲色之娛不如好德且山川阻逺懷土可知近日林邑獻鸚鵡尚解思鄉訴情還國鳥猶如此况人情乎愍其逺來必思親戚宜付使者聽遣還家又貞觀二十年高麗遣使來謝罪并獻二美女太宗謂其使曰歸謂爾主美色者人之所重爾之所獻信為美麗憫其離父母兄弟于本國留其身而忘其親愛其色而傷其心我不取也並還之不與鮑魚不進邪蒿賈太傅新書文王使太公望傅太子發嗜鮑魚公不與曰鮑魚不登爼豈有非禮而可養太子哉北史邢峙仕齊以經授皇太子峙方正純厚有儒者風厨宰進太子食菜有邪蒿峙令去之曰此菜有不正之名非殿下宜食文宣聞而嘉之賜以被褥縑纊唐書乾封初太子𢎞稀見宫臣典膳邢文偉輒申减膳太子答曰尋觀來請良符宿志自非義均弼諧渠能進此藥石其年左史闕上曰邢文偉以吾兒不讀書不肯與肉此人甚正直遂拜焉漢武帝為太子立博望苑梁武帝為太子立慧義殿漢書孝武皇帝年二十九乃得戾太子甚喜為立禖使東方朔枚臯為禖祝少壯詔受公羊春秋又從瑕丘江公受榖梁及冠就宫上為立博望苑使通賔客從其所好故多以異端進者南史梁武帝大𢎞佛教親自講說昭明太子亦素信三寶遍覽衆經乃于宫內别立慧義殿專為法集之所招引名僧自立三諦法義詔王褒誦讀竒文虞侍太子命王褒賦詩談論恆在左右漢書王褒為諌大夫其後太子體不安苦忽忽善忘不樂詔使褒等皆之太子宫虞侍太子朝夕誦讀竒文及所自造作北史王褒與庾信才名最高特加親待帝每游宴命褒賦詩談論恆在左右皇太子贈疏廣黃金五十斤皇太子賜陸罩黃金五十斤漢書疏廣為太傅廣兄子受為少傅後父子俱移病滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供張東都門外送者車數百兩梁書陸罩為太子中庶子掌管記禮遇甚厚大同七年以母老求去公卿以下祖道于征虜亭皇太子賜黃金五十斤齊神武留紹宗與世子唐太宗留李績與太子北史齊神武謂世子曰侯景專制河南十四年矣常有飛揚跋扈之志顧我能養豈為汝駕御也少堪敵侯景者唯有慕容紹宗我故不貴之留以與汝宜深加殊禮委以經略舊唐書李績除太子詹事太宗寢疾謂高宗曰汝與李績無恩我今將責出之我死後汝當授以僕射即荷汝恩必致其死力乃出為疊州都督高宗即位其月召拜洛州刺史尋加開府儀同三司令同中書門下參掌機密是歲册拜尚書左僕射評曰啇書云敷求哲人俾輔後嗣人主誠計詒謀其亟樹人也惟恐當吾世失之耳豈故不貴之又故責出之也若圖報必須感恩則彼受顧命大臣獨不思效之幼主哉惑矣夫世主者以術馭臣者也紹宗無論乃李績所為報高宗者竟何如益信文皇之術陋矣廷理斬太子之輈廷理擊太子之馬韓非子荆莊王有茅門之法曰羣臣大夫諸公子入朝馬蹄踐霤者廷理斬其輈戮其御于是太子入朝馬蹄踐霤廷理斬其輈戮其御太子怒入為王泣曰為我誅戮廷理王曰法者所以敬宗廟尊社稷故能立法從令尊敬社稷者社稷之臣也焉可誅也夫犯法廢令不尊敬社稷者是臣乘君而下尚校也臣乘君則主失威下尚校則上位危社稷不守吾將何以遺子孫于是太子乃還走避舍露宿三日北面再拜請死罪又楚王急召太子楚國之法車不得至于茆門天雨庭中有潦太子遂驅車至于茆門廷理曰車不得至茆門非法也太子曰王召急不得須無潦遂驅之廷理殳而擊其馬敗其駕太子入為王泣曰庭中多潦驅車至茆門廷理曰非法也舉殳擊臣馬敗臣駕王必誅之王曰前有老主而不踰後有儲主而不屬矜矣是直居守法之臣也乃益爵二級而開後門出太子勿復過又漢書張釋之傳太子與梁王共車入朝不下司馬門于是釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹薄太后使使承詔赦太子梁王然後得入文帝由是竒釋之天子子過誤殺人天子兒過誤殺人漢書車千秋為高寢郎㑹衛太子為江充所譖敗久之千秋上急變訟太子寃曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋至前千秋長八尺餘體貌甚麗武帝見而說之謂曰父子之問人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐南史巴東王子響殺僚佐武帝召戴僧靜使領軍向江陵僧靜面啓上曰巴東王年少長史司馬太急忿不思難故耳天子兒過誤殺人有何大罪今急遣軍西上人情惶懼無所不至臣不敢奉敇上不答而心善之漢武感千秋之言作思子宫晉惠感閻纘之言作思子臺漢書武帝既知戾太子惶恐無它意而車千秋復訟太子寃上遂擢千秋為丞相而族滅江充家焚蘇文于橫橋上及泉鳩里加兵創于太子者初為北地太守後族上憐太子無事乃作思子宫為歸來望思之臺于湖天下聞而悲之晉書愍懷太子之喪大風雷電幃蓋飛裂惠帝感閻纘之言立思子臺故臣江統陸機並作誄頌焉殷基通語載朱據擁護太子其言曰臣聞太子國之本根雅性仁孝天下歸心今卒責之將有一朝之慮昔晉獻用驪姬而申生不存漢武信江充而戾太子寃死臣竊懼太子不堪其憂雖立思子之宫無所復及矣搖山玉彩搖山往則舊唐書孝敬皇帝𢎞龍朔初命許敬宗上官儀等于文思殿博採古今文集摘其英詞麗句以類相從勒成五百卷名曰搖山玉彩表上之又許敬宗傳自貞觀以來朝廷所修五代史及晉書東殿新書西域圖志文思博要文館詞林纍璧瑶山玉彩姓氏録新禮皆揔知其事前後賞賚不可勝紀唐書裴光庭為𢎞文館學士造搖山往則維城前軌二篇獻之明皇詔皇太子諸王于光順門見光庭謝所以規諷意按山海經西北海之外有搖山其上有人號曰太子長琴顓頊生老童老童生祝融祝融生太子長琴是處搖山始作樂風劉章取喻于立苖雍王示諷于種瓜漢書趙王既廢高后立諸吕為三王擅權用事劉章入侍高后宴酒酣章進歌舞已而曰請為太后言耕田高后兒子畜之笑曰顧而父乃知田耳若生而為王子安知田乎章曰臣知之太后曰試為我言田意章曰深耕穊種立苖欲疏師古曰穊稠也穊種者言多生子孫也疏立者四散置之令為藩輔也穊音冀非其種者鉏而去之太后默然舊唐書高宗子八人我后所出者自為行第長曰孝敬皇帝監國仁明為后所忌而鴆之次曰雍王賢為太子次曰中宗次曰睿宗及孝敬遇害諸弟嘗所不安晨夕懷懼雖父母之前無由敢言太子賢乃作黃臺瓜詞令樂人歌之欲微悟上意歌曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚猶可四摘抱蔓歸后默然太子竟亦流竄于黔州賈詡屬思吳質耳白崔琰露板魏志文帝為五官將而臨菑侯植才名方盛各有黨與有奪宗之議文帝使人問賈詡自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又嘗屏除左右問詡詡默然不對太祖曰與卿言而不答何也詡曰屬適有所思故不即對耳太祖曰何思詡曰思袁本初劉景升父子也太祖大笑于是太子遂定又魏國初建未立太子臨菑侯植有才而愛太祖狐疑以函令密訪于外唯崔琰露板答曰蓋聞春秋之義立子以長如五官將仁孝聰明宜承正統琰以死守之植琰之兄女壻也太祖貴其公亮喟然歎息世說魏王嘗出征世子及臨菑侯植並送路側植稱述功德發言有章左右屬目王亦悅焉世子悵然自失吳質耳白王當行流涕可也及辭世子泣而拜王及左右咸􅒣欷于是皆以植辭多華而誠心不及也毒胙而獻毒饋以進左傳驪姬謂太子申生曰君夢齊姜必速祭之太子祭于曲沃歸胙于公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子太子奔新城公殺其傅杜原欵或謂太子子辭君必辨焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎太子曰君實不察其罪被此名也以出人誰納我遂縊于新城復譖二公子曰皆知之重耳奔蒲夷吾奔屈晉書庾懌嘗以毒酒餉江州刺史王允之王允之覺其有毒飲犬犬斃乃密奏之帝曰大舅已亂天下小舅復欲爾邪華陽國志蜀侯惲祭山川獻饋于秦孝文王惲後母害其寵加毒以進王王將嘗之後母曰饋從二千里來當試之王與近臣近臣即斃文王大怒遣司馬錯賜惲劔使自裁惲懼夫婦自殺秦誅其郎中令嬰等二十七人蜀人葬惲郭外豎牛讒而殺壬妾余讒而殺甲韓非子叔孫相魯貴而主斷其所愛者曰豎牛亦擅用叔孫之令叔孫有子曰壬豎牛妒而欲殺之因與壬游于魯君所魯君賜之玉環壬拜受之而不敢佩使豎牛請之叔孫豎牛欺之曰吾已為爾請之矣使爾佩之壬用佩之豎牛因謂叔孫何不見壬于君乎叔孫曰孺子何足見也豎牛曰壬固已數見于君矣君賜之玉環壬已佩之矣叔孫召壬見之而果佩之叔孫怒而殺壬壬兄曰丙豎牛又妬而欲殺之叔孫為丙鑄鍾鍾成丙不敢擊使豎牛請之叔孫豎牛不為請又欺之曰吾已為爾請之矣使爾擊之丙因擊之叔孫聞之曰丙不請而擅擊鍾怒而逐之丙出走齊居一年豎牛為謝叔孫叔孫使豎牛召之又不召而報之曰吾已召之矣丙怒甚不肯來叔孫大怒使人殺之二子已死叔孫有病豎牛因獨養之而去左右不內人曰叔孫不欲聞人聲因不食而餓殺叔孫已死豎牛因不發喪也徙其府庫重寶空之而奔齊夫聽所信之言而父子為人僇此不參之患也又楚莊王之弟春申君有愛妾曰余春申君之正妻有子曰甲余欲君之棄其妻也因自傷其身以視君而泣曰得為君之妾甚幸雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸于左右願君必察之無為人笑君因信妾余之詐為棄正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非弗知也今乃欲彊戲余余與爭之至裂余之衣而此子之不孝莫大于此矣君怒而殺甲也故妻以妾余之詐棄而子以之死從是觀之父之愛子也猶可因而害也君臣之相與也非有父子之親也而羣臣之毁言非特一妾之口也何怪夫賢聖之戮死哉為善最樂為善最多東觀漢記東平王蒼少有孝友之質寬仁𢎞雅明帝詔書示諸國曰詔問東平王蒼處家何等最樂王對曰為善最樂帝曰其言甚大副其腰腹矣南史齊武帝嘗問臨川王映居家何事樂映曰政使劉瓛講禮顧􅀢講易朱廣之講莊老臣與二三諸彥兄弟友生時復擊贊以此為樂上大賞之他日謂豫章王嶷曰臨川為善遂至於斯嶷曰此大司馬公之次弟安得不爾上仍以玉如意指嶷曰未若皇帝之次弟為善最多也漢河間王服儒術齊河間王愛文學漢書河間獻王德被服儒術造次必于儒者北史齊河間康獻王孝瑜字正德謙慎寬厚兼愛文學魏任城王破叛胡桑乾唐任城王敗突厥城下魏志曹彰與叛胡搏戰乘勝逐北至于桑乾去代二百餘里長史諸將皆以為新涉逺士馬疲頓又受節度不得過代不可深進違令輕敵彰曰率師而行唯利所在何節度乎胡走未逺追之必破從令縱敵非良將也遂上馬令軍中後出者斬一日一夜與虜相及擊大破之黃初三年立為任城王舊唐書梁師都據夏州遣弟洛兒引突厥兵數萬至于城下李道宗閉門拒守伺隟而戰賊徒大敗高祖聞而嘉之謂左僕射裴寂中書令蕭瑀曰道宗今能守邊以寡制衆昔魏任城王彰臨戎却敵道宗勇敢有同於彼遂封為任城王此我家任城此我之任城南齊書世祖嘗幸鍾山長沙威王晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀纒皆卷聚而稍不出乃令晃復馳馬拔之應手便去每逺州獻駿馬上輒令晃于華林中調試之太祖常曰此吾家任城也世祖緣此意故諡曰威梁書廬陵威王續少英果膂力絶人馳射游獵應發命中高祖常歎曰此我之任城也共叔之死母實為之趙王之戮父實使之左傳初鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏故名曰寤生遂惡之愛共叔段欲立之亟請于武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城太叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而太叔命西鄙北鄙二于已公子吕曰國不堪二君將若之何欲與太叔臣請事之若弗與則請除之無生民心公曰無庸將自及太叔又收二以為己邑至于廩延子封曰可矣厚將得衆公曰不義不昵厚將崩太叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛太叔段段人于鄢公伐諸鄢五月辛丑太叔出奔共漢書高祖為漢王時得定陶戚姬愛幸生趙隱王如意太子為人仁弱高祖以為不類己常欲廢之而立如意如意類我戚姬常從上之關東日夜啼泣欲立其子吕后年長常留守希見益疏如意且立為趙王留長安幾代太子者數賴公卿大臣爭之及叔孫通諌用留侯之策得無易吕后為人剛毅佐高帝定天下兄二人皆為列將從征伐長兄澤為周吕侯次兄釋之為建成侯逮高祖而矦者三人高祖四年臨泗矦吕公薨高祖崩惠帝立吕后為皇太后乃令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告女太后聞之大怒曰乃欲倚女子邪乃召趙王誅之使者三反趙相周昌不遣太后召趙相相徴至長安使人復召趙王王來惠帝慈仁知太后怒自迎趙王霸上入宫挾與起居飲食數月帝晨出射趙王不能蚤起太后伺其獨居使人持鴆飲之遲帝還趙王死顔氏家訓人之愛子罕亦能均自古及今此弊多矣賢俊者自可賞愛頑魯者亦當矜憐有偏寵者雖欲以厚之更所以禍之共叔之死母實為之趙王之戮父實使之劉表之傾宗覆族袁紹之地裂兵亡可為靈龜明鑒也賜吳王濞几杖不朝賜淮南王几杖不朝漢書孝文時吳太子入見得侍皇太子飲博吳太子師傅皆楚人輕悍又素驕博爭道不恭皇太子引博局提吳太子殺之于是遣其喪歸葬吳吳王濞愠曰天下一家死長安即葬長安何必來葬復遣喪之長安葬吳王由是怨望稍失藩臣禮稱疾不朝京師知其以子故驗問實不病諸吳使來輒係責治之吳王恐所謀滋甚及後使人為秋請孟康曰律春曰朝秋曰請如古諸侯朝聘也上復責問吳使者使者曰察見淵中魚不祥今吳王始詐疾反覺見責急愈益閉恐上誅之計乃無聊唯上與更始于是天子皆赦吳使者歸之而賜吳王几杖老不朝吳得釋其謀亦益解又建元六年彗星見淮南王安心怪之或說王曰先吳軍時彗星出長數尺然尚流血千里今彗星竟天天下兵當大起王心以為上無太子天下有變諸矦並爭愈益治攻戰具積金錢賂遺郡國游士妄作妖言阿諛王王喜多賜豫之王有女陵慧有口王愛陵多豫金錢為中詗長安約結上左右元朔二年上賜淮南王几杖不朝燕刺王自歌廣陵王自歌漢書燕刺王旦事覺憂悶置酒萬載宫㑹賔客羣臣妃妾坐飲王自歌曰歸空城兮狗不吠雞不鳴橫術何廣廣兮固知國中之無人華容夫人起舞曰髮紛紛兮置渠骨籍籍兮亡居及得璽書以符璽屬醫工長謝相二千石奉事不謹死矣即以綬自絞又廣陵厲王胥祝詛事發覺天子遣廷尉大鴻臚即訊胥既見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲久生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下兮幽深人生要死何苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閲死不得取代庸身自逝左右悉更涕泣奏酒至雞鳴時罷胥謂太子霸曰上遇我厚今負之甚我死骸骨當㬥幸而得葬薄之無厚也即以綬自絞死文帝母薄太后貴徵文帝母王太后貴相漢書高祖薄姬文帝母也父吳人秦時與故魏王宗女魏媪通生薄姬而薄姬父死山隂因葬焉及諸侯畔秦魏豹立為王而魏媪內其女于魏宫許負相薄姬當生天子是時項羽方與漢王相距滎陽天下未有所定豹初與漢擊楚及聞許負言心喜因背漢而中立與楚連和漢使曹參等虜魏王豹以其國為郡而薄姬輸織室豹已死漢王入織室見薄姬有詔內後宫歲餘不得幸始姬少時與管夫人趙子兒相愛約曰先貴毋相忘已而管夫人趙子兒先幸漢王漢王四年坐河南成臯靈臺此兩美人侍相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨暮夢龍據妾胸上曰是貴徵也吾為汝成之遂幸有身歲中生文帝論衡王莽姑正君許嫁至期當行時夫輒死如此者再乃獻之趙王趙王未取又薨清河南宫人有與正君父稚君善者遇相正君曰貴為天下母是時宣帝世元帝為太子稚君乃因魏郡都尉納之太子太子幸之生子君上宣帝崩太子立正君為皇后君上為太子元帝崩太子立是為成帝正君為皇太后竟為天下母又丞相黃次公故為陽夏游徼與善相者同車俱行見一婦人年十七八相者指之曰此婦人當大富貴為封侯者夫人次公止車審視之相者曰令此婦人不富貴卜書不用也次公問之乃其㫄里人巫家子也即娶以為妻其後次公果大富貴位至丞相封為列侯次公名霸何凖生女之夕羣烏夜啼則天初誕之夕雌雉皆雊晉志海鹽南三里有烏夜村晉何凖所居也一夕羣烏啼噪凖適生女他日復夜啼乃穆帝立凖女為后之日酉陽雜爼則天初誕之夕雌雉皆雊右手中指有黑毫左旋如黑子引之尺餘一夜齒盡生無何疣盡失晉書成恭杜皇后少有姿色然長猶無齒有來求婚者輒中止及帝納采之日一夜齒盡生南史梁武丁貴嬪生而有赤痣在左臂療之不滅又體多疣子及帝贈以金環納之無何盡失所在駢志卷一
