body:
  text: 駢志卷十八明陳禹謨撰壬部下雙鵠為引衆鳥翊從宋志孝武帝孝建元年正月庚申鳳凰見丹徒渴賢亭雙鵠為引衆鳥陪從征虜將軍武昌王渾以聞唐志長夀三年十一月陳州上言宛丘縣鳳凰集衆鳥數萬前後翊從行列齊整色别為羣後三日改元為儀鳳羽豪羽宗苻子齊景公謂晏子曰寡人既得寶乘聚萬駟矣方欲珠懸黎會金玉其得之即奚若晏子曰臣聞琬琰之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肺不食非鳳血不飲其食也常飢而不飽其飲也常渴而不充生未幾何夭其天年而死珠玉之珍非乃為君之患也相鶴經鶴者陽鳥也而遊于隂因金氣依火精以自養行必依洲嶼止不集林木蓋羽族之宗長仙人之騏驥也又禽經鶴愛隂而惡陽鴈愛陽而惡隂禦火禦水山海經小華之山鳥多赤鷩可以禦火符禺之山其獸多葱蘢其狀如羊而赤鬛其鳥多鴖其狀如翠而赤喙可以禦火翠山其鳥多鸓其狀如鵲赤黑而兩首四足可以禦火涿光之山囂水出焉而西流注于河其中多鰼鰼之魚其狀如鵲而十翼鱗皆在羽端其音如鵲可以禦火丑陽之山有鳥焉其狀如烏而赤足名􅀈餘可以禦火崌山有鳥焉狀如鴞而赤身白首其名曰竊脂可以禦火即公之山有獸焉其狀如龜而白身赤首名曰蛫是可以禦火又崑崙之丘有木焉其狀如棠華黄赤實其味如李而無核名曰沙棠可以禦水食之使人不溺熒熒之鳥同同之鳥策策之魚堂堂之魚衝波傳子路顔淵浴於珠水見五色鳥顔淵問由識此鳥否子路曰熒熒之鳥後日顔囘與子路又浴于泗水更見前鳥復問由識此鳥否子路曰同同之鳥顔囘曰何一鳥而二名子路曰譬如絲絹煑之則為帛染之則為皁一鳥二名不亦宜乎譚子化書庚氏穴池構竹為凭欄登之者其聲策策焉辛氏穴池構木為凭欄登之者其聲堂堂焉二氏俱牧魚于池中每凭欄投餌魚必踴躍而出後但聞策策堂堂之聲不投餌亦踴躍而出則是庚氏之魚可名策策辛氏之魚可名堂堂食之化也鶼鶼蠻蠻山海經南方有比翼鳥不比不飛其名謂之鶼鶼史記古之封禪西海致比翼之鳥拾遺記成王時然丘國獻比翼鳥雌雄各一以玉為樊周書成王時巴人獻比翼鳥又崇吾之山有鳥其狀如鳬而一翼一目相得乃飛名曰蠻蠻見則天下大水孝烏仁烏尚書緯烏有孝名武王卒父大業故烏瑞臻譙子法訓曰夫孝行之本替本而求末未見得之者也烏者而有反哺况人而無孝心者乎拾遺記晉文公焚山求介子推有白烏遶烟而噪或集介子推側火不能焚晉人嘉之起思烟臺其烏云仁烏烏棲府烏集㦸漢書御史府中列栢樹常有野烏數千棲宿其上晨去暮來號朝夕烏又南史高昌國有朝烏者旦旦集王殿前為行列不畏人日出然後散去舊唐書柳仲郢自拜諌議後每遷官羣烏大集于昇平里第庭樹㦸架皆滿凡五日而散詔下不復集家人以為候唯除天平節度烏不復集魯郊之鳥罽賔之鸞莊子昔者有鳥止于魯郊魯君説之為具大牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以已養養鳥也范太鸞鳥詩序罽賓國王結􅆯峻岐之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊享以珍羞而鸞對之愈戚三年不鳴夫人曰聞鳥見其類而後鳴可懸鏡以映之王從言鸞觀影感契慨焉悲鳴哀響中宵一奮而絶鸚鵡訴苦寒鸚鵡持佛號舊唐書貞觀五年林邑獻五色鸚鵡數訴寒適新羅獻美女二人魏徵以為不宜受太宗喜曰林邑鸚鵡猶能自言苦寒思歸况二女之逺别親戚乎并鸚鵡各付使者歸之韋臯鸚鵡舍利塔記貞元中有獻鸚鵡鳥者河東裴氏志樂金仙之道以此鳥名載梵經常狎而敬之始告以六齋之禁比及辰後非時之食終夕不視或教以持佛名號者則仰首奮翼若善承聽或俾之念佛則黙然而不答或謂之不念即唱言阿彌陀厯試不爽貞元十九年七月悴爾不懌已而日甚馴養者知將盡乃鳴磬曰將西歸乎為爾擊磬爾其存念每一擊磬一稱彌陀佛洎十擊磬而十念成歛翼委足奄然而絶焚之得舍利十餘粒廣州獻吉了廉州獻吉了舊唐書禮樂志嶺南有鳥如鸜鵒而稍大乍視之不相分辨籠養久則能言無不通南人謂之吉了亦云結料開元初廣州獻之言音雄重如丈夫委曲識人情慧于鸚鵡逺矣北户錄普寧有廉州民獲赤白吉了各一頭獻于刺史其赤者尋卒白者久而能言凡笑語悉皆效人斯珍禽也按唐會要林邑國有結遼焉謂之吉了鳥能人語又僉載天后時左衛兵遭劉景陽使嶺南得秦吉了二隻能解人語至都進之畱其雌者雄煩怨不食則天問曰何乃無聊也鳥曰其配為使者所得頗思之乃呼景陽曰卿何故藏一鳥不進景陽叩頭謝罪乃進之則天不罪也聞見録瀘南有畜秦吉了者亦能人言有夷酋欲以錢三十萬買之其人告以貧將賣爾秦吉了曰我不願更二主遂不食而死評曰秦吉了一能言之鳥耳猶不願更二主彼靦顔事二君者真鳥之不如矣變而之仁變而之不仁變而之善變而之不善夏小正云鷹為鳩變而之仁鳩為鷹變而之不仁也䑕為鴽變而之善鴽為䑕變而之不善也又搜神記曰春分之日鷹變為鳩秋分之日鳩變為鷹時之化也鷹制鵬雛朔識鵬雛幽明録楚文王少時有人獻一鷹爪頭神爽殊絶常鷹故為獵于雲夢􅆯網雲布烟燒漲天毛羣飛旋爭噬競搏此鷹軒頸瞪目逺視雲際無搏噬之志王曰吾鷹所獲以百數汝鷹曾無奮意將欺余耶獻者曰若效于雉兎臣豈敢獻俄而雲際有一物翺翔飄颻鮮白而不辨其形鷹見之便竦翮而升矗若飛電須㬰羽墮如雪血下如雨良久有一大鳥墮地而死度其兩翅廣數十里喙邊有黄衆莫能識時有博物君子曰此大鵬雛也始飛故為鷹所制文王乃厚賞獻者西域貢黑鷹得鵬雛衆莫喻惟東方朔識之鶻放鴿鶻縱禽僉載滄州東光縣寶觀寺常有蒼鶻集重閣每有鴿數千鶻冬中每夕即取一鴿以暖足至曉放之而不殺自餘鷹鶻不敢侵之長安薦福寺有鶻冬取小禽煖𤓰掌旦則縱之視其所適之方則是日不于是方擊搏白鶻送書羣鴿繫書僉載唐太宗養一白鶻號白將軍取鳥常驅至于殿前然後擊殺故名落鷹殿上恒令送書從北至東都與魏王仍取報日徃返數㢠廻開元遺事張九齡少年時家養羣鴿每與親知書信往來只以書繫鴿足上依所教之處飛往投之九齡目之為飛奴時人無不愛訝又大理丞鄭復禮言波斯舶上多養鴿鴿能飛行數千里輒放一隻至家以為平安信朱鴈為樂府白鴈為婚贄漢書禮樂志郊祀歌十九章其十八章象載瑜太始三年行幸東海獲赤鴈作其詩曰赤鴈集六紛員殊翁雜五采文神所見施祉福登蓬萊結無極按孟康曰翁頸也言其文采殊異也舊唐書高宗納右衛將軍裴居道女為太子妃所司奏以白鴈為鷙適㑹苑中獲白鴈高宗喜曰漢獲朱鴈遂為樂府今獲白鴈得為婚贄彼禮但成謡頌此禮便首人倫異代相望我無慙徳也知夜警露淮南子鶴知夜半而不免于鼎爼墨子蝦蟇日夜鳴口乾而人不聽之鶴鷄時夜而鳴天下振動多言何益風土記鳴鶴戒露此鳥性警至八月白露降流于草上滴滴有聲因集高鳴相警移徙所宿處慮有變害也又禽經注露禽鶴也露下則鶴鳴愛隂而惡陽愛陽而惡隂禽經云鶴愛隂而惡陽鴈愛陽而惡隂胎化影生鮑昭舞鶴賦散幽經以驗物偉胎化之仙禽鍾浮曠之藻質抱清逈之明心又雲嶠類要鶴胎生者形體堅小惟食稻梁雖甚馴熟久須飛去鸛合而卵生其體大食魚蝦啄蛇䑕不能去内典鶴影生雌雄相隨如道士歩斗履其跡而孕鶴有凌霄之姿鴈有凌霄之志世説支道林好鶴時有遺其雙鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如有懊䘮意林公曰既有凌霄之姿何肯為人作耳目近玩養令翮成置使飛去載記慕容垂請至鄴拜墓苻堅許之權翼諌曰垂猶鷹也饑則附人飽便高颺若遇風塵之會必有凌霄之志唯宜急其羈絆不可任其所欲堅不從去果不還誓鳥怨鳥述異記精衛狀如海鷰今東海畔精衛誓水處溺于此川誓不飲其水一名誓鳥又山海經女娃遊于東海溺而不返故為精衛常銜西山之木石以堙于東海禽經注子規甌越間曰怨鳥夜啼逹旦血漬草木啼苦則倒懸于樹海上之鷗海上之蜻列子海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從女遊取來吾翫之明日之海上鷗鳥舞而不下蒼頡解詁云鷖鷗也生藕葉上名水鴞南越志云江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似雞卵色青頗知風雲若羣至岸必風漁人及渡海者皆以此為候吕氏春秋海上之人有好蜻者每居海上從蜻遊蜻之至者百數而不止前後左右盡蜻也終日翫之而不去其父告之曰聞蜻皆從女居取而來吾將翫之明日之海上而蜻無至者矣鷓鴣之飛先南子規之啼必北南越志鷓鴣鳥雖復東西㢠廻翔命翮之始必先南翥其鳴自呼杜薄州異物志鷓鴣形似雌雞其志懐南不北徂也其鳴云但南不北酉陽雜俎鷓鴣飛逐月數如正月一日飛而止但伏巢中不復起矣十二月十二日起最難採南人設網取之爾雅云巂周禽經巂周子規也啼必北向博物志杜䳌生子寄之他巢百鳥為飼之杜䳌即子規鶬鶊膳止妬䲭腦酒健忘梁武帝平齊獲侍兒子餘軰頗娯於目為郄后所隔抝憤恚將成疢左右識其情者進言曰臣嘗讀山海經云以鶬鶊為膳可以止妬梁武從之郄茹之後妬殆减半帝神其事左右復言曰願陛下廣為羞以徧賜羣臣使不才者無妬於才挾私者不妬其奉公濁者不嫉其清貧者不忌其廉亦助化之一端也帝然其言將詔虞人廣捕之會崇佛戒殺遂止英華酉陽雜俎肅宗張皇后專權每進酒常寘䲭腦酒令人久醉健忘鸕鷀胎生鸕鷀卵生楊孚異物志鸕鷀能没于深水取魚而食之不生卵而孕雛于池澤間既胎而又吐生多者八九少者五六相連而出若系緒焉水鳥而巢高樹之上又杜臺卿淮賦鸕鷀吐雛于八九鵁鶄銜翼而低昻本草衍義冦宗奭嘗官于澧州公宇後有大木一株其上有鸕鷀三四十巢日夕觀之既能交合兼有卵殻布地其色碧豈得雛吐口中是全未考尋可見當日聽人之誤言也鵜鶘集于芝池魏文下詔鶖鳥獲于宫内崔光進言魏黄初中有鵜鶘集于靈芝池文帝下詔以曹恭公逺君子近小人博求賢俊太尉華歆由此遜位而讓管寧魏書肅宗時獲秃鶖鳥于宫内詔以示崔光光表曰蒙示所得大鳥此即詩所謂有鶖在梁者也臣聞野物入舍古人以為不善是以張臶惡鵀賈誼忌鵩鵜鶘暫集而去前王猶為至誡况今親入宫禁為人所獲方被畜養晏然不以為懼凖諸往義信有殊矣衞侯好鶴曹伯愛鴈身死國滅可為寒心雀入于海為蛤雉入于淮為蜃夏小正九月雀入于海為蛤蓋有矣非常入也又十月𤣥雉入于淮為蜃蜃者蒲蘆也按晉語趙簡子歎曰雀入于海為蛤雉入于淮為蜃小曰蛤大曰蜃皆介物蚌類也黿鼉魚龞莫不能化唯人不能哀夫竇犨侍曰臣聞之君子哀無人不哀無賄哀無徳不哀無寵哀名之不令不哀年之不登夫中行范氏不恤庶難而欲擅晉國今其子孫將耕於齊宗廟之犧為畎畝之勤人之化也何日之有孝鵝靈雞寰宇記天寶末徳清沈朝家有鵝育卵而腸出以死其雛悲鳴不復食啄敗薦覆之乂銜芻草母前若祭奠狀長吁數聲而死沈氏異而埋之後人因呼為孝鵝塚高僧傳唐杭州徑山釋法欽姓朱氏嘗養一雞不食生類隨之若影不游他所及其入長安長鳴三日而絶今鷄塚在焉見蛇則噪而賁見蛇則宛而躍禽經云鵲見蛇則噪而賁孔雀見蛇則宛而躍見異類差翅鳴見同類拊翅鳴禽經云鵝見異類差翅鳴鷄見同類拊翅鳴喜日鵝垂露鴨洞𠖇記有喜日鵝至日出時銜翅而舞又名曰舞日鵝又有升蕖鴨赤色每止于芙蓉上不食五榖唯咂葉上垂露因名垂露鴨一名丹毛鳬野鷄先鳴而後鼓翼家鷄先鼓翼而後鳴物類相感志云警畜能知時雖風雨隂霾而戒時不忒時至則啼人以為候故周書緯云鷄陽鳥也所以為人候四時也又云野鷄屬隂先鳴而後鼓翼家鷄屬陽先鼓翼而後鳴長鳴雞逺飛鷄西京雜記長鳴鷄一食頃不絶長距善鬭洞𠖇記有逺飛鷄夕則還依人曉則絶飛四海朝往夕還祝雞公善養鷄得逺飛鷄之卵伏之名曰翻明鷄如鵠大色紫有翼翼下有目亦曰目羽雞伺晨鷄司夜鷄西京雜記成帝時交趾越嶲獻伺晨雞即下漏驗之晷刻無差洞㝠記有司夜鷄隨鼓節而鳴不息從夜至曉一更為一聲五更為五聲亦曰五時雞梟逢鳩告以東徙鳩遇梟止其巢吳説苑梟逢鳩鳩曰子將安之梟曰我將東徙鳩曰子改鳴則可不能改鳴猶惡子之聲也曹子建集令禽惡鳥論昔荆之梟將徙巢于呉鳩遇之曰子將安之梟曰將巢于呉鳩曰何去荆而巢呉乎梟曰荆人惡予之聲鳩曰子能革子之聲則免無為去荆而巢呉也如不能革子之聲則呉楚之民不異情也為子之計者莫若宛頸戢翼終身勿復鳴也用梟鏡以祠黄帝作梟羮以賜百官郊祀志古天子嘗以春解祠祠黄帝用一梟破鏡師古曰解祠者謂祠祭以解罪求福張晏曰黄帝五帝之首也歲之始也梟惡逆之鳥方士虗誕云以歲始祓除凶灾令神仙之帝食惡逆之物使天下為逆者破㓕訖竟無有遺育也孟康曰梟鳥名食母破鏡獸名食父黄帝欲絶其類使百吏祠皆用之破鏡如貙而虎眼又如淳注曰五月五日作梟羮以賜百官鶬鴿胎生囊狸卵生韓詩内傳云鶬鴿胎生孔子渡江見而異之異物志狸十有一種囊狸卵生雁銜蘆龜藏六古今注雁自河北渡江南瘦瘠能高飛不畏繒繳江南沃饒每至還河北體肥不能高飛恐為虞人所獲常銜蘆長數寸以防繒繳焉淮南子夫雁從風而飛以愛氣力銜蘆而翔以避弋繳抱朴子智禽銜蘆以避網水牛結陣以却虎雜阿含經有龜被野于所包藏六而不出野干怒而捨去佛告諸比丘當如龜藏六自藏六根魔不得便法句經昔有道人河邊學道但念六塵心無寧息龜從河出水狗將噉龜龜縮頭尾四脚藏于甲中狗不能得便狗去還出便得入水道人因悟我不及龜放恣六情不知死至虎導鹿隨符瑞志宋元嘉二十五年白虎見蜀郡二赤虎導前又瑞應圖白虎者義獸也一名騶虞王者徳至禽獸澤洞幽𠖇則見五代史永平三年五月騶虞見璧山有二鹿隨之見則天下大穰見則天下大風山海經欽山有獸焉其狀如豚而有牙其名曰當康其鳴自呌見則天下大穰泰器之山觀水出焉西流注于流沙是多文鰩魚狀如鯉魚魚身而鳥翼蒼文而白首赤喙嘗行西海游于東海以夜飛其音如鸞雞其味酸甘食之已狂見則天下大穰玉山有獸焉其狀如犬而豹文其角如牛其名曰狡其音如吠犬見則其國大穰又几山有獸焉其狀如彘黄身白頭白尾名曰聞􅡁見則天下大風少咸之山有獸焉其狀如犬而人面善投見人則笑其名山􅏈其行如風見則天下大風見則天下大水見則天下大旱山海經空桑之山有獸焉其狀如牛而虎文其音如欽其名曰軨軨其嗚自呌見則天下大水犲山有獸焉其狀如夸父而彘毛其音如呼見則天下大水剡山有獸焉其狀如彘而人面黄身而赤尾其名曰合窳其音如嬰兒是獸也食人亦食蟲蛇見則天下大水陽山多化蛇其狀如人面而豺身鳥翼而蛇行其音如叱呼見則其邑大水敖岸之山有獸焉其狀如白鹿而四角名曰夫諸見則其邑大水長右之山有獸焉其狀如禺而四耳其名長右其音如吟見則其郡縣大水崇吾之山有鳥焉其狀如鳬而一翼一目相得而飛名曰蠻蠻見則天下大水玉山有鳥焉其狀如翟而赤名曰胜遇是食魚其音如録見則其國大水邽山濛水出焉南流注于洋水其中多黄貝蠃魚魚身而鳥翼音如鴛鴦見則其邑大水又姑逢之山有獸焉其狀如狐而有翼其音如鴻鴈若嗚曰獙獙見則天下大旱獨山末塗之水出焉而東流注于沔其中多螩䗤其狀如黄蛇魚翼出入有光見則其邑大旱女烝之山膏水出焉而西注于鬲水其中多薄魚其狀如鱣魚而一目其音如歐見則天下大旱子桐之山子桐之水出焉而西流注于餘如之澤其中多􅀈魚其狀如魚而鳥翼出入有光其音如鴛鴦見則天下大旱崦嵫之山有鳥焉其狀如鴞而人面蜼身犬尾其名自號也見則其邑大旱錞于母逢之山浴水出焉有大蛇赤首白身其音如牛見則其邑大旱太華之山有蛇焉名曰肥􅖆六足四翼見則天下大旱渾夕之山有蛇一首兩身名曰肥遺見則其國大旱觸邪獸飼邪獸述異記獬豸者一角之羊也性知人有罪臯陶治獄其罪疑者令羊觸之又唐長慶中隴上出異獸如猴腰尾皆長色青迅猛見蕃人即捕而食之遇漢人則否神異經窮其獸似牛而色狸尾長曵地其聲似狗狗頭人形鈎爪鋸牙逢忠信之人齧而食之逢姦邪者則擒禽獸而飼之窮其當作窮竒除凶蠲忿梁祚魏國統云西南夷土有異犀三角夜行如大炬火照數千歩或時解脱則藏于深宻之處不欲令人見之王者貴其異以為簪能消除凶逆杜陽編懿宗周昌公主出降帶蠲忿犀其犀圓如彈丸入土不朽爛帶之令人蠲忿怒禦兵禦凶山海經中曲之山有獸焉其狀如馬而白身黑尾一角虎牙爪音如鼓音其名曰駮是食虎豹可以禦兵虢山其鳥多寓狀如䑕而鳥翼其音如羊可以禦兵騩山正囘之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不畏雷可以禦兵少室之山休水出焉而北流注于洛其中多䱱魚狀如􅉦蜼而長距足白而對食者無蠱疾可以禦兵又隂山有獸焉其狀如狸而白首名曰天狗其音如橊橊可以禦凶英鞮之山涴水出焉而北注于陵羊之澤是多冉遺之魚魚身蛇首六足其目如馬耳食之使人不眯可以禦凶講山有木焉名曰帝屋葉狀如椒反傷赤實可以禦凶反傷刺下勾也辟塵試毒本草李司封宗易嘗言石駙馬保吉知陳州其州廨一皆新之每毁舊屋則坐于下風塵自分去人皆驚怪之蓋其所服辟塵犀也嶺表錄異辟塵犀為婦簪梳塵不著髪抱朴子通天犀有白理如線者以盛米置羣雞中雞欲往啄米至輒驚却故南人名為駭雞犀得其角一尺以上刻為魚而銜以入水水常為開方三尺可得氣息水中以其角為义導者試煑毒藥為湯以义導攪之皆生白沫無復毒物則無沫起也北户錄注通天犀置大霧重露下終不沾濡又堪辨毒或中毒箭刺於瘡中立愈蓋犀食百毒棘刺故也南越志海中出離水犀似牛其出入有光水為之開舊唐書拂䔉國一名大秦有鳥似鵝其毛緑色常在王邊倚枕上坐每進食有毒其鳥輙鳴雙雙合體蛩蛩假足山海經云南海之外有二青獸相并名曰雙雙注云言體合為一也公羊傳雙雙而俱至説苑孔子曰北方有獸其名曰蟨前足䑕後足兎是獸也甚矣其愛蛩蛩巨虚也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蟨以走蟨非性之愛蛩蛩巨虚也為其假足之故也二獸者亦非性之愛蟨也為其得甘草而遺之故也􅍛􅍛血堪染鞾猩猩血可染罽本草宋建武中安西縣主簿韋文禮進􅍛􅍛雌雄二頭帝曰吾聞􅍛􅍛能負千鈞若既力如此何能致之彼土人丁鑾進曰􅍛􅍛見人喜笑則上唇掩其目人以釘釘著額上任其奔馳候死而取之髪極長血堪染鞾其毛一似獼猴人面紅赤色作人言馬聲善知生死飲其血使人見鬼帝聞而欣然命工圖之華陽國志永昌郡有猩猩能言其血可以染朱罽色鮮不黯獅能禦象獅能伏虎宋書宗慤字元幹隨檀和之伐林邑入象浦林邑王范陽邁傾國來拒以兵装被象前後無際慤曰吾聞獅子威服百獸乃制其形與象相禦象果驚奔衆因潰散遂克林邑收其異寶雜物不可勝計洛陽伽藍記元魏波斯國獻獅子永安末始逹京師莊帝謂侍中李彧曰朕聞虎見獅子必伏可覔試之於是詔近山郡縣捕虎以進鞏縣山陽并進二虎一豹見獅子悉瞑目不敢仰視園中素有一育熊性甚馴善帝令取試之虞人牽育熊至聞獅子氣驚怖跳踉曵鎻而起帝大笑舊説獅子虎見之而伏豹見之而瞑熊見之而躍象膽隨四時蚺膽隨三旬類苑淳化中上苑一象斃太宗命取膽不獲徐鉉曰當在前左足果得之問其故鉉曰象膽隨四時在足今方春故知之酉陽雜俎蚺蛇膽上旬近頭中旬在心下旬近尾又朝野僉載云五月五日取時膽兩柱相去五六尺繫蛇頭尾以杖於腹下來去扣之膽即聚以刀刲取藥封放之不死復更取看肋下有痕即放木代象牙木代犀角南越志象牙長一丈餘脱其牙則深藏之削木代之可得不爾窮其主得乃已抱朴子犀歲一解角藏于山中人以木如其角代之犀不覺後年輙復解酉陽雜俎云波斯國謂象牙為白暗犀角為黒暗象泣子猿求子酉陽雜俎象性允識見其子皮必泣又蔣子萬機論云象見子皮無逺近必泣南史齊魚復侯子響為蕭順之所殺武帝出景陽山見一猿奮擲悲鳴問後堂丞此猿何意答曰猿子前日墮崖致死其母求之不見故耳上因憶子響􅒣欷良久不自勝順之慙懼以憂卒飛兎日行三萬里騕褭行萬五千里瑞應圖曰飛兎者神馬之名也日行三萬里禹治水勤勞厯年救民之害天應其徳而至應劭曰古有駿馬名騕褭赤喙黑身一日行萬五千里馬名黄耳犬名黄耳穆天子傳注魏時鮮卑獻千里馬白色而兩耳黄名曰黄耳述異記陸機少時頗好遊獵在呉豪盛客獻快犬名曰黄耳機後仕洛常將自隨此犬黠慧能解人語又常借人三百里外犬識路自還一日至家機羇旅京師久無家問機戲語犬曰我家絶無書信汝能賫書馳還取消息否犬喜揺尾作聲應之絶塵絶影西京雜記文帝自代還有良馬九匹一名絶塵魏書曰曹公所乘馬名絶影漢文帝九逸唐太宗十驥西京雜記文帝自代還有良馬九匹皆天下之駿馬也一名浮雲一名赤電一名絶羣一名逸驃一名紫鷰騮一名緑螭驄一名龍子一名麟駒一名絶塵號為九逸有來宣能御代王號為王良俱還代邸囘紇傳唐太宗時東骨利幹國産良馬首似槖駝筋骼壯大日中馳數百里太宗時來其大酋因使者獻之帝取其異者號十驥皆為美名曰騰霜白曰皎雪驄曰凝露驄曰懸光驄曰決波騟曰飛霞驃曰發電赤曰流金􅚷曰翔麟紫曰奔虹赤厚禮其使昭陵六馬大宛六馬金石録太宗六馬其一曰拳毛騧黄馬黒喙平劉黑闥時所乘贊曰月精按轡天駟横行弧矢載戢氛埃廓清其二曰什伐赤純赤色平世充建徳時所乘贊曰瀍澗未静斧鉞伸威朱汗騁足青旌凱歸其三曰白蹄烏純黒色四蹄俱白平薛仁杲時所乘贊曰倚天長劍追風駿足聳轡平隴囘鞍定蜀其四曰特勒驃黄白色喙㣲黑色平宋金剛時所乘贊曰應策騰空承聲半漢入險摧敵蒙危濟難其五曰颯露紫紫鷰騮平東都時所乘贊曰紫鷰超躍骨騰神駿氣讋三川威凌八陣其六曰闕驅蒼白雜色平竇建徳時所乘贊曰足輕雪影神發天機策茲飛練定我戎衣潼闗之役備體流汗紀異録天寶中大宛國進汗血馬六疋一曰紅叱撥二曰紫叱撥三曰青叱撥四曰黄叱撥五曰丁香叱撥六曰桃花叱撥上乃製名一曰紅玉輦二曰紫玉輦三曰平山輦四曰陵雲輦五曰飛香輦六曰百花輦復命圖于瑶光殿乃改為觀驥殿劉先主的盧庾元規的顱世語曰劉備屯樊城劉表曾請備宴㑹蒯越蔡瑁欲因㑹取備備覺之偽如厠潜遁出所乘馬名的盧騎的盧走渡襄陽城西檀溪水中溺不得出備急曰的盧今日厄矣可努力的盧乃一踴三丈遂得過乘桴渡河中流而追者至以表意謝之曰何去之速乎晉書庾亮字元規美姿容初亮所乘馬有的盧殷浩以為不利於主勸亮賣之亮曰曷有已之不安而移之於人浩慙而退傅𤣥乘輿馬賦曰往日劉備之初降也太祖賜之驄馬使自至廄選之厯名馬以百數莫可意者次至下廄有的顱馬委棄莫視痩瘁骨立備撫而取之衆莫不笑之馬超破蘇氏塢塢中有駿馬百餘匹自超以下俱爭取肥好者而將軍龎徳獨取一騧馬形觀既醜衆亦笑之其後劉備奔于荆州馬超戰于渭南逸足電發追不可逮衆乃服焉五花乘九花虬名畫要録開元内廐有飛黄照夜浮雲五花之乘又唐六典云外牧歲進良馬印以五花飛鳳之字杜陽編代宗命御馬九花虬并紫玉鞭轡以賜郭子儀馬身被九花文號九花虬上往日東幸觀獵於田不覺日暮忽顧謂侍臣曰行宫去此幾里奏曰四十里上令速鞭恐閡夜而九花虬綏然如三五里而已忽雷駁望雲騅酉陽雜俎秦叔寶所乘馬號忽雷駁常飲以酒每於月明中試能竪越三領黑氊及胡公卒嘶鳴不食而死國史補徳宗幸梁御馬號望雲騅駕還飼以一品料暇日牽而視之至必長鳴四顧若感恩狀後老死飛龍廐中貴戚畫為圖東夷濊國獻果下馬漢樂浪郡出果下馬魏志濊國果下馬漢桓時獻之注云高三尺乘之可于果樹下行又漢書昌邑王賀召皇太后果下馬乘之述異記漢樂浪郡出果下馬高三尺又北史尉景有果下馬文襄求之不與曰土相扶為墻人相扶為王一馬亦不得畜而索也千里馬千里牛續博物志肅宗時有告保定太守反者令李泌乘千里馬往按之千里馬寧逺所獻髮拳紫色狀如八駿乘者必衣裘冒絮似胡兒抱持早發扶風初馳三十里則皆旁側跳三十里外乃墜然而去唯聞耳傍風聲飛前蹄之土過辰時逹保定申時歸奏事晉書茍晞見朝政日亂懼禍及已而多所交結每得珍物即遺都下親貴兖州去洛五百里恐不鮮美募得千里牛每遣信旦發暮還馬四歲二齒牛四歲四齒酉陽雜俎馬四歲兩齒至二十歲齒盡平酉陽雜俎牛三歲二齒四歲四齒五歲六齒以後每一年接脊一節六角牛四耳牛述異記周成王時東夷送六角牛洞㝠記元封三年大秦獻花蹄牛高六尺尾環繞角生四耳角端有肉蹄如蓮華角容一石角容廿斛魏書元魏桓帝馬不能勝常乘安車駕大牛角容一石南史扶桑國有牛角甚長以角載物至勝二十斛稍割牛日及牛什法盛厯國傳天竺波羅奈國有稍割牛黑色角細長可四尺計十日一割或不至十日一割便困病或致死人服其血皆老夀國人皆夀五百歲牛夀一等于人又異物志月氏有羊尾重十斤稍割以供養尋生如故𤣥中記大月支及西胡有牛名日及牛以今日割取其肉三四斤明日其肉已復瘡亦愈漢人入此國以牛示之以為珍異漢人曰吾國有䖝大小如指名為蠶食桑葉為人吐絲外國人不復信有蠶也又博物志越嶲國有牛稍割取肉經日必復生又膳夫錄大食勿斯離國産胡羊高三尺餘其尾如扇每歲春時割取脂二十餘斤再縫合仍生不取則脹死莊浪有饕羊土人歲取其脂非久復滿腹鹿角八岐鹿身兩頭宋高僧傳唐京師安國寺什元康貞觀中遊學京邑有彭姓者先居山野見一鹿角分八岐厥形絶異撫而馴伏遂豢養之乘而致逺曾無倦色魏宏南中志雲南郡有熊倉山上有神鹿一身兩頭食毒草名之食毒鹿盛𢎞之荆州記武陵郡有山獸如鹿前後有頭常以一頭食一頭行猾褢冬蟄熊羆冬蟄山海經堯灮之山其陽多玉其隂多金有獸焉其狀如人而彘鬛穴居而冬蟄其名曰猾褢滑懷兩音其音如斲木見則縣有大繇詩義熊能攀緣上高樹見人則顛倒投地而下冬入穴而蟄始春而出鹿寨熊館𤨏碎錄鹿夜臨宿下鹿角寨大者角向外四圍小者在中團圍如寨今人以木倣作鹿角寨墨客揮犀熊于山中行數十里悉有跧伏之所必在石嵓枯木中山民謂之熊館唯虎出百里外則迷所出道路熊白熊掌埤雅云熊當心白脂如玉俗呼熊白好舉木引氣謂之熊經爾雅翼熊方冬唯自舐其掌故其掌特美烹之難熟晉靈公殺宰夫之腝熊蹯不熟者而楚城見圍請食熊蹯而死以其難熟冀於外救也纒子桀王天下酒濁而殺厨人紂王天下熊蹯不熟而殺厨人呼熊為子路呼虎為李耳述異記東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也風俗通曰呼虎為李耳俗説虎本南部中廬李氏所為呼李耳即喜呼斑便怒又方言曰陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳自闗東西謂之伯都虎食物遇耳即止以觸諱故也一峯槖駞兩脚駱駝北史迷宻國正平元年遣使獻一峯黒槖駞爾雅翼駝背有兩峯如鞍其足三節南史滑國者車師之别種也有兩脚駱駝野驢有角果然讓老果然傷類山經果然獸似獮猴以名自呼色蒼黒羣行老者在前少者在後得果食輒與老者似有義焉交趾諸山有之獠人射之以其毛為裘褥甚温煖國史補劍南人之採果然者得一果然其數十果然可得何哉果然有傷其類者聚族悲鳴雖殺之不去此禽獸之狀而人心也麝舉爪剔其香蚒露腹明無膽埤雅今商汝山中多羣麝所遺糞常就一雖逺逐食必還走其地不敢遺跡他所慮為人獲人反以是蹤迹其所在必掩羣而取之蓋麝絶愛其香每為人所廹逐勢且急即自投高岩舉爪剔出其香就縶且死猶拱四足保其臍嶺表錄異蚺蛇被取膽它日見捕者則逺逺側身露腹瘡明已無膽以此自脱孫供奉胡博士幕府摭聞錄唐昭宗播遷隨駕伎藝人有弄猴頗馴能隨班起居昭宗賜以緋袍號孫供奉羅隱下第詩云何如學取孫供奉一笑君王便著緋朱梁簒位取此猴令殿下起居猴望殿陛見全忠徑趨其所跳躍奮擊遂令殺之唐臣媿此猴多矣搜神記有一書生皓首稱胡博士教授諸生忽復不見九月九日士人相與登山遊觀聞講書聲命僕尋之見空冢中羣狐羅列見人即走老狐獨不去是皓首書生狐死首丘豹死首山廣志狐死首丘豹死首山是性之異也又安南志象病必向南而死猶豫狐疑顔氏家訓禮云定猶豫决嫌疑離騷曰心猶豫而狐疑先儒未有釋書按尸子曰五尺犬為猶説文云隴西謂犬子為猶吾以為人將犬行犬好豫在人前待人不得又來迎候如此往還至于終日斯乃豫之所以為未定也故稱猶豫或以爾雅曰猶如麂善登木猶獸名也既聞人聲乃豫緣木如此上下故稱猶豫狐之為獸又多猜疑故聽河氷無流水聲然後渡今俗曰狐疑虎卜則其義也狼籍狼狽野史云狼起臥遊戲多藉草草皆穢故曰狼籍酉陽雜俎云狼䏶中筋大如鴨卵有犯盜者熏之當令手攣縮狼糞烟直上烽火用之或言狼狽是兩物狽前足絶短每行常駕兩狼失狼則不能動故世言事乖者稱狼狽以黄羊祀竈以烏羊繫車風俗通漢記南陽隂子方積恩好施善祀竈臘月晨炊而竈神見再拜受神時有黄羊因以祀之其孫識執金吾封原鹿侯興衛尉鮦陽侯家凡二侯牧守數十其後子孫常以臘月祀竈以黄羊南史孔淳之與王敬􅒮為人外之游又申以婚姻敬􅒮以女適淳之子尚遂以烏羊繫所乘車轅提壺為禮至則盡歡共飲迄暮而歸或怪其如此答曰固亦農夫田父之禮也羊生土中犬生地中舊唐書拂林林當作䔉國有羊羔生于土中其國人候其欲萌乃築垣以環之防外獸所食然其臍連地割之絶則死惟人著甲走馬撃鼔駭之其羔驚鳴而臍絶因逐水草以一二百口為羣尸子地中有犬名曰地狼夏鼎志掘地得犬名曰賈氷下䑕重十斤毛可以為褥火中䑕重百斤毛可以作布神異經北方層氷萬里厚百丈有磎䑕在氷下土中焉形如䑕食草木肉重千斤可以作脯其毛八尺可以為褥臥之郤寒又不燼水火中有䑕重千斤毛長二尺餘細如絲但居火中洞赤時時出外而毛白以水逐而沃之即死取紡績其毛織以為布用之若有垢涴以火燒之則浄也又南荒之外有火山晝夜火然火中有䑕重百斤毛長二尺餘細如絲可以作布龍畏鐵龍畏蠟封氏見聞海州南有溝水上通淮楚公私漕運路也寶應中堰破東海令李知逺主役脩復將成輒壊甚以為憂或説梁武築浮山堰頻有缺壊乃以鐵數萬斤填積其下堰乃成知逺聞之即依其言而塞穴初堰之將壊也輒聞其下殷如雷聲至是其聲移于上流數里蓋金鐵味辛辛能害目蛟龍護其目避之而去故堰可成南部新書龍之性麤猛而畏蠟愛玉及空青而嗜燒鷰肉故食鷰肉人不可渡海鯥魚陵居龍魚陵居山海經柢山多水無草木有魚焉其狀如牛陵居蛇尾有翼其羽在魼亦作脅下其名曰鯥冬死而夏生食之無腫疾又龍魚陵居在軒轅之北狀若狸一曰鰕即有神聖乘此以行九野一曰鼈魚在夭野北其為魚也如鯉白龍魚服白龍魚鱗載記韋諛曰白龍魚服有豫且之禍海若濳游罹葛陂之酷洞㝠記白龍魚鱗網者食之十朋四品爾雅一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜易損五爻云或益之十朋之龜鄭注引之食貨志元龜岠冉長尺二寸直千一百六十為大貝十朋公龜九寸直五百為壯貝十朋侯龜七寸以上直三百為幺貝十朋子龜五寸以上直百為小貝十朋是為龜寶四品𤣥衣督郵河伯從事古今注龜一名𤣥衣督郵又云龜一名河伯從事吳王膾餘誌公膾殘博物志呉王江行食膾有餘棄于江中流化而為魚今江中有名呉王餘膾魚者長四寸大者如箸猶作膾形高僧傳寶誌對梁武帝食膾帝曰朕不知味二十餘年師何必爾誌乃吐出小魚鱗尾依然今金陵鱠殘魚是也曝鰓燒尾三秦記河津一名龍門巨靈跡猶存水懸下注旁有山水陸不通龜魚之屬莫能上江海大魚集門下數千不得上上者為龍不上者魚故云曝鰓龍門垂耳轅下林登博物志龍門之下每歲季春有黄鯉二魚自海及諸川爭來赴之一歲中登龍門者不過七十一初登龍門即有風雨隨之天人自後燒其尾乃化為龍矣鰕姑螺婦爾雅翼海中有鰕姑狀如娛蚣云管鰕原化記義興呉堪為縣吏家臨荆溪忽得大螺已而化女子號螺婦縣令聞而求之堪不從乃以事虐堪曰今要鰕䲈毛鬼臂二物不獲致罪堪語螺婦即致之令乃謬語曰更要禍斗堪又語螺婦婦曰此獸也須㬰牽至如犬而食火糞以為火令與火試之忽遺糞燒縣宇令及一家皆焚死焉海鏡蟹為腹水母蝦為目越絶書海鏡蠏為腹水母蝦為目嶺表錄異海鏡廣人呼為膏葉盤兩片合以成形殻圓中甚瑩滑日照如雲母光内有少肉如蚌胎腹中有紅蠏子其小如黄豆而螯足具海鏡饑則蠏出拾食蠏飽歸腹海鏡亦飽或廹之以火則蠏子走出離腸腹立斃或生剖之有蠏子活在腹中逡廵亦斃本草蜡一名樗蒲魚生東海如血䘓大者如牀小者如斗無腹胃眼目以蝦為目蝦動蜡沈故曰水母目鰕如駏驉之與蛩蛩相假矣蜂君蟻王化書蜂有君禮也自然論蜂無王而盡死齊諧記董昭之過江見一蟻著一短蘆走因以䋲繫蘆著船蟻得生其夜夢一烏衣人謝云僕是蟻中王也後竟脱董于難食而不飲飲而不食淮南子曰蠶食而不飲三十二日而化蟬飲而不食三十日而死浮游不飲不食三日而終也青蠅為弔客青蠅為賀客虞翻别傳翻放棄南方云自恨疏節骨體不媚犯上獲罪當長没海隅生無可與語死以青蠅為弔客使天下一人知己者足以不恨青陽記術士相牛僧孺若青蝇拜賀方能及第公疑之及登科訖歸生家庭有青蝇作八行立約數萬折躬再三良久乃去樹子化蝶木葉化蝶瀟湘錄長安城禁苑内一大樹冬月雪中忽花葉茂盛及凋落後結實其子光明燦然如火之照焉數日皆化為紅蛺蝶飛至明年唐高祖自唐國入長安此其前兆也北户録段公路南行厯懸藤峽維舟飲水覩巖側有一木五綵初謂丹青之樹命僕採獲一枝尚綴軟蝶凡二十餘個有翠紺縷者金眼者丁香眼者紫斑眼者黒花者黄白者緋脉者大如蝙蝠者小如榆莢者因登岸視之乃知木葉化焉蛺蝶如帆蜈蚣如箏嶺南異物志常有人游南海泊于孤岸有物如蒲帆飛過海將到舟舟人競以物擊之如帆者盡破碎墮地視之乃蛺蝶也海人去其翅足稱之得肉八十斤噉之極肥美紀聞唐杜暐使嶺南至康州見蜈蚣大如筝天寶四載廣州因海潮一蜈蚣死割其爪得肉一百二十斤駢志卷十八
