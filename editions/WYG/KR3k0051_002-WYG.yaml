body:
  text: 駢志卷二明陳禹謨撰甲部下茅容以草蔬與客同飯樂頥以菜爼為客設食後漢書茅容字季偉年四十餘耕于野時與等軰避雨樹下衆皆夷踞相對容獨危坐愈恭郭林宗行見之而竒其異遂與共言因請寓宿旦口容殺鷄為饌林宗謂為己設既而以共其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成徳南史吏部郎庾杲之嘗往樂頥之頥之為設食唯枯魚菜爼杲之曰我不能食此母聞之自出常膳魚羮數種杲之曰卿過茅季偉我非郭林宗孝婦汲江水孝子汲江水後漢書廣漢姜詩妻同郡龎盛之女也詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻常泝流而汲後值風不時得還母渴詩責而遣之妻子寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久姑怪問鄰母鄰母具對姑感慙呼還恩飬愈謹其子後因逺汲溺死妻恐姑哀傷不敢言而託以行學不在華陽國志孝子隗通為母汲江裔水天為出平石生江中今石在馬湖江任彦昇不嘗㯽榔陳叔達不食蒲萄南史任昉父遥本性重㯽榔以為常餌臨終嘗求之剖百許口不得好者昉以父所嗜好深以為恨遂終身不嘗㯽榔舊唐書高祖賜羣臣食於御前果有蒲萄侍中陳叔逹執而不食高祖問其故對曰臣母患口乾求之不能得高祖曰卿有母可遺乎遂流涕嗚咽久之乃止因賜物百段劉士儁母䘮勺飲不入口七日段秀實母疾水漿不入口七日隋書劉士儁性至孝丁母䘮絶而復蘇者數矣勺飲不入口者七日廬于墓側負土成墳列植松柏狐狼馴擾為之取食高祖受禪表其門閭唐書段秀實性至孝六歲母疾水漿不入口七日疾有間然後飲食開函流涕開笥流涕南史齊河東王鉉年三四歲高帝嘗晝臥纒髪鉉上高帝腹上弄䋲高帝因以䋲賜鉉及崩後鉉以寶函盛䋲嵗時輒開視流涕嗚咽鉉人才甚凡而有此一至又張敷生而母亡年數歲問知之雖童蒙便有感慕之色至十歲許求母遺物而散施已盡唯得一扇乃緘錄之每至感思輒開笥流涕輒圜冢曰順在此輒到墓曰衰在此後漢書蔡順母年九十以夀終未及得葬里中灾火將逼其舍順抱伏棺柩號哭呌天火遂越燒它室順獨得免太守韓崇召為東閣祭酒母平生畏雷自亡後每有雷震順輒圜冢泣曰順在此崇聞之每雷輒為差車馬到墓所太守鮑衆舉孝亷順不能逺離墳墓遂不就晉書王裒母性畏雷母没每雷輒到墓曰裒在此六世同㸑九世同居南史漢夀人邵榮興六世同㸑劉悛表其門閭舊唐書張公藝九世同居北齊時東安王高永樂詣宅撫慰旌表焉隋開皇大使邵陽公梁子恭亦親撫慰重表其門貞觀中特勅吏加旌表高宗有事太山路過鄲州臨幸其宅問其義由其人請紙筆但書百餘忍字高宗為之流涕賜以縑帛李氏七世同居郭氏七世同居北史李几博陵安平人也七世同居共財家有二十二房一百九十八口長㓜濟濟風禮著聞至於作役卑㓜競集鄉里嘆美標其門閭又郭世雋字𢎞乂太原文水人也家門雍穆七世同居犬豕同乳烏鵲同巢時人以為義感之應州縣上其事隋文帝遣平昌公宇文㢸詣其家勞問尚書侍御史桺彧廵省河北表其門閭又南唐江州陳氏元和給事中京之後宗族七百口每日設廣席長㓜以次坐而共食有畜犬百餘共一牢食一犬不至諸犬為之不食建書樓於别墅以延四方之士肄業者多依焉鄉里率化獄訟希少逺近歎異之百口同㸑八院相對魏書楊播一家之内男女百口緦服同㸑庭無間言魏世以來惟有盧淵兄弟及播昆弟椿津當時莫逮焉舊唐書裴寛性友愛弟兄多宦達子姪亦有名稱於東京立第同居八院相對甥姪皆有休憇所擊鼓而食當世榮之夏方畢十三䘮吳逵葬十三棺晉書夏方家遭疫癘父母伯叔羣從死者十三人方年十四夜則號哭晝則負土十有七載葬送得畢因廬于墓側種植松柏烏鳥猛獸馴擾其旁南史呉逵經荒饑饉係以疾疫父母兄嫂及羣從小功之親男女死者十三人逵時病困隣里以葦席裹之埋于村側既而親屬皆盡唯逵夫妻獲全家徒四壁立冬無被袴晝則傭賃夜則伐木燒磚妻亦同逵此誠無有懈倦逵夜行遇猛獸猛獸下道避之朞年中成七墓葬十三棺隣里嘉之晉書亦載吾不及吉甫汝不及伯竒我不及曾參子不如華元顔氏家訓吉甫賢父也伯竒孝子也賢父御孝子合得終于天性而後妻問之伯竒遂放曾參婦死謂其子曰吾不及吉甫汝不及伯竒王駿䘮妻亦謂人曰我不及曾參子不如華元並終身不娶此等足以為誡其後假繼慘虐孤遺離間骨肉傷心斷腸者何可勝數慎之哉按魏志管寧妻先卒知故勸更娶寧曰每省曾子王駿之言意常嘉之豈自遭之而遺本心哉𤣥成讓爵于兄𢎞因有司劾而受爵丁鴻讓國于弟盛因友人諫而就國漢書初韋𤣥成兄𢎞為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以𢎞當為嗣故勅令自免𢎞懐嫌不去官及賢病篤𢎞竟坐宗廟事繫獄罪未决室家問賢當為後者賢恚恨不肯言於是賢門下生博士義倩等與宗家計議共矯賢令使家丞上書言大行以大河都尉𤣥成為後賢薨𤣥成在官聞䘮又言當為嗣𤣥成深知其非賢雅意即陽為病狂臥便利妄笑語昏亂徵至長安既葬當襲爵以病狂不應召大鴻臚奏狀章下御史丞相按驗𤣥成素有名聲士大夫多疑其欲讓爵辟兄者按事丞相史廼與𤣥成書曰古之辭讓必有文義可觀故能垂榮於後今子獨壊容貎蒙耻辱為狂癡光曜掩而不宣微哉子之所託名也僕素愚陋過為宰相執事願少聞風聲不然恐子傷高而僕為小人也𤣥成友人侍郎章亦上疏言聖王貴以禮讓為國宜優飬𤣥成勿枉其志使得自安衡門之下而丞相御史遂以𤣥成實不病劾奏之有詔勿劾引拜𤣥成不得已受爵宣帝高其節以𤣥成為河南太守兄𢎞為太山都尉後漢書丁鴻傳鴻父綝從世祖征伐鴻獨與弟盛居憐盛㓜小而共寒苦及綝卒鴻當襲封上書讓國於盛不報既葬乃挂衰絰於冢廬而逃去留書與盛曰鴻貪經書不顧恩義弱而隨師生不供飬死不飯含皇天先祖並不祐助身被大病不任茅土前上疾狀願辭爵仲公章寢不報迫且當襲封謹自放棄逐求良醫如遂不瘳永歸溝壑鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡封與駿遇於東海陽狂不識駿駿乃止而讓之曰昔伯夷呉札亂世權行故得申其志耳春秋之義不以家事廢王事今子以兄弟私恩而絶父不滅之基可謂智乎鴻感悟垂涕歎息乃還就國開門教授鮑駿亦上書言鴻經學至行顯宗甚賢之鄧彪讓國與弟鳳劉愷讓爵與弟憲東觀記鄧彪字智伯南陽人也父邯世祖中興從征伐以功封鄳侯彪少修孝行厲志清高與同郡宗武伯翟敬伯陳綏伯張弟伯同志好齊名稱南陽五伯彪以嫡長為世子邯薨當嗣爵讓國與異母弟鳯明帝高其節詔書聽許鳳襲爵彪仕州郡後漢書劉愷字伯豫以當襲父般爵讓與弟憲遁逃避封久之章和中有司奏請絶愷國肅宗美其義特優假之愷猶不出積十餘歲至永元十年有司復奏之侍中賈逵因上書曰孔子稱能以禮讓為國于從政乎何有竊見居巢侯劉般嗣子愷素行孝友謙遜潔清讓封弟憲濳身逺迹有司不原樂善之心而繩以循常之法懼非長克讓之風成含𢎞之化前世扶陽侯韋𤣥成近有陵陽侯丁鴻鄳侯鄧彪並以高行潔身辭爵未聞貶削而皆登三事今愷景仰前修有伯夷之節宜蒙矜宥全其先功以增聖朝尚徳之美和帝納之姜伯淮兄弟常共臥起張𢎞策兄弟常同臥起後漢書姜肱字伯淮與二弟仲海季江俱以孝行著聞其友愛天至常共臥起及各娶妻兄弟相戀不能别寢以係嗣當立乃遞徃就室肱博通五經兼明星緯士之逺來就學者三千餘人諸生爭加辟命皆不就二弟名聲相次亦不應徵聘時人慕之肱嘗與季江謁郡夜于道遇盜欲殺之肱兄弟更相争死賊遂兩釋焉謝承後漢書肱與季江俱乗車行適野廬為賊所刼取其衣物欲殺其兄弟肱謂盜曰弟年㓜父母所憐愍又未聘娶願自殺身濟弟季江言兄年徳在前家之珍寶國之英俊乞自受戮以代兄命盜賊戢衽曰二君所謂賢人吾等不良妄相侵犯棄物而去肱車中尚有數千錢盜不見也使從者追以與之亦復不受肱以物經厯盜手因以付亭吏而去南史張𢎞策兄弟友愛不忍暫離雖各有室常同臥起世比之姜肱兄弟梁書韋放性𢎞厚篤實輕財好施于諸弟尤雍睦每將逺别及行役初還常同一室臥起時稱為三姜唐書陽城隱中條山與弟堦域常易衣出年長不肯娶謂弟曰吾與若孤惸相育既娶則間外姓雖同處而益疏我不忍弟義之亦不娶遂終身趙孝弟將為賊所烹自縛求免孟孫兄將為盜所烹請代得免後漢書時天下亂人相食趙孝弟禮為餓賊所得孝聞之即自縳詣賊曰禮久餓羸痩不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就烹衆異之遂不害又淳于恭字孟孫兄崇將為盜所烹恭請代得與俱免蔣恭兄弟爭罪張悌兄弟爭死南史晉陵蔣崇平為刼見禽云與蔣恭妻弟呉晞張為侣晞張先行不在本村遇水妻息避水移寄恭家時録晞張不獲禽收恭及兄協付獄抵罪恭協並欵舍住晞張家口而不知刼情恭列晞張妻息是婦之親親今有罪恭身甘分求免兄恊恊列是户主求免弟恭兄弟二人争求受罪郡縣不能制依事上詳州議以為竝不合罪又滕曇恭傳建康人張悌生刼株連縣抵悌死罪悌兄松訴稱與弟景是前母子後母惟生悌松長不能教誨乞代悌死景又曰兄是嫡長後母惟生悌若從法母亦不全亦請死母曰悌應死豈以弟罪枉及諸兄悌亦引分全兩兄供飬縣以上讞帝以為孝義特降死後不得為例又南都江陵縣人茍蔣之弟胡之婦為曽口寺沙門所淫夜入茍家蔣之殺沙門為官司所檢蔣之列家門穢行欲告則恥欲忍則不可實已所殺胡之列又如此兄弟爭死江陵令宗躬啟州荆州刺史廬江王求博議袁彖曰夫迅寒急節乃見松筠之操危機迥構方識貞孤之風竊以蔣之胡之殺人原心非㬥辯讞之日友于讓生事憐左右義哀行路昔文舉引謗獲漏踈網蔣之心迹同符古人若陷以深刑實傷為善由是蔣之兄弟免死淳于恭教兄子用杖自箠繆豫公教弟婦掩户自撾後漢書淳于恭兄崇卒恭養㓜孤教誨學問有不如法輒反用杖自箠以感悟之兒慙而改過又繆肜字豫公少孤兄弟四人皆同財産及各娶妻諸婦遂求分異又數有鬬争之言肜深懐憤歎乃掩户自撾曰繆肜汝修身謹行學聖人之法將以齊整風俗柰何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更敦睦之行例得一子解褐例得一子出身北史邢晏為南兖州例得一子解褐乃啓其孤弟子子慎為朝請子慎年甫十二而其子已弱冠矣後為滄州復啓孤兄子昕為府主簿而其子並未從宦世人以此多之又房亮為東荆州刺史時邊州刺史例得一子出身亮不言其子而啓其弟子啓為奉朝請議者稱之繋子于樹閣子于樹晉書鄧攸逃石勒遇賊掠牛馬歩走擔其兒及其弟子綏度不能兩全乃謂其妻曰吾弟早亡唯有一息理不可絶止應自棄吾兒耳幸而得存我後當有子妻泣而從之乃棄之其子朝棄而暮及明日故繋之于樹而去史臣曰攸棄子存姪以義斷恩若力所不能自可割情忍痛何至豫加徽纒絶其奔走者乎斯豈慈父仁人之所用心也卒以絶嗣宜哉勿謂天道無知此乃有知矣陳書王元規字正範性孝事母甚謹晨昏未嘗離左右梁時山隂縣有㬥水流漂居宅元規唯有一小船倉卒引其母妹並孤姪入船元規自執檝棹而去留其男女三人閣于樹杪及水退獲全時人皆稱其至行以子易姪以身代弟崔鴻十六國春秋江都王延年年十五䘮二親奉叔父孝聞子良孫及弟從子為噉人賊所掠延年追而請之賊以良孫歸延年延年拜請曰我以少孤為叔父所養此叔父之少孤也願以子易之賊曰君義士也免之宋書孫棘大明五年發三五丁弟薩應充行坐違期不至棘自詣郡縣引已為家長令弟不行罪當在己乞以身代薩薩又辭自引太守張岱視其不實以棘薩各置一處報云聽其相代聲色並悦甘心赴死焉棘妻許氏又寄語囑夫曰君當門户豈可委罪小郎大家臨亡以小郎囑君今竟未婚娶家道不立君已有二子死復何恨岱依事表上孝武詔特原罪又南史元嘉末呉欣之弟慰之為武進縣史隨王誕起義元凶遣軍主華欽討之吏人皆散慰之獨留見執將死欣之詣欽乞代弟命辭淚哀切兄弟皆見原夫妻相對如賔夫妻相敬如賔左傳臼季使過冀見冀缺耨其妻饁之敬相待如賓與之歸言諸文公以為下軍大夫魏畧常林少單貧雖貧自非手力不取之于人性好學漢末為諸生帶經耕鉏其妻常自餽餉之林雖在田野其相敬如賔懸魚于庭致𤓰于梁謝承漢書羊續好食生魚為南陽太守府丞侯范作焦儉貢鯉續受而懸之一歲儉復致一枚續乃出所懸枯魚示之以杜其意韓詩外傳公儀休相魯而嗜魚一國人獻魚而不受其弟諫曰嗜魚不受何也曰夫欲嗜魚故不受也受魚而免于相則不能自給魚無受而不免于相長自給于魚此明于為己者也五代史補王審知遺推官黄淊魚徐演代為謝啟曰卸諸斷索纔從羊續懸來列在雕盤便到馮驩食處時大稱之北史蘇瓊為南清河太守性清慎不發私書郡人趙頴官至樂陵太守年餘八十致事歸五月中得新𤓰一雙自來奉瓊恃年老苦請遂便為留乃致于㕔事梁上竟不割人聞受趙頴餉瓜欲貢新果至門問知頴瓜猶在相顧而去第五倫受俸裁留一月第五頡不炊或至十日後漢書第五倫拜㑹稽太守雖為二千石躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與民之貧羸者三輔決録注曰第五頡字子陵為郡功曹州從事公府辟舉高第為侍御史南頓令桂陽南陽廬江三郡太守諫議大夫洛陽無主人鄉里無田宅客止靈臺中或十日不炊司𨽻校尉南陽左雄太史令張衡尚書廬江朱建孟興皆與頡故舊各致禮餉頡終不受遺金悉還威化大行遺金悉還蠻夷感悟後漢羌豪帥感張奐恩徳上馬二十匹先零酋長又遺金鐻八枚奐並受之而召主簿於諸羌前以酒酧地曰使馬如羊不以入廐使金如粟不以入懐悉以金馬還之羌性貪而貴吏清前有八都尉率好財貨為所患苦及奐正身絜己威化大行北史梁昆為西寧州刺史先是蠻夷酋長皆服金冠以金多者為豪雋由是遞相陵辱每尋干戈邊境略無寧歲毘患之後因諸酋長相率以金遺之於是置金座側對之慟哭謂曰此饑不可食寒不可衣汝等以此相滅今將此來欲殺我邪一無所納悉以還之於是蠻夷感悟遂不相攻為受一錢為食一口後漢書劉寵為㑹稽太守徵為將作大匠有五六老叟人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它守時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭値聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言耶勤苦父老為人選一大錢受之北史齊彭城景王浟為定州刺史徵為侍中人吏送别悲號有老公數百人相率具饌白浟曰自殿下至此五載人不識吏吏不欺人百姓有識以來始逢今化殿下唯飲此鄉水未食百姓食聊獻疏薄浟重其意為食一口寫書當慎嫌疑寫書亦是罪過後漢書吳祐父恢為南海太守祐年十二隨從到官恢欲殺青簡以寫經書祐諫曰今大人踰越五嶺逺在海濵其俗誠陋然舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間誠先賢所慎也恢乃止撫其首曰吳氏世不乏季子矣季子謂札也北史潘子義遺郎基書云在官寫書亦是風流罪過基答曰觀過知仁斯亦可矣又郎基性清慎無所營求嘗語人曰任官之所木枕亦不湏作況重于此乎唯頗令人寫書留犢淮南留牀兖州魏志注時苖為夀春令始之官乗薄軬車黄牸牛布被囊居官歲餘牛生一犢及其去留其犢謂主簿曰昔來時本無此犢犢是淮所生有也魏略裴濳每之官不將妻子妻子貧乏織蔾花以自供又濳為兖州時嘗作一胡牀及其去也留以掛柱王衍口不言錢崔洪口不言財晉書王衍疾其妻郭之貪鄙故口未嘗言錢郭欲試之令婢以錢繞牀使不得行衍晨起見錢謂婢曰舉阿堵物却又崔洪口不言貨財手不執珠玉汝南王亮常讌公卿以琉璃鍾行酒酒及洪洪不執亮問其故對曰慮有執玉不趨之義故爾然乖其常性故為詭説船輕載土艚輕迮石宣城記云涇縣呉矩時為廬江太守有清稱徵還船輕載土時歲暮逐除者就乞所獲甚少矩乃語之逐除人見土而去南史江革除都官尚書將還贈遺一無所受送故依舊訂舫革竝不納唯乘臺所給一舸舸艚偏欹不得安臥或請濟江徙重物以迮輕艚革既無物乃于西陵岸取石十餘片以實之其清貧如此霛太后賜百官任負布絹隋文帝賜公卿任取左藏北史李崇在官和厚明于決斷然性好財賄販肆聚歛孝明霛太后常幸左藏王公嬪主從者百餘人皆令任力負布絹即以賜之多者過二百匹少者百餘惟長樂公兩手持絹二十匹而出示不異衆而已世稱其廉儉崇與章武王融以所負多顚仆于地崇乃傷腰融至損脚時人為之語曰陳留章武傷腰折股貪人敗類穢我明主又洛陽伽藍記靈太后賜百官負絹任意自取朝臣莫不稱力而去唯章武王融與陳留侯李崇負絹過性蹶倒傷踝侍中崔光止取兩疋太后問侍中何少對曰臣有兩手唯堪兩疋所獲多矣朝貴服其清㢘北史庫狄士文嘗入朝遇隋文帝賜公卿入左藏任取多少人皆極重士文獨口銜絹一疋兩手各持一疋上問其故士文曰臣口手俱足餘無所須蕭放為廣州俸外不入其門盧鈞為廣州市舶一不干預舊唐書蕭放為廣州刺史嶺南節度使放性公廉南海雖富珍竒月俸之外不入其門家人疾病醫工治藥須烏梅左右于公厨取之放知而命還促買于市又盧鈞為廣州刺史御史大夫嶺南節度使南海有蠻舶之利珍貨輻輳舊帥作法興利以致富凡為南海者靡不梱載而歸鈞性仁恕為政廉潔請監軍領市舶使己一不干預自貞元以來衣冠得罪流放嶺表者因而物故子孫貧悴雖遇赦不能自還凡在封境者鈞減俸錢為營槥櫝其家疾病死䘮則為之醫藥殯殮孤兒稚女為之婚嫁凡數百家由是山越之俗服其徳義令不嚴而人化馮伉不受遺帛徳宗因而授令僧孺不受送物穆宗因而命相舊唐書澤潞節度使李抱貞卒馮伉為弔贈使抱貞男遺伉帛數百匹不納又專送至京伉因表奏固請不受屬醴泉闕縣令宰臣進人名帝意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉令縣中百姓多猾為著諭蒙十四篇大略指明忠孝仁義勸學務農每鄉給一卷俾其傳習在縣七年韋渠牟薦為給事中又初韓𢎞入朝以宣武舊事人多流言其子公武以家財厚賂權幸及多言者班列之中悉受其遺俄而父子俱卒孤孫㓜小穆宗恐為厮養竊盜乃命中使至其家閱其宅簿以付家老而簿上俱有納賂之所唯于牛僧孺官側朱書曰某月日送牛侍郎物若干不受却付訖穆宗按簿甚説居無何議命相帝首可僧孺之名一狐裘三十年一熊皮數十年檀弓曾子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乘及墓而反國君七个遣車七乘大夫五个遣車五乘晏子焉知禮曾子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮魏書司空長孫道生廉約身為三司而衣不華飾食不兼味一熊皮障泥數十年不易先減僕從即減車騎北史袁叔徳候李僧伽先減僕從然後入門曰見此賢令吾羞對軒冕舊唐書楊綰字公權元載伏誅綰拜相綰久積公輔之望及詔出朝野相賀綰素以徳行著聞質性貞廉車服儉樸居廟堂未數月人心自化御史中丞崔寛劍南四川節度使寧之弟家富於財有别墅在皇城之南池館臺榭當時第一寛即日濳遣毁拆中書令郭子儀在邠州行營聞綰拜相座内音樂散五分之四京兆尹黎幹以承恩每出入騶馭百餘亦即日减損車騎唯留十騎而已其餘望風變奢從儉者不可勝數其鎮俗移風若此又魏志毛玠典選舉務以儉率人鮑宣夫妻共挽鹿車凝之夫妻共乘蒲車後漢書鮑宣妻者桓氏女也字少君宣嘗就少君父學父竒其清苦故以女妻之裝送資賄甚盛宣不恱謂妻曰少君生富驕習美飾而吾實貧賤不敢當禮妻曰大夫以先生修徳守約故使賤妾侍執巾櫛既奉承君子唯命是從宣笑曰是吾志也妻乃悉歸侍御服飾更著短布衣與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉郡稱之宣哀帝時官至司頴校尉子永中興初為魯郡太守永子昱從容問少君曰太夫人寧復識挽鹿車時否對曰先姑有言存不忘亡安不忘危吾焉敢忘乎南史劉凝之妻梁州刺史郭銓女也遣送豐麗凝之悉散之屬親妻亦能不慕榮華與凝之共居儉苦夫妻共乘蒲笨車出市買易周用之外輒以施人石慶以策數馬乾威下殿就視史記萬石君少子慶為太僕御出上問車幾馬慶以策數馬畢舉手曰六馬慶于諸子中最為簡易矣然猶若此北史淮南太守楊琳嘗與十餘人同來謁見帝問張乾威曰其首立者為誰乾威下殿就視而答曰淮南太守楊琳帝謂乾威曰卿為謁者大夫而乃不識參見人何也乾威對曰臣非不識楊琳但慮不審所以不敢輕對審謹無他醇謹無它漢書石慶為丞相文深審謹無他大畧又衛綰以戲車為郎事文帝功次遷中郎將醇謹無它孝景為太子時召上左右飲而綰稱病不行文帝且崩時屬孝景曰綰長者善遇之及景帝立歲餘不孰何綰服虔曰不問也綰日以謹力霍子孟小心謹慎未嘗有過苖晉卿小心畏慎未嘗有忤漢初霍光字子孟初為奉車都尉光禄大夫出則奉車入侍左右出入禁闥二十餘年小心謹慎未嘗有過甚見親信舊唐書苖晉卿寛厚廉謹為政舉大綱不問小過所到有惠化及秉鈞衡小心畏慎未嘗忤人意性聰敏達練事體百司文簿經目必曉而修身守位以智自全議者比漢之胡廣聞宻事說向親舊聞臧否亂以他語南史謝晦或以朝廷宻事語謝瞻瞻輒向親舊説以為戲笑以絶其言又謝𢎞微口不言人短見兄曜好臧否人物每聞之常亂以他語又𢎞微每獻替及陳事必手焚書草人莫之知上以𢎞微能膳羞每就求食𢎞微與親舊經營及進之後親人問上所御𢎞微不答别以餘語酬之邑號朝歌墨子廻車邑名朝歌顔淵不舍文選鄒陽上書梁孝王曰里名勝母曾子不入邑號朝歌墨子廻車按晉灼曰史記樂書作朝歌之音朝歌者歌不時也故墨子聞之惡而㢠廻車不逕其邑論語撰考䜟曰邑名朝歌顔淵不舍七十弟子掩目宰予獨顧由蹷墮車宋均曰子路患宰予顧視凶地故以足蹷之使堕車也淮南子曰曾子立孝不過勝母之閭墨子非樂不入朝歌之邑曾子立廉不飲盜泉所謂養志者也里名勝母曾子不入見上里名勝母曾子歛襟論語撰考䜟水名盗泉仲尼不飲里名勝母曽子歛襟按尸子曰孔子至于勝母暮矣而不宿于盗泉渴矣而不飲惡其名也冠一免安可冠也門一杜其可開乎漢書貢禹舉賢良為河南令歲餘以職事為府官所責免冠謝禹曰冠一免安復可冠也晉書汜騰舉孝廉除郎中屬天下兵亂去官還家太守張閟造之閉門不見禮遺一無受歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適張軌徵之為府司馬騰曰門一杜其可開乎拒闗不開須詔乃開後漢郅惲為上東城門侯帝嘗出獵車駕夜還惲拒闗不開帝令從者見面于門間惲曰火明燎逺遂不受詔帝乃回從東中門入明日惲上書諫曰昔文王不敢盤于游田以萬人為憂而陛下逺獵山林夜以繼晝其如社稷宗廟何書奏賜布百疋貶東中門候為㕘封尉又北史文宣嘗近出令張曜居守帝夜還曜不時開門勒兵嚴備帝駐蹕門外久之催廹甚急曜以夜深須火至面識門乃可開于是獨出見帝帝笑曰卿欲效郅君章也乃使曜前開門然後入嗟賞之賜以金綵南史謝莊為侍中領前軍將軍時宋孝武出行夜還敇開門莊守居以棨信或虚須墨詔乃開上後因宴從容曰卿欲效郅君章邪對曰蒙犯塵露晨往宵還容致不逞之徒妄生矯詐臣是以伏須神筆趙熹横劔當階崔光攘衰振杖後漢光武崩趙熹受遺詔典䘮禮是時藩王皆在京師自王莽簒亂舊典不存皇太子與東海王等雜止同席憲章無序熹乃正色横劔殿階扶下諸王以明尊卑時藩國官屬出入宫省與百寮無别熹乃表奏謁者將護分止它縣諸王並令就邸唯朝晡入臨整禮儀嚴門衛内外肅然北史宣武崩後二日廣平王懐扶疾入臨以母弟之親徑至太極西廡哀慟禁内呼侍中黄門領軍二衛云身欲上殿哭大行又須入見主上諸人皆愕然相視無敢抗對者崔光獨攘衰振杖引漢光武初崩太尉趙熹横劔當階推下親王故事辭色甚厲聞者莫不稱善壯光理義有據懐聲淚俱止云侍中以古事裁我我不敢不服于是遂還劉行本置笏于地禇遂良置笏殿階北史劉行本傳隋文帝踐祚拜諫大夫檢校中書侍郎上嘗怒一郎于殿前笞之行本進曰此人素清其過又小上不顧行本正當上前曰陛下不以臣不肖令臣在左右臣言若是陛下安得不聽臣言若非當致之于理安得輕臣而不顧臣所言非私因置笏于地而退上歛容謝之遂原所笞者唐書高帝將立武昭儀禇遂良曰皇后本名家奉事先帝先帝疾執陛下手語臣曰我兒與婦今付卿且徳音在陛下耳可遽忘之皇后無他過不可廢帝不恱翌日復言對曰陛下必欲改立后者請更擇貴姓昭儀昔事先帝身接帷笫今立之奈天下耳目何帝羞黙遂良因致笏殿階叩頭流血曰還陛下此笏丐歸田里帝大怒命引出鄭餘慶執詔封還韋貫之持籍不與舊唐書有醫工崔懐自淮南小將為黄州司馬敇至南省鄭餘慶執之封還以為諸道散將無故受正員五品官是開徼倖之路且無闕可供又新羅人金忠義以機巧進至少府監䕃其子為兩館生韋貫之持其籍不與曰工商之子不當仕忠義以藝通權倖為請者非一貫之持之愈堅既而疏陳忠義不宜汚朝籍詞理懇切竟罷去之批敕塗詔舊唐書李藩為給事中制敇有不可遂于黄敇後批之吏曰宜别連白紙藩曰别以白紙是文狀豈曰批敇邪又李藩為門下侍郎同平章事時河東節度使王鍔用錢數千萬賂遺權倖求兼宰相藩與權徳輿在中書有宻㫖曰王鍔可兼宰相宜即擬來藩遂以筆塗兼相字却奏上云不可徳輿失色曰縱不可宜别作奏豈可以筆塗詔邪曰勢廹矣出今日便不可止日又暮何暇别作奏事果寢李大亮不順臺使求名鷹倪若水不聽宦官採鵁鶄舊唐書李大亮為凉州都督以惠政聞嘗有臺使到州見有名鷹諷大亮獻之大亮宻表曰陛下久絶畋獵而使者求鷹若是陛下之意深乖昔㫖如其自擅便是使非其人太宗下之書曰以卿兼資文武志懐貞確故委藩牧當茲重寄比在州鎮聲績逺彰念此忠勤無忘寤寐使遣獻鷹遂不曲順論今引古逺獻直言披露腹心非常懇到覧用嘉歎古人稱一言之重侔于千金卿之此言深足貴矣今賜卿胡餅一枚雖無千鎰之重是朕自用之物又賜荀悦漢紀一部又倪若水為汴州刺史𤣥宗令宦官徃江南採鵁鶄等諸鳥路由汴州若水知之上表諫曰方今九夏時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕竒禽異鳥供園池之翫逺自江嶺達于京師水憊舟船陸倦擔負飯之以魚肉間之以稻粱道路觀者豈不以陛下賤人貴鳥也𤣥宗手詔答曰朕先使人取少雜鳥其使不識朕意採鳥稍多卿具奏其事辭誠忠懇深稱朕意朕已量事決罰禽鳥並令放訖今賜卿物四十段用答至言又隋唐嘉話楊徳幹高宗朝為萬年令有宦官恃貴寵放鷂不避人禾稼徳幹擒而杖之悉拔其鷂頭宦者涕泣祖背以示于帝帝曰爾情知此漢獰何須犯他百姓竟不之問臣無所解惟知誦書臣無所解惟請誦詩南史齊高帝幸華林宴集使各效技藝褚彦囘彈琵琶王僧䖍桺世隆彈琴沈文季歌子夜來張敬兒舞王儉曰臣無所解惟知誦書因跪上前誦相如封禪書上笑曰此盛徳吾何以堪之後上使陸澄誦孝經起自仲尼居儉曰臣所謂博而寡要臣請誦之乃講君子之事上章上曰善張子布更覺非竒也舊唐書郭山惲景龍中累遷國子司業時中宗數引近臣及修文學士與之宴集嘗令各效技藝以為笑樂工部尚書張錫為談容娘舞將作大匠宗晉卿舞渾脫左衛將軍張洽舞黄麞左金吾衛將軍杜元琰誦婆羅咒給事中李行言唱駕車西河中書舍人盧藏用效道士上章山惲獨奏曰臣無所解請誦古詩兩篇帝從之于是誦鹿鳴蟋蟀之詩奏未畢中書令李嶠以其詞有好樂無荒之語頗渉規諷恐為忤㫖遽止之嵇紹不為齊王操琴戴逵不為武陵鼓琴晉書嵇紹嘗詣齊王冏諮事遇冏讌㑹召董艾葛旟等共論時政艾言于冏曰嵇侍中善于絲竹公可令操之左右進琴紹推不受冏曰今日為懽卿何吝此邪紹對曰公匡復社稷當軌物作則垂之于後紹雖虚鄙忝備常伯腰綬冠冕鳴玉殿省豈可操執絲竹以為伶人之事若釋公服從私宴所不敢辭也冏大慙艾等不自得而退又戴逵字安道性不樂當世常以琴書自娱師事術士范宣于豫章宣異之以兄女妻焉太宰武陵王晞聞其善鼓琴使人召之逵對使者破琴曰戴安道不為王門伶人晞怒乃更引其兄述述聞命欣然擁琴而往逵後徙居㑹稽之剡縣性高潔常以禮獨自處深以放達為非道又南史范􅁮善彈琵琶能為新聲上欲聞之屢諷以微㫖􅁮若不曉終不肯為上嘗宴飲歡適謂􅁮曰我欲歌卿可彈􅁮乃奉㫖上歌既畢􅁮亦止絃因元封歲旱請烹𢎞羊因太和夏旱請斬鄭注漢書元封初歲小旱令百官求雨卜式言曰縣官當食租衣稅而已今桑𢎞羊令吏坐市列販物求利亨𢎞羊天乃雨舊唐書太和六年夏旱時王守澄方寵鄭注及誣構宋申錫後人側目畏之上以久旱詔求致雨之方李中敏上言曰仍歲大旱非聖徳不至直以宋申錫之寃濫鄭注之奸弊今致雨之方莫若斬鄭注而雪申錫漢文帝謂馮唐辱我唐徳宗為蕭復輕朕漢書文帝聞廉頗李牧為人良說乃拊髀曰嗟乎吾獨不得廉頗李牧為將豈憂匈奴哉馮唐曰主臣陛下雖有廉頗李牧不能用也上怒起入禁中良久召唐讓曰公衆辱我獨亡間處虖公何以言吾不能用頗牧也唐對曰臣大父言李牧之為趙將居邊軍市之租皆自用饗士賞賜決于外不從中覆也委任而責成功故李牧乃得盡其知能今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛以饗賔客舍人是以匈奴逺避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行吏奉法不用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之繇此言之陛下雖得李牧不能用也臣誠愚觸忌諱死罪文帝說是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉主中尉及郡國車士注如淳曰良善也師古曰説讀曰悦聞頗牧之善帝意大悦髀音陛主臣恐懼之言覆謂覆白之也舊唐書盧杞奏對于上前阿諛順㫖蕭復正色曰盧杞之詞不正徳宗愕然退謂左右曰蕭復頗輕朕申屠嘉責弄臣怠慢劉行本數倖臣䙝慢漢書申屠嘉為丞相時太中大夫鄧通方愛幸時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下愛幸羣臣則富貴之至于朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中嘉為檄召通詣丞相府不來且斬通通恐入言上上曰汝第往吾今使人召若通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如不為禮責曰通小臣戲殿上大不敬當斬吏今行斬之通頓首首盡出血不解上度丞相已困通使使持節召通而謝丞相此吾弄臣君釋之鄧通既至為上泣曰丞相幾殺臣北史劉行本為太子左庶子時左衛率長史夏侯福為太子所昵嘗于閣内與太子戲福大笑聲聞于外行本時在閣下聞之待其出數之曰汝何小人敢為䙝慢因付執法者推之太子為請乃釋之按夫項令謝頓宣頭使謝漢書灌夫因行酒罵坐田蚡怒曰此吾驕灌夫罪也乃令騎留夫夫不得出籍福起為謝按夫項令謝夫愈怒不肯順蚡廼戲騎縳夫置傳舍後漢書董宣殺湖陽公主蒼頭主還宫訴帝帝使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯格殺湖陽公主奴棒破夀陽公主車後漢書董宣為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖徳中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭撃楹流血被面帝令小黄門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯因敇彊項令出賜錢三十萬宣悉以頒諸吏北史高恭之字道穆為御史中尉時尒朱世隆當朝權盛因内見衣冠失儀道穆便即彈紏帝姊夀陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深恨泣以訴帝帝曰高中尉清直人彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯深以為愧道穆免冠謝帝曰朕以愧卿卿反謝朕按魏氏舊制中丞出千歩清道與皇太子分路行王公皆遥住車去牛頓軛於地以待中丞過其或遲違以赤棒棒之還寺僧碾磑毁權要渠磑舊唐書李元紘為雍州司户時太平公主與僧寺争碾磑公主方承恩用事百司皆希其㫖意元紘遂斷還僧寺竇懐眞為雍州長史大懼太平勢促令元紘改斷元紘大署判後曰南山或可改移此判終無揺動竟執正不撓又李元紘為京兆尹尋有詔令元紘疏決三輔諸王公權要之家皆緣渠立磑以害水田元紘令吏人一切毁之百姓大獲其利蘇則之膝不枕佞人羊侃之牀不坐閹人魏志蘇則與董昭同寮昭嘗枕則膝臥則推下之曰蘇則之膝非佞人之枕也梁書羊侃遷都官尚書時尚書令何敬容用事與之並省未嘗遊造有宦者張僧𦙍候侃侃曰我牀非閹人所坐竟不前之時論美其貞正教讇問佞漢書陳萬年嘗病召子咸教戒于牀下夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具曉所言大要教咸讇也讇古諂字晉書馮懐議百官降禮于王尊問之顔含含曰馮祖思問佞于我我有邪徳乎不過勰品不與朂言晉書周勰為謝安主簿居䘮廢禮崇尚老莊脱畧名教時韓康伯領中正不過勰品為之議曰拜下之敬猶違衆從禮情禮之極不宜以多比為通時人以康伯為澄世所不能澄裁世所不能裁唐語林宋璟為廣府都督𤣥宗思之使内臣楊思朂馳驛往追璟就路竟不與思朂交一言思朂以將軍貴倖殿中訴于𤣥宗上嗟嘆良久拜刑部尚書韋貫之不面李京兆韋子斐不詣高中丞舊唐書徳宗未言京兆尹李實權移宰相言其可否數日而詔行人有以韋貫之名薦於實者答曰是其人居與吾同里亟聞其賢但吾得識其面而薦于上舉笏示説者曰實已記其名氏矣説者喜驟以其語告于貫之且曰子今日詣實而明日受賀矣貫之唯唯數歲中不往然是後竟不遷又韋澳字子斐伯兄温與御史中丞高元裕友善温請用澳為御史謂澳曰高二十九持憲綱欲與汝相面汝必得御史澳不答温曰高君端士不可輕澳曰然恐無呈身御史竟不詣元裕之門豈能曲意安能改行南齊中書舍人阮佃夫在㑹下請假東歸客勸王僧虔以佃夫要倖宜加禮接僧虔曰我立身有素豈能曲意此軰彼若見惡當拂衣而去耳佃夫言于宋明帝因而免官陳書蕭引字升休為建康令時殿内朋主呉璡及宦官李善度蔡脱兒等多所請屬引一皆不許引族子宻時為黄門侍郎諫引曰李蔡之勢在位皆畏憚之亦宜小為身計引曰吾之立身自有本末亦安能為李蔡改行就令不平不過解職耳呉璡竟作飛書李蔡證之坐免官元忠惡𢎞霸媚己姚崇惡敬竒媚己舊唐書郭𢎞霸再遷右臺侍御史大夫魏元忠病僚屬省候𢎞霸獨後入憂見顏色請示便液即染指嘗驗疾輕重賀曰甘者病不瘳今味苦即當愈矣喜甚元忠惡其媚㬥語于朝大唐新語成敬竒為大理正與姚崇有姻親崇嘗感疾敬竒造宅省焉對崇涕泣懐中置生雀數頭一一手執而後放之祝云願令公速愈也崇勉從之敬竒既出崇惡其諛媚謂其子弟曰此涙亦從何而來自茲不復接遇亦見御史臺記又笑林武后有疾詔遍祭神廟以祈福消灾閻朝隱詣少室山時為給事中因親撰祝文以身代犧伏于爼盤令僧道迎至神所觀者如堵㑹后疾愈特加賞賚左司郎中張元一畵代犧圖以進后大笑雖厚賜然亦鄙其為人管寧割席分坐劉璡舉席自隔世説管寧華歆共園中鋤菜見地有片金管揮鋤與瓦石不異華捉而擲去之又嘗同席讀書有乗軒冕過門者寧讀如故歆廢書出㸔寧割席分坐曰子非吾友也南史劉璡與友人㑹稽孔逷同舟入東於塘上遇一女子逷目送曰美而豔璡曰斯豈君子所宜言乎非吾友也於是解裳自隔或曰與友孔徹同舟入東徹留目觀㟁上女子璡舉席自隔不復同坐移吾坐逺客移吾牀逺客宋書張敷為正員中書郎時舍人狄當周赳並管要務以張同省名家嘗欲詣之周曰彼恐不相容接不如勿徃狄言我等並已員外郎矣何憂不得共坐敷先設二牀去壁三四尺許二客就席張呼左右曰移我坐逺客周等失色而退南史紀僧眞得幸于齊世祖容表有士風嘗請于世祖曰臣出自本縣武吏邀逢聖時階榮至此為兒婚得荀昭光女即時無復所須唯就陛下乞作士大夫上曰此由江斆謝􅊪我不得措意可自詣之僧眞承㫖詣斆登榻坐定斆顧命左右曰移吾牀逺客僧眞䘮氣而退以告世祖世祖曰士大夫故非天子所命印封求官書不視求官書南史王惠拜吏部尚書未嘗接客人有與書求官得輙聚閣上及去職印封如初又王球居選職接客甚稀不視求官書疏而銓衡有序不遣子要榮不為兒買第呉志先是二宫並闕中外職司多遣子弟給侍全琮報陸遜遜以為子弟茍有才不憂不用不宜私出以要榮利若其不佳終為取禍且聞二宫勢敵有彼此此古人之厚忌也南史時生徒對策多行賄賂岑文豪謂袁憲父君正具束修君正曰吾豈能用錢為兒買第邪郭晞佯瘖噤口不言郭曖辭以居䘮被疾舊唐書郭晞丁父子儀䘮持服京城朱泚搆逆遣人就第問訊欲令掌兵晞佯瘖噤口不言泚以兵脅之晞終不語賊知其不可用乃止晞濳奔奉天僅而獲免又朱泚之亂郭曖不知車駕幸奉天為賊所逼欲授偽官曖辭以居䘮被疾既而與兄晞弟曙及昇平公主皆奔奉天佯紿遺痢遽稱腹痛唐新語陸徳明受學于周𢎞正善言𤣥理王世充僭號封其子為漢王署徳明為師就其家將行束修之禮徳明恥之因服巴豆散卧東壁下充之子入跪牀下徳明佯紿之遺痢竟不與語遂移病成臯及入唐太宗引為文學館學士使閻立本寫其形禇亮為之讚曰經術為貴𤣥風可師勵學非逺通儒在茲續世說王毛仲有寵于𤣥宗百官附之一日毛仲嫁女上問何所須毛仲頓首謝曰臣萬事已備但未得客上曰張説源乾曜軰豈不可召耶對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰誠如聖㫖上笑曰朕明日為汝召客明日上謂宰相朕奴毛仲有婚事卿等宜與達官悉詣其第既而日中客未敢舉箸待璟久之方至先執酒西向拜謝飲不盡巵遽稱腹痛而歸桓温為子求婚于坦之徐勉為子求婚于蒨女晉書王坦之為桓温長史温欲與子求婚于坦之及還家省父而述愛坦之雖長大猶抱置膝上坦之因言温意述大怒遽排下曰汝竟癡邪詎可畏温而以女妻兵也坦之乃辭以他故温曰此尊君不肯耳遂止南史江蒨方雅有風格僕射徐勉權重唯蒨與王規抗禮不為之屈勉因蒨門客翟景為子繇求昏于蒨女不答景再言之乃杖景四十東家棗樹垂庭中東隣桑葚落其家漢書王吉少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹隣里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還其厲志如此北史趙軌為齊州别駕有能名其東隣有桑椹落其家軌遣人悉拾還其主戒其諸子曰吾非以此求名意者非機杼物不願侵人汝等宜以為戒乞不使王彦方知皆唯恐桺徳廣知後漢王烈字彦方少師事陳寔以異行稱鄉里有盜牛者主得之盜請罪曰刑戮自甘乞不使王彦方知也烈聞而使人謝之遺布一端或聞其故烈曰盜懼我聞其過是有恥惡之心既懐恥惡必能改善故以此激之北史桺靖少方雅鄉里亦慕而化之或有不善者皆曰唯恐桺徳廣知也又南史沈道䖍傳有人竊其園菜者外還見之乃自逃隱待竊者去後乃出人又拔其屋後大筍令人止之曰惜此筍欲令成林更有佳者相與乃令人買大筍送與之盜者慙不取道䖍使致其門内而還常以捃拾自資同捃者或争穟道䖍諫之不止悉以其所得與之争者愧恧後每事輒云勿令居士知范冉辭麥庾易辭麥袁崧後漢書范冉去官嘗使兒捃拾麥得五斛隣人尹臺遺之一斛囑兒莫道冉後知即令并送六斛言麥已雜矣遂誓不敢受冉或作丹南史臨川王暎餉庾易麥百斛易謂使人曰走樵採麋鹿之伍終其解之毛衣馳騁日月之車得保自耕之禄于大王之恩亦已深矣辭不受送絹償刈榖以縑置禾下晉書羊祜出軍行呉境刈榖為糧皆計所侵送絹償之北史鹿愈嘗詣徐州馬疲附船而至大梁夜睡從者上岸竊禾四束飼馬船行數里愈覺即停船至取禾處以縑三丈置禾束下而反又趙軌召為司馬在道夜行其左右馬逸入田中㬥人禾軌駐馬待明訪知禾主酬置而去燒輜重十餘船焚文劵一大厨南史孔顗弟道存從弟徽頗營産業二弟請假東還覬出渚迎之輜重十餘船皆是綿絹紙席之屬覬見之為喜謂曰我比乏得此甚要因命置岸側既而正色謂曰汝軰忝預士流何至還東作賈客邪命燒盡乃去又顧覬之家門雍穆為州郡所重子綽私財甚豐鄉里士庶多負責覬之禁不能止及後為呉郡誘出文劵一大厨悉令焚之宣語逺近皆不須還綽懊歎彌日標牓賣宅劵契賣牛北史皇甫亮性質朴純厚終無片言矯飾所居宅洿下標牓賣之將買者或問其故亮每答云為宅中水淹不洩雨即流入牀下由此宅終不售又孟信去官居貧無食唯有一老牛其兄子賣之擬供薪米劵契已訖市法應知牛主住在所信適從外來見買牛人方知其賣也因告之曰此牛先來有病小用便發君不須也杖其兄子二十買牛人嗟異良久呼信曰孟公但見與牛未必須其力也苦請不得乃罷買牛者周文帝帳下人周文深歎異焉又南史明山賔性篤實家中常乏困貨所乘牛既售受錢乃謂買主曰此牛經患漏蹄療差已久恐後脱發無容不相語買主遽追取錢處士阮孝緒聞之嘆曰此言足使還淳反朴激薄停澆矣駢志卷二
