body:
  text: 駢志卷五明陳禹謨撰丙部上漢魯共王壊舊宅得古文經傳河内女子發老屋得易禮尚書漢書魯共王初好治宫室壊孔子舊宅以廣其宫聞鐘磬琴瑟之聲遂不敢復壊於其壁中得古文經傳又論衡孝景帝時魯共王壞孔子教授堂以為殿得百篇尚書于墻壁中武帝使使者取視莫能讀者遂祕于中外不得見至孝成皇帝時徴為古文尚書學東海張霸按百篇之序空造百兩之篇獻之成帝帝出祕百篇以校之皆不相應于是下霸于吏吏白霸罪當至死成帝髙其才而不誅亦惜其文而不滅故百兩之篇傳在世間者傳見之人則謂尚書本有百兩篇矣論衡孝宣皇帝之時河内女子發老屋得逸易禮尚書各一篇奏之宣帝下示博士然後易禮尚書各益一篇而尚書二十九篇始定矣按洪容齋云劉向説苑臣術篇一章云泰誓曰附下而罔上者死附上而罔下者刑與聞國政而無益於民者退在上位而不親賢者逐此所以勸善而黜惡也漢武帝元朔元年詔責中外不興廉舉孝有司奏議其語與説苑所載正同而諸家注釋至于顏師古皆不能援以為證今之泰誓初未嘗有此語也漢宣帝時河内女子得泰誓一篇獻之然年月不與序相應又不與左傳國語孟子衆書所引泰誓同馬鄭王肅諸儒皆疑之今不復可考韓嬰與仲舒論江公與仲舒議漢書燕趙間言詩者由韓生嬰韓生亦以易授人推意而為之傳燕趙間好詩故其易微唯韓氏自傳之武帝時嬰嘗與董仲舒論于上前其人精悍處事分明仲舒不能難也又武帝時瑕丘江公與董仲舒竝仲舒通五經能持論善屬文江公呐于口上使與仲舒議不如仲舒而丞相公孫𢎞本為公羊學比輯其議卒用董生五經笥五經庫九經庫後漢書邊韶解弟子嘲云腹便便五經笥又唐書虞世南云昔任彥昇美談經籍梁代稱為五經笥北史房暉逺明三禮春秋三傳詩書周易兼善圖緯恒以教授為務太常卿牛𢎞每稱為五經庫又舊唐書禇遂良稱谷那律為九經庫姜肱博通五經張霸博覽五經後漢書姜肱博通五經兼明星緯又張霸博覽五經諸生孫林劉固段著等并慕之各市宅其傍以就學焉五經無雙許叔重五經無對有陸乂後漢書許愼字叔重性淳篤少博學經籍馬融常推敬之時人為之語曰五經無雙許叔重北史陸乂于五經最精熟館中謂之石經人為之語曰五經無對有陸乂説經鏗鏗楊子行解經不窮戴侍中東觀漢記楊政字子行治梁丘易與京兆祁聖元同好俱名善説經書京師號曰説經鏗鏗楊子行論難僠僠祁聖元後漢書戴憑為侍中京師為之語曰解經不窮戴侍中匡鼎説詩張文為論漢書匡衡父世農夫至衡好學家貧傭作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來匡説詩解人頥按服虔曰鼎猶言當也若言匡且來也應劭曰鼎方也張宴曰匡衡少時字鼎長乃易字稚圭世所傳衡與貢禹書上言衡敬報下言匡鼎白知是字也師古曰服應二説是也賈誼曰天子春秋鼎盛其義亦同而張氏之説蓋穿鑿矣假有其書乃是後人見此傳云匡鼎來不曉其意妄作衡書云鼎白耳字以表徳豈人之所自稱乎今有西京雜記者其書淺俗出于里巷多有妄説乃云匡衡小名鼎蓋絶知者之聽又張禹善論語詔令授太子論語使魯無卿及始夏侯勝王陽蕭望之韋𤣥成皆説論語篇第或異禹先事王陽後從庸生采獲所安最後出而尊貴諸儒為之語曰欲為論念張文由是學者多從張氏餘家寖微樂詳并授五業楊充精究七經魏略時太學初立有博士十餘人學多褊狹又不熟悉略不親教備員而已惟詳五業并授其或難解質而不解詳無愠色以杖畫地牽譬引類至忘寢食以是獨擅名于逺近華陽國志楊充少好學求師學古學于扶風馬季長南陽朱明叔潁川白仲職精究七經易以東矣吾道東矣漢書丁寛字子襄梁人也初梁項生從田何受易時丁寛為項生從者讀易精敏材過項生遂事何學成何謝寛寛東歸何謂門人曰易以東矣後漢書鄭𤣥西入闗因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴𤣥在門下三年不得見及使高業弟子受于𤣥𤣥日夜尋誦未嘗怠惓㑹融集諸生考論圖緯聞𤣥善算乃召見于樓上𤣥因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣為弟子都養直諸生監厨漢書兒寛以郡國選詣博士受業孔安國貧無資用嘗為弟子都養時行賃作帶經而鋤休息輒讀誦其精如此北史刁冲家世貴達及從師於外自同諸生于時學制諸生悉日直監厨冲雖有僕􅈻不令代己身自炊㸑帶經而鉏見上帶經而農晉書皇甫謐就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言百日習一經三年通一經晉書魏舒年四十餘郡上計掾察孝㢘宗黨以舒無學業勸令不就可以為高耳舒曰若試而不中其負在我安可虚竊不就之高以為已榮乎於是自課百日習一經因而對䇿升第又戴邈曰古之俊乂必三年而通一經裴昭明遺子一經柳世隆遺子一經南史裴昭明歴郡皆清勤常謂人曰人生何事須聚畜一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不事産業又栁世隆性清㢘唯盛事典墳張緒問曰觀君舉措當以清名遺子孫耶荅曰一身之外亦復何須子孫不才將為争府如其才也不如一經焦贛易林許曼易林後漢書焦贛長於災變分六十四卦更直日用事以風雨寒温為候各有占驗今焦氏易林即贛所著又方術傳道士張巨君授以方術所著易林至今行於世漢趙􅁮著吳越春秋晉楊方撰吳越春秋後漢書趙􅁮少嘗為縣吏奉檄迎督郵􅁮恥于厮役遂棄車馬去到犍為資中詣杜撫受韓詩究竟其術積二十年卒業乃歸州召補從事不就舉有道卒于家著吳越春秋詩細厯神淵蔡邕至㑹稽讀詩細而歎息以為長于論衡邕還京師傳之學者咸誦習焉晉書楊方少好學有異才時虞喜兄弟以儒學立名雅愛方為之延譽諸葛恢嘗遣方為文薦郡功曹主簿虞預稱美之送以示賀循循報書曰此子開拔有志意只言異于凡猥耳不圖偉才如此其文甚有竒分若出其胸臆乃是一國所推豈但牧豎中逸羣邪聞處舊黨之中好有謙冲之行此亦立身之一隅然世衰道喪人物凋弊每聞一介之徒有向道之志冀之願之如方者乃荒萊之特苗鹵田之善秀姿質已良但沾染未足耳移植農壤必成嘉榖循遂稱方於京師後補高梁太守在郡積年著五經鉤沉更撰吳越春秋并雜文章皆行于世葛洪西京雜記蕭賁西京雜記西京雜記葛洪自序云洪家世有劉子駿漢書一百卷無首尾題目但以甲乙丙丁紀其卷數先父傳之歆欲撰漢書編録漢事未得締構而亡故書無宗本止雜記而已失前後之次無事類之辨後好事者以意次第之始甲終癸為十帙帙十卷合為百卷洪家具有其書試以此記考校班固所作殆是全取劉書有小異同耳并固所不取不過二萬許言今抄出為二卷名曰西京雜記以禆漢書之闕爾南史齊宗室蕭賁好著述嘗著西京雜記六十巻劉向校書于天禄閣揚雄校書于天禄閣拾遺記劉向于成帝之末校書天禄閣専精覃思夜有老人著黄衣植青藜杖登閣而進見向暗中獨坐誦書老父乃吹杖端烟燃因以見向説開闢已前向因受五行洪範之文恐辭説繁廣忘之乃裂裳及紳以記其言至曙而去向請問姓名云我是太一之精天帝聞夘金之子有博學者下而觀焉前漢書王莽以符命自立時揚雄校書于天禄閣上治獄使者欲收雄雄從閣上自投下幾死莽聞之曰雄素不與事有詔勿問然京師為之語曰惟寂寞自投閣爰清静作符命三國遺録魏文帝為閲書觀讀書千卷者登此觀登者六人而已揚子雲夢鳯凰集𤣥上董仲舒夢蛟龍入懐中西京雜記揚雄讀書有人語之曰無為自苦𤣥故難傳忽然不見雄著太𤣥經夢吐鳯凰集𤣥之上頂而滅又董仲舒夢蛟龍入懐乃作春秋繁露詞劉向省新語而作新序桓譚詠新序而作新論晉書陸喜少有聲名好學有才思嘗為自叙其略云劉向省新語而作新序桓譚詠新序而作新論余不自量感子雲之法言而作言道覩賈子之美才而作訪論觀子政洪範而作古今厯鑒蔣子通萬機而作審機讀幽通思𤣥四愁而作娛賔九思真所謂忍愧者也蕭琛甚祕漢書謝僑不質班史南史蕭琛為宣城太守有北僧南渡唯齎一瓠蘆中有漢書序傳僧云三輔舊事相傳以為班固真本琛固求得之其書多有異今者而紙墨亦古文字多如龍舉之例非􅈻非篆琛甚祕之又謝僑素貴嘗一朝無食其子啓欲以班史質錢荅曰寧餓死豈可以此充食乎受太𤣥好太𤣥漢書鉅鹿侯芭常從揚雄居受其太𤣥法言焉雄卒侯芭為起墳䘮之三年時大司空王邑納言嚴尤聞雄死謂桓譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與桓不及見也凡人賤近而貴逺北史司馬膺之好讀太𤣥經又注揚雄蜀都賦每云我欲與揚子雲周旋鬼之董狐僧之董狐晉書干寳為搜神記二十卷以示劉惔惔曰卿可謂鬼之董狐酉陽雜俎魏李騫之同泰寺浮屠中傍有執板筆者僧曰此是尸頭専記人罪騫曰便是僧之董狐錢神論錢愚論晉書魯褒以貧素自立元康之後綱紀大壊褒傷時之貪鄙乃隠名而著錢神論以刺之南史梁宗室臨川静惠王宏性愛錢百萬一聚黄牓標之千萬一庫懸一紫標如此三十餘間帝與佗卿屈指計三億餘萬餘屋貯布絹絲綿漆蜜紵蠟朱砂黄屑雜貨但見滿庫不知多少武帝謂曰阿六汝生活大可豫章王綜以宏貪吝遂為錢愚論千字文萬字文梁書髙祖次韻王羲之書千字使周興嗣為文高祖稱善加賜金帛又御覽引梁書武帝取鍾王真迹授周興嗣令選不重複者千字韻而文之興嗣一宿而上鬢髪皆白大被賞遇後興嗣目疾武帝親為之合藥又賈氏談録進士周逖改次千字文更撰天寳應道千字文將進之請頒行天下先呈宰執右相陳希烈問之曰有添換乎逖曰翻破舊文一無添換又問翻破盡乎對曰盡右相曰枇杷二字如何翻破逖曰唯此兩字依舊右相曰若如此還未盡逖逡巡不能對北史秦王俊聞潘徽名召為學士嘗從俊朝京師在塗令徽於馬上為賦一行賦成其名曰述恩賦俊覽而善之復令為萬字文曹憲文選音義公孫文選音義舊唐書曹憲所撰文選音義甚為當時所重初江淮間為文選學者本之于憲又有許淹李善公孫羅復相繼以文選教授由是其學大興于代又公孫羅厯沛王府㕘軍無錫縣丞撰文選音義卷行于代郭子𤣥竊向秀莊子注何法盛竊郗紹中興書晉書郭象字子𤣥少有才理好老莊能清言先是注莊子者數十家莫能究其旨統向秀於舊注外而為解義妙演竒致大暢𤣥風惟秋水至樂二篇未竟而秀卒秀子幼其義零落然頗有别本遷流象為人行薄以秀義不𫝊於世遂竊以為己注乃自注秋水至樂二篇又易馬蹄一篇其餘衆篇或㸃定文句而已其後秀義别本出故今有向郭二莊其義一也南史時有高平郗紹作晉中興書數以示何法盛法盛有意圖之謂紹曰卿名位貴逹不復俟此延譽我寒士無聞于時如袁宏干寶之徒賴有著述流聲于後宜以為惠紹不與至書成在齋内厨中法盛詣紹紹不在直入竊書紹還失之無復兼本于是遂行何書又宋景濂曰齊丘子六卷一名化書言道術徳仁食儉六化為甚悉世傅為偽唐宋齊丘子嵩作張文潜題其後云齊丘犬䑕之雄盖不足道其為化書雖皆淺機小數亦㣲有見於黄老之所謂道徳者噫是書之作非齊丘也終南山隠者譚峭景升也齊丘竊之耳有子焠掌孫敬懸頭荀子有子惡卧而焠掌齊竟陵王頌云有子刺掌行修名立桓範世要論云有子好卧則刺其掌漢書孫敬字文寳好學晨夕不休及至眠睡疲寢以繩繫頭懸屋梁後為當世大儒董仲舒三年不窺園趙昱歴年不窺園裴公美經年不出墅漢書董仲舒少治春秋孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面盖三年不窺園舊唐書裴休字公美童齓時兄弟同學于濟源别墅休經年不出墅門晝講經籍夜課詩賦謝承漢書趙昱就處士綦母君受公羊傳兼該羣業至歴年濳志不窺園圃親踈希見其面十五年不窺園十七年不闚門後漢書桓榮貧窶無資常客傭以自給精力不倦十五年不窺家園又何休作春秋公羊解詁覃思不闚門十有七年流粟流麥鄒子曰朱買臣貧賤之時孜孜修學不覺雨之流粟志在經傳也後漢書高鳯好學不休其家曝麥令鳯守雞以竿授其手鳯執竿讀書雨大至不覺執竿如故其妻還見麥流甚以為怒鳯亦不愧晉藝術傳幸靈父母嘗使守稻羣牛食之靈見而不驅待牛去乃往理其殘亂者袁宏運租誦詩高閭送租修刺晉書袁宏父朂臨汝令宏少孤貧以運租自業謝尚時鎮牛渚秋夜乗月率爾與左右㣲服泛江㑹宏在舫中諷詠聲既清㑹辭又藻拔遂駐聽久之遣問焉荅曰是袁臨汝郎誦詩即其詠史之作也尚傾率有勝致即迎升舟與之談論申旦不寐自此名譽日茂北史高閭早孤少好學博綜經史下筆成章少為車子送租至平城修刺詣崔浩浩與談竒之使為謝中書監表明日浩歴租車過駐馬呼閭諸車子皆驚閭本名廬浩乃改為閭而字焉由是知名王仲任閲書市肆徐文逺閲書于肆後漢書王充字仲任少孤鄉里稱孝後到京師受業太學師事扶風班彪好博覽而不宏章句家貧無書常游洛陽市肆閲所買書一見輒能誦憶遂博通衆流百家之言舊唐書徐文逺家貧無以自給其兄休鬻書為事文逺日閲書于肆博覽五經尤精春秋左氏傳管寧榻穿膝處蕭藻牀有膝痕高士傳管寧自越海及歸常坐一木榻積五十餘年未嘗箕股其榻上當膝處皆穿南史蕭藻性恬静獨處一室牀有膝痕宗室衣冠莫不楷則常以爵禄太過毎思屏退門庭閒寂賓客罕通簡文尤敬愛之自遭家禍恒布衣蒲席不食鮮禽非公庭不聽音樂武帝每以此稱之不讀謝詩覺口臭不讀老子覺舌强談藪梁高祖重陳郡謝元暉詩常曰不讀謝詩三日覺口臭郭子殷仲堪云三日不讀道徳經便覺舌本間强腹笥肉譜後漢書邊韶字孝先以文學知名教授數百人韶口辯曽晝日假卧弟子私嘲之曰邊孝先腹便便懶讀書但欲眠韶潜聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙隋唐嘉話秦王府倉曹李守素尤精譜學人號為肉譜書簏書厨晉書右丞傳迪好廣讀書而不解其意劉栁唯讀老子而已迪每輕之栁云卿讀書雖多而無所解可謂書簏矣南史陸澄當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戲之曰陸公書厨也書倉經苑拾遺記曹曾慮先文湮没乃積石為倉以藏書故謂曹氏為書倉又任末年十四時學無常師負笈不逺險阻或依林木之下編茅為菴削荆為筆尅樹汁為墨夜則暎星望月暗則縛麻蒿以自照觀書有合意者題其衣裳以記其事門徒悦其勤學更以浄衣易之河洛祕奥非正典籍所載皆注記于柱壁及園林樹木慕好學者來輒寫之時人謂任氏為經苑賈長頭范長頭後漢書賈逵傳逵自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭南史范雲謂人曰諸君進止威儀當問范長頭指范岫也以岫多識前代舊事皇甫謐書淫劉孝標書淫晉書皇甫謐耽翫典籍忘寢與食時人謂之書淫或有箴其過篤將損耗精神謐曰朝聞道夕死可矣况命之修短分定懸天乎南史劉峻字孝標自以少時未開悟晚更進厲精明慧過人苦所見不博聞有異書必往祈借清河崔慰祖謂之淫書于是博極羣書文藻秀出故其自序云黌中濟濟皆升堂亦有愚者解衣裳言其少年魯鈍也行秘書人物志隋唐嘉話太宗嘗出行有司請載副書以從帝曰不須虞世南在此行秘書也舊唐書李守素署天䇿府倉曹㕘軍尤工譜學自晉宋已降四海士流及諸勲貴華戎閥閲莫不詳究當時號為行譜嘗與虞世南共談人物言江左山東世南猶相酬對及言北地諸侯次第如流顯其世業皆有援證世南但撫掌而笑不復能荅歎曰行譜定可畏許敬宗因謂世南宜改之世南曰昔任彦昇美談經籍梁代稱為五經笥今日倉曹人物志可矣暗寫五行志暗疏列女傳南史陸倕所讀一編必誦于口嘗借人漢書失五行志四卷乃暗寫還之略無遺脱舊唐書虞世南授𢎞文館學士與房𤣥齡對掌文翰太宗嘗命寫列女傳以裝屏風于時無本世南暗疏之不失一字又蔣乂字徳源七嵗時誦庾信哀江南賦數遍而成誦在口以聰悟强力聞于親黨徳宗嘗登凌烟閣見左壁穨剝上有殘缺文記每行可辨三五字命録之以問宰臣遽受宣無以對即令召乂至對曰此聖厯中侍臣圖贊也即于御前口誦以補其缺不失一字上歎曰虞世南暗寫列女傳無以加也奴婢皆讀書童僕皆呻吟世説鄭𤣥家奴婢皆讀書嘗使一婢不稱旨將撻之方自陳説𤣥怒使人曳著泥中須臾復有一婢來問曰胡為乎泥中荅曰薄言往愬逢彼之怒論衡劉子政玩弄左氏童僕妻子皆呻吟之應璩善書記穆之便尺牘文章叙録應璩博學好屬文善為書記又吳質别𫝊質有才學善為書記沈約宋書劉穆之與朱齡石并便尺牘常于高祖坐與齡石荅書自旦至中穆之得百函齡石得八十函而穆之應對無廢按穆之内總朝政外供軍旅决斷如流事無壅滯賓客輻輳求訴百端内外諮禀盈堦滿室目覽辭訟手荅牋書耳行聽受口幷酬應不相參渉皆悉贍舉又言談賞笑彌日亘時未嘗倦苦裁有閒暇手自寫書尋覽篇章校定墳籍郭子𤣥語如懸河楊盈川文如懸河晉書太尉王衍每云聽郭象語如懸河瀉水注而不竭唐書崔融與張説評王勃等曰勃文章宏放非常人所及楊烱盧照隣可以企之説曰不然盈川文如懸河酌之不竭優於盧而不减王恥居後信然愧前謙也高齋學士青錢學士南史庾肩吾初為晉安王國常侍王每徙鎮肩吾常隨府在雍州被命與劉孝威等十人抄撰衆籍豐其果饌號高齋學士舊唐書張鷟兄應八舉皆登甲科四參選判策為銓府之最員外郎員半千謂人曰張子之文如青錢萬簡選中未聞退時時流重之目為青錢學士奪席以益戴憑奪袍以賞之問謝承後漢書正旦朝賀帝令羣臣説經史更相詰難義有不通輙奪其席以益通者戴憑遂重坐五十餘席舊唐書則天幸洛陽龍門令從者賦詩東方虬詩先成則天以錦袍賜之及宋之問詩成則天稱其詞愈高奪虬錦袍以賞之陸澄幷奪舊物王摛抽掣簟扇南史王儉自以博聞多識讀書過陸澄儉集學士何憲等盛自商略澄待儉語畢然後談所遺漏數百千條皆儉所未覩儉乃歎服儉在尚書省出巾箱几案雜服飾令學士􅈻事事多者與之人人各得一兩物澄後來更出諸人所不知事復各數條并舊物奪將去又王儉嘗使賔客𨽻事多者賞之事皆窮唯廬江何慮為勝乃賞以五花簟白團扇坐簟執扇容氣甚自得王摛後至儉以所􅈻示之曰卿能奪之摛操筆便成文章既奥辭亦華美舉坐擊賞摛乃命左右抽憲簟手自掣取扇登車而去儉笑曰所謂大力者負之而趨一語一縑一字三縑南史何遠每戲語人曰卿能得我一妄語則謝卿以一縑衆共伺之不能記也評曰先儒學問自不妄語始若何逺庻幾近之矣唐書裴度辟皇甫湜為判官度修福先寺將立碑求文于白居易湜怒曰近舍湜而遠取居易請從此辭度謝之湜即請斗酒飲酣援筆立就度贈以車馬繒彩甚厚湜大怒曰自吾為顧況集序未嘗許人今碑字三千字一字三縑何遇我薄邪度笑曰不羈之才也從而酬之又舊唐書李邕早擅才名尤長碑頌雖貶職在外中朝衣冠及天下寺觀皆多齎持金帛往求其文前後所製凡數百首受納饋遺亦至鉅萬時議以為自古鬻文獲財未有如邕者西番寫記新羅請記舊唐書馮定初長慶中源寂使新羅國見其國人傳寫諷念定所為黑水碑畫鶴記韋休符之使西番也見其所舘寫定商山記于屏障其文名馳于戎夷如此北夢𤨏言大中四年進士馮㳙登第榜中文譽最高是歲新羅國起樓厚賫金帛奏請撰記時人榮之鮑照才盡江淹才盡宋書鮑照字明逺文辭贍逸為臨川王義慶所知賞文帝以為中書舍人上好文章自謂人莫能及照悟其㫖為文章多鄙言累句咸謂才盡實不然也南史江淹字文通少以文章著晚節才思微退云為宣城太守時罷歸始泊船禪靈寺渚夜夢一人自稱張景陽謂曰前以一匹錦相寄今可見還江懐中得數尺與之此人大恚曰那得割截都盡顧見丘遲謂曰餘此數尺既無所用以遺君自爾淹文章躓矣又嘗宿于冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懐中得五色筆一以授之爾後為詩絶無美句時人謂之才盡又乾􅍧子淹夢神人授五色筆識者謂為五臟神漢高帝大風歌漢武帝秋風辭史記高祖擊黥布軍還歸過沛留置酒沛宫悉召故人父老子弟縱酒發沛中兒得百二十人教之歌酒酣高祖擊筑自為歌詩曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之高祖乃起舞慷慨傷懐泣數行下謂沛父兄曰游子悲故郷吾雖都闗中萬歲後吾魂魄猶樂思沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑復其民世世無有所與沛父兄諸母故人日樂飲極驩道舊故為笑樂十餘日高祖欲去沛公兄故請留高祖高祖曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻高祖復留止張飲三日張晏曰張帷帳也漢武故事帝行幸河東祀后土顧視帝京忻然中流與羣臣飲讌帝歡甚乃自作秋風辭曰秋風起兮白雲飛草木黄落兮鴈南歸蘭有秀兮菊有芳懐佳人兮不能忘汎樓船兮濟汾河横中流兮揚素波簫鼓鳴兮發櫂歌歡樂極兮哀情多少壯幾時兮柰老何文中子曰大風安不忘危其霸心之存乎秋風樂極悲來其悔心之萌乎周書明帝幸同州過故宅賊詩曰玉燭調秋氣金輿厯舊宫還如過白水更似入新豐霜潭清晚菊寒井落疎桐舉杯延故老令聞歌大風禰衡賦鸚鵡謝莊賦鸚鵡後漢黄祖長子射與禰衡善射時大㑹賓客人有獻鸚鵡者射舉巵于衡曰願先生賦之以娛賓客衡攬筆而作文無加㸃辭采甚麗南史宋南平王鑠獻赤鸚鵡普詔羣臣為賦太子左衛率袁淑文冠當時作賦畢示謝莊及見莊賦歎曰江東無我卿當獨秀我若無卿亦一時之傑遂隱其賦辨汾陽之鼎賜黄金十斤辨曲水之集賜金五十斤漢書汾陽得寶鼎武帝嘉之薦見宗廟藏于甘泉宫羣臣皆上夀賀曰陛下得周鼎吾丘夀王獨曰非周鼎上聞之召而問之曰今朕得周鼎羣臣皆以為然夀王獨以為非何也有說則可無説則死夀王對曰臣安敢無説鼎為周出故名周鼎今漢自高祖繼周亦昭徳顯行布恩施惠六合和同至于陛下恢廓祖業功徳愈盛天瑞幷至珍祥畢見昔秦始皇親出鼎于彭城而不能得天祚有徳而寶鼎自出此天子所以與漢乃漢寶非周寶也上曰善羣臣皆稱萬歲是自賜夀王黄金十斤晉書武帝嘗問摯虞三日曲水之義虞對曰漢章帝時平原徐肇以三月初生三女至三日俱亡村人以為怪乃招攜之水濱洗祓遂因水以汎觴其義起此帝曰必如所談便非好事束晳進曰虞小生不足以知臣請言之昔周公城洛邑因流水以汎酒故逸詩曰羽觴隨波又秦昭王以三日置酒河曲見金人奉心水之劒曰今君制有西夏乃霸諸侯因此立為曲水二漢相縁皆為盛集帝大悦賜晳金五十斤相見各賦一物相見勿為常談文士傳張惇子純與張儼及朱異俱童少往見驃騎將軍朱據據聞三人才名欲試之告曰老鄙相聞饑渴甚矣夫騕褭以迅驟為功鷹隼以輕疾為妙其為我各賦一物然後乃坐儼乃賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席以冬設簟為夏施揖讓而坐君子攸宜異賦弩曰南嶽之幹鍾山之銅應機命中獲隼高墉三人各隨其目所見而賦之皆成而後坐據大歡悅晉書陸雲與荀隱素未相識嘗㑹張華坐華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也又時有桑門釋道安俊辯有高才自北至荆州與習鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒時人以為佳對户牖牆壁各置刀筆門庭藩溷皆著筆紙後漢王充好論説始若詭異終有理實以為俗儒守文多失其眞乃閉門尋思絶慶弔之禮户牖墻壁各置刀筆著論衡八十五篇二十餘萬言袁崧書曰充所作論衡中土未有傳者蔡邕入吳始得之恒祕玩以為談助其後王朗為㑹稽太守又得其書乃還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益由是遂見傳焉抱朴子曰時人嫌蔡邕為異書或搜求其帳中隱處果得論衡而抱數卷持去蔡邕丁寧之曰唯我與爾共之勿廣也晉書左思貌寑口訥而詞藻壯麗不好交游惟以閒居為事造齊都賦一年乃成復欲賦三都㑹妺芬入宫移家京師乃詣著作郎張載訪岷卭之事遂搆思十年門庭藩溷皆著筆紙遇得一句即便疏之司空張華見而歎曰班張之流也使讀之者盡而有餘久而更新于是豪貴之家競相傳寫洛陽為之紙貴袁宏益韻一句張融足賦四句晉書袁宏與王珣伏滔同在桓温坐温令滔讀北征賦至聞所傳于相傳云獲麟于此野誕靈物以瑞徳奚授體于虞者疚尼父之慟泣似實慟而非假豈一姓之足傷乃致傷于天下其本至此便改韻珣云此賦方傳千載無容率爾今于天下之後移韻徙事然于寫送之致似為未盡滔云得益寫韻一句或為小勝温云卿思益之宏應聲荅曰感不絶于余心遡流風而獨寫珣誦味久之謂滔曰當今文章之美故當共推此生南史張融作海賦文詞詭激獨與衆異後以示鎭軍將軍顧愷之愷之曰卿此賦實超𤣥虛但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路此四句後所足也孔門如用賦則賈誼升堂相如入室孔門如用詩則公幹升堂思王入室揚子云詩人之賦麗以則辭人之賦麗以淫如孔氏之門人用賦也則賈誼升堂相如入室矣詩品云陳思王曹植詩其源出於國風骨氣竒高詞彩華茂情兼雅怨體具文質粲溢今古卓爾不羣嗟乎陳思王之於文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有琴笙女工之有黼黻俾爾懐鉛吮墨者抱篇章而景慕暎餘暉以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣覆醬瓿覆酒甕漢書揚雄作太𤣥劉歆觀之曰吾恐後人用覆醤瓿也師古曰瓿音剖小甖也晉左思欲為三都賦陸機聞之為弟雲書曰此間有傖父欲作三都賦須其成當以覆酒甕耳何愧張子房何如霍去病宋書孝武嘗歡飲普令羣臣賦詩沈慶之手不知書眼不識字上逼令作詩慶之曰臣不知書請口授師伯上即令顏師伯執筆慶之口授之曰微命值多幸得逢時運昌朽老筋力盡徒歩還南崗辭榮此聖世何愧張子房上甚悦衆坐稱其辭意之美南史梁武帝于華灮殿宴飲連旬令左僕射沈約賦韻曹景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英㧞何必止在一詩景宗已醉求作不已詔令約賦韻時韻已盡唯餘競病二字景宗便操筆斯須而成其辭曰去時兒女悲歸來笳鼓競借問行路人何如霍去病帝歎不已約及朝賢驚嗟竟日詩思不來作鼓吹用思苦澁求音樂俗説桓𤣥作詩思不來輙作鼓吹既而思得云鳴鵠響長阜歎曰鼔吹固自來人思舊唐書李翰以進士知名天寶中寓居陽翟為文精宻用思苦澁嘗從陽翟令皇甫曽求音樂每思竭則奏樂神逸則著文曽撰張廵姚誾等傳兩卷士友稱之文宗激賞公權春日詩文宗獨諷公權夏日詩舊唐書柳公權從文宗幸未央宫苑中駐輦謂公權曰我有一喜事邊上衣賜久不及時今年二月給春衣訖公權前奉賀上曰單賀未了卿可賀我以詩宫人迫其口進公權應聲曰去歲雖無戰今年未得歸皇恩何以報春日得春衣上悦激賞久之又文宗夏日與學士聨句帝曰人皆苦炎熱我愛夏日長柳公權續曰薰風自南來殿閣生微涼時丁袁五學士皆屬繼帝獨諷公權兩句曰辭清意足不可多得楓落呉江冷風落呉江雪舊唐書時崔信明自謂文章獨歩多所凌轢鄭世翼遇諸江中謂之曰嘗聞楓落吳江冷信明欣然示以餘篇世翼覽之未終曰所見不如所聞投之于江信明不能對擁檝而去世説常侍徐陵聘齊時魏收文學北朝之秀收錄其文集以示徐令傳之江左徐速濟江沉之曰吾為魏公藏拙李太白詩風落呉江雪紛紛入酒盃樂天二詩相反淵明二詩相反白樂天思竹窓詩不憶西窓松不憶南宫菊惟憶新昌堂蕭蕭北窓竹又題沈子明壁上云不愛君池東十叢菊不愛君池南萬竿竹愛君簾下唱歌人色似芙蓉聲似玉二詩相反陶淵明詩雖留身後名生前亦枯槁死者何所知稱心固為好又作擬古詩生有高世名既没傳無窮二意相反鍾㑹書善效人劉超書跡類帝世語鍾㑹善效人書于劒閣要鄧艾章表白事皆易其言令辭指悖傲多自矜伐又毁文王報書手作以疑之晉書劉超自以職在近宻而書跡與元帝手筆相類乃絶不與人交書時出休沐閉門不通賓客由是漸得親宻臨池學書倚井為書晉書王羲之與人書云張芝臨池學書池水盡黒使人耽之若是未必後之也南史齊宗室江夏王鋒好學書㓜匿母張家無紙札乃倚井欄為書滿則洗之已復更書如此者累月又晨興不肯拂窓塵而先畫塵上學為書字書芭蕉書樹葉書柿葉書法范釋文陸羽作僧懐素傳曰貧無紙可書常于故里種芭蕉萬餘株以供揮灑晉書鄭虔好書嘗苦無紙于是慈恩寺貯柿葉數屋遂徃日取葉肄書歲久殆遍北夢𤨏言梁李琪唐末以文學榮名仕至御史昭宗播遷衣冠蕩析因與𢎞農楊玢藏跡于荆楚間楊即泝蜀相盤桓于夷道之清江自晦其跡號華原李長官其堂兄􅊍符宰宜都嘗厭薄之琪相寂寞每臨流跋石摘樹葉而試草制詞吁嗟怏悵而投于水中梁祖受禪徵入拜翰林學士尋登廊廟爾後宜都之子彬羇旅渚宫因省相國乃數厥父之所短而遣之矣歐陽詢不擇紙筆裴行儉不擇筆墨國史纂異禇遂良問虞監曰某書何如永師曰吾聞彼一字直五萬官豈得若此褚曰何如歐陽詢曰聞詢不擇紙筆皆能如志官豈得若此褚曰既然某何更留意於此虞曰若使手和筆調遇合作者亦深可貴尚褚喜而退舊唐書裴行儉工草書唐高宗嘗以絹數百卷令草書文選八部帝覽之稱善賜帛五百匹行儉嘗謂人曰褚遂良非精筆佳墨未嘗輙書不擇筆墨而妍捷者唯余與世南耳所譔草字雜體數萬言並傳于代尺牘文字咸為楷範落簡措翰人爭摹倣舊唐書盧知猷器度長厚文辭美麗尤工書落簡措翰人爭摹倣又歐陽詢筆力險勁為一時之絶人得其尺牘文字咸以為楷範焉一字徑尺一字方丈南史劉穆之傳武帝舉止施為穆之皆下節度帝書素拙穆之曰此雖小事然宣布四逺願公小復留意帝既不能留意又禀分有在穆之乃曰但縱筆為大字一字徑尺無嫌帝從之一紙不過六七字便滿法苑隋東都内慧日道塲僧敬脱善正書太筆寫方丈字天然勁遒時號僧傑又高僧傳云其筆管粗如臂可長三尺東都門額皆脱所題隨意賦筆更不修飾外夷購柳書高麗重歐書舊唐書柳公權初學王書遍閲近代筆法體勢勁媚自成一家當時公卿大臣家碑板不得公權手筆者人以為不孝外夷入貢皆别署貨貝曰此購柳書又高麗甚重歐陽詢書嘗遣使求之高祖歎曰不意詢之書名逺播夷狄彼觀其跡固謂其形魁梧耶武徳七年詔與裴矩陳叔達撰藝文類聚一百卷百濟求書諸蕃購文南史寧都侯子顯弟子雲書迹雅為武帝所重帝嘗論書曰筆力勁駿心手相應巧逾杜度美過崔寔當與元常并驅爭先其見賞如此出為東陽太守百濟國使人至建鄴求書逢子雲為郡維舟將發使人于渚次候之望船三十許歩行拜行前子雲遣問之荅曰侍中尺牘之美逺流海外今日所求唯在名迹子雲乃為停舟三日書三十紙與之獲金貨數百萬性吝自外荅餉不書好紙求字者重加賂遺以要酬荅舊唐書張鷟下筆敏速著述尤多是時天下知名無賢不肖皆記誦其文新羅日本東夷諸蕃尤重之每遣使入朝必重出金貝以購其文駢志卷五
