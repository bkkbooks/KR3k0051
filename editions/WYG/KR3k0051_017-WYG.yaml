body:
  text: 駢志卷十七明陳禹謨撰壬部上人之生因水異人之生因土異吕覽輕水所多秃與癭人重水所多尰與躄人甘水所多好與美人辛水所多疽與痤人苦水所多尫與傴人又淮南子云清水音小濁水音大湍水人輕遲水人重淮南子堅土人剛弱土人肥壚土人大沙土人細息土人美耗土人醜土地各以其類生是故山氣多男澤氣多女障氣多喑音殷啼極而無聲也風氣多聾林氣多癃木氣多傴音羽僂也岸下氣多腫石氣多力險阻氣多癭暑氣多天寒氣多夀谷氣多痺丘氣多狂衍氣多仁下而汚者為衍陵氣多貪輕土多利重土多遲利疾也中土多聖人皆象其氣皆應其類人右耳目不如左明人左手足不如右強黄帝内經金匱真言論天不足西北故西北方隂也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也帝曰何以然岐伯曰東方陽也陽者其精并于上并于上則上明而下虚故使耳目聰明而手足不便也西方隂也隂者其精并于下并于下則下盛而上虚故其耳目不聰明而手足便也故俱感于邪其在上則右甚在下則左甚此天地隂陽所不能全也故邪居之舜手握褒孔掌威射孝經援神契舜手握褒宋均注手中有褒字也喻從勞苦起受褒飾致天祚孝經鈎命决仲尼虎掌是謂威射又論語摘輔象云澹臺滅明岐掌是謂正直仲弓鈎文在手是謂知始宰我手握户是謂守道子游手握文雅是謂敏士公冶長手握輔是謂習道子貢手握正是謂受相公伯周手握直期是謂疾惡舜目重瞳項羽亦重瞳重耳仳脇張儀亦仳脇史記周生曰舜目蓋重瞳子又聞項羽亦重瞳子羽豈其苖裔邪何興之暴也劉子云顏回重瞳漢書王莽重瞳子凉州記吕光身長八尺四寸目重瞳子左肘有肉中梁書沈約左目重瞳子腰有紫痣聰明過人好墳籍聚書至二萬卷都下無比北史隋魚俱羅相表異人目有重瞳言聞數百歩隂為煬帝所忌梁敬真希㫖奏殺之五代史梁康王友孜目重瞳子嘗竊自負以為當為天子南唐書李煜重瞳子論衡晉公子重耳仳脇為諸矦覇蘇秦骨鼻為六國相張儀仳脇亦相秦左傳晉公子重耳及曹曹共公聞其駢脇欲觀其祼浴薄而觀之杜預注駢脇合幹南史梁武帝日角龍顏重岳虎顧舌文八字項有浮灮身映日無景兩骻駢骨越王長頸烏喙秦王長目鷙膺史記范蠡自齊遺大夫文種書曰蜚鳥盡良弓藏狡兔死走狗烹越王為人長頸烏喙可與共患難不可與共安樂子何不去種見書稱病不朝人或䜛種且作亂越王乃賜種劔曰子教寡人伐呉七術寡人用其三而敗呉其四在子子為我從先王試之種遂自殺論衡大梁人尉繚説秦始皇以并天下之計始皇從其冊與之抗禮衣服飲食與之齊同繚曰秦王為人龍凖長目鷙膺豺聲少恩虎視狼心居約易以下人得志亦輕視人我布衣也然見我常身自下我誠使秦王須得志天下皆為虜矣不可與交游乃亡去蜂目豺聲豺聲豹視晉書王敦傳潘滔見敦而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬又王彌傳隱者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣魏武帝捉刀立牀頭宋世祖改服觀魏使世説魏武將見匈奴使自以形陋不足雄逺國使崔季珪代帝自捉刀立牀頭令間諜問曰魏王何如匈奴使荅曰魏王雅望非常然牀頭捉刀人此乃英雄也魏武聞之追殺此使南史魏太武大舉至淮南時孝武帝鎮彭城魏使尚書李孝伯至帝遣長史張暢與語而帝改服觀之孝伯目帝不輟及出謂人曰張矦側有人風骨視瞻非常人也單于遷延却退蕃人莫敢仰視前漢河平四年單于來朝引見白虎殿丞相王商坐未央宫中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相矣北史韋藝為營州總管藝容貌瓌偉每夷狄參謁必整儀衛盛服以見之獨坐滿一榻蕃人畏懼莫敢仰視圖形禳鬼寫形愈瘧南史檀道濟雄名大振魏甚憚之圖之以禳鬼又桓康隨武帝起兵摧堅陷陣膂力絶人所經村邑恣行暴害江南人畏之以其名怖小兒畫其形于寺中病瘧者寫形貼著牀壁無不立愈手與麈尾柄同色手與玉如意不分晉書王衍每捉玉柄麈尾與手同色南史簡文帝手執玉如意不相分辨爛爛如巖下電閃閃如巖下電晉書王戎形狀短小眸子洞徹視日而眼照不虧裴楷見而目之曰戎眼爛爛如巖下電又裴令公有儁容姿一旦有疾至困惠帝使王夷甫往看裴方向壁臥聞王使至強囘視之王出語人曰雙眸閃閃若巖下電頽唐如玉山之將崩傀俄若玉山之將崩世説時人目夏矦太初朗朗如日月之入懐李安國頽唐如玉山之將崩又嵇康身長七尺八寸風姿特秀見者歎曰蕭蕭肅肅爽朗清舉或云肅肅如松下風高而徐引山公曰嵇叔夜之為人也巖巖若孤松之獨立其醉也傀俄若玉山之將崩兩玉人二天人南史謝晦謝混俱在武帝前帝目之曰一時頓有兩玉人北史崔子約與兄子瞻俱寄居佛寺儀望俱華沙門以為二天人投果滿車衣寶盈車晉書潘岳少時常挾彈出洛陽道婦人遇之者皆連手縈繞投之以果遂滿車而歸時張載甚醜每行小兒以瓦石擲之委頓而反又世説潘安仁妙有姿容好神情少時挾彈出洛陽道婦人遇者莫不連手共縈之左太冲絶醜亦復效岳遨遊于是羣嫗齊共亂唾之委頓而返拾遺記王溥挾竹簡挿筆于洛陽市傭書美于形貌又多文辭來僦其書者丈夫贈其衣冠婦人遺其珠玉一日之中衣寶盈車而歸期期艾艾漢書周昌為人吃高帝欲廢太子昌曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷世説鄧艾以口吃不得作幹佐為稻田守叢草吏魏志嘗語稱艾艾晉文王戲之曰卿云艾艾定是幾艾對曰鳳兮鳳兮故是一鳳惠莊口不能劇談揚雄口不能劇談兩京雜記長安有儒生曰惠莊聞朱雲折五鹿充宗之角乃歎息曰栗犢反能爾耶吾終耻溺死溝中遂裹糧從雲雲與言莊不能對逡廵而去拊心謂人曰吾口不能劇談此中多有漢書揚雄口吃不能劇談而好深湛之思夏矦撲鏡張裕撲鏡魏志夏矦惇為流矢所中傷左目魏略惇每照鏡恚怒輒撲鏡于地蜀志張裕曉相術每舉鏡視面自知刑死未嘗不撲之于地初先主與劉璋會涪時裕為璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿郡特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕即荅曰昔有作上黨潞長遷為涿令涿令者去官還家時人與書欲署潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故裕以此反之先主常銜其不遜加忿其漏言乃顯裕諌爭漢中不驗下獄將誅之諸葛亮表請其罪先主荅曰芳蘭生門不得不鉏裕遂棄市後魏氏之立先主之薨皆如裕所刻王白鬚謝白面晉書王彪之年二十鬚鬢皓白時人謂之王白鬚又謝石少患面創療之莫愈乃自匿夜有物來䑛其創隨䑛隨差䑛處甚白故世呼為謝白面黄鬚兒竟大竒黄頷兒何足拜魏志鮮卑大人軻比能將數萬騎觀望強弱見任城王彰力戰所向皆破乃請服北方悉平時太祖在長安召彰詣行在所彰自代過鄴太子謂彰曰卿新有功今當見上宜勿自伐應對常若不足者彰到如太子言歸功諸將太祖喜持彰鬚曰黄鬚兒竟大竒也北史神武塟後崔㥄竊言黄頷小兒堪當重任不崔暹外兄李慎以告暹暹啓文襄絶㥄朝謁㥄要拜道左文襄發怒曰黄頷兒何足拜也黄面兒白面兒唐書賈餗會曲江故事尹自門歩入揖御史餗騎而入御史楊儉蘇特固爭餗曰黄面兒敢爾五代史末帝遣使者監督劉鄩軍鄩召諸將謀曰主上深居禁中與白面兒謀必敗人事文在手曰虞文在手曰友論衡云晉唐叔生文在其手曰虞左傳成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友及生有文在其手曰友遂以命之又宋仲子生有文在其手曰為魯夫人三十六國春秋劉淵生而左手有文曰淵遂以命之載記劉元海十二月而生左手文有其名遂以名焉背赤文起成字曰艸付臂肉脉起成字曰巨覇載記苻堅母茍氏嘗游漳水祈子于西門豹祠其夜茍夢與神交因而有孕十二月而生堅焉有神光自天燭其庭背有赤文隱起成字曰艸付臣又土王咸陽又吕光左臂肉脉起成字文曰巨覇郭解短小精悍樓護短小精辯延年短小精悍李紳眇小精悍史記郭解為人短小精悍不飲酒少時隂賊慨不快意身所殺甚衆以軀借交報讐藏命作姦剽攻不休及鑄錢掘冢固不可勝數適有天幸窘急常得脱若遇赦及解年長更折節為儉以徳報怨厚施而薄望然其自喜為俠益甚既已振人之命不矜其功其隂賊著于心卒發于睚眦如故云漢書嚴延年為人短小精悍敏捷于事又樓護為人短小精辯論議常依名節聽之者皆竦與谷永俱為五矦上客舊唐書李紳形狀眇小而精悍能為歌詩鄉賦之年諷誦多在人口短主簿鐡主簿世説王珣郗超並有竒才為大司馬所眷拔珣為主簿超為記室㕘軍超為人多鬚珣狀短小于時荆州為之語曰􅐖㕘軍短主簿能令公喜能令公怒北史許惇為司徒主簿以明斷見稱人號為入鐡主簿孟幽州業重一千斤南陽王保重八百斤語林孟業甚肥或以為千斤武帝乃作一大秤掛壁業入見武帝曰朕欲自秤有幾斤業答曰陛下欲秤臣耳無煩復勞聖躬於是秤業果得千斤晉書南陽王保體質豐偉自稱重八百斤姜維膽如斗李瞻膽如升世語曰姜維死時見剖膽大如斗南史矦景之為逆也東陽人李瞻起兵為賊所殺見其膽者乃如升焉無令鬚汚土無令土汚鬚後漢書温序拜謁者遷護羌校尉序行郡至襄武為隗囂將茍宇所拘刼宇謂序曰子若與我并威同力天下可圖也序大怒叱宇因以節檛殺數人宇曰此義士死節可賜以劔序受劔銜鬚於口顧左右曰既為賊所廹殺無令鬚汚土遂伏劒死前趙錄劉聰以讒慝故誅詹事曹光光臨刑舉止自若謂刑者曰取席敷之無令土汚吾鬚一宿髪白數日髪白齊書謝超宗下廷尉一宿髪白皓首又徐夤嘗有罪繋獄旦日原之而髪皓白武帝問其故曰臣思􅄽於内而髪變於外當時稱之舊唐書李日知神龍初為給事中母老病取急調侍數日鬚髪輙白髪若動髪如直舊唐書顔杲卿被殺徇首于衢莫敢收有張湊者得其髪持謁上皇是夕見夢帝寤為祭後湊歸髪于其妻妻疑之髪若動云大中遺事軒轅先生居羅浮山宣宗召禁中問道術能散髪箕踞用氣攻其髪條條如鐡線直换眼易鼻卓異記陶穀少時夢數吏云奉符換眼吏附耳求錢十萬安第一眼榖不應又云錢五萬安第二眼復不答吏曰可安第三眼即以二彈丸納眼中既覺眼色深碧後有善相道士陳紫陽曰好貴人氣柰一雙鬼眼竟不至大位括異志徐郎中筠少夢神人狀甚偉手攜竹籃其中皆人鼻端視徐曰形相非薄但其鼻曲而小吾與若易之遂于籃中擇一鼻先劓徐鼻擲去以所擇鼻安之仍以手指周固四際夢中亦覺痛楚神笑曰好一正郎鼻也徐之鼻素隆不正自夢易之後自然端直歴官駕部郎中李克用號獨眼龍王延禀謂獨眼龍五代史李克用少驍勇軍中號曰李鵶兒其一目眇及其貴也又號獨眼龍威名蓋于代北五國故事王延禀審知之養子眇一目人謂之獨眼龍刺胷作花飾面用花天寶軍錄云日南廐山連接不知幾千里裸人所居白民之後也刺其胷前作花有物如粉而紫色畫其兩目下去前二齒以為美飾酉陽雜俎今婦人面飾用花子起自昭容上官氏所製以掩㸃跡大厯以前士大夫妻多妬悍者婢妾小不如意輒印面故有月㸃錢附百姓間有面戴青誌如黥舊言婦人在草蓐亡者以墨㸃其面不爾則不利後人越人習水必鏤身以避蛟龍之患今南中繡面老子蓋雕題之遺俗也胷刺張燕公詩身刺白舍人詩酉陽雜俎蜀小將韋少卿韋表微堂兄也少不喜書嗜好劄青其季父嘗令解衣視之胷上刺一樹樹杪集鳥數十其下懸鏡鏡鼻繫索有人止側牽之叔不解問焉少卿笑曰叔不曾讀張燕公詩否挽鏡寒鴉集耳又荆州街子葛清勇不膚撓自頸以下遍刺白居易舍人詩段成式常與荆客陳至呼觀之令其自解背上亦能闇記反手指其去處至不是愛花偏愛菊則有一人持盃臨菊藂又黄夾纈林寒有葉則指一樹樹上掛纈纈窠鏁勝絶細凡刻三十餘處首體無完膚陳至呼為白舍人行詩圖也背鏤天王背刺天王酉陽雜俎李夷簡元和末在蜀蜀市人趙高好鬭常入獄滿背鏤毗沙門天王吏欲杖背見之輒止恃此轉為坊市患害左右言于李李大怒擒就㕔前索新造筋棒頭徑三寸叱杖子打天王盡則已數三十餘不絶經旬日袒衣而厯門呌呼乞脩理功徳錢又段成式門下騶路神通每軍設力能戴石簦靸六百斤石齧破石粟數十背刺天王自言得神力入塲神助多則力生常至朔望日具乳糜焚香袒坐使妻兒供養其背而拜焉若有反相公有反骨漢書高祖立濞于沛為吳王已拜受印召濞相之曰若狀有反相獨悔業已拜因拊其背曰漢後五十年東南有亂豈若邪然天下同姓一家慎無反北史皇甫玉嘗為高歸彥相曰位極人臣但莫反歸彥曰我何為反玉曰公有反骨又李文觀台宿有逆謀氣言于咸陽王禧曰𤣥象變汝終為逆謀會無所成但受惡而已至此果如言子公食指動張融揺食指左傳楚人獻黿于鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指于鼎嘗之而出南史張融傳豫章王大會賓僚融食炙始行畢行炙人便去融欲求鹽蒜口終不言方揺食指半日乃息出入朝廷皆拭目驚觀之安禄山以兩足黑子呈韓公呉行魯以足下文理呈中尉開元傳信記安禄山初為張韓公仁愿帳下吏韓公嘗令禄山洗足韓公脚下有黑子禄山因竊視之韓公顧笑曰黑子吾貴相也獨汝窺之亦能有之乎祿山曰某賤人也不幸兩足皆有之比將軍者黒而加大不知是何祥也韓公竒而觀之約為義兒彌加薦寵明皇雜錄定命録俱載按袁天綱相書云足下有龜文黑子並大貴一品宰輔之相北夢𤨏言呉行曾少事内官西門軍容一日為洗足中尉以脚下文理示之曰如此文理爭教不作十軍軍容行魯曰某亦有之乃脱履呈中尉歎曰我為汝成之後假以軍職有功除西川節度百穀五穀楊泉物理論曰梁者黍稷之總名也稻者溉種之總名也菽者衆荳之總名也三榖各二十種為六十種蔬果之實助穀各二十種為百穀范子計然曰東方多麥稻西方多麻北方多菽中央多禾五土之宜各有高下高而陽者多荳平而隂者多五穀又曰五穀者萬民之命國之重寶也是故無道之君及無道之民皆不能積其盛有餘之時以待其衰不足也月令云五時食穀春麥夏菽季夏稷秋麻冬黍楚辭大招五穀注稻稷麥荳麻漢食貨志五穀注麻金黍火稷土麥水荳木教乗法數云黍粟稷菽衆豆麥大麥小麥麻稻粳糯六穀九穀合璧事類六穀者稻黍稷梁麥瓜是也又云三穀者梁稻菽是也又云九穀者稷秫黍稻麻大小荳大小麥是也浹日翻形明清清腸之稻揺枝鳳冠遊龍瓊膏之粟拾遺記融澤國有浹日之稻種之十旬而熟有翻形稻言食者死而更生夭而有夀有明清稻食者延年也清腸稻食一粒厯年不饑又有搖枝粟其枝長而弱無風常搖食之益髓有鳳冠粟似鳳鳥之冠食者多力有遊龍粟葉屈曲似遊龍也有瓊膏粟白如銀食此二粟令人輕骨繞明挾劒傾離之荳紫沉雲氷通明之麻拾遺記有繞明荳其莖弱自相縈纒有挾劔荳其莢形似人挾劔横斜而生有傾離荳言其荳見日葉垂覆地食者不老不疾又有紫沉麻其實不浮有雲氷麻實冷而有灮宜為油澤有通明麻食者夜行不持燭是苣蕂也食之延夀延精昆和輕心醇和含露之麥朝虹宵明焦茅黄蕖聞遐之草拾遺記有延精麥延夀益氣有昆和麥調暢六府有輕心麥食者體輕有醇和麥為麴以釀酒一醉累月食之凌冬可袒有含露麥穟中有露味甘如飴已上俱融澤國出又融澤國之北有草名虹草枝長一丈葉如車輪根大如穀花似朝虹之色宵明草夜視如列燭晝則無光焦茅草髙五丈燃之成灰以水灌之復成茅也謂之靈茅黄渠草映日如火其堅韌若金食者焚身不熱聞遐草服者耳聰香如桂莖如蘭朱草日生一葉蓂莢日生一莢大戴禮朱草日生一葉至十五日生十五葉十六日一葉落終而復始帝王世紀堯時有草夾階而生每月朔始生一莢至月半則生十五莢十六日以後日落一莢至月晦而盡月小則餘一莢焦而不落王者以是占厯惟盛徳之君應和氣而生以為堯瑞名之蓂莢一名靈莢一名仙莢抱朴子曰昔黄帝侯鳳鳴以調律唐堯觀蓂莢以知月佩之宜子孫食之宜子孫山海經杻陽之山有獸焉其狀如馬而白首其文如虎而赤尾其音如謡其名曰鹿蜀佩之宜子孫南方草木狀萱草一名宜男婦人懐妊佩其花生男又崇吾之山有木焉員葉而白柎赤花而黑理其實如枳食之宜子孫又青要之山有鳥焉名曰鴢其狀如鳬青身而朱目赤尾食之宜子金鹽玉豉東華眞人煮石經舜嘗登蒼梧山曰厥金玉之香草朕用偃息正道此乃五加也又異名曰金鹽昔西域真人王屋山人常言何以得長久何不食石蓄金鹽何以得長夀何不食石用玉豉玉豉者即地榆也五加地榆皆是煮石而餌得長生之藥也昔尹公度聞孟綽子董士固共相與言曰寧得一把五加不用金玉滿車寧得一斤地榆安用明月寶珠睡草夢草述異記桂林有睡草見之則令睡一名醉草亦呼為懶婦箴又出海南地記又洞㝠記多末國有五味草初生味甘花時味酸食之使人不眠名曰却睡草洞㝠記夢草似蒲色紅晝縮入地夜則出亦名懐夢懐其葉則知夢之吉凶立驗也帝思李夫人之容不可得東方獻一枝帝懐之夜果夢夫人因改曰懐夢草獨活有風不動無風獨揺薇蘅有風不偃無風獨揺王羲之云石脾入水即乾出水便濕獨活有風不動無風獨搖天下物理豈可以意求唯上聖乃能窮理水經注石灘縣有錫義山方圓百里形如城四面有門上有石壇長十餘丈世傳列仙所居今有道士披髪餌木恒數十人山落谷深多生薇蘅草其草有風不偃無風獨揺花徑十丈花長十丈真人闗令尹喜傳老子語喜曰天涯之淵真人所遊各各坐蓮花之上一花輒徑十丈有返生香逆風聞十里物類相感志華山頂上有池池生千葉蓮花長十丈藕大如船服之羽化隋煬帝歩虚辭八行分寶樹千丈散芳蓮韓退之詩太華峰前玉井蓮花開十丈藕如船望舒荷望舒草拾遺記漢靈帝渠中植蓮大如蓋長一丈南國所獻其葉夜舒晝卷一莖有四蓮叢生名曰夜舒荷亦云月出則舒也故望舒荷又晉太始中浮支國獻望舒草其色紅葉如荷近望則如卷荷逺望則如舒荷團團似蓋亦云月出則葉舒月没則葉卷向日葵朝日蓮曹子建云葵藿之傾葉太陽雖不為之廻灮終向之者誠也益州方物蜀中有朝日蓮花色或黄或白葉浮水上開則隨日所在日入輙歛藏葉下丹棘忘憂青棠蠲忿古今注欲蠲人之憂則贈以丹棘一名忘憂欲蠲人之忿則贈以青棠一名合歡合歡枝葉柔弱互相交結每一風來輙自相解了不相牽綴樹之家庭使人不忿嵇康種之舍前又本草其葉能去垢至暮即合故曰合昏又謂之夜合花養生論合歡蠲忿萱草忘憂君子芋博士芋廣志云蜀漢既繁芋民以為資凡十四芋有君子芋大如斗魁有百果芋魁大子繁多畞收百斛種一百畞葉以養彘風土記云博士芋蔓生根如鵞鴨卵救窮草醒醉草福地記武當縣石堦山西北角有大松樹樹下生草名救窮冬夏不枯日食三寸絶穀不饑登遐度世陶先生謂之西岳佐命是也天寶遺事興慶池南岸有草數叢葉紫而心殷有一人醉過於草傍不覺失其酒態後有醉者摘草嗅之立然醒悟故目為醒醉草東陵五色瓜會稽五色瓜史記召平者故秦東陵矦秦破為布衣貧種瓜長安城東瓜美故世俗謂之東陵瓜又阮籍詩昔聞東陵瓜近在青門外連畛距阡陌子母相勾帶五色曜朝日嘉賓四面會述異記呉桓王時會稽生五色瓜今呉中有五色瓜歲充貢賦避諱名薯藥避諱名山藥負暄雜録山藥本名薯蕷避唐代宗諱豫改名薯藥宋英宗諱曙遂名山藥又本草一名山芋秦楚名玉延鄭越名土藷一名脩脆一名兒草浮根沉實洞㝠記漢武旦露池西見靈池中有浮根菱根出水上葉沉波下霜降彌美因名青氷菱拾遺記昭帝琳池中有倒生菱莖如亂絲一花千葉根浮水上實沉泥中名紫菱食之不老五大夫松五大夫栢漢官儀秦始皇上泰山風雨暴至休于松史樹作下因封其樹為五大夫河南志嵩山天封觀有古栢三株武后封五品大夫䕃百餘歩俗云大小將軍仁壽木君子樹拾遺記晉人為介之推起思煙臺種仁夀木木似栢而枝長柔軟其花堪食晉宫閣記華林園有君子樹三株千年長生樹萬年長生樹西京雜記上林苑有千年長生樹十株萬年長生樹十株又晉宫閣記華林園有萬年樹十四株合掌栢摩頂松酉陽雜俎唐太常博士崔石云汝西有練溪多異栢及暮枝葉斂俗呼合掌栢大唐新語𤣥裝法師往西域取經手摩靈巖寺松枝曰吾西去求佛教汝可西長吾歸即東向使吾弟子軰知之既去其枝年年西指一年忽東向弟子曰教主歸矣果還至今謂之摩頂松不死樹恒春樹博物志員丘山有不死樹食之乃夀拾遺記方丈山有恒春之樹葉如蓮芬芳如桂色隨四時一名沉生返魂樹無患樹十洲記聚窟州有返魂樹伐其根心於玉釡中煑取汁煎之令可丸名曰金精香或名震靈丸或名返生香或名却死香死屍在地聞氣乃活古今注程雅問櫨木曰無患何也荅曰昔有神巫能符劾百鬼得鬼則以此木為棒棒殺之世人相傳以此木為衆鬼所畏競取以為器用以却邪厭鬼故曰無患也又纂文今僧家貫之為念珠惟取紫紅色小者佳本草無患子一名噤婁一名桓桓患字聲訛也酉陽雜俎無患木燒之極香指星木發日樹洞𡨕記帝常見彗星東方朔折指星之木以授帝帝以木指彗星星尋沒也星出之夜野獸皆鳴别説謂之獸鳴星洞㝠記胥池寒國有發日樹言日從雲出雲來掩日風吹樹枝拂雲開日灮也亦名開日樹不燼之木不灰之木神異傳南方有大山焉長四十里廣四五里其中皆生不燼之木晝夜火然澍雨猛風不滅開山圖山出不灰之木生火之石案注云其木色墨似炭而無葉有石赤如丹以一石相磨則火發以然無火可以終身今則無之慎火樹勝火木南越志廣州有大樹可以禦火山北謂之慎火或謂戒火多種屋上以防火伏琛齊地記武城東南有勝火木方俗音曰挺子其木經野火燒炭不滅故東方朔謂為不灰之木又抱朴子曰南海蕭丘之上生一種木雖為火所著但少焦黒人或得以為薪者炊熟則灌滅之用之不窮平仲木君遷樹呉都賦平仲之木實白如銀君遷之樹子如瓠形鳳條孫枝酉陽雜俎厯城房家園其中雜樹森竦或有人折其桐枝者博陵君輙曰何為傷吾鳳條風俗通梧桐生于嶧陽採東南孫枝為琴聲極清麗周禮註孫枝之根末生者也蓋桐孫亦然樹槐種槐金匱武王問太公曰天下神來甚衆恐有試者何以待之太公曰請樹槐於王門内有益者入無益者距之後周書韋孝寛為雍州刺史先是路側一里置以土堠經雨頽毁每須修之孝寛臨州勅部内當堠處置槐樹既免修復行路又得庇䕃文帝後見之於是令諸州道一里種一樹十里種三樹百里種五樹一日三榮三悴一日三眠三起玉箱雜記晉陽都城北角有槐樹一日之間三榮三悴三輔故事漢苑中有柳狀如人號曰人柳一日三眠三起椹可以為糧桑可以充衣異苑漢興平元年九月桑再椹時劉𤣥徳軍小沛年荒穀貴士衆皆饑仰以為糧唐書李徳裕居家以儉約自處每謂子孫曰吾性不好貨財遂至貧乏然吾近京城有賜田十頃耕之可以充食桑若干根可以充衣聖柰仙桃洽聞記河州鳳林闗有靈巖寺每七月十五日溪中流出聖柰大如盞以為常神仙傳仙桃出蘇眤仙壇有人至心祈之輙落壇上或至五六顆形如石塊赤黄色破之如有核三重研飲之立愈衆疾尤治邪氣哀家梨高聰梨世説桓南郡每見人不快輙嗔云君得哀家梨當復蒸食否北史魏高聰以高肇之黨彈廢於家斷絶人事惟修營園果世稱高聰梨以為珍異眞定梨箭谷梨魏文帝詔眞定御梨大若拳甘若蜜脆若菱可以解煩釋渴廣志新豐箭谷梨謝朓賜紫梨啓味出靈闗之隂㫖珍玉津之澨豈徒眞定歸美大谷慙滋又庾肩吾啟睢陽東苑子圜三尺新豐箭谷枝懸六斤千年棗三星棗杜還經行記大食國有千年棗廣志河東安邑棗東郡穀城紫棗長二寸西王母棗大如李核三月熟在衆果之先洛陽宫後園河内汲郡棗一名墟棗一名安益棗東海蒸棗洛陽夏后棗安平信都大棗單父棗梁國夫人棗大白棗一名曰蹙咨小核多肌三星棗駢白棗灌棗此四者宫園所種棗有狗牙雞心牛頭羊矢獼㺅細腰之名又有𤣥棗大棗﨑亷棗桂棗夕棗之名杏核如笠桃核尺餘神仙感遇傳裴航冉從伯遇白衣老人裴渴甚求茗老人指一土龕此中有少漿可就取裴視龕中有杏核一扇如笠滿中有漿漿色正白乃力舉飲之不復饑渴漿味如杏酪老人曰君飲杏漿當哭九族親情且以酒色為誡也野人閒話蜀文谷于中書劉光祚處見桃核杯杯濶尺餘紋彩燦然眞蟠桃之實也劉自云少時游華嶽見一道士以此核酌􅓬泉盥潄觀之驚駭道士以半片授之又墨庄漫錄有人以桃核半枚獻王黼者中容米三四斗棗長四五寸棗長六七寸大業拾遺信都獻仲思棗四百枚棗長四五寸正紫色細文文皺小核味甘勝于青州棗北齊時有山人仲思得此棗種之因以為名亦名仙棗時海内惟有數株神異經北方荒中有棗林焉其高五十丈敷張枝條數里餘疾風不能偃雷電不能摧其子長六七寸圍過其長熟色如朱乾之不縮氣味潤澤殊于常棗食之可以安軀益氣赤松子云北方大棗味有殊既可益氣又安軀七尺棗三尺梨述異記北方有七尺之棗南方有三尺之梨凡人不得見或見而食之即為地仙榴名三十八榴重五六斤𤨏碎録河隂石榴名三十八中只有三十八子也酉陽雜俎大食勿斯離國石榴重五六斤十二枚及一尺十五枚為一升酉陽雜俎衛公言滑州櫻桃十二枚及一尺三秦記漢武帝果園栗十五枚為一升一蒂十七實一蒂十二實南方草木狀呉黄武中交趾太守士燮獻橘十七實同一蒂以為瑞異羣臣畢賀建武故事晉咸和六年西平將軍庾亮送橘十二實共同一蒂以為瑞異又三國典略梁矦景未平王僧辨獻嘉橘一蒂二十五子于湘東王王荅之曰昔文康獻橘十有二子用今方古彼有慙色今景之兇惡既稔凱歌之聲已及嘉瑞逺臻但增哽慰合成樹分三衢獨根樹分二枝南越志博羅縣有合成樹十圍去地二丈分為三衢東向一衢大葉似楝子如橄欖而硬削去皮南人以為糝南向一衢橄欖西向一衢橄欖金樓子有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹楠謂之讓木橘謂之讓木武林郡記雉山有木名交讓衆木敷榮後方萌芽亦更歲更榮枯也又楠木植之成行列枝葉若相㢠廻避然謂之讓木雜志橘樹直竦枝葉不相妨蜀人謂之讓木荔枝曲荔枝圖甘澤謠天寶十四歲六月日於驪山駐蹕是貴妃誕辰上命許雲封等小部音聲樂長生殿仍奏新曲未有曲會南海進荔枝因以曲名荔枝香左右歡呼聲動山谷是年禄山叛舊唐書白居易為忠州刺史在郡為木蓮荔枝圖寄朝中親友各記其狀曰荔枝生巴峽間樹影團團如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朶如蒲桃核如枇杷殻如紅繒膜如紫綃瓤肉潔白如氷雪漿液甘酸如醴如酪大略如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣北夢𤨏言唐劉僕射崇龜以清儉自居甚昭物論嘗召同列餐苦為饆饠朝士有知其矯乃潛問小蒼頭曰僕射晨餐何物蒼頭曰潑生喫了也朝中聞而哂之又鎮番禺效呉隱之為人京國親知貧乏者顒俟濡救但畫荔枝圖自作賦以遺之烏椑大如酒盞橊子大如椀盞地里志梁矦園有烏椑八稜大如酒盞閒居賦梁矦烏枇之柿鄴中記石虎苑中有安石橊子大如椀盞其味不酸又晉安帝起居注武陵臨沅獻安石橊子大如椀其味不酸一蒂五實栗大如拳栗大如柿西京雜記上林苑有矦栗瑰栗魁栗榛栗嶧陽栗嶧陽都尉曹龍所獻大如拳詩經義疏栗五方皆有周秦呉揚特饒唯漁陽范陽栗甜美長味他方不及也倭韓國上栗大如雞子亦短味不美桂陽有栗叢生大如柿又廣志栗有闗中矦栗大如雞子梁州獻栗徑寸半越中栗大如拳地里志諸暨產如拳之栗後漢四夷傳馬韓出大栗如梨魏志東夷魏國出大栗如梨橘踰淮為枳貉踰汶則死周禮考工記橘踰淮而北為枳鸚鵒不踰濟貉踰汶則死此地氣然也水經注瞿塘灘上有神廟尤至靈驗刺史二千石經過皆不得鳴角伐鼓商旅上水恐觸石有聲乃以布裹篙足今則不能爾猶饗薦不輟此峽多猿猿不生北岸非唯一處或有取之放著北山中初不聞聲將同貉獸渡汶而不生矣按此則峽之北岸自昔不聞猿聲矣詩人所稱兩岸猿聲其謂之何竹為棟梁竹為釡甑異物志有竹曰䈏其大數圍節間相去局促其中實滿堅強以為屋榱斷截便以為棟梁不復加斤斧也孝經河圖少室之山大竹堪為釡甑又雲南記雲南有實心竹文采斑駮殊好可為器物其土以為槍幹涕竹為船簟竹為布神異經南方荒中有涕音泲竹長數百丈圍三丈五六尺厚八九寸可以為船又南方草木狀雲丘竹一節為船出扶南今交廣有竹節長二丈其圍一二丈者往往有之南方草木狀簟竹葉疎而大一節相去五六尺出九眞彼人取嫩者磓浸紡績為布謂之竹疎布溱州通竹無節昌州海棠有香北户録溱州通竹直上無節空心也又高潘州有疎節竹五六尺一節僧道多以為杖花譜海棠有色無香惟蜀中昌州海棠花有香其木合抱故昌州號曰海棠香國州治前有香霏閤每花或二十餘葉香氣醲郁入水即乾出水便濕置乾反濕置濕反乾王羲之云石脾入之水即乾出之水便濕酉陽雜俎雀芋如雀頭置乾地反濕置濕地反乾惠子大瓠之種田仲堅瓠之類莊子惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則瓠落無所容非不呺然大也吾為其無用而掊之莊子曰夫子固拙于用大矣子有五石之瓠何不慮以為大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫吕氏春秋白圭謂魏王曰市丘之鼎以烹雞多洎之則淡而不可食少洎之則焦而不熟而視之踽焉美無所可用惠子之言有似於此韓子齊有居士田仲者宋人屈榖見之曰榖聞先生之義不恃仰人而食今穀有樹瓠之道堅如石厚而無竅獻之仲曰夫瓠所貴者謂其可以盛也今厚而無竅則不可剖以盛物而任重如堅石則不可以剖而以斟吾無以瓠為也曰然穀將以欲棄之今田仲不恃仰人而食亦無益人之國亦堅瓠之類也都夷香食一片則厯月不饑春蕪布握一片則滿室皆香洞㝠記都夷香如棗核食一片則厯月不饑以粒如粟米許投水中俄而滿大盂也洞㝠記波祗國亦名波弋國獻神精香草亦名荃蘼一名春蕪一根百條其間如竹節柔軟其皮如絲可為布所謂春蕪布亦名香荃布堅宻如氷紈也握一片滿室皆香婦人帶之彌月芬馥招凉珠迎凉草拾遺記黑蚌珠千年一生燕昭王常懐此珠當盛暑之月體自輕凉號消暑招凉之珠杜陽編李輔國家夏則于堂中設迎凉草其象類碧而幹似苦竹葉細如松雖若乾枯而未嘗凋落盛暑掛之窓户間則凉風自至龍與金蛇銜珠法苑俱名國有商人驅八牛牧于澤中時有離車捕得一龍云將食之商人以八牛易致取放别池中龍忽人語邀入宫中有龍女與八餅金云此是龍金截已更生足汝父母眷屬終身用之不盡説苑隋縣溠水側有斷蛇丘昔隋矦出而見大蛇中斷疑其靈使人以藥封之蛇乃能去因號其處為斷蛇丘歲餘蛇銜珠以報其珠徑寸純白夜有光明如月之照謂之隋矦珠亦曰靈蛇珠丘南有隋季良大夫池銜雙明珠銜赤玉珠搜神記噲參養母至孝曾有𤣥鶴為戎人所射窮而歸之參收養治療瘡愈放之後鶴夜到門外參炳燭視之雌雄各至銜雙明珠報參焉張氏家傳禧字彦祥除效轂令有鶴負矢集禧庭禧以甘草湯洗之傅藥留養十餘日瘡愈飛去月餘銜赤玉珠二枚置禧庭事馬肝石黄蛇珠洞㝠記元鼎五年郅支國貢馬肝石半青半白如今之馬肝舂碎以和九轉之丹服之彌年不饑渴也以之拂髪白者皆黒帝坐羣臣于甘泉殿有髪白者以石拂之應手皆黑是時公卿語曰不用作方伯惟須馬肝石此石酷烈不和丹砂不可近髪又赤松子乗黄蛇入水得黄珠一枚色如眞金或言是黄蛇之卵故名蛇珠亦名銷疾珠語曰寧失千里駒不失黄蛇珠唾悉是金泣則出珠述異記南康樗都縣西沿江有石室名夢口穴嘗有船遇一人通身黄衣擔兩籠黄𤓰求寄載過至岸下此人唾盤上徑下崖直入石穴中船主初甚忿之見其人入石始知異視盤上唾悉是金矣又有鮫人室水居如魚不廢機織其眼能泣則出珠晉木𤣥虚海賦云天琛水恠鮫人之室駢志卷十七
