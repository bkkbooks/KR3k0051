body:
  text: 駢志卷十三明陳禹謨撰庚部上附寳感大電二十四月而生黄帝於夀丘慶都感赤龍十有四月而生帝堯於丹陵帝王世紀黄帝母曰附寳見大電光繞北斗樞星照于郊野感附寳孕二十四月而生黄帝於夀丘宋符瑞志帝堯母曰慶都赤龍感之一十四月而生堯于丹陵握登見大虹意感而生舜于姚墟修己見流星意感而生禹于石紐帝王世紀瞽瞍妻曰握登見大虹意感而生舜于姚墟又崇伯鯀娶有莘氏女謂之女志志是謂脩己山行見流星貫昴夣接意感又吞神珠薏苡胷坼而生禹于石紐禹生石紐禹生西羌水經注石紐鄉禹所生也今夷人共營之地方百里不敢居牧有罪逃野捕之者不逼能藏三年不為人得則共原之言大禹之神所祐之也陸賈新語文王生於東夷大禹出於西羌世殊而地絶法合而度同禹卨逆生后稷順生論衡禹卨逆生闓母背而出又曰后稷順生不坼不副不感動母體湯母感狼星之精棄母履大人之迹金樓子成湯母感狼星之精又感黑龍而成宋符瑞志髙辛氏之世妃曰姜嫄助祭郊禖見大人迹履之當時歆如有人道感巳遂有娠而生男以為不祥棄之隘巷牛羊避而不踐又送之山林之中㑹伐林者薦覆之又取而置寒氷上大鳥來以一翼藉覆之姜嫄以為異乃收養焉名之曰棄長為堯稷官有功于民得于空桑生于空桑吕氏春秋有侁氏女子採桑得嬰兒于空桑之中獻之其君其君令烰人養之察其所以然曰其母居伊水之上孕夢有神告之曰臼出水而東走母明日視臼出水告其隣東走十里而顧其邑盡為水身因化為空桑又林間録樹提伽生于火中伊尹生於空桑春秋孔演圖孔子母徴在逰大冢之陂睡夣黑帝使請與已交語曰女乳必于空桑之中覺則若感生丘于空桑中寤生寢生左傳初鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏故名曰寤生遂惡之杜注寐寤而莊公已生故驚而惡之得林注杜氏謂寤寐而莊公已生非也如此當喜何復驚而惡之史記云寤生生之難是也此當為難生故武姜困而後寤武姜因寤而驚以其事名莊公載記夀闐之在孕母胡掖氏因寢而産于被中虎乳子文虎乳秦氏左傳初若敖娶於䢵生鬬伯比若敖卒從其母畜於䢵滛於䢵子之女生子文焉䢵夫人使棄諸夢澤中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳穀謂虎於莵故命之曰鬬榖於莵以其女妻伯比實為令尹子文水經注沔水西有孝子墓河南秦氏性至孝事親無倦親歿之後負土成墳常泣血墓側人有咏蓼莪者氏為泣涕悲不自勝于墓所得病不能食虎常乳之百餘日卒今林木幽茂號曰孝子墓也狼乳猪嘘漢書張騫曰臣居匈奴中聞烏孫王號昆莫昆莫父難兠靡本與大月氏俱在祁連燉煌間小國也大月氏攻殺難兠靡奪其地人民亾走匈奴子昆莫新生傅父布就翎侯抱亡置草中為求食還見狼乳之又烏銜肉翔其旁以為神遂持歸匈奴單于愛養之及壯以其父民衆與昆莫使將兵數有功論衡北夷槖離國王侍婢有娠王欲殺之婢對曰有氣大如鷄子從天而下我故有娠後産子捐於猪溷中猪以口氣嘘之不死復徙置馬欄中欲使馬藉殺之馬復以口氣嘘之不死王疑以為天子令其母收取奴畜之名東明令牧牛馬東明善射王恐奪其國也欲殺之東明走南至掩淲水以弓擊水魚鼈浮為梁東明得渡魚鼈解㪚追兵不得渡因都王夫餘故北夷有夫餘國焉盧綰與髙帝同日生孝伯與武帝同日生漢書盧綰豐人也與髙祖同里綰親與髙祖太上皇相愛及生男髙祖綰同日生里中持羊酒賀兩家及髙祖綰壯學書又相愛也里中嘉兩家親相愛生子同日壯又相愛復賀羊酒北史宇文孝伯生與武帝同日子大之生母見一匹練文伯之生父見一木杖論衡虞子大陳留東莞人也其生時以夜適免母身母見其上若一匹練狀徑上天明以問人人皆曰吉貴氣與天通長大仕宦位至司徒又公廣文伯河東蒲坂人也其生以夜半時適生有人從門呼其父名父出應之不見人有一木杖植其門側其父持杖入門以示人人占曰吉文伯長大學宦位至廣漢太守羊叔子記前身劉三復記三生晉書羊祜字叔子年五嵗時命乳母取所㺯金鐶乳母曰汝先無此物祜即詣鄰人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物也云何持去乳母具言之李氏悲惋時人異之謂李氏子則祜之前身也北夣𤨏言唐太和中李徳裕鎭淛西有劉三復者少貧苦學有才思時王人賫御書至以賜德裕德裕試其所為謂曰子可為我草表能立搆或歸以創之三復曰文理貴中不貴其速德裕以為當言三復又請曰漁歌樵唱皆傳公述作願以文集見示德裕出數軸與之三復乃體而為表德裕嘉之因遣詣闕求試果登第歴任臺閣三復能記三生事云曾為馬常患渴望驛而嘶傷其蹄則心連痛後三復乗焉過磽确之地必為緩轡有轍石必去之其家不施門限慮傷馬蹄也六月六日生五月五日生吳越春秋注蜀石泉有禹廟相傳禹六月六日生史記齊田文嬰賤妾子也以五月五日生嬰勅令勿舉其母竊舉之文長成因兄弟以見嬰怒文啟曰君所以不舉五月子者何故嬰曰五月子者長與户齊將不利其父母文曰人生受命于天乎將受命于戸邪嬰黙然文曰必受命于天君何憂邪必受命于户則髙其戸耳誰能至者嬰曰子休矣後文立是為孟嘗君西京雜記王鳯以五月五日生其父以俗諺欲不舉其叔父曰昔田文以此日生以故事推之非不祥也遂舉之殷芸小說胡廣本姓黄以五月五日生父母惡之藏之葫蘆棄之河流岸側居人收飬及長有盛名父母欲取之廣以為背其所生則害義背其所養則忘恩兩無所歸託葫蘆生也孝子傳紀邁五月五日生其母棄之村人紀善妻養之年六歲本父母云汝是我兒邁涕泣傭所得輙上母宋書王鎭惡猛孫也以五月五日生家人因俗忌欲出令繼疎宗猛見竒之曰此非常兒將興吾門矣故名之為鎭惡北齊書南陽王綽以五月五日辰時生强暴無度後為韓長鸞令親信誣謀反被殺經四百餘日大歛顔色毛髮皆如生俗曰五月五日生者腦不壞故也舊唐書崔信明以五月五日正中時生有異雀數頭身形甚小五色畢偹集于樹鼓翼齊鳴其聲清亮隋太史令史良使至青州遇而占之曰此兒必文藻煥爛聲名播于天下雀形旣小禄位殆不髙矣陜西志唐肅宗時張嘉字伯達以五月五日生名五郎少好儒術以節義自負癸辛雜志宋徽宗以五月五日生以俗忌因改作十月十日為天寧節十困學齋雜録金轉運田時秀字彦寔易縣人大定九年進士所居里名半十行第五以五月五日生小名五兒年二十五應鄉府省殿四試俱第五名年五十五以八月十五卒論衡云諱舉正月五月子以為正月五月子殺父與母不得已舉之父母偶死則信而謂之眞矣夫正月五月子何故殺父與母人之含氣在腹腸之内其生十月而産其一元氣也正與二月何殊五與六月何異而謂之凶也河洛龍見河洛鳳集易乾鑿度帝王始興河洛龍見察其黑首者人正白者地正赤者天正沈約宋書黄帝齋于中宫坐于𤣥扈洛水之上有鳳皇集不食生蟲不履生草其雄自歌其雌自舞黄龍神靈之精青龍大辰之精瑞應圖黄龍者四龍之長四方之正色神靈之精也能巨細能幽明能短能長乍存乍亡王者不漉池而漁則應和氣而逰于池沼魏繆襲青龍賦葢青龍者大辰之精木官之瑞又瑞應圖青龍水之精垂雨而下不處深泉有仁聖君子在位不肖斥退則見赤龍御圖𤣥龜負書尚書中􅇋武王觀于河沉璧禮畢且退至于日昧榮灮并塞河青雲浮洛赤龍臨壇銜𤣥甲之圖吐之而去又堯率羣臣東沉璧于河退􅇋至于下稷赤灮起𤣥龜負書出赤文成字洛出龜書洛見鯉文沈約宋書𤣥龜洛書者天符也王者德至川泉則洛出龜書河圖黄帝遊于洛見鯉魚長三丈青身無鱗赤文成字也屈軼指佞萐莆殺蠅博物志黄帝時羣瑞畢臻有屈軼之草生于庭佞人入朝則草指之是以佞人不敢進論衡太平之時屈軼生於庭之末若草之狀主指佞人唐書云惟袁與薛人中屈軼說文萐莆瑞草也堯時生於庖厨扇暑而凉宋志萐莆一名倚扇狀如蓬大枝葉小根根如絲轉而成風殺蠅堯時生於厨春秋潜潭巴曰君和則孶于庖厨瑞應圖一名倚萐倚扇賓閣舜時生于厨赤烏銜榖赤爵銜書宋符瑞志武王伐紂渡孟津中流白魚躍入王舟王燔魚以告天有火自天止於王屋流為赤烏烏銜榖焉竹書紀年赤爵銜書及豐置於昌戸吕后望氣得沛公亞父望氣知沛公漢書髙祖隱於芒碭山澤間吕后與人俱求常得之髙祖怪問之吕后曰季所居上常有雲氣故從往常得季髙祖喜沛中子弟或聞之多欲附者矣按水經注芒碭縣之間山澤深固多懷神智有仙者涓子注主並隱碭山得道漢髙祖隱之吕后望氣知之即於是處楚漢春秋項王在鴻門亞父曰吾使人望沛公其氣衝天五色相繆或似龍或似雲非人臣之相可誅之漢髙祖㑹項羽范增目羽羽不應樊噲杖盾撞人入食豕肩羽壯之按京房易􅇋曰何以知賢人隱師曰視四方常有大雲五色具而不兩其下賢人隱矣鳯凰下郡國郡國送蒼麟郊祀志宣帝幸河東之明年正月鳯凰集祋祤于所集處得玉寳起歩夀宫乃下詔赦天下後間歲鳯凰神爵甘露降集京師赦天下其冬鳯凰集上林乃作鳯皇殿以答嘉瑞明年正月復幸甘泉郊泰畤改元曰五鳯宣帝時鳯皇下郡國凡五十餘所載記石季龍時郡國前後送蒼麟十六白鹿七季龍命司虞張昌柱調之以駕芝葢列于充庭之乗鸞止學宫鸞棲槐樹東觀記王阜為重泉令鸞鳥集止學宫阜使椽沙疊為張雅樂擊磬鳥舉足垂翼應聲而舞止縣庭留十餘日乃去决疑注申繕字公文治春秋讖緯隱居華隂光武徵不至有大鳥髙五尺鷄頭燕頷虵頸魚尾五色僃舉而多青棲繕槐樹旬時不去𢎞農太守以聞詔問百寮皆以為鳯太史令蔡衡對曰凡象鳯者有五多赤色者鳯多青色者鸞多黄色者鵷雛多紫色者鸑鷟多白色者鵠今此鳥多青乃鸞非鳯也上善其言王公聞之咸遜位避繕不起天馬神馬漢書天子發書易鄧展云發易書以卜曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云華陽國志滇池縣郡治故滇國也有澤水周廻二百里所出深廣下流淺狹如倒流故曰滇池長老傳言池中有神馬或交馬即生駿馬俗穪之曰滇池駒日行五百里甘泉宫九莖夜光芝華陽洞五種夜光芝漢舊儀元封二年甘泉宫産芝有九莖金色六葉朱實夜有光乃作芝房之歌神爵元年金芝九莖産於函德殿銅池中銅池承霤也眞誥羅江大霍有洞臺中有五色隱芝華陽洞亦有五色夜光芝良常山有英火芝此物在地如熒火狀其實似草而非也大如豆形紫華夜視有光得食一枚心中一孔明食七枚七孔明可夜書計得食四十七枚夀萬年按本草青芝曰龍芝赤芝曰丹芝黄芝曰金芝白芝曰玉芝黑芝曰𤣥芝紫芝曰木芝抱朴子赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黄者如紫金而皆光明洞徹如堅氷也晦夜去之二三百歩便望見其光矣神光興於殿傍神光滿於壇上郊祀志漢宣帝即位由武帝正統興故立三年尊孝武廟為世宗行所廵狩郡國皆立廟告祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢有雁五色集殿前西河築世宗廟神光興於殿􅅖有鳥如白鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鍾音門戸大開夜有光殿上盡明上乃下詔赦天下梁武帝紀永熈五年春正月辛夘祀南郊大赦賜孝弟力田爵一級先是一日丙夜南郊令觧滌之等到郊所履行忽聞異香三隨風至及將行事奏樂迎神畢有神光圓滿壇上朱紫黄白雜色食頃乃滅稱萬嵗者三呼萬歲者三漢武帝紀帝至于中岳獲駮麃見夏后啟毋石翌日親登嵩髙御史乗屬在廟旁吏卒咸聞呼萬歲者三于是令祠官加增太室祠以山下户三百為之奉邑名曰崈髙北史開皇十三年廓州界連雲山響稱萬歲者三詔頒郡國仍遣使醮山所其日景雲浮于上雉兎馴壇側又太原事跡雜記武德初太行山大聲曰唐國興理萬年上林僵栁自起曲阿倒栁復生漢書昭帝元鳯二年上林有栁樹枯僵自起晉志康帝初為吳王成帝咸和六年五月曲阿有栁樹倒池六載是月忽復起生九年吳雄家桃榆復生又孝武帝四歲時哀帝興寧三年西昌縣脩明家僵栗復生栁葉成文大木書文漢書上林僵栁復起生枝葉蟲嚙其葉成文曰公孫病已立稽神録梁開平二年使其將李思安改潞州營于壺關伐木為柵破一大木中朱書文六字曰天十四載石進思安表上之其羣臣皆賀以為十四年必有遠夷貢寳者司天少監徐鴻獨謂其所親曰自古無一字為年號者上天符命豈缺文乎吾以為丙申之歲當有石氏王此地者天字取四字中兩畫加之于旁則丙字也移四字外圍以十貫之即申字也後至丙申歲晉髙祖以石姓起幷州如鴻之言泰山石立瓠山石立漢書眭𢎞傳孝昭元鳯三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立髙丈五尺大四十八圍入地深八尺三石為足石立後有白鳥數千下集其旁眭𢎞推春秋之意以為石栁皆隂類下民之象而泰山者岱宗之嶽王者易姓告代之處今大石自立僵栁自起非人力所為此當有從匹夫為天子者枯社木復生故廢之家公孫氏當復生者也孟意亦不知其所在即說曰漢家堯後有傳國之運漢帝宜誰差天下誰問差擇也問擇天下賢人䄠以帝位孟竟以妖言誅宣帝即位徵孟子為郎又東平煬王雲哀帝時無鹽危山土自起覆草如馳道狀又瓠山召轉立雲及后謁自之石所祭治石象瓠山立石束倍草幷祠之建平三年息夫躬孫寵等共因幸臣董賢告之是時哀帝被疾多所惡事下有司逮王后謁下獄驗治夢天謂已道成是我子聞空中言唐公是天子南史參軍崔靈運夢天謂已蕭道成是我第十九子我去年已使授其天子位考自三皇五帝以降受命之次至帝為十九也舊唐書髙祖為太原留守鎮幷州時武士彠詰朝嘗于街内獨行聞空中有言曰唐公是天子神人呼太宗我令汝作天子玉像呼睿宗爾後當為天子册府元龜唐太宗嘗夜于嘉猷門見神人長數丈素衣冠呼太宗曰我當令汝作天子太宗再拜忽不見又睿宗初生含凉殿則天乃於殿内造佛寺有玉像焉及長閒觀其側玉像忽言爾後當為天子隋煬居藩𢎞禮賀稱萬乗則天男服天綱識為女主舊唐書隋煬帝居藩召乙弗𢎞禮相已𢎞禮跪而賀曰大王骨法非常必為萬乗之主誠願戒之在得煬帝即位召天下道術人置坊以居之仍令𢎞禮統攝帝見海内漸亂𤣥象錯謬内懐憂恐常謂𢎞禮曰卿昔相朕其言已驗且占相道術朕頗自知卿更相朕今當何如𢎞禮逡廵不敢答帝廹曰卿言與朕術不同罪當死𢎞禮曰臣本觀相書凡人之相有類于陛下者不得善終臣聞聖人不相故知凡聖不同耳又則天初在襁褓袁天綱來至第中謂其母曰惟夫人骨法必生貴子乃召諸子令天綱相之見元慶元爽曰此二子皆保家之主官可至三品見韓國夫人曰此女亦大貴然不利其夫乳母時抱則天衣男子之服天綱曰此郞君子神色爽徹不可易知試令行看于是歩于牀前仍令舉目天綱大驚曰此郞君子龍睛鳯頸貴人之極也更轉側視之又驚曰必若是女實不可窺測後當為天下之主矣靴迹留石蝸迹成天舊唐書武徳六年車騎將劉山濤上書言髙祖龍潜時數往來洛郊之莊曾踐二石靴迹見于石中至今猶在髙祖令鑿之深二寸餘其迹愈明乃止酉陽雜俎睿宗為冀王時寢齋壁上蝸迹成天字懼遽掃之經數日如初及即位雕玉鑄黄金為蝸形分置于釋道像前氣成樓閣水變芳醪舊唐書肅宗自奉天而北夕次永夀百姓遮道獻牛酒有白雲起西北長數丈如樓閣之狀議者以為天子之氣唐宣宗在藩時常從駕回而誤墜馬人不之覺比二更方能興時天大雪四顧悄無人聲上寒甚㑹廵警者至大驚上曰我灮王也不悟至此方困且渴若為我求水警者即于旁近得水以進遂委而去上良久起舉甌將飲顧甌中水盡為芳醪矣當璧者神所立像成者奉為王左傳初共王無冢適有寵子五人無適立焉乃大有事于羣望而祈曰請神擇於五人者使主社稷乃徧以璧見于羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬宻埋璧于太室之庭使五人齋而入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆壓紐魏書尒朱榮發晉陽猶疑所立乃以銅鑄髙祖及咸陽王禧等六王子孫像成者當奉為主惟莊帝獨就又榮既有異圖遂鑄金為己像數四不成野人與塊蜀主報土左傳晉公子重耳之及於難也過衛衛文公不禮焉出於五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之華陽國志周顯王之世蜀王有褒漢之地因獵谷中與秦惠王遇惠王以金一笥遺蜀王王報珍玩之物物化為土惠王怒羣臣賀曰天泰我矣王將得蜀土地惠王喜乃作石牛五頭朝㵼金其後曰牛便金有養卒百人蜀人悅之使使請石牛惠王許之乃遣五丁迎石牛旣不便金怒遣還之乃嘲秦人曰東方牧犢兒秦人笑之曰吾雖牧犢當得蜀也以夣搏占晉勝以彗鬭占晉勝左傳城濮之役晉侯夣與楚子搏楚子伏已而盬其腦杜注盬啑也林注夣搏時楚子伏晉侯之上而以口啑其腦也是以懼子犯曰吉我得天楚伏其罪吾且柔之矣杜注晉矦上向故得天楚子下向地故伏其罪腦所以柔物子犯審見事宜故權言以答夢論衡晉文公將與楚成王戰于城濮彗星出楚楚操其柄以問咎犯咎犯對曰以彗鬬倒之者勝次擲得雉三擲盡盧晉書劉毅傳東府聚樗蒲大擲餘幷黑犢以還惟劉裕與毅在後毅次擲得雉大喜曰非不能盧不事此耳裕因挼五木曰老兄試為卿答旣而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉毅曰亦知公不能以此見借載記慕容垂子寳因讌樗蒲誓之曰若富貴可期頻得三盧於是三擲盡盧寳拜而受賜故云五木之祥董卓名讖曹丕名讖英雄記時有謡言曰千里草何青青十日卜猶不生又作董逃之歌吳録初魏文帝即位孫權嘗從容問羣臣曰曹丕以盛年即位恐孤不能及之諸卿以為何如羣臣未對闞澤曰不及十年丕其沒矣大王勿憂也權曰何以知之澤曰以字言之不十為丕此其數也文帝果七年而崩探扎得符鑄銅成像見上後漢書赤睂求軍中景王後者得七十餘人惟劉盆子與兄茂及前西安矦劉孝最為近屬樊崇等議曰聞古天子將兵稱上將軍乃書扎為符曰上將軍又以兩空扎置笥中遂於鄭北設壇塲祠城陽景王諸三老從事皆大㑹陛下列盆子等三人居中立以年次探扎盆子最㓜後探得符耕時聞鞞鐸音山中聞傳漏響載記石勒方力耕毎聞鞞鐸之聲歸以告其母母曰作勞耳鳴非不祥也南史齊世祖避難揭陽山有白雀來集聞山中有清聲傳漏響江寧九十九洲灨石二十四灘梁本紀江陵先有九十九洲古老相承云洲滿百當出天子桓𤣥之為荆州刺史内懐簒逆之心乃遣鑿破一洲以應百數隨而崩㪚竟無所成宋文帝為宜都王在藩一洲自立俄而文帝簒統後遇元兇之禍此洲還沒太清末枝江陽之閣浦復生一洲羣公上疏稱慶明年而帝即位承聖末其洲與大岸相通惟九十九云陳本紀武帝發南康灨石舊有二十四灘灘多巨石行旅以為難帝之發水暴起數丈三百里間巨石皆没僣號夢得十二之期僭號筮得數年之期後漢書公孫述欲簒夣有人語之曰八厶子系十二為期覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可况十二乎㑹有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家載記羅恒解思明等勸李夀稱鎮西將軍益州牧成都王稱藩于晉而任調與司馬蔡興侍中李豔及張烈等勸夀自立夀命筮之占者曰可數年天子調喜曰一日尚為足而况數年乎思明曰數年天子孰與百世諸侯夀曰朝聞道夕死可矣任侯之言策之上也南史初荀伯玉微時有善相墓者謂其父曰君墓當出暴貴者但不得乆耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃之伯玉姊當嫁明日應行今夕逃遁隨人去家尋求不能得後遂出家為尼伯玉卒敗亡又梁武帝以九錫之出范雲忽中疾居二日半召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈政恐二年不復可救雲曰朝聞夕死而况二年文伯乃下火而床焉重衣以覆之有頃流汗于此即起二年果卒髙祖忌栢人征南忌彭亡史記髙祖從平城過趙趙王張敖朝夕袒韝蔽徐廣曰韝者臂捍也自上食禮甚卑有子壻禮髙祖箕踞詈甚慢易之趙相貫髙趙午等年六十餘故張耳客也生平為氣乃怒曰吾王孱王也說王曰夫天下豪傑並起能者先立今王事髙祖甚恭而髙祖無禮請為王殺之張敖齧其指出血曰君何言之誤且先人亡國頼髙祖得復國徳流子孫秋毫皆髙祖力也願君無復出口貫髙趙午等十餘人皆相謂曰乃吾輩非也吾王長者不倍徳且吾等義不辱今怨髙祖辱我王故欲殺之何乃洿王為乎令事成歸王事敗獨身坐耳漢八年上從東垣還過趙貫髙等乃壁人柏人索隱曰謂於柏人縣館舍壁中著人欲為變也要之置韋昭曰為供置也上過欲宿心動問曰縣名為何曰柏人柏人者廹於人也不宿而去後漢書公孫述聞漢兵在平曲故遣大兵逆之及岑彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也彭所營地名彭亡聞而惡之欲徙㑹日暮蜀刺客詐為亡奴降夜刺殺彭范曄論曰昔髙祖忌柏人之名違之以全福征南惡彭亡之地留之以生災豈幾慮自有明惑將期數使之然乎死犬城豆入牛口典畧睢固字白旣殺楊醜軍屯射犬時有巫誡固曰將軍字而此邑名犬見犬其勢必驚宜急移去固不從遂戰死舊唐書竇建徳為秦王所破中槍竄於牛口渚車騎將軍白士讓楊武威生獲之先是軍中有童謡曰豆入牛口勢不得乆建徳竹至牛口渚甚惡之果敗于此地周舒釋當塗之讖譙周廣杜瓊之言蜀志時人有問春秋讖于周舒曰代漢者當塗髙此何謂也舒曰當途髙者魏也鄉黨學者私傳其語又譙周問于杜瓊曰昔周徵君以為當塗髙者魏也其義何也瓊答曰魏闕名也當塗而髙聖人取類而言耳又問周曰寧復有所怪邪周曰未達也瓊又曰古者名官職不言曹始自漢已來名官盡言曹吏言屬曹卒言侍曹此殆天意也又譙周因杜瓊言乃觸類而長之曰春秋傳著晉穆矦名太子曰仇弟曰成師師服曰異哉君之名子也嘉耦曰妃怨耦曰仇今君名太子曰仇弟曰成師始兆亂矣兄其替乎其後果如服言及漢靈帝名二子曰史矦董矦旣立為帝後皆免為諸矦與師服言相似也先主諱偹其訓具也後主諱禪其訓授也如言劉已具矣當授與人也意者甚于穆矦靈帝之名子後宦人黄皓弄權于内景耀五年宫中大樹無故自折周深憂之無所與言乃書柱曰衆而大期之㑹具而授若何復言曹者衆也魏者大也衆而大天下其當㑹也具而授如何復有立者乎蜀旣亡咸以周言為驗周曰此雖已所推尋然有所因由杜君之辭而廣之耳殊無神思獨至之異也潁水清灌氏寧淮流竭王氏滅漢書灌夫不好文學喜任俠已師古曰已必也然諾諸所以交通無非豪傑大猾家累數千萬食客日數十百人陂池田園宗族賔客為權利横潁川潁川兒歌之曰潁水清灌氏寧潁水濁灌氏族南史王悅之賛曰昔晉初渡江王導卜其家世郭璞云淮流竭王氏滅觀夫晉氏以來諸王冠冕不替葢亦人倫所得豈唯世禄之所傳乎及於陳亡之年淮流實竭曩時人物掃地盡矣斯乃興亡之兆已有前定天之所廢豈智識之所謀乎王長孫卜火光為吉事蘇伯阿望鬱蔥為佳氣論衡光武帝建平元年十二月甲子生于濟陽宫後殿第二内中皇考為濟陽令時夜無火室内自明皇考怪之即召功曹吏充蘭使出問卜工蘭與馬下卒蘇永俱之卜王長孫所長孫卜謂永蘭曰此吉事也毋多言按光武皇帝産于濟陽宫鳯凰集于地嘉禾生于屋又王莽時謁者蘇伯阿能望氣使過舂陵城郭鬱鬱蔥蔥及光武到河北與伯阿見問曰卿前過舂陵何用知其佳氣也伯阿對曰見其鬱鬱蔥蔥耳白狗子為庾氏凶徵自額駒為李氏休徵晉書庾氷令郭璞筮其後嗣卦成曰卿諸子並富貴盛然有白龍者凶徵至矣後氷子蘊為廣州刺史妾房内忽有一新生白狗子莫知所由來其妾秘愛之不令蘊知狗轉長大蘊入見狗眉眼分明又身至長而弱異于常狗蘊甚怪之將出共視在衆人前忽失所在蘊慨然曰殆白龍乎北史凉武昭王李暠嘗與吕光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君必有國土之分家有騧黄馬生白額駒此其時也及吕光末燉煌䕶軍馮翊等以昭王溫毅有惠政推為寧朔將軍燉煌太守昭王初難之㑹宋繇仕于業告歸言于昭王曰兄忘郭黁言邪白額駒今已生矣夢梓化松夢庭生梓逸周書太姒夢太子發取周庭之梓樹于商闕間化為松栢柞棫漢武故事衛子夫入宫嵗餘不得見因涕泣請出上曰吾昨夜夣子夫中庭生梓樹數株豈非天意乎是日幸之有娠叔孫夣豎牛文帝夣鄧通左傳初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶于國氏生孟丙仲壬夣天壓已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助予乃勝之旦而皆召其徒無之且曰志之及宣伯奔齊饋之宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之乆矣魯人召之不告而歸旣立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見則所夣也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎有寵長使為政漢書鄧通以濯舩為黄頭郞文帝嘗夣欲上天不能有一黄頭郞推上天顧見其衣凥𢃄後穿覺而之漸臺以夣中隂目求推者即見鄧通其衣後穿夣中所見也召問其名姓姓鄧名通鄧猶登也文帝甚說尊幸之日日異評曰傳說以胥靡發明王之夣精相通也乃黑僂黄頭亦復入夣固知衺正之機感應良不偶矣夣負登天夣扶上山左傳晉景公之卒也小臣有晨夣負公以登天及日中負晉矦出諸厠遂以為殉北史隋文帝夣欲上髙山而不能得崔彭捧脚李盛扶肘乃得上因謂彭曰死生當與爾俱王邵曰此夣大吉上髙山者明髙崇大安永如山也彭猶彭祖李猶李老二人扶持寔為長夀之徴上聞之喜見容色其年上崩未幾崔彭亦卒三馬食槽兆晉之興射馬為戯兆晉之亡晉帝紀魏武察宣帝有雄豪志又嘗夣三馬同食一槽甚惡焉因謂太子丕曰司馬懿非人臣也必與汝家事太子素與帝善毎相全佑故免又漢晉春秋氐池縣大栁谷口夜激波涌溢其聲如雷曉而有蒼石立水中長一丈六尺髙八尺白石畫之為十三馬一牛一鳥八卦玉玦之象皆隆起其文曰大討曹適水中甲寅帝惡其討也使鑿去為計以蒼石窒之宿昔而白石滿焉至晉初其文愈明馬象皆煥徹如玉又恭帝㓜時性頗忍急及在藩國曾令善射者射馬為戲既而有人云馬者國姓自殺之不祥帝亦悟甚悔之十八公十一禄吳書初丁固為尚書夣松樹生其腹上謂人曰松字十八公也後十八嵗吾其為公乎卒如夣焉南史梁吉士瞻夣得一積鹿皮從而數之有十一領及覺喜曰鹿者禄也吾當居十一禄乎自其仕進所莅已九及除二郡心惡之夣四刀為益州得剪刀為交州晉書王濬字士治為廣漢太守夜夢懸三刀於卧屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一者明府其臨益州乎及賊張𢎞殺益州刺史皇甫晏果遷濬為益州刺史世語爰宗為郡守南界有刻石爰至其下醼有人於石下得剪刀者衆咸異之主簿對曰昔長沙桓王嘗飲餞孫洲父老云此洲狹而長君當為長沙事果應夫三刀為州今得交刀君亦當為交州後果作交州又北史薛琡嘗夣張亮於山上挂絲以告亮且占之曰山上絲幽字也君其為幽州乎數月而騐夣身生八翼夣柱轉三匝晉書陶侃夣生八翼飛而上天見天門九重已登其八唯一門不得入閽者以杖擊之因墜地折其左翼及寤左服猶痛又嘗如厠見一人朱衣介幘歛板曰以君長者故來相報君後當為公位至八州都督北史陽休之在洛將仕夜夣見黄河北驛道上行從東向西道南有一冢極髙大休之歩登冢頭見一銅柱趺為蓮花形休之從西北登一柱礎上以手捉一柱柱遂右轉休之呪曰柱轉三匝吾至三公柱遂三匝而止休之尋寤意如在鄴城東南者其夣竟驗云夣射雁得大夫職夣盜羊得陽城令洛陽伽藍記建義陽城太守薛令伯聞太原王誅百官立莊帝棄郡東走忽夢射得鴈以問楊元慎元慎曰卿執羔大夫執鴈君當得大夫之職俄然令伯除為諫議大夫又京兆許超夣盜羊入獄問於元慎曰君當得陽城令其後有功封陽城侯元慎觧夣義出方途隨意㑹情皆有神驗按元慎意思深長善於觧夣孝昌年廣陵王元淵初除儀同三司縂衆十萬討葛榮夜夣著衮衣倚槐樹而立以為吉徵問于元慎曰三公之祥淵甚悦之元慎退還告人曰廣陵死矣槐字是木傍鬼死後當得三公廣陵果為葛榮所殺追贈司空公終如其言歆自知當為公舒自知當為公列異傳華歆為諸生時嘗宿人門外主人婦夜産有頃兩吏詣門便辟易却相謂曰公在此躊躇良乆一吏曰籍當定奈何得住乃前向歆拜相將入出幷行共語曰當與幾歲一人曰當三歲天明歆去後欲驗其事至三歲故往問兒消息果已死歆乃自知當為公晉書魏舒嘗詣野主人妻夜産俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問寢者為誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑為斧傷而死舒自知當為公矣裴松之云按晉陽秋説魏舒少時寄宿事亦如之以為理無二人俱有此事將由傳者不同今寧信列異羊伏㕔下麕入府中論衡㑹稽東郡都尉禮文伯時羊伏㕔下其後遷為東萊太守又都尉王子鳯時麕入府中其後遷丹陽太守樵所得貂蟬冠上集飛蟬南史江淹年十三時孤貧嘗采薪以養母曾於樵所得貂蟬一具將鬻以養母母曰此汝休徵也可留待得侍中著之至是果如母言又朱异除中書郞時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆岸側人言顧吳郡壍中兒呼蕭丹陽南史顧琛景平中為朝請假還東日晚至方山於時商旅數十船悉泊岸側有一人𤣥衣介幘執鞭屏諸船云顧吳郡部伍尋至應泊北岸于是諸船各東西俄有一假裝至事力甚寡仍泊向處人問顧吳郡早晚至船人答無顧吳郡又問何船曰顧朝請耳莫不驚怪琛意竊知為善徵因誓之曰若得郡當於此立廟至是果為吳郡乃立廟方山號白馬廟云又齊宗室傳景明中沈攸之于荆州舉兵武帝時鎮江州盆城新吳侯蕭景先夜乗船忽聞壍中有小兒呼蕭丹陽未測何人聲聲不絶試問誰空中應曰賊尋當平何事嚴訪語訖不復言即窮討之了不見明旦以白帝帝曰攸之自無所至焉知汝後不作丹陽尹景先曰寧有作理尋而攸之首至及永明三年詔以景先為丹陽尹謂曰此授欲驗往年盆城壍空中言耳又梁武帝行次熨斗洲有人長八尺餘容貎衣冠皓然皆白縁江呼曰蕭王大貴李氏瑞槐趙氏瑞棗北夣𤨏言唐李公福河中永樂有宅庭槐一本抽三枝直過當舍屋脊一枝不及同堂兄弟三人曰石曰程皆登宰執惟福一人歴鎮使相而已又石晉朝趙令公瑩家庭有樗棗樹婆娑異常四遠俱見有望氣者詣其鄰里問人曰此家合有登宰輔者里叟曰無之然趙令先得小兒相兒得非此應乎術士曰王氣方盛不在身當在其子孫耳後中令由太原判官大拜出將入相則前言果效也孫光憲曰凡士之宦達非止一途或以才升或由命遇則盛衰之氣亦隨人而效之向者槐棗異常豈非王氣先集邪不然何榮茂挺特拔聳之如是晉厲公視逺歩髙周單子視下言徐左傳成公十六年公㑹諸侯於周單襄公見晉厲公視遠歩髙告公曰晉將有亂魯侯曰敢問天道也抑人故也對曰吾非瞽史焉知天道吾見晉君之容殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處誼足以歩目晉侯視遠而足髙目不在體而足不歩目其心必異矣目體不相從何以能乆夫合諸侯民之大事也於是虖觀存亡故國將無咎其君在㑹歩言視聽必皆無讁則可以知德矣視遠曰絶其誼足髙曰棄其德言爽曰反其信聽滛曰離其名夫目以處誼足以踐德口以庇信耳以聽名者也故不可不慎偏喪有咎既喪則國從之晉侯爽二吾是以云後二年晉人殺厲公又昭公十一年夏周單子㑹于戚視下言徐晉叔向曰單子其死虖朝有著定㑹有表衣有襘𢃄有結㑹朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以著之失則有闕今單子為王官伯而命事于㑹視不登𢃄言不過歩貌不道容而言不昭矣不道不恭不昭不從無守氣矣十二月單成公卒見蔡君之惰知其不免見令尹之儀知其不終左傳蔡景侯歸自晉入於鄭鄭伯享之不敬子産曰蔡君其不免乎日其過此也君使子展往勞于東門而敖吾曰猶將更之今還受享而惰廼其心也君小國事大國而惰敖以為己心將得死乎若不免必由其子其為君也滛而不父僑聞之如是者必有子旤三十年為世子般所殺又衛北宫文子見楚令尹圍之儀言於衛侯曰令尹似君矣將有他志雖獲其志弗能終也公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終郤錡將事不敬孟獻知其必亡成子受脤不敬劉子知其不反左傳晉侯使郤錡乞師于魯將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為十七年郤氏亡又成公十三年諸侯朝王遂從劉康公伐秦成肅公受賑于社不敬劉子曰吾聞之曰民受天地之中以生所謂命也是以有禮義動作威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如惇篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎五月成肅公卒寗子以傲享知苦成之亡穆子以僭登知孫子之亡左傳成公十四年衛定公享苦成叔甯惠子相苦成叔敖甯子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔匪徼匪傲萬福來求今夫子傲取禍之道也後三年苦成家亡又襄公七年衛孫文子聘于魯君登亦登叔孫穆子相趨進曰諸侯之㑹寡君亦嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子亡辭亦亡悛容穆子曰孫子必亡為臣而君過而不悛亡之本也十四年孫子逐其君而外叛受玉惰執幣傲受璽堕左傳天王使召武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰于受瑞自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世又楚子越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也晉書太后遣使迎髙貴鄉公曹髦于元城而立之改元曰正元天子受璽墮舉趾髙景帝聞而憂之莫敖舉趾髙曹髦舉趾髙見上左傳楚屈瑕伐羅鬬伯比送之還謂其御曰莫敖必敗舉趾髙心不固矣生子知以賄死生子知必破亡晉語叔魚生其母視之曰是虎目而豕喙鳶肩而牛腹谿壑可盈是不可饜也必以賄死遂弗視又揚食我生叔向之母聞之往及堂聞其號也乃還曰其聲豺狼之聲也終滅羊舌氏之宗者必是子也按注揚叔向邑也食我叔向子伯石也其母夏姫之女南史文元袁皇后初生元凶劭自詳視之使持白帝此兒形貌異常必破國亡家不可舉便欲殺之文帝狼狽至後殿戸外手撥幔禁之乃止野鳥入室主人將去野獸入家主人將去漢書賈誼為長沙傅三年有鵩飛入誼舍止于坐隅鵩似鴞不祥鳥也誼旣以謫居長沙長沙卑濕誼自傷悼以為夀不得長乃為賦以自廣其辭曰單閼之歲四月孟夏庚子日斜鵩集予舍止於坐隅貌甚閒暇異物來崪崪音萃發書占之讖言其度曰野鳥入室主人將去晉書凉後主諱歆字士業用刑頗嚴又繕築不止從事主簿汜稱上疏諌曰臣聞政之不修則垂災譴以誡之二年十一月狐上南門諺云野獸入家主人將去今狐上南門亦災之大也按論衡云楚王英宫樓未成鹿走上堦其後果薨魯昭公且出鸜鵒來巢其後季氏逐昭公昭公奔齊遂死不還昌邑王時夷鴣鳥集宫殿下王射殺之以問郞中令龔遂遂對曰夷鴣野鳥入宫亡之徵也其後昌邑王竟亡盧奴令田光與公孫賀等謀反其且覺時狐鳴光舍屋上光心惡之其後事覺坐誅李意其示先主敗徵王子年示苻堅敗徵神仙傳仙人李意其蜀人也傳世見之云是漢文帝時人先主欲伐吳遣人迎意其意其到先主禮敬之問以吉凶意其不答而求紙筆畫作兵馬器仗數十紙已便以手一一裂壞之又畫作一大人掘地埋之便竟去先主大不喜而自出軍征吳大敗還忿恥發病死衆人乃知意其畫作大人而埋之者即是言先主死意晉書王嘉字子年時苻堅將南征遣使者問之嘉曰金剛火彊乃乗使者馬正衣冠徐徐東行數百歩而策馬馳反脫衣服棄冠履而歸下馬踞床一無所言使者還告堅不寤復遣問之曰吾世祚云何嘉曰未央咸以為吉明年癸未敗于淮南所謂未年而有殃也流星投亮營妖星見豫分晉陽秋有星赤而芒角自東北西南流投于諸葛亮營三投再還往大還小俄而亮卒漢晉春秋云亮卒于郭氏塢晉書祖逖為奮威將軍豫州刺史先是華譚庾闡問術人戴洋洋曰祖豫州九月當死初有妖星見于豫州之分歴陽陳訓又謂人曰今年西北大將當死逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒于雍丘豫州士女若喪考妣譙梁百姓為之立祠王敦乆懐逆亂畏逖不敢發至是始得肆意焉服劉鳥截齊婦晉書趙王倫於殿上得異鳥問皆不知名累日向夕宫西有素衣小兒言是服劉鳥倫使録小兒幷鳥閉置牢室明旦開視戸如故幷失人鳥所在倫目上有瘤時以為妖焉又初齊王冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截齊便去耳識者聞而惡之時又謡曰著布袙腹為齊持服俄而冏誅周書晉公䕶未誅之前强練曾手持一大瓠到䕶第門外抵而破之乃大言曰瓠破子苦未幾而䕶誅陸機始臨戎而牙旗折桓𤣥始簒位而旂竿折晉書陸機始臨戎而牙旗折意甚惡之列軍自朝歌至于河橋鼔聲聞數百里漢魏以來出師之盛未嘗有也長沙王乂奉天子與機戰于鹿苑機軍大敗又桓𤣥始簒龍旂竿折時𤣥田獵無度飲食奢恣土木妨農又多姦謀故木失其性天戒若曰旂所以掛三辰章著明也旂竿之折髙明去矣𤣥果敗案眞人水鏡經曰凡軍始出立牙竿必令完堅若有折將軍不利牙門旗竿軍之精也即周禮司常職云軍旅㑹同置旌門是也甘卓照鏡不見其頭仲文照鏡不見其靣晉書甘卓性先寛和忽便彊塞徑還襄陽意氣騷擾舉動失常自照鏡不見其頭視庭樹而頭在樹上心甚惡之其家金櫃鳴聲似槌鏡清而悲巫云金櫃將離是以悲鳴主簿何無忌及家人皆勸令自警卓轉更狠愎聞諫輙怒方散兵使大佃而不為偹功曹榮建固諫不納襄陽太守周慮等宻承王敦意知卓無偹詐言湖中多魚勸卓遣左右皆捕魚乃襲害卓于寢傳首于敦又殷仲文照鏡不見其靣數日而遇禍仲文善屬文為世所重謝靈運嘗云若殷仲文讀書半袁豹則文才不减班固言其文多而見書少也聽太常樂知隋室不乆將盡聞胡琵琶知隋煬往而不反北史萬寳常聽太常所奏樂泫然泣曰樂聲滛厲而哀天下不乆將盡時四海全盛聞言者皆謂不然大業之末其言卒驗又王令言妙達音律大業末煬帝將幸江都令言之子嘗於戸外彈胡琵琶作翻調安公子曲令言時卧室中聞之驚起曰變變急呼其子曰此曲興自早晚其子曰頃來有之令言遂歔欷流涕謂其子曰汝慎無從行帝必不反子問其故令言曰此曲宫聲往而不返宫君也吾所以知之帝竟被弑于江都李嗣眞觀樂于太清而知太子廢裴知古奏樂于太廟而知中宗立舊唐書李嗣貞博學曉音律時章懐太子居春宫嗣貞嘗於太清觀奏樂謂道士劉槩輔儼曰此曲何哀思不和之甚也槩儼曰此太子所作寳慶樂也居數日太子廢為庶人又裴知古善于音律長安中為太樂丞神龍元年正月春享西京太廟知古與其事謂萬年令元行冲曰金石諧和當有吉慶之事其在唐室子孫乎其月中宗即位復改國為唐知古又能聽婚夕環珮之聲知其夫妻終始潘安仁詩讖劉希夷詩讖晉書孫秀誣石崇潘岳為亂初被收俱不相知崇已送在市岳後至崇謂之曰安仁卿亦復爾邪岳曰可謂白首同所歸岳金谷詩云投分寄石友白首同所歸乃成其讖唐新語劉希夷一名庭芝汝州人少有文華好為宫體詩詞㫖悲苦不為時人所重善彈琵琶嘗為白頭翁詠云今年花落顔色改明年花開復誰在既而自悔曰我此詩讖與石崇白首同所歸何異乃更作一聯云年年嵗嵗花相似歲歲年年人不同旣而歎曰此句復似向讖矣然死生有命豈復由此乃兩存之詩成未周歲為姦人所殺或云宋之問害之後孫翌撰正聲集以希夷詩為集中之最由是大為人所稱或云之問害希夷而以洛陽之詩為己作至今載此篇在之問集中又北夣𤨏言唐乾寧中昌美典䕫州時屬夏潦峽漲湍險里俗云灔澦大如馬瞿塘不可下于是行李輟棹而俟水齊去焉有朝官李嶤學士挈家自蜀沿流將之江陵郡牧以水勢正惡且望少駐以圖利渉隴西怱遽殆為人之促召堅請東下不能止之才鼔行橈長揖而别州將目送之際盤渦呀裂吸其船而倒卓一家溺死初隴西文賦中有金釵墜井賦至是讖焉毎百除九毎百除六南史梁武帝末年都下用錢毎百皆除其九謂為九伯已而有侯景之亂及江寧將覆毎百覆除六文稱為六伯識者以為九者陽九六者百六葢符厯數非人事也亡秦者胡滅石者陵史記秦始皇廵北邊從上郡入燕人盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也始皇乃使將軍蒙恬發兵三十萬人北擊胡略取河南地鄭𤣥曰胡胡亥秦二世名也秦見圖書不知此為人名反偹北胡載記石季龍十三子五人為冉閔所殺八人自相殘害初讖言滅石者陵尋而石閔徙封蘭陵公季龍惡之改蘭陵為武興郡至是終為閔所滅史臣曰夫從逆則凶事符影響為咎必應理若循環季龍之殪晉人旣窮其酷永曾冉閔字之誅羯士亦殲其類無徳不報斯之謂乎蒼者胡象蒼者胡色晉書董養傳永嘉中洛城東北歩廣里中地䧟有二鵞出焉其蒼者飛去白者不能飛養聞嘆曰昔周時所盟㑹狄泉卽此地也今有二鵞蒼者胡象白者國家之象其可盡言乎顧謂謝鯤阮孚曰易稱知幾其神乎君等可深藏矣南史胡藩傳廣固之役夜忽有鳥大如鵞蒼黑色飛入帝帳裏衆以為不祥藩賀曰蒼黑者北方色北人歸我大吉之象明旦攻城䧟之知伊川將為戎地知晉室必為胡破左傳初平王之東遷也辛有適伊川見被髪而祭於野者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川杜注辛有周大夫伊川周地允姓之戎居陸渾在秦晉西北二國誘而徙之伊川遂從戎號至今為陸渾縣也計此去辛有過百年而云不及百年傳舉其事驗不必其言信晉書五行志泰始之後中國相尚用胡床貊槃及為羌煮貊炙貴人富室必畜其器吉亨嘉㑹皆以為先太康中又以氊為絈頭及絡𢃄袴口百姓相戯曰中國必為胡所破夫氊毳産於胡而天下以為絈頭𢃄身袴口胡旣三制之矣能無敗乎駢志巻十三
