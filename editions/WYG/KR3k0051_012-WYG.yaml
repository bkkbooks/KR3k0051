body:
  text: 駢志卷十二明陳禹謨撰己部下三日相承兩月相承晉書愍帝二年有三日相承岀於西方而東行南史梁武太清二年春正月朔兩月相承如鈎見于西方評曰閱吕氏春秋有衆日並出小月承大月大月承小月嘗誕而不信也覩晉季諸異始信而有徴矣三日並照兩日俱見載記劉聰時東宫鬼哭赤虹經天南有一岐三日並照各有兩珥五色甚鮮客星歴紫宫入於天獄而滅南史梁元帝承聖元年時有兩日俱見日隕于地日出于夜晉書愍帝二年辛未辰時日隕于地又元帝太興元年冬劉曜僣即皇帝位于赤壁十一月乙卯日夜出髙三丈中有赤青珥日中有若飛鷰日中有三足烏晉天文志惠帝元康九年正月日中有若飛鷰者數日乃消又懷帝永嘉五年三月庚申日㪚光如血下流所照皆赤日中有若飛鷰者又穆帝永和八年張仲華在凉州日暴出如火中有三足烏形見分明五日乃止月暈左角占角蟲將死驛馬星流計赦書應至北史天興五年月暈左角晁崇奏占為角蟲將死帝旣尅姚平于柴壁以崇言之徴遂命諸軍焚車而反牛果大疫輿駕所乗數百頭亦同日斃于路側自餘首尾相繼是嵗天下牛死者十七八麋鹿亦多死又明元時有容城令徐路善占候坐繫冀州獄别駕崔隆宗就禁慰問之路曰昨夜驛馬星流計赦須臾應至隆宗先信之遂遣人出城候焉俄而赦至七星化人七星化豕國史纂異云太宗時李淳風奏北斗七星當化為人明日至西市飲酒使人候之有僧七人共飲酒二石太宗遣人召之笑曰此必李淳風小兒在彼言我也忽不見酉陽雜爼云僧一行㓜嘗有德於王姥王姥兒殺人係獄姥求救於一行一行乃徙大瓮於渾天寺中授布嚢于二奴曰某坊廢園至昏當有七物入來可盡掩之酉後果有羣豕至奴悉獲之一行令置瓮中𤣥宗急召一行問曰太史奏昨夜北斗不見是何祥也師有以禳之乎一行曰後魏時失熒惑至今帝車不見古所無者天將大警于陛下也莫若大赦天下𤣥宗從之一行歸放豕出又其夕太史奏北斗星見凡七日而復天雨金三日天雨金十斛述異記先儒說夏禹時天雨金三日古詩云安得天雨金使金賤如土是也又周成王時咸陽雨金今咸陽有雨金原又漢世翁仲孺家貧力作居渭川一旦天雨金十斛于其家天雨稻天雨粟述異記大禹時天雨稻古詩云安得天雨稻飼我天下民又吕后三年天雨粟又漢宣帝時江淮饑饉人相食雨糓三秦魏地亾糓二十頃又漢武帝時廣陽縣雨麥永光天雨草元始天雨草漢書五行志元帝永光二年八月天雨草而葉相樛結大如彈丸又平帝元始三年正月天雨草按京房易傳曰君吝于禄信衰賢去厥妖天雨草夏霜晝霜命厯序桀無道夏隕霜又穆公即位仲夏隕霜殺草日中不消又五行志證聖元年六月陸州隕霜殺草吳越地煖而盛夏隕霜昔所朱有隋書北齊武成時晝霜下洛竭淮竭史記周幽王二年西周三川皆震伯陽甫曰昔伊洛竭而夏亾今周徳若二代之季山崩川竭亾之徵也南史宋太始季年岷益有山崩淮水竭齊郡明僧紹竊謂其弟曰夫天地之氣不失其序陽伏而不泄隂廹而不蒸于是乎有山崩川竭之變昔伊洛竭而夏亾河竭而商亾三川竭岐山崩而周亾五山崩而漢亾夫有國必依山川而為固山川作變不亾何待今宋徳如四徳之季爾誌吾言爾勿泄也竟如其言秦武王時渭水赤三日秦昭王時渭水赤三日五行志秦武王三年渭水赤者三日昭王三十四年渭水又赤三日劉向以為近火沴水也秦連相坐之法棄灰于道者罔宻而刑虐加以武伐横出殘賊鄰國至于變亂五行氣色謬亂天戒若曰勿為刻急將致敗亾秦遂不改至始皇滅六國二世而亡昔三代居三河河洛出圖書秦居渭陽而渭水數赤瑞異應徳之效也京房易傳曰君湎于酒滛于色賢人潜國家危厥異流水赤也評曰按新序論衡衛鞅一日臨渭而論囚七百餘人渭水盡赤號哭之聲動於天地葢武昭渭赤之異至此騐矣河赤于龍門三日河赤于龍門三里竹書紀年梁惠成王四年河水赤于龍門三日竹書紀年晉昭公元年河水赤於龍門三里又京房易占河水赤下民恨水赤如血水黑如墨南史陳太建十四年秋七月自建鄴至荆州江水色赤如血又陳禎明二年四月郢州南浦水黑如墨石言于魏榆石言于平陽左傳昭公八年石言于晉魏榆晉侯問于師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動于民則有非言之物而言今宫室崇侈民力雕盡怨讟並作莫保其性石言不亦宜乎晉書愍帝建興五年石言于平陽是時帝蒙塵亦在平陽又載記石言于陜若言勿東者石然于泰山八日而滅土然于關中月餘不滅載記石季龍時石然于泰山八日而滅又初秦之未亂也關中土然無火而烟氣大起方數十里中月餘不滅石碑生金墓碑生金晉書懐帝永嘉元年項縣有魏豫州刺史賈逵石碑生金可採又庾氷令郭璞筮其後嗣卦成曰卿諸子並當貴盛若墓碑生金庾氏之大忌也後果墓碑生金俄而為桓溫所滅城見血而去閫有血便走神異傳秦時長水縣有童謡曰城門當有血城陷沒為湖有老嫗聞之憂懼日往窺城門門侍欲縛之嫗言其故嫗去後門侍殺犬以血塗門嫗又徃見血走去不敢顧忽有大水長欲没縣主簿令幹入白令令見幹曰何忽作魚幹又曰明府亦作魚遂乃淪陷為谷矣淮南子歴陽之都一夕反而為湖勇力聖智與罷怯不肖者同命髙誘注云歴陽淮南國縣名昔有老嫗嘗行仁義有二諸生過之謂曰此國當沒為湖謂嫗視東城門閫有血便走上北山勿顧也自此嫗便徃視門閫閽者問之嫗對曰如是其暮門吏故殺雞血塗門閫明旦見老嫗早徃視門見血便上北山國沒為湖與門吏言其事適一宿耳一夕旦而為湖也霍禹第門自壞董賢第門自壞漢書霍禹第中䑕暴多與人相觸以尾畫地鴞數鳴殿前樹上第門自壞雲尚里宅中門亦壞巷端人共見有人居雲屋上撤瓦投地就視亡有按五行志曰時禹内不順外不敬見戒不改卒受滅亡之誅又哀帝詔將作大臣為董賢起大第北闕下重殿洞門木土之工窮極技巧柱檻衣以綈錦下至賢家僮僕皆受上賜及武庫禁兵上方珍寳其選物上第盡在董氏而乗輿所服廼其副也賢第新成功堅其外大門無故自壞按五行志賢以私愛居大位賞賜無度嬌嫚不敬大失臣道見戒不改後賢夫妻自殺家徙合浦板幹一夜自移六梁一時躍出魏土地記盧植言代城之初築也板幹一夜自移去故代西南五十里大澤中營城自護結為九門于是就以為治城圓匝而不方周四十七里開九門更名其故曰東城又應劭曰城徙西南去故代五十里故名代曰東城晉書周筵於姑熟立屋五間而六梁一時躍出墮地衡獨立柱頭零節之上甚危雖以人功不能然也襄平北生肉平陽北生肉魏志初公孫淵家數有怪犬冠幘絳衣上屋炊有小兒蒸死甑中襄平北市生肉長圍各數尺有頭目口喙無手足而動揺占曰有形不成有體無聲其國滅載記劉聰時流星起于牽牛入紫微龍形委蛇其光照地落于平陽北十里視之則有肉長三十步廣二十七步臭聞于平陽肉旁常有哭聲晝夜不止聰甚惡之涿郡鑄鐵鐵飛上沛郡鑄鐵鐵不下漢書五行志征和二年春涿郡鐵官鑄鐵鐵銷皆飛上去又和平二年春沛郡鐵官鑄鐵鐵不下隆隆如雷聲又如鼓音工十三人驚走音止還視地地陷數尺鑪分為十一鑪中銷鐵散如流星皆上去銅人生毛金像生毛漢書郊祀志宣帝甘露元年正月上幸丼泉郊泰畤其夏黄龍見新豐建章未央長樂宫鍾􅙌銅人皆生毛長一寸所時以為美祥洛陽伽藍記太常民劉胡兄弟四人以屠為業永安年中胡殺猪猪忽唱乞命聲及四隣隣人謂胡兄弟相毆鬬而來觀之乃猪也即捨宅為歸覺寺合家人入道焉及普泰元年此寺金像生毛眉髪悉皆具足尚書左丞魏季景謂人曰張天錫有此事其國遂滅畫人縮頭㳺仙震動載記石季龍時太武殿畫古賢悉變為胡旬餘頭悉縮入肩中季龍大惡之佛圖澄對之流涕梁武帝紀太清元年帝捨身光嚴重雲殿㳺仙化生震動三日乃止當時謂之祥瑞識者以非動而動在洪範為妖平等寺石像舉頭平等寺金像垂淚北史永熈二年平等寺浮屠成孝武㑹萬人于寺石佛低舉其頭終日乃止帝禮拜之洛陽伽藍記平等寺門外金像一軀髙二丈八尺相好端嚴常有神騐國之吉凶先炳祥異孝昌三年十二月中此像靣有悲容兩目垂淚遍體皆濕時人號曰佛汗京師士女空市里徃而觀之有比丘以净綿拭其淚須臾間綿濕都盡更換以他綿俄然復濕如此三日乃止明年四月尒朱榮入洛陽誅戮百官死亡塗地永安二年三月此像復汗士庶復徃觀之五月北海王入洛莊帝北廵七月北海大敗所將江淮子弟五千盡被俘虜無一得還永安三年此像悲泣如初至十二月尒朱兆入洛陽擒莊帝崩于晉陽按宋嘉祐中邕州佛寺塑像其手忽振動晝夜不止未幾交趾入冦城幾陷其後又動而儂智髙反圍城卒陷之屠其城去熈寜元年又動郡守錢師孟知其不祥亟取投之江中遂無他物理不可觧佛豈為是也哉以五行傳推之近土失其性也又江東宣州大火幾焚其半前此亦有鐵佛坐髙丈餘而身忽迭前迭却若俯就人者數日土人方駭既而火作葢幾邕州之異乎臨洮長人宕渠長人五行志秦始皇帝二十六年有大人長五丈足履六尺皆夷狄服凡十二人見于臨洮天戒若曰勿大為夷狄之行將受其禍是嵗始皇初并六國反喜以為瑞銷天下兵器作金人十二以象之遂自賢聖築長城故大人見于臨洮明禍亂之起按水經注秦始皇二十一年長狄十二見于臨洮長五丈餘以為善祥鑄金人十二以象之各重二十四萬斤坐之宫門之前謂之金狄皆銘其胷曰皇帝二十六年初兼天下以為郡縣正法律同度量大人來見臨洮身長五丈足六尺李斯書也故衛恒叙篆曰秦之李斯號為工篆諸山及銅山銘皆斯書也漢自阿房徙之未央前俗謂之翁仲地皇二年王莽夣銅人立惡之念銅人銘有皇帝初兼天下文使尚方工鐫滅所夣銅人膺文後董卓毁其九為錢其存者三魏明帝欲徙之洛陽重不可勝至霸水西停之漢晉春秋云或言金狄泣故留之石虎取置鄴中苻堅又徙之長安毁二為錢其一未至而苻堅亂百姓推置陜北河中于是金狄滅除華陽國志秦始皇時有長人二十五丈見宕渠秦史胡母敬曰是後五百年外必有異人為大人者及李雄之王祖世出自宕渠有識者皆以為應之陳焦埋六日更生栁榮死二日忽言吳志孫休時吳民陳焦死埋之六日更生穿土中出搜神記臨海松陽人栁榮從張悌至揚州榮病死船中二日時軍已上岸無有埋之者忽然大呼言人縛軍師人縛軍師聲激揚遂活人問之榮曰上天北斗門下卒見人縛張悌意中大愕不覺大呼言何以縛張軍師門下人怒榮叱逐使去榮便去怖懼口餘聲發揚耳其日悌戰死黑衣人呼官今大赦𤣥衣人說三日而赦載記苻堅親為赦文王猛苻融供進紙墨有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來俄而長安街巷市里人相告曰官今大赦有司以聞堅驚謂融猛曰禁中無耳屬之理事何從泄也於是敇外窮推之咸言有一小人衣黑衣大呼于市曰官今大赦須臾不見堅歎曰其向蒼蠅乎聲狀非常吾固惡之朝野僉載貞觀中南康黎景逸居於空青山常有鵲巢其側每飯食以餧之後隣地失布者誣景逸盜之繫南康獄月餘劾不承欲訊之其鵲止于獄樓向景逸歡喜似傳語之狀其日傳有赦官司詰其由來云路逢𤣥衣素矜人所說三日而赦至景逸還山乃知𤣥衣素衿者鵲之所傳太原生婦周冢殉女傅子時太原發冢破棺棺中有一生婦人將出與語生人也送之京師問其本事不知也視其冢上樹木可三十嵗不知此婦人三十歲常生於地中邪將一朝歘生偶與發冢者㑹也顧愷之啟蒙注魏時有開周王冢者得殉塟女子經數日而有氣數月而能語年可二十送詣京師郭太后愛養之十餘年太后崩哀思哭泣一年餘而死桑生於朝一暮大拱桑生於宫數日而枯史記亳有祥桑榖共生于朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝徳帝之政其有闕焉帝其修徳太戊從之而祥桑枯死晉書惠帝九年六月有桑生于宫西廂日長尺餘數日而枯無何而愍懐太子廢斷樹復立故處僵樹自立故處漢書五行志建昭五年兖州刺史浩賞禁民私所自立社山陽槖茅郷社有大槐樹吏伐斷之其後樹復立故處又哀帝建平三年零陵有樹僵地圍丈六尺長十七丈七尺民斷其本長九尺餘皆枯三月樹卒自立故處按京房易傳曰棄正作滛厥妖木斷自屬師古曰屬連續也妃后有顓木僵反立斷枯復生師古曰顓謂專寵天辟惡之如淳曰天辟謂天子也樹生支如人頭柱生支如人形漢書五行志成帝永始元年二月河南街郵樗樹生支如人頭眉目鬚皆具亡髮耳又哀帝建平三年十月汝南西平陽遂鄉柱仆地生支如人形身青黄色靣白頭有頿髮稍長大凡長六寸一分按京房易傳曰王德衰下人將起則有木生為人狀陸地生蓮閣下生蓮關令内傳喜生時其家陸地自生蓮華光色鮮盛又晉范甯為豫章守表新塗縣㕔事前陸地生蓮花萬歲厯齊太和二年閣下生蓮花儀仗生華柱節生花晉書五行志元帝大興四年王敦在武昌鈴下儀仗生華如蓮花五六日而萎落此木失其性干寳以為狂華生枯木又在鈴閤之間言威儀之富榮華之盛皆如狂華之發不可乆也其後王敦終以逆命加戮其尸南史初蕭紀將僣號妖怪不一内寢相殿柱繞節生花其莖四十有六靃靡可愛狀似荷花識者曰王敦妖花非佳事也柱生栢枝柱生槐枝寰宇記巴郡有栢柱大可十圍髙二十餘丈乃公孫述時樓柱所斫之處忽生枝而不朽玉堂閒話長安城有孫偓家宅居之數世堂室甚古其堂前一柱忽生槐枝孫氏猶障閉之不欲人見期年後漸漸滋茂以至柱身通體皆變壞其屋上衝秘藏不及衣冠士庶之來觀者車馬填咽不乆偓處巖廊居節制人以為應三槐之朕亦甚異也稗化為稻桑化為栢吳志孫亮五鳯元年六月交趾稗草化為稻昔三苗將亡五榖變種此草妖也其後亮廢晉永康元年壯武國有桑化為栢而張華遇害壯武華之封邑也北原山下草木有鐵騎象八公山上草木皆類人形載記石勒所居武鄉北原山下草木皆有鐵騎之象家園中生人參花葉甚茂悉成人形父老及相者皆曰此胡狀貎竒異志度非常其中不可量也又苻堅與苻融登城望王師見部陣齊整將士精鋭又北望八公山上草木皆類人形顧謂融曰此亦勍敵也何謂少乎憮然有懼色初朝廷聞堅入㓂㑹稽王道子以威儀鼓吹求助于鍾山之神奉以相國號及堅之見草木狀神若有力焉水經注八公山無樹木惟重阜耳山上有淮南王劉安廟劉安是漢髙帝之孫厲王長子也折節下士篤好儒學養方術之徒數十人皆為俊異焉多神仙秘法鴻寳之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無駐衰之術未敢相聞八公咸變成童王甚敬之八士並能鍊金化丹出入無間乃與安登山埋金于地白日昇天餘藥在器雞犬舐之者俱得上昇其所昇之處踐石皆陷人馬跡存焉故山即以八公為目余登其上人馬之跡無聞矣唯廟像存焉廟中圖安及八士像皆坐牀帳如平生被服纎麗咸羽扇裙帔巾壺枕物一如常居廟前有碑齊永明十年所建也花印紅迹壺卽紅色青𤨏記明皇時有獻牡丹者謂之楊家紅乃楊勉家花也命力士將花上貴妃妃方對粧妃用手拈花時勻靣脂在手即印於花上帝見之問其故妃以狀對上詔於僊春舘栽來歲花開上有手印紅迹帝賞花驚異其事乃名為一捻紅後樂府中有一捻紅曲拾遺記魏文帝所愛美人姓薛名靈芸常山人也芸年十七容貎絶世時文帝選良家子入宫靈芸别父母淚下沾衣至升車就路時以玉唾壺承淚壺卽如紅色及至京師壺中淚凝如血色矣帝改靈芸名曰夜來夜來妙于鍼工雖處深帷重幄不用燈燭裁製立成非夜來縫製帝則不服宫中號為鍼神䨇劍化龍二鯉化鐵晉書張華傳華佩干將華誅失劍所在雷煥子華持莫邪經延平津忽躍出墮水見兩龍各長數丈蟠縈有文章華嘆曰先君化去之言張公終合之論此其騐乎晉南蠻傳林邑奴文嘗牧牛澗中獲二鯉魚化成鐵用以為刀刀成乃對大石嶂而詋之曰鯉魚變化冶成雙刀石嶂破者是有神靈進斫之石卽瓦觧龜生毛兎生角述異記商紂時大龜生毛兎生角兵甲將興之兆按龜毛兎角佛家冇此說似謂世所必無者若述異記所載則復冇之亦竒甚矣松變為青牛梓化為青牛嵩髙山記嵩嶽有大松樹或百嵗千歲其精變為青牛或為伏龜採食其實得長生郭氏𤣥中記秦文公伐大梓樹不克夜有鬼問梓樹樹曰豈奈我何鬼曰若使三百人披頭以絲繞樹豈不敗汝樹黙然不應明日人言於秦王王依此言伐之中有青牛逐之入澧水傳列異秦文公時梓樹化為牛以騎擊之不勝或墮地髻觧披髮牛畏之入水故秦因是置旄頭騎使先驅牛化為虎羊化為狼述異記周幽王時牛化為虎羊化為狼洛南有避狼城云幽王時羣羊為狼食人故築城避之今洛中狼村是其處也牛言犬言晉惠帝太安中江夏張騁所乗牛言曰天下亂乗我何之騁懼而還犬又言曰歸何早也按京房易數曰牛能言如其言占吉凶易萌氣樞曰人君不好士走馬被文繡犬狼食人食則有六畜談言秦昭時牡馬生子漢哀時牡馬生駒史記秦孝公二十一年有馬生人昭王二十年牡馬生子而死劉向以為皆馬禍也孝公始用商君攻守之法東侵諸侯至於昭王用兵彌烈其象將以兵革抗極成功而還自害也牡馬非生類妄生而死猶秦恃力彊得天下而還自滅也一曰諸畜生非其類子孫必有非其姓者至始皇果吕不韋子漢書五行志哀帝建平二年定襄牡馬生駒三足隨羣飲食太守以聞馬國之武用三足不任用之象也猫犬作人言乗馬作人語北夣𤨏言唐左軍容使嚴遵美于閹宦中仁人也自言北司馬供奉官袴衫給事無秉簡入侍之儀又云樞宻使廨署三間屋書櫃而已亦無視事㕔堂狀後貼黄指揮公事乃是楊復恭奪宰相權也自是常思退休一旦發狂手足舞蹈家人咸訝傍有一猫一犬猫謂犬曰軍容改常也顛發也犬曰莫管他從他俄而舞定自驚自笑且異猫犬之言遇昭宗播遷鳯翔乃求致仕梁州蜀軍收降興元因徙于劍南依王先主優待甚異以青城山下别墅居之年過八十而終其忠正謙約與西門李賢為季孟也于時誅宦官唯西川不奉詔由是脫禍家有北司治亂記八巻偹載閹宦忠佞好惡嘗聞此傳偶未得見即巷伯之流未必俱邪良由南班輕忌太過以致參商葢邦國之不幸也先是路嚴相成都移渚宫所乗馬忽作人語且曰蘆荻花此花開後路無家不乆及禍然畜類之語豈有物憑之乎石言於晉殆類此也狗生角雞生角漢文帝後元五年六月齊雍城門外有狗生角京房易傳曰執政失下將害之君子茍免小人陷之厥妖狗生角晉安帝四年有雞生角角尋墮落豕生兩頭豕生四足豕生八足牛生六足晉書永嘉中夀春城内有豕生兩頭而不活周馥取而觀之時識者云豕北方畜胡狄象兩頭者無上也生而死不遂也又建武元年有豕生八足舊唐書京師人家豕生兩首四足有司欲奏竇參曰此為豕禍安可上聞命棄之又時郊牛生犢有六足者太僕卿周皓白宰相請奏李泌戲荅以遣之魯定時鼷䑕食郊牛魯哀初鼷䑕食郊牛春秋定公十五年正月鼷䑕食郊牛牛死又哀公元年正月鼷䑕食郊牛按京房易傳曰子不子䑕食其郊牛又成公七年正月鼷䑕食郊牛角京房易傳曰祭天不慎厥妖鼷䑕齧郊牛角䑕舞䑕巢漢書五行志昭帝元鳯元年九月燕有黄䑕銜其尾舞王宫端門中王徃視之䑕舞如故王使吏以酒脯祠䑕舞不休一日一夜死按京房易傳曰誅不原情厥妖䑕舞門又成帝建始四年九月長安城南有䑕銜黄蒿栢葉上民冢栢及榆樹上為巢桐栢為多巢中無子皆有乾䑕矢數十按京房易傳曰臣私禄罔辟厥妖䑕巢兩足獸四角獸晉書武帝太康六年南陽獻兩足猛獸此毛蟲之孽也又太康七年十一月丙辰四角獸見於河間輅軨中雌鷄化為雄府史家雌鷄化為雄漢書五行志宣帝黄龍元年未央殿輅軨中雌鷄化為雄毛衣變化而不鳴不將無距顔師古注云將謂率領其羣也又元帝初元中丞相府史家雌鷄伏子漸化為雄冠距鳴將雀生烏雀生􅞖燕生鷹燕生爵法苑珠林帝辛之時有雀生烏在城之隅太史占曰以小生大國家必昌帝辛驕暴不脩善政殷國遂亡晉五行志黃初元年未央宫中有燕生鷹口爪俱赤此與商紂宋隱同象國策宋康王之時有雀生􅞖於城之陬使史占之曰小而生巨必霸天下康王大喜于是滅滕伐薛取淮北之地乃愈自信欲霸之速成故射天笞地斬社稷而焚滅之曰威服天下鬼神罵國老諫臣為無顔之冠以示勇剖傴之背鍥朝渉之脛而國人大駭齊聞而伐之民散城不守王乃逃倪侯之舘遂得而死見祥而不為祥反為禍五行志成帝綏和二年三月天水平襄有燕生爵哺食至大俱飛去京房易傳曰賊臣在國厥咎燕生爵諸侯銷一曰生非其類子不嗣世白黑烏鬬蒼白鵞出漢景帝三年十一月有白頸烏與黑烏羣鬭楚國吕縣白頸不勝墮泗水中死者數千京房易傳曰逆親親厥妖白黑烏鬬于國時有吳楚之反晉孝懷帝永嘉元年二月洛陽東北步廣里地陷有蒼白二色鵞出蒼者飛翔冲天白者止焉董養曰歩廣周之狄泉盟㑹地也白者金色國之行也蒼為胡象其可盡言乎是後劉元海石勒相繼亂華内蛇與外蛇鬬鄭南門中外蛇與中蛇鬬孝文廟下左傳魯莊公時有内蛇與外蛇鬬於鄭南門中内蛇死按漢書五行志劉向以為近蛇蘖也先是鄭厲公刼相祭仲而逐兄昭公代立後厲公出奔昭公復入死弟子儀代立厲公自外刼大夫傅瑕使僇子儀此外蛇殺内蛇之象也漢書五行志武帝太始四年七月趙有蛇從郭外入與邑中蛇鬬孝文廟下邑中蛇死後二年秋有衛太子事事自趙人江充起蝗鑚土飛出蝗穿地而生載記劉聰時河東大蝗惟不食黍豆靳凖率部人收而埋之哭聲聞十餘里後乃鑚土飛出復食黍豆又石勒時河朔大蝗初穿地而生二旬則化狀若􅅙七八日而卧四日蝗而飛彌亘百草唯不食三豆及麻魚見武庫上雉雊武庫中魏志嘉平四年夏五月魚二見於武庫屋上此魚孽也王肅曰魚生于淵而亢于屋介鱗之物失其所也邊將其殆有棄甲之變乎晉書武庫封閉甚宻其中忽有雉雊張華曰此必蛇化為雉也開視雉側果有蛇蛻魏嘉平中二魚集武庫屋上見上晉太康中二鯉集武庫屋上晉書武帝太康中有鯉魚二見武庫屋上干寳以為武庫兵府魚有鱗甲亦兵類也京房易傳曰魚去水飛入道路兵且作炊飯化螺炊黍變血晉書石崇家稻米飯在地經宿皆化為螺時人以為族滅之應又衛瓘家人炊飯墮地盡化為螺嵗餘及禍又裴楷家炊黍在甑或變為拳或作血或作蕪菁子其年卒􅅙蛾喫人飛螽螫人靈徴志魏主芳正始二年三月徐州􅅙蛾喫人尫殘者一百一十餘人死者二十二人梁武帝紀太清二年九月益州市有飛螽萬羣螫人死燕尾謡黄爵謡五行志成帝時童謡曰燕燕尾涏涏張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢其後帝為㣲行出遊常與富平侯張放俱稱富平侯家人過河陽主作樂見舞者趙飛燕而幸之故曰燕燕尾涏涏美好貎也張公子謂富平侯也木門倉琅根謂宫門銅鍰言將尊貴也後遂立為皇后弟昭儀賊害後宫皇子卒皆伏辜所謂燕飛來啄皇孫皇孫死燕啄矢者也又成帝時謌謡曰邪徑敗良田讒口亂善人桂樹華不實黄爵巢其顛故為人所羨今為人所憐桂赤色漢家象華不實無繼嗣也王莽自謂黄象黄爵巢其顛也駢志巻十二
