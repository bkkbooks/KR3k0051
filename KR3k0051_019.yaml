body:
  text: 駢志卷十九眀陳禹謨撰癸部上王肅三反郄公三反魏志劉實以王肅方于事上而好下佞已此一反也性嗜榮貴而不求茍合此二反也吝惜財物而治身不穢此三反也世說郗公體中有三反方于事上好下佞已一反治身清貞大脩計校二反自好讀書憎人學問三反又唐李嶠三戾性好榮遷憎人升進性好文章憎人才筆性好貪濁憎人受財三良為政鄭未可間三良為殉秦不東征左傳鄭伯使太子華聴命于會言于齊侯曰洩氏孔氏子人氏三族實違君命若君去之以為成我以鄭為内臣君亦無所不利焉齊侯将許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉又秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎詩曰人之云亡邦國殄瘁無善人之謂若之何奪之古之王者知命之不長是以並建聖哲樹之風聲分之采物著之話言為之律度陳之藝極引之表儀予之法制告之訓典教之防利委之常秩道之以禮則使毋失其土宜衆𨽻賴之而後即命聖王同之今縱無法以遺後嗣而又収其良以死難以在上矣君子是以知秦之不復東征也晏子授纓而乘去莊公之難蒯芮驅車而入死莊公之難韓詩外傳崔杼弑莊公合士大夫盟盟者皆脫劍而入言不疾指血至者死所殺者十餘人次及晏子奉杯血仰天而嘆曰惡乎崔杼將為無道而殺其君于是盟者皆視足崔杼謂晏子曰子與我吾將與子分國子不與我殺子直兵將推之曲兵將鈎之吾願子之圖之也晏子曰吾聞畱以利而倍其君非仁也刼以刃而失其志者非勇也詩曰莫莫葛藟延于條枚愷悌君子求福不回嬰其可回矣直兵推之曲兵鈎之嬰不之革也崔杼曰舍晏子晏子起而出授纓而乘其僕馳晏子撫其手曰麋鹿在山林其命在庖厨命有所懸安在疾驅安行成節然後去之又齊崔杼弑莊公荆蒯芮使晉而反其僕曰君之無道也四隣諸侯莫不聞也以夫子而死之不亦難乎荆蒯芮曰善哉而言也早言我能諌諌而不用我能去今既不諌又不去吾聞之食其食死其事吾既食亂君之食又安得治君而死之遂驅車而入死其事僕曰人有亂君猶必死之我有治長可無死乎乃結轡自刎于車上君子聞之曰荆蒯芮可謂守節死義矣僕夫則無為死也猶飲食而遇毒也詩曰夙夜匪懈以事一人荆先生之謂也晏子能知越石父晏子不知北郭騷史記越石父賢在縲紲中晏子出遭之塗解左驂贖之載歸弗謝入閨久之越石父請絶晏子戄然攝衣冠謝曰嬰雖不仁免子于厄何子求絶之速也石父曰不然吾聞君子詘于不知己而信于知己者方吾在縲紲中彼不知我也夫子既以感寤而贖我是知己知己而無禮固不如在縲紲之中晏子于是延入為上客呂覽齊有北郭騷者結罘罔梱蒲葦織屨履以養其母猶不足踵門見晏子曰願乞所以養母晏子之僕謂晏子曰此齊國之賢者也其義不臣乎天子不友乎諸侯於利不茍取於害不茍免今乞所以養母是說夫子之義也必與之晏子使人分倉粟分府金而遺之辭金而受粟有間晏子見疑於齊君出奔過北郭騷之門而辭北郭騷沐浴而出見晏子曰夫子將焉適晏子曰見疑於齊君將出奔北郭子曰夫子勉之矣晏子上車太息而歎曰嬰之亡豈不宜哉亦不知士甚矣晏子行北郭子召其友而告之曰說晏子之義而常乞所以養母焉吾聞之曰養及親者身伉其難伉當今晏子見疑吾將以身死白之著衣冠令其友操劍奉笥而從造于君庭求復者曰晏子天下之賢者也去則齊國必侵矣必見國之侵也不若先死請以頭託白晏子也因謂其友曰盛吾頭於笥中奉以託退而自刎也其友因奉以託其友謂規者曰北郭子為國故死吾將為北郭子死也又退而自刎齊君聞之大駭乘驛而自追晏子及之國郊請而反之晏子不得已而反聞北郭騷之以死白已也曰晏嬰之亡豈不宜哉亦愈不知士甚矣寗戚南山白石歌楊惲南山種豆歌淮南子寗戚欲干齊桓公困窮無以自逹于是為商旅將任車以商於齊暮宿於郭門外桓公郊迎客夜開門辟任車爝火甚衆越飰牛車下擊牛角而疾商歌桓公聞之曰異哉非常人也命後車載之因授以政其歌曰南山矸白石爛生不逢堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦漢書楊惲報孫會宗書其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時評曰南山之歌一也寗戚以致齊桓之異楊惲以取漢宣之誅士之遭際亦何常哉詎可謂戚工而笑惲拙也有功見疑有罪見信韓非子樂羊為魏將而攻中山其子在中山中山之君烹其子而遺之羮樂羊坐於幕下而啜之盡一杯文侯謂堵師贊曰樂羊以我故而食其子之肉答曰其子而食之且誰不食樂羊罷中山文侯賞其功而疑其心又孟孫獵得麑使秦西巴載之持歸其母隨之而啼秦西巴弗忍而與之孟孫歸至而求麑答曰余弗忍而與其母孟孫大怒逐之居三月復召以為其子傅其御曰曩將罪之今召以為子傅何也孟孫曰夫不忍麑又且忍吾子乎故曰巧詐不如拙誠樂羊以有功見疑秦西巴以有罪益信呂範以忠誠見信周谷以能欺不用吳志孫策使呂範典主財計孫權時年少私從有求範必關白不敢專許當時以此見望權守陽羡長有所私用䇿或料覆功曹周谷輙為傅著簿書使無譴問權臨時悅之及後統事以範志誠厚見信任以谷能欺更簿書不用也評曰楚䇿有之人有挑其隣室者長者詈之少者許之後竟取長者或曰夫非詈汝者邪曰在人欲其許我在我欲其詈人也此足喻仲謀愛憎之變矣昔漢高賞季布之罪誅丁固之功亦以此乎灌𤓰合梁楚之交争桑搆吳楚之戰賈太傅新書昔梁大夫宋就為邉縣令與楚隣界梁亭楚亭皆種𤓰梁亭劬力數灌其𤓰𤓰美楚亭田窳而稀灌其𤓰𤓰惡楚令以梁𤓰之美怒其𤓰之惡因夜徃竊搔梁𤓰皆有死焦者矣梁亭覺之因請其尉亦欲竊徃報搔𤓰宋就曰是搆怨召禍之道也令人竊為楚亭夜灌其𤓰令勿知也楚旦而徃𤓰則已灌𤓰日以美楚亭怪而察之則梁亭之為也楚令大悅因以聞楚王楚王曰此梁之隂讓也乃謝以幣而請交於梁王吕氏春秋楚之邊邑曰卑梁其處女與吳之邊邑處女桑於境上戲而傷卑梁之處女卑梁人操其傷子以讓吳人吳人應之不恭怒殺而去之吳人徃報之盡屠其家卑梁公怒曰吳人焉敢攻吾邑舉兵反攻之老弱盡殺之矣吳王夷昧聞之怒使人舉兵侵楚之邊邑克夷而後去之吳楚以此大格實為鷄父之戰毛義奉檄動顔趙曄奉檄心耻東觀記毛義性恭儉謙約少時家貧以孝行稱南陽張奉慕其名往候之坐有頃府檄到當以義為守令義奉檄持入白母喜動顔色謝承後漢書趙曄少嘗為縣吏奉檄送督郵心耻於厮役遂棄車馬去到犍為資中詣杜撫受韓詩究竟其術道經九折阪敕入鳯莊門漢書王陽為益州刺史至卭僰九折阪歎曰奉先人遺體奈何數乘此險後以病去及王尊為刺史至其阪問吏曰此非王陽所畏道邪尊叱其馭曰驅之王陽為孝子王尊為忠臣南史宋眀帝敕謝莊子朏謝鳯子超宗從鳯莊門入二人俱至超宗曰君命不可以不徃乃趨而入朏曰君處臣以禮進退不入時人兩稱之以比王陽王尊婁敬不敢易衣叔孫乃變其服漢書婁敬戍隴西過雒陽高帝在焉敬脫輓輅見齊人虞將軍曰臣願見上言便宜虞將軍欲與解衣敬曰臣衣帛衣帛見衣褐衣褐見不敢易衣又漢王從五諸侯入彭城叔孫通降漢王通儒服漢王憎之乃變其服短衣楚製漢王喜思堇哭澤便生思堇惜錢不買晉書劉殷曾祖母盛冬思堇而不言食不飽者一旬矣殷怪而問之王言其故殷時年九嵗乃于澤中慟哭曰殷罪釁深重幼丁艱罰王母在堂無旬日之養殷為人子而所思無獲皇天后土願垂哀愍聲不絶者半日於是忽若有人云止止聲殷收淚視地便有堇生焉因得斛餘而歸食而不减至時堇生乃盡北史崔和位平昌太守家巨富而性吝埋錢數百斛其母李春思堇惜錢不買後其子軌盜錢百萬背和亡走庾彦達分秩奉姊朱脩之未曽贍姊南史庾彦達為益州刺史攜姊之鎭資給供奉中分秩祿西土稱焉又朱脩之儉刻無潤貴為刺史未曽供贍其姊徃姊家姊為設菜羮粗飯以激之脩之曰此是貧家好食進之致飽不欲婿為張掖守特乞婿為徐州長漢書張禹為成帝所敬厚帝嘗親拜禹牀下禹頓首謝恩歸誠言老臣有四男一女愛女甚於男逺嫁為張掖太守蕭咸妻不勝父子私情思于相近上即時徙咸為𢎞農太守北史崔光曽啟其女壻彭城劉敬徽云敬徽為荆州五隴戍主隨夫行常慮冦抄南北分張乞為徐州長兼别駕暫集京師眀帝許之所居塵埃滿積輙令拭席洗床南史周捨性儉素衣服器用居處牀席如布衣之貧者每入官府雖廣厦華堂閨閤重邃捨居之則塵埃滿積以荻為障壊亦不修又庾仲文性好潔士大夫造之者未出户輙令人拭席洗牀時陳郡殷冲亦好净小吏非淨浴新衣不得近左右士大夫小不整潔每容接之仲文好潔反是每以此見譏虞翻骨體不媚魏徴舉動嫵媚虞翻别傳曰翻放棄南方云自恨疏節骨體不媚犯上獲罪當長沒海隅生無可與語死以青蠅為弔客使天下一人知己者足以不恨舊唐書太宗宴於丹霄樓酒酣太宗謂長孫無忌曰魏徴王珪昔在東宮盡心所事當時誠亦可惡我能拔擢用之以至今日足為無愧古人然徴每諌我不從發言輙即不應何也對曰臣以事有不可所以陳論若不從輙應便恐此事即行帝曰但當時且應更别陳論豈不得耶徴曰昔舜誠羣臣爾無面從退有後言若臣面從陛下方始諌此即退有後言豈是稷契事堯舜之意耶帝大笑曰人言魏徴舉動疎慢我但覺嫵媚適為此耳徴拜謝曰陛下導之使言臣所以敢諌若陛下不受臣諌豈敢數犯龍鱗鯀入羽淵鯀伏羽山史記舜登用攝行天子之政巡狩行視鯀之治水無狀乃殛鯀于羽山以死正義曰鯀之羽山化為黄能入于羽淵能音乃來反下三㸃為三足也連山易曰有崇伯鯀伏于羽山之野又山海經曰洪水滔天鯀竊帝之息壤以堙水不待帝命帝令祝融殺鯀羽郊湯時有榖生于庭太戊桑榖生于朝吕覽成湯之時有榖生于庭昏而生比旦其大拱吏請卜其故湯退卜者曰吾聞祥者福之先者也見祥而為不善則福不至妖者禍之先者也見妖而為善則禍不至於是早朝晏退問疾弔䘮務鎮撫百姓三日而榖止故禍兮福之所倚福兮禍之所伏聖人所獨見衆人焉知其極殷本紀帝太戊立伊陟為相亳有祥桑榖共生于朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝徳帝之政其有闕與帝其修徳太戊從之而祥桑枯死按高誘注書叙云伊陟相太戊亳有祥桑榖共生於朝太戊太甲之孫太康之子也號為中宗滿兩手曰拱湯生仲丁仲丁生太甲太甲生太康太康生太戊凡五君矣此云湯之時不亦繆乎由此觀之曝咸陽市門無敢增損一字者明畏不韋之勢耳故揚子雲恨不及其時車載其金而歸也齊桓公讀書于堂上楚成王讀書于殿上莊子桓公讀書于堂上輪扁斲輪于堂下釋椎鑿而上問桓公曰敢問公之所讀者為何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟粕已矣桓公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰臣也以臣之事觀之斲輪徐則甘而不固疾則苦而不入不徐不疾得之于手而應于心口不能言有數存焉于其間臣不能以喻臣之子臣之子亦不能受之于臣是以行年七十而老斲輪古之人與其不可傳也死矣然則君之所讀者古人之糟粕已夫韓詩外傳楚成王讀書于殿上而輪扁在下作而問曰未審主君所讀何書也成王曰先聖之書輪扁曰此真先聖王之糟粕耳非美者也成王曰子何以言之輪扁曰以臣輪言之夫以規為圓矩為方此其可付乎子孫者也若夫合三木而為一應乎心動乎體其不可得而傳者也以為所傳真糟粕耳故唐虞之法可得而改也其喻人心不可及矣抱罋出井負缶入井莊子云子貢過漢隂見一丈人方將為圃畦鑿隧而入井抱罋而出灌子貢曰有械于此後重前輕汲水若抽名曰桔橰日浸百畦用力寡而見功多子不欲乎說苑衛有五丈夫俱負缶入井出而灌韭終日竟一區鄧析過下車教之曰為機重其後輕其前命曰桔橰終日溉韭百區不倦夏后入民室適乳斧傷之子舒公詣主人適生斧傷之男呂覽夏后氏孔甲田于東陽萯山天大風晦盲暝也孔甲迷惑入于民室主人方乳或曰后來見良日也之子是必大吉或曰不勝也之子是必有殃后乃取其子以歸曰以為余子誰敢殃之子長成人幕動折橑斧斫斬其足遂為守門者孔甲曰嗚呼有疾命矣夫乃作為破斧之歌晉書魏舒嘗詣野主人妻夜産俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問寢者為誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑為斧傷而死師曠鼓琴而平公瘙病雍門鼓琴而孟嘗歔欷韓子平公問師曠曰清商固最悲乎師曠曰不如清徴公曰清徴可得而聞乎師曠曰不可古之聽清徴者皆有徳義之君也今吾君徳薄不足以聽平公曰寡人之所好者音也願試聽之師曠不得已援琴一鼓一奏之有𤣥鶴二八道南方來集于郎門之垝再奏之而列三奏之延頸而鳴舒翼而舞音中宫商之聲聲聞于天平公大悅坐者皆喜平公提觴而起為師曠壽反而問曰音莫悲于清徴乎師曠曰不如清角平公曰清角可得而聞乎師曠曰不可昔者黄帝合鬼神于泰山之上駕象車而六蛟龍畢方並轄蚩尤居前風伯進掃雨師灑道虎狼在前鬼神在後螣蛇伏地鳯皇覆上大合鬼神作為清角今主君徳薄不足聽之聽之將恐有敗平公曰寡人老矣所好者音也願遂聽之師曠不得已而鼓之一奏而有𤣥雲從西北方起再奏之大風至大雨隨之裂帷幕破俎豆隳廊瓦坐者散走平公恐懼伏于廊室之間晉國大旱赤地三年平公之身遂瘙病桓譚新論雍門周以琴見孟嘗君曰先生鼓琴亦能令文悲乎對曰臣之所能令悲者先貴而後賤昔富而今貧擯壓窮巷不交四隣不若身材高妙懐質抱真逢䜛罹謗怨結而不得信不若交歡而結愛無怨而生離逺赴絶國無相見期不若幼無父母壯無妻兒出以野澤為隣入用堀穴為家困于朝夕無所假貸若此人者但聞飛烏之號秋風鳴條則傷心矣臣一為之援琴而長太息未有不悽惻而涕泣者也今若足下居則廣厦高堂連闥洞房下羅帷來清風倡優在前謟䛕侍側揚激楚舞鄭妾流聲以娛耳練色以滛目水戯則舫龍舟建羽旗鼓釣乎不測之淵野游則登平原馳廣囿强弩下高鳥勇士格猛獸置酒娛樂沈醉忘歸方此之時視天地曾不若一指雖有善鼓琴未能動足下也孟嘗君曰固然雍門周曰然臣竊為足下有所常悲夫角帝而困秦者君也連五國而伐楚者又君也天下未嘗無事不從即衡從成則楚王衡成則秦帝夫以秦楚之强而報弱薛猶磨蕭斧而伐朝菌也有識之士莫不為足下寒心天道不常盛寒暑更進退千秋萬歳之後宗廟必不血食高臺既已傾曲池又已平墳墓生荆棘狐狸穴其中游兒牧竪躑躅其足而歌其上曰孟嘗君之尊貴亦猶若是乎于是孟嘗君喟然太息涕淚承睫而未下雍門周引琴而鼓之徐動宫徵叩角羽終而成曲孟嘗君遂歔欷而就之曰先生鼓琴令文立若亡國之人也臣亦愛臣之信臣難破臣之國韓非子齊伐魯索讒鼎魯以其贋徃齊人曰贋也魯人曰眞也齊曰使樂正子春來吾將聽子魯君請樂正子春樂正子春曰胡不以其眞徃也君曰我愛之答曰臣亦愛臣之信吕氏春秋齊攻魯求岑鼎魯君載他鼎以徃齊侯弗信而反之為非使人告魯侯曰栁下季以為是請因受之魯君請于柳下季柳下季答曰君之賂以欲岑鼎也以免國也臣亦有國于此破臣之國以免君之國此臣之所難也于是魯君乃以眞岑鼎徃也貳負之臣相顧之尸山海經貳負之臣曰危危與貳負殺窫窳帝乃梏之疏屬之山桎其右足反縛兩手與髮繫之山上木在開題西北按郭氏傳漢宣帝使人上郡發盤石石室中得一人徒裸被髮反縛械一足以問羣臣莫能知劉子政按此言對之宣帝大驚于是時人爭學山海經矣論者多以為是其尸象非真體也意者以靈怪變化論難以理測物禀異氣出于不然不可以常理推不可以近數揆矣又郭氏序云東方生曉畢方之名劉子政辨盜械之尸王頎訪兩面之客海民獲長臂之衣精驗濳效絶代懸符於戲羣惑者其可以少寤乎又劉秀云山海經者出于唐虞之際昔洪水洋溢禹盖與伯翳主驅禽獸命山川類草木别水土四嶽佐之以周四方逮人跡之所希至及舟輿之所罕到内别五方之山外分八方之海紀其珍寳竒物異方之所生水土草木禽獸昆䖝麟鳯之所止禎祥之所隠及四海之外絶域之國殊類之人禹别九州任土作貢而益等類物善惡著山海經皆賢聖之遺事古文之著眀者也孝武皇帝嘗有獻異鳥者食之百物皆不肯食東方朔見之言其鳥名又言其所當食如朔言問朔何以知之即山海經所出也孝宣皇帝時擊磻石于上郡䧟得石室其中有反縛盜械人時臣秀父向為諫議大夫言此貳負之臣也詔問何以知之亦以山海經對其文曰貳負殺窫窳帝乃梏之疏屬之山上大驚朝士由是多竒山海經者山海經北海之内有反縛盜械帶戈常倍之佐名曰相顧之尸鷄口牛後鷄尸牛從史記蘇秦說韓宣衛王曰寧為鷄口無為牛後今西面交臂而臣事秦何異于牛後乎夫以大王之賢挾疆韓之兵而有牛後之名臣竊為大王羞之延篤戰國䇿音義曰尸鷄中之主從牛子然則口當為尸後當為從俗寫誤也又史記索隠曰言寧為鷄中之主不為牛子之從後也不信蝦鬚長一丈不信蝦鬚長一赤王隠交廣記吳後復置廣州以南陽滕脩為刺史或語修蝦鬚長一丈修不信其人後故至東海取蝦鬚長四丈四尺封以示修修乃服之廣州記吳平晉勝循為刺史循鄕人語循蝦鬚長一赤循以為虛責其人乃至東海取蝦鬚長四赤速送示循循始復謝厚為遣評曰二記畧同勝循盖滕修之譌也禇淵謂劉祥寒士不遜張綰謂杜杲寒士不遜南史劉祥字顯徴為齊建元中正員郎司徒禇彦回入朝以腰扇障日祥從側過曰作如此舉止羞面見人扇障何益彦回曰寒士不遜祥曰不能殺袁劉安得免寒士又司徒禇彦回因逆湘州刺史王僧䖍閣道壊墜水謝超宗先在僧䖍舫抗聲曰有天道焉天所不容地所不受投畀河伯河伯不受彦回大怒曰寒士不遜超宗曰不能賣袁劉得富貴焉免寒士按劉謝之嘲禇當矣不應一辭乃爾豈史家㸃綴筆端偶後先錯出乎北史張綰嘗于新渝侯宅因酒後詬京兆杜杲曰寒士不遜劉璠厲色曰此座誰非寒士賦詩得僧推月下門句衝大尹昌黎賦詩得落葉滿長安句突大尹栖楚唐詩紀事賈島赴舉至京騎驢賦詩得僧推月下門之句欲改推作敲引手作推敲之勢未决不覺衝大尹韓愈乃具言愈曰敲字佳矣遂並轡論詩久之或云吟落葉滿長安之句唐突大尹劉栖楚被繫一夕放之按島初為浮屠名無本來東都時洛陽令禁僧午後不得出島為詩自傷愈憐之因教其為文遂去浮屠舉進士當其苦吟雖逢值公卿貴人皆不之覺也一日見京兆尹跨驢不避謼詰之久乃得釋王弼言有無裴頠言有無魏志注王弼幼而察惠年十餘好老氏通辨能言父業為尚書郎時裴徽為吏部郎弼未弱冠往造焉徽一見而異之問弼曰夫無者誠萬物之所資也然聖人莫肯致言而老子申之無已者何弼曰聖人體無無又不可以訓故不說也老子是有者也故恒言無所不足尋亦為傅嘏所知于是何晏為吏部尚書甚竒弼嘆之曰仲尼稱後生可畏若斯人者可與言天人之際乎晉書裴頠深患時俗放蕩不尊儒術何晏阮籍素有高名于世口談浮虛不遵禮法尸禄躭寵仕不事事至王衍之徒聲譽太盛位高勢重不以物務自嬰遂相放效風教陵遲乃著崇有論以釋其蔽其略曰夫有講言之具者深列有形之故盛稱空無之美形器之故有徴空無之義難檢辨巧之文可悅似象之言足惑衆聽眩焉溺其成說雖頗有異此心者辭不獲濟屈于所狎因謂虛無之理誠不可葢唱而有和多往弗反遂薄綜世之務賤功烈之用髙浮游之業埤經實之賢人情所殉篤夫名利于是文者衍其辭訥者讚其㫖染其衆也是以立言藉其虛無謂之𤣥妙處官不親所司謂之雅逺奉身散其亷操謂之曠達故砥礪之風彌以陵遲放者因斯或悖吉㓙之禮而忽容止之表瀆棄長幼之序混漫貴賤之級其甚者至于裸裎言笑忘宜以不惜為𢎞士行又虧矣夫欲收重泉之鱗非偃息之所能獲也隕高墉之禽非靜拱之所能捷也審投弦餌之用非無知之所能覽也由此而觀濟有者皆有也虛無奚益于已有之羣生哉位不期驕禄不期侈貧不學儉卑不學恭尚書周官篇云位不期驕禄不期侈註貴不與驕期而驕自至禄不與侈期而侈自至魚豢曰諺言貧不學儉卑不學恭非人性分也勢使然耳不稼不穡不狩不獵不績不經不稼不穡魏風不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有縣貆兮山海經巫臷民朌姓不績不經服也不稼不穡食也維秬維秠維穈維芑膏菽膏稻膏黍膏稷大雅誕后稷之穡有相之道茀厥豐草種之黄茂實方實苞實種實褎實發實秀實堅實好實穎實栗即有邰家室誕降嘉種維秬維秠維穈維芑恒之秬秠是穫是畆恒之穈芑是任是負以歸肇祀山海經黒水之間有都廣之野后稷葬焉爰有膏菽膏稻膏黍膏稷百榖自生鸞鳥自歌鳯鳥自儛靈壽實華草木所聚爰有百獸相羣爰處此草也冬夏不死評曰后稷之生也誕降嘉種其没也墓生百榖可謂與樹藝相終始矣盖帝命率育良非偶也賢大夫也而難為上賢大夫也而難為下良大夫也其侈偪上良大夫也其儉偪下禮記孔子曰管仲鏤簋而朱紘旅樹而反玷山節而藻梲賢大夫也而難為上也晏平仲祀其先人豚肩不揜豆賢大夫也而難為下也君子上不僭上下不偪下韓非子管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣卑桓公使立于高國之上曰臣尊矣然而臣疎乃立為仲父孔子聞而非之曰泰侈偪上一曰管仲父出朱盖青衣置鼓而歸庭有陳鼎家有三歸孔子曰良大夫也其侈偪上孫叔敖相楚棧車􅀈馬糲餅菜羮枯魚之膳冬羔裘夏葛衣面有饑色則良大夫也其儉偪下赤子終日號而不嗄兒子終日嘷而不嗄老子合徳之厚比于赤子毒蟲不螫猛獸不據攖鳥不摶骨弱筋柔而握固未知牝牡之合而䘒作精之至也終日號而不嗄和之至也莊子兒子終日嘷而嗌不嗄和之至也終日握而手不掜共其徳也終日視而目不瞚偏不在外也行不知所之居不知所為與物委蛇而同其波是衛生之經已天子穆穆諸侯皇皇未聞人君自起撞郎天子穆穆諸侯皇皇安有天子而為酗也後漢書鍾離意傳帝常以事怒郎藥崧以杖撞之崧走入牀下帝怒甚疾言曰郎出郎出崧曰天子穆穆諸侯皇皇禾聞人君自起撞郎帝赦之載記李雄嘗醉酒而推中書命杖大官令丞相楊褎進曰天子穆穆諸侯皇皇安有天子而為酗也雄即捨之聖人忘情最下不及情至人忘情黎人不事情晉書王衍嘗䘮幼子山簡弔之衍悲不自勝簡曰孩抱中物何至于此衍曰聖人忘情最下不及于情然則情之所鍾正在我輩簡服其言更為之慟亢倉子曰吾聞至人忘情黎人不事情存情之曹務其教訓而尊信義以黄金摳者惛以黄金殶者殆以黄金注者殙列子以瓦摳者巧以鉤摳者憚以黄金摳者惛摳探也曰侯反莊子以瓦注者巧以鉤注者憚以黄金注者殙呂氏春秋以瓦殶者翔以鉤殶者戰以黄金殶者殆惼心者不怒虛舟忮心者不怨飄瓦莊子方舟而濟于河有虛船來觸舟雖有惼心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞于是三呼邪則必以惡聲隨之向也不怒而今也怒向也虛而今也實人能虛已以㳺世其孰能害之又云復讐者不折鏌干雖有忮心者不怨飄瓦是以天下平均故無攻戰之亂無殺戮之刑者由此道也不開人之天而開天之天開天者徳生開人者賊生不厭其天不忽于人民幾乎以其眞皮為之災皮自為罪莊子市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道修先君之業吾敬鬼尊賢親而行之無須臾離居然不免于患吾是以憂市南子曰君之除患之術淺矣夫豐狐文豹棲于山林伏于巖穴静也夜行晝居戒也雖饑渇隱約猶且胥疎于江河之上而求食焉定也然且不免于網羅機辟之患是何罪之有哉其皮為之災也今魯國獨非君之皮邪韓非子翟人有獻豐狐𤣥豹之皮于晉文公文公受客皮而嘆曰此以皮之美自為罪桂可食故伐漆可用故割薰以香自燒膏以明自銷莊子楚狂接輿曰山木自冦也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也漢書初龔勝卒有父老來弔哭甚哀既而曰嗟虖薰以香自燒膏以明自銷龔生竟天天年非吾徒也遂趨而出莫知其誰魯人善織屨而徙于越宋人資章甫而適諸越韓非子魯人身善織屨妻善織縞而欲徙于越或謂之曰子必窮矣魯人曰何也曰屨為履之也而越人跣行縞為冠之也而越人被髪以子之所長逰于不用之國欲使無窮其可得乎莊子云宋人資章甫而適諸越越人斷髮文身無所用之峭法者使跖不掇善治者使跖可信韓非子父母之愛鄕人之行師長之智三美加焉而終不動其脛毛不改州部之吏操官兵推公法而求索姦人然後恐懼變其節易其行矣故父母之愛不足以教子必待州部之嚴刑者民固驕于愛聽于威矣故十仞之城樓季弗能踰者峭也千仞之山跛牂易牧者夷也故明王峭其法而嚴其刑也布帛尋常庸人不釋鑠金百鎰盜跖不掇不必害則不釋尋常必害則手不掇百鎰故明主必其誅也是以賞莫如厚而信使民利之罰莫如重而必使民畏之法莫如一而固使民知之故主施賞不遷行誅無赦譽輔其賞毁隨其罰則賢不肖俱盡其力矣又申鑒大冶之爐可使無剛踊水之機可使無降善立教者若兹則終身治矣故凡器可使與顔冉同趨投百金于前白刅加其身雖巨跖弗敢掇也善立法者若兹則終身不掇矣故跖可使與伯夷同功語曰盜跖不能盜田尺寸寸不可盜况尺乎夫事驗必若土田之張于野也則為私者寡矣商子國皆有法而無使法必行之法國皆有禁姦邪刑盜賊之法而無使姦邪盜賊必得之法為姦邪盜賊者死刑而姦邪盜賊不止者不必得必得而尚有姦邪盜賊者刑輕也刑輕者不得誅也必得者刑者衆也故善治者使跖可忠信而况伯夷乎不能治者使伯夷可疑而况跖乎勢不能為姦雖跖可信也勢得為姦雖伯夷可疑也又曰今夫飛蓬遇飄風而行千里乘風之勢也探淵者知千仞之深繩之數也故託其勢者雖逺必至守其數者雖深必得今夫幽夜山陵之大而離婁不見清明日䵎則上别飛鳥下察秋毫故目之見也託日之勢也夫置丞立監者且以禁人之為利也而丞監亦欲為利則何以相禁故恃丞監而治者僅存之治也通數者不然别其勢難其道故曰其勢雖匿者雖跖不為非焉難鬻楯矛者難相良劔者韓非子楚人有鬻楯與矛者譽之曰吾楯之堅莫能陷也又譽其矛曰吾矛之利于物無不陷也或曰以子之矛陷子之楯何如其人弗能應也夫不可陷之楯與無不陷之矛不可同世而立吕覽相劍者曰白所以為堅也黄所以為牣也黄白雜則堅且牣良劍也難者曰白所以為不牣也黄所以為不堅也黄白雜則不堅且不牣也又柔則錈堅則折劍折且錈焉得為利劍劍之情未革而或以為良或以為惡說使之也磐石千里不可謂富象人百萬不可謂强磐石千里不為有地愚民百萬不為有民韓非子夫有功者必賞則爵禄厚而愈勸遷官襲級則官職大而愈治夫爵禄大而官職治王之道也磐石千里不可謂富象人百萬不可謂强石非不大數非不衆也而不可謂富强者磐石不生粟象人不可使距敵也韓詩外傳今有堅甲利兵不足以施敵破虜弓良矢調不足射逺中微與無兵等爾有民不足强甲嚴敵與無民等爾故磐石千里不為有地愚民百萬不為有民思之不得鬼神教之精而熟之鬼將告之管子云思之不得鬼神教之非鬼神之力也其精氣之極也吕覽精而熟之鬼將告之非鬼告之也精而熟之也高誘注史曰日將所學致兼鬼神故曰有鬼告之也利出一空其國無敵利出一孔則國多物商子利出一空者其國無敵利出二空者國半利用出十空其國不守又利出一孔則國多物出十孔則國少物守一者治守十者亂又管子曰利出于一孔者其國無敵出二孔者其兵不詘出三孔者不可以舉兵出四孔者其國必亡先王知其然故塞民之養隘其利途以貍致鼠以氷致蠅以鞭狎狗以弧怵鳥吕氏春秋以貍致鼠以氷致蠅雖工不能賈子欲以刑罰慈民辟其猶以鞭狎狗也雖久弗親也欲以簡泄得士辟其猶以弧怵鳥也雖久弗得也狐裘而羔袖羊質而虎皮鳯鳴而鷙翰左傳齊人以郲寄衛侯及其復也以郲糧歸右宰榖臣從而逃歸衛人將殺之辭曰余不說初矣余狐裘而羔袖乃赦之揚子或曰有人焉自姓孔而字仲尼入其門升其堂伏其几襲其裳則可謂仲尼乎曰其文是也其質非也敢問質曰羊質而虎皮見草而說見豺而戰忘其皮之虎也聖人虎别其文炳也君子豹别其文蔚也辨人貍别其文萃也貍變則豹豹變則虎又或問秦儀學乎鬼谷術而習乎縱横言安國者各十餘年是夫曰詐人也聖人惡諸曰孔子讀而儀秦行何如也曰甚矣鳯鳴而鷙翰也寧我薄人無人薄我寧人負我無我負人寧我負人無人負我寧我負人不人負我左傳潘黨既逐魏錡趙旃夜至于楚軍席于軍門之外使其徒入之楚子為乘廣三十乗分為左右右廣鷄鳴而駕日中而說左則受之日入而說許偃御右廣養由基為右彭名御左廣屈蕩為右乙卯王乗左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳晉人懼二子之怒楚師也使軘車逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我詩曰元戎十乗以先啓行先人也軍志曰先人有奪人之心薄之也世語曰太祖過吕伯奢伯奢出行五子皆備賓主禮太祖自以背董卓命疑其圖已手劍夜殺八人而去孫盛雜記曰太祖聞其食噐聲以為圖已遂夜殺之既而悽愴曰寧我負人無人負我遂行載記沮渠蒙遜伯父羅仇麴粥從吕光征河南光前軍大敗麴粥言于兄羅仇曰主上荒耄驕縱諸子朋黨相傾䜛人側目今軍敗將死正是智勇見猜之日可不懼乎吾兄弟素為所憚與其經死溝瀆豈若勒衆向西平出苕藋奮臂大呼凉州不足定也羅仇曰理如汝言但吾家累世忠孝為一方所歸寧人負我無我負人俄而皆為光所殺南史梁武帝舉兵至姑熟柳憕與兄惲及諸友朋于小郊候接時道路猶梗憕與諸人同憇逆旅食俱去行里餘憕曰寧我負人不人負我若復有追堪憇此客命左右燒逆旅舍以絶後追不及黄泉無相見也比及黄泉無相見也左傳鄭莊公寘姜氏于城潁而誓之曰不及黄泉無相見也既而悔之潁考叔為潁谷封人聞之有獻于公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之公曰爾有母遺繄我獨無潁考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融姜出而賦大隧之外其樂也洩洩遂為母子如初載記苻健盡衆西行起浮橋于孟津以濟遣其弟雄率步騎五千入潼關兄子菁自軹關入河東健執菁手曰事若不捷汝死河北我死河南比及黄泉無相見也髮短心長身短慮長左傳齊侯田于莒盧蒲嫳見泣且請曰余髪如此種種余奚能為公曰諾吾告二子歸而告之子尾欲復之子雅不可曰彼其髮短而心甚長其或寢處我矣北史陸俟遷懐荒大將未期諸高車莫弗訖懼俟嚴急請前鎮將郎孤太武許之徴俟至京朝見言不過週年孤身必敗高車必叛帝疑不實切責之以公歸第明年諸莫弗果殺孤以叛帝聞之大驚召俟問其故俟曰夫高車之俗上下無禮無禮之人易生陵傲收之以威則人懐怨憝怨憝既多敗亂彰矣帝歎曰卿身何短慮何長也蠭蠆有毒况國乎勇夫重閉况國乎困獸猶鬭况國相乎左傳邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄氷又曰敬之敬之天惟顯思命不易哉先王之眀徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎弗聽八月丁未公及邾師戰于井陘我師敗績邾人獲公胄縣諸魚門井陘一作登陘又晉侯使申公巫臣如吳假道于莒與渠丘公立于池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啟封疆以利社稷者何國蔑有惟然故多大國矣惟或思或縱也勇夫重閉况國乎又晉師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役晉師三曰榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭况國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損于眀晉侯使復其位祝有益也詛亦有損祝有益乎詛亦為亡左傳齊景公欲誅于祝固史嚚晏子曰今民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能禁億兆人之詛君若欲誅于祝史修徳而後可公說使有司寛政毁關去禁薄歛已責公疾愈論衡晉中行寅將亡召其太祝欲加罪焉曰子為我祀犧牲不肥澤也且齋戒不敬也使吾國亡何也祝簡對曰昔日吾先君中行宻子有車十乗不憂其薄也憂徳義之不足也今主君有革車百乗不憂義之薄也惟患車之不足也夫舩車飭則賦歛厚賦歛厚則民謗詛君茍以祝為有益于國乎詛亦將為亡矣一人祝之一國詛之一祝不勝萬詛國亡不亦宜乎祝其何罪中行子乃慙子無謂秦無人卿勿謂吳無人左傳文公十三年春晉侯使詹嘉處瑕以守桃林之塞晉人患秦之用士㑹也夏六卿相見于諸浮趙宣子曰隨㑹在秦賈季在狄難日至矣若之何中行桓子曰請復賈季能外事且由舊勲郤成子曰賈季亂且罪大不如隨㑹能賤而有恥柔而不犯其知足使也且無罪乃使魏夀餘偽以魏叛者以誘士㑹執其帑于晉使夜逸請自歸于秦秦伯許之履士㑹之足于朝秦伯師于河西魏人在東壽餘曰請東人之能與夫二三有司言者吾與之先使士㑹士㑹辭曰晉人虎狼也若背其言臣死妻子為戮無益于君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之以策曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏吳書孫權與魏和欲遣于禁還歸北虞翻諫曰禁敗數萬衆身為降虜又不能死北習軍政得禁必不如所親還之雖無所損猶為放盜不如斬以令三軍示為人臣有二心者權不聽羣臣送禁翻謂禁曰卿勿謂吳無人吾謀適不用耳禁雖為翻所惡然猶盛歎翻魏文帝常為翻設虛坐其君是惡其民何罪其賊是怨其人何罪左傳㔻鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪北史樊子鵠反以樓昭為東道大都督討之子鵠既死諸將勸昭盡捕誅其黨昭曰此州無狀横被殘賊其賊是怨其人何罪棠君尚謂其弟員曰我能死爾能報沈文叔謂弟文季曰我能死爾能報左傳費無極言於楚子曰建與伍奢將以方城之外叛其事集矣王執伍奢無極又曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂弟員曰爾適吳吾將歸死我能死爾能報爾其勉之伍尚歸奢聞員不來曰楚君大夫其旰食乎南史沈慶之遇害諸子見收文叔謂弟文季曰我能死爾能報遂自殺文季揮刀馳馬去收者不敢追遂免昇平元年沈攸之反齊高帝加文季冠軍將軍督吳興錢塘軍事初慶之死也攸之求行至是文季收攸之弟新安太守登之誅其宗族以復舊怨親黨無吹火焉君子以文季能報先恥斶前為慕勢王前為趨士趨王為好勢趨斗為好士戰國策齊宣王見顔斶曰斶前斶亦曰王前宣王不說左右曰王人君也斶人臣也王曰斶前斶亦曰王前可乎斶對曰夫斶前為慕勢王前為趨士與使斶為慕勢不如使王為趨士又先生王斗造門而欲見齊宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士于王何如使者復還報王曰先生徐之寡人請從宣王因趨而迎之于門與入新婦以至言而為主人之笑新婦以便計而貽太甚之譏國策衛人迎新婦婦上車問驂馬誰馬也御曰借之新婦謂僕曰拊驂無笞服車至門扶教送母曰滅竈將失火入室見臼曰徙之牖下妨徃來者主人笑之此三言者皆至言也然而不免為笑者蚤晩之時失也呂覽白圭新與惠子相見也惠子說之以彊白圭無以應惠子出白圭告人曰人有取新婦者婦至宜安矜煙視媚行徐行豎子操蕉火而鉅新婦曰蕉火大鉅入于門門中有歛陷新婦曰塞之將傷人之足此非不便之家氏也然而有太甚者今惠子之遇我尚新其説我有太甚者鷸蚌相持而為漁者所得犬兎俱罷而遺田父之獲戰國策趙且伐燕蘇代謂燕惠王曰今者臣來過易水蚌方出曝而鷸啄其肉蚌合而箝其喙鷸曰今日不雨眀日不雨即見蚌脯蚌亦謂鷸曰今日不出明日不出必有死鷸蚌鷸兩者不肯解漁者得而併擒之今趙且伐燕燕趙久相支以敝大衆恐强秦之為漁父也又齊欲伐魏淳于髠謂齊王曰韓子盧者天下之壯犬也東郭㕙者海内之狡兎也韓子盧逐東郭㕙環山者三騰山者五兎極于前犬疲于後犬兎俱罷各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵敝衆臣恐疆秦大楚承其後而有田父之功也履雖鮮不加于枕冠雖敝不以苴履冠雖敝必加于首履雖新必貫于足漢書賈誼治安策曰履雖鮮不加于枕冠雖敝不以苴履夫嘗已在貴寵之位天子改容而禮貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縳之係緤之輸之司冦編之徒官司冦小吏詈罵而榜笞之殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庶之所嘗寵死而死耳賤人安得如此而頓辱之哉又轅固治詩孝景時為博士與黄生爭論于上前黄生曰湯武非受命乃弑也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂桀紂之民弗為使而歸湯武湯武不得已而立非受命而何黄生曰冠雖敝必加于首履雖新必貫于足何也天下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫主有失行臣不正言匡過以尊天子反因過而誅之代立南面非弑而何固曰必若云是高皇帝代秦即天子之位非邪于是上曰食肉毋食馬肝未為不知味也言學者毋言湯武受命不為愚遂罷為之執鞭所忻慕為之騶殿所甘心太史公晏子傳贊曰雖為之執鞭所忻慕焉眀皇雜録班景倩自揚州採訪入為大理少卿郡守倪若水望其行塵曰班公是行何異登僊乎為之騶殿良所甘心自我得之自我捐之自我得之自我失之漢書灌夫既得棄市罪竇嬰愧為資使賓客請莫能解田蚡吏皆為耳目諸灌氏皆亡匿夫繫遂不得告言蚡隂事嬰銳為救夫嬰夫人諫曰灌將軍得罪丞相與太后家迕寧可救邪嬰曰侯自我得之自我捐之無所恨且終不令灌仲孺夫字獨死嬰獨生乃匿其家竊出上書南史侯景背盟圍城城陷蕭確排闥入啟時武帝方寢確曰城已陷矣帝曰猶可一戰否對曰人心不可臣向格戰不禁縋下僅得至此武帝歎曰自我得之自我失之亦復何恨幸不累子孫遂成䜿子名使䜿子成名史記孫子度魏軍行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死于此樹之下于是令齊軍善射者萬弩夾道而伏期曰暮見火舉而俱發龎㳙果夜至斫木下見白書乃鑽火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎㳙自知智窮兵敗乃自剄曰遂成䜿子之名索隠曰䜿子謂臏晉書阮籍嘗登廣武觀楚漢戰處歎曰時無英雄使䜿子成名按志林云昔先友史經臣彦輔謂余阮籍登廣武而歎豈謂沛公䜿子乎余曰非也傷時無劉項也䜿子指魏晋間人耳其後余聞潤州甘露寺有孔明孫權梁武李徳裕之遺跡余感之賦詩其畧曰四雄皆龍虎遺跡儼未刓方其盛壯時争奪肯少安廢興屬造化遷逝誰恐搏况彼妄庸子而欲事所難聊興廣武歎不得雍門彈則猶此意也今日讀李太白登古戰塲詩云沈湎呼䜿子狂言非至公乃知太白亦誤認嗣宗語與先友之意無異也嗣宗雖放蕩本有意于世以魏晉間多故故一放于酒何至以沛公為監子乎想魂乎萬里之外望祭于千里之外漢書賈捐之罷珠厓對曰孝武皇帝元狩六年太倉之粟紅腐而不可食都内之錢貫朽而不可校乃探平城之事録冒頓以來數為邊害籍兵厲馬因富民以攘服之西連諸國至于安息東過碣石以𤣥菟樂浪為郡北郤匈奴萬里更起營塞制南海以為八郡則天下斷獄萬數民賦數百造鹽鐡酒榷之利以佐用度猶不能足當此之時冦賊並起軍旅數發父戰死于前子鬭傷于後女子乘亭鄣孤兒泣于道老母寡婦飲泣巷哭遥設虛祭想魂乎萬里之外是皆廓地泰大征伐不休之故也唐書張柬之論姚州戍曰漢歴博南山涉蘭倉水更置博南哀牢二縣蜀人愁怨行者作歌曰歴博南越蘭津渡蘭倉為他人盖譏漢貪珍竒鹽布之利而使蠻夷之所馳役也漢獲其利人且怨歌今减耗國儲費用日廣而使陛下之赤子身膏野艸骸骨不歸老母幼子哀號望祭于千里之外于國家無絲毫之利任百姓受終身之酷臣竊為國家痛之豫章生七年而後知駃騠生七日而超母淮南子藜藿之生蝡蝡然日加數寸不可以為櫨棟楩柟豫章之生也七年而後知延叔堅曰豫章與枕木相似七年乃可别枕音尤文選孟康注曰駃騠駿馬也生七日而超其母孫氏瑞應圖曰駃騠者后土之獸也自能言語王者仁孝于民則出禹治水有功而來溼之至而炭已重風之至而木已動天且風而鳥已翔天且雨而魚已噞淮南子夫溼之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣又天之且風草木未動而鳥已翔矣其且雨也隂曀未集而魚已噞矣以隂陽之氣相動也故寒暑燥溼以類相從聲響疾徐以音相應也以賤治貴以醜治好微而毗著𤨏而助洪濳夫論攻玉以石治金以鹽濯錦以魚浣布以灰夫物固有以賤治貴以醜治好者矣陸士衡演連珠云鑚燧吐火以續陽谷之晷揮翮生風而繼飛亷之功是以物有微而毗著事有𤨏而助洪蛟龍得雲雨終非池中物蛟龍得雲雨非復池中物吳志劉備以左將軍領荆州牧治公安備詣京見孫權周瑜上疏曰劉備以梟雄之姿而有關羽張飛熊虎之將必非久屈為人用者愚謂大計宜徙備置吳盛為築宫室多其美女玩好以娛其耳目分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆場恐蛟龍得雲雨終非池中物也載記秦涼覆没帝疇咨將帥上黨李熹曰陛下誠能發匈奴五部之衆假劉元海一將軍之號鼓行而西可指期而定孔恂曰李公之言未盡殄患之理也熹勃然曰以匈奴之勁悍元海之曉兵奉宣聖威何不盡之有恂曰元海若能平凉州斬樹機能恐凉州方有難耳蛟龍得雲雨非復池中物也帝乃止松栢之質經霜彌茂松栢之姿經霜猶茂世說顧恱與簡文同年而髮早白簡文曰卿何以先白恱曰蒲栁之姿望秋而落松栢之質經霜彌茂顧凱之家傳松栢之姿經霜猶茂蒲柳之質望秋先零始驗疾風知勁草可謂疾風知勁草東觀漢記光武為大司馬以王霸為功曹令史從渡河北賓客隨者數十人稍稍引去上謂霸曰潁川從我者皆逝而子獨留始驗疾風知勁草南史庾登子仲遠為宋眀帝府尉廢帝景和中明帝疑防賓客故人無到門者惟仲遠朝謁不替明帝即位曰卿可謂疾風知勁草王導指周顗腹曰此中何所有周顗指顧和心曰此中何所有晉書王導甚重周顗嘗枕顗膝而指其腹曰卿此中何所有也荅曰此中空洞無物然足容卿輩數百人又周顗過顧和指和心曰此中何所有和徐應曰此中最是難測地顗入謂王導曰卿州吏中有一令僕才導亦以為然辛毗曰吾之立身自有本末蕭引曰吾之立身自有本末魏志時中書監劉放令孫資見信于主制斷時政大臣莫不交好而辛毗不與徃來毗子敞諫曰今劉孫用事衆皆應附大人宜小降意和光同塵不然必有謗言毗正色曰主上雖未稱聰眀不為闇劣吾之立身自有本末就與劉孫不平不過令吾不作三公而已何危害之有焉有大丈夫欲為公而毁其高節者邪陳書時殿内朋主吳璡及宦官李善度蔡脫兒等多所請屬蕭引一皆不許引族子宻時為黄門郎諫引曰李蔡之勢在位皆畏憚之亦宜小為身計引曰吾之立身自有本末亦安能為李蔡改行就令不平不過觧職耳吳璡竟作飛書李蔡證之坐免饑則附人飽則颺去饑則附人飽便高颺魏志陳登與曹公言待吕布如養鷹云饑則附人飽則颺去載記權翼諫苻堅許慕容垂至鄴曰垂猶鷹也饑則附人飽便高颺吾少無宦情我本無宦情晉書王衍以太尉為太傅軍司及東海王越薨衆共推為元帥衍以賊冦鋒起懼不敢當辭曰吾少無宦情隨牒推移遂至于此今日之事安可以非才處之俄而舉軍為石勒所破南史司空禇彦回謂劉善明曰高尚之事乃卿從來素意今朝廷方相委待詎得便學松喬邪善明荅曰我本無宦情既逢知己所以戮力驅馳天地廓清朝廷濟濟鄙吝既申不敢昧于富貴矣高明廣大不在于他在加之志高明光大不在于它在加之意大戴禮君子思其不復者而先施焉親戚既殁雖欲孝誰為孝年既艾雖欲弟誰為弟故孝有不及弟有不時其此之謂與言不逺身言之主也行不逺身行之本也言有主行有本謂之有聞矣君子尊其所聞則高明矣行其所聞則廣大矣高明廣大不在于他在加之志而已矣漢書董仲舒曰陛下并有天下海内莫不率服廣覽兼聽極羣下之知盡天下之美至徳昭然施于方外夜郎康居殊方萬里說徳歸誼此太平之致也然而功不加于百姓者殆王心未加焉曾子曰尊其所聞則高明矣行其所知則光大矣高明光大不在于它在乎加之意而已願陛下因用所聞設誠于内而致行之則三王何異哉按能改齋漫録云董䇿既稱髙而以明繼之矣豈可以復言光耶兼本書首尾一以聞為主知字非是雖仲舒亦稱因用所聞以結之則知字其誤尤分明曽子書不顯于世故董䇿無有知其誤者不可不辨也有先生者有後生者有不生者有先醒者有後醒者有不醒者韓詩外傳問者曰古之謂知道者曰先生何也猶言先醒也不聞道術之人則冥于得失不知亂之所由眊眊乎其猶醉也故世主有先生者有後生者有不生者昔者楚莊王謀事而居有憂色申公巫臣問曰王何為有憂也莊王曰吾聞諸侯之徳能自取師者王能自取友者霸而與居不若其身者亡以寡人之不肖也諸大夫之論莫有及于寡人是以憂也莊王之徳宜君人威服諸侯日猶恐懼思索賢佐此其先生者也昔者宋昭公出亡謂其御曰吾知其所以亡矣御者曰何哉昭公曰吾被服而立侍御者數十人無不曰吾君麗者也吾發言動事朝臣數百人無不曰吾君聖者也吾外内不見吾過失是以亡也于是改操易行安義行道不出二年而美聞于宋宋人迎而復之謚為昭此其後生者也昔郭君出郭謂其御者曰吾渴欲飲御者進清酒曰吾饑欲食御者進乾脯梁糗曰何備也御者曰臣儲之曰奚儲之御者曰為君之出亡而道饑渇也曰子知吾且亡乎御者曰然曰何以不諫也御者曰君喜道諛而惡至言臣欲進諫恐先郭亡是以不諫也郭君作色而怒曰吾所以亡者誠何哉御轉其辭曰君之所以亡者太賢曰夫賢者所以為存而亡者何也御曰天下無賢而獨賢而以亡也伏軾而歎曰嗟乎夫賢人者如此乎于是身倦力解枕御膝而卧御自易以塊疎行而去身死中野為虎狼所食此其不生者也故先生者當年霸楚莊王是也後生者三年而復宋昭公是也不生者死中野為虎狼所食郭君是也賈子懐王問于賈君曰人之謂知道者為先生何也賈君對曰此博號也大者在人主中者在卿大夫下者在布衣之士乃其正名非為先生也為先醒也故世主有先醒者有後醒者有不醒者昔楚莊王過申侯之邑申侯進飯日中而王不食申侯請罪曰臣齋而具食甚潔日中而不飯臣敢請罪荘王喟然歎曰非子之罪也吾聞之曰其君賢君也而又有師者王其君中君也而有師者伯其君下君也而羣臣又莫若者亡今我下君也而羣臣又莫若不榖恐亡國也吾聞之世不絶賢天下有賢而我獨不得若吾生者何以食為故莊王戰服大國義從諸侯戚然憂恐聖智在身而自錯不肖思得賢佐日中忘食可謂眀君矣謂先寤所以存亡此先醒也昔宋昭公出亡至于境喟然歎曰嗚呼吾知所以存亡被服而侍立御者數百人無不曰吾君麗者外内不聞吾過吾是以至此吾困宜矣于是革心易行衣苴布食􅀈餕晝學道而夕講之二年美聞宋人車徒迎而復位卒為賢君謚為昭公既亡矣而乃寤所以存此後醒者也昔者虢君驕恣自伐謟諛親貴諫臣詰逐政治蹐亂國人不服晉師伐之虢人不守虢君出走至于澤中曰吾渇而欲飲其御乃進清酒吾饑而欲食御進腵脯粱糗虢君喜曰何給也御曰儲之久矣何故儲之對曰為君出亡而道饑渇也君曰知寡人亡邪對曰知之曰知之何以不諫對曰君好謟諛而惡至言臣願諫恐先虢亡虢君作色而怒御謝曰臣之言過也為間君曰吾之亡者誠何也其御曰君弗知耶君之所以亡者以大賢也虢君曰賢人之所以存也乃亡何也對曰天下之君皆不肖夫疾吾君之獨賢也故亡虢君喜據式而笑曰嗟乎賢固若是苦耶遂徒行而于山中居饑倦枕御膝而卧御易以塊自逃而去君遂餓死為禽獸食此已亡矣猶不悟所存亡此不醒者也故先醒者當時而伯後醒者三年而復不醒者枕土而死為虎狼食嗚呼戒之哉駢志卷十九
