body:
  text: 駢志卷七明陳禹謨撰丁部上桀失金椎紂走玉馬孝經援神契后偷任威折其玉斗失其金椎后指桀論語比考讖殷惑妲己王馬走任昉箋云玉馬駿奔表微子之去桀作璇室紂作傾宫寰宇記綘縣璇臺瓊室在城南門夏桀造晏子春秋夏之衰也其王桀作璇室商之衰也其王紂作傾宫斫朝涉之脛鍥朝涉之脛泰誓商王受斫朝涉之脛剖賢人之心按淇縣界有斫脛河宋策康王罵國老諫臣為無顔之冠以示勇剖傴之背鍥朝涉之脛而國人大駭商紂剔孕婦東昏剖産婦周書商王受刳剔孕婦皇甫謐云紂剖比干妻以觀其胎南史東昏侯時出遊走驅斥百姓嘗至沈公城有一婦人當産不去因剖腹看男女射天毆地射天笞地論衡紂父帝乙射天毆地遊涇渭之間雷電擊而殺之宋策康王欲霸之速成故射天笞地斬社稷而焚滅之曰威服天下鬼神從臺上彈人嗾獒搏人在樓上彈人奪兒飼狗左傳晉靈公不君厚斂以雕墻從臺上彈人而觀其辟丸也又飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為鬭且出北史齊南陽王綽為定州刺史汲井水為後池在樓上彈人又好微行遊獵無度恣情強暴有婦人抱兒在路走避入草綽奪其兒飼波斯狗婦人號哭綽怒又縱狗使食狗不食塗以兒血乃食焉載記石季龍善彈數彈人軍中以為毒患觀人避丸見上觀人避箭舊唐書巢王元吉守并州性好畋獵載網罟三十餘兩嘗言我寧三日不食不能一日不獵又嘗當衢而射觀人避箭以為笑樂幽王舉烽不信田倉舉烽不實周本紀褒姒不好笑幽王欲其笑萬方故不笑幽王為烽燧大鼓有冦至則舉燧火諸侯悉至至而無冦褒姒乃大笑幽王説之為數舉燧火其後不信諸侯益亦不至及犬戎攻幽王幽王舉烽火徵兵兵莫至遂殺幽王驪山下虜褒姒盡取周賂而去又吕覽周宅酆鎬近戎人與諸侯約為高葆禱於王路置鼓其上逺近相聞即戎冦至傳鼓相告諸侯之兵皆至救天子戎冦嘗至幽王擊鼓諸侯之兵皆至褒姒大説喜之幽王欲褒姒之笑也因數擊鼓諸侯之兵數至而無冦至於後戎冦真至幽王身走乃死於驪山之下為天下笑此夫以無冦失真冦者也酉陽雜爼武溪夷田強遣長子魯居上城次子某居中城少子倉居下城三壘相次以拒漢兵光武二十四年遣武威將軍劉尚征之尚未至倉獲白龞為臛舉烽請兩兄兄至無事及尚軍來倉舉火魯等以為不實倉遂戰而死僅亦守府但為寄坐國語晉文公既定襄王於郟鄏王勞之以地辭請隧焉王弗許曰今天降禍災於周室余一人僅亦守府又不佞以勤叔父而班先王之大物以賞私德其叔父實應且憎以非余一人余一人豈敢有愛也先民有言曰改玉改行叔父若能光裕大德更姓改物以創制天下自顯庸也而縮取備物以鎮撫百姓余一人其流辟於裔土何辭之與有若由是姬姓也尚將列為公侯以復先王之職大物其未可改也魏志司馬宣王奏曹爽曰大將軍爽背棄顧命敗亂國典內則僭擬外專威權破壞諸營盡據禁兵羣官要職皆置所親殿中宿衛厯世舊人皆復斥出欲置新人以樹私計根據盤牙縱恣日甚外既如此又以黃門張當為都監專共交關看察至尊候伺神器離間二宫傷害骨肉天下洶洶懷危懼陛下但為寄坐豈得久安此非先帝詔陛下及臣升御牀之本意也昔趙高極意秦氏以滅吕霍早斷漢祚永昌此乃陛下之大鑒臣受命之時也言秦冦至者射之報齊冦至者殺之吕覽秦繆公時戎強大秦繆公遺之女樂二八與良宰焉戎王大喜以其故數飲食日夜不休左右有言秦冦之至者因扞弓而射之秦冦果至戎王醉而臥於樽下卒生縛而擒之又齊攻宋宋王使人候齊冦之所至使者還曰齊冦近矣國人恐矣左右皆謂宋王曰此所謂肉自至蟲者也以宋之強齊兵之弱惡能如此宋王因怒而詘殺之又使人往視齊冦使者報如前宋王又怒詘殺之如此者三其後又使人往視齊冦近矣國人恐矣使者遇其兄曰國危甚矣若將安適其弟曰為兄視齊冦不意其近而國人恐如此也今又私患鄉之光視齊冦者皆以冦之近也報而死今也報其情死不報其情又恐死將若何其兄曰如報其情有且先夫死者死先夫亡者亡于是報於王曰殊不知齊冦之所在國人甚安王大喜左右皆曰鄉之死者宜矣王多賜之金冦至王自投車上馳而走此人得以富於他國塹山堙谷夷山堙谷史記始皇欲遊天下道九原直抵甘泉乃使蒙恬通道自九原抵甘泉塹山堙谷千八百里北史楊素監營仁夀宫素遂夷山堙谷督役嚴急作者多死宫側時聞鬼哭漢武帝遣方士漢元帝求方士史記漢武紀少君言於上曰祠竈則致物致物而丹砂可化為黃金黃金成以為飲食器則益夀益夀而海中蓬萊仙者可見見之以封禪則不死黃帝是也臣常遊海上見安期生食巨棗大如瓜安期生仙者通蓬萊中合則見人不合則隱於是天子始親祠竈而遣方士入海上求蓬萊安期生之屬而事化丹砂諸藥齊為黃金矣桓談新論漢元帝被病廣求方士漢中送道士王仲都詔問所能對曰能忍寒暑乃於昆明池上環氷而馳御者厚衣狐裘寒戰而仲都獨無變色臥於池臺上暉然自若夏大暑日使曝坐中環以十爐火不言熱又身不汗神藥可得嘗為魚苦故不得至仙人可見上往常遽故不得見秦本紀方士徐市等入海求神藥數歲不得費多恐譴乃詐曰蓬萊藥可得然常為大鮫魚所苦故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚蛟龍為候今上禱祠備謹而有此惡神當除去而善神可致乃令入海者齎捕巨魚具而自以連弩候大魚出射之自琅邪北至榮成山弗見至之罘見巨魚射殺一魚遂並海西至平原津而病郊祀志公孫卿言於武帝曰仙人可見上往常遽以故不見今陛下可為館如緱氏城置脯棗神人宜可致且仙人好樓居於是上令長安側作飛廉桂館甘泉側作益夀延夀館使卿持節設具而候神人乃作通天臺置祠具其下將招來神仙之屬稱主翁立面首漢書武帝姑館陶公主號竇太主堂邑矦陳午尚之午死主寡居年五十餘矣近幸董偃上嘗從主飲主自執宰蔽膝道入登階就坐坐未定上曰願謁主人翁董君緣幘傅韝隨主前伏殿下主乃贊館陶公主胞人臣偃昧死再拜謁因叩頭謝上為之起有詔賜衣冠上偃起走就衣冠主自奉食進觴當是時董君見尊不名稱主人翁南史前廢帝紀山隂公主淫恣過度謂帝曰妾與陛下雖男女有殊俱託體先帝陛下後宫數百妾惟駙馬一人事不均平一何至此帝乃為立面首左右三十人發丘中郎模金校尉魏氏春秋載袁紹檄州郡文曹操署發丘中郎將摸金校尉所過墮突無骸不露南史宋景和時倣魏武置此二官以建安王休仁山陽王休祐領之按洪容齊氏曰嚴有翼所著藝苑雌黃頗務譏詆東坡公皆近於蚍蜉撼大木如正誤篇中托其用五十本蔥為種薤五十本發丘中郎將為中郎解摸金扁鵲見長桑君使飲上池之水為倉公飲上池鄭餘慶蒸胡蘆為盧懷謹云如此甚多坡詩所謂抉雲漢分天章萬斛泉源不擇地而出若用蔥為薤用校尉為中郎用扁鵲為倉公用餘慶為懷謹不失為名語於理何害公豈一一如學究書生按圖索駿規行矩步者哉蜀後主喜笑自若陳後主耽醉罕醒漢晉春秋司馬文王與後主劉禪宴為之作故蜀技旁人皆為之感愴而禪喜笑自若王謂賈充曰人之無情乃可至於是乎雖使諸葛亮在不能輔之久全而况薑維邪充曰不如是殿下何由并之他日王問禪曰頗思蜀否禪曰此間樂不思蜀郤正聞之求見禪曰若王後問宜泣而答曰先人墳墓逺在隴蜀乃心西悲無日不思因閉其目會王復問對如前王曰何乃似郤正語邪禪驚視曰誠如尊命左右皆笑南史或言陳後主名叔寶反語為少福亦敗亡之徴云既見宥隋文帝給賜後主甚厚數得引見班同三品每預宴恐致傷心為不奏吳音後監守者奏言叔寶云既無秩位每預朝集願得一官號隋文帝曰叔寶全無心肝監者又言叔寶常耽醉罕有醒時隋文帝使節其酒既而曰任其性不爾何以過日常侍宴隋文帝目之曰此敗豈不由酒將作詩功夫何如思安時事孫權以水灑羣臣孫皓激水流宫人吳志孫權於武昌臨釣臺飲酒大醉權使人以水灑羣臣曰今日酣飲惟醉墮臺中乃當止耳張昭正色不言出外車中坐權遣人呼昭還謂曰為共作樂耳公何為怒乎昭對曰昔紂為糟丘酒池長夜之飲當時亦以為樂不以為惡也權默然有慙色遂罷酒又初孫皓每宴會羣臣無不咸令沉醉置黃門郎十人特不與酒侍立終日為司過之吏宴罷之後各奏其闕失逆視之咎謬言之愆罔有不舉大者即加威刑少者輒以為罪後宫數千而採擇無已又激水入宫宫人有不合意者輒殺流之宫人以鹽汁灑地淑妃以鹽水灑地晉書武帝掖庭殆將萬人而並寵者甚衆帝莫知所適常乘羊車恣其所之至便宴寢宫人乃取竹葉插户以鹽水灑地而引帝車唯胡貴妃芳最蒙愛幸殆有專房之寵南史宋文帝好乘羊車經諸房潘淑妃每粧飾褰帷以候并密令左右以鹽水灑地帝每至户羊輒舐地不去帝曰羊乃為汝徘徊况於人乎御黃門被納從者履晉書惠帝單車走洛陽道中御中黃門布被又惠帝至溫將謁陵喪履納從者之履下拜流涕左右皆􅒣欷獻惠帝米飯獻僖宗糗餌晉書惠帝幸成都王頴軍頴敗與帝單車走洛陽服御分散倉卒上下無齎侍中黃門被囊中齎私錢三千詔貸用所有買飯以供宫人止食於道中客舍宫人有持升餘粳米飯及燥蒜鹽豉以進帝帝噉之次獲嘉市粗米飯盛以瓦盆帝噉兩盂有老父獻蒸雞帝受之舊唐書黃巢犯京師僖宗出幸途無供須衛軍不得食漢隂令李康獻糗餌數百騾綱軍士始得食僖宗召康問曰卿為縣令安操心及此康對曰臣為塵吏敢有此進獻張濬員外教臣也帝異之急召至行在麴餅屑為粥燒餘米供膳晉書愍帝時京師飢甚人相食死者大半太倉有麴數十餅麴允為粥以供帝至是復盡帝泣謂允曰今窘厄如此外無救援死于社稷是朕事也朕念將士暴離斯酷今欲因城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意決矣又成帝三年蘇峻揮戈接於帝座突入太后後宫左右侍人皆見掠奪是時大官唯有燒餘米數石以供御膳百姓號泣響震都邑青衣行酒執戟為導晉書劉聰大會使懷帝著青衣行酒侍中庾珉號哭聰惡之又劉聰出獵令愍帝行車騎將軍戎服執戟為導百姓聚而觀之故老或􅒣欷流涕聰聞而惡之聰後因大會使帝行酒洗爵反而更衣又使帝執蓋晉臣在坐者多失聲而泣尚書郎辛賔抱帝慟哭為聰所害以的畫腹持矟擬胸南史蒼梧王屢欲害齊高帝嘗率數十人直入鎮軍府時暑熱帝晝臥祼袒蒼梧立帝於室內畫腹為射的自引滿將射之帝神色不變斂板曰老臣無罪蒼梧左右王天恩諫曰領軍腹是佳射棚而一箭便死後無復射不如以骲箭射之乃取骲箭一發即中帝腹蒼梧投弓於地大笑曰此手何如北史文宣晚年敗德嘗持矟走馬以擬斛律金胸者三金立不動於是賜物千段將南詭西將東詭北東行驅西南行驅北南史齊明帝性猜忌每出行幸先占利害簡於出入將南則詭言之西將東則詭言之北皆不以實又東昏矦率一月二十餘出既往無定處尉司常慮得罪東行驅西南行驅北黃紙囊盛黃案包褁南齊廢帝鬱林王為太孫時凡諸小人並逆加爵位皆疏官名號於黃紙使各囊盛以𢃄之又後廢帝東昏矦案奏月數十日乃報或不知所在閹豎以紙包裹魚肉還家並是五省黃案鑿氷沉尸以雪埋人北史魏濟隂王暉業天保二年從駕至晉陽於宫門外罵元韶曰爾不及一老嫗背負璽與人何不打碎之我出此言知即死然爾亦詎得幾時文宣聞而殺之暉業神色自若仍鑿氷沉其尸舊唐書滕王元嬰驕緃逸遊動作失度出畋以彈彈人將為笑樂凝寒方甚以雪埋人犒軍士以糲食乃返戈大呼給募卒以廪麥乃譟聚趨府舊唐書李希烈兵數萬圍襄城勢甚危急詔姚令言率本鎮兵五萬赴援涇師離鎮多携子弟而來望至京師以獲厚賞及師上路一無所賜時詔京兆尹王翃犒軍士唯糲食菜啖而已軍士覆而不顧皆憤怒揚言曰吾輩棄父母妻子將死於難而食不得飽安能以草命捍白創耶國家瓊林大盈寶貨堆積不取此以自活何往耶往次滻水乃返戈大呼鼓譟而還令言曰比約東都有厚賞兒郎勿草草此非求活之良圖也衆不聽以戈環令言請退令言急奏之上恐令內庫出繒綵二十車馳賜之軍聲浩浩令言不能戢街市居人狼狽走竄亂兵呼曰勿走不稅汝間架矣德宗令普王與學士薑公輔往撫勞之才出內門賊已斬關陳於丹鳳樓下是日德宗倉卒出幸賊縱入府庫輦運極力而止又李絳為興元尹山南西道節度使文宗三年南蠻冦西蜀詔徵赴援絳於本道募兵千人赴蜀及中路蠻軍已退所募皆還興元兵額素定募卒悉令罷歸四年二月十日絳晨興視事召募卒以詔旨喻而遣之仍給以廪麥皆怏怏而退監軍使楊叔元貪財怙寵怨絳不奉已乃因募卒賞薄衆辭之際以言激之欲其為亂以逞私憾募卒因監軍之言怒氣益甚乃譟聚趨府劫庫兵以入使衙絳方與賔僚會宴不及設備聞亂北走登陴衙將王景延力戰兵折矢窮景延死絳乃為亂兵所害陽侯殺繆侯而大饗廢夫人之禮劉琰撾胡氏而妻母絶朝慶之儀坊記子云禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮蜀志劉琰妻胡氏入賀太后太后令特留胡氏經月乃出胡氏有美色琰疑其與後主有私呼卒五百撾胡至於以履搏面而後棄遣胡具以告琰坐下獄有司議曰卒非撾妻之人面非受履之地琰竟棄市自是大臣妻母朝慶遂絶膳夫庖人多著繡衣錦袴醫師走卒皆為校尉御史後漢更始時李軼朱鮪擅命山東王匡張卬橫暴三輔其所授官爵者皆羣小賈豎或有膳夫庖人多著繡面衣錦袴襜䄖諸於罵詈道中音義曰諸於太掖衣也如婦人之袿衣揚雄方言曰襜䄖其短者自關之西謂之䘪䘿魏書乘輿獻帝時居棘籬中門户無關閉天子與羣臣會兵士伏籬上觀互相鎮壓以為笑諸將專權或擅笞殺尚書司𨽻校尉出入民兵抵擲之諸將或遣婢詣省閣或自齎酒啖過天子飲侍中不通喧呼罵詈遂不能止又競表拜諸營壁民為部曲求其禮遺醫師走卒皆為校尉御史刻印不供乃以錐畫示有文字或不時得蝦蟇給官稟犬馬食縣幹晉中州記惠帝為太子出聞蝦蟇聲問人為是官蝦蟇私蝦蟇侍臣賈胤對曰在官地為官蝦蟇在私地為私蝦蟇令曰若官蝦蟇可給稟先是有讖云蝦蟇當貴北齊書幼主時犬馬雞鷹多食縣幹王莽常持威斗牛輔常把靈符漢書王莽之敗也避火宣室前殿火輒隨之宫人婦女謕呼曰當奈何時莽紺袀服𢃄璽韍持虞帝匕首天文郎按式於前日時加某莽旋席隨斗柄而坐就車之漸臺欲阻池水猶抱持符命威斗魏書董卓既誅卓壻牛輔恇怯失守不能自安常把辟兵符以鈇鑕致其旁欲以自強齊文宣帝以祈雨不應掘西門豹冢魏奚康生以祈雨不應取西門豹舌北齊書時夏大旱文宣帝以祈雨不應毁西門豹祠掘其冢魏書奚康生為相州刺史在州以天旱令人鞭石虎畫像復就西門豹祠祈雨不獲令吏取豹舌未幾二兒暴喪身亦遇疾巫以為虎豹之祟毁佛為錢毁佛鑄錢南史梁武帝軍東下用度不足南平元襄王偉取襄陽寺銅佛毁以為錢富僧藏鏹多加毒害後遂惡疾五代周世宗即位之明年國乏錢乃詔悉毁天下銅佛像以鑄錢嘗曰吾聞佛法以身世為妄以利人為急使其真身尚在猶欲割截况此銅像豈其所惜哉由是羣臣皆不敢言徐廣請桓玄立七廟王偉請侯景立七廟晉書桓玄既篡徐廣據晉典請追立七廟玄曾祖以上名位不顯故不欲序列且以王莽九廟見譏於前史遂以一廟矯之郊廟齋二日而已祕書監卞承之曰祭不及祖知楚德之不長也南史王偉請侯景立七廟景曰何謂七廟偉曰天子祭七世祖考故置七廟并請七世諱敕太常具祭祀之禮景曰前世吾不復憶唯阿爺名標且在朔州伊那得來噉是衆聞笑之王夷甫勸稱尊號取石勒怒韋祖思恭懼過禮取勃勃怒晉書王衍字夷甫時石勒與衍相見問衍以晉故衍為陳禍敗之由云計不在已勒甚悅之與語移日衍自説少不豫事欲求自免因勸勒稱尊號勒怒曰君名蓋天下身居重任少壯登朝至於白首何得言不豫世事邪破壞天下正是君罪使人夜排墻填殺之按史臣曰漢相清靜見譏於曠務周史清虗不嫌於尸祿豈台揆之任有異於常班者歟濬沖善發談端夷甫仰希方外登槐庭之顯列顧漆園而高視彼既憑虗朝章已亂戎則取容於世旁委貨財衍則自保其身寧論宗稷及三方搆亂六戎藉手犬羊之侣鋒鏑如雲夷甫區區焉佞彼凶渠以求容貸頽牆之隕猶有禮也載記赫連勃勃歸於長安徵隱士韋祖思既至而恭懼過禮勃勃怒曰吾以國士徵汝奈何以非類處我汝昔不拜姚興何獨拜我我今未死汝猶不以我為帝王吾死之後汝輩㺯筆當置吾何地遂殺之評曰二子身陷於虜死則死耳媚虜何為彼其甘心媚虜誠惜其死也而死卒不免何如罵賊死者千載而下尚凜凛有生氣哉二子可謂非夫矣叔孫所事十主馮道所事十君漢書叔孫通使徵魯諸生三十餘人魯有兩生不肯行曰公所事者且十主皆面諛親貴今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起百年積德而後可興也吾不忍為公所為公所為不合古吾不行公往矣毋汙我通笑曰若真鄙儒不知時變遂與所徵三十四人西五代史馮道少能矯行以取稱于世及為大臣尤務持重以鎮物事四姓十君益以舊德自處然當世之士無賢愚皆仰道為元老而喜為之稱譽耶律德光嘗問道曰天下百姓如何救得道為俳語以對曰此時佛出救不得惟皇帝救得人皆以為契丹不夷滅中國之人者賴道一言之善也劉嘉八其郭霸四其漢書安衆侯劉崇與相張紹謀曰安漢公王莽專制朝政必危劉氏吾帥宗族為先海內必和遂進攻宛不得入而敗紹者張竦之從兄也竦與崇族父劉嘉詣闕自歸莽赦弗罪竦因為嘉作奏曰方今天下聞崇之反也咸欲褰衣手劒而叱之其先至者則拂其頸衝其胸刃其軀切其肌後至者欲撥其門仆其牆夷其屋焚其器應聲滌地則時成創而宗室尤甚言必切齒焉願瀦崇宫室令如古制及崇社宜加亳社以賜諸侯用永監戒于是莽大説師古注曰則時即時也舊唐書郭霸為右臺侍御史初舉集召見于則天前自陳忠鯁云往年征徐敬業臣願抽其筋食其肉飲其血絶其髓則天悅故拜焉時人號為四其御史李義府為李貓李德柔為李貓舊唐書李義府柔而害物時謂之李貓南唐近事李德柔任大理少卿持法甚峻忌刻便佞時號李貓兒本無學術詐稱博聞每呼馬韓盧樂工為伶倫諂佞為謇諤以此貽譏於世郭尖李錐北史郭景尚善事權寵世號曰郭尖又李世哲性傾巧善事人亦以貨賂自達高肇劉騰之處勢也皆與親善故世號為李錐義孝義息北史和士開母喪託附者咸往奔哭鄴中富商丁鄒嚴興等並為義孝又恩幸傳王睿出入帷幄及疾病孝文太后每親侍疾睿之葬也假親姻義舊衰絰縞冠送喪者千餘人皆舉聲慟泣以要榮利時謂之義孝又劉騰為司空擅生殺之威八座九卿旦造騰宅參其顏色然後方赴省府亦有厯日不得見者及薨於位中官為義息衰絰者四十餘人閹官為義服杖絰衰縞者以百數那得此副急淚何處得應急像南史宋孝武寵姬殷貴妃薨令醫術人羊志哭殷氏志極嗚咽他日有問志卿那得此副急淚北史封述息娶李士元女大輸財聘及將成禮猶競懸違述忽取所供養像對士元打像為誓士元笑曰封公何處常得應急像須誓便用何火乞兒沍寒氷子天寶遺事張九齡鄙朝士向炎者為向火乞兒晉王沉釋時論有氷子出自沍寒之谷求押一字纍日不遂但署一字猶不能盡舊唐書王鉷威權轉盛兼二十餘使近宅為使院文案堆積胥吏求押一字即纍日不遂中使賜遺不絶於門雖晉公林甫亦畏避之又楊國忠自侍御史以至宰相凡領四十餘使又專判度支吏部三銓事務鞅掌但署一字猶不能盡皆責成胥吏弄臣弄兒漢書丞相申屠嘉召責鄧通通頓首首盡出血不解上度丞相已困通使使持節召通而謝丞相曰此吾弄臣君其釋之又金日磾子二人皆愛為帝弄兒常在旁側弄兒或自後擁上項日磾在前見而目之弄兒走且啼曰翁怒上謂日磾何怒吾兒為其後弄兒壯大不謹自殿下與宫人戲日磾適見之惡其淫亂遂殺弄兒弄兒即日磾長子也上聞之大怒日磾頓首謝具言所以殺弄兒狀上甚哀為之泣已而心敬日磾霍光愛幸監奴梁冀愛幸監奴漢書霍光愛幸監奴馮子都常與計事及顯寡居與子都亂按晉灼曰漢語東閭氏亡顯以婢代立素與馮殷姦也師古曰監奴謂奴之監知家務者也殷者子都之名後漢書梁冀愛監奴秦宫官至太倉令得出入冀妻壽所壽見宫輒屏御者託以言事因與私焉宫內外兼寵威權大震刺史二千石皆謁辭之冀用夀言多斥奪諸梁在位者外似謙讓而實崇孫氏宗親冒名而為侍中卿校尉郡守長吏者十餘人皆貪叨凶淫各遣私客籍屬縣富人被以它罪閉獄掠拷使出錢自贖資物少者至于死徙中貴但呼五郎軍中呼為十郎舊唐書肅宗時宰官百司不時奏事皆因李輔國上決常在銀臺門受事置察事廳子數十人官吏有小過無不伺知即加推訊府縣按鞫三司制獄必詣輔國取決隨意區分皆稱制敕無敢異議者每出則甲士數百人衛從中貴人不敢呼其官但呼五郎宰相李揆山東甲族位居台輔見輔國執子弟之禮謂之五父又程元振權甚于李輔國軍中呼為十郎時來瑱名將裴冕元勳二人既被誣陷天下方鎮皆解體元振猶以驕豪自處不顧物議車行酒馬行炙車行酒馬行肉帝王世紀紂宫九市車行酒馬行炙朝野僉載隋諸葛昻高瓉爭為豪侈昻屈瓉串長八尺餅濶丈餘餤粗如柱酒行自作金剛舞以送之瓉復屈昻以車行酒馬行肉碓斬鱠碾蒜虀自唱夜義歌以送之日食萬錢一食萬錢晉書何曾性奢豪務在華侈帷帳車服窮極綺麗厨膳滋味過于王者每燕見不食大官所設帝輒命取其食蒸餅上不坼作十字不食日食萬錢猶曰無下箸處子劭亦有父風衣裘服玩新故巨積食必盡四方珍味一日之供以錢二萬為限時論以為大官御膳無以加之又任愷既失職乃縱酒耽樂極滋味以自奉養初何劭以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處咄嗟便辦造次便辦晉書石崇為客作豆粥咄嗟便辦每冬得韭䓑韲嘗與王愷出遊爭入洛城崇牛迅若飛禽愷絶不能及愷每以此三事為恨乃密貨崇帳下問其所以答曰豆至難煮豫作肉末客來但作白粥以投之耳韭䓑韲是搗韭根雜以麥苖耳牛奔不遲良由馭者逐不及反制之可聽蹁轅則駛矣于是悉從之遂爭長焉崇後知之因殺告者南史中書舍人劉休嘗詣阮佃夫遇佃夫出行中路相逢要休同反就席便命施設一時珍羞莫不畢備凡諸火劑並皆始熟如此者數十種佃夫嘗作數十人饌以待賔客故造次便辦類皆如此東封扈從每色為一隊五家扈從每家為一隊舊唐書王毛仲為行太僕卿部統嚴整羣牧孶息遂數倍其初芻粟之類不敢盜竊每歲迥回殘常致數萬斛不三年扈從東封以諸牧馬數萬匹從每色為一隊望如雲錦又玄宗每年十月幸華清宫楊國忠姊妹五家扈從每家為一隊著一色衣五家合隊照映如百花之煥發而遺鈿墜舄瑟瑟珠翠燦爛芳馥於路而國忠私於虢國不避雄狐之刺每入朝或聮鑣方駕不施帷幔每三朝慶賀五鼓待漏靘粧盈巷蠟炬如晝而十宅諸王百孫凡婚嫁皆因韓虢為紹介仍先納賂千貫而奏請罔不稱旨安成食臨汝飾北路魚南路徐南史安成公何朂無忌之子臨汝公孟靈休昶之子也並名侈豪以肴膳器服車馬相尚都下為之語曰安成食臨汝飾湛之美兼何孟湛之徐又徐鯤頗好聲色侍妾數十皆佩金翠曳羅綺服玩悉以金銀飲酒數升便醉而閉門盡日酣歌每遇歡謔則飲至斗有時載伎肆意遊行荆楚山川靡不畢踐朋從遊好莫得見之時襄陽魚𢎞亦以豪侈稱于是府中謡曰北路魚南路徐鰿頭日進三百雞跖必食數千南史梁宗室臨川靜惠王宏所幸江無畏服玩侔於齊東氏潘妃寶屧直千萬好食鰿魚頭常日進三百吕氏春秋云善學者若齊王之食雞也必食其跖數千而後足妓圍肉陳天寶遺事申王每至冬月有風雪苦寒之際使官妓密圍于坐側以禦寒氣自呼為妓圍又楊國忠于冬月常選婢妾肥大者行列于前令遮風蓋藉人之氣相暖故為肉陳鄭褎謂新美人掩鼻江充告衛太子蔽鼻楚策魏王遺楚王美人楚王説之夫人鄭褎知王之説新人也甚愛新人衣服玩好擇其所喜而為之宫室服具擇其所善而為之愛之甚於王王曰婦人所以事夫者色也而妬者其情也今鄭褎知寡人之説新人也其愛之甚於寡人此孝子之所以事親忠臣之所以事君也鄭褎知王以已為不妬也因謂新人曰王愛子美矣雖然惡子之鼻子為見王則必掩子鼻新人見王因掩其鼻王謂鄭褎曰夫新人見寡人則掩其鼻何也鄭褎曰妾知也王曰雖惡必言之鄭褎曰其似惡聞王之臭也王曰悍哉令劓之無使逆命三輔故事衛太子嶽鼻太子來省疾至甘泉宫江充告太子勿入陛下有詔惡太子鼻嶽當以紙蔽其鼻充語武帝曰太子不欲聞陛下膿臰故蔽鼻武帝怒太子太子走還九州春秋司𨽻馮方女國色也避亂揚州袁術登城見而悅之遂納焉甚愛幸諸婦害其寵語之曰將軍貴人有志節當時時涕泣憂愁必長見敬重馮氏以為然後見術輒埀涕術以有心志益哀之諸婦人因共絞殺懸之厠梁術誠以為不得志而死乃厚加殯斂評曰甚哉讒口之可畏也淫昏如楚懷袁術無惑已漢武英主也而讒入焉害及女寵無惑已太子天下本而亦以讒死讒之亂人家國也如是斷手足居鞠域中截手足投酒甕中漢書吕太后斷戚夫人手足去眼熏耳飲瘖藥使居鞠域中名曰人彘按五行志高后八年三月祓霸上還過枳道見物如蒼狗撠高后掖忽而不見卜之趙王如意為祟遂病腋傷而崩舊唐書則天杖廢后王氏及良娣蕭氏各一百截去手足投于酒甕中曰令此二嫗骨醉數日而卒後則天頻見王蕭二庶人披髮瀝血如死時狀武后惡之禱以巫祝又移居蓬萊宫復見按申鑒寵妻愛妾幸矣其為災也深矣災與幸同乎曰得則慶否則災戚氏不幸不人豕趙昭儀不幸不失命栗姬不幸不廢鈎弋不幸不憂殤非災而何若慎夫人之知班婕妤之賢明德皇后之德劭矣哉注曰劭高也王忠噉人朱粲噉人魏略曰王忠扶風人少為亭長三輔亂忠飢乏噉人後歸曹公拜中郎將從征討五官將知忠嘗噉人因從駕出行令俳取冢間髑髏繫著忠馬鞍以為歡笑舊唐書朱粲大業末為盜自稱迦樓羅王會百姓大餒死者如積人多相食軍中罄竭無所虜掠乃取嬰兒蒸而噉之因令軍士曰食之美者寧過于人肉乎但令他國有人我何所慮即勒所部有略得婦人小兒皆烹之分給軍士乃稅諸城堡取小弱男女以益兵糧後降高祖令假散騎常侍段確迎勞之確因醉侮粲曰聞卿噉人作何滋味粲曰若噉嗜酒之人正似糟藏豬肉確怒慢罵曰狂賊入朝後一頭奴耳更得噉人乎粲懼于坐收確及從者數十人奔于王世充拜為龍驤大將軍東都平獲之斬于洛水之上士庶嫉其殘忍競投瓦礫以擊其尸須臾封之若冢張子吞仙劉闢吞人北夢瑣言唐張裼尚書有五子文蔚彞憲濟美仁龜皆有名第至宰輔丞郎內一子忘其名少年聞説壁魚入道經函中因蠧食神仙字身有五色人能取壁魚吞之以致神仙而上升張子惑之乃書神仙字碎剪實於瓶中捉壁魚以投之冀其蠧蝕亦欲吞之遂成心疾每一發作竟月不食言語粗穢無所迥回避其家扄閉而守之俟其發愈一切如常而倍餐啜一月食料須品味而飫之多年方謝世舊唐書初劉闢嘗病見諸問疾者來皆以手據地倒行入闢口闢因磔裂食之惟盧季文若至則如平常故尤與文若厚竟以同惡俱赤族禽獸知母不知父蕃人先母而後父晉書文帝引阮籍為大將軍從事中郎有司言有子殺母者籍曰嘻殺父乃可至殺母乎坐者怪其失言帝曰殺父天下之極惡而以為可乎籍曰禽獸知母而不知父殺父禽獸之類也殺母禽獸之不若衆乃悅按儀禮子夏傳曰禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖之所自出評曰初閲晉書至阮嗣宗所稱禽獸知母而不知父未嘗不駭其言之無稽也及讀儀禮子夏傳乃知古人一諧謔間亦自有本雖然以經傳資諧謔母乃傷化之尤乎舊唐書安祿山請為貴妃養兒入對皆先拜太真玄宗怪而問之對曰臣是蕃人蕃人先母而後父玄宗大悅遂命楊銛已下並約為兄弟姊妹阮籍聞喪而圍棋決賭袁耽在艱而變服就局晉書阮籍母終正與人圍棋對者求止籍留與決賭既而飲酒二斗齊聲一號吐血數升及將葬食一蒸肫飲二斗酒然後臨訣直言窮矣舉聲一號因又吐血數升又袁耽字彥道少有才氣俶儻不羇為士所稱桓溫少時遊於博徒資産俱盡尚有負進思自振之方未知所出欲求濟於耽而耽在艱試以告焉耽略無難色遂變服懷布帽隨溫與債主戲耽素有藝名債者聞之而不相識謂之曰卿當不辦作袁彥道也遂就局十萬一擲直上百萬耽投馬呌絶探布帽擲地曰竟識袁彥道否加以清議付之鄉論南齊烏程令吳郡顧昌玄坐父法秀宋太始中北征死亡尸骸不返而昌玄宴樂嬉遊與常人無異有司請加以清議南史右僕射劉朗之遊擊將軍劉璩之子坐不贍給兄子致使隨母他家免官禁錮終身付之鄉論王悅爭道周覆抑手晉書王導嘗共其子悅奕棋爭道導笑曰相與有瓜葛那得為爾邪南史齊高帝性寬嘗與直閣將軍周覆給事中禇思莊共棊纍局不倦覆乃抑上手不許易行字父名母卿夫晉書胡母謙之酣醉常呼其父輔之字一日輔之正飲謙之厲聲曰彥國年老不得為爾將令我尻背東壁按彥國輔之字字又王濛亦呼父戰國策宋人有學者三年反而名其母其母曰子學三年反而名我者何也其子曰吾所賢者無過堯舜堯舜名吾所大者無過天地天地名今母賢不過堯舜母大不過天地是以名母也其母曰子之於學者將盡行之乎願子之有以易名母也子之於學也將有有所不行也願子之且以名母為後也晉書王安豐婦常卿安豐安豐曰婦人卿壻於禮為不敬婦曰親卿愛卿是以卿卿我不卿卿誰當卿卿遂聽之字夫字叔顔氏家訓吕后微時嘗字高祖為季至漢袁種字其叔父曰絲謝氏世無渭陽之情劉毅無復甥舅之敬世説謝宣映曾於公座戲調其舅袁湛湛甚不堪之謂曰汝父昔已輕舅汝今復來加我可謂世無渭陽情也南史謝絢字宣映謝景重之子宋書景重是王胡之外甥與舅亦不協南史鄭鮮之外甥劉毅權重當時朝野莫不歸附鮮之盡心武帝獨不屈意於毅毅當鎮江陵武帝會於江寧朝士畢集毅素好樗蒱於是會戲帝與毅斂局各得其半積錢隱人毅呼帝併之先擲得雉帝甚不悅良久乃答之四坐傾屬既擲得盧毅意大惡謂帝曰知公不以大坐席與人鮮之大喜徒跣繞床大呌聲聲相續毅甚不平謂之曰此鄭君何為者無復甥舅之敬敝無存以室與弟倉梧丙以妻讓兄左傳齊侯伐晉夷儀敝無存之父將室之辭以與其弟中論蒼梧丙娶妻美而以與其兄欲以為讓也則不如無讓焉董叔紡於庭槐王偃縳諸庭槐國語董叔將取於范氏叔向曰范氏富盍已乎曰欲為擊援焉他日董祁訴於范獻子曰不吾敬也獻子執而紡於庭之槐叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援既援矣欲而得之又何請焉南史王偃尚宋武帝第二女吳興長公主諱榮男常倮偃縳諸庭槐時天夜雪噤凍久之偃兄恢排閣詬主乃免便面拊馬麈尾驅牛漢書張敞無威儀時罷朝會過走馬章臺街使御吏驅自以便面拊馬又為婦畫睂長安中傳張京兆睂嫵有司以奏上召問敞對曰臣聞閨房之內夫婦之私有過於畫睂者按師古曰便面所以障面蓋扇之類也不欲見人以此自障面則得其便故曰便面亦曰屏靣今之沙門所持竹扇上袤平而下圜即古之便面也晉書王導夫人曹氏性妬導甚憚之乃密營别館以處衆妾曹氏知將往導恐妾被辱遽令命駕猶恐遲之以所執麈尾柄驅牛而進賜妬婦藥賜妬婦酒南史宋明帝憎婦人妬尚書右丞勞彥遠以善棊見新婦妬傷其面帝曰我為卿斷之何如彥逺卒爾從旨其夕遂賜藥殺其妻劉休妻王氏亦妬帝聞之賜休妾敕與王氏二十杖令休於宅後開小店使王氏親賣皂莢掃帚以此辱之朝野僉載唐初兵部尚書任瓌敇賜宫女皆國色妻妬爛二女頭髮秃盡太宗聞之令上宫齎金胡餅酒賜之云飲之立死瓌三品合置姬媵爾不妬不須飲之若妬即飲柳氏拜敇訖曰妾與瓌結髮夫妻俱出微賤更相輔翼遂致榮宦瓌今多內嬖誠不如死遂飲盡然非鴆也既睡醒帝謂瓌曰其性如此朕亦當畏之因詔二女令别宅安置又國史異纂房玄齡事同吾雖不殺伯仁伯仁由我而死我雖不殺王公王公因我而死晉書王導料檢中書故事見周顗表救已殷勤欵至導執表流涕悲不自勝告其諸子曰吾雖不殺伯仁伯仁由我而死南史謝朓告王敬則反敬則女為朓妻常懷刀欲報朓朓不敢相見及當拜吏部謙抑尤甚尚書郎范縝嘲之曰卿人才無慙小選但恨不可刑於寡妻朓有愧色及臨誅嘆曰天道若不可昧乎我雖不殺王公王公因我而死酈况賣友甄邵賣友漢書酈商事孝惠帝吕后吕后崩商疾不治事其子寄字况與吕祿善及高后崩大臣欲誅諸吕吕祿為將軍軍于北軍太尉周勃不得入北軍于是乃使人劫商令其子寄紿吕祿吕祿信之與出遊而太尉勃乃得入據北軍遂以誅諸吕商是歲薨諡曰景侯子寄嗣天下稱酈况賣友後漢書潁川甄邵諂附梁冀為鄴令有同歲生得罪于冀亡奔邵邵偽納隂以告冀冀即捕殺之邵當遷為郡守會母亡邵且埋尸于馬屋先受封然後發喪邵還至洛陽李燮行塗遇之使卒投車于溝中笞捶亂下大署帛于其背曰諂貴賣友貪官埋母袁粲門人陸超門人南史袁粲之誅也小兒數歲乳母將投粲門人狄靈慶靈慶曰吾聞出郎君者有厚賞今袁氏已滅汝匿之尚誰為乎遂抱以首乳母號泣呼天曰公昔與汝有恩故冒難歸汝奈何欲殺郎君以求小利若天地鬼神有知我見汝滅門此兒死後靈慶常見兒騎大㲰狗戲如平常經年餘鬬場忽見一狗走入其家遇靈慶於庭噬殺之妻子皆沒此狗即袁郎所常騎也又陸超之吳人以清靜雅為晉安王子懋所知子懋既敗勸其逃亡答曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田橫客笑人玄邈等以其義欲因將還都而超之亦端坐待命超之門人姓周者謂殺超之當得賞乃伺超之坐自後斬之頭墜而身不僵玄邈嘉其節厚為殯斂周又助舉棺未出户棺墜政壓其頭折即死聞之者莫不以為天道焉自謂侯身自稱三公自稱僕射三國志毛嘉魏明帝后父封博平鄉侯甚蚩騃語輒自謂侯身北史胡慶為左僕射每與人言自稱僕射南史張敬兒亦自稱三公奪我鳳池穢我鳳池晉書荀朂守尚書令朂久在中書專管機事及失之甚惘惘悵悵或有賀之者朂曰奪我鳳凰池諸君賀我邪北史齊朝宰相善始令終唯趙彥深一人然諷朝廷以子叔堅為中書侍郎頗招物議時馮子琮子慈明祖珽子君信並相繼居中書故時語云馮祖及趙穢我鳳池圖鹵簿自玩置鼓吹自娛南史劉韞在湘州雍州使善畫者圖其出行鹵簿羽儀常自披玩嘗以圖示征西將軍蔡興宗興宗戲之陽若不解畫者指韞問之曰此何人而在輿韞曰政是我其庸底類如此又胡僧祐拜領軍將軍以所加鼓吹恆置齋中對之自娛人曰此是羽儀公名望隆重不宜若此答曰我性愛之恆須見耳出遊亦以自隨人士笑之指韞形問韞見上圖絢形問絢南史康絢身長八尺容貌絶倫雖居顯職猶習武藝帝幸德陽殿戲馬敇絢馬射撫弦貫的觀者悅之其日上使畫工圖絢形遣中使持以問絢曰卿識此圖不晉武帝就和嶠求李齊武帝就虞悰求味晉書和嶠性至儉家有好李帝求之不過數十王濟候其上直率少年詣園共啖畢伐樹而去又王戎家有好李恐人得種恆鑽其核其吝嗇頗類嶠云南史武帝幸芳林園就虞悰求味悰獻粣及雜肴數十輿大官鼎味不及也上就悰求諸飲食方悰祕不出上醉後體不快悰乃獻醒酒鯖鮓一方而已杜畿不與劉勳大棗桓崖不與桓玄好桃杜氏新書平虜將軍劉勳為太祖所親貴震朝廷嘗從杜畿求大棗畿拒以他故後勳伏法太祖得其書嘆曰杜畿可謂不媚於竈者也稱畿功美以下州郡曰昔仲尼之於顔子美言不能不嘆既情愛發中又宜率馬以驥今吾亦冀衆人仰高山慕景行也世説桓玄素輕桓崖崖在京下有好挑玄連就求之遂不得佳者玄與殷仲文書以為嗤笑曰德之休明肅慎貢其楛矢如其不爾籬壁間物亦不可得使裂餅緣命撤去之客削瓜皮乃取食之北史王羆性儉率不事邊幅嘗有臺使至羆為設食使乃裂去薄餅緣羆曰耕種收穫其功已深舂㸑造成用力不少爾之選擇當是未飢命左右撤去之使者愕然大慙客與王羆食瓜客削瓜皮侵肉稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚愧色性又嚴急嘗有吏挾私陳事者羆不暇命捶撲乃手自取鞾履持以擊之雞卵賦人雞子寄抱南史謝朏為吳興太守以雞卵賦人收雞數千朝野僉載益州新昌縣令夏侯彪之初下車問里正曰雞子一錢幾顆曰三顆彪之乃遣數十千錢令買三萬顆謂里正曰吾未要且寄雞母抱之遂成三萬頭雞經數月長成令便與我賣却一雞三十錢半年之間成九十萬又問竹笋一錢幾莖一錢五莖又取十千錢付之買得五萬莖謂里正曰吾未須笋且林中養之至秋竹成每一莖十錢遂成五十萬懷中得二銅疊髻上得金叵羅北史祖珽性不羇放縱曾至膠州刺史司馬世雲家飲酒遂藏銅疊二面厨人請搜諸客果於珽懷中得之又珽為神武中外府功曹神武宴寮屬於坐失金叵羅竇太令飲酒者皆脫帽於珽髻上得之評曰若珽者可謂有竊疾矣覔米為作佳傳遺金請作佳傳晉書丁儀丁廙有盛名於魏陳夀謂其子曰可覔千斛米見與當為尊公作佳傳丁不與之竟不立傳北史爾朱文略嘗大遺魏收金請為父作佳傳收因論榮比韋彭伊霍又魏收在神武時為太常少卿修國史得陽休之助因謝休之曰無以謝德當為卿作佳傳評曰南董所為稱良史者死不足以惕之也死不足以惕之利何足以動之蓋自史家沒於利而世鮮實録已不以粲集示之便取韋傳擲之顏氏家訓云吾入鄴與博陵崔文彥交遊嘗説王粲集中難鄭玄尚書事崔轉為諸儒道之始將發口懸見排蹙云文集止有詩賦銘誄豈當論經書事乎且先儒之中未聞有王粲也崔笑而退竟不以粲集示之又魏收之在議曹與諸博士議宗廟事引據漢書博士笑曰未聞漢書得證經術魏便忿怒都不復言取韋玄成傳擲之而起博士一夜共披尋之逹明乃來謝曰不謂玄成如此學也初不識士衡吾不識太傅南史劉義綦封營道縣侯凡鄙無識始興王濬嘗謂曰陸士衡詩云營道無烈心其何意苦阿父如此義綦曰下官初不識士衡何忽見苦其庸塞皆然又張敬兒欲移羊叔子墮淚碑於其處置臺綱紀諫云此羊太傅遺德不宜遷動敬兒曰太傅是誰我不識誤解蹲鴟誤用蹲鴟大唐新語東宫衛佐馮光震入院校文選兼復注釋解蹲鴟云今之芋子即是著毛蘿蔔院中學士向外説蕭嵩聞之撫掌大笑顏氏家訓江南有一權貴讀誤本蜀都賦注解蹲鴟芋也而為羊字後有人餉羊肉答書云損惠蹲鴟舉朝驚駭不解事義久後尋繹方知如此呼鳻為鶡雀呼蓴為露葵顏氏家訓竇如同從河州來得一青鳥馴飬愛玩舉族呼之為鶡吾曰鶡出上黨數曽見之色並黃黑無駁雜也故陳思王鶡賦云揚玄黃之徑羽試檢説文鳻音分雀似鶡而青出羌中集韻音分此疑頓釋又梁氏有蔡朗諱純既不涉學遂呼蓴為露葵面牆之徒遞相倣效承聖中遣一士大夫聘齊齊主客郎李恕問梁使曰江南有露葵否答曰露葵是蓴水鄉所出卿今食者緑葵菜耳以杖杜問韋陟以㺯麞慶薑度舊唐書李林甫典選部時選人嚴逈判語有用杕杜二字者林甫不識杕字謂吏部侍郎韋陟曰此云杖杜何也陟俯首不敢言又太常少卿薑度李林甫舅子度妻誕子林甫手書慶之曰聞有㺯麞之慶客視之掩口㺯麞宰相見上伏獵侍郎舊唐書户部侍郎蕭炅讀伏臘曰伏獵張九齡曰省中豈得有伏獵侍郎逆為干字先為吉字北史庫狄干不知書署名為干字逆上畫之時人謂之穿鎚又武將王周者署名先為吉而後成外駢志卷七
