body:
  text: 駢志卷九明陳禹謨撰戊部上設壇具禮設壇授䇿史記漢王欲召韓信拜之蕭何曰王素慢無禮今拜大將如呼小兒耳此乃信所以去也王必欲拜之擇良日齊戒設壇場具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃信也南史陳宣帝遣謁者蕭淳就壽陽授䇿吳明徹于城南設壇士卒二十萬陳旗鼓戈甲登壇拜受成禮而退一軍皆驚詔出大驚一軍盡驚漢書蕭何薦韓信于漢王曰王計必東能用信信即留不能用信信終亡耳王曰吾為公以為將何曰雖為將信不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素嫚無禮今拜大將如召小兒此乃信所以去也王必欲拜之擇日齊戒設壇場具禮乃可王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚蜀志先主為漢中王遣魏延治成都當得重將以鎮漢中衆論以為必在張飛飛亦以心自許先主乃拔延為督漢中鎮逺將軍領漢中太守一軍盡驚先主大㑹羣臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王拒之偏將十萬之衆至請為大王吞之先主稱善舊唐書永貞元年冬劉闢阻兵朝議討伐宰相杜黃裳以為獨任髙崇文可以成功元和元年春拜檢校工部尚書兼御史大夫充左神䇿行營節度使兼統左右神䇿奉天麟游諸鎮兵以討闢時宿將專征者甚衆人人自謂當選及詔出大驚崇文在長安城練卒五千常若寇至及是中使至長武卯時宣命而辰時出師五千器用無闕者勾踐式怒蛙齊莊避螳螂韓非子越王勾踐慮伐吳欲人之輕死也出見怒蛙乃為之式御者曰何為式王曰蛙有氣如此可無為式乎士人聞之曰蛙有氣王猶為式況士人之有勇者乎是歲人有自徑死以其頭獻者淮南子齊莊王出獵有螳蜋舉足將摶其輪問其御曰此何蟲對曰此螳蜋也其為蟲也知進而不知却不量力而輕就敵公曰此為人必為天下武勇矣回車而避之勇武聞之知所盡死矣抱朴子晋文回輪於勇蟲而壯士雲赴勾踐曲躬于怒蛙而戎卒輕死手指周泰創㾗手拭凌統創處吳志孫權案行至濡須塢因㑹諸將大為酣樂權自行酒到周泰前命泰解衣權手自指其創㾗問其所起泰輒記昔戰鬬處以對畢使復服歡宴極夜其明日遣使者授以御蓋又凌統字公績時孫權徹軍前部已發魏將張遼能奄至津北權使追還前兵兵去已逺勢不相及凌統率親近三百人陷圍扶扞權出敵已毁橋橋之屬者兩版權䇿馬驅馳統復還戰左右盡死身亦被創所殺數十人度權已免乃還橋敗路絶統被甲濳行權既御船見之驚喜統痛親近無反者悲不自勝權引袂拭之謂曰公績亡者已矣茍使卿在何患無人吳書曰統創甚權遂留統於舟盡易其衣服其創賴得卓氏良藥故得不死見士卒負擔帝分其尤重見大將中矢帝親為吮血舊唐書太宗至遼東城下見士卒負擔以填塹者帝分其尤重者親于馬上持之從官悚動爭齎以送城下又太宗尅遼東師次白崖城命攻之右衛大將軍李思摩中弩矢帝親為吮血將士聞之莫不感勵欲為治第辭以胸奴不滅欲為造第辭以天下未平漢書上欲為霍去病治第令視之對曰胸奴不滅無以家為也北史周明帝以竇熾前朝舊臣勳望兼重欲獨為造第熾辭以天下未平干戈未偃不宜輒發徒役北邊良將北間驍將史記李牧者趙之北邊良將也常居代鴈門備胸奴北史賀拔勝多所克捷沔北蕩為丘墟梁武帝敕其子雍州刺史續曰賀拔勝北間驍將爾宜慎之勿與爭鋒魏尚為雲中守胸奴不敢近雲中廉范為雲中守胸奴不復向雲中史記馮唐曰魏尚為雲中守其軍市租盡以饗士卒私養錢五日一椎牛饗賔客軍舍吏人是以胸奴逺避不近雲中之塞虜曾一入尚率車騎擊之所殺甚衆後漢書廉范為雲中太守㑹胸奴大入塞烽火日通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵㑹日暮令軍士各交縳兩炬三頭爇火營中星列虜遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由此不敢復向雲中軍中號大樹將軍陛下之大樹將軍後漢書馮異為人謙退不伐行與諸將相逢輒引車避道進止皆有表識軍中號為整齊每所止舍諸將並坐論功異嘗獨屏樹下軍中號曰大樹將軍南史馮道根性謹厚木訥少言為將能檢御部曲所過村陌將士不敢虜掠每征伐終不言功其部曲或怨非之道根喻曰明公自鑒功之多少吾將何事武帝嘗指道根示尚書令沈約美其口不論勳約曰此陛下之大樹將軍也幕南無王庭磧南無虜庭漢書驃騎將軍霍去病出代二千餘里與左王接戰漢兵得胡首虜凡七萬餘人左王將皆遁走驃騎封于狼居胥山禪姑衍臨翰海而還是後胸奴逺遁幕南無王庭北史楊素為行軍元帥出雲中擊突厥連破之突厥走追至夜擊之將復戰恐賊越逸令其騎稍後于是親將兩騎并降突厥二人與虜並行不之覺也候其頓舍未定輒後騎掩擊大破之自是突厥逺遁磧南無復虜庭衛青七出擊胸奴去病六出擊胸奴漢書大將軍衛青凡七出擊胸奴斬捕首虜五萬餘級一與單于戰收河南地置朔方郡再益封凡萬六千三百戶其禆將及校尉侯者九人為特將者十五人又驃騎將軍霍去病凡六出擊胸奴其四出以將軍斬首虜十一萬餘級渾邪王以衆降數萬開河西酒泉之地西方益少胡冦四益封萬七千七百戶其校尉吏有功侯者六人為將軍者二人吳子顔八戰八尅唐休璟六戰六尅後漢書吳漢字子顔與公孫述戰于廣都成都之間八戰八克舊唐書吐蕃大將麴莽布支率騎數萬冦凉州入自洪源谷將圍昌松縣唐休璟以數千人往擊之臨陳登髙望見賊衣甲鮮盛謂麾下曰自欽陵死贊婆降麴莽布支新知賊兵欲曜威武故其國中貴臣酋豪子弟皆從之人馬俱精不習軍事吾為諸君取之乃披甲先登與賊六戰六克太公隂謀太公隂書太公隂符論衡𫝊書或稱武王伐紂太公隂謀食小兒以丹令身純赤長大教言殷亡殷民見兒身赤以為天神及言殷亡皆謂商滅兵至牧野晨舉脂燭姦謀惑民權掩不備周之所諱也世謂之虛漢取天下無此虛言武成之篇言周伐紂血流漂杵以武成言之食兒以丹晨舉脂燭殆且然矣六韜武王問太公曰引兵深入諸侯之地三軍卒有緩急或利或害吾將以近通逺從中應外以給三軍之用為之奈何太公曰主與將有隂符凡八等有大勝克敵之符長一尺破軍擒將之符長九寸降城得邑之符長八寸却敵報逺之符長七寸警衆堅守之符長六寸請糧益兵之符長五寸敗軍亡將之符長四寸失利亡士之符長三寸諸奉使稽留者若符事泄聞者告者皆誅之八符者主將祕聞所以隂通言語不泄中外相知之術敵雖聖智莫之能識武王曰善哉又武王問太公曰引兵深入諸侯之地主將欲合兵行無窮之變圖不測之利其事煩多符不能明相去遼逺言語不通為之奈何太公曰諸有隂事大慮當用書不用符主以書問將將以書問主書皆一合而再離三發而一知者言三人人操一分相參而不使知情也此謂隂書敵雖聖智莫之能識武王曰善哉齊桓公與管仲謀伐莒謀未發而國人遍聞齊桓公與管仲謀伐衛朝方罷而衛姬請罪管子桓公與管仲闔門而謀伐莒未發也而已聞於國矣桓公怒謂管仲曰寡人與仲父闔門而謀伐莒未發也而已聞於國其故何也管仲曰國必有聖人桓公曰然夫日之役者有執席食以視上者必彼是邪於是乃令之復役母復相代少焉東郭郵至桓公令儐者延而上與之分級而上問焉曰子言伐莒者乎東郭郵曰然臣也桓公曰寡人不言伐莒而子言伐莒其故何也東郭郵對曰臣聞之君子善謀而小人善意臣意之也桓公曰子奚以意之東郭郵曰夫欣然喜樂者鐘鼓之色也夫淵然清靜者縗絰之色也漻然豐滿而手足拇動者兵甲之色也日者臣視二君之在臺上也口開而不闔是言莒也舉手而指勢當莒也且臣觀小國諸侯之不服者唯莒於是臣故曰伐莒桓公曰善哉以微射明此之謂乎子其坐寡人與子同之吕氏春秋齊桓公合諸侯衛人後至公朝而與管仲謀伐衛退朝而入衛姬望見君下堂再拜請衛君之罪公曰吾於衛無故子曷為請對曰妾望君之入也足髙氣彊有伐國之志也見妾而有動色伐衛也明日君朝揖管仲而進之管仲曰君舍衛乎公曰仲父安識之管仲曰君之揖朝也恭而言也徐見臣而有慙色臣是以知之桓公之所以匿者不言也今管子乃以容貌音聲夫人乃以行步氣志桓公雖不言若暗夜而燭燎也范應侯說秦王逺交而近攻封德彝請唐宗逺交而近攻史記范睢初見秦王未敢言內先言外事以觀秦王之俯仰因進曰夫穰侯越韓魏而攻齊綱壽非計也少出師則不足以傷齊多出師則害于秦臣意王之計欲少出師而悉韓魏之兵也則不義矣今見與國之不親也越人之國而攻可乎其于計踈矣王不如逺交而近攻得寸則王之寸也得尺亦王之尺也今釋此而逺攻不亦繆乎唐書統葉護可汗來請昏帝與羣臣謀曰突厥去我逺緩急不可仗可與昏乎封德彞曰計今之便莫若逺交而近攻請聽昏以怖北狄待我計定而後圖之帝乃許昏蕭何獨收圖書𤣥齡獨收人物漢書沛公至咸陽諸將皆爭走金帛財物之府分之蕭何獨先入收秦丞相御史律令圖書藏之沛公具知天下厄塞戶口多少彊弱處民所疾苦者以何得秦圖書也唐書房𤣥齡征伐未嘗不從衆爭取怪珍𤣥齡獨收人物致幕府與諸將密相申結人人願盡死力王嘗曰漢光武得鄧禹門人益親今我有𤣥齡猶禹也陳平六出竒計世莫得聞荀攸十二竒䇿世不盡聞漢書陳平自初從至天下定後嘗以護軍中尉從擊臧荼陳豨黥布凡六出竒計輒益邑封竒計或頗祕世莫得聞也魏志荀攸字公逹與鍾繇善繇言我每有所行反覆思維自謂無以易以咨公逹輒復過人意公逹前後凡畫竒䇿十二惟繇知之繇撰集未就㑹薨故世不得盡聞也去病對漢武云顧方略何如晋武謂馬隆云顧方略何如漢書霍去病為人少言不泄有氣敢往上嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法晋書武帝每有西顧之憂臨朝而歎曰誰能為我討此虜通凉州者乎朝臣莫對馬隆進曰陛下若能任臣臣能平之帝曰必能滅賊何為不任顧卿方略何如耳隆曰陛下若能任臣當聽臣自任秉白旄以麾尚書把白旄以麾鬻子武王率兵車以伐紂紂虎旅百萬陳于商郊起自黃鳥至于赤斧三軍之士靡不失色武王乃命太公把白旄以麾之紂軍反走任彥升令曰白羽一麾黃鳥底定甲既鱗下軍亦瓦解武侯捉羽扇顧榮麾羽扇語林諸葛武侯與晉宣帝戰于渭濱將戰武侯乘素輿著葛巾捉白羽扇指麾三軍衆軍皆隨其進止晉中興書廣陵相陳敏反顧榮與甘卓等潜謀起兵攻敏榮發橋斂舟于南岸敏率萬餘人出不獲濟榮麾以羽扇其衆潰散韋睿執角如意以麾軍唐永把角如意以指麾南史韋睿與魏將楊大眼戰大眼以勇冠三軍所向皆靡睿結車為陳大眼聚騎圍之睿以彊弩二千一時俱發洞甲穿中殺傷者衆矢貫大眼右臂亡魂而走明旦中山王元英身率衆來戰睿乘素木輿執白角如意以麾軍一日數合英甚憚其彊魏軍又夜來攻城飛矢雨集睿子黯請下城以避箭睿不許軍中驚睿于城上厲聲呵之乃定北史唐永少耿介有將帥才讀班超傳慨然有天下之志永善馭下士人競為之用臨陳常著帛展𥜗把角如意以指麾處分辭色自若在北地四年與賊數十戰未嘗敗北在軍常輕裘緩帶臨陳常著帛展𥜗見上晉書羊祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛者不過十數人斛律金望塵知敵周德威望塵知敵北史斛律金性敦直善騎射行兵用胸奴法望塵知馬步多少嗅地知軍度逺近五代史周德威字鎮逺為人勇而多智能望塵以知敵數其狀貌雄偉笑不改容人見之凛如也其小字陽五當梁晉之際周陽五之勇聞天下逹奚武具知敵情阿六拔揣知敵情北史周文進圍𢎞農遣逹奚武從兩騎覘候武與其候騎遇即交戰斬六級獲三人而反齊神武趣沙苑周文復遣武覘之武從三人皆衣敵人衣至暮下馬濳聽其軍號歷營若警夜者有不如法者往往撻之具知敵情以告周文遂從攻之又韓果字阿六拔善伺敵虛實揣知情狀有濳匿溪谷欲為間偵者果登髙望之所疑處往必有獲周文由是以果為虞候都督每從征行常領候騎晝夜巡察略不眠寢從平竇泰於潼關周文因其規畫軍以勝返賞真珠金帶一條射矢聊城飛矢易陽魯連子燕將攻下聊城人或讒之燕燕將懼誅因保守聊城不敢歸齊田單攻聊城歲餘士卒多死而聊城不下魯連乃為書約之以矢射城中遺燕將燕將見魯連書泣三日乃自殺魏志太祖既圍鄴破邯鄲易陽令韓範僞以城降而拒守太祖遣徐晃攻之晃至飛矢城中為陳成敗範悔晃輒降之既而言於太祖曰二袁未破諸城未下者傾耳而聽今日滅易陽明日皆死守恐河北無定時也願令降易陽以示諸城則莫不望風太祖善之過百萬之衆勝十萬之衆抱朴子昔魯仲連以書下聊城是分毫之力過百萬之衆也晋書荀朂與裴秀羊祜共管機密時將發使聘吳並遣當時文士作書與孫皓帝用朂所作皓既報命和親帝謂朂曰君前作書使吳思順勝十萬之衆也一紙賢于十從事一言賢于十萬衆一言踰于十萬師晋書劉𢎞傳𢎞每有興廢手書守相丁寧欵密所以人皆感悅咸曰得劉公一紙書賢于十部從事北史世祖南伐魏釗直侍左右師次進南諸城未有下者釗乃進曰臣請間入城內見其豪右宣逹聖心示以誠信必當大小相率面縳請罪陛下拔其英楚而任之此外諸城可不勞兵而自定釗夜入城中示以危亡之期開以生全之路城中大小欣悅明旦開門出降自北而南望塵欵附世祖謂釗曰卿之一言踰于十萬之師揚我信義播於四表實卿一人之力孔帖馮盎或告盎叛太宗詔蘭謨發江淮甲卒將討之魏徴諫曰王者兵不宜為蠻夷動勝之不武不勝為辱盎反未狀當懷之以德盎懼必自來帝乃遣散騎常侍韋叔詣喻盎盎遣智戴入侍帝曰徴一言賢于十萬衆食其說田廣韓信度兵夜襲唐儉諭頡利李靖督軍疾進漢書韓信方擊齊酈食其謂漢王曰齊人多變詐足下雖遣數十萬師未可以歲月破也臣請得奉明詔說齊王使為漢而稱東藩上曰善乃從其畫復守敖倉而使食其說齊王田廣以為然乃聽食其罷歷下兵守戰備與食其日縱酒韓信聞食其馮軾下齊七十餘城乃夜度兵平原襲齊齊王田廣聞漢兵至以為食其賣已乃烹食其引兵走舊唐書李靖為定襄道行軍總管往迎頡利頡利雖外請朝謁而濳懷猶豫其年二月太宗遣鴻臚卿唐儉將軍安修仁慰諭靖揣詔使到彼虜必自寬遂選精騎一萬齎二十日糧引兵自白道襲之張公謹曰詔許其降行人在彼未宜計擊靖曰此兵機也時不可失韓信所以破齊也如唐儉等輩何足可惜督軍疾進師至隂山遇其斥候千餘帳皆俘以隨軍頡利見使者大悅不虞官兵至也靖軍將逼其牙帳十五里虜始覺頡利畏威先走部衆因而潰散獨留屯田始興屯田漢書趙充國上屯田奏上報曰皇帝問後將軍言欲罷騎兵萬人留田即如將軍之計虜當何時伏誅兵當何時得决熟計其便復奏充國上狀曰蠻夷習俗雖殊于禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草愁于寄託逺遁骨肉離心人有畔志而明主般師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵决可朞月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也上卒詔罷兵獨充國留屯田魏志建安元年用棗祇韓浩等議始興屯田魏書曰自遭荒亂率之糧穀諸軍並起無終歲之計饑則冦掠飽則棄餘瓦解流離無敵自破者不可勝數袁紹之在河北軍人仰給桑椹袁術在江淮取給蒲螺民人相食州里蕭條公曰夫定國之術在于彊兵足食秦人以急農兼天下孝武以屯田定西域此先代之良式也是歲乃募民屯田許下得榖百萬斛于是州郡例置田官所在積榖征伐四方無運糧之勞遂兼滅羣賊克平天下郭元振以誠信待娑葛郭子儀以至誠感回紇舊唐書郭元振風神偉壯而善於撫御時西突厥首領烏質勒部落强盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老不勝寒苦㑹罷而死其子娑葛以元振故殺其父謀勒兵攻之副使御史中丞解琬知其謀勸元振夜遁元振曰吾以誠信待人何所疑懼且深在寇庭遁將安適乃安卧帳中明日親入虜帳哭之甚哀行弔贈之禮娑葛乃感其義復與元振通好因遣使進馬五千匹及方物又郭子儀自河中至屯於涇陽而虜騎已合子儀一軍萬餘人而雜虜圍之數重子儀率甲騎二千出沒于左右前後虜見而問曰此誰也報曰郭令公也回紇曰謂令公亡矣不然何以至此令公誠存安得而見之子儀將出諸將諫曰戎狄之心不可信也請無往子儀曰虜有數十倍之衆今力固不敵且至誠感神况虜輩乎諸將曰請選鐵騎五百衛從子儀曰適足以為害也乃傳呼曰令公來虜初疑持滿注矢以待之子儀以數十騎徐出免胄而勞之曰安乎久同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其酋領各飲之酒與之羅錦歡言如初搆戎使自讎敵搆虜使相猜疑魏志田豫以戎狄為一非中國之利乃先搆離之使自為讎敵互相攻伐素利違盟出馬千匹與官為比能所攻求援於豫豫恐遂相兼併為害滋深宜救善討惡示信衆敵單將鋭卒深入虜庭胡人衆多鈔軍前後斷絶歸路豫乃進軍去虜十餘里結屯營多聚牛馬糞然之從地道引去胡見烟火不絶以為尚在去行數十里乃知之追豫到馬城圍之十重豫密嚴使司馬建旌旗鳴鼓吹將步騎從南門出胡人皆屬目往赴之豫將精鋭自北門出鼓譟而起兩頭俱發出虜不意虜衆散亂皆棄弓馬步走追討二十餘里僵尸蔽地又牽招為鴈門太守郡在邊陲雖有候望之備而冦鈔不斷招既教民戰陳又表復烏丸五百餘家租調使備鞍馬逺遣偵候虜每犯塞勒兵逆擊來輒摧破于是吏民膽氣日鋭荒野無虞又搆間離散使虜更相猜疑鮮卑大人步度根泄歸泥等與軻比能為隙將部落三萬餘家詣郡附塞敕令還擊比能殺比能弟苴羅侯及叛烏丸歸義侯王同王寄等大結怨讎是以招自出將歸泥等討比能於雲中故郡大破之輿曳柴而遁輿曳柴而從左傳城濮之戰狐毛設二斾而退之欒枝使輿曳柴而僞遁楚師馳之原軫郤溱以中軍公族橫擊之狐毛狐偃以上軍夾攻子西楚左師潰又平隂之役齊侯登巫山以望晋師晋人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車左實右僞以斾先輿曳柴而從之齊侯見之畏其衆也乃脫歸楚之羸誘我賊之羸餌我左傳楚武王侵隨使薳章求成焉軍于瑕以待之隨人使少師董成鬬伯比言于楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬬伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉舊唐書封常清代髙仙芝討大勃律師次賀薩勞城一戰而勝常清逐之段秀實進曰賊兵羸餌我也請備左右搜其山林遂殱其覆以虎皮蒙馬以龍文被牛左傳城濮之戰胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰史記田單被圍乃收城中得千餘牛為絳繒衣畫以五綵龍文束兵刃於其角而灌脂束葦于尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫耀燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走孫臏減竈趙奢增壘虞詡增竈史記魏與趙攻韓韓告急于齊齊使田忌將而往直走大梁魏將龎涓聞之去韓而歸齊軍既已過而西矣孫子謂田忌曰彼三晋之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趨利者蹶上將五十里而趨利者軍半至使齊軍入魏地為十萬竈明日為五萬竈又明日為三萬竈龎㳙行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃乘其步卒與其輕鋭倍日并行逐之孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃砍大樹白而書之曰龎㳙死於此樹之下于是令齊軍善射者萬弩夾道而伏期曰暮見火舉而俱發龎㳙果夜至砍木下見白書乃鑽火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎㳙自知智窮兵敗乃自剄曰遂成豎子之名又秦伐韓軍于閼與王乃令趙奢將救之兵去邯鄲三十里而令軍中曰有以軍事諫者死秦軍軍武安西秦軍鼓噪勒兵武安屋瓦盡振軍中候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益增壘秦間來入趙奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也趙奢既已遣秦間乃卷甲而趨二日一夜至令善射者去閼與五十里而軍軍壘成秦人聞之悉甲而至軍士許歷請以軍事諫趙奢曰內之許歷曰秦人不意趙師至此其來氣盛將軍必厚集其陳以待之不然必敗趙奢曰請受令許歷曰請就鈇質之誅趙奢曰胥後令邯鄲許歷復請諫曰先據北山上者勝後至者敗趙奢許諾即發萬人趨之秦兵後至爭山不得上趙奢縱兵擊之大破秦軍秦軍解而走遂解閼與之圍而歸後漢書羌冦武都鄧太后以虞詡有將帥之略遷武都大守引見嘉德殿厚加賞賜羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔旁縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢逼或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增又謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示强勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中使彊弩勿發而潛發小弩羌以為矢力弱不能至并力急攻詡于是使二十彊弩共射一人發無不中羌大震退吹笳解圍吹篪退羌晋書劉琨在晋陽嘗為胡騎所圍數重城中窘迫無計琨乃乘月登樓清嘯賊聞之皆悽然長歎中夜奏胡笳賊又流涕歔欷有懷土之切向曉復吹之賊並棄圍而走洛陽伽藍記後魏河間王琛有婢朝雲善吹篪能為團扇歌隴上聲琛為秦州刺史羌叛屢討不勝琛令朝雲假為貧女吹篪而乞羌聞之皆流涕相謂曰何故捨鄉井在山谷為冦耶即相尋而降秦民語曰快馬健兒不如老嫗吹篪宗典以鞭拂帝李穆以䇿擊泰晋中興書元帝叔父東安王繇為成都王頴所害懼禍及謀出奔其夜月明禁衛甚嚴不能得去有頃天暴風雨晦冥遊者散帝乘間得脫至河陽為津吏所止從者宗典後至以馬鞭拂之謂曰舍長官禁貴人而汝亦被駐耶因大笑由是被釋北史宇文泰與侯景合戰泰馬中流矢驚逸遂失所之泰墮地東魏兵追及之左右皆散李穆下馬以䇿擊泰罵之曰籠東軍士爾曹主何在而獨留此追者不疑因以馬授泰與之俱逸檀祗語左右打五鼓梁武命僧珍打五鼓南史檀祗為廣陵相亡命司馬國璠兄弟自北徐州界濳得過淮因天隂暗夜率百許人緣廣陵城入呌喚直上㕔事祗被射傷股語左右曰賊乘間得入欲掩我不備但打五鼓誤之曉必走矣賊聞鼓鳴直謂為曉乃奔散又張𢎞䇿傳時東昏餘黨孫文明等夜燒尚書省及閣道雲龍門前軍司馬吕僧珍直殿省帥羽林兵邀擊不能却上戎服御前殿謂僧珍曰賊夜來是衆少曉則走矣命打五鼓賊謂已曉乃散官軍捕文明斬于東市戮揚干僕格舍中兒左傳晋侯之弟揚干亂行于曲梁魏絳戮其僕附又晋中行穆子敗無終及羣狄于太原崇杜注崇聚也卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以狥後漢書祭遵為門下史從征河北為軍市令舍中兒犯法遵格殺之光武謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也取民家一笠者斬折逆旅匕箸者斬蜀志吕蒙約令軍中不得干歷人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧官鎧雖公蒙猶以為犯軍令不可以鄉里故而廢法遂垂涕斬之于是軍中震栗道不拾遺舊唐書髙崇文軍至興元軍中有折逆旅之匕箸者斬之以狥務飭井竈圊溷藩籬障塞好治官府次舍橋梁道路袁子或問諸葛亮所至營壘井竈圊溷藩籬障塞皆應繩墨一月之行去之如始至勞費而徒為飾好何也袁子曰蜀人輕脫亮故堅用之曰何以明其然也袁子曰亮治實而不治名志大而所欲逺非求所速者也又或問亮好治官府次舍橋梁道路此非急務何也袁子曰小國賢才少故欲其尊嚴也亮之治蜀田疇辟倉廪實器械利蓄積饒朝㑹不譁路無醉人夫本立故末治有餘力而後及小事此所以勸其功也竹頭木屑悉令舉掌竹頭木屑曾無棄遺晋書陶侃為荆州時造船木屑及竹頭悉令舉掌之咸不解所以後正㑹積雪始晴㕔事前餘雪猶濕於是以屑布地及桓溫伐蜀又以侃所貯竹頭作丁裝船其綜理微密皆此類也舊唐書王鍔長於部領程作有法軍州所用竹木其餘碎屑無所棄皆復為用史臣稱鍔曰竹頭木屑曾無棄遺作事有程儉而足用蒲博必得履屐亦得世說桓公將伐蜀諸賢以為未易克惟劉尹云伊必能克蜀觀其蒲博不必得則不為晋書謝𤣥傳于時苻堅强盛朝廷求文武良將安以𤣥應舉郗超知必不負時咸以為不然超曰吾嘗與𤣥共在桓公府見其使才雖履屐間亦得其任所以知之輸攻墨守諸攻郝守墨子曰公輸盤一作般為雲梯以攻宋子墨子解帶為城以牒為械公輸盤九設攻城之機變子墨子九距之公輸盤之攻械盡子墨子之守圉有餘公輸盤詘而曰吾知所以距子矣吾不言子墨子亦曰吾知子之所以距我吾不言楚王問其故子墨子曰公輸子之意不過欲殺臣殺臣宋莫能守可攻也然臣之弟子禽滑釐等三百人已持臣守圉之器在宋城上而待楚冦矣雖殺臣不能絶也楚王曰善哉吾請無攻宋矣魏略將軍郝昭築陳倉城㑹諸葛亮至圍昭不速拔昭為人雄壯少入軍為部曲督數有戰功為雜號將軍遂鎮守河西十餘年民夷畏服亮圍陳倉使昭鄉人靳詳于城外遙說之昭却曰我識卿爾箭不識也詳乃去亮自以有衆數萬而昭兵才千餘人又度東救未能便到乃進兵攻昭起雲梯衝車以臨城昭於是以火箭逆射其雲梯梯然梯上人皆燒死昭又以繩連石磨壓其衝車衝車折亮乃更為井闌百尺以射城中以土瓦填塹欲直攀城昭又于內築重牆亮又為穴欲踊出于城裏昭又于城內穿地橫截之晝夜相攻拒二十餘日亮無計救至引退詔嘉昭善守賜爵列侯及還帝引見慰勞顧謂中書令孫資曰卿鄉里乃有爾曹快人為將灼如朕復何憂乎墨子解帶為城以牒為械距公輸之攻見上郎基削木為箭剪紙為羽解明徹之圍北史梁將吳明徹攻圍海西郎基固守乃至削木為箭剪紙為羽圍解還朝僕射楊愔迎勞之曰卿本文吏遂有武略削木剪紙皆無故事班墨之思何以相過晋侯圍原命三日之糧楚莊圍宋盡七日之糧左傳晋侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降又韓非子晋文公攻原裹十日糧遂與大夫期十日至原十日而原不下擊金而退罷兵而去士有從原中出者曰原三日即下矣羣臣左右諫曰夫原之食竭力盡矣君姑待之公曰吾與士期十日不去是亡吾信也得原失信吾不為也遂罷兵而出原人聞曰有君如彼其信也可無歸乎乃降公衛人聞曰有君如彼其信也可無從乎乃降公孔子聞而記之曰攻原得衛者信也韓詩外傳楚莊王圍宋有七日之糧曰盡此而不尅將去而歸於是使司馬子反乘闥而窺宋城宋使華元乘闥而應之子反曰子之國何若也華元曰憊矣易子而食之析骸而爨之子反曰噫甚矣憊雖然吾聞圍者之國箝馬而秣之使肥者應客今何吾子之情也華元曰吾聞君子見人之困則矜之小人見人之困則幸之吾望見吾子似于君子是以情也子反曰諾子其勉之矣吾軍有七日糧爾揖而去子反告莊王莊王曰雖然吾子今得此而歸爾子反曰王請處此臣請歸耳王曰子去我而歸吾孰與處乎此吾將從子而歸遂師而歸君子善其平已也華元以誠告子反得以解圍全二國之命翦此而朝食破之然後食左傳師陳於鞍邴夏御齊侯逢丑父為右晋解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之郤克傷于矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注後漢賈復從擊青犢于射犬大戰至日中賊陳堅不郤光武傳召復曰吏士皆飢可且朝飯復曰先破然後食耳于是被羽先登所向皆靡賊乃敗走諸軍咸服其勇舟中指可掬城上鏃可拾左傳邲之戰楚人乘晋軍桓子不知所為鼓于軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也又獻帝紀天子走陜北渡河使李樂具船天子步行趨河岸岸髙不得下董承等謀欲以馬羈相續以繫帝腰時中宫僕伏德扶中宫一手持十匹絹乃取德絹連續為輦行軍校尉尚𢎞多力令𢎞居前負帝乃得下登船其餘不得渡者甚衆復遣船收追不得渡者皆爭攀船船上人以刃櫟斷其指舟中之指可掬唐書李訴以精騎夜襲蔡坎垣入之戍者不知也明日燒其門民相率抱薪增火王師縱射城上鏃可拾也王翦度用伐荆兵數奉世度用破羌兵數史記秦始皇問李信吾欲攻取荆于將軍度用幾何人而足李信曰不過用二十萬人始皇問王翦王翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果勢壯勇其言是也遂使李信及蒙恬將二十萬南伐荆荆人大破李信軍入兩壁殺七都尉始皇聞之大怒自馳如潁陽見謝王剪翦曰大王必不得已用臣非六十萬人不可始皇曰為聽將軍計耳于是王翦將兵六十萬人代李信擊荆荆聞王翦益兵而來乃悉國中兵以拒秦王翦至堅壁而守之荆數挑戰而秦不出乃引而東翦因舉兵追之令壯士擊大破荆軍漢書馮奉世言于宣帝曰羌虜近在竟內背畔不以時誅亡以威制逺蠻臣願帥師討之上問用兵之數對曰反虜無慮三萬人法當倍用六萬人然羌戎弓矛之兵耳器不犀利可用四萬人一月足以决丞相御史兩將軍皆以為民方收斂時未可多發萬人屯守之且足奉世曰少發師而曠日與一舉而疾决利害相萬也固爭之不能得有詔益二千人于是遣奉世將萬二千人以將屯為名前軍到降同阪先遣校尉在前與羌爭地利又别遣校尉救民于廣陽谷羌虜盛多皆為所破殺兩校尉奉世具上地形部衆多少之計願益三萬六千人乃足以決事書奏天子大為發兵六萬餘人十月兵畢至隴西十一月並進羌虜大破斬首數千級餘皆走出塞樊噲願得十萬衆橫行胸奴中臧宫願得五千衆立功胸奴中漢書單于嘗為書嫚吕太后太后怒召諸將議之上將軍樊噲曰臣願得十萬衆橫行胸奴中諸將皆阿吕太后以噲言為然季布曰樊噲可斬也夫以髙帝兵三十萬困於平城噲時亦在其中今噲奈何以十萬衆橫行胸奴中面謾且秦以事胡陳勝等起欲搖動天下是時殿上皆恐太后罷朝不復議擊胸奴事後漢書臧宫以謹信質朴故常見任用後胸奴饑疫自相分爭帝以問宫宫曰願得五千騎以立功帝曰常勝之家難以慮敵吾方自思之李將軍不立部曲史萬歲不修營伍漢書程不識故與李廣俱以邊太守將屯及出擊胡而廣行無部曲行陳就善水草頓舍人人自便不擊刁斗自衛莫府省文書然亦逺斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁而其士亦佚樂為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然胸奴畏廣士卒多樂從而苦程不識北史史萬歲不修營伍令士卒各隨所安無警夜之備虜亦不敢犯臨陳對敵應變無方立幟壁中見者以為趙將破舉幟城上見者以為唐兵登漢書韓信背水之戰信出竒兵二千騎者候趙空壁逐利即馳入趙壁皆拔趙旗幟立漢赤幟二千趙軍已不能得信張耳等欲還歸壁壁皆漢赤幟大驚以漢為皆已破趙王將矣遂亂遁走趙將雖斬之弗能禁于是漢兵夾擊破虜趙軍斬成安君泜水上禽趙王歇舊唐書太宗臨白崖城西北城主孫伐音潛遣使請降曰臣已願降其中有二者詔賜以旗幟曰必降建之城上伐音舉幟于城上髙麗以為唐兵登也乃悉從亞夫堅卧不起吳漢堅卧不動漢書吳方攻梁梁急請救周亞夫引兵東北走昌邑深壁而守梁王使使請亞夫亞夫守便宜不往梁上書言景帝景帝詔使救梁亞夫不奉詔堅壁不出而使輕騎兵弓髙侯等絶吳楚兵後食道吳楚兵乏糧饑欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅卧不起頃之復定吳奔壁東南陬亞夫使備西北已而其精兵果奔西北不得入吳楚既餓乃引而去亞夫出精兵追擊大破吳王濞後漢書吳漢率建威大將軍耿弇漢中將軍王常等擊富平獲索二賊于平原明年春賊率五萬餘人夜攻漢營軍中驚亂漢堅卧不動有頃乃定即夜發精兵出營突擊大破其衆公孫以杖擊地元英以杖擊地後漢書公孫述初聞漢兵在平曲故遣大兵逆之及岑彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也南史魏中山王元英攻北徐州圍刺史昌義之于鍾離衆兵百萬連城四十餘武帝遣征北將軍曹景宗拒之次邵陽築壘相守未敢進帝怒詔韋睿㑹焉睿旬日而至邵陽于景宗營前二十里夜掘長塹樹鹿角截州為城比曉而營立元英大驚以杖擊地曰是何神也八日而到庸城九日而到甘城晋宣帝紀帝濳軍討孟逹八日到其城下逹告庾亮曰吾舉事八日而兵至城下何其神速也上庸城三面阻水帝渡水破其栅八道攻之斬逹首又王凌詐言吳人塞涂水請發兵以討之帝濳知其計不聽自帥中軍泛舟沿流九日而到甘城乘霧襲突厥乘雪襲蔡州舊唐書蘇定方為匡道府折衝隨李靖襲突厥頡利于磧口靖使定方率二百騎為前鋒乘霧而行去賊一里許忽然霧歇望見牙帳馳掩殺數十百人頡利及隋公主狼狽散走又李訴襲蔡州是日隂晦雨雪士卒苦寒初至張柴諸將請所止訴曰入蔡州取吳元濟也諸將失色自張柴行七十里比至懸瓠城夜半雪愈甚近城有鵝鴨池訴令驚擊之以雜其聲賊恃吳房朗山之固晏然無一人知者李祐李忠義坎墉而先登敢鋭者從之盡殺守門卒而登其門留擊柝者黎明雪亦止訴入止元濟外宅蔡吏告元濟曰城已陷矣元濟曰是洄曲子弟歸求寒衣耳俄聞訴軍號令將士云常侍傳語乃曰何常侍乃至於此田進誠焚子城南門元濟城上請罪進誠梯而下之乃檻送京師流柿投柿干寶晋紀王濬治船于蜀吾彥取其流柿以呈孫皓曰晋必有攻吳之計宜增建平兵建平不下終不敢渡江皓弗從陳後主紀後主荒于酒色不恤政事隋文帝謂僕射髙熲曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋文帝曰吾將顯行天誅何密之有使投柿于江若彼能改吾又何求投鞭折杖載記苻堅入寇有諫之者堅曰以吾之衆旅投鞭于江足斷其流又苻登聞姚萇死喜曰姚興小兒吾當折杖以笞之燧象火牛左傳吳師五戰及郢己卯楚子取其妹季芉畀我以出林注世族譜季芈畀我皆平王女也服云畀我季芉之字未知孰是涉睢杜注睢水出新城昌魏縣東南至枝江縣入江是吳王西走針尹固與王同舟王使執燧象以奔吳師杜注燒火燧繫象尾使赴吳師驚却之史記田單被圍乃收城中得千餘牛為絳繒衣畫以五采龍文束兵刃於其角而灌脂束葦于尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚所觸盡死傷乘象而戰乘騾以戰舊唐書林邑國以藤為甲以竹為弓乘象而戰王出則列象千頭馬四百匹分為前後又真臘國有戰象五千頭尤好者飼以飯肉與鄰國戰則象隊在前于背上以木作樓上有四人皆持弓箭又波斯國乘象而戰每一象戰士五百人有敗衄者則盡殺之新唐書吳少誠為申蔡光等州節度地少馬乘騾以戰號騾子軍尤悍鋭甲皆畫雷公星文以厭勝詛詈王師鬬艦入草油灌其中小船載草灌之以膏吳志時劉備以曹公所破欲引南渡江與魯肅遇於當陽遂共圖計因進住夏口遣諸葛亮詣孫權權遂遣瑜及程普等與備并力逆曹公遇於赤壁時曹公軍衆已有疾病初一交戰公軍敗退引次江北瑜等在南岸瑜部將黃蓋曰今冦衆我寡難與持久然觀操軍方連船檻首尾相接可燒而走也乃取蒙衝鬬檻數十艘實以薪草膏油灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又豫備走舸各繫大船後因引次俱前曹公軍吏士皆延頸觀望指言蓋降蓋放諸船同時發火時風盛猛悉延燒岸上營落頃之煙炎張天人馬燒溺死者甚衆軍遂敗退還保南郡南史韋睿與魏人戰魏人先於邵陽洲兩岸為兩橋樹栅數百步跨淮通道睿裝大艦使梁郡大守馮道根廬江太守裴邃秦郡太守李文釗等為水軍㑹淮水暴長睿即遣之鬬檻競發皆臨賊壘以小船載草灌之以膏縱火焚其橋風怒火盛敢死之士拔栅斷橋水又漂疾倐忽之間橋栅盡壞道根等皆身自摶戰軍人奮勇呼聲動天地無不一當百魏人大潰元英脫身遁走魏軍趨水死者十餘萬斬首亦如之其餘釋甲稽顙乞為囚奴猶數十萬睿遣報昌義之義之且悲且喜不暇答但呌曰更生更生帝遣中書郎周捨勞軍于淮上睿積所獲于軍門捨觀之謂睿曰君此獲復與態耳山等矣數百里內皆有火光數百里中皆為渡勢北史雍州刺史蕭寶寅據州反長孫承業討之楊侃請為前驅承業從之令其子子産等領騎與侃㑹于恆農北度便據石錐壁乃班告曰今且停軍于此以待步卒兼觀人情向背若送降名者各自還村候臺軍舉三烽火各亦應之以明降欵其無應烽即是不降之村理須殄戮人遂相傳告報實未降者亦詐舉烽一宿之間火光遍數百里內圍城之寇不測所以各自散歸又元皓令梁將陳慶之守北中城自據南岸爾朱榮將為還計欲更圖後舉楊侃曰若今即還人情失望未若召發人材惟多縛筏間以舟楫沿河廣布令數百里中皆為渡勢皓知防何處一旦得渡必立大功榮大笑從之于是爾朱兆等于馬渚諸楊南渡皓便南走沙城一夕而成疑城一夕而成曹瞞傳曰時公軍每渡渭輒為馬超騎所衝突營不得立地又多沙不可築壘婁子伯說公曰今天寒可起沙為城以水灌之可一夜而成公從之乃多作縑囊以運水夜渡兵作城比明城立由是公軍盡得渡渭或疑于時九月水未應凍干寶晋紀魏文帝之在廣陵吳人大駭乃臨江為疑城自石頭至于江乘車以木楨衣以葦席加采飾焉一夕而成起沙為城見上伐柳為城北史太武征蠕蠕司馬楚之與濟隂公盧中山等督運以繼大軍時鎮北將軍封咱亡入蠕蠕說令擊楚之以絶糧運蠕蠕乃遣覘楚之軍截驢耳而去有告失驢耳者楚之曰必覘賊截之為驗耳賊將至矣乃伐桞為城灌水令凍城立而賊至不可攻逼乃走散造遼水橋二日而就制六合城比明而畢北史隋工部尚書宇文愷造遼水橋不成師未得濟左屯衛大將軍麥鐵杖因而遇害帝遣何稠造橋二日而就又隋何稠初制行殿及六合城至是帝於遼左與賊相對夜中施之其城周回八里城及女垣合萬十仞上布甲士立仗建旗四隅置闕面列一觀觀下三門比明而畢髙麗望見謂若神功六旬而就一夕而成見上唐景雲三年朔方總管張仁願于河北築三受降城絶虜南寇凡六旬而三城就鹿角為營鹿角為城晋惠帝起居注王浚追石超軍于斥丘超持重不與戰以鹿角為營南史魏中山王元英攻北徐州圍刺史昌義之于鍾離衆兵百萬連城四十餘梁武帝遣征北將軍曹景宗拒之次邵陽洲築壘相守未敢進帝怒詔韋睿㑹焉賜以龍環御刀曰諸將有不用命者斬之睿自合肥徑隂陵大澤過澗谷輒飛橋以濟師人畏魏軍盛多勸睿緩行睿曰鍾離今鑿穴而處負戶而汲車馳卒奔猶恐其後而況緩乎旬日而至邵陽初帝敕景宗曰韋睿卿鄉望宜善敬之景宗見睿甚謹帝聞曰二將和師必濟矣睿于景宗營前二十里夜掘長塹樹鹿角截洲為城比曉而營立元英大驚以杖擊地曰是何神也依馬跡以築城依龜行以築城搜神記昔秦人築城于武周塞內以備胡將成而崩者數矣有馬馳走周旋反覆父老異之因依馬跡以築城城乃不崩遂以名焉寰宇記張儀築成都城城屢壞不能立忽有大龜周施行走巫言依龜行處築之城乃得立所掘處成大池龜乃復入于中龜每出則州境有賊刺史或病燒鹿角拔鹿角魏志夏侯淵拜征西將軍劉備軍陽平關淵率諸將拒之相守連年次年正月備夜燒圍鹿角淵使張郃護東圍自將輕兵護南圍備挑郃戰郃軍不利淵分所將兵半助郃為備所襲江表傳曹公出濡須臨江飲馬孫權率衆應之使甘寧領三千人為前都督權密敕寧使夜入魏軍寧乃選手下健兒百餘人徑詣曹公營使拔鹿角踰壘入營斬數十騎北軍驚駭鼓噪舉火如星寧已還入營作鼓吹稱萬歲笮馬糞而飲刺馬血而飲後漢胸奴圍耿恭于疏勒城遂于城下擁絶澗水恭于城中穿井十五丈不得水吏士渴乏笮馬糞而飲之北史竇榮定為行軍元帥率總管出凉州與虜戰髙越原兩軍相持地無水士卒渴甚至刺馬血而飲死者十二三榮定仰天太息俄而澍雨軍復振蜀遺巾幗魏遺巾幗晋書宣帝紀諸葛亮數挑戰帝不出因遺帝巾幗婦人之飾帝怒表請决戰天子不許乃遣骨鯁臣衛尉辛毗杖節為軍師以制之附又舊唐書杜伏威兵威稍盛陳稜以精兵八千討之稜不敢戰伏威遺稜婦人之服以激怒之并致書號為陳姥南史梁宗室臨川靜惠王宏武帝詔宏都督諸軍侵魏宏以帝之介弟所領器械精新軍容甚盛北人以為百數十年所未之有軍次洛口前軍剋梁城宏部分乖方多違朝制諸將欲乘勝深入宏聞魏援近畏懦不敢進魏人知其不武遺以巾幗一軍獨全兩軍獨全晋書初諺言堅不出項羣臣勸苻堅停項為六軍聲援堅不從故敗諸軍悉潰惟慕容垂一軍獨全舊唐書乾元二年王思禮領關內及潞府行營步卒三萬馬軍八千大軍潰惟思禮與李光弼兩軍獨全何為斬壯士奈何殺壯士史記韓信亡楚歸漢未得知名為連敖坐法當斬其輩十三人皆已斬次及信信乃仰視適見滕公曰上不欲就天下乎何為斬壯士滕公竒其言壯其貌釋而不斬與語大說之南史周鐵武語音傖重膐力過人便馬槊事梁河東王蕭譽以勇敢聞及王僧辨討譽于陳獲之將烹焉鐵武呼曰侯景未滅奈何殺壯士僧辨竒其言宥之馬援據鞍顧盼源懷據鞍執矟後漢書武威將軍劉向擊武陵五溪蠻夷深入軍沒馬援因復請行時年六十二帝愍其老未許之援自請曰臣尚能披甲上馬帝令試之援據鞍顧盼以示可用帝笑曰矍鑠哉是翁也北史正始中有告蠕蠕率十二萬六道並進詔源懷北征賜馬一匹細鎧一具御矟一枚懷拜受既訖乃于其庭跨鞍執矟躍馬大呼顧謂賔客曰氣力雖衰尚得如此蠕蠕雖畏壯輕老我亦未便可欺今奉朝勝之規總驍悍之衆足以擒其酋帥獻俘闕下耳許禇瞋目盼超典韋舉斧目繡魏志大祖與韓遂馬超等單馬㑹語左右皆不得從唯將許禇超負其力隂欲前突太祖素聞禇勇疑從騎是禇乃問太祖曰聞有虎侯者安在太祖顧指禇禇瞋目盼之超不敢動軍中以禇力如虎而癡故號曰虎癡是以超問虎侯至今天下稱焉又典韋好持大雙㦸與長刀等軍中為之語曰帳下壯士有典君提一雙㦸八十斤太祖征荆州至宛張繡迎降太祖甚悅延繡及其將帥置酒髙㑹太祖行酒典韋持大斧立後刃徑尺太祖所至之前韋輒舉斧目之竟酒繡及其將帥莫敢仰視趙子龍大開營門馮道根命開城門趙雲别傳曹公軍追至圍此時沔陽長張翼在雲圍內翼欲閉門拒守而雲入營更大開門偃旗息鼓公軍疑雲有伏兵引去雲擂鼓震天惟以戎弩于後射公軍公軍驚駭自相蹂踐墮漢水中死者甚多先主明旦自來至雲營圍視昨戰處曰子龍一身都是膽也作樂飲宴至暝軍中號雲為虎威將軍南史馮道根為南梁太守領阜陵城戍初到阜陵修城隍逺斥堠如敵將至者衆頗笑之道根曰怯防勇戰此之謂也修城未畢魏將党法宗傅竪眼率衆二萬奄至城下道根塹壘未固城中衆少莫不失色道根命開城門緩服登城選精鋭二百人出與魏軍戰敗之魏軍因退子龍一身都是膽見上王雅舉身悉是膽北史王雅周文時從戰芒山時大軍未利諸將皆退雅獨拒之敵人見其無繼步騎競進雅左右奮擊斬九級敵衆稍退雅乃還周文歎曰王雅舉身悉是膽也刺蛟數創截蛟數段志怪録義興郡溪渚長橋下有蒼蛟吞噉人周處執劒橋側伺久之遇出於是懸自橋上投下蛟背而刺蛟數創流血荆溪自郡渚至太湖句浦乃死晋書襄陽城北沔水中有蛟常為人害鄧遐遂拔劒入水蛟繞其足遐揮劒截蛟數段而出兩蛟繞船兩龍載舟吕氏春秋曰荆有佽飛者得寶劒涉江至中流有兩蛟繞其船佽飛拔寶劒赴江刺蛟殺之而舟中之人皆活荆王聞之仕以執圭幽明録吳猛還豫章附載客船一宿行千里同行客視船下有龍載之船不著水子羽擊兩蛟菑丘殺三蛟博物志淡臺子羽賫千金之璧渡河河伯欲之陽侯波起兩蛟夾船子羽左操璧右操劒擊蛟皆死既濟三投璧于河河伯三躍而歸之子羽毁璧而去韓詩外傳東海有勇士曰菑丘欣以勇猛聞于天下遇神淵曰飲馬其僕曰飲馬于此者馬必死曰以欣之言飲之其馬果沉菑丘欣去朝服拔劒而入三日三夜殺三蛟一龍而出雷神隨而擊之十日十夜眇其左目束胸距踊截腸復戰左傳魏犨傷于胸公欲殺之而愛其材使問且視之病將殺之魏犨束胸見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之獨異志彭樂與宇文護戰時樂飲酒乘醉深入被刺肝腸俱出內之不盡截去復入戰護兵遂敗相枕籍死者三萬餘人北史亦載伏發嘔血鼓音不衰舉褎流血呵進不止左傳鐵之戰簡子曰我伏韜嘔血鼓音不衰今日我上也東觀漢記祭遵為征虜將軍南擊蠻賊合戰中弩矢入口洞出舉褎掩口血流褎中衆見遵傷却退遵呵吏士吏士進戰皆一人擊十大破之胡景略一怒齒皆流血張睢陽每戰齧齒皆碎南史胡景略一怒自齧其齒齒皆流血舊唐書張巡神氣慷慨每與賊戰大呼誓師眥裂血流齒牙皆碎城將陷西向再拜曰臣智勇俱竭不能式遏强冦保守孤城臣雖為鬼誓與賊為厲以答明恩及城陷尹子竒謂巡曰聞君每戰眥裂嚼齒皆碎何至此耶巡曰吾欲氣吞逆賊但力不遂耳子竒以以大刀剔巡口視其齒存者不過三數巡大罵曰我為君父義死爾附逆賊犬彘也安能久哉熊渠子見寢石以為虎射之沒金養由基見寢石以為兕射之飲羽韓詩楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其為石論衡或言李廣便是熊渠未詳是否論衡養由基見寢石以為兕也射之矢飲羽漢李將軍見石以為虎而射之周李將軍見石以為兔而射之史記李廣出獵見草中石以為虎而射之中石沒鏃視之石也因復更射之終不能復入石矣北史周李逺嘗獵于莎栅見石于叢薄中以為伏兔射之鏃入寸餘視之乃石周文聞而異之賜書曰昔李將軍親有此事公今復爾可謂世載其德矣七札皆徹五甲洞貫左傳潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂于戰王怒曰大辱國詰朝爾射死藝舊唐書薛仁貴領兵擊九姓突厥于天山將行髙宗內出甲令仁貴試之上曰古之善射有穿十札者卿且射五重仁貴射而洞之髙宗大驚更取堅甲以賜之一矢復命三箭懾虜左傳晋吕錡夢射月中之退入于泥占之曰姬姓日也異姓月也必楚王也射而中之退入于泥亦必死矣及戰射共王中目王召養由基與之兩矢使射吕錡中項伏韜以一矢復命唐書髙宗時薛仁貴領兵擊九姓于天山時九姓有衆十餘萬令驍健數十人逆來挑戰薛仁貴發三矢射殺三人餘一時下馬請降仁貴恐為後患並坑殺之更就磧北安撫餘衆擒其將葉護兄弟三人而還軍中歌曰將軍三箭定天山戰士長歌入漢關九姓自此衰弱不復更為邊患魯肅植盾吕蒙持楯吳書魯肅體貌魁竒少有壯節好為竒計乃命其屬曰中國失綱冦賊橫暴淮泗間非遺種之地吾聞江東沃野萬里民富兵彊可以避害寧肯相隨俱至樂土以觀時變乎其屬皆民乃使細弱在前强壯在後男女三百餘人行州追騎至肅等徐行勒兵持滿謂之曰卿等丈夫當解大數今日天下兵亂有功弗賞不追無罰何為相逼乎又自植盾引弓射之矢皆洞貫騎既嘉肅言度不能制乃相率還又凌統怨甘寧殺其父操寧嘗備統不與相見孫權亦命統不得讐之嘗於吕蒙舍㑹酒酣統乃以刀舞寧起曰寧得雙㦸舞蒙曰寧雖能未若蒙之巧也因操刀持楯以身分之後權知統意因令寧將兵遂徙屯于半州奪矟折槊舊唐書尉遲敬德善解避矟每單騎入賊陳賊矟攢刺終不能傷又能奪取賊矟還以刺之齊王元吉亦善馬矟欲親自試命去矟刃以竿相刺敬德曰縱使加刃終不能傷請勿除之敬德矟謹當却刃元吉終不能中太宗問曰奪矟避矟何者難易對曰奪矟難乃命敬德奪元吉矟元吉執矟躍馬志在刺之敬德俄頃三奪其矟又程知節為王世充騎所逐刺槊洞過知節回身捩折其槊兼斬獲追者跳髙六尺距躍三丈南史周文育年十一能反覆游水中數里跳髙六尺與羣兒聚戲衆莫能及又黃法氍少徑捷有膽力日步行二百里能距躍三丈出入州郡中為鄉里所憚府州證康祖其夕在京朝士見鐵杖每旦恆在南史劉康祖便弓馬膐力絶人以浮蕩蒲酒為事每犯法為郡縣所録輒越屋踰墻莫之能擒夜入人家為有司所圍突圍去并莫敢追因夜還京口半夕便至明旦守門詣府州要職俄而建康移書録之府州執事者並證康祖其夕在京遂得無恙北史麥鐵杖少驍勇有膐力日行五百里陳大建中結聚為羣盜廣州刺史歐陽頠俘之以獻沒為官戶配執御繖每罷朝後行百餘里夜至南徐州踰城而入行火光劫盜旦還及牙時仍又執繖如此者十餘度物主識之州以狀奏朝士見鐡杖每旦恆在弗之信後南徐州數告變尚書蔡徴曰此可驗矣於仗下時購以百金求人送詔書與南徐州刺史鐵杖出應募賫敕而往明旦反奏事帝曰信然為盜明矣惜其勇捷誡而釋之賈勇習勇左傳晋郤克及齊師戰于鞍齊髙固入晋師桀石以投人擒之而乘其車繫桑本焉以徇齊壘曰欲勇者賈余餘勇又隋書周武帝勞宇文慶曰卿餘勇可可以賈人也九州春秋建安六年劉表攻西鄂西鄂長杜子緒帥縣男女嬰城而守時南陽功曹柏孝長亦在城中聞兵攻聲恐懼入室閉戶牽被覆頭相攻半日稍敢出面其明側立而聽二日往出戶問消息至四五日乃更負楯親鬭語子緒曰勇可習也項籍力扛鼎髙渙力扛鼎漢書項籍長八尺二寸力扛鼎才氣過人又廣陵厲王胥壯大好倡樂逸游力扛鼎空手搏熊彘猛獸北史齊上黨剛肅王渙力能扛鼎材武絶倫每謂左右曰人不可無學但要不為博士耳刮骨療毒開肉鋸骨蜀志關羽嘗為流矢所中貫其左臂後創雖愈每至隂雨骨常疼痛醫曰矢鏃有毒毒入于骨當破臂作創刮骨去毒然後此患乃除耳羽便伸臂令醫劈之時羽適請諸將飲食相對臂血流離盈于盤器而羽割炙引酒言笑自若南史長孫子彥少嘗墜馬折臂肘上骨起寸餘乃命開肉鋸骨流血數升言戲自若末年石發舉體生瘡雖親戚兄弟以為惡疾子彥曰惡疾如此難以自明世無良醫吾其死矣嘗聞惡疾蝮蛇螫之不痛試為求之當令兄弟知我乃於南山得蛇以股觸之痛楚號呌俄而腫死文帝聞之慟哭曰失我良將五代史萇從簡嘗中流矢鏃入髀骨命工取之工無良藥欲鑿其骨人皆以為不可從簡遽使鑿之工遲疑不忍下從簡叱工亟鑿左右視者皆若不勝其毒而從簡言笑自若魏文鴦勇絶人晋文鴦以勇聞魏志文欽中子俶小字鴦年尚幼勇力絶人晋書段匹磾弟文鴦常為石季龍所遮文鴦以其親兵數百人力戰破之始得入城季龍復抄城下文鴦登城臨見欲出擊之匹磾不許文鴦曰我以勇聞故百姓仗我見人被略而不救非丈夫也令衆失望誰復為我致死乎遂將壯士數十騎出戰殺胡甚多開四斛弓彎五斛弓南史魚復侯子響勇力絶人開弓四斛力數在園池中帖騎馳走竹樹下身不虧傷又晋安王子懋甚驍果能反手于臂彎五斛弓當世莫有能者持大棒前驅持大棒衝擊舊唐書髙仙芝與大食國戰敗奔逸路隘人馬魚貫而奔㑹跋汗那兵衆先奔人及馳馬塞路不克過李嗣業持大棒前驅擊之人馬應手俱斃胡等退路開仙芝獲免又祿山反兩京陷上在靈武詔李嗣業赴行在嗣業自安西統衆萬里威令肅然所過郡縣秋毫不犯至鳯翔謁見上曰今日得卿勝數萬衆事之濟否實在卿也遂與郭子儀僕固懷恩等常掎角為先鋒將嗣業每持大棒衝擊賊衆披靡所向無敵執長刀當陳而呼挾二矛䇿馬而渡舊唐書賊將李歸仁初以鋭師數來挑戰我師攢矢而逐之賊軍大至逼我追騎突入我營我師囂亂嗣業謂郭子儀曰今日之事若不以身啖冦决戰于陳萬死而冀其一生則我軍無孑遺矣嗣業乃脫衣徒搏執長刀立於陳前大呼當嗣業刀者人馬俱碎殺十數人陳容方駐前軍之士盡執長刀而出如墻而進嗣業先登奮命所向摧靡又史思明攻河陽使驍將劉龍仙率鐵騎五十臨城挑戰龍仙捷勇自恃舉右足加馬鬛上嫚罵李光弼光弼登城望顧諸將曰孰可取者僕固懷恩請行光弼曰此非大將所為歷選其次左右曰白孝德可光弼乃招孝德前問曰可乎曰可光弼問所要幾何兵孝德曰可獨往耳光弼壯之終問所欲對曰願選五十騎於軍門為繼兼請大將軍鼓譟以增氣勢他無所用光弼撫其背以遣之孝德挾二矛䇿馬絶流而渡半濟懷恩賀曰尅矣光弼曰未及何知其克懷恩曰觀其攬跂便辟可萬全者龍仙見其獨來甚易之足不降鬛稍近將動孝德搖手示之若使其不動龍仙不之測乃止孝德呼曰侍中使余致辭非他也龍仙去十步與之言䙝罵如初孝德息馬伺便因瞋目曰賊識我乎龍仙曰誰耶曰我國之大將白孝德也龍仙曰是何猪狗孝德發聲虓噉持矛躍馬而搏之城上鼓譟五十騎繼近龍仙矢不暇發環走堤上孝德追及斬首擕之而歸執石人相擊挾石獅踰墻南史泗橋有數石人長八尺大十圍羊侃執以相擊悉皆破碎北史東魏孝靜帝力能挾石獅子以踰牆以手抉殿沒指以掌拓地倒行見肉飛仙下南史魏帝謂羊侃曰郎官謂卿為虎豈羊質虎皮乎試作虎狀侃因伏以手抉殿沒指魏帝壯之賜以珠劒杜彪程彪南史杜嶷膐力絶人便馬善射一日中戰七八合所佩霜明朱弓四百餘力班絲纒矟長二丈五同心敢死士百七十人每出殺傷數百人敵人憚之號為杜彪又程文季臨事謹飭御下嚴肅前後所剋城壘率皆迮水為堰土木之功動踰十萬置陳役人文季必先於諸將夜則早起迄暮不休軍士莫不服其勤幹每戰為前鋒齊軍深憚之謂為程彪著翅人鐵猛獸肉飛仙北史韓果窮討稽胡散其種落胡憚果徑勇趫捷號為著翅人周文聞之笑曰著翅之名寧減飛將又沈光少驍捷善戲馬為天下最初建禪定寺其中幡竿髙十餘丈適值繩絶非人力所及光謂僧曰當相為上繩諸僧驚喜光因取索口銜之拍竿而上直至龍頭繫繩畢手足皆放透空而下以掌拓地倒行十餘步觀者駭悅莫不嗟異時人號為肉飛仙光從帝攻遼東以衝梯擊城竿長十五丈光升其端臨城與賊戰短兵接敵殺傷十數人賊競擊而墜未及地適遇竿有垂絙光接而復上帝望見壯而異之又蔡祐與齊神武遇於芒山祐時著明光鐵鎧所向無敵齊人咸曰此鐵猛獸也皆避之楊大眼勇冠六軍傅竪眼頻致九捷北史楊大眼為統軍從車駕征宛葉穰鄧九江鍾離之間所經戰陳莫不勇冠六軍又傅竪眼為益州刺史既出梁州梁軍所在拒塞竪眼三日中轉戰二百餘里甲不出身頻致九捷元禮曰喚何物思禮曰喚何物舊唐書李光弼命荔非元禮出徑卒于羊馬城以拒賊元禮俟栅開率其勇敢出戰一逼賊軍退走數百步元禮料敵陳堅雖出入馳突不足破賊收軍稍退以怠其寇而攻之光弼望見收軍大怒使人喚元禮欲按軍令元禮曰戰正忙喚作何物良久令軍中鼓譟出柵門徒摶齊進賊大潰又王思禮從哥舒翰征九曲思禮後期欲引斬之續使命釋之思禮徐言曰斬則斬却喚何物諸將皆壯之壞汝長城是我金城南史檀道濟見收憤怒氣盛目光如炬俄爾間引飲一斛乃脫幘投地曰乃壞汝萬里長城北史齊文宣嘗登并州童子佛寺望并州城曰此何等城或曰金城湯池天府之國帝云我謂唐雍是金城此非也賈雍失頭上馬還營敬定喪元騎馬荷戈成買斬首據鞍還營録異傳漢武時蒼梧賈雍為豫章太守出界討賊為賊所殺失頭雍上馬還營南史魏攻淮陽齊髙帝遣軍主成買戍角城辭于王儉曰今段之行必以死報衡門蓬戶不朱斯白儉問故答曰若不殺賊便為賊殺弱息不為世子便為孝子孝子則門加素堊世子則門施丹赭及買與魏戰死首見斬猶尸據鞍奔還軍然後僵録異傳花敬定平寇單騎鏖戰已喪其元猶騎馬荷戈呼桓石䖍來以愈瘧疾呼楊大眼至以止兒啼晋書桓石䖍有才幹趫捷絶倫威震敵人時有患瘧疾者謂曰桓石䖍來以怖之病者立愈後魏楊大眼少有膽氣跳走如飛淮泗之間童兒啼者恐之云楊大眼至無不立止附又劉胡本以面坳黑似胡故名為越騎校尉蠻畏之小兒啼語云劉胡來便止駢志卷九
