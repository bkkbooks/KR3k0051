body:
  text: 駢志卷八明陳禹謨撰丁部下南華經論九徵人物志論九徵莊子孔子曰凡人心險于山川難于知天天猶有春夏秋冬旦暮之期人者厚貌深情故有貌願而益有長若不肖有順狷而逹有堅而縵有緩而釬故其就義若渴者其去義若熱故君子逺使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徵至不肖人得矣人物志平陂之質在于神明暗之實在于精勇怯之勢在于筋強弱之植在于骨躁靜之決在于氣慘懌之情在于色衰正之形在于儀態度之動在于容緩急之狀在于言其為人也質素平淡中睿外朗筋徑植固聲清色懌儀正容直則九徵皆至則純粹之德也九徵有違則偏雜之材也三度不同其德異稱故偏至之材以材自名兼德之人更為美號是故兼德而至謂之中庸中庸也者聖人之目也具體而微謂之德行德行也者大雅之稱也一至謂之偏材偏材小雅之質也一微謂之依似依似亂德之類也純訐似直而非直純宕似通而非通一至一違謂之間雜間雜無恆之人也善惡參渾心無定是無恆之操胡可擬議無恆依似皆風人末流末流之質不可勝論是以略而不槩也吕覽八觀劉邵八觀吕覽凡論人通則觀其所禮貴則觀其所進富則觀其所養聽則觀其所行止則觀其所好習則觀其所言窮則觀其所不受賤則觀其所不為喜之以驗其守樂之以驗其僻怒之以驗其節懼之以驗其特哀之以驗其人苦之以驗其志八觀六驗此賢主之所以論人也論人者又必以六戚四隱何謂六戚父母兄弟妻子何謂四隱交友故舊邑里門郭內則用六戚四隱外則用八觀六驗人之情偽貪鄙美惡無所失矣譬之若逃雨汙無之而非是此先聖王之所以知人也人物志劉邵八觀者一曰觀其奪救以明間雜二曰觀其感變以審常度三曰觀其志質以知其名四曰觀其所由以辨依似五曰觀其愛敬以知通塞六曰觀其情機以辨恕惑七曰觀其所短以知其常八曰觀其聰明以知所達名覆金甌名內瓶中柳氏舊聞玄宗善八分書凡命將相皆先以御札書其名置案上會太子入侍上舉金甌覆其名以告之曰此宰相名也汝庸知其誰耶肅宗拜而稱曰非崔琳盧從願乎上曰然因舉甌以示之乃賜巵酒五代史廢帝欲擇宰相問於左右左右皆言盧文紀及姚顗有人望廢帝因悉書清望官姓名內琉璃瓶中夜焚香祝天以筯挾之首得文紀欣然相之丞相封侯自𢎞始三公封侯自林始丞相致仕自賢始漢書漢興皆以列侯為丞相公孫𢎞本無爵乃詔封𢎞高成之平津鄉六百五十户為平津侯丞相封爵自𢎞始也魏志崔林為司空封安陽亭侯邑六百户三公封列侯自林始也裴松之以為漢封丞相邑為荀悅所譏魏封三公其失同也漢書地節三年韋賢以老病乞骸骨賜黃金百斤罷歸加賜第一區丞相致仕自賢始十二為司空十二為上卿傅子云荀仲豫稱禹十二為司空戰國策文信侯欲使張唐相燕弗肯行少庶子甘羅請行之文信侯叱去甘羅曰夫項槖七歲為孔子師今臣生十二歲于茲矣君其試臣奚以遽言叱乃見張卿説而行之甘羅還報秦乃封羅以為上卿十五相荆十八宰阿説苑荆公子年十五而相荆抱朴子任能篇昔者荆子總角而攝相事實賴二十五老臻乎惠康又子竒年十八為阿邑宰出倉廪以賑貧乏邑內大化後漢書郎顗薦李固云昔顏子十八天下歸仁子竒稚齒化阿有聲山東相山西將巴有將蜀有相漢書班固贊曰秦漢以來山東出相山西出將秦時將軍白起郿人王翦頻陽人漢興郁郅王圍甘延夀義渠公孫賀傅介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武廉褒狄道辛武賢慶忌皆以勇武顯聞蘇辛父子著郎此其可稱列者也其餘不可勝數何則山西天水隴西安定北地處勢迫近羌胡民俗修習戰備高上勇力鞍馬騎射故秦詩曰王于興師修我甲兵與子皆行其風聲氣俗自古而然今之歌謡慷慨風流猶存耳按師古曰王圍為強弩將軍見藝文志華陽國志巴西郡屬縣七去洛二千八百一十五里東接巴郡南接梓潼北接涼西城土地山原多平有牛馬桑蠶人自先漢以來傀偉俶儻冠冕三巴及郡分後叔布榮始周羣父子程公𢎞等或學兼三才或精秀竒逸其次馬盛衡承伯才藻清妙龔德緒兄弟英氣煜然黃公衡應權通變馬德信王子均勾孝興張伯岐建功立事劉二主之世稱美荆楚乃先漢以來馮車騎范鎮南皆植斯鄉故曰巴有將蜀有相也拔士為相拔卒為將揠士為相擢校為將後漢陳寵曰三辰不軌拔士為相四夷不恭拔卒為將唐書魏元忠曰隂陽不和揠士為相蠻貊不廷擢校為將九十五日至三公三十六日擁麾蓋張璠漢記荀爽幼好學年十二通春秋論語耽思經典不應徵命積十數年董卓秉政復徵爽爽欲遁去吏持之急詔下郡即拜平原相行至茂陵又追拜光祿勳視事三日策拜司空爽起自布衣九十五日至三公世語南陽州泰頻喪考妣祖九年居喪宣王留缺待之至三十六日擢為新城太守宣王為泰會使尚書鍾繇調泰君釋褐登宰府三十六日擁麾蓋守兵馬郡乞兒乘小車一何駛乎泰曰誠有此君名公之子少有文采故守吏職獼猴騎土牛又何遲也衆賔咸服後厯兖豫州刺史所在有籌算績效鄧禹承制拜李文為河東太守來歙承制拜高峻為通路將軍後漢鄧禹定河東承制拜李文為河東太守悉更置屬縣令長以鎮撫之漢魏春秋天子以公曹操典任于外臨事之賞或宜速疾乃命公得承制封拜諸矦守相詔曰夫軍之大事在茲賞罰勸善懲惡宜不旋時故司馬法曰賞不逾日者欲民速覩為善之利也昔在中興鄧禹入關承制拜軍祭酒李文為河東太守來歙又承制拜高峻為通路將軍察其本傳皆非先請明臨事刻印也斯則世祖神明擁逹損益蓋所用速示威懷而著鴻勳也其春秋之義大夫出疆有專命之事茍所以利社稷安國家而已况君秉任二伯師尹九有實征夷夏軍行藩甸之外失得在于斯須之間停賞俟詔以滯世務固非朕之所圖也自今已後臨事所甄當加寵號者其便刻印章假綬咸使忠義得相獎勵勿有疑焉魏武喜得蒯越周文喜得柳敏傅子蒯越蒯通之後深中足智魁傑有雄姿大將軍何進聞其名辟為東曹掾越勸進誅諸閹宦進猶豫不決越知進必敗求出為汝陽令佐劉表平定境內表得以強大詔書拜章陵太守封樊亭矦荆州平太祖與荀彧書曰不喜得荆州喜得蒯異度耳又載記慕容德至莒城封孚出降德曰朕平青州不以為慶喜于得卿也周書文帝尅復河東見柳敏器異之乃謂之曰今日不喜得河東喜得卿也即拜丞相府參軍事俄轉户曹參軍兼記室每有四方賔客恆令接之爰及吉凶禮儀亦令監綜又與蘇綽等修撰新制為朝廷政典又劉璠降逹奚武太祖素聞其名先誡武曰勿使劉璠死也故武先令璠赴闕璠至太祖見之如舊謂僕射申徽曰劉璠佳士古人何以過之徽曰昔晉主滅吳利在二陸明公今平梁漢得一劉璠也又舊唐書太宗征遼東還謂薛仁貴曰朕舊將並老不堪受閫外之寄每欲抽擢驍勇莫如卿者朕不喜得遼東喜得卿也李熹二為司𨽻劉暾五為司𨽻晉書李熹為御史中丞當官正色不憚強禦凡為二代司𨽻又劉暾為左丞正色立朝三臺清肅凡五為司𨽻七百吏半非舊八百吏多稱當傅子曰河南尹內掌帝都外統京畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貊天下四方會利之所聚而姦之所生前尹司馬芝舉其綱而太簡次尹劉靖綜其目而太密後尹李勝毁常法以收一時之聲傅嘏立司馬氏之綱統裁劉氏之綱目以經緯之李氏所毁以漸補之郡有七百吏半非舊也舊唐書永泰之後四方既定而元載秉政公道隘塞官由賄成中書主事郭倩李榮輩用事勢傾朝列天下官爵大者出元載小者自倩榮四方齎貨賄求官者道路相屬靡不稱遂而去於是紀綱大壞及元載敗楊綰尋卒常衮當國杜絶其門四方奏請莫有過者雖權勢與匹夫等非以辭賦登科者莫得進用雖賄賂稍絶然無所甄異故賢愚同滯及崔祐甫代衮薦延推舉無復疑滯日除十數人作相未逾年凡除吏幾八百員多稱允當上嘗謂曰有人謗卿所除擬官多涉親故何也祐甫奏曰臣頻奉聖旨令臣進擬庶官進擬必須諳其才行臣若與其相識方可粗諳若素不知聞何由知其言行獲謗之由實在於此上以為然宓子賤治單父巫馬期治單父吕覽宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故于宓子宓子曰我之謂任人子之謂任力任力者故勞任人者故逸宓子則君子矣逸四肢全耳目平心氣而百官以治義矣任其數而已矣巫馬期則不然弊生事精勞手足煩教詔雖治猶未至也汲黯卧治淮陽景丹卧鎮𢎞農漢書武帝召汲黯為淮陽太守黯伏謝不受印綬詔數強豫然後奉詔召上殿黯泣曰臣自以為填溝壑不復見陛下不意陛下復收之臣常有狗馬之心今病力不能任郡事臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君重卧而治之後漢書陜賊蘇况攻破𢎞農生獲郡守景丹時病帝以其舊將欲令強起領郡事乃夜召入謂曰賊迫近京師但得將軍威重卧以鎮之足矣所居無赫赫名去後常見思在官無當時譽去後為人思漢書何武疾朋黨問文吏必於儒者問儒者必於文吏以相參檢欲除吏先為科例以防請託其所居亦無赫赫名去後常見思又傅子曰傅嘏為河南尹當時無赫赫之名吏民久而後安晉書謝安除吳興太守在官無當時譽去後為人所思黃霸功名損于治郡吕乂名聲損于郡縣漢書黃霸材長于治民及為丞相總綱紀號令風采不及丙魏于定國功名損于治郡時蜀志吕乂代董允為尚書令衆事無留門無停賔乂厯職內外治身儉約謙靖少言為政簡而不煩號為清能然持法刻深好用文俗吏故居大官名聲損于郡縣王尊請以身塞隄蕭憺請以身塞堤漢書王尊為徐州刺史遷東郡太守久之河水盛溢泛浸瓠子金隄老弱奔走恐水大決為害尊躬率吏民投洗白馬祀水神河伯尊親執圭璧使巫策祝請以身填金隄因止宿廬居隄上吏民數千萬人爭叩頭救止尊尊終不肯去及水盛隄壞吏民皆奔走唯一主簿泣在尊旁立不動而水波稍却回還吏民嘉壯尊之勇節白馬三老朱英等奏其狀下有司考皆如言南史始興忠武王蕭憺為荆州刺史六年州大水江溢隄壞憺親率將吏冒雨賦丈尺築之而雨甚水壯衆皆恐或請避焉憺曰王尊尚欲身塞河隄我獨何心以免乃登堤歎息終日輟膳刑白馬祭江神釂酒于流以身為百姓請命言終而水退隄立移書顯責移書勞勉漢書薛宣入守左馮翊滿歲稱職為真始高陵令楊湛櫟陽令謝遊皆貪猾不遜持郡短長前二千石數按不能竟及宣視事詣府謁宣設酒飯與相對接待甚備已而隂求其罪臧具得所受取宣察湛有改節敬宣之效乃手自牒書條其姦臧封與湛湛自知罪臧皆應記而宣辭語溫潤無傷害意湛即時解印綬付吏為記謝宣終無怨言而櫟陽令遊自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言令治行煩苛適罰作使千人以上賦取錢財數十萬給為非法賣買聽任富吏賈數不可知證驗已明白欲遣吏考案恐負舉者耻辱儒士故使掾平鐫令孔子曰陳力就列不能者止令詳思之方調守遊得檄亦解印綬去又頻陽縣北當上郡西河為數郡湊多盜賊其令平陵薛恭本縣孝廉功次稍遷未嘗治民職不辦而粟邑縣小辟在山中民謹朴易治令巨鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭换縣二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優于趙魏而不宜滕薛故或以德顯或以功舉君子之道焉可憮也屬縣各有賢君馮翊垂拱蒙成勉所職卒功業仇季智以孝經感母子相泣韋景駿以孝經感母子改悔謝承後漢書仇覽字季智為縣陽遂亭長好行教化人有陳元者凶惡不孝其母詣覽言元覽呼元誚責以子道與一卷孝經使誦讀之元深改悔到母牀下謝罪曰元少孤為母所驕諺曰孤犢觸乳驕子罵母乞令自改母子更相向泣于是元遂修孝道後成佳士舊唐書韋景駿為貴鄉令縣人有母子相訟者景駿謂之曰吾少孤每見人養親自恨終天無分汝幸有母溫清之地何得如此錫類不行令之罪也因垂泣嗚咽仍取孝經付令習讀之于是母子感悟各請改悔遂稱慈孝召父杜母邵父陳母東觀漢記杜詩為南陽太守性節儉而政治清平以誅暴立威善於計略省愛民役造作水耕用力少見功多時人方於召信臣故南陽人為之詩曰前有召父後有杜母交廣記祥符九年邵曄知廣州鑿內河通舟颶風不為害陳世卿代之奏免廣南口鹽廣人歌曰邵父陳母除我二苦後有三王後有二君漢書王駿為司𨽻校尉奏免丞相匡衡遷少府成帝欲大用之出駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王後漢書延篤字叔堅為京兆尹其政用寬仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張三王後有邊延二君願乞侯君願借冦君風俗通侯霸字君房為淮平大尹政理有能名及王莽敗霸保固自守卒全一都更始元年遣使徵霸百姓老弱相攜號哭遮使者或當道而卧皆曰願乞侯君復留期年民乃誡乳婦勿得舉子侯君當去必不能全使者慮霸就徵臨淮必亂不敢受璽書而具以狀聞後漢書冦恂為潁川太守郡中政理盜賊不入代朱浮為執金吾後潁川盜起從駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借冦君一年乃留恂長社鎮撫吏人受納餘降東觀漢記耿純字伯山巨鹿人請治一郡盡力自效上笑曰卿乃欲以治民自效乃拜純為東郡太守後坐事免上過東郡數千人號呼涕泣云願復得耿君上復以純為東郡太守號稱神君號為神君號曰聖君續漢書荀淑有高才王暢李膺皆以為師為朗陵矦相號稱神君晉書曹攄為臨淄令獄有死囚歲夕攄行獄愍而出之尅日令還掾吏固爭咸謂不可攄曰此雖小人義不見負自為諸君任之至日相率而還並無違者一縣歎服號曰聖君又喬智明為隆慮共二縣令二縣愛之號為神君部人張兊為父報讐母老單身有妻無子智明愍之停其獄歲餘令兑將妻入獄兼隂縱之人有勸兊逃者兌曰有君如此吾何忍纍之縱吾得免作何面目視息世間于獄産一男會赦得免其仁感如是以付樊公已寄蘇公後漢樊曄為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者率不生出獄吏人及羌胡畏之道不拾遺行旅至夜聚衣裝道傍以付樊公北史蘇瓊除南清河太守郡多盜賊及瓊至姦盜止息或外境姦非輒從界中行過者無不捉送零陵縣人魏雙成住處與畿內武城交錯失牛疑其村人魏子賔列送至郡一經窮問知賔非盜而便放之雙成云府君放賊去百姓中何處可得瓊不理其語密遣訪獲盜者從此畜牧不收云但存府君其鄰郡富家將財物寄置界內以避盜冀州繹幕縣人成氏大富為賊攻急告曰我物已付蘇公矣賊遂去又南史王猛為晉陵太守威惠兼舉姦盜屏迹富商野次云以付王府君任延教民牛耕王景教民牛耕後漢書任延為九真太守九真俗以射獵為業不知牛耕民嘗告糴交趾每致困乏延乃令鑄作田器教之墾闢田疇歲歲開廣百姓充給又王景為廬江太守先是百姓不知牛耕致地力有餘而常不足郡界有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起蕪廢教用犂耕由是墾闢倍多境內豐給遂銘石刻誓令民知常禁又訓令蠶織為作法制皆著于鄉亭民益種芋長自引芋列仙傳酒容者為梁丞相使民益種芋菜曰三年當大飢卒如其言梁民不死汝南先賢傳袁安字邵公除隂平長時年飢荒民皆菜食租入不畢安聽使輸芋曰百姓飢困長何得食榖先自引芋吏皆從之蒲鞭葦杖後漢書劉寬厯典三郡吏民有過蒲鞭示辱又異苑崔景真守平昌有惠政常懸一蒲鞭而未嘗用文選安陸王碑南陽葦杖未足比其仁曹子建詩蒲鞭葦杖示有刑降者欲去皆聽冦者見獲放還晉書羊祜率營兵出鎮南夏開設庠序綏懷逺近甚得江漢之心與吳人開布大信降者欲去皆聽之北史周廣川公測行汾州事政在簡惠頗得人和地接東魏數相抄竊或有獲其為盜者多縛送之測皆命解縛置之賔館然後引與相見如客禮焉仍宴設放還其國衛送出境自是東魏人大慙乃不為冦兩界遂通慶弔伏臘放囚年終放囚後漢虞延建武初除細陽令每至歲時伏臘輒休遣徒繫各使歸家並感其德應期而還有囚于家被病自載詣獄既至而死華陽國志王長文元康初試守江源令梁書何鳳為建安太守放囚事同南史謝方明晉末宋武帝加晉陵太守為驃騎長史南郡相嘗年終江陵縣獄囚事無輕重悉放還家使過正三日還到罪重者二十餘人主簿𢎞季咸等固諫方明不納一時遣之囚及父兄並驚喜涕泣以為就死無恨至期有重罪一人醉不能歸違二日乃返餘一囚十日不來逡巡墟里不能自歸鄉村責讓率領將送竟無逃者逺近嘆服舊唐書吕元膺為蘄州刺史放囚事同元旦放囚至日放囚北齊書張華原為兖州刺史獄有繫囚謂之曰三元之始念卿幽閉今給假五日足得展謁親親期盡當還也囚果應期而至南史王志字次道僧虔子也為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反惟一人失期至曰此自太守事主事者勿憂明日果至以婦孕吏人益歎服之又梁書席闡為東陽太守傅岐為始新令冬至放囚俱同以江名子以孟名子以任名子以鄭字子以陽名子江祚别傳祚為安南太守民思其德生子多以江名之又孟宗為豫章太守人思其惠路有行歌故時人之生以孟為名又東觀記任延為九真太守使男女皆以年齒相配同時相娶者二十餘人後多名子為任又魏志鄭渾為邵陵令天下未定民皆剽輕不念産殖其生子無以相活率皆不舉渾所在奪其漁獵之具課使耕桑又兼開稻田重去子之法民初畏罪後稍豐給無不舉贍所育男女多以鄭為字新唐書陽城字亢宗出為道州刺史治民如治家宜罰罰之宜賞賞之不以簿書介意月俸取足而已州産侏儒歲貢諸朝城哀其生離無所進帝既求之城奏曰州民盡短若以貢不知何者可供自是罷州人感之以陽名子發姦摘伏發伏禁姦漢書趙廣漢字子都為京兆尹以和顔接士推功於掾吏發於至誠吏見者皆輸寫心服廣漢精於吏事尤善為鈎距以得民情其發姦摘伏如神又張敞字子高治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢曉告姦黠主名勘取盜賊名簿漢書尹翁歸入守右扶風治如在東海故迹姦邪罪名亦縣縣有名籍盜賊發其比伍中翁歸輒召其縣長吏曉告以姦黠主名教使用類推迹盜賊所過抵類常如翁歸言北史韓褒為北雍州刺史州帶北山多有盜賊褒密訪之並豪右所為也而陽不之知厚加禮遇乃悉召桀黠少年素為鄉里患者署為主帥分其地界有盜發而不獲者以故縱論於是諸被署者莫不惶懼皆首伏乃取盜賊名簿藏之因大榜州門曰自知行盜者可急來首即除其罪盡今月不首者顯戮其身籍沒妻子以賞前首者旬日之間諸盜咸悉首盡褒取名簿勘之一無差異並原其罪許以自新由是羣盜屏息削投書主名得投書主名漢書趙廣漢教吏為缿筒及得投書削其主名而託以為豪傑大姓子弟所言其後強宗大族家家結為仇讐姦黨散落風俗大改吏民相告訐廣漢得以為耳目盜賊以故不發發又輒得一切治理威名流聞及胸奴降者言胸奴中皆聞廣漢蘇林曰缿音項如瓶可授投書孟康曰筒竹筒也如今官受密事筒也師古曰缿若今盛錢臧瓶為小孔可入而不可出或缿或筒皆為此制而用受書今投于其中也筒音同魏志國淵遷魏郡太守時有投書誹謗者太祖疾之欲必知其主淵請留其本書而不宣露其書多引二京賦淵敇功曹曰此郡既大今在都輦而少學問者其簡開解年少欲遣就師功曹差三人臨遣引見訓以所學未及二京賦博物之書也世人忽略少有其師可求能讀者從受之又密喻旨旬日得能讀者遂往受業吏因請使作箋比方其書與投書人同手收攝案問具得情理汙赭輒收持縑悉斬漢書張敞為京兆尹既視事求問長安父老偷盜酋長數人居皆溫厚出從童騎閭巷以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輒收縛之一日捕得數百人窮治所犯或一日百餘發盡行法罰由是枹鼓稀鳴市無偷盜舊唐書兵馬使安國寧與上官涗不善謀反以城降賊事泄劉昌裔密計斬之即召其麾下千餘人食之賞縑二匹伏兵諸要巷令持縑者悉斬之無一人得脫營士子文首殺竇禮書吏李若首殺盧顯魏志護軍營士竇禮近出不還營以為亡表言逐捕沒其妻盈及男女為官奴婢盈連至州府稱寃自訟莫有省者乃辭詣廷尉高柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人有怨讐乎對曰無良善與人無讐又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文求不得時子文適坐小事繫獄柔乃見子文問所作言次曰汝頗曾舉人錢不子文曰自以單貧初不敢舉人錢物也柔察子文色動遂曰汝昔舉竇禮錢何言不邪子文怪知事露應對不次柔曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末埋藏處所柔便遣吏卒承子文辭往掘禮即得其尸詔書復盈母子為平民班下天下以禮為戒魏志胡質任東莞士盧顯為人所殺質曰此士無讐而有少妻所以死乎悉見其比居年少書吏李若見問而色動分市鹿脯詐市牛皮北史齊彭城景王浟為滄州刺史有一人從幽州來驢馱鹿脯至滄州界腳痛行遲偶會一人為伴遂盜驢及脯去明旦告州浟乃令左右及府僚吏分市鹿脯不限其價其主見脯識之推獲盜者又浟為定州刺史時人有被盜黑牛背上有白毛長史韋道建謂中從事魏道勝曰使君在滄州禽姦如神若捉得此賊定神矣浟乃詐為上符市牛皮倍求價直牛主認之因獲其盜道烏亭豬漢書黃霸吏有謁者霸勞苦之曰甚苦食于道旁乃為烏所盜肉又霸具為鄉人區處某所大木可以為棺某亭豬子可以祭還謝亭長逼攝縣令漢書趙廣漢嘗記召湖都亭長湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與語問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服實有之廣漢因曰還為我謝界上亭長勉思職事有以自效不忘卿厚意北史邢邵為兖州刺史吏人姦伏守令長短無不知之定陶縣去州五十里縣令妻日暮取人斗酒束脯邵逼夜攝令未明而去責其取受舉州不識其所以辛公義革岷俗髙士亷改蜀風北史辛公義為岷州刺史土俗畏病若一人有疾即合家避之父子夫妻不相看養公義因分遣官人巡檢部內凡有疾病皆以床輿來安置聽事迎醫眕之躬勸其飲食于是悉差方召其親戚而喻之曰死生由命不關相著前汝棄之所以死耳今我聚病者坐卧其間若言相染那得不死病兒復差汝等勿復信之諸病家子孫慙謝而去後人有遇疾者爭就使君其家親屬固留飬之始相慈愛此風遂革舊唐書高士廉為益州太都督府長史蜀土俗薄畏鬼而惡疾父母病有危殆者多不親扶侍杖頭挂食遙以哺之士廉隨方訓誘風俗頓改獨立使君鐺腳刺史北史裴俠為河北郡守俠躬履儉素愛人如子所食唯菽麥鹽菜而已吏人莫不懷之歌曰肥鮮不食丁庸不取裴公貞惠為世規矩俠嘗與諸牧守俱謁周文帝周文命俠别立謂諸牧守曰裴俠清慎奉公為天下之最令衆中有如俠者可與之俱立衆皆默然周文乃厚賜俠朝野服焉號為獨立使君舊唐書薛大鼎為滄州刺史時與瀛州刺史賈敦頥曹州刺史鄭德本俱有美政河北稱為鐺腳刺史改架柱為浮橋以賦磚當苫築舊唐書韋景駿為肥鄉令縣北界漳水連年泛溢舊隄迫近水漕雖修築不息而漂流相繼景駿審其地勢拓南數里因高築隄瀑水至隄南以無患水去而隄北稱為神腴田漳水舊有架柱長橋每年修葺景駿又改造為浮橋自是無復水患至今賴焉又牛僧孺為鄂州刺史武昌軍節度鄂嶽蘄黃觀察等使江夏城風土散惡難立垣墉每年加版築賦菁茆以覆之吏緣為姦蠧弊綿歲僧孺至計茆苫版築之費歲十餘萬即賦之以磚以當苫築之價凡五年墉皆甃葺蠧弊永除祝神數虎悉斃移文虎不為害九國志謝傑為高州刺史境多虎夜入郭中為暴人不安居傑一日沐浴謁城隍廟舉酒祝神曰愚民何辜而虎暴之蓋刺史無德化願虎只食刺史無傷愚民因屏左右獨宿殿庭中是夜三鼓廟東南隅忽有物咆哮其聲如雷良久乃止遲明視之數虎悉斃汝南先賢傳顧少連補登封主簿邑有虎孽民患之少連命塞陷穽移文嶽神虎不為害鄧遐斬蛟而江水俱赤趙昱斬蛟而江水盡赤襄陽耆舊傳晉鄧遐為襄陽太守城北江水中有蛟常為人害遐遂拔劔入水蛟繞其足遐揮劔截蛟流血江水為之俱赤因名曰斬蛟渚亦謂之斬蛟津方輿勝覽犍為潭中老蛟為害太守趙昱率甲士千人夾江鼓噪昱持刀入水有頃江水盡赤昱左手持蛟首右手持刀奮波而出隋大亂隱去不知所終嘉陵水漲蜀人見昱青霧中騎白馬從數獵者于波面過宋太宗封神勇大將軍廟食灌江口羌胡以刀自割胸奴梨面流血後漢書鄧訓為吏人羌胡愛惜及卒旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳又耿秉性勇壯而簡易于事軍行常自被甲在前休止不結營部然逺斥候明要誓有警軍陳立成士卒皆樂為死及卒胸奴聞之舉國號哭或至梨面流血按梨即剺字古通用剺割也諸胡以刀割面夷人為之劈面魏志倉慈為燉煌太守先是屬城獄訟衆猥縣不能決多集治下慈躬往省閲料簡輕重自非殊死但鞭杖遣之一歲決刑曾不滿十人又常日西域雜胡欲來貢獻而諸豪族多逆斷絶既與貿遷欺詐侮易多不得分明胡常怨望慈皆勞之欲詣洛者為封過所欲從郡還者官為平取輒以府見物與共交市使吏民護送道路由是民夷翕然稱其德惠數年卒官吏民悲感如喪親戚圖畫其形思其遺像及西域諸胡聞慈死悉共會聚于戊己校尉及長吏治下發哀或有以刀畫面以明血誠又為立祠遙共祠之又清河王懌為元義誣死逺近夷人在京及歸聞懌之喪為之劈面者數百人太公誅齊居士孔子誅魯聞人韓子太公望東封于齊齊東海上有居士曰狂矞華士昆弟二人者立議曰吾不臣天子不友諸矦耕作而食掘井而飲之吾無求于人也無上之名無君之祿不事仕而事力太公望至于營丘使吏執殺之以為首誅家語孔子為魯司冦七日而誅亂政大夫少正卯子貢進曰夫少正卯魯之聞人也今夫子為政而始誅之或者為失乎孔子曰居吾語汝以其故天下有大惡者五而竊盜不與焉一曰心逆而險二曰行僻而堅三曰言偽而辨四曰記醜而博五曰順非而澤此五者有一于人則不免君子之誅而少正卯皆兼有之其居處足以撮徒成黨其談説足以飾褒榮衆其強禦足以反是獨立此乃人之姦雄者也不可以不除又世説中朝人共論少正卯盜跖其惡孰深有人云少正卯雖姦不至剖人充膳盜跖為甚顔光祿曰為惡彰露人思加戮隱伏之姦非聖不誅由此言之少正卯為甚衆莫能屈叔向不坐弟虎劉廙不坐弟偉左傳晉欒盈出奔楚范宣子殺羊舌虎叔向弟囚叔向人謂叔向曰子離於罪其為不知乎叔向曰與其死亡若何詩曰優哉遊哉聊以卒歲知也樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫祁奚也室老叔向家臣聞之曰樂王鮒言於君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讐內舉不失親其獨遺我乎詩曰有覺德行四國順之夫子覺者也晉矦問叔向之罪於樂王鮒對曰不棄其親其有焉於是祁奚老矣聞之乘驛而見宣子曰詩曰惠我無疆子孫保之書曰聖有謨訓明徵定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放太甲而相之卒無怨色管蔡為戮周公右王若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子説與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝魏志魏諷反劉廙弟偉為諷所引當相坐誅太祖令曰叔向不坐弟虎詳見左傳古之制也特原不問廙别傳曰初廙弟偉與諷善廙戒之曰夫交友之美在于得賢不可不詳而世之交者不審擇人務合黨衆違先聖人交友之義此非厚已輔人之謂也吾觀魏諷不修德行而專以鳩合為務華而不實此直攪世沽名者也卿其慎之勿復與通偉不從故及于難典衣典冠兼罪先令後令俱誅韓非子昔者韓昭侯醉而寢典冠者見君之寒也故加衣于君之上覺寢而説問左右曰誰加衣者左右對曰典冠君因兼罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也非不惡寒也以為侵官之害甚于寒故明主之畜臣臣不得越官而有功不得陳言而不當越官則死不當則罪守業其官所言者貞也則羣臣不得朋黨相為矣論衡衛之驂乘者見御者之過從後呼車有救危之義不被其罪夫驂乘之呼車典冠之加衣同一意也加衣恐主之寒呼車恐君之危仁惠之情俱發于心然而于韓有罪于衛為忠驂乘偶典冠不偶也韓非子昔者舜使吏決鴻水先令有功而舜殺之禹朝諸矦之君會稽之上防風之君後至而禹斬之以此觀之先令者殺後令者斬則古者必貴如令矣漢高約法三章李特約法三章漢書沛公召諸縣豪傑曰父老苦秦苛法久矣誹謗者族耦語者棄市吾與諸矦約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法吏民皆按堵如故凡吾所以來為父兄除害非有所侵暴母恐晉書李特時羅尚貪殘為百姓患而與蜀人約法三章施捨賑貸禮賢拔滯軍政肅然又李雄僣稱成都王赦其境內建元為建興除晉法約法七章李離必行理官之法腹𪏆必行墨者之法史記李離者晉文公之理也過聽殺人自拘當死文公曰官有貴賤罰有輕重下吏有過非子之罪也李離曰臣居官為長不與吏讓位受祿為多不與下分利今過聽殺人傳其罪下吏非所聞也辭不受令文公曰子則自以為有罪寡人亦有罪邪李離曰理有法失刑則刑失死則死公以臣能聽微決疑故使為理今過聽殺人罪當死遂不受令伏劒而死吕覽墨者有巨子腹𪏆居秦其子殺人秦惠王曰先生之年長矣非有他子也寡人已令吏勿誅矣先生之以此聽寡人也腹𪏆對曰墨者之法曰殺人者死傷人者刑此所以禁殺傷人也夫禁殺傷人者天下之大義也王雖為之賜而令吏勿誅腹𪏆不可不行墨者之法不許惠王而遂殺之子人之所私也忍所私以行大義巨子可謂公矣宣子舉韓厥厥執戮其僕楊素薦榮毗毗法繩左右晉語趙宣子言韓獻子于靈公以為司馬河曲之役趙孟使人以其乘車干行獻子執而戮之衆咸曰韓厥必不沒矣其主朝升之而莫戮其車其誰安之宣子召而禮之曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也夫軍事無犯犯而不隱義也吾言汝于君懼汝不能也舉而不能黨孰大焉事君而黨吾何以從政吾故以是觀汝汝勉之茍從是行也臨長晉國者非汝其誰皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免于罪矣隋書楊素薦榮毗為華州長史世號為能素之田宅多在華隂左右放縱毗以法繩之無所寬貸毗因朝集素謂之曰素之舉卿適以自罰也毗答曰奉法一心者但恐纍公所舉素笑曰前者戲耳卿之奉法素之望也左雄薦周舉舉劾奏雄崔洪薦郤詵詵後紏洪後漢書左雄薦周舉為尚書既稱職議者咸稱焉及在司𨽻又舉故冀州刺史馮直以為將帥而直嘗坐臧受罪舉以此劾奏雄雄悅曰吾嘗事馮直之父而又與直善今宣光以此奏吾乃是韓厥之舉也由是天下服焉晉書崔洪為吏部尚書舉用甄明門無私謁薦雍州刺史郤詵代巳為左丞詵後紏洪洪謂人曰我舉郤丞而還奏我是挽弩自射也詵聞曰崔侯為國舉才我以才見用惟官是視各明至公何故私言乃至此洪聞其言而重之案法者冀州刺史殺卿者兖州刺史後漢蘇章遷冀州刺史故人為清河太守章行部案其姦臧乃請太守為設酒殽陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案法也遂舉正其罪晉書茍晞從母子求為將晞距之曰吾不以王法貸人將母後悔邪固欲之晞乃以為督護後犯法晞杖節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者兖州刺史哭弟者茍道將其杖法如此將吏卒入丞相府率吏卒入太尉府漢書趙廣漢使所親信長安人為丞相魏相府門卒令微伺丞相門內不法事地節三年七月中丞相傅婢有過自絞死廣漢聞之疑丞相夫人妬殺之府舍廣漢即上書告丞相罪制曰下京兆尹治廣漢遂自將吏卒突入丞相府召其夫人跪庭下受辭收奴婢十餘人去責以殺婢事丞相魏相上書自陳妻實不殺婢事下廷尉治罪實丞相自以過譴笞傳婢出至外第乃死不如廣漢言司直蕭望之劾奏廣漢摧辱大臣欲以劫持奉公逆節傷化不道宣帝惡之下廣漢廷尉獄又坐贓殺不辜鞫獄故不以實擅斥除騎士乏軍興數罪天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代京兆死使牧養小民廣漢竟坐要斬後漢書龎參夫人疾前妻子投於井而殺之參素與洛陽令祝良不平良聞之率吏卒入太尉府案實其事乃上參罪遂因災異策免有司以良不先聞奏輒折辱宰相坐繫詔獄良能得百姓心洛陽吏人守闕請代其罪者日有數千萬人詔乃原刑來俊臣按狄仁傑侯思止按魏元忠舊唐書地官尚書狄仁傑為來俊臣所脅引之承反仁傑歎曰大周革命萬物唯新唐朝舊臣甘從誅戮反是實仁傑既承反有司但待報行刑不復嚴備仁傑得憑守者求筆硯拆被頭帛書狀敘寃苦置于綿衣遣謂王德夀曰時方熱請付家人去其綿家人得衣中書仁傑子光逺持之稱變得召見則天覽之愕然會鳳閣侍郎樂思晦男年八九歲其家已族宜𨽻于司農上變得召見言俊臣苛毒願陛下假條反狀以付之無大小皆如狀矣則天意少解乃召見仁傑曰卿承反何也仁傑等曰不承反臣已死于枷棒矣則天曰何為作謝死表仁傑曰無因以表示之乃知其代署遂出之又侯思止按制獄苛虐日甚嘗按中丞魏元忠曰急認白司馬不然即喫孟青白司馬者洛陽有坂號白司馬坂孟青者將軍姓孟名青即棒殺琅琊王沖者也思止閭巷庸奴嘗以此謂諸囚也元忠辭氣不屈思止怒而倒曵元忠元忠徐起曰我薄命如乘惡驢墜腳為鐙所挂被拖曵思止大怒又曵之曰汝拒捍制使奏斬之元忠曰侯思止汝今為國家御史須識禮數輕重如必須魏元忠頭何不以鋸截將無為抑我承反奈何爾佩服朱紫親銜天命不行正直之事乃言白司馬孟青是何言也非魏元忠無人抑教思止驚起悚怍曰思止死罪幸蒙中丞教引上牀坐而問之元忠徐就坐自若思止言竟不正時人效之以為談謔之資會春頓足歎會赦未暇省漢書王溫舒為河內太守以九月至盡十二月郡中無犬吠之盜其頗不得失之旁郡追求會春溫舒頓足歎曰嗟乎令冬月益展一月足吾事矣北史田式每赦書到州式未暇省讀先召獄卒殺重囚然後宣示百姓其刻暴如此董宣為洛陽令豪強震栗周紆為洛陽令貴戚局蹐後漢書董宣字少平為洛陽令搏擊豪強莫不震栗京師號為卧虎歌之曰枹鼓不鳴董少平又周紆拜洛陽令下車先問大姓主名吏數閭里豪強以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎于是部吏望風旨爭以激切為事貴戚局蹐京師肅清乳虎卧彪漢書寧成家居上欲以為郡守御史大夫公孫𢎞曰臣居山東為小吏時寧成為濟南都尉其治如狼牧羊成不可令治民上乃拜成為關都尉歲餘關吏稅肄郡國出入關者號曰寧見乳虎無直寧成之怒按李竒曰肄閲也師古曰直讀曰值北史李崇沉深有將略寬厚善御衆在州凡十年常養壯士數千人冦賊侵邊所向摧破號曰卧彪賊甚憚之號曰蒼鷹呼為皂雕漢書郅都為人勇有氣公廉不發私書問遺無所受請寄無所聽常稱曰已背親而出身固當奉職死節官下終不顧妻子矣都遷為中尉丞相條矦至貴倨也而都揖丞相是時民朴畏罪自重而都獨先嚴酷致行法不避貴戚列矦宗室見都側目而視號曰蒼鷹舊唐書王志愔為左臺御史加朝散大夫執法剛正百僚畏憚時人呼為皂雕言其顧瞻人吏如雕鶚之視燕雀也少年場例竟門漢書尹賞以三輔高第選守長安令得一切便宜從事賞至修治長安獄穿地方深各數丈致令辟為郭以大石覆其口名為虎穴乃部户曹掾史與鄉吏亭長里正父老伍人雜居長安中輕薄少年惡子無市籍商販作務而鮮衣凶服被鎧扞持刀兵者悉籍記之得數百人賞一朝會長安吏車數百兩分行收捕皆劾以為通行飲食羣盜賞親閲見十置一其餘盡以次內虎穴中百人為輩覆以大石數日一發視皆相枕籍死使輿出瘞寺門垣東揭著其姓名百日後乃令死者家各自發取其尸親屬號哭道路皆歔欷長安中歌之曰安所求子死垣東少年場生事諒不謹枯骨後何葬舊唐書則天于麗景門别置推事院專令來俊臣等按鞫亦號為新開門但入新開門者百不全一王𢎞義戲謂麗景門為例竟門言入此門者例皆竟也俊臣與其黨朱南山輩造告密羅織經一卷皆以條貫支節布置事狀由緒來俊臣每鞫囚無問輕重多以醋灌鼻禁地牢中或盛之甕中以火圜繞炙之並絶其糧餉至有抽衣絮以噉之者又令寢處糞穢備諸苦毒自非身死終不得出每有赦令俊臣必先遣獄卒盡殺重囚然後宣示又以索元禮等作大枷凡有十號一曰定百脈二曰喘不得三曰突地吼四曰著即承五曰失魂膽六曰實同反七曰反是實八曰死豬愁九曰求即死十曰求破家復有鐵籠頭連其枷者輪轉于地斯須悶絶矣囚人無貴賤必先布枷棒于地召囚前曰此是作具見之魂膽飛越無不自誣矣則天重其賞以酬故吏競勸為酷矣虜來尚可尹來殺我蜀賊尚可羅尚殺我玄謨尚可宗越殺我後漢書前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我晉書羅尚為平西將軍性貪少斷蜀人言曰尚之所愛非邪則佞尚之所憎非忠則正富擬魯衛家成市里貪如豺狼無復極已又曰蜀賊尚可羅尚殺我平西將軍反更為禍南史沈攸之曰宗公可惜故有勝人處而性嚴酷好行刑誅時王玄謨御下亦少恩將士為之語曰寧作三年徒不逐王玄謨玄謨猶尚可宗越更殺我勿跋扈付丁旿勿反顧付奚度南史諸葛長人謀作亂及到門武帝引前却人間語凡平生言所不盡者皆與及之長人甚悅帝已密命左右丁旿自幔後出于坐拉焉死于牀側輿尸付廷尉并誅其弟黎人旿驍勇有力時人語曰勿跋扈付丁旿又大明中有奚顯度者孝武嘗使主領人功而苛虐無道動加捶撲暑雨寒雪不聽暫休人不堪命或自經死時建康縣考囚或用方材壓額及腂脛人間謡曰寧得建康壓額不能受奚度拍又相戲曰勿反顧付奚度其酷虐如此前廢帝嘗戲曰顯度刻虐為百姓疾此當除之即日宣殺焉時人比之孫皓殺岑昏附又高帝誅黃回回時為南兖州部曲數千欲收恐為亂召入東府停外齋使桓康數回罪然後殺之時人為之語曰欲侜張問桓康又北史崔楷性嚴烈能摧挫豪強時人語曰莫􅰑獬付崔楷又唐永在北地四年與賊數十戰未嘗敗北時人語曰莫陸梁恐爾逢唐將寧飲三斗酢不見崔𢎞度寧食三斗蔥不見屈突通隋書崔𢎞度為襄州總管吏人莫不戰栗長安為之語曰寧飲三斗酢不見崔𢎞度舊唐書屈突通為右武侯車騎將軍奉公正直雖親戚犯法無所縱捨時通弟蓋為長安令亦以嚴整知時人為之語曰寧食三斗艾不見屈突蓋寧食三斗蔥不見屈突通以酢灌鼻以醋灌鼻見上北史元𢎞嗣文帝時為幽州總管每鞫囚多以酢灌鼻或椓弋其下竅無敢隱情以車輻考偽官以木手得姦欵北史畢義雲性嚴酷事多幹了齊文襄作相以為稱職令普勾偽官專以車輻考掠所獲甚多然大起怨謗北史李彪為中尉號為嚴酷以姦欵難得乃為木手擊其脅腋氣絶而復屬者時有焉又慰喻汾州叛胡得其凶渠皆鞭面殺之及彪病體上往往創潰痛毒備極彪曾在領軍府閲廷尉所問囚徒時有人訴枉者彪怒曰南臺中取我木手去搭奴肋折肉餺飥肉鼓吹舊唐書敬羽肅宗時為監察御史以苛刻見委任嘗卧囚于地以門關輾其腹號為肉餺飥外史檮杌李匡逺為少府監性嚴刻一日不斷刑則慘然不樂常聞捶楚之聲謂人曰此我一部肉鼓吹駢志卷八
