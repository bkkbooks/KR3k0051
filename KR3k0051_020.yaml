body:
  text: 駢志卷二十明陳禹謨撰癸部下湯之盤銘允見學庸語孟者並不詳載武之盤銘大戴禮武王之盤銘曰與其溺于人也寧溺于淵溺于淵猶可遊也溺於人不可救也太平御覽澡盆銘曰與其澡於水寧澡於德水之清猶可穢也德之服不可塵也後漢書李尤盤銘曰或以承觴或以授物既舉清觴又盛口實菉竹猗猗緑􅗨猗猗釋文緑􅗨猗猗注􅗨一作䓯音竹有斐君子有邲君子釋文有邲君子注邲美貌赫兮喧兮赫兮宣兮釋文赫兮宣兮注宣顯也無情不盡其辭聽訟必盡其辭禮記孔子曰君子之於人也有不語也無不聽也况聽訟乎必盡其辭矣夫聽訟者或從其情或從其辭辭不可從必斷以情誠於中形於外誠於此形於彼顔氏家訓宓子賤云誠於此形於彼汲冢周書誠在其中必見諸外以其聲處其實好而知其惡惡而知其美愛而知其惡憎而知其善禮記愛而知其惡憎而知其善有諸已後求諸人有諸已不非諸人淮南子云有諸已不非諸人無諸已不求諸人所立於下者不廢於上所禁於民者不行於身桃之夭夭桃之枖枖説文枖木少盛貌從木夭聲詩曰桃之枖枖於喬切其葉蓁蓁其葉溱溱通典云其葉溱溱所惡於上毋以使下不安於上不以使下禮記云所不安於上則不以使下所惡於下則不以事上非諸人行諸已非教之道也維石巖巖維石嚴嚴詩考維石嚴嚴不察雞豚不畜牛羊不息牛羊不息雞豚荀子云上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得喪士不通財貨有國之君不息牛羊錯質之臣不息雞豚冢卿不修幣大夫不為場園從士以上皆羞利而不與民爭業樂分施而耻積藏然故民不困財貧窶者有所竄其手韓詩外傳云天子不言多少諸侯不言利害大夫不言得喪士不言通財貨不為賈道故駟馬之家不時雞豚之息伐冰之家不圖牛羊之入千乘之君不通貨財冢卿不修幣施大夫不為場圃委積之臣不貪市井之利是以貧窮有所歡而孤寡有所措其手足也白創可蹈中庸不可能白創可冒中庸不可入鹽鐡論子曰白創可冒中庸不可入至德之謂也鳶飛戾天鳶飛厲天潛夫論鳶飛厲天君子居易以俟命孝子居易以俟命説苑孝子之事親也居易以俟命不興險行以徼幸家語孔子曰行易以俟命居下不援其上蓋介子山之行也天下之達道五天下之通道五史記平津侯傳云臣聞天下之通道五所以行之者三曰君臣父子兄弟夫婦長幼之序此五者天下之通道也智仁勇此三者天下之通德所以行之者也故曰力行近乎仁好問近乎智知恥近乎勇知此三者則知所以自治知所以自治然後知所以治人天下未有不能自治而能治人者此百世不易之道也好學近乎智好問近乎智説苑中庸曰好問近乎智力行近乎仁知恥近乎勇積小而能大者其惟仲尼乎學者所以反情治性盡才者也獲上有道上達有道淮南子云士處卑隱欲上達必先反諸已上達有道名譽不起而不能上達矣取譽有道不信於友不能得譽信於友有道事親不説不信於友説親有道修身不誠不能事親矣誠身有道心不專一不能專誠人十之已千之人一之我萬之中論人之耳目盡為我用則我之聰眀無敵於天下矣是謂人一之我萬之於穆不已於穆不似孟仲子云於穆不似見詩注疏禮儀三百威儀三千經禮三百曲禮三千禮記經禮三百曲禮三千大戴禮禮義者恩之主也冠婚朝聘喪祭賓主鄉飲酒軍旅此之謂九禮也禮經三百威儀三千機其文之變也注謂二禮動行九事皆有其文每變不同也衣錦尚絅衣錦尚􅀢尚書大傳作衣錦尚􅀢注􅀢讀為絅或作絺淡而不厭淡而不􅬭劉邵人物志云中庸之德淡而不􅬭質而不縵文而不繢奏假無言鬷嘏無言左傳云鬷嘏無言因不失親姻不失親南史王元規曰姻不失親古人所重豈得輒婚非類張説之碑曰姻不失親官復其舊是以相因字為婚姻字用矣貧而無諂富而無驕貧而樂道富而好禮史記子貢問曰富而無驕貧而無諂何如孔子曰可也不如貧而樂道富而好禮野客叢書云范曄舉孔子稱貧而樂道富而好禮恐論語脫一道字及考前漢引此語初無道字而禮記坊記則云貧而好樂富而好禮孫奕示兒編較之史記仲尼弟子傳後漢東平王論皆曰貧而樂道多一道字必是脫文道之以政教之以政禮記夫民教之以德齊之以禮則民有格心教之以政齊之以刑則民有遁心疏格來也君若教民以德整民以禮則民有歸上之心故論語云有恥且格有恥且格有恥且敬漢書云有恥且敬不敬何以别不敬何以辨禮記子云小人皆能飬其親君子不敬何以辨漢桓寬曰善養者不必芻豢也善供服者不必錦繡也以己之所有盡事其親孝之至也故匹夫勤勞猶足以順禮啜菽飲水足以致其敬孔子曰今之孝者是謂能養不敬何以别乎故上孝養志其次養色其次養體貴其禮不貪其養禮順心和養雖不備可也視其所以考其所為汲冢周書云考其所為觀其所由以其前觀其後以其隱觀其顯以其小占其大大戴禮云考其所為觀其所由察其所安君子周而不比君子比而不别晉語籍偃曰君子有比乎叔向曰君子比而不别比德以贊事比也引黨以封己别也知之為知之不知為不知能之為能之不能為不能韓詩外傳孔子曰由志之吾語汝夫慎於言者不譁慎於行者不伐色知而有長者小人也故君子知之為知之不知為不知言之要也能之為能之不能為不能行之要也子張學干祿子張問干祿史記子張問干祿施于有政克施有政書君陳篇惟孝友于兄弟克施有政白虎通孔子居周之末閔道德之不行故周流應聘冀行其道德自衛反魯自知不用故追定五經以行其道故孔子曰書云孝乎惟孝友于兄弟施于有政是亦為政也與其奢也寧儉與其倨也寧拘大戴禮云與其奢也寧儉與其倨也寧拘論稱曾謂泰山不如林放乎詔稱曾謂泰山不如林放乎續漢書建武三十年三月羣臣上言即位三十年宜封禪泰山詔書曰百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放乎殷人以柏殷人用石淮南子云有虞氏之祀其社用土夏后氏其社用松殷人之禮其社用石周人之禮其社用栗為禮不敬臨喪不哀臨事不敬居喪不哀大戴禮曾子曰臨事而不敬居喪而不哀祭祀而不畏朝廷而不恭則我無由知之矣患所以立患已不立潛夫論孔子曰不患無位患已不立幾諫微諫禮記從命不忿微諫不倦勞而不怨可謂孝矣注微諫不倦者子于父母尚和順不用鄂鄂晝寢畫寢筆解韓曰晝當為畫字之誤也宰豫四科十哲安得有晝寢之責乎假或偃息亦未深誅按唐語林宰豫畫寢梁武帝讀為寢室之寢畫胡卦反言其繪畫寢室故夫子嘆朽木不可雕也糞土之牆不可圬也今人皆以為韓文所説而不知始于梁武故特著之宰又野客叢書寢者寢室也蓋晝當居外夜當居內我晝居內未必留意于學故夫子譏之非謂其晝眠也此説得之子文三為令尹三已之叔敖三為令尹三去之莊子肩吾問於孫叔敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以為得失之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼邪亡乎我在我邪亡乎彼方將躊躇方將四顧何暇知乎人貴人賤哉仲尼聞之曰古之真人知者不得説美人不得濫盜人不得劫伏戲黃帝不得友死生亦大矣而無變乎已况爵祿乎若然者其神經乎太山而無介入乎淵泉而不濡處卑細而不憊充滿天地既以與人已愈有微生高尾生高古今人表作尾生高人不堪其憂回也不改其樂人不堪其憂林宗不改其樂後漢紀云并日而食衣不蓋形人不堪其憂林宗不改其樂孟之反孟之側左傳哀公十一年齊師伐我及清師及齊師戰於郊右師奔齊人從之孟之側後入以為殿抽矢策其馬曰馬不進也杜預注之側孟氏族字反文質彬彬文質份份説文份文質備也從人分聲論語曰文質份份府巾切通語質勝文石建文勝質蔡雍文質彬彬徐幹庶幾博文約禮博學約之後漢書范升傳孔子曰博學約之弗畔矣夫夫學而不約必叛道也顔淵曰博我以文約我以禮孔子可謂知教顔淵可謂善學矣老子曰學道日損損猶約也依於仁遊於藝依於德遊於藝少儀云士依於德遊於藝注德三德也一曰至德二曰敏德三曰孝德藝六藝也謂禮樂射御書數未嘗無誨焉未嘗無悔焉論語釋文魯讀誨為悔言自束髮修行以來未嘗無可悔者亦自一説富而可求富不可求説苑孔子曰富而可求雖執鞭之士吾亦為之富而不可求從吾所好大聖之操也五十學易五十以學論語釋文魯讀易為亦史記孔子晚而喜易序彖繫象説卦文言讀易韋編三絶曰假我數年若是我于易則彬彬矣得見有恆者斯可矣得見有常者斯可矣春秋繁露孔子曰善人吾不得而見之得見有常者斯可矣由是觀之聖人之所謂善亦未易當也正唯弟子不能學也誠唯弟子不能學也論語釋文魯讀正為誠丘之禱久矣吾卜之久矣太平御覽引莊子曰孔子病子貢出卜孔子曰子待也吾坐席不敢先居處若齊食飲若祭吾卜之久矣啓豫足跢豫足説文跢豫之足孟敬子問之孟儀往問之説苑曾子有疾孟儀往問之曾子曰鳥之將死必有悲聲君子集大辟必有順辭禮有三儀知之乎對曰不識也曾子曰坐吾語汝君子修禮以立志則貪欲之心不來君子思禮以修身則怠惰慢易之節不至君子修禮以仁義則忿爭暴亂之辭遠若夫置樽爼列籩豆此有司之事也君子雖弗能可也太宰問子貢太宰問孔子列子商太宰問孔子曰夫子聖者歟孔子曰聖則丘何敢然丘則博學多識者也河不出圖雒不出書史記魯哀公十四年春狩大野叔孫氏車子鉏商獲獸以為不祥仲尼視之曰麟也取之曰河不出圖雒不出書吾已矣夫鄉黨恂恂鄉黨遜遜陸賈新語鄉黨以仁恂恂朝廷以義便便劉修碑云鄉黨遜遜如也祝睦碑曰鄉黨逡逡朝廷便便素衣麑裘麛裘絞衣禮玉藻云麛裘青犴褎絞衣以裼之犴胡犬也絞蒼黃之色也羔裘豹飾緇衣以裼之飾猶褎也狐裘黃衣以裼之黃衣大蠟時臘先祖之服也褻裘長絬衣長説文絬衣長短右袂狐貉之厚狐貈之厚説文貈似狐善睡獸從豸舟聲論語曰狐貈之厚以居徐鉉曰舟非聲未詳下各切瓜祭必祭論語釋文魯讀瓜為必鄉人儺鄉人禓禮記鄉人禓鄭注禓強鬼也謂時儺索室驅疫逐強鬼也禓或為獻或為儺禓音傷鬼名也孔子朝服立於阼存室神也神依人也孔疏鄉人禓者庾云禓是強鬼之名謂鄉人驅逐此強鬼孔子則身著朝服立於阼階之上所以然者於時驅逐強鬼恐已廟室之神時有驚恐故著朝服立於廟之阼階存安廟室之神使神依已而安也所以朝服者大夫朝服以祭故用祭服以依神書齋夜話論語曰鄉人儺朝服而立於阼階作儺字者是記云鄉人禓朝服而立於阼階作禓字非君賜生君賜牲論語釋文魯讀生為牲朝服拖紳朝服袉身説文袉裾也從衣它聲論語曰朝服袉身唐左切車中不內顧不疾言不親指升車不內顧不疾言不親指漢書成帝紀班固贊曰臣之姑充後宫為媫妤父子昆弟侍帷幄數為臣言成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容者矣師古曰不內顧者謂儼然端嚴不回盻也不疾言者為輕肆也不親指者為惑下也此三句者本論語鄉黨篇述孔子之事故班氏引之以美成帝今論語云車中不內顧不疾言不親指內顧者説者以為前視不過衡軛旁視不過輢較與此不同按論語釋文車中不內顧魯讀車中內顧又禮記曰車上不廣咳鄭玄注云為若自矜廣猶𢎞也立視五嶲注立平視也嶲猶規也謂輪轉之度嶲或為蕊式視馬尾注小俯顧不過轂子路共雉子路掩雉衝波傳孔子相魯齊人懼而欲敗其政選齊國好女八人人皆衣文衣而舞容璣季桓子語魯君為周道遊館孔子乃行覩雉之飛鳴嘆曰山梁雌雉時哉色斯舉矣翔而後集因為雉噫之歌吕氏春秋子路掩雉而復釋之博物志子路與子貢過鄭神社社樹有鳥子路捕鳥社神牽攣子路子貢説之乃止天喪豫天祝豫春秋繁露顔淵死子曰天喪豫子路死子曰天祝豫西狩獲麟曰吾道窮三年身隨而卒階此而觀天命成敗聖人知之有所不能救命矣夫鹽鐡論云子路宰我生不逢伯樂之舉而遇狂屠故君子傷之若由不得其死然天其祝豫億則屢中意則屢中漢書子贛既學於仲尼退而仕衛發貯鬻財曹魯之間七十子之徒賜最為饒而顔淵簞食瓢飲在於陋巷子贛結駟連騎束帛之幣聘享諸侯所至國君無不分庭與之亢禮然孔子賢顔淵而譏子贛曰回也其庶乎屢空賜不受命而貨殖焉意則屢中師古曰意讀曰億子在回何敢死我存夫安敢畏吕氏春秋曾子曰君子行於道路其有父者可知也其有師者可知也此言事師之猶事父也曾點使曾參過期而不至人皆見曾點曰無乃畏耶曾點曰彼雖畏我存夫安敢畏孔子畏於匡顔淵後孔子曰吾以汝為死矣顔淵曰子在回何敢死顔回之於孔子也猶曾參之事父也古之賢者與其尊師若此故師盡智竭道以教北史李彪既歸本鄉帝北幸鄴彪野服稱草茅臣拜迎鄴南帝曰朕以卿為己死彪曰子在回何敢死浴乎沂沿乎沂筆解韓曰浴當為沿字之誤也周三月夏之正月安有浴之理哉風乎舞雩諷于舞雩仲長統云諷于舞雩之下詠而歸咏而饋論語釋文鄭本作饋魯讀饋為歸論衡云魯設雩祭於沂水之上暮者晚也春謂四月也春服既成謂四月之服成也冠者童子雩祭樂人也浴乎沂涉沂水也風乎舞雩風歌也詠而饋詠歌饋祭也歌詠而祭也説論之家以為浴者浴沂水中也風乾身也周之四月正歲二月也尚寒安得浴而風乾身由此言之涉水不浴雩祭審矣棘子成革子成古今人表作革子成片言折獄片言制獄論語釋文魯讀折為制子路無宿諾宰我無宿問大戴禮宰我請問帝顓頊孔子曰五帝用記三王用度女欲一日辨聞古昔之説躁哉豫也宰我曰昔者豫也聞諸夫子曰小子無有宿問刑罰不中刑罰不衷後漢梁統疏曰刑罰不衷則人無所厝手足衷之為言不輕不重之謂也名之必可言為之必可名史記云夫君子為之必可名言之必可行茍正其身於從政乎何有能勝其心於勝人乎何有中論子思曰能勝其心於勝人乎何有不能勝其心如勝人何無樂乎為君莫樂為人君韓非子晉平公與羣臣飲飲酣乃喟然嘆曰莫樂為人君惟其言而莫之違師曠侍坐於前援琴撞之公披袵而避琴壞於壁公曰太師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰啞是非君人者之言也左右請除之公曰釋之以為寡人戒説苑師經鼓琴魏文侯起儛曰使我言而無見違師經援琴而撞文侯曰昔堯舜之為君也惟恐言而人不違桀紂之為君也惟恐言而人違之其父攘羊而子證之其父竊羊而子謁之吕覽楚有直躬者其父竊羊而謁告之之上上執而將誅之直躬者請代之將誅矣告吏曰父竊羊而謁之不亦信乎父誅而代之不亦孝乎信且孝而誅之國將有不誅者乎荆王聞之乃不誅也孔子聞之曰異哉直躬之為信也一父而載取名焉故直躬之信不若無信斗筲之人何足算也斗筲之徒何足選也前漢書贊曰斗筲之徒何足選也師古注曰筲竹器也容一斗選數也言其材器小劣不足數也不可以作巫醫不可以為卜筮禮記緇衣人而無恆不可以為卜筮古之遺言與龜筮猶不能知也而况於人乎易曰不恆其德或承之羞恆其德貞婦人吉夫子凶注論語言不可以作巫醫是為巫為醫此言為卜筮乃是求占於卜筮龜筮猶不能知言無常之人雖先知如龜筮猶不能定其吉凶况於人乎羿善射奡蕩舟􅀢善射奡湯舟古今人表作􅀢善射奡湯舟尚德哉若人上德哉若人史記云上德哉若人子路問成人顔淵問成人説苑顔淵問於仲尼曰成人之行何若子曰成人之行達乎情性之理通乎物類之變知幽明之故睹逰氣之源若此而可謂成人既知天道行躬以仁義飭身以禮樂夫仁義禮樂成人之行也窮神知化德之盛也揚子云若張子房之智陳平之無誤絳侯勃之果霍將軍義之勇終之以禮樂可謂社稷之臣矣文中子云姚之辨李靖之智賈瓊魏徴之正薛收之仁程元王孝逸之文加之以篤固申之以禮樂可以為成人矣正而不譎法而不譎漢書云齊桓公法而不譎微生畒尾生畝古今人表作尾生畝以德報怨以怨報怨禮表記以德報德則民有所勸以怨報怨則民有所懲又云以德報怨則寬身之仁也以怨報德則刑戮之民也尸子以德報怨人之難也荷蕢荷臾説文臾古文􅀢象形論語曰有荷臾而過孔氏之門諒陰亮陰説命王宅憂亮陰三祀既免喪其惟弗言檀弓子張問曰書云髙宗三年不言言乃歡有諸仲尼曰胡為其不然也古者天子崩王庶子聽於冢宰三年家語子張問書云高宗三年不言言乃雍有諸孔子曰胡為其不然也古者天子崩則世子委政於冢宰三年成湯既沒太甲聽於伊尹武王既喪成王聽於周公其義一也以杖叩原壤荷杖問弟子吕覽孔子之弟子從逺方來者孔子荷杖而問之曰子之公不有恙乎搏杖而揖之問曰子之父母不有恙乎置杖而問之曰子之兄弟不有恙乎杙步而倍之問曰子之妻子不有恙乎故孔子以六尺之杖諭貴賤之等辨疏親之義又况於以尊位厚祿乎闕黨童子厥黨童子古今人表作厥黨童子爼豆之事則嘗聞之矣胡簋之事則嘗學之矣左傳哀公十一年孔文子之將攻太叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也小人窮斯濫小人窮斯㜮説文㜮過差也從女監聲論語云小人窮斯㜮矣盧噉切無為而治無為而制春秋繁露云王者有改制之名無易道之實孔子曰無為而制者其舜乎言其主堯之道而已此非不易之效與躬自厚而薄責於人躬自厚而薄責於外春秋繁露云仁者愛人不在愛我義云者非謂正人謂正我以仁治人義治我躬自厚而薄責於外此之謂也蔡雍正交論身自厚而薄責於人怨其遠矣求諸己而不求諸人咎其稀矣夫逺怨稀咎之機咸在乎躬小慧小惠論語釋文魯讀慧為惠友便佞友諞佞説文便巧言也從言扁聲周書曰截截諞言論語曰友諞佞部田切君子有九思君子有三思荀子孔子曰君子有三思少思學老思教有思施問一得三學一知二韓詩外傳劍雖利不厲不斷材雖美不學不高雖有旨酒嘉殽不嘗不知其旨雖有善道不學不達其功故學然後知不足教然後知不究不足故自愧而勉不究故盡師而熟由此觀之則教學相長也子夏問詩學一而知二孔子曰起豫者商也始可與言詩已矣孔子賢乎英傑而聖德備弟子被光景而德彰詩曰日就月將邦君之妻國君之妻白虎通云國君之妻稱之曰夫人何明當扶進夫人謂妾也國人尊之故稱君夫人也自稱小童者謙也言已智能寡少如童蒙也論語曰國君之妻稱之曰夫人夫人自稱曰小童國人稱之曰君夫人稱諸異邦曰寡小君謂聘問兄弟之國及臣他國稱之謙之辭也曲禮天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻公侯有夫人有世婦有妻有妾夫人自稱於天子曰老婦自稱於諸侯曰寡小君自稱於其君曰小童自世婦以下自稱曰婢子性相近也習相逺也命相近也事相逺也申鑒或問天命人事曰有三品焉上下不移其中則人事存焉爾命相近也事相逺也則吉凶殊矣故曰窮理盡性以至於命孟子稱性善荀卿稱性惡公孫子曰性無善惡揚雄曰人之性善惡渾劉向曰性情相應性不獨善情不獨惡或問其理曰性善則無四凶性惡則無三仁人無善惡文王之教一也則無周公管蔡性善情惡是桀紂無性而堯舜無情也性善惡皆渾是上智懷惡而下愚挾善也理也未究矣惟向言為然偃是前言戲之耳由是前言戲之耳家語子路嘗拯魯之溺者其人拜之以牛子路不受夫子曰魯人必不拯溺矣子路曰由也聞諸夫子曰人者天地之心也天地以生物為心非圖報也子曰由是也前言戲之耳佛肸茀盻古今人表作茀盻史記佛肸為中牟宰趙簡子攻范中行伐中牟佛肸畔使人召孔子孔子欲往子路曰由聞諸夫子其身親為不善者君子不入也今佛肸親以中牟畔子欲往如之何色厲而內荏情疏而貌親禮表記情疏而貌親在小人則穿窬之盜也與疏許氏説文穿窬者外貌為好而內懷姦盜似此情疏貌親之人外內乖異故云穿窬之盜也與其未得之也患得之其未得之也患不得家語其未得之也患不得之既得之患失之孫奕示兒編云按家語比論語多一不字辭意較明古之矜也亷古之矜也貶論語釋文魯讀亷為貶天何言哉夫何言哉論語釋文魯讀天為夫柳下惠為士師柳下惠吏於魯燕惠王曰昔者柳下惠吏於魯三黜而不去或謂之曰可以去柳下惠曰茍與人之異惡往而不黜乎猶且黜乎寧於故國爾柳下惠不以三黜自纍故前業不忘不以去為心故逺近無議接輿歌而過接輿遊其門莊子云孔子適楚楚狂接輿遊其門曰鳯兮鳯兮何如德之衰也來世不可待往世不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行吾行郤曲無傷吾足山木自冦也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也按困學紀聞莊子楚狂之歌所謂迷陽人皆不曉胡明仲曰荆楚有草叢生修條四時發穎春夏之交花亦繁麗條之腴者大如巨擘刺而食之其味甚甘野人呼為迷陽其膚多刺故曰無傷吾行無傷吾足嘗讀莊子注諸解迷陽者率未了了得此可為一快滔滔者天下皆是悠悠者天下皆是史記悠悠者天下皆是也子高耰而不顧桀溺耰而不輟吕氏春秋伯成子高辭諸侯而耕禹往見之則耕在野禹趨就下風而問曰堯理天下吾子立為諸侯今至於我而辭之故何也伯成子高曰當堯之時未賞而民勸未罰而民畏民不知怨不知説愈愈其如赤子今賞罰甚數而民爭利且不服德自此衰利自此作後世之亂自此始夫子盍行乎無慮吾農事協而耰遂不顧以杖荷蓧以杖荷蓧説文蓧田器從草條省聲論語曰以杖荷蓧今作蓧徒弔切焉可誣也焉可憮也漢書薛宣傳焉可憮也蘇林曰憮同也兼也晉灼曰憮音誣師古曰論語載子夏之言謂行業不同所守各異唯聖人為能體備之君子之過如日月之食君子之過猶日月之􅝚説苑云君子之過猶日月之􅝚也有害於明太平御覽引論語食亦作􅝚朕躬有罪無以萬方一人有罪無及萬夫吕氏春秋云昔者湯克夏而正天下天下旱五年不收湯乃以身禱於桑林曰余一人有罪無及萬夫萬夫有罪在余一人無以一人之不敏使上帝鬼神傷民之命墨子湯曰惟豫小人履敢用玄牡告於上天后曰今天大旱即當朕身履未知得罪於上下有善不敢蔽有罪不敢赦簡在帝心萬方有罪即當朕身朕身有罪無及萬方即此言湯貴為天子富有天下然且不憚以身為犧牲以祠説於上帝鬼神王何必曰利君不可言利史記魏世家孟軻至梁梁惠王曰寡人不佞兵三折於外太子虜上將死國以空虛以羞先君宗廟社稷寡人甚醜之叟不逺千里辱幸至弊邑之廷將何以利我國孟軻曰君不可以言利若是夫君欲利則大夫欲利大夫欲利則庶人欲利上下爭利國則危矣為人君仁義而已矣何以利為子思子孟子問牧民之道子思曰先利之曰君子之所以教民亦仁義而已矣何必利南齊書蕭子良引孟子有云君王無好智君王無好勇勇智之過生乎禍患所遵正宫仁義為本舊唐書裴諝傳代宗召見便殿問諝榷酤之利一嵗出入幾何諝久之不對上復問之對曰臣有所思上曰何思對曰臣自河東來其間所歷三百里見農人愁歎榖菽未種誠謂陛下軫念先問人之疾苦而乃責臣以利孟子曰理國者仁義而已何以利為賢者亦樂此乎仁人亦樂此乎韓詩外傳齊景公縱酒醉而解衣冠鼓琴以自樂顧左右曰仁人亦樂此乎白鳥鶴鶴白鳥翯翯大雅白鳥翯翯謂其臺曰靈臺命其臺曰靈臺賈太傅新書云文王志之所在意之所欲百姓不愛其死不憚其勞從之如集文王有志為臺令近規之民聞之者麕裹而至問業而作之日日以衆故弗趨而疾弗期而成命其臺曰靈臺命其囿曰靈囿謂其沼曰靈沼愛敬之至也又文王之澤下被禽獸洽於魚鱉咸若攸樂而况士民乎詩曰愷悌君子民之父母言聖王之德也易曰鳴鶴在陰其子和之言士民之報也易乾鑿度文王二十九年伐崇作靈臺易是類謀云作靈臺受赤雀丹書詩含神霧云作邑於豐起靈臺孝經援神契曰靈臺所以宣德察微六韜文王既出羑里周公旦築為靈臺三輔故事漢作靈臺於城東周作靈臺在豐水東常以四孟之月登臺而觀三輔黃圖文王靈囿在長安縣西四十二里靈沼在長安西三十里靈臺在長安西北四十里髙二丈周四百二十步長安志文王宫在鄠縣靈臺靈囿靈沼皆屬其地也臺沼囿詩人嘗頌其靈矣而不載其制今無可考獨靈臺遺址至貞觀尚在魏王泰括地志辟雍靈沼今悉無復處惟靈臺孤立狗彘食人食而不知檢狗彘食人食而不知斂漢書食貨志贊曰書云楙遷有無周有泉府之官而孟子亦非狗彘食人之食不知斂師古曰言嵗豐熟菽粟饒多狗彘食人之食此時可斂之也野有餓􅣻而弗知發鄭氏􅣻音􅀢有梅之􅀢􅣻零落也人有餓死零落者不知發倉廩貸之也故管氏之輕重李悝之平糴𢎞羊均輸壽昌常平亦有從猍庖有肥肉廏有肥馬厨有腐肉廏有肥馬鹽鐡論厨有腐肉國有飢民廏有肥馬路有餒人漢書貢禹諌文帝曰廏馬食粟將萬匹天下之民所為大飢餓死者是也人至相食而廏馬食粟苦其大肥氣盛怒至乃日步作之王者受命於天為民父母固當若此乎北齊書後主紀御馬則藉以氈罽食物有十餘種將合牝牡則設青廬具牢饌而親觀之狗則飼以梁肉馬及鷹犬乃有儀同郡君之號故有赤彪儀同逍遙郡君凌霄郡君所謂駮龍逍遙者也犬於馬上設褥以抱之鬪雞亦號開府犬馬雞鷹多食縣邑鷹之入養者稍割犬肉以飼之作俑者無後為俑者不仁禮記孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉油然作雲沛然下雨浡然興雲沛然下雨韓詩外傳云如嵗之旱莫不潰荗然天浡然興雲沛然下雨則萬物無不興起之者民非無仁義根於心者也王政怵迫而不得見憂鬱而不得出聖王在彼屣舄視不出閣而天下隨倡而天下和何如在此有以應哉詩曰如彼嵗旱莫不潰荗釁鐘以牛釁廟以羊大戴禮成廟釁之以羊君玄服立於寢門內南向祝宗人宰夫雍人皆玄服宗人曰請令以釁某廟君曰諾遂入雍人拭羊拭帨乃行入廟門碑南北靣同上雍人舉羊升屋自中中屋南靣刲羊血流於前以羊易之以豕易之幽求子云齊宣王見屠羊哀其無罪以豕易之是心足以王吾君有王道晏子春秋景公探雀鷇鷇弱反之晏子聞之不待時而入見景公公汗出惕然晏子曰君何為者也公曰吾探雀鷇鷇弱故反之晏子逡巡北靣再拜而賀曰吾君有聖王之道矣公曰寡人探雀鷇鷇弱故反之其當聖王之道者何也晏子對曰君探雀鷇鷇弱反之是長幼也吾君仁愛曾禽獸之加焉而况於人乎此聖王之道也宋史程頥傳頥聞帝宫中盥避蟻頥奏願推此心以及四海聞其聲不食其肉聞其聲不嘗其肉賈太傅新書云遠庖厨所以長恩且眀有仁也又曰禮聖王之於禽獸也見其生不忍見其死聞其聲不嘗其肉隱弗忍也故逺庖厨仁之至也不合圍不掩羣不射宿不涸澤豺不祭獸不田獵獺不祭魚不設網罟鷹隼不鷙眭而不逮不出罻羅草木不零落斧斤不入山林昆蟲不蟄不以火田不麛不卵不刳胎不夭夭魚肉不入廟門鳥獸不成毫毛不登庖厨湯曰昔蛛蝥作罟不高順不用命者寧丁我網其憚害物也如是挾泰山以超北海挈泰山以越河濟墨子曰挈泰山而越河濟可謂畢劫有力矣自古及今未有能行之者也恆産經産管子民有經産房玄齡注經常也民不務經産則倉廩空虛財用不足囿方四十里宣王囿五里後漢書靈帝紀初作靈泉單圭苑司徒楊賜上書曰臣聞使者並規度城南民田欲以為苑昔先王造囿裁足取牲以備三驅薪採芻牧者往焉六國之際取獸者有罪傷槐者被誅孟軻謂梁惠王極陳其事先帝之制左開洪池右作上林不儉不泰禮以合中今猥規都城之側以畜禽獸之物非所保養民庶赤子之義築郎不時春秋有譏盤於遊田周公作戒今城外之苑已有五六足用逞情意順四節何必變革舊制以罷民力楚興章華郢人乖叛秦作阿房黎氓憤怨宜思夏后卑室之意太宗露臺之費慰此下民勞止之歌上欲止侍中任芝樂松等曰昔宣王囿五里民以為大文王百里民以為小今造二苑與百姓共之不妨於政民蒙其澤上遂從之章懷太子注百里五里與孟子不同及觀世説舉樂松之語云齊五十里乃知非五里也當時史文於五字下脫一十字耳揚子雲羽獵賦文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也文王之囿與民同之文王之囿與衆共之世説王安期為東海郡小吏盜池中魚綱紀推之王曰文王之囿與衆共之池魚復何足惜殺其麋鹿者如殺人之罪殺禁地鹿者身死産沒官魏志髙柔傳是時殺禁地麋鹿者身死財産沒官有能覺告者厚加賞賜柔上疏曰聖王之御世莫不以廣農為務儉用為資中間已來百姓供給衆役親田者既減加頃復有獵禁羣鹿犯暴殘食生苖處處為害所傷不資民雖障防力不能禦至如滎陽左右周數百里嵗略不收元元之命實可矜傷方今天下生財者甚少而麋鹿之損者甚多卒有兵戎之役凶年之災將無以待之惟陛下覽先聖之所念愍稼穡之艱難寬放民間使得捕鹿遂除其禁則衆庶永濟莫不悅豫矣魏名臣奏載柔上疏曰臣深思陛下所以不早取此鹿者誠欲使極蕃息然後大取以為軍國之用然臣竊以為今鹿但有日耗終無從得多何以知之今禁地廣輪且千餘里計虎狼所食雕鶚所害何可勝數以此推之終無從得多不如早取之為便也太王事獯鬻黃帝逐薰鬻外紀黃帝北逐薰鬻史記胸奴傳葷粥居於北蠻曷敢越志誰敢干志搜神記武王伐紂至河上雨甚疾雷晦暝揚波於河衆甚懼武王曰余在天下誰敢干志者風波立霽放於琅邪南至琅邪管子桓公將東逰問於管仲曰我遊猶軸轉斛南至琅邪司馬曰亦先王之遊已何謂也對曰先王之遊也春出原農事之不本者謂之遊秋出補人之不足者謂之夕師行而糧食其民者謂之亡從樂而不反者謂之荒先王有遊夕之業於民無荒亡之行於身桓公退再拜命曰寶法也晏子春秋景公出遊問於晏子曰吾欲觀於轉附朝舞遵海而南至於琅琊寡人何修則夫先王之遊晏子再拜曰善哉君之問也聞天子之諸侯為巡狩諸侯之天子為述職故春省耕而補不足者謂之遊秋省實而助不給者謂之豫夏諺曰吾君不遊我曷以休吾君不豫我曷以助一遊一豫為諸侯度今君之遊不然師行而糧食貧苦不補勞者不息夫從南歷時而不反謂之流從下而不反謂之連從獸而不歸謂之荒從樂而不歸謂之亡古者聖王無流連之遊荒亡之行公曰善命吏計公掌之粟籍長幼貧氓之數吏所委發廩出粟以豫貧民者三千鍾公所身見癃老者七十人振贍之然後歸陳蕃諫校獵曰齊景公欲觀於海放乎琅邪晏子為陳百姓惡聞旌旗輿馬之音舉首顰眉之感景公為之不行此以孟子二章為一事有按括異志齊景鄉縣北四十里廟在焉圖宅號齊景公廟一云未明大王古老相傳齊景公遵海而南觀於轉附朝儛曾遊於此立廟於斯舊有碑今磨滅不存矣唐貞觀十四年太子左贊善大夫吳郡陸使君汝南縣君周氏墓志云祔於嘉興縣東界海鹽縣齊景鄉青墩原西北塋則齊景鄉青墩之名舊矣於是始興發補不足令出裘發粟於飢寒晏子春秋晏子曰嬰聞古之賢君飽而知人之飢溫而知人之寒逸而知人之勞今君不知也公曰善寡人聞命矣乃令出裘發粟與飢寒令所睹於途者無問其鄉所睹於里者無問其家循國計數無言其名昔者文王之治岐昔文王之治西土墨子曰昔文王之治西土老而無子者有所得終其壽連獨無兄弟者有所雜於生人之間少失其父母者有所放依而長王制曰少而無父者謂之孤老而無子者謂之獨老而無妻者謂之矜老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼左右皆曰可殺勿聽衆人皆曰殺之未可唐書鄭注構宋申錫捕逮倉卒內外震駭崔玄亮率諫官叩延英苦諍反覆數百言文宗未諭玄亮置笏在陛曰孟軻有言衆人皆曰殺之未可也卿大夫皆曰殺之未可也天下皆曰殺之然後察之乃置於法今殺一凡庶當稽典律况欲誅宰相乎臣為陛下惜天下法不為申錫言也為巨室為大室劉向新序齊宣王好為大室大蓋百畝堂上三百户以齊國之大具之三年而未能成香居諫而止幼而學之壯而行之少而好事長而行之吕氏春秋能意見齊宣王宣王曰寡人聞子好直有之乎對曰意惡能直意聞好直之士家不處亂國身不見汚君得見王而家宅乎齊意惡能直宣王怒曰野士也將罪之能意曰臣少而好事長而行之王胡不能與野士乎將以彰其所好耶王乃舍之能意者使謹論於主之側亦必不阿主不阿主之所得豈少哉此賢主之所求而不肖主之所惡也使人琢玉使工製冠國䇿王斗謂齊宣王曰王之憂國愛民不若王愛尺縠也王曰何謂也王斗曰王使人為冠不使左右便辟而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺縠也宣王謝曰寡人有罪國家於是舉士五人任官齊國大治又建信君貴於趙公子魏牟過趙趙王迎之顧反至坐前有尺帛且令工人以為冠工見客來也因避趙王曰公子乃驅後車幸以臨寡人願聞所以為天下魏牟曰王能重王之國若此尺帛則王之國大治矣趙王不説形於顔色曰先生不知寡人不肖使奉社稷豈敢輕國若此魏牟曰王無罪請為王説之王有此尺帛何不令前郎中以為冠王曰郎中不知為冠魏牟曰為冠而敗之奚虧於王之國而王必待工而後乃使之今為天下之工或非也社稷為虛戾先王不血食而王不以豫工乃與幼艾桓子新論魏牟見趙王王方使冠工制冠於前問治國於牟對曰大王誠能重國若此二尺縰則國治且安王曰社稷至重而比之二尺縰何也牟曰大王制冠不使親近而必良工者非為其敗縰而冠不成歟今治國不求良士而任其私愛此非輕國於二尺縰之效耶王無以應太王居邠太王去邠史記孟子傳梁惠王謀欲攻趙孟軻稱太王去邠此豈有意阿世俗茍合而已哉持方枘欲內圜鑿其能入乎索隱曰孟子太王去邠是軻對滕文公語今云梁惠王謀攻趙與孟子不同劉子新論昔秦攻梁梁惠王謂孟軻曰先生不逺千里辱幸敝邑今秦攻梁先生何以禦乎孟軻對曰昔太王居邠狄人攻之事以玉帛不可太王不欲傷其民乃去邠之岐今王奚不去梁乎孔叢子子思曰狄人攻太王太王召耆老而問焉曰狄人何來耆老曰欲得菽粟財貨太王曰與之與之至無而狄人不止太王又問耆老曰狄人何欲耆老曰欲土地太王曰與之耆老曰君不為社稷乎太王曰社稷所以為民也不可以所為民亡民也耆老曰君縱不為社稷不為宗廟乎太王曰宗廟者私也不可以吾私害民遂杖䇿而去過梁山止乎岐下豳民之束修奔而從之者三千乘一止而成三千乘之邑此王道之端也莊子太王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣為吾臣與為狄人臣奚以異且吾聞之不以所用養害所養因杖策而去之民相連而從之遂成國於岐山之下夫太王亶父可謂能尊生矣吕氏春秋太王亶父居邠狄人攻之事以皮帛而不受事以珠玉而不肯狄人之所求者地也太王亶父曰與人之兄居而殺其弟與人之父處而殺其子吾不忍為也皆勉處矣為吾臣與狄人臣奚以異且吾聞之不以所以養害所養杖策而去民相連而從之遂成國於岐山之下淮南子曰太王亶父處邠狄人攻之杖策而去百姓擕幼扶老負釜甑踰梁山而國乎岐周非令之所能召也説苑云諸侯之義死社稷太王委國而去何也夫聖人不以強暴侵凌百姓故使諸侯死國守其民太王有至仁之恩不忍戰百姓故事獯鬻戎氏以犬馬珍幣而伐不止問其所欲者土地也於是屬其羣臣耆老而告之曰土地者所以養人也不以所以養而害其養也吾將去之遂居岐山之下邠人負幼扶老從之如歸父母三遷而民五倍其初後漢書魯恭曰萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐將見孟子將見伊尹墨子曰昔者湯將往見伊尹令彭氏之子御彭氏之子半道而問曰君將何之湯曰將往見伊尹彭氏之子曰伊尹天下之賤人也君若欲見之亦令召問焉彼受賜矣湯曰非女所知也今有藥於此食之則耳加聰目加眀則吾必説而強食之今夫伊尹之於我國也譬之良醫善藥也而子不欲我見伊尹是子不欲我善也因下彭氏之子不使御評曰臧氏沮軻彭氏沮尹一也而魯信臧氏以輟駕商斥彭氏以下車則所遭之主殊也然詎魯非天哉論衡曰公伯寮訴子路於季孫孔子稱命人臧倉讒孟子於平公孟子言天道未當行與讒相遇天未與已惡人戾口故孔子稱命不怨公伯寮孟子言天不尤藏倉誠知時命當自然也速於置郵傳命疾乎以郵傳命吕氏春秋三苖不服禹請攻之舜曰以德可也行德三年而三苖服孔子聞之曰通乎德之情則孟門太行不為險矣故曰德之速疾乎以郵傳命不膚撓不目逃不色撓不目逃韓非子曰漆雕之議不色撓不目逃行曲則違於臧獲行直則怒於諸侯世主以為亷而禮之酉陽雜爼列言無痕撻孟稱不膚撓惠孟見宋康王曰臣有道於此人雖勇刺之不入雖巧有力擊之不中夫刺之而不入擊之而不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力不敢擊夫不敢刺不敢擊非無其意也臣有道於此使人本無其意也詖辭知其所蔽詖辭知其所離鶡冠子云詖辭者革物者也聖人知其所離淫辭者因物者也聖人知其所合詐辭者沮物者也聖人知其所飾遁辭者倩物者也聖人知其所極正辭者惠物者也聖人知其所立易大傳云將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈湯以七十里文王以百里湯封於贊茅文王封於岐商子云昔湯封於贊茅文王封於岐周方百里逮天之未陰雨􅀈天之未陰雨説文云􅀈及也從隸枲聲詩曰􅀈天之未陰雨徐鉉曰枲非聲未詳徒耐切家語殆天之未陰雨天作孽猶可違天作蘖可違也禮記天作蘖可違也自作蘖不可逭鄰國之民仰之若父母誅國之人望之如父母亢倉子曰義兵入於敵之境則人知所庇矣兵至於國邑之郊不踐禾稼不穴丘墓不殘積聚不焚室屋得人虜垕而歸之先發聲出號令曰兵之來也以除人之讐以順天之道故尅其國不屠其人獨誅所誅而已於是舉選秀士賢良而尊封之求見孤疾長老而拯救之發府庫之財散倉廩之榖不私其物曲加其禮今有人於此能生死人一人則天下之人爭事之矣義兵之生一人亦多矣人孰不悅故義兵至則鄰國之人歸之若流水誅國之人望之如父母行地滋逺得人滋衆乍見孺子入井人見孺子入井孟子書曰人見孺子入井皆有惻隱之心非其子之父母也無此心者非人也無羞惡之心非人也今孟子少異矢人惟恐不傷人矢人者不為不仁柳宗元守道論云矢人者不為不仁函人者不為仁率其職司其局交相致以全其功也韓非子云醫善吮人之傷含人之血非骨肉之親也利所加也故輿人成輿則欲人之富貴匠人成棺則欲人之夭死也非輿人仁而匠人賊也人不貴則輿不售人不死則棺不買情非愛憎人也又云輿人欲人富貴棺人欲人死喪人不貴則輿人不用人不死則棺不價非有仁賊利在其中無能子曰棺槨者濟死甚矣然其工之心非樂於濟彼也迫於利也欲其日售則幸死幸死非怨於彼也迫於利也醫者樂病幸其必瘳非樂於救彼而又德彼也迫於利也棺槨與醫皆有濟救幸死幸生之心非有憎愛各諧其所欲爾慎子曰匠人成棺不憎人死利之所在忘其醜也仁者如射射者仁道禮射義曰射者仁之道也射求正諸己己正而後發發而不中則不怨勝己者反求諸己而已矣三里之城七里之郭三里之城五里之郭齊策安平君田單以惴惴之即墨三里之城五里之郭敝卒七千禽其司馬而反千里之齊采薪之憂負薪之憂文選注曰孟子有疾王使問之孟子曰昔者有王命時有負薪之憂王無患焉穿何慚焉孔叢子子高任司馬乂為將於齊與燕戰而敗齊君曰以子賢明故信子也答曰君知穿孰若周公齊君曰周公聖人而子賢者弗如也子高曰然臣固弗如周公也以臣之知乂孰若周公之知其弟齊君曰兄弟審於他人子高曰君之言是也夫以周公之聖兄弟相知之審而近失於管蔡明人難知也臣與乂相見觀其材志察其所履齊國之士弗能過也書曰知人則哲惟帝難之穿何慚焉夫君子之敗如日月之􅝚人各有能乂庸可棄乎彼丈夫我丈夫彼人也我人也孔叢子孟軻問子思曰堯舜文武之道可力而致乎子思曰彼人也我人也稱其言履其行夜思之晝行之滋滋焉汲汲焉如農之赴時商之趣利惡有不至者乎鹽鐡論顔淵曰舜獨何人也回何人也或問於鹿門子曰孟子云豫何人也舜何人也是聖人皆可修而至乎曰聖人天也非修而至者也夫知道然後能修能修然後能聖且堯為唐侯二十而德盛舜為鰥民二十以孝聞焉在修乎哉今滕絶長補短今秦斷長續短國策云今秦地形斷長續短方數千里飦粥之食饘粥之食禮記曾申曰哭泣之哀齊斬之情饘粥之食自天子達孔頴逹疏曰哭泣之哀謂有聲之哭無聲之泣並為哀也齊斬之情者齊是為母斬是為父饘粥之食厚曰饘希曰粥孝子朝夕食米一溢自天子達者父母之喪貴賤不殊哭泣以下自天子至庶人如一故云自天子達上有好者上好是物禮記緇衣曰上好是物下必有甚者矣殷曰序周曰庠殷曰庠周曰序漢書儒林傳夏曰校殷曰庠周曰序鄉田同井出入相友八家相保出入更守韓詩外傳云古者八家而井田方里而為井廣三百步長三百步一里其田九百畝廣一步長百步為一畝廣百步長百步為百畝八家為鄰家得百畝餘夫各得二十五畝家為公田十餘二十畝共為廬舍各得二畝半八家相保出入更守疾病相憂患難相救有無相貸飲食相召嫁娶相謀漁獵得分仁恩施行是以其民和親而相好詩曰中田有廬疆埸有瓜今或不然今民相伍有罪同伺有刑相舉使搆造怨讐而民相殘傷和睦之心賊仁恩害士化所和者寡欲敗者巨於是仁道泯焉獸蹄鳥迹之道交於中國獸厹鳥迒之道交於中國路史云獸厹鳥迒之道交於中國帝實憂之乃疇咨能若時之賢以屬天下之統方是時帝畿巨浸稽天而異人虞舜自修家政所在數有美祥帝知其聖於是舉之重土之地而歷試之禹八年於外居外十三年史記云禹傷先人父鯀功之不成受誅乃勞身焦思居外十三年過家門不敢入鹽鐡論云禹蹙洪水身親其勞澤行路宿過門不入當此之時簪墮不掇冠挂不顧而暇耕乎輔之翼之使自得之枉而直之使自得之文選東方曼倩云枉而直之使自得之優而柔之使自求之揆而度之使自索之蓋聖人之教化如此欲其自得之自得之則敏且廣矣用夏變夷以夏變夷後漢書范曄論引孟子有言曰以夏變夷不聞變夷於夏江漢以濯之秋陽以暴之白日以照之江河以滌之揚子惟聖人得言之解得書之體白日以照之江河以滌之浩浩乎其莫之禦也荆舒是懲荆荼是懲史記云荆荼是懲榖梁傳曰荆者楚也何為謂之荆狄人也何為狄之聖人立必後至天子弱必先叛故曰荆狄之也左傳楚大飢羣舒叛之仇池筆記云王介甫先封舒公改封荆公詩曰荆舒是懲識者云宰相不學之過也枉尺而直尋詘寸而信尺漢書終軍曰枉尺直尋孟子稱其不可師古曰尋長而尺短故陳代言所直者多而所曲者少則可為之孟子以為茍有小曲則害於大直故不可也尸子載孔子曰詘寸而信尺小枉而大直吾為之也文子曰屈寸而申尺小枉而大直聖人為之鹽鐡論云小枉大直君子為之汜論訓曰詘寸而伸尺聖人為之小枉而大直君子行之湯遺羊於葛伯湯獻牛於荆伯帝王世紀湯問葛伯何故不祀曰無以供犧牲湯遺之以羊越絶書湯獻牛荆之伯之伯者荆州之君也湯行仁義敬鬼神天下皆一心歸之當是時荆伯未從也湯於是乃飾犧牛以事荆伯乃愧然曰失事聖人禮乃委其誠心此謂湯獻牛荆之伯也齊語楚語齊言楚言漢書賈誼曰習與善人居不能無為善猶生長於齊不能無齊言也習與惡人居不能無惡猶生長於楚不能無楚言也是以聖人審所與居而戒慎所習韓詩外傳云楚之狂者楚言齊之狂者齊言習使然也夫習之於人微而著深而固是暢於筋骨貞於膠漆是以君子務為學也吕氏春秋曰戎人生乎戎長乎戎而戎言不知其所受之楚人生乎楚長乎楚而楚言不知其所受之今使楚人長乎戎戎人長乎楚則楚人戎言戎人楚言矣士往拜其門士拜於其室禮玉藻云大夫親賜士士拜受又拜於其室異於君惠也拜受又就拜於其家是所謂再拜也陳仲子頻顣生鵝裴公美不食炮鹿舊唐書裴休字公美兄儔弟俅虞人有以鹿贄儔者儔俅炮之召休食休曰我等窮生菜食不充今日食肉翌日何繼無宜改饌獨不食按宋書王惠傳兄鑒頗好斂廣營田業惠意甚不同謂鑒曰何用田為鑒怒曰無田何由得食惠又曰亦復何用食為其標寄如此不以規矩不能成方員弗修規矩不能正方圓春秋繁露曰雖有巧手弗修規矩不能正方圓雖有察耳不吹六律不能定五音雖有知心不覽先王不能平天下然則先王之遺道亦天下之規矩六律而已韓非子曰巧匠目意中繩然必先以規矩為度上智捷舉中事必以先王之法為比故繩直而枉木斫準夷而高科削權衡縣而重益輕斗石沒而多益少故以法治國舉措而已矣又曰釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成一輪廢尺寸而差短長王爾不能半中使中主守法術拙匠守規矩尺寸則萬不失矣不愆不忘不騫不忘春秋繁露云不騫不忘文選云不僭不忘説苑作亡無然泄泄無然呭呭詩考云無然呭呭説文詍多言也從言世聲詩曰無然詍詍余制切爾雅作泄泄責難於君謂之恭強君所不能為忠後漢郅惲曰孟軻以強其君之所不能為忠量其君之所不能為賊禮人不答反其敬敬人而不必見敬吕氏春秋曰敬人而不必見敬愛人而不必見愛敬愛人者己也見敬愛者人也君子必在己者不必在人者也必在己無不遇矣既不能令又不受命是絶物也不能以令又不能聽是生亂也説苑齊景公以其子妻闔廬送諸郊泣曰余死不汝見矣高夢子曰齊負海而縣山縱不能全收天下誰干我君愛則勿行公曰余有齊國之固不能以令諸侯又不能聽是生亂也寡人聞之不能令則莫若從且夫吳若蜂蠆然不棄毒於人則不靜余惟恐棄毒於我也遂遣之齊景公女齊桓公女越絶書闔廬伐齊大克取齊王女為質子為造齊門齊女思其國死葬虞西山郭緣生述征記齊桓公冢在齊城南二十里因山為墳大冢東有女水或云齊桓公女冢在其上故以名水也女水導川東北流甚有神焉化隆則水生政薄則津竭燕建平六年水忽暴竭玄眀惡之寢病而亡燕太上四年女水又竭慕容超惡之燕祚隨淪誰能執熱逝不以濯誰能執熱解不用濯墨子云誰能執熱解不用濯又云猶執熱之有濯也將休其手焉滄浪之水清悠悠之水清楚辭漁父鼓枻而歌曰滄浪之水清兮王逸注喻世昭眀可以濯吾纓沐浴升朝廷也滄浪之水濁兮喻世昏暗可以濯吾足宜隱遁也文中子曰混混之水濁可以濯我足悠悠之水清可以濯我纓道在邇而求諸逺道在易而求之難淮南子曰道在易而求之難驗在近而求之逺故弗得也胸中正則眸子瞭焉其心正則童子瞭然白帖注孟子曰人之善不善在乎目其心正則童子瞭然其心不正則童子眊然曾子養曾晳必有酒肉無肴膳閔曾不能率養鹽鐵論云孝子日甘毳以養口輕暖以養體曾子養曾晳必有酒肉無端絻雖公西赤不能以為容無肴膳雖閔曾不能以率養遷於負夏遷於負黍帝王世紀云遷於負黍又史記云就時於負夏文王生於岐周文王生於東夷陸賈新語文王生於東夷大禹出於西羌世殊而地絶法合而度同史記六國表注皇甫謐云孟子稱禹生石紐西夷人也子産以乘輿濟人景差以陪乘載人説苑景差相鄭鄭人有冬涉水者出而脛寒後景差過之下陪乘而載之覆以上衽晉叔向聞之曰景子為人國相豈不顧哉吾聞良吏居之三月而溝渠修十月而津梁成六畜且不濡足而况人乎蔽賢者不祥不知賢不祥晏子春秋曰有賢而不知一不祥知而不用二不祥用而不任三不祥説苑齊景公獵上山見虎下澤見蛇問晏子曰此不祥邪曰有賢不知知而不用用而不任此不祥也山是虎室澤是蛇窟何不祥乎周公思兼周公兼思尚書大傳云周公兼思三王之道以施於春秋冬夏詩亡春秋作雅廢春秋作文中子曰小雅廢春秋作晉之乘楚之檮杌楚之乘晉之檮杌後漢紀云楚之乘晉之檮杌魯之春秋其事一也袁宏曰定哀之間魯君子左丘明論集其文作左傳三十篇又撰異同號曰國語二十篇由是乘檮杌之事遂暗而左氏國語獨彰公羊傳云春秋魯之信史也其序則齊桓晉文其會則主會者為之也其詞則丘有罪焉爾庾公斯學射於尹公他尹公他學射於庾公差左傳初尹公他學射於庾公差庾公差學射於公孫丁二子為孫氏追公公孫丁御公庾公差曰射為背師不射為戮射兩鉤而還愛人者人恆愛之自愛然後人愛諸揚子曰人必其自愛也然後人愛諸人必其自敬也然後人敬諸自愛仁之至也自敬禮之至也未有不自愛敬而人愛敬之者也君子有終身之憂無一朝之患君子有終身之樂無一朝之憂説苑云君子有終身之憂無一朝之患順道而行循理而言喜不加易怒不加難又子路問孔子曰君子亦有憂乎孔子曰無也君子之修其行未得則樂其意既己得又樂其知是以有終身之樂無一日之憂小人則不然其未之得則憂不得既己得之又恐失之是以有終身之憂無一日之樂我亦人也我何人也賈太傅曰舜何人也我何人也夫啓耳目載心意從立移徙與我同性而舜獨有賢聖之名眀君子之實而我曾無鄰里之問寬徇之智者獨何與然則舜僶俯而加志我儃僈而弗省耳是以如是其急自任如此其重鹽鐵論曰禹稷自布衣思天下有不得其所者若已推而納之溝中故起而佐堯平治水土教民稼穡其自任天下如此其重也豈云食祿以養其妻子而已乎夫食萬人之力者蒙其憂任其勞請冦退而反請冦罷而復説苑魯人攻鄪曾子辭於鄪君曰請出冦罷而後復來請姑母使狗豕入吾舍鄪君曰寡人之於先生也人無不聞今魯人攻我而先生去我我胡守先生之舍魯人果攻鄪而數之罪十而曾子之所爭者九魯師罷鄪君復修曾子舍而後迎之父母惡之勞而不怨父母惡之懼而無怨禮記曾子曰父母愛之喜而弗忘父母惡之懼而無怨注無怨無怨於父母之心父母有過諫而不逆不若是恝不若是説文云忽也從心聲孟子曰孝子之心不若是呼切父母之不我愛弟妹之不我親路史云父母之不我愛弟妹之不我親按越絶書舜親父假母兄狂弟傲舜求為變心易志尸子亦云舜事親養兄為天下法路史舜妹婐首許氏説文云或作畫婐一音畫也婐又或作擊一作繫列女傳舜女弟繫與二嫂諧有妻子則慕妻子妻子具則孝衰矣管子曰衆人之用其心也其事親也妻子具則孝衰矣其事君也爵祿滿則忠衰矣五十而慕五十猶慕新序曰舜年五十猶嬰兒慕可謂至孝矣孟子嘗曰舜年五十不失其孺子之心見鄭康成坊記注使舜完廩使其塗廩竹書紀年沈約注曰舜父母憎舜使其塗廪自下焚之舜服鳥工衣服飛去又使浚井自上填之以石舜服龍工衣自旁而出鬱陶思君爾思舜正鬱陶史記瞽叟象喜以舜為己死象曰本謀者象象與其父母分於是曰舜妻堯二女與琴象取之牛羊倉廩與父母象乃止舜宫居鼓其琴舜往見之象鄂不懌曰我思舜正鬱陶舜曰然爾其庶矣象日以殺舜為事瞽叟象每欲殺舜路史世傳瞽叟與象每欲殺舜其妹婐首每為之解流共工於幽州流共工於幽陵史記流共工於幽陵以變北狄放歡兜於崇山以變南蠻遷三苖於三危以變西戎殛鯀於羽山以變東夷四罪而天下咸服親之欲其貴愛之欲其富愛之欲其富親之欲其貴史記三王世家太史公云古人有言曰愛之欲其富親之欲其貴故王者疆土建國封立子弟所以褒親親序骨肉尊先祖貴支體廣同姓於天下也是以形藝勢同強而王室安自古至今所由來久矣非有異也源源而來謜謜而來説文云謜謜徐言也從言原聲孟子曰故謜謜而來魚怨切舜見瞽瞍其容有蹙舜見瞽瞍其容造焉韓非子引記曰舜見瞽瞍其容造焉孔子曰當是時也危哉天下岌岌有道者父固不得而子君固不得而臣也天無二日民無二王天無二日土無二王禮坊記子云天無二日土無二王家無二主尊無二上示民有君臣之别也春秋不稱楚越之王喪書卒不書葬夷之也禮君不稱天避天子也大夫不稱君避國君也恐民之惑也前漢高帝紀云上五日一朝太公太公家令説太公曰天無二日土無二王皇帝子乃人主也太公雖父乃人臣也奈何令人主朝人臣如此威重不得申後上朝太公太公擁篲迎門郤行欲拜上大驚挾太公太公曰帝人主奈何以我亂天下法荀悅曰孝經云雖天子必有尊也言有父也王者必父事三老以示天下所以眀有孝也無父猶設三老之禮况其存者乎孝莫大於嚴父故后稷配天尊之至也禹不先鯀湯不先契文王不先不窋古之道子尊不加於父母家令之言於是過矣舜薦禹於天舜薦禹為嗣史記云帝舜薦禹於天為嗣十七年而帝舜崩三年喪畢禹辭辟舜之子商均於陽城天下諸侯皆去商均而朝禹禹於是遂即天子位宋書符瑞志舜在位十有四年奏鍾石笙管未罷而天下大靁雨疾風發屋拔木桴鼓播地鍾磬亂行舞人頓扶樂正狂走舜乃􅀈璿持衡而笑曰明哉夫天下非一人之天下也亦乃見於鍾石管笙乃薦禹於天使行天子事於時和氣普應慶雲興焉吾君之子也帝禹之子也史記云帝禹東巡狩至於會稽而崩以天下授益三年之喪畢益讓帝禹之子啓而辟居箕山之陽禹子啓賢天下屬意焉及禹崩雖授益益之佐禹日淺天下未洽故諸侯皆去益而朝啓曰吾君帝禹之子也於是啓遂即天子之位越絶書云夏啓獻犧於益啓者禹之子益與禹臣於舜舜傳之禹薦益而封之百里禹崩啓立曉知王事達於君臣之義益死之後啓嵗善犧牲以祀之經曰夏啓善犧於益此之謂也外丙二年仲壬四年外丁三年仲壬四年陶隱居年紀云殷湯治十三年外丁治三年仲壬治四年太甲治十年沃丁治十三年太戊治十年外壬治三年沃甲治四年盤庚治九年小辛治七年五羊之皮要秦穆公五羊之皮籠百里奚莊子云湯以庖人籠伊尹秦穆公以五羊之皮籠百里奚接淅而行滰淅而行説文引孟子去齊滰淅而行滰音其兩切漉乾漬米言不待炊而行也異聞集李言甫銘曰孟子去齊而滰淅唐本作滰字本許氏語孔子聖之時者也孔子聖之中者也韓詩外傳云孔子聖人之中者也金聲而玉振玉潤而金聲後漢班固傳玉潤而金聲注孟子曰孔子德如金聲也周室班爵祿王者制爵祿禮記王制云王者之制爵祿公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫其有中士下士者數各居其上之三分凡四海之內九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸間田八州州二百一十國天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌音班其餘以祿士以為間田凡九州千七百七十三國天子之元士諸侯之附庸不與天子三公九卿二十七大夫八十一元士大國三卿皆命于天子下大夫五人上士二十七人次國三卿二卿命于天子一卿命于其君下大夫五人上士二十七人小國二卿皆命于其君下大夫五人上士二十七人制三公一命卷音衮若有加則賜也不過九命次國之君不過七命小國之君不過五命大國之卿不過三命下卿再命小國之卿與下大夫一命吕氏春秋云上田夫食九人下田夫食五人可以益不可以損一人治之十人食之六畜皆在其中矣帝館甥于二室帝館之于二室路史舜之濳德堯實知之南面而與之言席龍垤而蔭翳乘蔭不移而堯志得始尚見帝帝館之于二室于是錫之絺衣雅琴命之姚姓辭尊辭富辭貴辭富禮坊記君子辭貴不辭賤辭富不辭貧則亂益亡故君子與其使食浮于人也寧使人浮于食在國曰市井之臣在邦曰市井之臣儀禮在邦則曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣孟子論夜氣屈子論夜氣楚辭逺逰篇云一氣孔神兮于中夜存虛以待之兮無為之先惟心之謂與人心其神乎揚子云人心其神矣乎操則存捨則亡能常操而存者其惟聖人乎莊子云其熱焦火其寒凝氷其疾俯仰之間而再撫四海之外其居也淵而靜其動也縣而天僨驕而不可係者其惟人心乎舍生取義舍生重義後漢書范曄論云夫專為義則傷生專為生則騫義若義重于生舍生可也生重于義全生可也杯水救車薪一勺救車薪文子云水之勢勝火一勺不能救一車之薪金之勢勝木一創不能殘一林土之勢勝水一塊不能塞一河杜恕篤論云水性勝火分之以釜甑則火強而水弱人性勝志分之以利欲則志強而性弱服堯之服冠堯之冠傅子云冠堯之冠行桀之行亦桀也服桀之服行堯之行亦堯也桓寬引孟子曰堯舜之道非逺人也而人不思之耳五就湯五就桀三就文三入殷鬼谷子云伊尹五就湯五就桀然後合于湯吕望三就文王三入殷而不能有所眀然後合于文王是故無賢者也夫子誠無善耳韓詩外傳孟子説齊宣王而不説淳于髠侍孟子曰今日説公之君不説意者其未知善之為善乎淳于髠曰夫子亦誠無善耳昔瓠巴鼓瑟而濳魚出聽伯牙鼓琴而六馬仰秣魚馬猶知善之為善而况君人者也孟子曰夫雷電之起也破竹折木震驚天下而不能使聾者卒有聞日月之明遍照天下而不能使盲者卒有見今公之君若此也淳于髠曰不然昔日揖封生髙商齊人好歌杞梁之妻悲哭而人稱詠夫聲無細而不聞行無隱而不形夫子茍賢居魯而魯國之削何也孟子曰不用賢削何有也吞舟之魚不居濳澤度量之士不居汙世夫萟冬至必雕吾亦時矣齊策淳于髠一日而見七人于宣王王曰子來寡人聞之千里而一士是比肩而立百世而一聖若隨踵而至也今子一朝而見七士則士不亦衆乎淳于髠曰不然夫鳥同翼者而聚居獸同足者而俱行今求柴胡桔梗于沮澤則纍世不得一焉及之睪黍梁父之隂則却車而載耳夫物各有疇今髠賢者之疇也王求士于髠若挹水于河而取火于燧也髠將復見之豈特七士也評曰髠漫托賢者之疇夫賢孰如孟子哉髠弗之識彼所見七士可知己髠之識賢殆無異瞽師之别黑白也五霸三王之罪人六國五霸之罪人前漢紀荀悅曰五霸三王之罪人也六國五霸之罪人也夫四豪六國之罪人也齊桓公盟諸侯晉文公盟諸侯春秋繁露桓公曰無貯粟無障谷無易樹子無以妾為妻管子與楚王遇于召陵之上而令于遇上曰毋貯粟毋曲隄毋擅廢適子無置妾以為妻晉文公春秋文公合諸侯而盟曰吾聞國之昏不由聲色必由姦利好樂聲色者淫也貪姦者惑也夫淫惑之國不亡必殘自今以來無以美妾疑妻無以姦情害公無以貨利示下其有之者是謂伐其根素流于華葉若此者有患無憂有冦勿弭不如言者盟示之于是君子聞之曰文公其知道乎其不王者猶無佐也左傳襄十一年秋七月同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家注曰七姓晉魯衛鄭曹滕姬姓邾小邾曹姓宋子姓齊薑姓莒已姓杞姒姓薛任姓實十三國言十二誤也無曲防無遏糴無障穀無貯粟公羊傳云無障穀無貯粟穀梁無雍泉無訖糴由今之道居今之朝鹽鐵論孟子曰居今之朝不易其俗而成千乘之勢不能一朝居也君子所過者化所存者神仁人所過者化所存者神荀子云仁人之兵所過者化所存者神按朱紫陽曰似是見成語如金聲玉振之類故孟荀皆用之荀卿非孟子必不肯用其語也有事君人者有事人君者後漢書陳蕃疏臣聞有事社稷者社稷是為有事人君者容悅是為今臣蒙恩聖朝備位九列見非不諫則容悅矣昏暮叩人門户無弗與者昏暮叩人門户貪夫不吝鹽鐵論云富則仁生淡則民爭止昏暮叩人門户求水火貪夫不吝音吝何則所饒也夫為政而使菽粟如水火民安有不仁者乎淮南子曰扣門求火無不與者饒足也故林中不貨薪湖上不鬻魚者也舜跖之分堯桀之分漢書蕭望之曰堯桀之分在于義利而已不拔一毛不損一毛列子云楊朱曰伯成子高不以一毫利物舍國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽孟孫陽曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若為之乎曰為之孟孫陽曰有斷若一節得一國子為之乎禽子默然有間孟孫陽曰一毛微于肌膚肌膚微于一節省矣然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能所以答子然則以子之言問老𣆀關尹則子言當矣以吾言問大禹墨翟則吾言當矣摩頂放踵摩頂致踵文選李善注孟子曰墨子兼愛摩頂致于踵利天下為之劉熙曰致至也其君用之則安富尊榮王公大人用吾言必治墨子云王公大人用吾言必治匹夫徒步之士用吾言行必修故翟以為雖不耕而食飢不織而衣寒功賢于耕而食之織而衣之者也故翟以為雖不耕織乎而功賢于耕織也荀子秦昭王問孫卿曰儒無益于人之國孫卿子曰儒者法先王隆禮義謹乎臣子而致貴其上者也人主用之則勢在本朝而宜不用則退編百姓而慤必為順下矣雖窮困凍餒必不以邪道為貧無置錐之地而眀于持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀勢在人上則王公之材也在人下則社稷之臣國君之寶也雖隱于窮閻漏屋人莫不貴之道誠存也仲尼將為司冦沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙魯之粥牛馬者不豫賈必蚤正以待之者也居于闕黨闕黨之子弟罔不分有親者取多孝悌以化之也儒者在本朝則美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿曰其為人上也廣大矣志意定乎內禮節修乎朝法則度量正乎官忠信愛利形乎下通于四海則天下應之如歡是何也則貴名白而天下治也故近者歌謳而樂之逺者竭蹶而趨之四海之內若一家通達之屬莫不從服夫是之謂人師夫其為人下也如彼其為人上也如此何謂其無益于人之國也昭王曰善孟子稱進鋭退速老子稱進鋭退速後漢書李固傳用老子曰其進鋭者其退速章懷太子注按孟子有此文謝承書亦云孟子而續書復云老子放飯流啜小飯大啜枚乘七發云小飯大啜如湯沃雪流杵浮杵論衡云若孔子言殆沮浮杵若孟子之言近不血創浮杵過其實不血創亦失其正一聖一賢共論一紂輕重殊稱多少異實善陳善戰善師善陳穀梁傳云善師者不陳善陳者不戰善戰者不死二女果二女婐説文婐𡛖也一曰女侍曰婐讀若騧或若委從女果聲孟軻曰舜為天子二女婐烏果切子華子曰堯居于衢室之宮垂衣而襞幅邃如神眀之居輯五瑞以見羣后帶幅舄而入覲者如衆星之拱北堯則若固有之也舜遊于巖廊之上被袗衣而鼓五絃之琴畫日月于大常備十有二章黼黻玄黃爛如也出則有鸞和動則有環珮步趨中于莖韶之節舜亦若固有之也使人昭昭俗人昭昭老子云俗人昭昭我獨若昏俗人察察我獨悶悶往者不追來者不拒來者不距去者不止荀子云子貢曰君子正身以俟欲來者不距欲去者不止尚書大傳東郭子思問于子貢曰夫子之門何其雜也子貢曰夫櫽括之旁多枉木良醫之門多疾人砥礪之旁多頑鈍夫子修道以俟天來者不止是以雜也養心莫善寡欲養心莫善于誠荀子云養心莫善于誠程子曰既誠矣又何用養此已不識誠又不知所以養不食羊棗不嘗檳榔齊書任昉父遙本性重檳榔以為常餌臨終求之不得好者昉亦所嗜好深以為恨終身不嘗檳榔梁書陶子鏘母嗜蓴母沒後嘗以供蓴及後一冬營蓴不得痛恨慟哭遂長斷蓴味華陽國志狼偶二親病時不能食肉偶終身不食肉惡似而非者皆似而非者魏策云夫物多相類而非也幽莠之幼也似禾黧牛之黃色也似虎白骨疑象碔夫類玉此皆似之而非者也吕氏春秋云使人大迷惑者必物之相似也玉人之所患患石之似玉者相劍者之所患患劍之似吳干者賢者之所患患人之博文辨言而似通者相似之物此愚者之所大惑而聖人之所加慮也文選阮元瑜曰夫似是之言莫不動聽因形設象易為變觀濟注曰乃佞人之言皆似是加以辨利故能動聽因形勢以設比象故易改觀心必信而為之者多淮南子云使人之相去也如玉之與石美之與惡則論人易矣夫亂人者芎藭之與藁本也蛇床之與麋蕪也此皆相似者故劍工惑劍之似莫邪者惟歐冶能名其種玉工眩玉之似碧盧者惟猗頓不失其情暗主亂于姦臣小人之疑君子者惟聖人能見微以知明舊唐書唐次曰邪徑敗良田讒口亂善人惡其莠言之蠧政也蓋謂似信而詐似忠而非便便可以動心捷捷可以亂德豈止鶗鴂雕卉薏苡惑珠者哉由孔子而來至于今由孟子而來至于今春秋胡傳曰仲尼至于孟子百有餘嵗若顔曾則見而知之若孟子則聞而知之由孟子而來至于今千有餘嵗矣其書未亡其出于人心者猶在蓋有不得已焉耳則亦有不得已焉耳矣駢志卷二十
