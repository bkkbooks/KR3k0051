body:
  text: 駢志卷十明陳禹謨撰戊部下張平子造地動儀陶𢎞景造渾天象後漢書張衡字平子造候風地動儀以精銅鑄成員徑八尺合蓋隆起形似酒尊飾以篆文山龜鳥獸之形中有都柱傍行八道施闗發機外有八龍首銜銅丸下有蟾蜍張口承之其牙機巧制皆隱在尊中覆蓋周宻無際如有地動尊則振龍機發吐丸而蟾蜍銜之振聲激揚伺者因此覺知雖一龍發機而七首不動尋其方面乃知震之所在驗之以事合契若神自書典所記未之有也嘗一龍機發而地不覺動京師學者咸怪其無徴後數日驛至果地震隴西于是皆服其妙南史陶𢎞景造渾天象髙三尺許地居中央天轉而地不動以機動之悉與天相㑹云又舊唐書李淳風造渾天儀以銅為之表裏三重下據凖基狀如十字末樹龜足以張四表焉第一儀名曰六合儀有天經雙規渾緯規金常規相結于四極之内備二十八宿十干十二辰經緯三百六十五度第二名三辰儀圓徑八尺有璿璣規道月遊天宿矩度七曜所行並備于此轉于六合之内第三名四遊儀𤣥樞為軸以連結玉衡遊筩而貫約規矩又𤣥樞北樹北辰南距地軸傍轉于内又玉衡在𤣥樞之間而南北遊仰以觀天之辰宿下以識噐之晷度時稱其妙客星掩帝座客星犯天子幽明録漢武帝嘗微行造主人家仍留宿夜與主婢卧有一書生亦寄宿善天文忽見客星將掩帝座甚逼書生驚呼咄咄不覺聲髙又見一男子操刀將入戸聞書生聲急遂縮走客星應時而退如此者數過帝異而問之書生具説所見帝乃悟曰必此人婿也將欲肆兇惡於朕乃語主人召集期門羽林擒奴問而欵服乃誅之帝嘆曰斯葢天啟書生以扶祐朕躬乃厚賜書生㑹稽典録嚴遵字子陵與世祖俱受業長安建武五年下詔徴遵設樂陽明殿命宴㑹暮留宿遵以足荷上其夜客星犯天子宿明旦太史以聞上曰此無異也昨夜與嚴子陵俱卧耳吹笛止雨吹律煖谷周穆王時天下連雨三月穆王乃吹笛其雨遂止也劉向别録方士傳言鄒衍在燕燕有谷地美而寒不生榖鄒子居之吹律而温氣至而榖生今名黍谷引氣飛雪即席為炎拾遺記周靈王登昆昭之臺忽見二人乗雲而至一人先唱能為雪霜引氣一噴則雲起雪飛坐者皆凛然宫中池井堅氷可琢又云周靈王冬設狐腋素裘紫羆文褥羆褥是西域所獻也施於臺上坐者皆温又有一人唱能使即席為炎乃以指彈席上而暄風入室裘褥皆棄於臺上祈禱分風動揺起雨荆州記宫亭湖廟神甚有靈驗塗旅經過無不祈禱能使湖中分風而帆南北又云南康有平湖湖中艑底浮在湖中動揺便起風雨噀酒漱水邵氏家傳邵信臣為少府南陽遭火爇數萬人信臣時在丞相匡衡坐心動含酒東向噀之遭火處見雲西北來𠖇晦大雨以滅火雨酒香又後漢書郭憲從駕噀酒厭齊國火神僊傳成武丁于周昕坐噀酒救臨武火後漢書樊英隠于壺山嘗有暴風從西方起英謂學者曰成都市火甚盛因含水西向嗽之乃令記其時日客後有從蜀來云是日大火有黑雲從東起須臾大雨火遂得滅欒巴滅成都之火雨皆酒臭澄公滅幽州之火雨有酒氣神僊傳欒巴為尚書正朝大㑹巴後到又飲酒西南噀之詔問謝曰臣本縣成都市失火臣故因酒為雨以滅火後驛書問成都果然正旦失火有雨從東北來乃息雨皆酒臭晋書佛圖澄嘗與石季龍升中臺忽曰幽州當火灾乃取酒噀之曰救已得矣後遣驗之云是日火起西南驟雨滅之雨亦頗有酒氣市中耗𤓰坐上種𤓰搜神記徐光常行幻術于市里從人乞𤓰其主弗與便從索瓣種之俄而𤓰生蔓延成花實乃取食之因賜觀者鬻者反視所賣皆耗矣續僊傳馬湘有道術嘗于江南刺史馬植坐上冬月以酒杯盛土種𤓰須臾引蔓花實食之甚美許元長致榴董元素致柑劇談録唐武宗時術士金陵許元長善變幻武宗謂之曰先朝明崇儼取羅浮山柑子萬里往來止有旬日東都當進石榴時已熟矣卿今日當致十顆元長奉詔以出及旦寢殿始開金盤貯石榴致于御榻俄有使奉進亦以所失之數上聞異聞集唐宣宗朝有術者董元素自江南來上召見與語曰聞君頗有神術今南中柑橘正熟卿能致之否元素對曰請安一合于御榻前數刻時有微風入簾元素乃啟其合柑子滿其中奏曰此江陵枝江縣柑也逺處恐遲上嘗之驚歎黄公能制虎後為虎所殺長房能笞鬼後為鬼所殺西京雜記東海人黄公能制龍御虎佩赤金刀以絳繒束髪立興雲霧坐成山河及衰老不能復行其術秦末有白虎見於東海黄公乃以赤刀往厭之術既不行遂為虎所殺後漢費長房遇老翁為作符曰以此主地上鬼神遂能鞭笞百鬼及驅使社公或在他坐獨自恚怒人問其故曰吾責鬼魅之犯法者耳後失其符為衆鬼所殺豢龍呪龍中朝故事古有豢龍氏長安有豢龍戸觀水即知龍色其有無悉知之懿皇朝龍戸上言龍池中走失兩條往闗東尋訪數十日東都魏王池中見之取而歸闕經華州時李訥為華州刺史大以為虛妄命就公俯視之則于一小瓶子中倒于盆内乃二細鰍魚也訥怒目曰何以為驗對曰驗非難也請鑿穴尺許注水其間収鰍投水相趂旋轉尾觸穴四隅隨觸而䧟水亦暴漲逡廵穴已闊數尺其人諮訥云恐穴更廣即難制也遂搦入瓶中訥方竒之厚贈錢帛携歸輦下抱朴子西域方士能神呪者臨淵禹步吹氣龍即出浮其初出乃長十數丈于是方士更吹之一吹則龍輒一縮至長數寸掇取著壺中或有四五龍以少水養之物塞壺口聞有旱處便賫龍往賣之一龍直數十斤金舉國㑹歛以雇之直畢乃發壺出一龍著淵潭之中因復禹步吹之輙一吹一出長數十丈湏臾雲雨四集沉符蛟死施符蛇死潯陽記潯陽城東門通大橋常有蛟為百姓害董奉疏符沉水中少間見一蛟死浮出廣州記晋興郡路側五六里有一物大百圍長數十丈行者過視則往而不返積年如此失人甚多董奉從交州出由此嶠見之大驚云此蛇也住行旅施符敕經宿往看蛇已死矣左右白骨積聚成山少翁言能致其神巫者言貴妃可致漢書李夫人妙麗善舞得幸于武帝及卒上憐憫焉圖畫其形於甘泉宫上思念不已方士齊人少翁言能致其神乃夜張燈燭設幃帳陳酒肉令上居他帳遥望見好女如李夫人之貎還幄坐而步又不得就視上愈益相思悲感為作詩曰是耶非耶立而望之偏何姗姗其來遲令樂府諸音家弦歌之上又自為作賦以傷悼夫人南史殷淑儀南郡王義宣女帝密取之寵冠後宫假姓殷氏及薨帝嘗思見之遂為通替棺欲見輙引替覩屍如此積日形色不異時有巫者能見鬼説帝言貴妃可致帝大喜令召之有少頃果於帷中見形如生平帝欲與之言黙然不對將執手奄然便歇帝尤哽恨于是擬李夫人賦以寄意焉按陳鴻長恨傳𤣥宗心念楊妃有道士自蜀來自言有李少君術𤣥宗大喜命致其神與前二事正同其殷與楊並稱貴妃尤異左慈引鱸魚介象餌鯔魚後漢書左慈字元放少有神道嘗在司空曹操坐操從容顧衆賔曰今日髙㑹珍羞畧備少吴松江鱸魚耳神仙傳云松江出好鱸魚味異他處元放於下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤中湏臾引一鱸魚出操大拊掌笑㑹者皆驚操曰一魚不周坐席可更得乎放乃更餌釣沈之湏臾復引出皆長三尺餘生鮮可愛操使目前鱠之周浹㑹者操又謂曰既已得魚恨無蜀中生薑耳元放曰亦可得也操恐其即近所取因曰吾前遣人到蜀買錦可過勑使者増市二端語頃即得薑還并獲操使報命後操使蜀反驗問増錦之狀及時日早晚若符契焉葛洪神仙傳仙人介象字元則有諸方術吴主聞之徴象到武昌甚敬貴之稱為介君為起宅以御帳給之賜遺前後累千金從象學蔽形之術試還後宫及出殿門莫有見者又使象作變化種𤓰菜百果皆立生可食吴主共論鱠魚何者最美象曰鯔魚為上吴主曰論近道魚耳此出海中安可得乎象曰可得耳乃令人於殿庭中作方塪汲水滿之并求鉤象起餌之垂綸於塪中須臾果得鯔魚吴王驚喜問象曰可食否象曰故為陛下取以作生鱠安敢取不可食之物乃使厨下切之吴王曰聞蜀使來得蜀薑作韲甚好恨爾時無此象曰蜀薑豈不易得願差所使者可付直吴主指左右一人以錢五十付之象書一符以著青竹杖中使行人閉目騎杖杖止便買薑訖復閉目此人承其言騎杖湏臾止已至成都不知是何處問人人言是蜀市中乃買薑于時吴使張温先在蜀既於市中相識甚驚便作書寄其家此人買薑畢捉書負薑騎杖閉目須臾已還到吴厨下切鱠適了裴松之曰神仙之術詎可測量臣之臆斷以為惑衆所謂夏蟲不知冷冰耳佛圖澄識鈴音由道榮善洞視晋書劉曜攻洛陽石勒將救之其羣下咸諫以為不可勒以訪佛圖澄澄曰相輪鈴音云秀支替戾岡僕谷劬秃當此羯語也秀支軍也替戾岡出也僕谷劉曜胡位也劬秃當捉也此言軍中捉得曜也又令一童子潔齋七日取麻油合臙脂躬自研於掌中舉手示童子粲然有輝童子驚曰有軍焉甚衆見一人長大白晳以朱絲縛其肘澄曰此即曜也勒甚悦遂赴洛距曜生擒之北史由吾道榮隱于琅琊山中辟糓餌松术茯苓求長生之祕又善洞視蕭軌等之敗于江南其日道榮言之如目見其後鄉人從役得歸者勘問敗時形勢與道榮所説符同澄公以祝願脱黑略于羌圍澄公以祝願䕶弟子于被刼晋書郭黑略將兵征長安北山羌墮羌伏中時佛圖澄在堂上坐慘然改容曰郭公今有厄乃唱云衆僧祝願澄又自祝願有頃曰脱矣後月餘黑略還自説墮羌圍中東南走馬乏正遇帳下人推馬與之曰公乗此馬小人乗公馬濟與不濟命也略得其馬故獲免推檢時日正是澄祝願時也又佛圖澄嘗遣弟子向西域市香既行澄告餘弟子曰掌中見買香弟子在某處被刼垂死因燒香祝願遥救䕶之弟子後還云某月某日某處為賊所刼垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而走聖水聖火唐書汴宋觀察使令狐楚言亳州聖水出飲者疾輙愈裴度判曰妖由人興水不自作命在所禁塞又李徳裕傳云聖水獲利人轉相惑徳裕在浙西命于大市集人置釜取其水令取猪肉五斤煑云若聖水也肉當如故逡廵肉熟爛自此人心稍定妖者尋而敗露南史齊世祖時魏地謡言赤火南流喪南國是歲有沙門從北齎此火而至色赤于常火而微云以療疾貴賤爭取之多得其驗二十餘日都下大盛咸云聖火詔禁之不止火灸至七炷而疾愈吴興丘國賓宻以還鄉邑人楊道慶虛疾二十年依法灸即差神僊之術誕哉黄白之儔詭哉申鍳或問神僊之術曰誕哉末之也已矣聖人弗學非惡生也終始運也短長數也運數非人力之為也曰亦有僊人乎曰僬僥桂莽産乎異俗就有僊人亦殊類矣按詩含神霧曰從中州以東西四十萬里得僬僥國人長一尺五寸也又或問黄白之儔曰傅毅論之當也燔埴為瓦則可爍瓦為銅則不可以自然驗於不然詭哉敵犬羊之肉以造馬牛不幾矣不其然歟龜隂故數偶蓍陽故數竒禮三正記曰天子龜長一尺二寸諸侯一尺大夫八寸士六寸龜隂故數偶也天子蓍長九尺諸侯七尺大夫五尺士三尺蓍陽故數竒也非趙龜神而燕龜欺非秦龜神而趙龜欺韓非子鑿龜數筴兆曰大吉而以攻燕者趙也鑿龜數筴兆曰大吉而以攻趙者燕也劇辛之事燕無功而社稷危鄒衍之事燕無功而國道絶趙代先得意于燕後得意于齊國亂飾髙自以為與秦提衡非趙龜神而燕龜欺也趙又嘗鑿龜數筴而北伐燕將刼燕以逆秦兆曰大吉始攻大梁而秦出上黨矣兵至釐而六城拔矣至陽城秦拔鄴矣龎援前兵而南則障盡矣臣故曰趙龜雖無逺見于燕且宜近見于秦秦以其大吉辟地有實救燕有名趙以其大吉地削兵辱主不得意而死又非秦龜神而趙龜欺也初時者魏數年東鄉攻盡陶衛數年西鄉以失其國此非豐隆五行太乙王相攝提六神五括天河殷搶歳星非數年在西也又非天缺弧逆刑星熒惑奎台非數年在東也故曰龜筴鬼神不足舉動左右背鄉不足以專戰然而恃之愚莫大焉伐紂不信龜凶伐越不信筮凶論衡武王伐紂卜之而龜􅂒占者曰凶太公曰龜􅂒以祭則凶以戰則勝武王從之卒克紂焉又魯將伐越筮之得鼎折足子貢占之以為凶何則鼎而折足行用足故謂之凶孔子占之以為吉曰越人水居行用舟不用足故謂之吉魯伐越果克之司馬季主為賈宋導惑司馬季主為子陽導僊史記宋忠賈誼游于卜肆中與司馬季主往復季主曰今夫卜者導惑教愚也夫愚惑之人豈能以一言而知之哉言不厭多故騏驥不能與罷驢為駟而鳯凰不與燕雀為羣而賢者亦不與不肖者同列故君子處卑隱以辟衆自匿以辟倫微見徳順以除羣害以明天性助上養下多其功利不求尊譽公之等喁喁者也何知長者之道乎宋忠賈誼忽而自失芒乎無色悵然噤口不能言于是攝衣而起再拜而辭行洋洋也出市門僅能自上車伏軾低頭卒不能出氣真誥黄子陽者魏人也少知長生之妙學道在博洛山中九十餘年但食桃皮飲石中黄水後逢司馬季主季主以導仙八方與之遂以度世于南陌上伺駕黑牛生向西北行取乘黑牛人魏志裴松之注中書令史紀𤣥龍管輅鄉里人云輅在田舍嘗候逺隣主人患數失火輅卜教使明日于南陌上伺當有一角巾諸生駕黑牛故車必引留為設賓主此能消之即從輅戒諸生有急求去不聽遂留當宿意大不安以為圖已主人罷入生乃把刀出門倚兩薪積間側立假寐歘有一小物直來過前如獸手中持火以口吹之生驚舉刀砍正斷腰視之則狐自此主人不復有災又華城門夫人者魏故司空涿郡盧公女也得疾連年不差華家時居西城下南纒里中三廐在其東南管輅卜當有師從東方來自言能治便聽使之必得其力後無何有南征廐騶當充甲卒來詣盧公占能治女郎公即表請留之專使其子將詣華氏療病初用散藥後復用丸治尋有效即奏除騶名以補太醫北史有東菀鄭氏執得讎人趙氏尅明晨㑹宗族當就墓所刑之趙氏求救于王早早為占侯并授以一符曰君今取還選取七人令一人為行主者佩此符于鷄鳴時伏在仇家東南二里平旦當有十人相隨向西北行中有二人乘黑牛一黑牛最在前一黑牛應第七但捉取第七者將還事必無他趙氏從之果如其言乃是鄭氏男五父也諸子並為其族所宗敬故和解二家趙氏竟免東方朔射覆管公明射覆漢書東方朔待詔金馬門稍得親近上嘗使諸數家射覆置守宫盂下射之皆不能中朔自贊曰臣嘗受易請射之乃别蓍布卦而對曰臣以為龍又無角謂之為蛇又有足跂跂胍胍善縁壁是非守宫即蜥蜴上曰善賜帛十疋復使射他物連中輒賜帛魏志管輅字公明館陶令諸葛原遷新興太守輅往祖餞之賓客並㑹原自起取燕卵蠭窠鼅鼄著器中使射覆卦成輅曰第一物含氣湏變依乎宇堂雄雌以形翅翼舒張此燕卵也第二物家室倒懸門戸衆多藏精蓄毒得秋乃化此蠭窠也第三物觳觫長足吐絲成羅尋網求食利在昏夜此鼅鼄也舉坐驚喜平原太守劉邠取印囊及山鷄毛著器中使筮輅曰内方外圓五色成文含寳守信出則有章此印囊也髙岳巖巖有鳥朱身羽翼𤣥黄鳴不失晨此山鷄毛也清河令徐季龍使人行獵令輅筮其所得輅曰當獲小獸復非食獸雖有爪牙微而不彊雖有文章蔚而不明非虎非雉其名曰狸獵人暮歸果如輅言季龍取十三種物著大篋中使輅射云器中籍籍有十三種物先説鷄子後道蠶蛹遂一一名之惟以梳為枇耳賜帛榜百賞絹杖十漢書東方朔射覆連中輒賜帛時有幸倡郭舍人滑稽不窮常侍左右曰朔狂幸中耳非至數也臣願令朔覆射朔中之臣榜百不能中臣賜帛廼覆樹上寄生令朔射之朔曰是窶藪也舍人曰果知朔不能中也朔曰生肉為膾乾肉為脯著樹為寄生盆下為窶藪上令倡監榜舍人北史吴遵世為齊文襄墨曹參軍從遊山東有雲起恐雨廢射戲使筮遇剥李業興云坤上艮下剥艮為山山出雲故知有雨遵世云坤為地土制水故知無雨文襄使崔暹書之云遵世若著賞絹十疋不著罰杖十業興若著無賞不著罰杖十業興曰同是著何獨無賞文襄曰遵世著㑹我意故賞湏臾雲散二人各受賞罰蔡鐵卜鼠客師射鼠述異記蔡鐵善卜劉義宣射得一白鼠置函中召鐵卜之笑曰兑色之鼠背明戸彎弧射之絶左股鼠孕三雄而兩雌若不見信剖腹而立知公乃使剖鼠腹皆如鐵言唐袁天綱子客師髙宗置一鼠於匳令術家射之皆曰鼠客師曰雖實鼠然入則一出則四發之鼠生三子元理知主人果肴趙逹知主人酒脯西京雜記元理善筭每主人果蓏肴蔌悉知其所一日過友人趙廣漢廣漢為之取酒鹿脯數片元理曰此資業之廣何供饋之偏耶廣漢慙曰有倉卒客無倉卒主人元理曰爼上蒸㹠一頭厨中荔枝一柈皆可為設廣漢再拜謝辠自入取之盡日為歡吴志趙逹嘗過知故知故為之具食食畢謂曰倉卒乏酒又無佳肴無以叙意如何逹因取盤中隻著再三縱横之乃言卿東壁下有美酒一斛鹿肉三斤何以辭無時坐有他賓内得主人情主人慙曰以卿善射有無欲相試耳竟效如此遂出酒酣飲知囷米石數知庭棗實數西京雜記元理嘗從其友人陳廣漢廣漢曰吾有二囷米忘其石數子為計之元理以食筯十餘轉曰東囷七百四十九石二升七合又十餘轉曰西囷六百九十七石八㪷遂大署囷門後出米西囷六百九十七石七㪷九升中有一鼠大堪一升東囷不差圭合元理後歲復過廣漢廣漢以米數告之元理以手擊牀曰遂不知鼠之殊米不如剥面皮矣北史綦母懐文每云昔在晋陽為監館館中有一蠕蠕客同館胡沙門指語懐文云此人别有異筭術仍指庭中一棗樹云令其布筭子即知其實數乃試之并辯若干純赤若干赤白相半于是剥數之惟少一子筭者曰必不少但更撼之果落一實無用知之不如不知管輅别傳輅弟辰嘗欲從輅學卜及仰觀事輅言卿不可教耳夫卜非至精不能見其數非至妙不能覩其道孝經詩論足為三公無用知之也于是遂止子弟無能傳其術者蜀志杜瓊為人静黙少言闔門自守不與世事蔣琬費褘等皆器重之雖學業入深初不觀天文有所論説後進通儒譙周常問其意瓊答曰欲明此術甚難湏當身視識其形色不可信人也晨夜苦劇然後知之復憂漏泄是以不復視也孫䇿殺于吉孫權迎王表搜神記孫䇿欲渡江襲許與干吉俱行時大旱所在熇厲䇿催諸將士使速引船或身自早出督切見將吏多在吉所䇿因此激怒言我為不如干吉耶而先趨附之便使収吉至呵問之曰天旱不雨道途艱澁不時得過故自早出而卿不同憂戚安坐船中作鬼物態敗吾部伍今當相除令人縛置地上暴之使請雨若能感天日中雨者當原赦不爾行誅俄而雲氣上蒸膚寸而合比至日中大雨竟至溪澗盈溢將士喜悦以為吉必見原並往慶慰䇿遂殺之將士哀惜共藏其尸天夜忽更興雲覆之明旦往視不知所在䇿既殺干吉每獨坐彷彿見吉在左右意深惡之頗有失常後治創方差而引鏡自照見吉在鏡中顧而弗見如是再三因撲鏡大呌創皆崩裂湏臾而死吴志臨海羅陽縣有神自稱王表周旋民間語言飲食與人無異然不見其形又有一婢名紡績孫權遣中書郎李崇齎輔國將軍羅陽王印綬迎表表隨崇俱出與崇及所在郡守令長談論崇等無以易所歴山林輙遣婢與其神相聞秋七月崇與表至孫權于蒼龍門外為立第舍數使近臣齎酒食往表説水旱小事往往有驗及皇后潘氏薨諸將吏數詣王表請福表亡去孫盛曰盛聞國將興聽于民國將亡聽于神權年老志衰䜛臣在側廢適立庶以妾為妻可謂多凉徳矣而偽設符命求福妖邪將亡之兆不亦顯乎郭景純知命盡日中皇甫玉知不過日午晋書王敦將舉兵使郭璞筮之不吉敦大怒曰卿壽幾何曰命盡今日日中敦怒収璞斬之北史皇甫玉指文宣謂其妻曰殿上者不過二年妻以告舍人斛斯洪慶妻洪慶以啓帝怒曰向婦女小兒評論萬乘主敕召玉玉每照鏡自言兵死及被召謂妻曰我今去不廽若過日午時當得活既至正中遂斬之文摯怒齊王華陀怒郡守吕氏春秋齊王疾痏使人之宋迎文摯文摯至視王之疾謂太子曰王之疾必可已也雖然王之疾已則必殺摯也太子曰何故文摯對曰非怒王則疾不可治怒王則摯必死太子頓首彊請曰諾請以死争王與太子期而將往不當者三齊王固已怒矣文摯至不解屨登牀履王衣問王之疾王怒而不與言文摯因出辭以重怒王王叱而起疾乃遂已王大怒不説將生烹文摯大子與王后急争之而不能得果以鼎生烹文摯㸑之三日三夜顔色不變文摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之文摯乃死後漢華陀傳有一郡守篤病乆陀以為盛怒則差乃多受其貨而不加功無何棄去又留書罵之太守果大怒令人追殺陀不及因瞋恚吐黑血數升而愈扁鵲起虢太子澄公起勒愛子史記虢太子死扁鵲至虢宫門下問中庶子喜方者曰太子何病國中治禳過於衆事中庶子曰太子病血氣不時交錯而不得泄暴發于外則為中害精神不能正邪氣邪氣蓄積而不得泄是以陽緩而隂急故暴蹷而死扁鵲曰其死何如時曰鷄鳴至今曰収乎曰米也其死未能半日也言臣齊勃海秦越人也家在于鄭未嘗得望精光侍謁于前也聞太子不幸而死臣能生之子以吾言為不誠試入診太子嘗聞其耳鳴而鼻張循其兩股以至于隂當尚温也中庶子聞扁鵲言目眩然而不瞚舌撟然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲于中闕因噓唏服臆魂精泄横流涕長􅏰忽忽承䀹悲不能自止容貎變更扁鵲曰若太子病所謂尸蹷者也扁鵲乃使弟子子陽厲鍼砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之熨以八減之齊和煑之以更熨兩脇下太子起坐更適隂陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳晋書石勒愛子斌暴病死將殯勒歎曰朕聞虢太子死扁鵲能生之今可得效乎乃令告佛圖澄澄取楊枝沾水灑而呪之就執斌手曰可起矣因此遂蘇有頃平飲上池水盡見五臟癥結受青囊書遂洞五行天文史記扁鵲少時為人舍長舍客長桑君過扁鵲獨竒之常謹遇之長桑君亦知扁鵲非常人也出入十餘年乃呼扁鵲私坐間與語曰我有禁方年老欲傳與公公母泄扁鵲曰敬諾乃出其懐中藥予扁鵲飲是以上池之水三十日當知物矣乃悉取禁方盡與扁鵲忽然不見殆非人也扁鵲以其言飲藥三十日視見垣一方人以此視病盡見五臟癥結特以診脈為名耳晋書有郭公者客居河東精于卜筮璞從之受業公以青囊中書九卷與之由是遂洞五行天文卜筮之術禳災轉福通致無方雖京房管輅不能過也郭璞門人趙載嘗竊青囊書未及讀而為火所焚斷截腸胃既而縫合引出臟腑還內腹中後漢華佗精于方藥處劑不過數種心識分銖不假稱量針灸不過數處裁七八丸若疾發結于内針藥所不能及者乃令先以酒服麻沸散既醉無所覺因刳破腹背抽割積聚若在腸胃則斷截湔洗除去疾穢既而縫合傅以神膏四五日創愈一日之間皆平復晋書佛圖澄嘗齋時平旦至流水側從腹旁孔中引出五臟六腑洗之訖還內腹中作湯二升再服取蘇一升煑服後漢書華佗傳廣陵太守陳登忽患胸中煩懣面赤不食佗脈之曰府君胃中有蟲欲成内疽腥物所為也即作湯二升再服湏臾吐出三升許蟲頭赤而動半身猶是生魚膾所苦便愈佗曰此病後三期當發遇良醫可救登至期疾動時佗不在遂死南史禇澄善醫術建元中為吴郡太守百姓李道念以公事到郡澄見謂曰汝有重疾荅曰舊有冷疾至今五年衆醫不差澄為胗脈謂曰汝病非冷非熱當是食白瀹雞子過多所致今取蘇一升煑服之始一服乃吐出一物如升涎裹之動開㸔是雞雛羽翅𤓰距具足能行走澄曰此未盡更服所餘藥又吐得如向者鷄十三頭而病都差當時稱妙華元化療咽塞徐文伯療髪癥後漢書華佗字元化嘗行道見有病咽塞者因語之曰向來道隅有賣餅人䓑虀甚酸可取三升飲之病自當去即如佗言立吐一蛇乃懸車而侯佗時佗小兒戯于門中逆見自相謂曰客車邊有物必是逢我翁也及客進顧視壁北懸蛇以十數乃知其竒南史宋明帝宫人患腰痛牽心每至輙氣欲絶衆醫以為肉癥徐文伯曰此髮癥以油投之即吐得物如髮稍引之長三尺頭已成蛇能動挂門上滴盡一髮而已病都差華元化針死胎徐文伯針雙胎後漢書有李將軍者妻病呼佗視脈佗曰傷身而胎不去將軍言間日實傷身胎已去矣佗曰按脈胎未去也將軍以為不然妻稍差百餘日復動更呼佗佗曰胎理如前似兩胎先生者去血多故後兒不得出也胎既已死血脈不復歸必燥着母脊乃為下針并令進湯婦因欲産而不通佗曰死胎枯燥勢不自生使人探之果得死胎人形可識但其色已黑南史宋後廢帝出樂游苑門逢一婦人有娠帝亦善診診之曰此腹是女也問徐文伯曰腹有二子一男一女男左邊青黑形小于女帝性急便欲使剖文伯惻然曰若刀斧恐其變異請針之立落便㵼足太隂補手陽明胎便應針而落兩兒相續出如其言水灌滿百數水澆盡百斛華佗别傳有婦人長病經年世謂寒熱注病者冬十一月中佗令坐石槽中平旦用冷水汲灌云當滿百始七八灌㑹戰欲死灌者懼欲止佗令滿數將至八十灌熱氣乃蒸出囂囂髙二三尺滿百灌佗乃使然火温床厚覆良乆汗洽出著粉汗燥便愈南史直閣將軍房伯玉服五石散十許劑無益更患冷夏日常複衣徐文伯為診之曰卿伏熱應湏以水發之非冬月不可至十一月氷雪大盛令二人夾捉伯玉解衣坐石取冷水從頭澆之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閤敢有諫者撾之又盡水百斛伯玉始能動而見背上彭彭有氣俄而起坐曰熱不可忍乞冷飲嗣伯以水與之一飲一升病都差自爾恒發熱冬月猶單褌衫體便肥壯為氣徙癰作氣出鏃南史薛伯宗善徙癰疽公孫泰患背伯宗為氣封之徙置齋前柳樹上明旦癰消樹邊便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黄赤汁斗餘樹為之萎損又陳顯逹與桂陽賊戰矢中左目而鏃不出地黄村潘嫗善禁先以釘釘柱嫗禹步作氣釘即出乃禁顯逹目中鏃出之服雄黄吐誤食之髮熏防風療不語之證舊唐書時有尼明律年六十餘患心腹鼓脹身體羸痩已經二年甄立言診脈曰其腹内有蟲當是誤食髮為之耳因令服雄黄湏臾吐一虵如人手小指唯無眼燒之猶有髪氣其疾乃愈又許𦙍宗初事陳為新蔡王外兵參軍時柳太后病風不言名醫治皆不愈脈益沈而噤𦙍宗曰口不可下藥宜以湯氣熏之令藥入腠理周理即差乃造黄耆防風湯數十斛置於牀下氣如煙霧其夜便得語誑語療疑病權誑療眼花北夢𤨏言元頑博士話唐時中表間有一婦人從夫南中效官曾誤食一蟲嘗疑之由是成疾頻療不損京城醫者忘其姓名知其所患乃謂主人姨妳中謹宻者一人預戒之曰今以藥吐㵼但以盤盂盛之當吐之時但言有一小蝦蟇走去然不得令娘知之是誑語也其妳僕遵之此疾永除又有一年少眼中嘗見一小鏡子醫工趙卿胗之與少年期來晨以魚鱠奉候少年及期赴之延于閣子内且令從容俟客退後方得攀接俄而設臺于上施一甌芥醋更無他味卿亦未出迨禺中乆侯不至少年饑甚且聞醋香不免輕啜之逡廵又啜之覺胸中豁然眼花不見因竭甌啜之趙卿探知方出少年以啜醋慙謝卿曰郎君喫鱠太多醬醋只欲郎君因饑以啜之果愈此疾烹鱗之㑹乃權誑請退謀餐龍化為老翁求治鬼請為芻人求療山川紀異龍背生疽化老翁求治於孫登曰病痊當有報時天旱不數日果大雨大石上忽裂一井其水湛然南史徐秋夫仕至射陽令常夜有鬼呻聲甚悽愴秋夫問何湏荅曰姓某家在東陽患腰痛死雖為鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人按孔穴針之秋夫如言為灸四處又針肩井三處設祭埋之明日見一人謝恩忽然不見當世伏其通靈治病龍出懶龍山川紀異湯隂西有真人杜舊傳孫登寓此值旱衆禱于龍得雨將祭謝之登曰此病龍雨安能蘇禾稼弗信請嗅之水果腥穢龍時背生疽聞登言化老翁求治曰病痊當有報不數日果大雨大石上忽裂一井其水湛然葢龍穿此以報也髙僧傳什僧伽閒而宴息見神告曰天方亢陽百姓苖死身胡藏其懶龍耶伽曰為之柰何神曰若今夕旦小指出窻隙外其如人何伽依之其夜霆擊異常質明視指微有紅線脉焉黥布刑而王昭逹𦕈而貴史記黥布秦時為布衣少年有客相之曰當刑而王及壯坐法黥布欣然笑曰人相我當刑而王幾是乎人有聞者共俳笑之及項王封諸將立布為九江王南史章昭逹性倜儻輕材尚氣少時遇相者謂曰卿容貎甚善湏小虧則當冨貴梁大同中昭逹為東宫直後因醉墮馬鬢角小傷昭逹喜之相者曰未也侯景之亂昭逹率鄉人援臺為流矢所中𦕈其一目相者見之曰卿相善矣不乆當冨貴臺城䧟昭逹還鄉里與陳文帝游因結君臣分侯景平文帝為吴興太守昭逹杖䇿來謁文帝見之大喜委以將帥恩寵超于儕等三君皆丞相三人皆方伯史記有善相工田文者與韋丞相賢魏丞相相邴丞相吉微賤時㑹于客家田文言曰今此三君者皆丞相也其後三人竟更相代為丞相南史沈攸之賤時與吴郡孫超之全景文共乘一小船出都三人共上引埭有一人止而相之曰君三人皆當至方伯攸之曰豈有是事相者曰不驗便是相書誤耳後攸之為郢荆三州超之廣州刺史景文南豫州刺史鉗徒相衛青貴至封侯相工指倪寛秩至三公論衡衛青父鄭季與陽信公主家僮衛媪通生青在建章宫時鉗徒相之曰貴至封侯青曰人奴之道得不笞罵足矣安敢望封侯其後青為軍吏戰數有功超封增官遂為大將軍封為萬戸侯又韓太傅為諸生時借相工五十錢與之俱入璧雍之中相璧雍弟子誰當貴者相工指倪寛曰彼生當貴秩至三公韓生謝遣相工通刺倪寛結膠漆之交盡筋力之敬徙舍從寛深自附納之寛常甚病韓生養視如僕役恩深踰于骨肉後名聞于天下倪寛位至御史大夫州郡承㫖召請擢用舉在本朝遂至太傅夫鉗徒許負及相鄧通倪寛之工可謂知命之工矣故知命之工察骨體之證睹富貴貧賤猶人見盤盂之器知所設用也善器必用貴人惡器必施賤者尊鼎不在陪厠之側瓠𤓰不在堂殿之上明矣衛仲卿以人奴而具封侯相薛大鼎以人奴而具方岳相漢書衛青字仲卿嘗從人至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯事乎舊唐書初泗州刺史薛大鼎隋時嘗坐事没為奴貞觀初與數人詣乙弗𢎞禮大鼎次至𢎞禮曰君奴也欲何所相咸曰何以知之𢎞禮曰觀其頭目直是賤人但不知餘處何如耳大鼎有慚色乃解衣視之𢎞禮曰看君面不異前言占君自腰已下當為方岳之任折臂三公折臂太守晋書羊祜傳有善相墓者言祜祖墓所有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至公而無子南史初劉之遴在荆府常寄居南郡忽夢前太守袁彖謂曰卿後當為折臂太守即居此中之遴後牛奔墮車折臂右手偏直不復得屈伸書則以手就筆歎曰豈黥而王乎周捨嘗戯之曰雖復並坐可横政恐陋巷無枕後連相兩王再為此郡相裴冕以兵起得相相吕諲須大驚得相舊唐書裴冕為祠部郎中知河西留後在武威金梁鳯謂冕曰𤣥象有變半年間有兵起郎中此時當得中丞不拜中丞即宰相不離天子左右大富貴冕曰公乃狂言冕何至此梁鳯曰有一日向東京一日入西蜀一日來向朔方此時公得相冕懼其言深謝絶之其後安禄山反南犯洛陽僭稱偽位哥舒翰東守潼闗累月奏冕為御史中丞追赴京冕又詰曰事驗矣冕又問三日之兆梁鳯曰東京日即自磨滅蜀川日亦不能乆此間日何轉分明不可説冕志之即潼闗失守𤣥宗幸蜀肅宗比如靈武冕㑹之勸成册立改元為至徳元年冕果為中書侍郎平章事又金梁鳯在河隴謂吕諲曰判官骨相合得宰相湏得一大驚怖即得諲後至驛責讓驛長榜之驛吏武將性麤猛持弓矢突入射諲矢兩發幾中諲面諲踰墻得免以報梁鳯梁鳯曰此必入相逾年諲自黄門侍郎知政事摸人而知其相摸書而知其字北史皇甫玉善相術齊文宣故以巾袜其眼使歴摸知人至文宣曰此最大逹官于任城王曰當至丞相于常山長廣二王並曰亦貴至石動桶曰此弄癡人至二供膳曰正得好飲食而已又盧太翼博綜羣書其後目盲以手摸書而知其字朱建平善相人朱建平善相馬魏志朱建平善相術于閭巷之間效驗非一太祖為魏公聞之召為郎文帝為五官將坐上㑹之三十餘人文帝問已年壽又令徧相衆賔建平曰將軍當壽八十至四十時當有小厄願謹䕶之謂夏侯威曰君四十九位為州牧而當有厄厄若得過可年至七十致位公輔謂應璩曰君六十二位為常伯而當有厄先此一年當獨見一白狗而旁人不見也謂曹彪曰君據藩國至五十七當厄于兵宜善防之初潁川荀攸鍾繇相與親善攸先亡子㓜繇經紀其門戸欲嫁其妾與人書曰吾與公逹㑹共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時啁之曰惟當嫁阿騖耳何當此子竟遭隕没戯言遂驗乎今欲嫁阿騖使得善處追思建平之妙雖唐舉許負何以復加也文帝黄初七年年四十病困謂左右曰建平所言八十謂晝夜也吾其决矣頃之果崩夏侯威為兖州刺史年四十九十二月上旬得疾念建平之言自分必死豫作遺令及送喪之備咸使素辦至下旬轉差垂以平復三十日日昃請紀綱大吏設酒曰吾所苦漸平明日鷄鳴年便五十建平之戒真必過矣威罷客之後合瞑疾動夜半遂卒璩六十一為郎中直省内歘見白狗問之衆人悉無見者于是數聚㑹并急游觀田里飲宴自娱過期一年六十三卒曹彪封楚王年五十七坐與王凌通謀賜死又朱建平善相馬文帝將出取馬外入建平道遇之語曰此馬之相今日死矣帝將乘馬馬惡衣香驚齧文帝膝帝大怒即便斬之相馬相牛吕覽古之善相馬者寒風是相口齒麻朝相頰子女厲相目衛忌相髭許鄙相􅪉投伐褐相胷脇管青相膹物陳悲相股腳秦牙相前贊君相後凡此十人者皆天下之良工也其所以相者不同以用見馬之一徴也而知節之髙卑足之滑易材之堅脆能之長短非獨相馬然也人亦有徴酉陽雜爼相牛法岐胡有壽膺匡欲廣毫筋欲横蹄後筋也常有聲有黄也角冷有病旋毛在珠泉無壽睫亂觸人銜烏角偏妨主毛少骨多有力溺射前良牛也踈肋難養相印相板相笏魏氏春秋云許允之出為鎮北也喜謂其妻曰吾知免矣妻曰禍見於此何免之有允善相印將拜以印不善使更刻之如此者三允曰印雖始成而已被辱問送印者果懐之而墜之于厠相印書曰相印法本出陳長文長文以語韋仲將即工楊利從仲將受法以語許士宗利以法術占吉凶十可中八九仲將問長文從誰得法長文曰本出漢世有相印相笏經又有鷹經牛經馬經印工宗養以法語程申伯是故有一十二家相法傳於世南史庾道愍精於相板宋明帝時山陽王休祐屢以言語忤顔見道愍託以已板為他物令道愍占之道愍曰此乃甚貴然使人多愆忤休祐以禇彦囬詳宻求換其板他日彦囬侍明帝自稱下官帝多忌甚不悦休祐具以狀言帝意乃解又綦毋珍之在西州時有一手板相者云當貴每以此言動帝又圖黄門郎帝嘗問之曰西州時手板何在珍之曰此是黄門手板官何湏問南部新書有李參軍者善相笏知休咎必驗呼為李相笏又有龍復本者無目凡有象簡竹笏以手捻之必知官禄年壽周宣相夢趙直占夢魏志周宣為郡吏太守楊沛夢人曰八月一日曹公當至必與君杖飲以藥酒使宣占之是時黄巾賊起宣對曰夫杖起弱者藥治人病八月一日賊必除滅至期賊果破文帝問宣曰吾夢殿屋兩瓦墮地化為雙鴛鴦此何謂也宣對曰後宫當有暴死者帝曰吾詐卿耳宣對曰犬夢者意耳茍以形言便占吉凶言未畢而黄門令奏宫人相殺帝復問曰我昨夜夢青氣自地屬天宣對曰天下有貴女子寃死是時帝已遣使賜甄后璽書聞宣言而悔之遣人追賜者不及帝復問曰吾夢摩錢文欲令滅而更愈明此何謂耶宣悵然不對帝重問之宣對曰此自陛下家事雖意欲爾而太后不聽是以文欲滅而明耳時帝欲治弟植之罪偪于太后但加貶爵以宣為中郎屬太史嘗有問宣曰吾昨夜夢見芻狗其占何也宣荅曰君欲得美食有頃出行果遇豐膳後又問宣曰昨夜復夢見芻狗何也宣曰君宜墮車折脚宜戒慎之頃之果如宣言後又問宣昨夜復夢見芻狗何也宣曰君家欲失火當善䕶之俄遂火起語宣曰前後三時皆不夢也聊試君耳何以皆驗耶宣曰此神靈動君使言故與真夢無異也又問宣三夢芻狗而其占不同何也宣曰芻狗者祭神之物故君始夢當得飲食也祭神即訖則芻狗為車所轢故中夢當墮車折脚也芻狗既車轢之後必載以為樵故後夢憂失火也蜀志魏延夢頭上生角以問占夢趙直直詐延曰夫麒麟有角而不用此不戰而賊欲自破之象也退而告人曰角之為字刀下用也刀下用刀其凶甚矣蔣琬見推之後夜夢有一牛頭在門前流血滂沱意甚惡之呼問直直曰夫見血者事分明也牛角及鼻公字之象君位必當至公大吉之徴也蜀志注何祗嘗夢井中生桒以問直直曰桒非井中之物㑹當移植然桒字四十八君壽恐不過此祗笑言得此足矣後為犍為郡年四十八卒如直所言射龍屠龍尸子韓雉見申羊于魯有龍飲于沂韓雉曰吾聞也出見虎摶之見龍射之今弗射是不得行吾聞也遂射之莊子朱泙漫學屠龍于支離益單千金之家三年技成而無所用其巧射梅射蔗南史柳惲嘗與瑯琊王瞻博射嫌其皮濶乃摘梅帖烏珠之上發必命中觀者驚駭濟書宜都王鏗善射常以棚的大濶曰終日射候何難之有乃取甘蔗揷地百步射之十發十中養由基射猿養由基射蜻吕覽荆王有神白猿王自射之則摶樹而嬉使養由基射之始調弓矯矢术發猿擁樹而號尸子楚莊王命養由基射蜻蛉曰吾願生得養由基援弓射之拂左翼曹丕善左右射董卓善左右射典略文帝自叙曰尚書令荀彧奉使犒軍見余談論之末彧言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰埒有常徑的有常所雖每發輙中非至妙也若馳平原赴豐草要狡獸截輕禽使弓不虛彎所中必洞斯則妙矣魏志董卓有才武膂力少比雙帶兩鞬左右馳射二狐俱獲雙鴈俱落南史山强工騎射彎弓五石為奏事中散從獻文獵方山有兩狐起于御前詔强射之百步内二狐俱獲北史斛律光以庫直事文襄從出野見鴈雙飛來文襄使光馳射之以二矢俱落焉二箭下雙䲭一發貫二鵰後魏秦王翰弟幹善弓馬以馳從明元于白登之東北有雙䲭飛鳴于上帝命左右射之莫能中䲭旋飛稍髙幹以二箭下雙䲭南史突厥攝固獨愛長孫晟每共游獵留之竟歳嘗有二鵰飛而争肉固以箭兩隻與晟請射取之晟馳往遇雕相攫遂一發雙貫焉攝圖喜命諸子弟貴人皆相親友冀昵近之以學彈射見二鹿授箭見雙鳬授弓北史尒朱榮曾送臺使見二鹿授兆二箭令取供今食遂構火以待之俄而兆獲其一榮欲誇使人責兆不盡取杖之五十又尉遲綱嘗從周文北狩雲陽見五鹿俱走綱獲其三又賀拔勝從宴昆明池時有雙鳬游池上周文授弓矢于勝曰不見公射乆矣請以為歡勝射之一發俱中因拜曰使勝得奉神武以討不庭皆此類也又魏孝武即位蠕蠕等諸蕃並遣使朝貢帝臨軒宴之有鴟飛鳴于殿前帝素知竇熾善射因欲矜示逺人乃給熾御箭兩隻命射之鴟乃應弦而落諸蕃人咸歎異焉帝大悦落鵰都督射鴟都將北齊書斛律光嘗從世宗于洹橋校獵見一大鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深壯異焉丞相屬邢子髙見而歎曰此射鵰手也當時傳號落鵰都督後魏書秦王翰弟幹善弓馬以騎從明元于白登之東北有雙鴟飛鳴于上帝命左右射之莫能中鴟旋飛稍髙幹以二箭下雙鴟帝賜之御馬弓矢以旌其能軍中于是號幹為射鴟都將畫維摩神光滿室畫釋迦視之如生尉遲偓金陵六朝記顧愷之于瓦官寺畫維摩神光滿室累日方散又王定之于白馬寺畫釋迦像視之如生誤落筆因畫為蠅誤落墨因作駮牛尉遲偓金陵六朝記曹不興赤烏元年游青溪見赤龍凌波面而出乃走筆圖之藏于祕閣是歳大旱乃出龍祭之則甘雨霶霈又為吴王畫屏風誤落筆因畫為蠅吴王以袂拂之不去方悟焉又冩葛仙公真容世傳之按吴録云曹不興善畫權使畫屏風誤落筆㸃素因就以作蠅既進御權以為生蠅舉手彈之又王致之為桓温畫扇悮落墨因作駮牛甚妙宿其下十日宿其傍三日隋唐嘉話閻立本家代善畫至荆州張僧繇見之曰定虚得名耳明日更往曰名下定無虚士坐卧觀之留宿其下十日不能去又率更令歐陽詢行見古碑索靖所書駐馬觀之良乆而去數百步復還下馬佇立疲則布毯坐觀因宿其傍三日而後去閻立本悔畫陸鴻漸毁茶舊唐書閻立本善圖畫工于冩真秦府十八學士圖及貞觀中凌煙閣功臣圖並立本之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟于春苑池中有異鳥隨波容與太宗擊賞數賜詔座者為詠召立本令冩焉時閣外傳呼云畫師閻立本時已為主爵郎中奔走流汗俯伏池側手揮丹粉瞻望座賔不勝媿赧退誡其子曰吾少好讀書幸免面墻緣情染翰頗及儕流惟以丹青見知躬役之務辱莫大焉汝冝深誡勿習此末伎立本為性所好欲罷不能也及為右相與左相姜恪對掌樞宻恪既歴任將軍立功塞外立本惟善于圖畫非宰相之器故時人以千字文語曰左相宣威沙漠右相馳譽丹青唐書陸羽字鴻漸性嗜茶著經三篇言茶之原之法之具尤偹犬下益知飲茶矣時鬻茶者至陶羽形置煬突間祀為茶神有常伯熊者因羽論復廣著茶之功御史大犬李季卿宣慰江南次臨淮知伯熊善煮茶召之伯熊執器前季卿為再舉杯至江南又有薦羽者召之羽衣野服挈具而入季卿不為禮羽愧之更著毁茶論其後尚茶成風時回紇入朝始驅馬市茶魏文帝善彈棊王僧䖍善累棊博物志魏文帝善彈棊能用手巾角時有一書生又能低頭以所著葛巾角撇棊世説曰彈棊始自魏宫内妝奩戯也文帝于此技亦特好有客自云能帝使為之妙踰于帝南史王僧䖍累十二博棊既不墜落亦不重作拾子如龍鳯形下子成一首詩酉陽雜爼晋鳩摩羅什與人碁拾敵死子空處如龍鳯形棊天洞覽王勃圍棋率下四子成一首詩勃猶詫之向人曰吾目奪造化雖一時之間百用亦可捶鉤者非鉤無察承蜩者唯蜩之知莊子大馬之捶鉤者年八十矣而不失毫芒大馬曰子巧與有道與曰臣有守也臣之年二十而好捶鉤于物無視也非鉤無察也是用之者假不用者也以長得其用而况乎無不用者乎物孰不資焉注曰大馬大司馬也江東三魏之間謂鍜為捶鉤劍名又仲尼適楚出于林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道耶曰我有道也吾六月累丸二而不墜則失者錙銖累三而不墜則失者十一累五而不墜猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃凝于神其痀僂丈人之謂乎偃師所造倡者馬鈞所作木人列子周穆王西廵狩越崑崙不至弇山反還未及中國道有獻工人名偃師穆王薦之問曰若有何能偃師曰臣惟命所試然臣已有所造願王先觀之穆王曰日以俱來吾與若俱觀之翌日偃師謁見王王薦之曰若與偕來者何人耶對曰臣之所造能倡者穆王驚視之趣步俯仰信人也巧夫顉其頥則歌合律捧其手則舞應節千變萬化惟意所適王以為實人也與盛姬内御並觀之技將終倡者瞬其目而招王之左右侍妾王大怒立欲誅偃師偃師大懾立剖散倡者以示王皆傅㑹革木膠漆白黑丹青之所為王諦料之内則肝膽心肺脾腎腸胃外則筋骨肢節皮毛齒髪皆假物也而無不畢具者合㑹復如初見王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王始悦而歎曰人之巧乃可與造化者同功乎詔貳車載之以歸魏志注人有上百戯者能設而不能動也帝以問馬鈞可動否對曰可動帝曰其巧可益否對曰可益受詔作之以大木彫構使其形若輪平地施之潜以水發焉設為女樂舞象至令木人擊皷吹簫作山岳使木人跳丸擲劍縁絙倒立出入自在百官行署舂磨鬭雞變巧百端評曰倡者假矣誰知己之百骸九竅盡假也木人幻矣誰知己之聲音笑貎悉幻也彼妄認四大為自身相六塵緣影為自心相者豈認幻化人亦真人耶魯般刻木為仙魯般刻木為鶴酉陽雜爼魯般燉煌人未詳年代巧侔造化嘗作木鳶其父乘之至吴㑹吴人以為妖殺之般怨吴人殺其父于肅州城南作一木仙人舉手指東南吴地大旱三年人曰般所為也于是賫物巨千謝之般為斷其一手其月吴中大雨唐初工人尚祈禱其木仙述異記天姹山南峯昔魯般刻木為鶴一飛七百里後放于北山西峯上漢武帝使人往取之遂飛上南峯往往天將雨則翼翅動揺若將飛奮墨子為鳶一日而敗公輸為鵲三日不下韓子墨子為木鳶三年而成蜚一日而敗弟子曰先生之巧至能使木鳶飛墨子曰不如為車輗者巧也用咫尺之木不費一日之事而引三十石之任致逺力多乆于歲數今我為鳶三年成蜚一日而敗惠子聞之曰墨子大巧巧為輗拙為鳶墨子公輸子削竹木以為鵲成而飛之三日不下公輸子自以為至巧子墨子謂公輸子曰子之為鵲也不如翟之為車轄湏臾斵三寸之木而任五十石之重故所為巧利于人謂之巧不利于人謂之拙三年而成楮葉三年而成畫莢列子宋人有為其君以玉為楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而不可别也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧韓子客有為周君畫莢者三年而成君觀之與髹莢者同狀周君大怒畫莢者曰築十版之墻鑿八尺之牖而以日始出時加之其上而觀周君為之望見其狀盡成龍蛇禽獸車馬萬物之狀備具周君大悦畫莢之功非不微難也然其用與素髹莢同羽人乗蠡舟越王銅船神人乘漆舟廪君土船拾遺記秦始皇好神仙有羽人乘蠡舟浮黑水而至者身長十丈編毛為衣兩目如電方耳出于項間顔如童稚三秦記太虛山上有池神人常乗漆船于其内今有故漆船在焉交州記安定縣有越王銅船潮退則見又隂雨日百姓樵採見銅船出水上載記廪君之先五姓爭之乃以土為船雕畫之而浮水中曰若其船浮存者以為廪君務相船獨浮于是遂稱廪君乘其土船將其從卒當夷水而下駢志卷十
