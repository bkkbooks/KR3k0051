body:
  text: 駢志卷四明陳禹謨撰乙部下始皇歎不得與此人同時孝武歎不得與此人同時論衡韓非之書傳於秦庭始皇歎曰獨不得與此人同時陸賈新語每奏一篇高祖左右稱曰萬歲夫歎思其人與喜稱萬歲豈可空為哉誠見其美歡氣發於內矣史記蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是請為天子游獵賦賦成奏之復奏大人頌天子大悅飄飄有凌雲之氣似游天地之間意又論衡漢武善子虛之賦徵司馬長卿孝成玩弄衆書之多善揚子雲出入游獵子雲乘從故曰玩揚子雲之篇樂於居千石之官挾桓君山之書富於積猗頓之財鼂錯號智囊桓範號智囊漢書鼂錯為太子家令以其辨得幸太子太子家號曰知囊師古曰言其一身所有皆是知算若囊槖之盛也干寶晉書桓範出赴曹爽司馬宣王謂蔣濟曰知囊往矣濟曰範則智矣駑馬戀棧豆爽必不能用也大才當晚成大才須大用後漢書馬援少有大志諸兄竒之嘗授齊詩意不能守章句乃辭兄况欲就邊郡田收况曰汝大才當晚成良工不示人以朴且從所好舊唐書韋安石應明經舉纍授乾祐尉蘇良嗣甚禮之永昌元年三遷雍州司兵良嗣時為文昌左相謂安石曰大才須大用何為徒勞於州縣也陳蕃謂文武兼資臣不如李膺王圭謂才兼文武臣不如李靖後漢書陳蕃代楊秉為太尉蕃讓曰不愆不忘率由舊章臣不如太尉胡廣齊七政訓五典臣不如議郎王畼聰明亮達文武兼資臣不如弛刑李膺舊唐書房𤣥齡李靖溫彥博戴胄魏徵與王圭同知國政後嘗侍宴太宗謂圭曰卿識鑒清通尤善談論自房𤣥齡等咸宜品藻又可自量孰與諸子賢對曰孜孜奉國知無不為臣不如𤣥齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如溫彥博處劇理繁衆務必舉臣不如戴胄以諫諍為心恥君不及於堯舜臣不如魏徵至如激濁揚清嫉惡好善臣於數子亦有一日之長太宗深然其言羣公亦各以為盡已所懷謂之確論徐庶以孔明為臥龍苻堅以景略為臥龍蜀志徐庶見先主先主器之謂先主曰諸葛孔明者臥龍也將軍豈願見之乎晉書苻堅謂王猛曰卿昔螭蟠布衣朕龍潛弱冠屬世事紛紜厲世之際顛覆厥德朕竒卿于暫見擬卿為臥龍卿亦異朕於一言回考槃之雅志豈不精契神交千載之㑹雖傅巖入夢姜公悟兆今古一時亦不殊也按景略與孔明同諡武侯評曰玉之未理者稱璞鼠之未臘者亦稱朴物固有似之而非者孔明忠於漢室景略忠於僞朝何異白璧與鼠朴哉臥龍之擬武侯之諡胡為乎相肖也亦可醜矣孔明臥龍士元鳳雛士載伏鸞士龍隱鵠襄陽記曰諸葛孔明為臥龍龎士元為鳳雛司馬德操為氷鏡皆龎德公語也世說世目鄧士載為伏鸞陸士龍為隱鵠深源不起當如蒼生何安石不出將如蒼生何晉書殷浩字深源時擬之管葛王蒙謝尚猶伺其出處以卜江左興亡因相與省之知浩有確然之志既反相謂曰深源不起將如蒼生何又謝安石發新亭朝士咸送中丞高嵩戲之曰卿纍違朝㫖高臥東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安甚有愧色非此母不生此子非此父不生此子史記張湯死昆弟諸子欲厚葬湯湯母曰湯為天子大臣被汙惡言而死何厚葬乎載以牛車有棺無槨天子聞之曰非此母不能生此子又列女傳孝廉范逵宿於陶侃家時大雪侃母湛氏撤所臥薦自銼飼其馬逵聞之歎曰非此母不生此子北史達奚武子震少驍勇走及奔馬周文嘗於渭北校獵時有兔過周文前震與諸將競射之馬倒而墜震足不傾躓因步走射之一發中兔顧馬才起遂回身騰上周文喜曰非此父不生此子乃賜震雜綵一百段後除華州刺史震雖出自膏腴少習武藝然頗有政術谷子雲之筆樓君卿之舌潘安仁之筆樂彥輔之㫖漢書樓護與谷永俱為五侯上客長安號曰谷子雲永筆札樓君卿護脣舌言其見信用也晉書樂廣善清言而不長於筆將讓尹請潘嶽為表嶽曰當得君意廣乃作二百句語述已有志嶽因取次比便成名筆時人咸曰若廣不假嶽之筆嶽不取廣之㫖無以成斯美也膽定膽幹膽決膽守膽烈吳志朱然長不盈七尺氣候分明內行修潔其所文采惟施軍器餘皆質素終日欽欽常在戰場臨急膽定尤過絶人雖世無事每朝夕嚴鼓兵在營者咸行裝就隊以此玩敵使不知所備故出輒有功又虎威將軍吕蒙病篤孫權問曰卿如不起誰可代者䝉對曰朱然膽守有餘愚以為可任䝉卒權假然節鎮江陵晉陽秋稱虞談清貞有檢操外如退弱內堅正有膽幹㑹稽典録曰賀景輕財貴義膽烈過人吳志孫峻少便弓馬精果膽決梁高祖稱羊侃勇者有仁齊朋僚歎楊愔仁者必勇梁書高祖謂羊侃曰吾聞仁者有勇今見勇者有仁北史韓陵之戰楊愔每陳先登朋僚咸共怪歎曰楊氏儒生今遂為武士仁者必勇定非虛論君有古人之風故賜君古人之服君有古人之風故贈君古人之服魏志初太祖平柳城班所獲器物特以素屏風素馮几賜毛玠曰君有古人之風故賜君古人之服按汝南先賢行狀曰玠雅亮公正在官清恪南史孔圭父靈産頗解星文齊高帝以簏盛靈産上靈臺令其占候餉靈産白羽扇素隱几曰君有古人之風故贈君古人之服當世榮之卿有古人之風故遺卿古人之器卿有古人之風故賜卿古人之物南史昭明太子有瓠食器因以賜劉沓焉曰卿有古人之風故遺卿古人之器又傅昭器服率陋嘗插燭板牀齊明帝聞之賜漆合燭盤敕曰卿有古人之風故賜卿古人之物卿真宰相此真諌官舊唐書則天嘗以季秋內出梨花一枝示宰臣曰是何祥也諸宰臣曰謹按洪範五行傳隂陽不相奪倫瀆之即為災今已秋矣草木黃落而忽生此花瀆隂陽也臣慮陛下布教施令有虧禮典又臣等忝為宰臣助天理物理而不和臣之罪也於是再拜謝罪則天曰卿真宰相也又李景伯為諌議大夫中宗嘗宴侍臣及朝集使酒酣令各為回波辭衆皆為諂佞之辭及自要榮位次至景伯曰回波爾時酒巵微臣職在針規侍宴既過三爵喧譁竊恐非儀上不恱中書令蕭至忠稱曰此真諫官也一臺二妙户部二妙一臺二絶晉書衛瓘學問深博明習文藝與尚書郎燉煌索靖俱善草書時人號為一臺二妙南史伏曼容嘗與袁粲罷朝相㑹言𤣥理時論以為一臺二絶唐書韋維少嘗業儒博涉文史舉進士自大理丞纍至户部郎中善于剖判時員外郎宋之問工於詩時人以為户部有二妙此是君坐卿必居此世說何次道往丞相許丞相以麈尾指座呼何共坐曰來來此是君坐南史王儉為丹陽尹于後堂引見袁昻指北堂謂曰卿必居此又舊唐書李靖初仕隋為長安縣功曹楊素嘗拊其牀謂靖曰卿終當坐此楊賜不欲先陳實登大位陳蕃不欲先黃憲佩印綬後漢書太尉楊賜司徒陳耽每拜公卿羣僚畢賀賜等常嘆陳實大位未登愧於先之及黨禁始解大將軍何進司徒袁隗遣人敦實欲特表以不次之位實乃謝使者曰實久絶人事飾巾待終而已時三公每缺議者歸之纍見徴命遂不起閉門懸車棲遲養老又陳蕃為三公臨朝歎曰叔度黃憲字若在吾不敢先佩印綬矣被容接者名登龍門入其門者號登龍門後漢書李膺獨持風裁以聲名自高士有被其容接者名為登龍門南史袁昂雅有人鑒游處不雜入其門者號登龍門南州高士南州冠冕後漢徐稚嘗為太尉黃瓊所辟不就及瓊卒歸葬稚乃負糧徒走到江夏赴之設雞酒薄祭哭畢而去不告姓名時㑹者四方名士郭林宗等數十人聞之疑其稚也乃選能言語生茅容輕騎追之及于塗容為設飯共言稼穡之事臨訣去謂容曰為我謝郭林宗大樹將顛非一繩所維何為栖栖不遑寧處及林宗有母憂稚往弔之置生芻一束于廬前而去衆怪不知其人林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之謝承書曰稚諸公所辟雖不就有死喪負笈往弔常于家豫炙雞一隻以一兩綿絮漬酒中暴乾以裹雞徑到所赴冢隧外以水漬綿使有酒氣斗米飯白茅為藉以雞置前釃酒畢留謁則去不見喪主蜀志龎統少時朴鈍未有識者潁川司馬徽清雅有知人鑒統弱冠往見徽徽採桑于樹上坐統在樹下共語自晝至夜徽甚異之稱統當為南州士之冠冕由是漸顯子國有顔子當今之顔子後漢書黃憲字叔度世貧賤父為牛醫潁川荀淑至慎陽遇憲于逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也就而前至袁閎所未及勞問逆曰子國有顔子寧識之乎閎曰見吾叔度邪晉書刺史周浚召陸雲為從事謂人曰陸士龍當今之顔子也又謝尚八歲神悟夙成祖鯤常攜之送客或曰此兒一座之顔回也尚應聲答曰坐無尼父焉别顏回席賔莫不歎異叔度如千頃波王郎如萬頃波後漢書郭林宗少游汝南先過袁閎不宿而退往從黃憲纍日方還或以問林宗林宗曰奉高之器譬諸泛濫雖清而易絶叔度汪汪若千頃波澄之不清淆之不濁不可量也南史謝靈運辨博辭義鋒起王惠時然後言時荀伯子在坐退而告人曰靈運固自蕭散直上王郎有如萬頃波焉鄙吝心復萌名利心都盡後漢書黃叔度同郡陳蕃周舉嘗相謂曰時月之間不見黃生則鄙吝之萌復存乎心郭泰别傳曰時林宗過薛恭祖恭祖問曰聞足下見袁奉高車不停軌鑾不輟軛從叔度乃彌信宿也唐書房琯每見元德秀歎息曰見紫芝眉宇使人名利之心都盡蘇元明常語人曰吾不幸生衰俗所不恥者識元紫芝也漢五馬一白眉齊三馬俱白眉蜀志馬良字季常兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之北齊馬子結兄弟三人皆涉文學陽休之牧西兖子廉子尚子結與諸朝士各有詩言贈休之總為一篇酬答即詩云三馬俱白眉者也如鶴在雞羣如鶻入鴉羣晉書嵇紹始入洛或謂王戎曰昨於稠人中始見嵇紹昻昻然如野鶴之在雞羣戎曰君復未見其父耳北史高思孝討蠕蠕文宣悅其驍勇謂曰爾擊賊如鶻入鴉羣宜思好事故改名思好慧曉如明鏡思逺如懷氷南史何點嘗稱陸慧曉心如明鏡遇形觸物無不朗然王思逺常如懷氷暑月亦有霜氣當時以為實録儉稷寒纊豐玉荒穀南史劉孝標稱劉訏劉歊皆儉歲之梁稷寒年之纖纊也世說世稱庾文康為豐年玉稚恭為荒年穀庾家論云是文康稱公為荒年穀庾長仁為豐年玉桂馨一山桂林一枝翰林雜事漢武帝謂東方朔曰孔子顏淵之道德何勝朔曰顏淵如桂馨一山孔子如春風至則萬物生晉書郤詵遷雍州刺史武帝於東堂㑹送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑王𢎞以為三絶文帝稱為二寶南史謝瞻與從叔混族弟靈運俱有盛名嘗作喜霽詩靈運寫之混詠之王𢎞以為三絶又謝靈運詩書皆兼獨絶每文竟手自寫之文帝稱為二寶書籍盡當與之書籍尋以相付魏志王粲徙長安蔡雍見而竒之時雍才學顯著貴重朝廷常車騎填巷賔客盈坐聞粲在門倒屣迎之粲至年既幼弱容狀短小一坐盡驚雍曰此王公孫也有異才吾不如也吾家書籍文章盡當與之南史孔奐好學善屬文沛國劉憲以博學稱每深相歎美執其手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付折角巾穿角履後漢書郭林宗常周游郡國于陳梁門行遇雨巾一角墊時人乃故折巾一角以為林宗巾北史獨孤信在秦州嘗因獵日暮馳馬入城其帽微側詰旦而吏人有戴帽者咸慕信而側帽焉北史王遵業從容恬素若處丘園常著穿角履好事者多毁新履以學之又南史王儉作解散幘斜插簪朝野慕之蒲葵扇五萬庫中練數千晉書謝安少有盛名時多愛慕鄉人有罷中宿縣者還詣安安問其歸資答曰有蒲葵扇五萬安乃取其中者捉之京師士庶競市價增數倍又時帑藏空竭庫中惟有練數千端鬻之不售而國用不給王導患之乃與朝賢俱制練布單衣於是士人翕然競服之練遂踊貴乃令主者出賣端至一金其為時所慕如此涼州三明中興三明後漢段熲字紀明與皇甫規威明張奐然明並知名顯達京師稱為凉州三明贊曰山西多猛三明儷蹤戎驂糾結塵斥河潼規奐審策亟遏囂凶文㑹志比更相為容段追兩狄束馬縣鋒紛紜騰突谷靜山空晉書琅琊諸葛恢字道明與潁川荀闓字道明陳留蔡謨字道明俱有名譽號曰中興三明人為語曰京都三明各有名蔡氏儒雅荀葛清南北二𤣥㑹稽三康晉書吳興太守晉康侯張𤣥之以才學顯自吏部與謝𤣥同年之郡而𤣥之名亞于𤣥時人稱為南北二𤣥論者美之又孔愈字敬康㑹稽山隂人也與同郡張茂字偉康丁潭字世康齊名時人號曰㑹稽三康二陸三陸晉書陸雲少與兄機齊名雖文章不及機而持論過之號曰二陸南史陸慧曉三子僚任倕並有美名時人謂之三陸初授慧曉兖州三子依次第各作一讓表辭並雅麗時人歎服荀氏八龍王氏九龍魏志荀彧祖父淑當漢順桓之間知名當世號曰八龍張璠漢紀淑八子儉緄靖燾汪爽肅敷淑舊居西豪里縣令苑康曰昔高陽氏有才子八人署其里為高陽里北齊書王昕母清河崔氏學識有風訓生九子並風流藴籍時號王氏九龍卞氏六龍張氏五龍晉書卞壼父粹以清辨鑒察稱兄弟六人並登宰府世稱卞氏六龍𤣥仁無雙𤣥仁粹字也南史張裕子演鏡氷辨岱俱知名時謂之張氏五龍鏡少與光祿大夫顔延之鄰居顔談義飲酒喧呼不絶而鏡靜默無言聲後鏡與客談延之從籬邊聞之取胡牀坐聽辭意清𤣥延之心服謂客曰彼有人焉由是不復酣呌仕至新安太守演鏡兄弟中名最高餘並不及二柳三栁南史陸慧曉與張融並宅其間有池池上有二株楊栁何㸃歎曰此池便是醴泉此樹便是交讓李錫集去思頌錫天寶中為虞城令蠡丘館東有三栁焉公往來憩之飲水則去行路勿剪比于甘棠竹林七賢竹溪六逸魏氏春秋嵇康寓居河內之山陽縣與之游者未嘗見其喜愠之色與陳留阮籍河內山濤河南向秀籍兄子咸琅琊王戎沛國劉伶相與友善遊于竹林號七賢南部新書李白山東人父任城尉因家焉少與魯中諸生孔巢父韓沔裴政張叔明陶沔隱于徂徠山號竹溪六逸謝家玉樹王氏珠樹晉書謝安常戒約子姪曰子弟亦何豫人事而正欲使其佳諸人莫有言者𤣥答曰譬如芝蘭玉樹欲使其生庭階耳舊唐書王勃解屬文搆思無滯詞情英邁與兄勔勮才藻相類父友杜易簡常稱之曰此王氏三珠樹也按地形訓云三珠樹在東北方有玉樹在赤水之上此吾家麒麟是吾家龍文晉書顧和總角時便有清操族叔榮雅重之曰此吾家麒麟興吾宗者必此子也北齊書楊愔從父兄黃門侍郎昱特相器重曾謂人曰此兒駒齒未落已是我家龍文更十歲後當求之千里外昱嘗與十餘人賦詩愔一覽便誦無所遺失及長能清言美音制風神俊悟容止可觀人士見之莫不敬異共卿言不如共阿戎談與公言不如共考使語晉書阮籍每適王渾俄頃輒去過視王戎良久然後出謂渾曰濬冲清賞非卿倫也共卿言不如共阿戎談北史房彥謙為秦州總管録事參軍因朝集時左僕射高熲深見嗟賞厯問河西隴右官人景行彥謙對之如響熲謂諸州總管刺史曰與公言不如獨共秦州考使語腰鼓兄弟蜂腰兄弟南史沈冲與兄淡深名譽有優劣世號為腰鼓兄弟又周𢎞正仲弟𢎞讓季弟𢎞直𢎞直方雅敦厚氣調高于次昆或問三周孰賢人曰若蜂腰矣皮裏春秋皮裏晉書晉書禇裒字季野少有簡貴之風與京兆杜乂俱有盛名冠于中興譙國桓彞見而目之曰季野有皮裏春秋言其外無臧否而內有所褒貶也謝安亦雅重之恆曰裒雖不言而四時之氣亦僃矣南史劉孝綽子諒有文才尤悉晉代故事時人號曰皮裏晉書觀過知人觀過知仁後漢書嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸服罪性慙懼詣閣持衣自首吳祐屏左右問其故性具談父言祐曰掾以親故受汚穢之名所謂觀過知人矣使歸謝其父還以衣遺之南史張岱為司徒左曹掾母年八十籍注未滿岱便去官從實還養有司以岱違制將欲糾舉宋孝武曰觀過可以知仁不須按也公慙于卿卿慙于長祖不及孫孫不及父博物志云太丘長陳實實子鴻臚紀紀子司空羣羣子泰四子于漢魏二朝並有重名而其德漸减時人為其語曰公慙卿卿慙長晉書王昶至承世有高名論者以為祖不及孫孫不及父張蒼梧以子戲父許敬宗以子戲父晉書張慿祖鎮蒼梧太守慿年數歲鎮謂其父曰我不如汝有佳兒慿曰阿翁豈宜以子戲父唐書許彥伯昻子也頗有文敬宗晚年不復下筆凡大典冊悉彥伯為之嘗戲昻曰吾兒不及若兒答曰渠父不如昻父二兒之優劣乃裴樂之優劣任沈之是非乃邢魏之優劣世說冀州刺史楊淮二子喬與髦俱總角為成器淮與裴頠樂廣友善遣見之頠性𢎞方愛喬之有高韻謂淮曰喬當及卿髦小減也廣性清淳愛髦之有神檢謂淮曰喬自及卿然髦尤精出淮笑曰我二兒之優劣乃裴樂之優劣論者評之以為喬雖高韻而檢不匝樂言為得然並為後出之俊顏氏家訓邢子才魏收俱有重名時俗凖的以為師匠邢賞服沈約而輕任昉魏愛慕任昉而輕沈約每於談宴辭色以之鄴下紛紜各有朋黨祖孝徴嘗曰任沈之是非乃邢魏之優劣也臣叔不癡此兒不癡晉書王濟才氣抗邁于湛略無子姪之敬既聞其言不覺栗然心形俱肅武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以答及是帝又問如初濟曰臣叔殊不癡北史楊𤣥感少時晚成人多謂之癡唯素每謂所親曰此兒不癡鍾育不知參佐善射王濟不知叔父善騎晉書魏舒為鍾育長史初不知其善射育偶試之舒容範閒雅發無不中莫有敵者又王濟問湛曰叔頗好騎否湛曰亦好之因乘濟馬姿容既妙回策如縈善騎者無以過之誦離騷飲美酒自為佳器痛飲酒熟讀騷便稱名士北史盧元明風采閒潤善自標置性好𤣥理相州刺史王熙見而歎曰盧郎有如此風神唯須誦離騷飲美酒自為佳器世說王恭言名士不必須竒才但使常得無事痛飲酒熟讀離騷便可稱名士人所應有不必有所應無不必無人所應有其盡有所應無其盡無世說庾公亮為護軍屬桓廷尉彝覔一佳吏乃經年桓後遇見徐寧而知之遂致于庾公曰人所應有其不必有人所應無已不必無真海岱清士南史沈懷文與江智深友善懷文每稱曰人所應有盡有所應無盡無者其江智深乎穰侯見事遲先主得計晚史記王稽載范睢入秦至湖關望見車騎從西來范睢曰彼來者為誰王稽曰秦相穰侯東行縣邑范雎曰吾聞穰侯專秦權惡內諸侯客此恐辱我我寧且匿車中有頃穰侯果至勞王稽因立車而語曰關東有何變曰無有又謂王稽曰謁君得無與諸侯客子俱來乎無益徒亂人國耳王稽曰不敢即别去范睢曰吾聞穰侯智士也其見事遲鄉者疑車中有人忘索之于是雎下車走曰此必悔之行十餘里果使騎還索車中無客乃已山陽公載記曹公船艦為劉備所燒引軍從華容道步歸遇泥濘道不通天又大風悉使羸兵負草填之騎乃得過羸兵為人馬所蹈籍陷泥中死者甚衆軍既得出公大喜諸將問之公曰劉備吾儔也但得計少晚向使早放火吾徒無類矣備尋亦放火而無所及張茂先華而不實張惠恕華而不實晉書韋忠字子節裴頠為僕射數言之於張華華辟之辭疾不起人間其故忠曰吾茨簷賤士本無宦情且茂先華而不實裴頠欲而無厭棄典禮而附賊后若此豈大丈夫之所宜行耶裴嘗有心託我常恐洪濤蕩嶽餘波見漂况可臨尾閭而窺沃焦哉又左傳陽子華而不實㑹稽典録虞俊曰張惠恕才多智少華而不實怨之所聚有覆家之禍吾見其兆矣諸葛亮聞俊憂溫意未之信及溫放黜亮乃歎俊之有先見亮初聞溫敗未知其故思之數日曰吾已得之矣其人於清濁太明善惡太分裴松之以為莊周云名者公器也不可以多取張溫之廢豈其取名之多乎名之為弊古賢既知之矣是以逺見之士退藏於密不使名浮於德不以華傷其實既不能披褐韞寶挫廉逃譽使才映一世聲蓋人上冲用之道庸可暫替溫則反之能無敗乎權既疾溫名盛而駱統方驟言其美至云卓躒冠羣煒曄曜世世人未有及之者也斯何異燎之方盛又撝膏以熾之哉善於懷撫短於控御長於支計短於用兵晉書劉琨善于懷撫而短于控御一日之中雖歸者數千去者亦以相繼舊唐書王思禮長于支計短于用兵然立法嚴整士卒不敢犯時議稱之又崔彥曾為徐州刺史長于撫養而短于軍政劉孝標自比馮衍者三劉子𤣥自比揚雄者四梁書劉孝標嘗為自序其略曰余自比馮敬通而有同之者三異之者四何則敬通雄才冠世志剛金石余雖不及之而節亮慷慨此一同也敬通值中興明君而終不試用余逢命世英主亦擯斥當年此二同也敬通有忌妻至于身操井臼余有悍室亦令家道轗軻此三同也敬通當更始之世手握兵符躍馬食肉余自少迄長戚戚無歡此一異也敬通有一子仲文官成名立余禍同伯道永無血𦙍此二異也敬通膂力方剛老而益壯余有犬馬之疾溘死無時此三異也敬通雖芝殘蕙焚終填溝壑而為名賢所慕其風流郁烈芬芳久而彌盛余聲塵寂漠世不吾知魂魄一去將同秋草此四異也所以自力為序遺之好事云唐書劉子𤣥嘗自比揚雄者四雄好雕蟲小技老而為悔吾幼喜詩賦而壯不為期以述者自名雄凖易作經當時笑之吾作史通俗以為愚雄著書見尤于人作解嘲吾亦作釋蒙雄少為范逡劉歆所器及聞作經以為必覆醬瓿吾始以文章得譽晚談史傳由是减價其自槩如此曹衮欲望蘧伯玉墓田豫欲葬西門豹邊魏志中山恭王衮敇令官屬曰昔衛大夫蘧瑗葬濮陽吾望其墓常想其遺風願託賢靈以蔽髮齒營吾兆域必往從之按陳留風俗傳云長垣縣有蘧伯鄉一名新鄉有蘧亭伯玉祠伯玉冢曹大家東征賦曰到長垣之境界兮察農野之居民覩蒲城之丘墟兮生荆棘之蓁蓁蘧氏任城之東南兮民亦向其丘墳唯今德之不朽兮身既沒而名存魏略田豫病亡戒其妻子曰葬我必于西門豹邊妻子難之言西門豹古之神人那可葬于其邊乎豫言所履行與我敵等耳使死而有靈與我善妻子從之按豫清約儉素賞賜皆賜之將士每胡狄私遺悉簿藏官不入家家常貧匱雖殊類咸高豫節見狸逐鼠貪志發于瑟聲見螳向蟬殺心形于琴聲韓詩外傳昔者孔子鼓瑟曾子子貢側門而聽曲終曾子曰嗟乎夫子瑟聲殆有貪狼之志邪僻之行何其不仁趨利之甚子貢以為然不對而入夫子望見子貢有諫過之色應難之狀釋瑟而待之子貢以曾子之言告子曰嗟乎夫參天下賢人也其習知音矣鄉者丘鼓瑟有鼠出游狸見于屋循梁微行造焉而避厭目曲脊求而不得丘以瑟浮其音參以丘為貪狼邪僻不亦宜乎詩曰鼓鐘于宫聲聞于外後漢書初蔡雍在陳留也其鄰人有以酒食召雍者比往客有彈琴于屏雍至門試濳聽之曰嘻以樂召我而有殺心何也遂反將命者告主人曰蔡君向來至門而去雍素為鄉邦所宗人遽自追而問其故雍具以告莫不憮然彈琴者曰我向鼓絃見螳蜋方向鳴蟬蟬將去而未飛螳蜋為之一前一郤吾心聳然惟恐螳蜋之失之也此豈為殺心而形于聲者乎雍莞然而笑曰此足以當之矣識雀音識燕語論語疏公冶長辨鳥雀語云唶唶嘖嘖白蓮水邊有車覆粟車腳淪泥犢牛折角收之不盡相呼共啄人驗之果然邢昺云舊說冶長解禽語故係之縲絏高僧傳安清字世高安息國王太子也漢桓帝時人聰敏博學鳥獸之聲無不綜達嘗行見羣燕忽謂伴曰燕云應有送食者頃之果有致焉衆咸竒之又白龜年見二雀飛鳴知其言城西民家有粟可共食桂陽先賢傳成子郴中人能達鳥音為郡主簿與衆俱坐聞雀鳴曰東市輦覆粟雀相呼往食之衆遣視信然詹何知黑牛裹角麴紹知青牛先起韓非子解老篇云詹何坐弟子侍有牛鳴於門外弟子曰是黑牛也而白題詹何曰然是黑牛也而白在其角使人視之果黑牛而以布裹其角以詹何之術嬰衆人之心華焉殆矣故曰道之華也嘗試釋詹子之察而使五尺之愚童子視之亦知其黑牛而以布裹其角也故以詹子之察苦心傷神而後與五尺之愚童子同功是以曰愚之首也故曰前識者道之華也而愚之首也北史滎陽麴紹善占侯景欲試之使與郭生俱卜二伏牛何者先起卜得火兆郭生曰赤牛先起紹曰青牛先起景問其故郭生曰火色赤故知赤牛先起紹曰火將然煙先起煙上色青故知青牛起既而如紹言翁仲知馬語李南識馬語論衡廣漢楊翁仲能聽鳥獸之音乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁仲謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中馬曰蹇馬蹇馬亦罵之曰眇馬御者不信使往視之馬目竟眇抱朴子李南乘赤馬行道逢他人乘白馬者白馬先鳴而南赤馬鳴應之南謂從者曰彼馬言汝今當見一黃馬左目盲者是吾子可為告使駛行相及從者不信行二里所果逢黃馬而左目盲南之馬先鳴而盲馬應之問其主果向白馬子也食雞知半露栖食鵝知黑白處載記或人殺雞以食苻朗既進朗曰此雞栖恆半露檢之皆驗又食鵝肉知黑白之處人不信記而試之無毫釐之差牛鳴駝語左傳介葛盧來朝聞牛鳴曰是生三犧皆用之矣其音云問之而信投轄録有駝房使臣夜坐聞户外偶語云舍人來日當有萬里之役然遂免此苦吾將奈何答云諌議願自寬㑹當免耳使臣竊窺之乃庭中二駝也次早有㫖差一駝載軍衣入蜀遂死蜀中未央鐘鳴銅澡盤鳴東方朔别傳漢武帝時未央宫前殿鐘無故自鳴三日三夜不止詔問太史待詔王朔朔言恐有兵氣更問東方朔朔曰臣聞銅者山之子山者銅之母以隂陽氣類言之子母相感山恐有崩弛者故鐘先鳴易曰鳴鶴在隂其子和之精之至也其應在後五日內居三日南郡太守上書言山崩延袤二十里小說中朝時有人畜銅澡盤晨夕恆鳴如人叩以白張華華曰此盤與洛鐘宫商相詣宫中朝暮撞故聲應可鑢令輕則韻乖鳴自止也依言即不復鳴服匿錞于南齊書陸澄領國子祭酒竟陵王子良得古器方腹而底平可將七八升以問澄澄曰此名服匿單于以與蘇武子良後詳視器底髣佛有字可識如澄所言南史或自蜀得古禮器人莫能識斛斯徵曰此錞于也遂依干寶周禮注為筒捋之其聲極清衆乃歎服荀公曽道逢牛鐸李嗣真路逢車鐸晉書荀朂為路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者公曽朂字世說太常缺黃鐘鑄不能成李嗣真居崇業里疑土中有之弗得其所道逢一車鐸聲甚厲嗣真曰宫聲也市以歸振於空地若有應者掘之得鐘衆樂遂和南史張永曉音律太極殿前鐘聲嘶孝武嘗以問永永答鐘有銅滓乃扣鐘求其處鑿而去之聲遂清越陸鴻漸辨南􅍽水李德裕識江表水溫廷筠採茶録代宗朝李季卿刺湖州至維揚逢陸鴻漸抵揚子驛將食李曰陸君别茶聞揚子南􅍽水又殊絶今者二妙千載一遇命軍士謹慎者深入南􅍽陸利器以俟俄而水至陸以杓揚水曰江則江矣非南􅍽似臨岸者使者曰某操舟深入見者纍百敢有紿乎陸不言既而傾諸盆至半陸遽止之又以杓揚之曰自此南􅍽者矣使者蹶然馳白某自南􅍽賫至岸舟蕩覆過半懼其鮮挹岸水增之處士之鑒神鑒也其敢隱焉中朝故事李德裕居廟廊有親知奉使于京口李曰還日金山下揚子江中泠水與取一壺來其人舉棹日醉而忘之泛舟至石城下方憶及汲一瓶于江中歸京獻之李公飲後嘆訝非常曰江表水味有異于頃歲矣此水頗似建業石城下水其人謝過不敢隱也評曰神鑒如二子彼味辨澠淄者不得擅其竒矣齊君王后解環兒說弟子解閉國策秦昭王嘗遣使者遺君王后玉連環曰齊多智而解此環不君王后以示羣臣羣臣不知解君王后引鎚椎破之謝秦使曰謹以解矣吕覽魯鄙人遺宋元王閉元王號令于國有巧者皆來解閉人莫之能解兒說之弟子請往解之乃能解其一不能解其一且曰非可解而我不能解也固不可解也問之魯鄙人鄙人曰然固不可解也我為之而知其不可解也今不為而知其不可解也是巧于我故如兒說之弟子者以不解解之也陳遵憑几口占王平口授作書漢書陳遵字孟公性善書與人尺牘至皆藏弆以為榮請求不敢逆所到衣冠懷之唯恐在後時列侯與遵有同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云王莽素竒遵材在位多稱譽者繇是起為河南太守既至官當遣從史西召善書吏十人于前治私書謝京師故人遵馮几口占付書吏且省官事書數百封親疏各有意河南大驚蜀志王平生長戎狄手不能書所識不過十字而口授作書皆有意理使人讀史漢諸記傳聽之備知其大義往往論說不失其指遵履法度言不戲謔馬上作書馬前令作燭下作詔典略太祖常使阮瑀作書與韓遂時太祖適近出瑀隨從因于馬上具草北史高恭之字道穆時孝莊夜到河內郡北命道穆燭下作詔書布告逺近于是四方知乘輿所在世說桓宣武北征袁虎時從被責免官㑹須露布文喚袁倚馬前令作手不輟筆俄得七紙殊可觀東亭在側極歎其才袁虎云當令齒舌皆得利王子均口授作書楊大眼口授露布蜀志王平字子均事見上又南史昌義之不知書所識不過十字性寬厚為將能得人死力魏書楊大眼雖不學恆遣人讀書坐而聽之悉皆記識令作露布皆口授之而竟不多識字帳中作檄文氊下作軍書北史神武西征命李義深等作檄文皆辭請以孫搴代神武乃引搴入帳自為吹火催促之搴神色安然援筆立就其文甚美又神武之伐劉蠡升天寒雪深使人舉氊陳元康于氊下作軍書颯颯運筆不及凍俄頃數紙簡書如雨紙落如雲王傑集阮瑀誄云既登宰輔充我祕府允司文章爰及軍旅庶績惟殷簡書如雨強力敏成事至則舉潘嶽楊荆州誄云多才豐藝強記洽聞草𨽻兼善尺牘必珍足不輒行手不釋文翰動若紛紙落如雲鄭畋灑翰泉涌陸扆灑翰如飛舊唐書鄭畋為中書舍人時王師討徐方禁庭書詔旁午畋灑翰泉涌動無滯思言皆破的同僚閣筆推之又陸扆為中書舍人文思敏速初無思慮揮翰如飛文理俱愜同舍服其能天子顧待特異嘗金鑾作賦命學士和扆先成帝覽而嗟挹之曰朕聞貞元時陸贄吳通𤣥兄弟能作內庭文書後來絶不相繼今我得卿斯文不墜矣告公緩之腕將脫矣丐公徐之手腕脫矣齊任昉集云時京師臺閣文帙遭火無遺詔郡國悉上民間所藏鄧阿魯為郡小吏差送圗籍至京奏乞書吏二百人口占分授并白布籌敏速如飛吏曰告公緩之腕將脫矣新唐書蘇頲字廷碩弱敏悟一覽至千言輒覆誦時𤣥宗平內難書詔填委獨頲在太極後閣口所占授功狀百緒輕重無所差吏史白曰丐公徐之不然手腕脫矣直付空紙預署空紙北史杜弼典掌機密神武甚見信待或有造次不及書教直付空紙即令宣讀又周文帝委任蘇綽或出游嘗預署空紙以授綽若須有處分則隨事施行及還啓知而已上馬橫槊下馬談論右手拔刀左手把矟南史桓榮祖少學騎射或曰何不學書榮祖曰曹操曹丕上馬橫槊下馬談論此可不負飲食矣君輩無自全之伎何異犬羊乎又傅永字修期有氣幹拳勇過人能手執鞍橋倒立馳騁孝文每歎曰上馬能擊賊下馬作露布惟傅修期耳北史耿豪從周文戰芒山謂所部曰大丈夫除賊須右手拔刀左手把矟直斫直刺慎莫畏死及時並了應時並就北史杜正𤣥舉秀才賜策髙第楊素欲試退之乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然銘張載劒閣銘白鸚鵡賦曰我不能為君住宿可至未時令就正𤣥及時並了素讀數遍大驚曰誠好秀才又杜正藏舉秀才時蘇威監選試擬賈誼過秦論及尚書湯誓匠人針連理樹賦几賦弓銘應時並就又無㸃竄時射策甲第者合奏曹司難獨為奏抑為乙科正藏訴屈威怒改為丙第東阿王七步成章彭城王十步成詩世說曹子建七步成章世目為繡虎文帝嘗令東阿王植七步中作詩不成者行大法應聲便為詩曰煮豆持作羮灑豉以為汁萁在釡下然豆在釡中泣本是同根生相煎何太急按漫叟詩話曰曹子建七步詩世傳煮豆然豆萁豆在釡中泣一本云萁向釡下然豆在釡中泣其工拙淺深必有辨之者魏書高帝幸代都次于上黨之銅鞮山路傍有大松樹十數根時高祖進繖遂行而賦詩令人示彭城王協曰吾始作此詩雖不七步亦不言逺汝可作之比至吾所令就之也時協去帝十餘步遂且行且作未至帝所而就詩曰問松林松林經幾冬山川何如昔風雲與古同高祖大笑曰汝此詩亦調責吾耳北夢瑣言溫庭筠與李商隱齊名時號曰溫李才思豔麗工於小賦每入試押官韻作賦凡八義手而八韻成刻燭成韻打鉢立韻南史蕭文琰蘭陵人丘令楷吳興人江洪濟陽人齊竟陵王子良嘗夜集賦詩約四韻刻燭一寸文琰曰須燒一寸燭為成四韻詩何難之有乃與丘江等共打銅鉢立韻響滅則詩成皆可觀覽三刻成詩二刻成詩南史梁武帝宴華光殿命羣臣賦詩獨詔到沆為二百字三刻便成沆于坐立奏其文甚美又魏中山王元略還北梁武帝饑于武德殿賦詩三十韻限三刻成謝微二刻便就文甚美所寫既畢誦讀亦遍所寫既畢諷誦亦通吳志闞澤家世農夫至澤好學居貧無資常為人傭書以供紙筆所寫既畢誦讀亦遍梁書王僧孺年五歲讀孝經問授者此書所載述曰論忠孝二事僧孺曰若爾常願讀之六歲能屬文既長好學家貧常傭書以養母所寫既畢諷誦亦通不失一字不誤一字魏志王粲與人共行讀道傍碑人問曰卿能暗誦乎曰能因使背而誦之不失一字北史邢邵嘗至北海王昕舍宿飲相與賦詩凡數十首皆在主人奴處旦日奴行諸人求詩不得邵皆為誦之諸人有不認詩者奴還得本不誤一字千言三遍千言一遍後周柳慶因曝書父僧習取賦一篇試之賦千餘言三遍即誦唐語林常敬忠一遍誦千言又北齊書邢邵字子才十歲能屬文聰明强記日誦萬餘言嘗因霖雨乃讀漢書五日略能遍之後因飲謔倦方廣尋經史五行俱下一覽便記無所遺忘楊德祖解碑蕭穎士讀碑世說魏武嘗過曹娥碑下見碑背上題黃絹幼婦外孫韲臼八字謂楊修曰解否答曰解魏武曰卿未可言待我思之修别記云所謂絶妙好辭也魏武亦記之與修同乃歎曰我才不及卿乃覺三十里按異苑曰陳留蔡雍避難過吳讀碑文以為詩人之作無詭妄也因刻石傍作八字魏武見而不能了以問羣寮莫有解者有婦人浣於汾渚曰第四車解既而禰正平也衡即以離合義解之或謂此婦人即娥靈也此與世說差異舊唐書蕭穎士嘗與李華陸據遊洛龍門共讀誦路傍古碑穎士一閲即能誦華再閲據三方能記之議者以三人才格高下亦如此蓋題合字門作活字世說人餉魏武一杯酪魏武噉少許蓋頭上題合字以示衆衆莫能解次至楊修修便噉曰公教人噉一口也復何疑又楊德祖為魏武主簿時作相國門始構榱桷魏武自出看使人題門作活字便去楊見即令壞之既竟曰門中活闊字王正嫌門大也薛敬文釋吳蜀二字諸葛恪釋吳蜀二字吳志薛綜字敬文守謁者僕射西使張奉于孫權前列尚書闞澤姓名以嘲澤澤不能答綜下行酒因勸酒曰蜀者何也有犬為獨無犬為蜀橫目茍身裴松之曰既云橫目則宜曰句身蟲入其腹奉曰不當復列吳君邪綜應聲曰無口為天有口為吳君臨萬邦天子之都于是衆坐喜笑而奉無以對江表傳曰費禕聘于吳陛見公卿侍臣皆在坐酒酣禕與諸葛恪相對嘲難言及吳蜀禕問曰蜀字云何恪曰有水者濁無水者蜀橫目茍身蟲入其腹禕復問吳字云何恪曰無口者天有口者吳下臨滄海天子帝都解習字辨貞字洛陽伽藍記東魏孝文帝嘗宴羣臣酒酣歡極帝因舉巵酒屬羣臣曰三三橫兩兩縱誰能辨之賜金鍾御史中尉李彪曰沽酒老嫗甕注𤬪屠兒割肉與稱同尚書左丞甄琛曰吳人浮水自云工妓兒擲袖左虛空彭城王協曰臣始解此是習字高祖即以金鍾賜彪人服彪聰明有智甄琛和之亦速南史梁時有沙門訟田武帝大署曰貞有司未辨遍問莫知劉顯曰貞文字為與上人帝因忌其能出之覆棊不誤一道覆棊不失一道魏志王粲觀人圍棊局壞粲為覆之棊者不信以帊蓋局使更以他局為之因相比較不誤一道北史齊河間康獻王孝瑜讀書敏速十行俱下覆棊不失一道穆之决斷如流唐雍占對如響南史劉穆之內總朝政外供軍旅決斷如流事無壅滯賔客輻輳求訴百端內外咨禀盈階滿室目覽詞訟手答箋書耳行聽受口並酬應不相參涉皆悉贍舉北史唐雍專掌兵機承受敏速自軍吏以上勞效由緒無不諳練占對如響帝嘗白太后云雍手作文書口且處分耳又聽受實是異人一日中六度賜物劉炫左手畫方右手畫圓五事同舉元嘉左手畫圓右手畫方六事齊舉隋書劉炫少強記默識莫與為儔左畫方右畫圎口誦目數耳聽五事同舉無有遺失朝野僉載元嘉少聰俊左手畫圓右手畫方口誦經史目數羣羊兼成四十字詩一時而就足書五言一絶六事齊舉號神仙童子評曰韓非稱左手畫圓右手畫方則不兩成信若二子奚啻僅兩成哉殆必不然之說也彼僉載所云豈豔慕光伯而更甚之邪史家多溢說類如此一見竝記名姓一問便識姓名南史劉覽為尚書左丞性聰敏尚書令史七百人一見竝記名姓唐書張巡守睢陽士卒居人一見問姓名其後無不識又魏書明帝性特彊識雖左右小臣官簿姓行名跡所履及其父兄子弟一經耳目終不遺忘唱官名未嘗謬誤陳簿令無有遺失北史唐雍在御前簡閲多不執文簿唱官名未嘗謬誤又孝昭曾閲簿領試令馮子琮口陳子琮暗對無有遺失說饑民六百人記送徒凡千人謝承漢書吳郡陸續初任郡户曹史歲饑荒太守使續于都亭賦民饘粥續悉簡閲其人訊以名氏事畢守問所賦因說六百餘人皆分别姓名字無有誤謬舊唐書顏真卿調犀浦主簿嘗送徒益州亡其籍至廷口記物色凡千人無所差長史陸象先異之所謂百不為多所謂一不為少梁書任昉字彥升幼而聰敏早稱神悟四歲誦詩數十篇八歲能屬文自製月儀辭義甚美禇淵嘗謂遙曰聞卿有令子相為喜之所謂百不為多一不為少又陸瓊字伯玉幼聰慧有思理六歲為五言詩頗有詞彩梁大同末雲公受梁武詔校定碁品到溉朱异以下並集瓊時年八歲于客前覆局由是京師號曰神童武帝有敇召見瓊風神警亮進退詳審帝甚異之十一丁父憂毁瘠有至性從祖襄歎曰此兒必荷門基所謂一不為少揚子雲子稱童烏王景文子稱童烏法言育而不苖者吾家之童烏乎童烏子雲之子也仲尼悼顏淵苖而不秀子雲傷童烏育而不苗九齡而與我𤣥文顔淵弱冠而與仲尼言易童烏九齡而與揚子論𤣥南史王藴父楷人才凡劣故藴不為羣從所禮常懷恥慨家貧為廣德令明帝即位四方叛逆欲以將領自奮每撫刀曰龍泉太阿汝知我者叔父景文常誡之曰阿答汝滅我門户藴曰答與童烏貴賤異童烏景文子絢小字答藴小字也不取道側李樹實不爭庭前奈樹實晉書王戎嘗與羣兒戲於道側見李樹多實等輩競趨之戎獨不往或問其故戎曰樹在道傍而多子必苦李也取之信然北史楊愔庭前有奈樹實落地羣兒咸爭之愔頽然獨坐以母命殺父侍人以母語殺父寵妾魏志劉曄父普母修産渙及曄渙九歲曄七歲而母病困臨終戒渙曄以普之侍人有諂害之性身死之後懼必亂家汝長大能除之則吾無恨矣曄年十二謂兄渙曰亡母之言可以行矣渙曰那可爾曄即入室殺侍者徑出拜墓舍內大驚白普普怒遣人追曄曄還拜謝曰亡母顧命之言敢受不請擅行之罰普心異之遂不責也唐書嚴挺之子武幼豪爽母裴不為挺之所容獨厚其妾英武始八歲怪問其母母語之故武奮然以鐵鎚就英寢碎其首左右驚白挺之曰郎戲殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也父竒之曰真嚴挺之子也稱象頓象江表傳孫權遣使詣闕獻馴象二頭魏太祖欲知其斤重咸莫能出其理時鄧王冲尚幼乃曰置象大船刻其所至稱物以載之可知也太祖大恱即施行焉拾遺記魏文帝時南越獻白象子在帝前任城王彰手頓其鼻象伏不動當成此宅相當成吾宅相晉書魏舒少孤為外家寧氏所養寧氏起宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外祖成此宅相北史王褒七歲能屬文外祖梁司空袁昻愛之謂賔客曰此兒當成吾宅相誦枯樹賦誦鵩鳥賦廣人物志蘇頲年五歲時裴談嘗過其父頲方誦庾信枯樹賦避談字諱曰易其韻曰昔年楊栁依依漢隂今看搖落悽愴江潯樹猶如此人何以任談歎異之知其他日必主文章也明皇雜録蘇頲才能言有京兆尹過瓌既去瓌命頲詠尹字乃曰丑雖有足甲不全身見君無口知伊少人顔真卿撰神道碑宋璟廣平人七歲能屬文一遍誦鵩鳥賦八九歲時嘗夢一大鳥銜書吐口中而吞咽之遂乘而直上倐忽驚寤猶若下在胸之間自後而藻思日深靈襟益爽因問讀書即稱美句因令誦詩即頌周南南史劉惲少子偃年十二梁武帝引見詔問讀何書對曰尚書又問尚書有何美句對曰德惟善政政在養民衆咸異之又西陽王大鈞年七歲武帝嘗問讀何書對曰學詩因令諷誦即誦周南音韻清雅因賜羲之書一卷布置皆有軍陳之勢指麾便有軍陳之法北史宇文深年數歲便纍石為營折草作旌旗布置行伍皆有軍陳之勢父永遇見之喜曰汝自然如此後必為名將又李逺幼有器局嘗與羣兒為戰鬬戲指麾便有軍陳之法郡守見而異之召使更戲羣兒散走逺持杖叱之復為向陳意氣雄壯殆甚于前郡守曰此小兒必為將帥非常人也隱幔怛之神色恬然踐裾試之曾不顧盼世說庾太尉風儀偉長不輕舉止時人皆以為假亮有大兒數歲雅重之質便自如此人知是天性溫太真隱幔怛之此兒神色恬然乃徐跪曰君侯何以為此庾氏譜曰㑹字㑹宗太尉亮長子北史梁西昌侯藻鎮雍州栁遐年十二以百姓禮修謁風儀端肅進止詳雅藻羡之試遣左右踐遐衣裾欲觀其舉措遐徐步稍前曾不顧盼駢志卷四
