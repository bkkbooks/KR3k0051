body:
  text: 駢志卷十四明陳禹謨撰庚部下淘井安金枯井湧泉御覽舜為父母淘井取金銀安罐中與父母類林舜耕歷山歲不熟舜糶其母詣糴每還錢與米問之子也因相抱歸拭其父目尋自明堯聞而妻之真源賦舜糶於平陽中父認之乃拭其目目以光明曾參行孝枯井湧泉本草曾子見益母而感淮南曾子攀柩車引輴者為之上也雙鯉輒出一魚踊出雙鯉躍出後漢書薑詩妻龎盛之女也姑嗜魚膾又不能獨食夫婦常力作供膾呼鄰母共之舍側忽有涌泉每旦輒出雙鯉魚常以供二母之膳晉書王祥繼母朱氏常欲生魚時天寒氷凍祥解衣將剖氷求之氷忽自解雙鯉躍出持之而歸又王延繼母卜氏遇之無道恆以蒲穰及敗麻頭與延貯衣其姑聞而問之延知而不言事母彌謹卜氏嘗盛冬思生魚敇延知而不獲杖之流血延尋汾叩凌而哭忽有一魚長五尺踊出氷上延取以進母卜氏食之積日不盡于是心悟撫延如己生埋兒得金鬻兒得錢搜神記郭巨兄弟三人早喪父禮畢二弟求分以錢二千萬二弟各取千萬巨獨與母出居客舍夫婦傭賃以給供養居有頃妻産男巨念育兒妨事親一也老人得食喜分兒孫減膳二也乃于野鑿地欲埋兒得石蓋下有金一釡中有册書曰孝子郭巨黃金一釡以用賜汝于是名振天下史系趙雋將葬母貧鬻其子質劑已定其後夢一人請曰小舍東有錢百萬乃自發之及旦雋自舍東手掘之果得錢符數焉賜粟百石賜米十斛晉書劉殷至孝掘地得粟十五鍾銘曰七年粟百石以賜孝子劉殷風俗通楊範採椹進母忽于地中得米十斛上有字云米十斛賜孝子楊範以資給母鍾期聞磬而悲申喜聞歌而悲吕覽鍾子期夜聞擊磬者而悲使人召而問之曰子何擊磬之悲也答曰臣之父不幸而殺人不得生臣之母得生而為公家為酒臣之身得生而為公家擊磬臣不覩臣之母三年矣昔為舍氏覩臣之母量所以贖之則無有而身固公家之財也是故悲也鍾子期嘆嗟曰悲夫悲夫心非臂也臂非椎非石也悲存乎心而木石應之故君子誠乎此而諭乎彼感乎已而發乎人豈必強説乎哉又周有申喜者亡其母聞乞人歌于門下而悲之動于顔色謂門者納乞人之歌者自覺而問焉曰何故而乞與之語蓋其母也故父母之于子也子之於父母也一體而兩分同氣而異息若草芥之有華實也若樹木之有根心也雖異處而相通隱志相及痛疾相救憂思相感生則相歡死則相哀此之謂骨肉之親神出于中而應乎心兩精相得豈待言哉扼臂呼子聞歌識母論衡曾子出薪于野有客至而欲去曾母曰願留參方到即以右手扼其左臂曾子左臂立痛即馳至問母臂何故痛母曰今者客來欲去吾扼臂以呼汝耳又申喜夜聞其母歌心動開關問歌者為誰果其母童子持囊授蛇膽老人詣門貨粟漿晉書顔含次嫂樊氏因疾失明含課勵家人盡心奉養每日自嘗省藥饌察問息耗必簪屨束𢃄醫人疏方應須蚺蛇膽而尋求偹至無由得之含憂嘆纍時嘗晝獨坐忽有一青衣童子年可十三四持一青囊授含含開視乃蛇膽也童子逡巡出戶化成青鳥飛去得膽藥成嫂病即愈南史陸襄母年將八十與蕭琛傅昭陸杲每月嘗遣存問加賜珍羞衣服襄母常卒患心痛醫方須三升粟漿時冬月日又逼暮求索無所忽有一老人詣門貨漿量如方劑始欲酬直無何失之時以襄孝感所致枕邉得藥園中得藥南史劉靈哲所生母嘗病靈哲躬自祈禱夢見黃衣老公與藥曰可取此食之疾立可愈靈哲驚覺于枕間得之如言而疾愈藥似竹根於齋前種葉似鳬茈北史梁彥光七歲時父遇篤疾醫云餌五石可愈時求紫石英不得彥光憂悴不知所為忽於園中見一物彥光所不識怪而持歸即紫石英也親屬咸異之以為至孝所感冬中得瓜愈父病冬月得瓜止母渴孝子傳焦華父遺常病甚冬中思瓜華夢一人黃冠謂曰我聞子父病思瓜故送以助華拜受之及寤在手馨香非常父食而病愈後魏書王薦母病篤渴思瓜時冬月薦至深嶺值雪仰天而哭忽見巖石間青蔓離披有二瓜焉摘歸以進母渴遂止母目即明母目便開南史宋初吳郡人陳遺少為郡吏母好食鐺底飯遺在役恆𢃄一囊每煮食輒録其焦以貽母後孫恩亂聚得數升恆𢃄自隨及敗逃竄多有餓死遺以此得活母晝夜泣涕目為失明遺還入戶再拜號咽母豁然即明北史閻元明孝著鄉閭太和五年除北隨郡太守元明以違離親養興言悲慕母亦慈念泣淚喪明悲號上訴許歸奉養一見其母母目便開墓前栽松無犯罌中清蓮不萎晉書許孜親沒鎮宿墓所列植樹木亘五六里時有鹿犯其松栽孜悲嘆曰鹿獨不念我乎明日忽見鹿為猛獸所殺置于所犯栽下孜悵惋不已乃為作冢埋于隧側猛獸即于孜前自撲而死孜益歎息又取埋之自後樹木滋茂而無犯者積二十餘年又舊唐書禇無量解職廬于墓側其所植松柏時有鹿犯之無量泣而言曰山中衆草不少何忍犯吾先塋樹哉因通夕守護俄有羣鹿馴狎不復侵害無量因此終身不食鹿南史齊宗室晉安王子懋年七歲時母阮淑媛嘗病危篤請僧行道有獻蓮華供佛者衆僧以銅罌盛水漬其莖欲華不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令花竟齋不萎七日齋畢華更鮮紅視罌中稍有根鬚當世稱其孝感陶侃雙鶴庾域雙鶴晉書陶侃以母憂去職常有二客來弔不哭而退化為雙鶴沖天而去梁書庾域母好鶴唳域在位營求孜孜不怠一且雙鶴來下論者以為孝感所致雙鶴循翔廬側雙鶴一旦下來南史劉霽廬于墓側哀慟過禮常有雙白鶴循翔廬側又庾域為懷寧太守罷任還家妻子猶事井臼而域所衣大布餘俸專充供養母好鶴唳域在位營求一旦雙鶴來下論者以為孝感所致鳥即悲鳴犬亦悲號北史紐因性至孝父母喪廬于墓側廬前生麻一株髙丈許圍之合拱枝葉鬱茂冬夏恆青有鳥棲上因舉聲哭鳥即悲鳴又翟普林廬墓又不衣繒絮唯著單縗而已家有烏犬隨其在墓若普林哀臨犬亦悲號見者嗟異有二鵲巢其廬前柏樹入廬馴狎無驚懼燕銜土燕培城史記臨江閔王榮坐侵廟壖為宫上徵榮榮詣中尉府中尉郅都責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之又漢書王莽開哀帝母丁姬冢有燕數千銜土投其窟中崔鴻十六國春秋北涼沮渠蒙遜謂郎中劉昞曰仲尼何如人也昞曰聖人也遜曰卿知其外不知其內昔魯人有浮海而失津者至于澶洲見仲尼與七十子逰于海中與魯人一木杖令閉目乘之使歸告魯侯築城以偹寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有羣燕數萬銜土培城魯侯信之大城曲阜訖而齊寇至攻魯不克而還相謂莫入賢人鄊相誡勿犯孝子鄊魏志裴注任旐字子旟以至行稱漢末紅巾賊起天下飢荒人民相食冦到博昌聞旐姓字乃相謂曰宿聞任子旟天下賢人也今雖作賊那可入其鄊邪遂相率而去北史華秋以孝聞後羣盜起常往來廬之左右咸相誠曰勿犯孝子鄊賴秋全甚衆槐木再枝葉荆樹重榮茂唐書長慶中虢州刺史蕭佑奏湖城縣永房鄉百姓閻酆五代同居家內一槐木再枝葉齊諧記京兆田真兄弟三人共議分財生資皆均平惟堂前一株紫荆樹共議欲斫三片明日就截之其樹即枯死狀如火然真往見之大驚謂諸弟曰樹本同株聞將分斫所以憔悴是人不如木也因悲不自勝不復解樹樹應聲榮茂兄弟相感合財寶遂為孝門真仕至大中大夫又陸機詩三荆歡同株李次孫乳生湩元德秀乳流湩後漢李善字次孫南陽淯陽人本同縣李元蒼頭也建武中疫疾元家相繼死沒惟孤兒續始生數旬而資財千萬諸婢私共計議殺續分其財産善深傷李氏而力不能制乃潛負續逃去隱山陽瑕丘界中親自哺養乳為生湩湩乳汁也推燥居濕偹嘗艱勤續雖在孩抱奉之不異長君有事輒長跪請白然後行之閭里感其行皆相率修義唐書元德秀不及親在而娶不肯婚人以為不可絶嗣答曰兄有子先人得祀吾何娶為初兄子在襁褓喪親無資得乳媼德秀自乳之數日湩流能食乃止子産治鄭蒺藜不生子産遺祠雉柏列秀梁冀别傳云子産治鄭蒺藜不生鴟梟不至水經注徑山上有子産墓纍石為方墳墳東有廟並東北向鄭城杜元凱言不忘本際廟舊有一枯柏樹其塵根故株之上多生雉柏列秀清清擊鳩之鸇低頭不敢仰視殺人之虎低頭狀如震懼論衡傳書稱魏公子之德仁惠下士兼及鳥獸方與客飲有鸇擊鳩鳩走巡于公子案下鸇追擊殺于公子之前公子恥之即使人多設羅得鸇數十枚責讓以擊鳩之罪擊鳩之鸇低頭不敢仰視公子乃殺之後漢童恢為不其令民嘗為虎所害乃設檻捕之生獲二虎恢聞而出咒虎曰天生萬物惟人為貴虎狼當食六畜而殘暴于人王法殺人者死傷人則論法若汝是殺人當垂頭伏罪自知非者當號呼稱寃一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踊躍自奮遂令放釋癸辛雜志燕京昔有一雄象甚大凡傷死數人官使殺之不得已乃明其罪象遂帖耳就殺凡得象油四十八大甕邴原邑落無虎患胡昭部落無寇暴邴原别傳曰邴原到遼東遼東多虎原之邑落獨無虎患髙士傳胡昭信行著于鄊黨建安十六年百姓聞馬超叛避兵入山者千餘家飢乏漸相劫略昭常遜辭以解是以寇難稍息衆咸宗焉故其所居部落中三百里無相侵暴者政致甘露政致甘泉東觀記沈豐字聖達為零陵太守為政慎刑重殺罪法詞訟初不歷獄嫌推不決一斷于口鞭杖不舉市無刑戮僚友有過初不暴揚有智謀勇略輒為談述曰太守所不及也到官一年甘露降芝草生北史房豹字中幹為樂陵太守風教修理稱為仁政郡瀕海水味多鹹苦豹命鑿一井遂得甘泉遐邇以為政化所致豹罷歸後井味復鹹川流暴起津令縮水南史齊世祖為廣興相嶺南積旱遭水阻涸商旅不通上部伍既至無雨而川流暴起遂得利涉魏書爾朱兆從河梁西涉渡掩襲京邑先是河邊人夢神謂已曰爾朱家欲渡河用爾作灅波津令為之縮水脈月餘夢者死及兆至有行人自言知水淺處往往表插而導道焉忽失其所在耿恭整衣拜井李渾朝服祈井後漢書耿恭據疏勒城胸奴來攻恭遂于城下擁絶澗水恭于城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰嘆曰聞昔二師將軍拔佩刀刺山飛泉涌出今漢德神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬歲乃令吏士揚水以示虜虜出不意以為神明遂引去北史魏李渾除海州刺史會土人共圍州城城中多石無井常食海水賊絶其路城內先有一池夏旱涸竭渾齋戒朝服而祈焉一朝天雨泉流涌溢賊以為神應時駭散又齊平鑒為懷州刺史魏將楊標來攻時先築之城糧仗未集素乏水南門內有大井隨汲即竭鑒具衣冠俯井而祝至旦而井泉涌溢有異于常合城取足揚示敵人將士既睹非常勇氣自立張熹積柴自焚戴封積柴自焚桂陽先賢讚臨武張熹為平輿令時天下大旱熹躬禱不應乃積柴自焚火既燎天靈感應即澍雨後建張眀府祠水旱不節則禱水經注戴封為西華令遇天旱慨治功無感乃積柴坐其上以自焚火起而大雨暴至遠近嘆服永元十三年徵太常鴟梟逃于絶漠鴟梟不入城郭拾遺記堯在位七年鴟梟逃于絶漠水經注雩門南有雩壇壇髙三丈曾點所浴沂風舞處也髙門一里餘道西有道兒君碑是魯陳君立昔曾參居此鴟梟不入城郭松柏西靡葭蘆南指皇覽云漢東平思王冢在無鹽人傳言王在國思歸京師後葬其冢上松柏皆西靡也五代史補漢髙祖為河南節度使天福十一年天下大水太原葭蘆茂盛最上一葉如旗狀皆南指焉眀帝遂即帝位又世宗在民間常與商頡跌販貨至江陵有卜者王處士世宗因頡跌氏同往問焉方布卦忽有一蓍躍出卓然而立卜者大驚曰吾家筮法十餘世矣嘗記曾祖以來遺言凡卜筮而蓍自躍出者其人貴不可言况又卓立不倒得非為天下之主乎遽起再拜世宗雖佯為詰責而私心甚喜誦經土開械脫誦經枷鎖自脫晉書徐義為慕容永所獲械埋其足將殺之義誦觀世音經至夜中土開械脫于重禁之中若有人導之者北史河間邢摩納與盧景裕從兄仲禮據鄊作逆逼其同反以應西魏齊神武命都督賀拔仁討平之聞景裕經明行著驛馬特徵既而舍之景裕之敗繫晉陽獄至心誦經枷鎖自脫劉士湮誦經延母算庾黔婁禮斗延父算南史劉霽字士湮母明氏寢疾年已五十衣不解𢃄者七旬誦觀音經數萬遍夜中感夢見一僧謂曰夫人算盡君精誠篤至當相為申延後六十日餘乃亡又庾黔婁父易遘疾黔婁至夕每稽顙北辰求以身代俄聞空中有聲曰徵君夀命盡不復可延汝誠禱既至政得至月末晦而易亡誦經將刑唱停誦經臨刑刀折南史王玄謨傳太武軍至玄謨夜遁敗亡略盡蕭斌將斬之沈慶之固諫乃止初玄謨始將見殺夢人告曰誦觀世音經千遍則免玄謨夢中曰何可竟也仍見授既覺誦之千遍不輟忽傳唱停刑北史髙王時有人負罪當死夢沙門教誦經覺時如夢所誦千遍臨刑刀折主者以聞赦之此經遂行號曰髙王觀世音持金剛經免虎噬誦金剛經免刀刺北夢瑣言蜀路白衛嶺多虎豹噬人有選人京兆韋忘其名唐光化中調授巴南宰常念金剛經赴任至泥溪遇一女子著緋衣挈二子偕行同登此山前路嶺頭行者相駐呌譟見此女人乃赤狸大蟲也逡巡與韋分路而去韋終不覺蓋持經之力也又成都府廣都縣人陳微自少年常誦金剛經與胥姓馬者有隙一旦事故亡匿馬生揚言欲追捕之陳乃礪一匕首行坐相隨儻遇馬生必能刺之誓不受其拘執一日行于村路蓊薈間馬胥伏而掩之陳抽刀一揮馬生仰倒由是獲脫至前路方悟手之所揮乃刀鞘及歸所揮處刀刃宛在本不偕行馬胥亦無所傷蛤現菩薩形蚌現羅漢像杜陽編文宗好食蛤蜊一日左右以方盤而進中擘不破裂者上疑其異乃焚香祝之俄頃自開中有二人形眉端秀體質悉偹螺髻瓔珞足履菡蓞謂之菩薩上遂置之於金粟檀香合以玉線覆之賜興善寺令致敬至會昌中毁佛舍遂不知所在又酉陽編隋煬帝嗜蛤事稍同藝苑雌黃大觀中吳興邵宗益剖蚌將食中有珠現羅漢像偏袒右肩矯首左顧衣紋畢具僧俗創見遂奉以歸慈感寺寺臨溪流建炎中憲副楊應誠與客傳玩之次不覺越檻躍入水中亟禱佛求之于煙波渺茫之中一索而獲葉少蘊曾公衮皆有詩贊之放龜得侯放龜得渡會稽後賢傳孔愈字敬康嘗至吳興縣餘干亭見人籠龜于路愈求買放之於溪中龜行至水反顧愈及封此亭侯而鑄印龜首回屈三鑄不正有似昔龜之顧靈德應感如此愈悟乃取而佩焉續搜神記咸康中豫州刺史毛寶有一軍人于武昌市見人賣一白龜子長四五寸潔白可愛便買取持歸著甕中養之日白大近欲尺許其人憐之持至江邉放水中視其去後邾城遭石季龍反毛寶棄豫州既赴江莫不沉溺于時所養龜人被鎧持刀亦同自投既入水中覺如墮一石上水裁至腰須臾浮出中流視之乃是昔所養白龜甲六七尺即送至東岸出頭視此人徐遊而去中江猶回首數顧焉又俱見晉書八人求命二人乞命續搜神記宗淵字叔林晉太元中為潯陽太守得十頭龜付厨曰每日以二頭作臛其夜夢十丈夫皂衣袴褶叩頭求哀明夜復夢八人求命方悟乃放之後夢八人來謝梁書南郡太守劉之亨嘗夢二人姓李詣之乞命未之解也其明日有遺生鯉魚二頭者之亨曰夢中所感也放之又夢來謝恩云當令君延算羊因停殺跪拜羊因請命跪伏南史王固嘗聘魏因宴饗際請停殺一羊羊于固前跪拜又宴昆明池魏人以南人嗜魚大設罟網固以佛法咒之遂一鱗不獲南唐書王載字元吉諸生醵會市羊以偹饌載夢一羊前跪請命晨出見羊跪伏如所夢載以已緡償諸生而畜其羊出一臠作羊鳴入一臠作羊鳴續搜神記顧霈送客于升平亭有道人在坐主當欲殺羊羊繩斷便走來就道人道人不能救既行炙道人食炙下喉便自走行道人皮中痛毒不可忍呼醫針之破出故是一臠肉耳道人於是作羊鳴吐沫還寺少時便死顔氏家訓王克為永嘉郡守有人餉羊集賔欲宴而羊繩解來投一客先跪兩拜便入衣中此客竟不言之須臾宰羊為炙先行至客一臠入口便下皮內周行遍體痛楚呼呌方復説之遂作羊鳴而死王懿因白狼得濟穆崇因白狼免難南史王懿字仲德與慕容垂戰敗被重創走暴雨莫知津逗有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟北史初道武避窟咄難遣穆崇還察人心崇留馬與從者微服入其營會有火光為舂妾所識賊皆驚走崇求從者不得因匿坑中徐乃竊馬奔走宿于大澤有白狼向崇號崇覺悟馳隨狼奔遂免難道武異之命崇立祠子孫世奉焉顔淵斬蛇子路烹鯷殷藝小説顔淵子路共坐于夫子之門有鬼魅求見孔子其目若曰其形甚偉子路失魄口噤不能言顔淵乃仗劍前斫其腰于是形化成蛇即斬之搜神記孔子厄于陳絃歌于館中夜有一人長九尺餘皂衣髙冠大叱聲動左右子貢進問何人邪便提子貢而挾之子路引出與戰于庭有頃未勝孔子察之見其甲車間時時開如掌孔子曰何不探其甲車引而奮登子路如之沒手仆于地乃是大鯷魚也長九尺餘子路烹之其味滋美神龜見夢于宋元客龜見夢于佐髙龜策傳宋元王二年江使神龜使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢于宋元王曰我為江使于河而幕網當吾路泉陽豫且得我我不能去身在患中莫可告語王有德義故來告訴車頻秦書苻堅建元十二年髙陸縣民穿井得龜大二尺六寸背文負八卦古字堅以石為池養之六十年而死取其骨以問吉凶名為客龜太卜佐髙夢客龜言我歸江南不遇死於秦曾於夢中自解曰龜三萬六千歲而終終必亡國之徵也子胥揚濤文種重水吳越春秋吳王賜子胥屬鏤之劍而死乃取其尸盛以鴟夷之器投之于江中子胥因依潮來往蕩激崩岸又越王殺文種葬於國之西山葬一年伍子胥從海上穿山脅而持種去與之俱浮于海故前潮水審侯者子胥也後重水者大夫種也子胥杯動酒盡元廷執杯獻酬吳地記越軍於蘇州東南三十里三江口又向下三里臨江北岸立壇殺白馬祭子胥杯動酒盡後因立廟北江上今其側有浦名壇浦北史夏侯夬字元廷與南人辛諶庾遵江文遙等終日聚遊酣飲之際恆相謂曰人生局促何如朝露坐上相看先後間耳脫有先亡者於良辰美景靈前飲宴倘或有知庶共歆饗及夬亡後三月上已諸人相率至夬靈前仍共酌飲時日晚天隂室中微暗咸見夬在坐衣服形容不異平昔時執杯酒似若勸酬但無語耳子房跪老父子房拜小兒漢書張良嘗從容步遊下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲毆之為其老乃強忍下取履因跪進父以足受之笑去良殊大驚父去里所復還曰孺子可教矣後五日平明與我期此良因怪之跪曰諾五日平明良往父已先在怒曰與老人期後何也去後五日蚤會五日雞鳴往父又先在復怒曰後何也去後五日復蚤來五日良夜半往有頃父亦至喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北榖城山下黃石即我已真誥漢初有四五小兒路上畫地戲一兒歌曰著青裙入天門揖金母拜木公到復是隱言也時人莫知之唯張子房知之乃往拜之此乃東王公之玉童也所謂金母者西王母也木公者東王公也仙人拜王公揖金母海神形醜不欲圖形忖留貌醜不欲圖容三齊略記始皇于海中作石橋海神為之竪柱始皇求為相見神曰我形醜莫圖我形當與帝相見乃入海四十里左右莫動手工人潛以腳畫其狀神怒曰帝負約速去始皇轉馬還前腳猶立後腳遂崩僅得登岸畫者溺死于海衆山之石皆傾注今猶岌岌東趣水經注石柱橋舊有忖留神象此神嘗與魯班語班令其神出忖留曰我貌狠醜卿善圖物容我不能出班於是拱手與言曰出頭見我忖留乃出首班於是以腳畫地忖留覺之便還沒水故置其象於水唯背以上立水上後董卓入關遂焚此橋魏武帝遂更修之橋三丈六尺忖留之象曹公乘馬見之驚又命下之河伯婦山公嫗江神婦史記西門豹為鄴令豹往到鄴會長老問民之所疾苦長老曰苦為河伯娶婦以故貧豹曰至為河伯娶婦時願三老巫祝父老送女河上幸來告語之吾亦往送女皆曰諾至其時西門豹往會之河上三老官屬豪長者里父老皆會以人民往觀之者三二千人其巫老女子也已年七十從弟子女十人所皆衣繒單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投河中有頃曰弟子何久也復使一人趣之復投一弟子河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹簮筆磬折嚮河立待良久長老吏傍觀者皆驚恐西門豹顧曰巫嫗三老不來還奈之何欲復使廷掾與豪長者一人入趣之皆叩頭叩頭且破額流血至地色如死灰西門豹曰諾且留待之須臾須臾豹曰廷掾起矣狀河伯留客之久若皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦按洪容齋氏曰此事蓋出於一時雜傳記疑未必有實而六國表秦獻公八年初以君甥妻河言初者自此年而始不知止於何時注家無説司馬正史記索隱乃云初以君主妻河謂嫁之河伯故魏俗猶為河伯娶婦蓋其遺風然則此事秦魏皆有之矣後漢書浚遒縣有唐后二山民共祠之衆巫遂取百姓男女以為公嫗歲歲改易既而不敢嫁娶前後守令莫敢禁宋均乃下書曰自今以後為山娶者皆娶巫家勿擾良民于是遂絶風俗通曰秦昭王使李氷為蜀守開成都兩江溉田萬頃神歲取童女二人為婦氷以其女與神為婚經至神祠勸神酒酒杯恆淡淡氷厲聲以責之因忽不見良久有兩牛鬬於江岸傍有間氷還流汗謂官屬曰吾鬬大極當相助也南向腰中正白者我綬也主簿刺殺北靣者江神遂死蜀人慕其氣決凡壯健者因名氷兒也憤王祠妬婦津南史吳興郡界有卞山山下有頃羽廟土人名為憤王甚著靈驗相承云羽多居郡聽事因安牀幕為神坐前後二千石皆於聽拜祠以軛下牛充祭時蕭惠休事神謹遂得美遷蕭惠明盛于聽事設榻延賔見有張弓挾矢向之者旬日卒吕安人奉佛法不與神牛輒于廳上設八關齋俄而牛死葬廟側安人尋亦死世並云神為之祟也逮蕭琛到郡著履登聽事聞室中有叱聲琛厲色曰生不能與漢祖爭中原死據此聽事何也因遷之於廟並禁牛祀亦竟無他酉陽雜爼云妬婦津相傳言晉太始中劉伯玉妻段氏字明光性妬忌伯玉嘗于妻前誦洛神賦語其妻曰娶婦得如此吾無憾焉明光曰君何與水神善而欲輕我吾死何愁不為水神其夜乃自沉而死死後七日托夢語伯玉曰君本願神吾今得為神也伯玉寤而覺之遂終身不復渡水有婦人渡此津者皆攘衣枉粧然後敢濟不爾風波暴發醜婦雖粧飾而渡其神亦不妬也婦人渡河無風浪者以為己醜不致水神怒醜婦諱之無不皆自毁形容以塞嗤笑也故齊人語曰欲求好婦立在津口婦立水傍好醜自彰自稱徐伯玄自稱甄舒仲自稱孤竹君晉書殷仲堪遊於江濵見流棺接而葬焉旬日間門前之溝忽起為岸其夕有人通仲堪自稱徐伯玄云感君之惠無以報也仲堪因問門前之岸是何祥乎對曰水中有岸其名為洲君將為州言終而沒至是果臨荆州又鄒湛嘗見一人自稱甄舒仲餘無所言如此非一久之乃悟曰吾宅西有積土敗瓦其中必有死人甄舒仲者豫舍西土瓦中人也檢之果然厚加斂葬葬畢遂夢此人來謝地道志曰遼西人見遼水有浮棺欲破之語曰我孤竹君也汝破我何為因為立祠焉李氷厲聲責江神文翁拔劍擊江神風俗通李氷為蜀守時江神歲取二童女為婦氷以其女與神為婚經至神祠勸神酒酒杯恆淡淡氷厲聲以責之因忽不見水經注蜀有回復水江神嘗流殺人文翁為守祠之勸酒不盡拔劔擊之遂不為害孝經愈病易經却鬼南史有病邪者問郭歡歡曰家有何書答曰惟有孝經而已歡曰可取仲尼居置病人枕邊恭敬之自差也而後病者果愈後人問其故答曰善禳惡正勝邪此病者所以差也北史權會夜出城東門獨乘一驢忽有二人一人牽頭一人隨後有似相助其回動輕漂有異生人漸失路不由本道心甚怪之遂誦易經上篇第一卷不盡前後二人忽然離散會亦不覺墮驢迷悶至明始覺方知墮處乃是郭外才去家數里阮瞻執無鬼論阮修持無鬼辨晉書阮瞻素執無鬼論物莫能難每自謂此理足可以辨正幽明忽有一客通名詣瞻寒溫畢聊談名理客甚有才辨瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無即僕便是鬼于是變為異形須臾消滅瞻默然意色大惡又阮修好易老善清言嘗有論鬼神有無者皆以人死者有鬼修獨以為無曰今見鬼者著生時衣服若人死有鬼衣服有鬼邪論者服焉後遂伐社樹或止之修曰若社而為樹伐樹則社移樹而為社伐樹則社亡矣狄仁傑毁淫祠一千七百所李德裕毁淫祠一千一十所舊唐書狄仁傑充江南巡撫使吳楚之俗多淫祠仁傑奏毁一千七百所唯留夏禹吳太伯季札伍員四祠又李德裕為淅西觀察使壯年得位鋭於布政凡舊俗之害民者悉革其弊江嶺之間信巫祝惑鬼怪有父母兄弟厲疾者舉室棄之而去德裕欲變其風擇鄉人有識者諭之以言繩之以法數年之間弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之內除淫祠一千一十所又罷私邑山房一千四百六十以清冦盜人樂其政優詔嘉之築歲見怪掘歲得禍酉陽雜爼工部員外張周封當築墻于太嵗上一夕盡崩且意其基虗工不至率莊客指揮復築之髙未數尺炊者驚呌曰怪作矣遽視之飯數斗悉躍入地著墻勻若蠶子無一粒重者矗墻之半如界焉因謁巫酹地謝之亦無他異廣異記上元末復有李氏家不信太歲掘之得一塊肉相傳云得太歲者鞭之數百當免禍害李氏鞭九十餘忽然騰上因失所在李氏家有七十二口死亡略盡惟小薊公尚存李氏兄弟恐其家滅盡夜中令奴悉作鬼裝束劫小薊便藏之惟此子得存其後襲封薊公又寧州有人亦掘得太歲狀類赤菌有數千眼其家不識移至大路遍問識者有胡僧驚曰此太嵗宜速埋之其人遽送舊處經一年人死略盡又酉陽雜爼萊州即墨縣有王豐兄弟三人豐不信方位所忌嘗於大歲上掘坑見一肉塊大如斗蠕蠕而動遂填其坑肉隨填而出豐懼棄之經宿其肉長塞於庭兄弟奴婢數日內悉卒惟一女子存焉朝良正掘太歲董表儀掘太歲廣異記朝良正性剛不怖鬼每年常掘太歲地掘後忽見一肉物良正打之三日送於河其夜使人視之三更後車馬甚衆來至肉所問太歲何故受此屈辱不讐報之太歲曰彼正榮華無奈之何暨明失所在傳載董表儀家在河沙塘東嘗欲撤屋掘土隂陽人云太歲居北方不可興工既而掘深三尺許得肉塊漫漫然董惡之投諸河訖亦無禍歲輸砧數千歲上杼十枚玄中記玉門之西有一國國中有山山上有祠廟國人歲歲出石砧數千輸廟中名曰霹靂砧給霹靂用從春雷出砧日滅至秋而盡華陽國志梓潼縣郡治有五婦山故蜀五丁士所拽蛇崩山處也有善板祠一曰惡子民歲上雷杼十枚歲盡不復見云雷取去以刀開心以鑿開心異苑鄭玄師馬融三載無聞融遣還玄過樹隂下假寐夢一人以刀開其心謂曰子可學矣於是寤而即返遂洞精典籍後東歸融曰詩書禮樂皆東矣舊唐書尹知章少勤學嘗夢神人以大鑿開其心以藥內之自是日益開朗盡通諸經精義尤明易及莊老玄言之學遠近咸來受業其有貧匱者知章盡其家財以衣食之又北夢瑣言唐劉瞻先婚李氏生一子即劉贊也相國薨後贊且孤幼性甚魯鈍教其讀書終不記憶其舅即李殷衡侍郎也以劉氏之子不可無後常加楚箠終不長進李夫人慈念不忍苦之歎其宿分也一旦不告他適無以訪尋聖善憶念淚如綆縻莫審其存亡數年方歸子母團聚且曰因入嵩山遇一白衣叟謂曰與汝開心將來必保聰明自是日誦一卷兼有文藻擢進士第梁時登朝充崇政院學士預時俊之流以廣陵散授嵇中散以廣陵散傳賀思令晉書嵇康嘗遊乎西洛暮宿華陽亭引琴而彈夜分忽有客詣之稱是古人與康共談音律辭致清辨因索琴彈之而為廣陵散聲調絶倫遂以授康仍誓不傳人亦不言其姓字後康將刑東市索琴彈之曰昔袁孝尼嘗從我學廣陵散吾每靳固之廣陵散於今絶矣世説會稽賀思令善彈琴嘗夜在月中坐臨風鳴絃忽有一人形貌甚偉著械有慘色在中庭稱善便與共語自云是嵇中散謂賀曰卿手下極快但放古法未偹因授以廣陵散遂傳之于今不絶北史鄭述祖嘗夢人彈琴寤而寫得以為絶妙廟神賜藥三丸廟神賜金十餅北夢瑣言閩從事崔員外忘其名正直檢身幕僚所重奉幣湖湘復命在道逢寇賊悉遭殺戮惟外郎於倉皇中忽有人引路獲免驅馳遠路復患痁疾行邁之次難求藥餌途次延平津廟夢為廟神賜藥三丸服之驚覺頓愈又盧成書生張璟乾寧中以所業之桂州欲謁連帥張相至衡州大嘷灘捐船上岸寢於江廟為廟神所責生以實對之神為改容延坐從容云有王立仁者罪合族誅廟神為其分疏奏於兵神無人作奏璟為草之既奏蒙允神喜以白金十餅為贈侍衛土偶皆泥濕如汗廟中人馬腳盡有泥濕南史蕭猷封臨汝侯為吳興郡守性倜儻與楚王廟神交飲至一斛每酹祀盡歡極醉神影亦有酒色所禱必從後為益州刺史侍中中護軍時江陽人齊茍兒反衆十萬攻州城猷兵糧俱盡人有異心乃遙禱請救是日田老逢一騎浴鐵從東方來俄有數百騎如風一騎過請飲田老問為誰曰吳興楚王來救臨汝侯當此時廟中請祈無驗十餘日乃見侍衛土偶皆泥濕如汗者是月猷大破茍兒又曹景宗傳先是旱甚詔祈蔣帝神求雨十旬不降帝怒命載荻欲焚蔣廟並神影爾日開朗欲起火當神上忽有雲如織倐忽驟雨如㵼臺中宫殿皆自振動帝懼馳詔追停于是偹法駕將朝臣修謁是時魏軍攻圍將離蔣帝神報敕必許扶助既而無雨水長遂挫敵人神之力也凱旋之後廟中人馬腳盡有泥濕當時並目睹焉穆之出陌室壞孝嗣移床壁崩南史劉穆之聞京城有呌聲晨出陌頭屬與信會直視不言者久之反室壞又徐孝嗣初在率府晝卧齋北壁下夢兩童子遽云移公床孝嗣驚起聞壁有聲行數步而壁崩壓牀劉聰作遮須王韓禽為閻羅王載記劉聰子約死一指猶暖遂不殯殮及蘇言見元海於不周山經五日遂復從至崑崙山三日復返於不周見諸王公卿將相死者悉在宫室甚壯麗號曰蒙珠離國元海謂約曰東北有遮須夷國無主久待汝父為之汝父後三年當來來後國中大亂相殺害居家死亡略盡但可永明輩十數人在耳汝且還後年當來見汝不久約拜辭而歸道遇一國曰猗尼渠餘國引約入宫與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後來年必見過當以小女相妻約歸置皮囊於機上俄而蘇使左右機上取皮囊開之有一方白玉題文曰猗尼渠餘國天王敬信遮須夷國天王歲在攝提當相見也馳使呈聰聰曰若審如此吾不懼死也及聰死與此玉并葬焉志林云劉聰聞當為遮須國王則不復懼死人之愛富貴有甚於生者月犯少微吳中髙士求死不得人之好名有甚於生者北史韓禽拜涼州總管俄徵還京恩禮殊厚無何其鄰母見禽門下儀衛甚盛有同王者母異而問之其中人曰我來迎王忽不見又有人疾篤忽驚走至禽家曰我欲謁王左右問何王曰閻羅王禽子弟欲撻之禽止之曰生為上柱國死作閻羅王亦足矣酉陽雜爼大寧坊力者劄左膊曰生不怕京兆尹右膊曰死不怕閻羅王蔣濟子轉泰山録事沈僧昭為泰山録事列異傳蔣濟為領軍其婦夢見亡兒涕泣曰兒為泰山伍伯憔悴困辱不可復言今太廟西謳士孫阿見召為泰山令願母為白侯屬阿令轉我得樂處明日暮復夢云新君明日日中當發願重啓侯何惜不一試驗之濟于是乃見孫阿具語其事阿不懼當死而喜得為泰山令惟恐濟言不信也曰不知賢子欲得何職濟曰隨地下樂者與之濟欲速知其驗從領軍門至廟下十步安一人以傳阿消息辰時傳阿心痛已時傳阿劇日中傳阿亡濟泣曰雖哀我兒之不幸且喜亡者有知後月餘兒復來語母曰已得轉為録事矣按真誥蔣濟為南山伯領二千兵南史沈僧昭别名法朗少事天師道士常以甲子及甲午日夜著黃巾衣褐醮於私室時記人吉凶頗有應驗自云為泰山録事幽司中有所收録必僧昭署名按真誥荀顗為太山君取顧衆為泰山將軍用曹洪為司馬桓範為長史蘇韶傳云劉孔才為太山公欲反北帝已誅滅之孔才即劉劭也又梅頥為豫章太守夢被召作太山府君克日便亡天帝召為記天帝取著棋唐李長吉集序長吉將死時忽晝見一緋衣人駕赤虯持一版書若太古篆或霹靂石文者云當召長吉長吉了不能讀歘下榻叩頭言阿彌老且病賀不願去緋衣人笑曰帝成白玉樓立召君為記天上差樂不苦也按舊唐書李賀字長吉手筆敏捷尤長于歌篇其文思體勢如崇巖峭壁萬仞崛起當時文士從而效之無能髣佛者其樂府詞數十篇至于雲韶樂工無不諷誦北夢瑣言唐僖宗朝翰林棊待詔滑生能棊品甚髙少逢敵手有一張小子年僅十四來謁覔棊請饒一路滑生棊思甚遲沈吟良久方下一子張生隨手應之都不介意仍于庭際取適候滑生更下又隨手著應之一旦黃寇犯闕僖皇幸蜀滑以待詔供職謀赴行在欲取金州路入辦裝挈家次張生曰不必前邁某非棊客天帝命我取公著棊請指揮家事滑生驚愕妻子啜泣奄然而逝他日京都共知也昔顔回卜商為地下修文郎又李長吉為帝召撰樂府豈斯類邪所謂天帝者非北極天皇大帝也按真誥又非北方玄天黑帝道君此鬼都北帝以號鬼帝世人有功德者地官得以辟請四明公之流是也召棊之命乃酆宫帝君乎楊鑣與大姑作偶光澤與太山作兒北夢瑣言唐楊鑣收相之子少年為江西推巡優遊外幕也屬秋祭請祀大姑神西江中有兩山孤拔號大者為大孤小者為小孤朱崖李太尉有小孤山賦寄意焉後人語訛作姑姊之姑創祠山上塑像艷麗而風濤甚惡行旅憚之每歲本府命從事躬祭鑣與於此行鑣悅大姑容偶有言謔浪祭畢回舟而見空中雲霧有一女子容質甚麗俯就楊公呼為楊郎遜詞云家姊多幸蒙楊郎採顧便希回橈以成禮也故來奉迎𢎞農驚怪乃曰前言戲之耳小姑曰家姊本無意輒慕君子而楊郎自發言茍或中輟立恐不利于君𢎞農憂惶遂然諾之懇布從容一月處理家事小孤亦許之楊生歸指揮訖倉卒而卒似有鬼神來迎也又登州節判史在德郎中子光澤甚聰俊方修舉業自别墅歸乘醉入太山廟謂神曰與神作第三兒得否自是歸家精神恍忽似有見召踰月而殂也龜禍老桑狸誤老表異苑曰孫權時永康縣有人入山遇一大龜即束之以歸龜便言曰遊不量時為君所得擔者怪載出欲上吳王夜宿越里纜船於大桑樹宵中樹忽呼龜曰元緒奚事爾也龜曰行不擇日今方見烹雖盡南山之樵不能潰我樹曰諸葛元遜識性淵長必致相困令求如我之徒計將安泊龜曰子明無多辭既至建業權將煮之燒柴萬車諸葛恪曰然以老桑乃熟獻人仍説龜言權使伐桑取煮之即爛續齊諧記張華為司空于時燕昭王墓前有一斑狸化為書生欲詣張公過問墓前華表曰以我才貌可得見司空邪華表曰子之妙解無為不可但張公制度恐難籠絡出必遇辱殆不得返非但喪子千年之質亦當深誤老表狸不從遂詣華見其容止風流雅重之於是論及文章聲實華未嘗勝次復商略三史探貫百氏包十乘洞三才華無不應聲屈滯乃歎曰明公當尊賢容衆嘉善矜不能奈何憎人學問墨子兼愛其若是耶言卒便退華乃使人防門不得出既而又問華曰公門置兵甲蘭錡當是疑僕邪恐天下之人卷舌而不談知謀之士望門而不進深為明公惜之華不答使人防禦甚嚴豐城令雷煥博物士也謂華曰聞魅鬼忌所别者數百年物耳千年老精不復能别惟千年枯木照之則形見昭王墓前華表已當千年使人伐之至聞華表言曰老狸不自知果誤我事於華表穴中得青衣小兒長二尺餘使還未至洛陽而變成枯木遂然以照之書生乃是一斑狸茂先歎曰此二物不值我千年不復可得撥糞是金遺糞皆銀湘中記云長沙西南有金牛巖漢武時有一田父牽赤牛告漁人欲渡江漁人云船小豈勝得牛田父曰但相容不重君船於是人牛俱上及半江牛糞於船田父曰以此相贈既渡漁人怒其汚船以橈撥糞棄水欲盡方覺是金訝其神異乃躡之但見人牛入嶺隨而掘之莫能及也今掘處猶存酉陽雜爼漢建武二十一年有人騎白牛蹊人田田父訶詰之乃曰吾北海使將看天子登封遂乘牛上山田父尋至山惟見牛迹遺糞皆為銀明年世祖封禪五羊負穀五羊銜穀南部新書吳修為廣州刺史未至州有五仙人騎五色羊負五榖而來今州廳梁上畫五仙人騎五色羊為瑞故廣南謂之五羊城與番禺雜記同廣州記六國時廣州屬楚髙固為楚相五羊銜穀至其庭以為瑞因以五羊名其地馬鬼鵝鬼抱朴子按九鼎記及青靈經言人物之死俱有鬼也馬鬼常以晦夜出行狀如炎火吳志注景帝有疾使巫視鬼欲試之乃殺一鵝埋之於苑中駕屋施牀几以婦人服物著上乃使巫視之若能説此冢中婦形狀者加賞此巫視日竟晝夕無所道帝催問之急乃曰實不見有鬼但見一頭白鵝在墓上所以不即白疑是鬼神變化而作定無復改易不知何如景帝乃厚賜之鯀化黃熊鯀化玄魚春秋傳縣化為黃熊入於羽淵拾遺記鯀自沉於羽淵化為玄魚時揚鬚振鱗橫修波之上見者謂為河精梁蕭綺録曰在山變為熊入水化為魚也白龍飲水赤龍據案唐太宗未建義時常飲酒醉卧劉文靜家文靜坐樓上見宅南大池中有白龍下飲水池中大魚皆躍上岸以百數良久乃隱家人共見極驚駭太宗睡覺謂文靜云醉中渴甚夢入公家池中飲水極清泠快意文靜視其體尚猶濕也唐玄宗臨潞州景龍二年四月十七日在廳事假寐白鶴觀道士宋大辨等三十人同見赤龍據案又微時嘗至洛陽令崔日知宅崔設饌未熟明皇因寢庭前一架藤花初開日知見巨蛇食藤花逡巡不見上覺曰飢甚夢中食藤花甚美日知知他日啓聖之驗也萇𢎞之血化為碧淮隂之血漬為草莊子萇𢎞死於蜀藏其血三年而化為碧又台州志王貞婦為元兵所劫至嵊縣清風嶺齧指出血書字山石投崖死血漬石間天且隂即墳起如始書永新志談節婦趙氏被元兵併其子殺之血漬禮殿間八磚上宛然一婦人抱嬰兒狀或磨以沙石不滅又煆以火益顯至今如初地理志未央殿東北二里許蓋鐘室故處有丈餘隙地草色皆殷赤傳是韓淮隂血漬而然竊窺乃大蛇外窺乃巨龜晉書杜預初在荆州因宴集醉卧齋中外人聞嘔吐聲竊窺于户止見一大蛇垂頭而吐北夢瑣言歸登尚書每浴必屏左右或有自外窺之乃巨龜也又榮陽崔魏公鉉因醉眠左右見一白者蓋杜南蛇也牛哀化虎左飛化虎淮南子昔公牛哀轉病也七日化為虎其兄掩户而入覘之則虎搏而殺之是故文章成獸爪牙移易志與心變神與形化方其為虎也不知其嘗為人也方其為人不知其且為虎也二者代謝舛馳各樂其成形狡猾鈍惛是非無端孰知其所萌夫水嚮冬則凝為氷氷迎春則泮而為水氷水移易於前後若周員而趨孰暇知其所苦樂乎交州記龍編縣功曹左飛曾化為虎數月還作吏既言其化亦化無不在牛哀易虎不識厥兄當其革狀安知其訛變哉按髙誘氏云人化為虎者便還食人食人因作真虎不食人者更復化為人評曰牛哀之事載之往牒非一初嘗怪之及覩談子化書而爽然釋也其言曰至淫者化為婦人至暴者化為猛虎心之所變不得不變嗟乎世有至暴者即靦然而人靣哉人固以乳虎目之矣江夏黃氏化黿入深淵丹陽宣氏化黿入遠潭後漢靈帝時江夏黃氏之母浴而化為黿入於深淵其後時出見初浴簮一銀叉及見猶在其首晉書孫皓寶鼎元年丹陽宣騫母年八十因浴化為黿兄弟閉户衛之掘堂上作大坎實水其中黿入坎遊戲一二日恆延頸外望伺戶小開便輪轉自躍入於逺潭遂不復還靳尚作一大蟒郤后謫為大蟒攝山記楚大夫靳尚以讒殺屈原為天所譴作一大蟒穴在山後人為之立廟梁武讖序郤氏梁武帝后也崩數月帝居寢殿聞外騷窣聲視之乃見一蟒盤躃上殿睒睛呀口向帝帝驚駭蹶起曰宫殿嚴警非爾類所生之處豈妖孽欲祟朕耶蛇人語曰蟒昔郤氏也妾以生存嫉妬損物害人死以是罪謫為蟒耳駢志卷十四
