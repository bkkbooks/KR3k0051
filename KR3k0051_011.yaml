body:
  text: 駢志卷十一明陳禹謨撰己部上推終始五德之運陳終始五德之傳史記騶衍睹有國者益淫侈不能尚德若大雅整之于身施及黎庶矣乃深觀隂陽消息而作怪迂之變終始大聖之篇十餘萬言其語閎大不經必先驗小物推而大之至于無垠先序今以上至黃帝學者所共術大並世盛衰因載其禨祥度制推而逺之至天地未生窈冥不可考而原也先列中國名山大川通谷禽獸水土所殖物類所珍因而推之及海外人之所不能睹稱引天地剖判以來五德轉移治各有冝而符應若兹大並世盛衰者索隱曰言其大體隨代盛衰觀時而説事漢書魯人公孫臣上書陳終始五德傳言漢土德時其符黃龍見當改正朔易服色事下張蒼蒼以為非是罷之其後黃龍見成紀于是文帝召公孫臣以為博士草立土德時歷制度更元年蒼由此自詘謝病稱老師古注曰傳謂傳次也羲和浴日羲和浴月山海經東南之外甘水之間有羲和之國有女子名曰羲和方浴于甘淵羲和者帝俊之妻生十日言生十子各以日名名之故言生十日數十也郭氏傳羲和蓋天地始生主日月者也故啓筮曰空桑之蒼蒼八極之既張乃有夫羲和是主日月職出入以為晦明又曰瞻彼上天一明一晦有夫羲和之子出於湯谷故堯因此而立羲和之官以主四時其後世遂為此圖作日月之象而掌之沐浴運轉之于甘泉中以效其出入湯谷虞淵也所謂世不失職耳又有人反臂名曰天虞有女子方浴月帝俊妻常羲生月十有二此始浴之占風鐸相風旌開元遺事云唐岐王宫中于竹林內懸碎玉片子每夜聞玉片子相觸之聲即知有風號占風鐸又五王宫中各于庭中立長竿挂五色旌于竿頭旌之四垂綴以小金鈴有聲即使侍從者視旌之所向可以知四方風候鑽燧改火浚井改水禮儀志夏至日浚井改水冬至日鑽燧改火可去溫病也正旦獻鳩正旦獻雀列子邯鄲之民以正月之旦獻鳩于簡子簡子大悅厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君欲放之故競而捕之死者衆矣君而欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰善孔叢子邯鄲民以正月旦獻雀干趙王而綴以五綵王大悅申叔告子順子順曰王何以為也對曰正旦放之示有生也子順曰此委巷之鄙事非先王之法且又不順夫雀者取其名則宜受之于上不宜取之于下一國之王受民雀將何悅焉七日曝書七日曬衣崔實四民月令七月七日曝經書設酒脯又世説郝隆七月七日見鄰人皆曝曬衣物隆乃仰卧曝腹于庭曰我曝腹中書竹林七賢傳阮咸好酒而貧舊俗七月七日法當曬衣諸阮庭中爛然莫非綈錦咸時總角乃竪長竿標大布犢鼻于庭中又楊園苑疏太液池西有武帝曝衣閣常至七月七日宫女出后衣登樓曝之河神劈山山神劈流西京賦注云華山對河東首陽山黃河流于二山之間古語云此本一山當河河水過之而曲行河神巨靈以手劈開其上以足蹈離其下中分為兩以通河流今嶽上有指掌之形首陽山下足迹亦存焉水經注廬山有神廟甚神能分風劈流住舟遣使行旅之人過必敬祀而後得去故曹毗詠云分風為二劈流為兩聖人窟君子濟水經注河水北出虞山東南經傅巖歷傅説隱室前俗名之為聖人窟傅巖東北十餘里即巔軨坂亦謂之軨橋傅説傭隱止息于此又昔漢桓帝十三年西幸榆中東行代地洛陽大賈齎金貨隨帝後行夜迷失道往投津長曰子封送之渡河賈人卒死津長埋之其子尋求父喪發冢舉尸資費一無所損其子悉以金與之津長不受事聞于帝曰君子也即名其津曰君子濟智水愚山水經注谷水出漢北即智水也北發聽山山下有穴水穴水東南流歷平川中謂之智鄉水曰智水川有唐公祠唐君字公房城固人也學道得仙入雲臺山合丹服之白日升天雞鳴天上狗吠雲中唯以鼠惡留之鼠乃感激以月晦日吐腸胃更生故時人謂之唐鼠也公房升仙之日壻之行未還不獲同偕雲路約以此川為居言無繁霜蛟虎之患其俗以為異因號為壻鄉故水亦即名焉又時水西北徑黃山東又北歷愚山山東有愚公冢時水又屈而徑杜山北有愚公谷齊桓公時公隱于溪鄰有認其駒者公以與之山即杜山之通阜以其人狀愚故謂之愚火井煮鹽石礦成鐵華陽國志臨卭縣西南二百里本有卭民秦始皇徙上郡實之有布濮水從布濮來合火井江有火井夜時光映上照民欲其火先以家火投之頃許如雷聲火熖出通耀數十里以竹筒盛其光藏之可拽行終日不滅也井有二水取井火煮之一斛水得五斗鹽家火煮之得無幾也又古石山有石礦大如蒜子火燒合之成流支鐵甚剛因置鐵官有鐵祖廟祠漢文帝時以鐵賜侍郎鄧通假民卓王孫歲取千匹故王孫貨纍巨萬億鄧通錢亦盡天下又臺登縣有孫水一曰白沙江入馬湖水山有砮石火燒成鐵剛利禹貢厥貢砮是也斯調國火洲崑崙墟火山異物志斯調有火洲在南海中其上有野火春夏自生秋冬自死有木生于其中而不消也枝皮更活秋冬火死則皆枯瘁其俗常冬采其皮以為布色小青黑若塵垢汚之便投火中則更鮮明也搜神記崑崙有炎火之山山上有鳥獸草木皆生于炎火之中故有火浣布非此山草木之皮枲則其鳥獸之毛也漢世西域舊獻此布中間久絶至魏初時人疑其無有文帝以為火性酷烈無含生之氣著之典論明其不然之事絶智者之聽乃明帝立詔三公曰先帝昔著典論不朽之格言其刊石于廟門之外及太學與石經並以永示來世至是西域使至而獻火浣布焉于是刋滅此論而天下笑之神異經曰南荒之外有火山長三十里廣五十里其中皆生不燼之木晝夜火燒得暴風不猛猛雨不滅火中有鼠重百斤毛長二尺餘細如絲可以作布常居火中色洞赤時時出外而色白以水逐而沃之即死績其毛織以為布傅子曰漢桓帝時大將軍梁冀以火浣布為單衣常大會賔客冀陽爭酒失杯而汙之偽怒解衣曰燒之布得火煒煜赫然如燒凡布垢盡火滅粲然潔白若用灰水焉鹽田鹽池述異記曰河東郡有一大澤澤中産鹽引水沃之則自成號曰鹽田取之無盡不沃則無也又張掖有鹽池自然生鹽其鹽多少隨月增減非停午夜分不見曦月非日中夜半不見日月水經注自三峽七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日自非停午夜分不見曦月至於夏水襄陵沿泝阻絶王命急宣有時朝發白帝暮到江陵其間千二百里雖乘奔御風不加疾也宜都記自黃牛灘東入西陵界至峽口一百許里山水紆曲而兩岸髙山重嶂非日中夜半不見日月絶壁或千許丈其石彩色形容多所像類林木髙茂略盡冬春猿鳴至清山谷傳響泠泠不絶所謂三峽此其一也袁嵩言嘗聞峽中水疾書記及口傳悉以臨懼相戒曾無稱有山水之美也及余來踐躋此境既至欣然始信之耳聞不如親見矣其疊崿秀峰竒構異形固難以辭敘林木蕭森離離蔚蔚乃在霞氣之表仰瞻俯映彌習彌孫云疑脫佳字流連信宿不覺忘返目所履厯未嘗有也既自欣得此竒觀山水有靈亦當警知已於古矣凱風自是出條風自是出山海經旄山之尾其南有谷曰育遺多怪鳥凱風自是出又令丘之山無草木多火其南有谷焉曰中谷條風自是出風陵風堆水經注函谷關之直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵戴延之所謂風塠者也水經注髙平縣西十里有獨阜阜上有故臺臺側有風伯壇故世俗呼此阜為風堆又長寧水所出南山上有風伯祠春秋祭之風山風井風穴水經注河水南徑北屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止當其衝飄也而略無生草蓋不定衆風之門故也又湯井北百餘步有東西谷廣十許步南岸下有風穴厥大容人其深不測而穴中肅肅常有微風雖三伏盛暑猶須襲裘寒吹凌人不可暫停又風井山回曲有異勢穴口大如盆袁山嵩曰夏則風出冬則風入春秋分則靜重人穴僵人峽水經注鄩水南流世謂之溫水泉側有重人穴穴中有僵尸戴延之從劉武王西征記曰有此尸尸今猶在夫物無不化之理魂無不遷之道而此尸無神識事同木偶之狀喻其推移未若正形之速遷也又瓦亭川水西南流歷僵人峽路側巖上有死人僵尸巒穴故岫壑取名焉釋鞍就穴直上可百餘仞石路逶迤劣通單步僵尸倚窟枯骨尚全惟無膚髮而已訪其川居之士云其鄉中父老作童兒時已聞其長舊傳此當是數百年骸矣移山逃石水經注移山山本在水北夕中風雨旦而山移水南故山以移為名蓋亦蒼梧郁州佐山之類也又靈石一名逃石髙三十丈廣圓五百尺耆舊傳言石本桂陽武城縣因夜迅雷之變忽然遷此彼人來見歎曰石乃逃來因名逃石以其有靈運徙又曰靈石孔山上有穴如車輸孔山上有穴出佳乳水經注河水南合溪口水出孔山南歷溪西流注于河孔山之上有穴如車輪三所東西相當相去各二丈許南北直通故謂之孔山也山出莆地西三十餘里又易水東徑孔山北山下有鍾乳穴穴出佳乳採者煹火尋炒入穴里許渡一水濳通流注其深可涉于中衆穴竒分令出入者疑迷不知所趣每于疑路必有歷記返者乃尋孔以自逹上又有大孔壑逹洞開故以孔山為名也魏土地記云代城東南二十五里有馬頭山其側有鍾乳穴又水經注隂陵縣之陽亭北小屈有石穴不測所窮言穴出鍾乳又大洪山下有石門夾障層峻巖髙皆數百許仞入石門得鍾乳穴穴上素崖壁立非人迹所及穴中多鍾乳凝膏下垂望齊氷雪微津細液滴瀝不斷石魚山石燕山水經注石魚山下多玄石山髙八十丈餘廣十里石色墨而理若雲母開發一重輒有魚形鱗鬐首尾宛若刻畫長數寸魚形備足燒之作魚膏因以名之又石燕山其山有口紺而狀燕因以名山其石或大或小若母子焉及其雷風相薄則石燕羣飛頡頏如真燕矣羅君章云今燕不必復飛也醉石醒石廬山記陶淵明所居栗里有大石淵明常醉眠其上名曰醉石唐餘録李德裕于平泉别墅採天下珍木怪石為園池之玩有醒酒石德裕尤所寶惜醉即踞之褒漢丙穴出嘉魚柏枝丙穴出嘉魚水經注褒水東南得丙水口水上承丙穴穴出嘉魚常以三月出十月入地穴口廣五六尺去平地七八尺泉懸注魚自穴下透入水穴口向丙故曰丙穴下注褒水故左思稱嘉魚出于丙穴良木攢于褒谷又柏枝山下有丙穴穴方數丈中嘉魚常以春末遊渚冬初入穴抑褒漢丙穴之類也鳥鼠同穴魚龍同穴水經注鄭玄曰鳥鼠之山有鳥焉與鼠飛行而處之又有止而同穴之山焉是二山也鳥名為賒似鵽而黃黑色鼠如家鼠而短尾穿地而共處鼠內而鳥外孔安國曰共為䳄雄杜彥逹曰同穴止宿養子互相哺食長大乃止張晏言不相為牝牡故因以名山拾遺記南潯之國有洞穴隂源其下通地脈中有毛龍時蛻骨于曠澤之中魚龍同穴而處煙從山出火從地出西域記屈茨北二百里有山夜則火光晝日但煙人取此山石炭冶此山鐵恆充三十六國用風俗記曰圁隂縣西五十里有鴻門亭天封菀火井廟火從地中出圁音銀石廪石倉臨川記石廪其中可容千斛廪開則歲儉閉則年豐鄱陽記錢倉石在饒州石形如倉囷昔漁人夜宿石上忽見石開窺其石中有錢取之盈艇因名焉弱水西流弱水南流禹貢弱水既西鄭氏云衆水皆東此水獨西故記其西下也舊唐書東女國其王所居名康延川中有弱水南流用牛皮為船以渡三日五變千年一清易乾鑿度云天降嘉應河水先清三日清變為白白變為赤赤變為玄玄變為黃各三日拾遺記丹丘千年一燒黃河千年一清皆至聖之君以為大瑞又云黃河清而聖人出半月東流半月西流子時潮上午時潮落寰宇記云江浙欽亷之潮皆有定候瓊海之潮半月東流半月西流潮之大小隨長短星不係月之盛衰廣西志桂林府聖水巖側子時潮上午時潮落三五十年有一大潮一日再增再減一日十溢十竭水經注潮汐塘水一日再增再減盈縮以時未嘗愆期同於潮水因名此塘為朝夕塘又連水東南流注于淮淮水又東南流而又與斟水合水導源近出東巖下穴口若井一日之中十溢十竭信若潮流石門貪泉橫流貪泉晉書吳隱之字處默介立有清操桓玄欲救嶺南之弊以隱之為廣州刺史未至州二十里地名石門有水曰貪泉飲者懷無厭之欲隱之既至語其親人曰不見可欲使心不亂越崖喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人飲此水一歃懷千金試使夷齊飲終當不易心及在州清操愈厲又南越志石門之水俗云經大庾則清穢之氣分飲石門則緇素之質變即吳隱之酌飲之所也又寰宇記隱之罷郡見妻篋中有沉香一片遂投石門內水中後人謂之沈香浦亦曰投香浦水經注橫流溪溪水甚小冬夏不乾俗以為貪泉飲者輒冒於財賄同於廣州石門貪泉矣亷介為二千石則不飲之昔隱之挹而不辭豈為能溷其真乎蓋亦惡其名也盜泉狂泉淮南曾子立亷不飲盜泉所謂養志者也尸子孔子至於勝母縣暮矣而不宿過于盜泉渴矣而不飲惡其名也又論語撰考讖水名盜泉仲尼不飲里名勝母曾子斂襟元和志盜泉在泗水縣源出髙徑山之隂南史宋袁粲嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂惟國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢至國主不任其苦於是到泉所酌水而飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水矣方湖員淵拾遺記員嶠山一名環丘上有方湖周回千里又岱輿山有員淵千里常沸騰以金石投之則爛如土矣好溪愚溪地理志處州東十里有惡溪多水怪宣宗時刺史段成式有善政水怪潛去民謂之好溪柳河東集愚溪詩序云灌水之陽有溪焉東流入于瀟水或曰冉氏嘗居也故姓是溪為冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今豫家是溪而名莫定土之居者猶齗齗然不可以不更也故更之為愚溪窮水富水水經云淮水又東北窮水入焉注曰豐水亦曰窮水音戎並聲相近字隨讀轉流結為陂謂之窮陂塘堰雖淪猶用不輟陂水四分農事用康北流注于淮又大陽山水有二源大富水出山之陽南流而左合小富水小富水出山之東而南徑三王城之東前漢末王匡王奉王常所屯故謂之三王城城中有故碑文字闕落不可復識其水屈而西南流右合大富水俗謂之大泌水也粉水錦江華陽國志漢初犍為張君為太守忽得仙道從此升度其祠下有清水穴巴人以此水為粉則膏暉鮮芳貢粉京師因名粉水故世謂江州墮休粉也又云錦江織錦濯其中則鮮明濯他江則不好故命曰錦里大翮山溫湯徐無城溫源魏土地記沮陽城東北六十里有大翮小翮山山上神名大翮神山屋東有溫湯水口其山在縣西北二十里峯巒四十里上廟則次仲廟也右出溫湯療治萬病泉所發之麓俗謂之土亭山此水炎熱倍甚諸湯下足便爛人體療疾者要須别引消息用之耳水經注溫源之水養疾者不能澡其炎漂以其過灼故魏氏土地記曰徐無城東有溫湯即此也湯谷可以熟米溫水可以燖雞水經注溫泉水出北山七泉竒發炎熱特甚闞駟曰縣有湯水可以療疾矣湯側又有寒泉焉地勢不殊而炎涼異致雖隆火盛月肅若氷容矣渾流同溪南流注滍水又東徑胡木山東流又會溫泉口水出北山阜炎勢竒毒疴疾之徒無能澡其衝漂救養者咸去湯十許步别池然後可入湯側有石銘云皇女湯可以療萬疾者也故杜彥逹云熱如沸湯可以熟米飯之愈百病道士親身沐浴一日三飯多少自在四十日後身中萬病愈三蟲死學道遭難逢危終無悔心可以牢神存志即南都賦所謂湯谷湧其後者也又溫水出竟陵之新湯縣東澤中口徑二丈五尺垠岸重沙端淨可愛靜以察之則淵泉如鏡聞人聲則揚湯奮發無所復見矣其熱可以燖雞洪瀏百餘步冷若寒泉火井湯井水經注火山上有大井南北六十七步廣減尺許源深不見底炎勢上升常若微雷發響以草㸑則煙騰火發又火井東五六尺有湯井廣輪與火井相狀勢熱又同以草內之則不然皆沾濡露結故俗以湯井為目居民釣魚者先請路人摘花者先請水經注長揚水中有神魚大者二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投鈎餌得魚過數者水輒波湧暴風率起樹木摧折又長揚水側生異花路人欲摘者皆當先請不敢扳取又東亭村北山甚髙峻上合下空空徼東西廣二丈許起髙如屋中有石林甚整頓傍生野韭人往乞者神許則風吹制分隨偃而輸不得過越不偃而輸輒凶獲輪于桑乾泉得笠于長揚溪水經注桑乾泉潛承太原汾縣縣北燕京山之大池池在山源之上世謂之天池方里餘其水陽晘不耗隂淋不濫無能測其源深也古老相傳言嘗有人乘車于池側忽遇大風飄之于水有人獲其輪于桑乾泉故知二水濳流通注矣又袁山嵩曰往人有冬過風井山者置笠穴中風吸之經日還步長揚溪得其笠則知濳通矣正月至十月徑之害人三月至十月徑之必死水經注永昌縣西北徑其郡西水左右具饒犀象山有鈎蛇長七八丈尾末有蚑蛇在山澗水中以尾鈎岸上人牛食之此水傍瘴氣時惡氣中有物不見其形其作有聲中木則折中人則害名曰鬼彈惟十一月十二月差可渡正月至十月徑之無不害人故郡有罪人徙之禁防不過十日皆死也又瀘峰最為髙秀孤髙三千餘丈是山于晉太康中崩震動郡邑水之左右馬步之徑裁通而特有瘴氣三月四月徑之必死非此時猶令人閟吐五月以後行者差得無害故諸葛亮表言五月渡瀘并日而食臣非不自惜也顧王業不可偏全于蜀故也益州記曰瀘水源出曲羅下三百里始曰瀘水兩峯有殺氣暑月舊不行故武侯以夏渡為艱呪潮射潮髙僧傳唐靈隱寺釋寶逹者以持密呪為務往時江潮大至激射湖上諸山逹為呪之忽一夜江濤中有偉人至玄冠朱衣導從甚繁謂逹曰身是子胥復讐雪恥者非他也師慈心為物已聞命矣言訖而滅明日寺僧怪其車馬之喧因言其事自爾西岸沙漲彌年吳越備史梁開平四年錢武肅王始築捍海塘在候潮通江門外江濤晝夜衝擊沙岸版築不能就因命強弩數百以射波頭又親祝胥山祠仍為詩一章函置海門既而濤頭遂趨西陵乃運巨石盛以築籠植巨材捍之城基始定其重濠壘塹通衢廣陌亦由是而成焉錢塘遺事錢王射潮退避後遂以鐵鑄成箭樣其大如杵作亭路傍埋箭亭中出土外猶七尺許以示鎮壓之義七女池五女激水經注壻水東徑七女冢冢夾水羅布如七星高十餘丈周回數畝元嘉六年大水破墳墳崩出銅不可稱計得一磚刻云項氏伯無子七女造槨世人疑是項伯冢水北有七女池池東有明月池狀如偃月皆相通注謂之張良渠蓋良所開也又沔水北岸數里有大石激名曰五女激或言女父為人所害居固城五女思復父怨故立激以攻城城北今淪于水亦云有人葬沔北墓宅將為水毁其人五女無男皆悉巨富共修此激似今墳宅然激作甚工又云女嫁為隂縣佷子家貨萬金而自少不從父語父臨亡意欲葬山下恐兒不從故命言葬我著渚下石磧上佷子曰我由來不奉教今從語遂盡散家財作石冢積土繞之成一洲長數百步元康中始為水所壞今石皆如半榻許數百枚聚在水中佷子是前漢人襄陽太守胡烈有惠化補塞堤決民賴其利相傳歷山相傳首陽括地志蒲州府河東縣雷首山亦名歷山南有舜井又越州餘姚縣有歷山舜井濮州雷澤縣有歷山舜井又有姚墟云生舜處也媯州外城中有舜井城北有歷山皆云舜所耕處路史夷齊冢廟在蒲之蒲阪首陽山之南馬融顔師古之説同而髙誘乃以為洛東南去二十里之首陽山杜預阮籍之徒咸以為然更謂二子餓死在是即今二山皆有夷齊冢廟九域志兩從之戴延之竊以為疑按夷齊之蹤當在河東首陽者雷首也是為中條一曰薄山一山九名即萯山也據河南郡境界薄去城東北十里首陽山上有首陽祠夷齊所居而黃太史猶以或者指武師渡孟津二子叩馬而諫當以洛陽為是夫首陽之名所在固不一曹大家云在隴西而今隴西有地曰首陽東有鳥鼠山謂之首陽而許叔重言首陽則正在遼西今遼之和順東實有山曰首陽俱有祠廟其在吳郡亦有首山豈得遍為據耶石曼卿云死蒲阪者恥周之事而死于堯舜之區庶幾見揖巽之風焉則亦非洛陽矣舜井禹井杜預曰魯國卞縣東南有姚墟世謂之曰陶墟舜所陶處也井曰舜井水經注歷縣城南封山山上有舜祠下有大穴謂之舜井封氏見聞齊州城東有孤石平地聳出俗謂之歷山有泉號舜井東隔小街又有石井汲之不絶云是舜東家井水經注會稽山之東有禹井深不見底東遊者多探其穴大禹所植夫子手植山川紀異漢陽縣西柏泉寺有古井世傳大禹植柏於大别山其根盤曲直至井底今柏根尚存又大别山陽太平興國寺前亦有古柏俗傳禹治水所植者封氏見聞記兖州曲阜縣文宣廟門內并殿西南各有柏葉松身之樹髙五六丈枯稿已久相傳夫子手植永嘉三年復枯俗傳千年木療心痛人多竊割削之樹身漸細去地丈餘皆以石壘泥封猶不免焉亦有取為笏者色紫而甚光澤肅宗時二樹猶在孔子履孔子車孔子硯孔子甕晉書武庫中火張華懼因此變作列兵固守然後救之故纍代之寶及漢髙斬蛇劒王莽頭孔子履等盡焚焉時華見劒穿屋而飛莫知所向水經注夫子廟屋三間夫子在西門東向母徴在中間南面夫人隔東一間東向夫子牀前有石硯一枚作甚朴云平生時物也魯人藏夫子所乘車于廟中是顔路所請者也獻帝時廟遇火燒之永平中鍾離意為魯相到官出私錢萬三千文付戶曹孔欣治夫子車身入廟拭几席劍履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主簿安置几席孔子教授堂牀首有懸甕意召孔欣問何等甕對曰夫子甕也背有丹書人弗敢發也意曰夫子聖人所以遺甕欲以懸示後賢耳發之中得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥會稽鍾離意璧有七張伯懷其一意即召問伯果伏焉晏子宅晏子冢左傳景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者晏子辭曰君之先臣容焉臣不足以嗣之于臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅晏子使晉景公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜維鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之水經注齊北門外東北二百步有齊相晏嬰冢宅左傳晏子之宅近市景公欲易之而嬰弗更為誡曰吾生則近市死豈易志乃葬故宅後人名之曰清節里崔鴻十六國春秋慕容德如齊城登營丘望見晏嬰冢顧左右曰禮大夫不逼城葬平仲古之一賢人逹者而生安近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢矣豈不知髙其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不逺城者猶冀悟平生意也德悅之蘇秦宅蘇秦冢洛陽伽藍記大統寺在景明寺西即所謂利民里寺南有三公令史髙顯略宅每夜見赤光行于堂前如此者非一向光明所掘地丈餘得黃金百斤銘云蘇秦家金得者為吾造功德顯略遂造招福寺人謂此地是蘇秦舊宅當時元義秉政聞其得金就洛索之以二十斤與之又清陽門外三里御道北有孝義里西北角有蘇秦冢冢傍有寶明寺衆僧常見秦出入北冢車馬羽儀若今宰相也屈原宅賈誼宅水經注秭歸縣東北數十里有屈原舊田宅雖畦堰縻漫猶保屈田之稱也縣北一百六十里有屈原故宅纍石為屋基名其地曰樂平里宅之東北六十里有須廟搗衣石猶存故宜都記曰姊歸蓋楚子熊繹之始國而屈原之鄉里也袁山嵩曰屈原有賢姊聞原放逐亦來歸喻令自寬全鄉人冀其見從因名曰姊歸即離騷所謂女須嬋媛以詈余也嵩又曰父老傳言原既流放忽然暫歸鄉人喜悅因名歸鄉抑其山秀水清故出俊異地􅕑流疾故其性亦隘又羅含湘中記云屈潭之左有玉笥山道士遺言此福地也一曰地腳山泊水又西為屈潭即羅淵也屈原懷沙自沉于此故淵潭以屈為名昔賈誼史遷皆嘗徑此弭楫江波投弔于淵淵北有屈原廟廟前有碑水經注荆州部廨西陶侃廟云舊是賈誼宅地中有一井是誼所鑿極小而深上斂下大其狀似壺傍有一腳石牀才容一人相承云誼宿所坐牀又有大柑樹亦云誼所植也樊噲臺韓信臺水經注壻水徑樊噲臺南臺髙五六丈上容百許人又壻水北有韓信臺髙十餘丈上容百許人撫父堆望母臺水經注緱氏原開山圖謂之緱氏山也亦云仙者升焉言王子晉控鶴斯阜靈王望而不得近舉手謝而去其家得遺屣俗亦謂之為撫父堆堆上有子晉祠又洧水南有鄭莊公望母臺莊薑惡公寤生與段京居段不弟薑氏無訓莊公居夫人故城頴誓曰不及黃泉無相見也故城臺以望母用伸在心之思感考叔之言欣大隧之賦泄泄之慈有加融融之孝得常矣將軍望鄉臺公主望鄉館述異記漢成帝遣將軍王潰戍邊及帝崩王莽篡逆潰與莽有隙遂留不敢歸因逃入胡中士卒相率築臺為望鄉之處又晉永嘉亂既已至江諸公主不得隨去安陽公主平城公主奔入兩河界悉為民家妻常怏怏不悅有故鄉之思村民感之共築一臺以居之謂之公主望鄉之館梅梁梅溪述異記越俗説會稽山夏禹廟中有梅梁忽一春而生枝葉又四明圖經大梅山在鄞縣東七十里蓋漢梅子真舊隱也山頂有大梅木其上則伐為會稽禹廟之梁張僧繇畫龍于其上夜或風雨飛入鏡湖與龍鬬後人見梁上水淋漓而萍藻滿焉始駭異之乃以鐵索鎖于柱蘇州記淹梅溪昔有梅樹吳國采為姑蘇臺後忽於此沉今湖州側猶有梅溪兔園西園三輔黃圖梁孝王築兔園園中有百靈山有膚寸石落猿巖栖龍岫又有鴈池池間有鶴洲鳬渚其諸宫觀相連延亘數十里竒果異樹珍禽怪獸畢有王日與宫人賔客弋釣其中曹子建公宴詩清夜遊西園飛蓋相追隨上官儀册周王文西園孤月秀心鏡而齊明小山叢桂偃情田而並烈劉損葺垣牆於太伯廟蕭允設蘋藻於季子廟南史劉損為吳郡太守至閶門便入太伯廟時廟宇頽毁垣墻不修損愴然曰清塵尚可髣佛衡宇一何推頽即令修葺又蕭允為鄱陽王長史帶會稽郡丞行經延陵季子廟設蘋藻之薦託異代之交為詩以敘意辭理清典見諸葛碑銘經馬援銅柱北史史萬歲擊南寧夷入蜻蛉川經弄凍次小勃弄大勃弄至于南中賊前後屯據要害萬歲皆擊破之行數百里見諸葛亮紀功碑銘其背曰萬歲後勝我者過此萬歲令左右倒其碑而進又劉方經略林邑軍至海口林邑王梵志遣兵守險方擊走之師至闍黎江既渡行三十里賊乘巨象四靣而至方以弩射象象中瘡却蹂其陳賊奔柵因攻破之于是濟區栗進至大緣江所擊皆破經馬援銅柱南行八日至其國都林邑王梵志棄城奔海獲其廟主金人汙其宫室刻石紀功而還鳯闕巋然獨存靈光巋然獨存關中記建章宫圜闕臨北道有金鳯在闕上髙丈餘故號鳯闕也繁欽建章鳯樓闕賦曰秦漢規模廓然毁泯惟建章鳯闕巋然獨存王文考魯靈光殿賦序曰魯靈光殿者蓋景帝程姬之子恭王餘之所立也初恭王始都下國好治宫室遂因魯僖基兆而營焉遭漢中微盜賊奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依憑支持以保漢室者也然其規矩制度上應星宿亦所以永安也模木生周公冢上楷木生孔子冢上淮南王草木譜模木生周公冢上其葉春青夏緑秋白冬黯以色得其正也楷木生孔子冢上其幹枝踈而不屈以質得其正也營髙敞地遷髙顯地史記太史公曰吾如淮隂淮隂人為余言韓信雖為布衣時其志與衆異其母死貧無以葬然乃行營髙敞地令其旁可置萬家余視其母冢良然按水經注曰淮隂城東有兩冢西者即漂母冢也周回數百步髙十餘丈昔漂母食信于淮隂信王下邳蓋投金增陵以報母矣東一陵即信母冢也晉書劉超死蘇峻之難將改葬帝痛念之不已詔遷髙顯近地葬之使出入得瞻望其墓燕數萬銜土置臨江閔王冢上燕數千銜土投定陶丁姬穿中漢書臨江閔王榮坐侵廟壖地為宫上徴榮榮行祖於江陵北門既上車軸折車壞江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之漢書王莽秉政貶定陶丁太后號曰丁姬平其故冢又周棘其處時有羣燕數千銜土投丁姬穿中師古曰穿謂壙中也玉匣殮尸玉璧藉尸後漢赤眉發掘諸陵取其寶貨遂汙辱吕后尸凡賊所發有玉匣殮者率皆如生故赤眉得多行淫穢漢儀注曰自腰以下以玉為扎長尺廣一寸半為匣下至足綴以黃金縷謂之為玉匣也抱朴子曰吳景帝時戍將于廣陵握諸冢取版以治城所壞甚多復發一大冢內有重閣戶扇皆樞轉可開閉四周為徼道通車其髙可以乘馬又鑄銅為人數十枚長五尺皆大冠朱衣執劒列侍靈座皆刻銅人背後石壁言殿中將軍或言侍郎常侍似公主之冢破其棺棺中有人髮已班白衣冠鮮明靣體如生人棺中雲母厚尺許以白玉璧三十枚藉尸兵人輩共舉出死人以倚冢壁有一玉長一尺許形似冬瓜從死人懷中透出墮地兩耳及鼻孔中皆有黃金如棗許大此則骸骨有假物而不朽之效也何類長沙王甚肖忠烈王世語曰黃初末吳人發長沙王吳芮冢以其磚于臨湘為孫堅立廟芮容貌如生衣服不朽後與發者見吳綱曰君何類長沙王吳芮但微短耳綱瞿然曰是先祖也君何由見之見者言所由綱曰更葬否答曰即更葬矣自芮之卒年至冢發四百餘年綱芮十六世孫案漢書吳芮秦時番陽人也甚得江湖間民心號曰番君天下之初叛秦也黥布歸芮芮妻之因率越人舉兵以應諸侯沛公攻南陽乃遇芮之將梅鋗與偕攻析酈降之及項羽相王以芮率百越佐諸侯從入關故立芮為衡山王都邾其將梅鋗功多封十萬戶為列侯項籍死上以鋗有功從入武關故德芮徙為長沙王都臨湘一年薨制詔御史長沙王忠其定著令鄧展曰漢約非劉氏不王而芮王故著令中使特王也或曰以芮至忠故著令也班固贊曰吳芮之起不失正道故能傳號五世以無嗣絶慶流支庶有以矣夫著于甲令而稱忠也牛僧孺玄怪録載唐元和中饒州刺史齊推女因止州宅誕育為神人擊死後有仙官治其事云是西漢鄱陽王吳芮今刺史宅是芮昔時所居皆非也水經注臨湘縣治西北有北津城縣北有吳芮冢廣踰六十八丈登臨寫目為門里郭之佳憩也薛用弱集異記蘭陵蕭頴士楊府功曹秩滿南遊行侣共濟瓜州舟中有二少年熟視頴士相顧曰此人甚有肖于鄱陽忠烈王也頴士是鄱陽曾孫即自欵陳二子曰吾識爾祖久矣頴士以廣衆中未敢詢訪俟及岸方將啓請而二子忽遽負擔而去頴士必謂非仙則神虔心嚮矚而已明年頴士北歸止于盱眙邑長之署方與邑長下簾晝坐自門遽白曰某吏於某處擒獲發冢盜共五六人登令召入皆反接其手束縛甚固旅之于庭而頴士懸認江中二少年亦縲絏于內頴士驚曰斯二人非仙則神因具述曩事邑長即令先窮二子須臾欵伏佐驗明著皆云我之發丘墓今有年矣頴士則以前説再令詢之皆曰我嘗開鄱陽王冢大獲金玉當門有貴人顔色如生年方五十髭鬢斑白僵卧于石榻姿狀正與頴士相類無少差異我舟中遇子又是蕭氏固是鄱陽胤也因此啓言我豈有他術哉用弱嘗聞人之紹述其或三五世則必一人有肖其祖先之形狀者斯豈驗與牛眠地狗舐泉晉書初陶侃微時丁艱將葬家中忽失牛而不知所在遇一老父謂曰前岡見一牛眠汙中其地若葬位極人臣矣又指一山云此亦其次當世出二千石言訖不見侃尋牛得之因葬其處以所指别山與周訪訪父死葬焉果為刺史著稱寧益自訪以下三世為益州四十一年如其所言云魏書爾朱榮所居之處曾有狗舐地因而穿之得甘泉焉至今名狗舐泉得古冢遣功曹何佇為之起墳發古冢使長史蔡約自往修復南史始興簡王鑑為益州刺史于州園地得古冢無復棺但有石槨銅器十餘種並古形玉璧三枚珍寶甚多不可皆識金銀為蠶蛇形者數斗又以朱砂為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冡者得玉鏡玉屏風玉匣之屬皆將還都吾意嘗不同乃遣功曹何佇為之起墳諸寶物一不得犯南史宜都王鏗為南豫州刺史于時人發桓溫女冢得金巾箱織金篾為嚴器又有金蠶銀繭等物甚多條以啓聞鬱林敕以物賜之鏗曰今取往物後取今物如此循環豈可熟念使長史蔡約自往修復纎毫不犯塹杜氏山岡塹鮮于祖墳北夢瑣言古有宅墓之書世人多尚其事識者猶或非之杜公正倫與京兆宗𣲖不同常蒙輕逺公銜之洎公宦達後因事塹斷杜陵山脈由是諸杜數代不振鮮于仲通兄弟閬州新井縣人倔起俱登將壇望氣者以其祖先墳上有異氣降敕塹斷之裔孫有鮮于嶽者幼年寢處席底有一小蛇蓋新出卵者家人見之以為竒事比侯及壯常有自負之色歷官終于普州安嶽縣不免風塵其徒戲之曰鮮于蛇也國人哀三良賦黃鳥國人傷三貞賦黃鳥左傳秦穆公卒以子車氏之三子為殉皆秦之良也國人哀之為之賦黃鳥詩曰交交黃鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身交交黃鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身交交黃鳥止于楚誰從穆公子車針虎維此針虎百夫之禦臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身華陽國志永初中廣漢漢中羌反虐及巴郡有馬妙祁妻義王元憒妻姬趙蔓君妻華夙喪夫執共薑之節守一醮之禮號曰三貞遭亂兵迫匿懼見拘辱三人同時自沉于西漢水而沒死有黃鳥鳴其亡處徘徊焉國人傷之乃作詩曰關關黃鳥爰集于樹窈窕淑女是繡是黼維彼繡黼其心匪石嗟爾臨川邈不可獲齊侯躬弔杞梁之室齊侯親推無存之車左傳齊侯歸遇杞梁之妻于郊使弔之辭曰殖之有罪何辱命焉若免于罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室杜注殖即杞梁左傳齊師之在夷儀也齊侯謂夷儀人曰得敝無存者以五家免乃得其尸公三禭之與之犀軒與直蓋而先歸之坐引者以師哭之親推之三以綿上為介推田環會稽為范蠡地左傳晉侯賞從亡者介之推不言祿祿亦弗及推曰獻公之子九人惟君在矣惠懷無親外內棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜况貪天之功以為己力乎下義其罪上賞其姦上下相蒙難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱遂隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善人按洪容齋氏云綿上者西河界休縣地也史記則曰子推從者書公門有一蛇獨怨之語文公見其書使人召之則亡聞其入綿上山中於是環山封之名曰介山雖與左傳稍異而大略亦同至劉向新序始云子推怨于無爵齒去而之介山之上文公待之不肯出以謂焚其山宜出遂不出而爽死是後雜傳記如汝南先賢傳則云太原舊俗以介子推焚骸一月寒食鄴中記云并州俗冬至後一百五日為子推斷火冷食三日魏武帝以太原上黨西河鴈門皆沍寒之地令人不得寒食亦為冬至後百有五日也案後漢周舉傳云太原一郡舊俗以介子推焚骸有龍忌之禁至其亡月咸曰神靈不樂舉火由是士民每冬中輒一月寒食莫敢煙㸑舉為并州刺史乃作弔書置子推廟言盛冬去火殘損民命非賢者意宣示愚民使還溫食於是衆惑稍解風俗頗革然則所謂寒食乃是冬中非今節令二三月間也又按李涪刊誤曰古四時皆改其火自秦漢以降漸至簡易惟以春是一歲之首止一鑽燧而適當改火之時是為寒食節後又郊特牲云季春出火為禁火此則焚火之義昭然可徵俗傳禁火之因皆以介推為據是不知古故以鑽燧證之國語越滅吳反至五湖范蠡辭于王曰君王勉之臣不復入于越國矣王曰不榖疑子之所謂者何也范蠡對曰臣聞之為人臣者君憂臣勞君辱臣死昔者君王辱于會稽臣所以不死者為此事也今事已濟矣蠡請從會稽之罰王曰所不掩子之惡揚子之美者使其身無終沒于越國子聽吾言與子分國不聽吾言身死妻子為戮范蠡對曰臣聞命矣君行制臣行意遂乘輕舟以浮于五湖莫知其所終極王命工以良金寫范蠡之狀而朝禮之浹日而令大夫朝之環會稽三百里者以為范蠡地太宗為王圭立廟太宗為戴胄立廟舊唐書王圭通貴漸久而不營私廟四時蒸嘗猶祭於寢坐為法司所劾太宗優容弗之譴也因為立廟以愧其心圭既儉不中禮時論以是少之又戴胄卒太宗詔虞世南撰為碑文又以胄宅宇敝陋祭享無所令有司特為造廟駢志卷十一
